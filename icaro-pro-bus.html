        if (!zone || !zone.classList.contains('active')) return;
        atoW = zone.clientWidth; atoH = zone.clientHeight;
        atoCanvas.width = Math.round(atoW * atoDPR); atoCanvas.height = Math.round(atoH * atoDPR);
        atoCtx.setTransform(atoDPR, 0, 0, atoDPR, 0, 0);
        atoBgCanvas.width = Math.round(atoW * atoDPR); atoBgCanvas.height = Math.round(atoH * atoDPR);
        atoBgCtx.setTransform(atoDPR, 0, 0, atoDPR, 0, 0);
    }
    window.addEventListener('resize', atoResize);

    function atoArea() {
        return { x: 0, y: 0, w: atoW, h: atoH, cx: atoW * 0.5, cy: atoH * 0.5 };
    }

    function atoProject(x, y, z) {
        const A = atoArea();
        const dz = z - ATO.cam + 900;
        if (dz < 40) return null;
        const v = ATO.view;
        if (v === 3) {
            // SIDE: flat orthographic side projection
            const scale = ATO.zoom * 0.3;
            return { x: A.cx + (z - ATO.cam) * scale, y: A.cy + y * scale * 2 - x * scale * 0.5, s: scale, d: dz };
        }
        if (v === 4) {
            // BENCH: flat 2D timeline
            const scale = ATO.zoom * 0.25;
            const trackY = Math.atan2(y, x) / (Math.PI / 2);
            return { x: A.cx + (z - ATO.cam) * scale, y: A.cy + trackY * 80, s: scale, d: dz };
        }
        // BARREL (0), INSIDE (1), OUTSIDE (2): perspective projection with view-specific params
        const s = 720 / dz;
        const drift = v === 1 ? 0 : (z - ATO.cam) * .052;
        const vertShift = v === 1 ? 0 : -(z - ATO.cam) * .016;
        return { x: A.cx + x * s + drift, y: A.cy + y * s + vertShift, s, d: dz };
    }

    function atoAngle(c) {
        const track = c ? c.vTrack : ATO.active;
        return track * Math.PI / 2 - Math.PI / 2 + ATO.roll + ((c && Number.isFinite(c.rot)) ? c.rot : 0);
    }
    function atoTrackAngle(track) { return track * Math.PI / 2 - Math.PI / 2 + ATO.roll; }

    function atoTubeGeom(c) {
        if (!c) return { cells: [], hull: [], depth: 1e9 };
        const rr = ATO_R + (c.vLift || 0) * 36;
        const base = atoAngle(c);
        const a0 = base - Math.PI / 4 + .05, a1 = base + Math.PI / 4 - .05;
        const z0 = c.vStart, z1 = c.vStart + c.vDur;
        const zSteps = atoClamp(Math.ceil((z1 - z0) / ATO_SNAP), 2, 34);
        let cells = [], hull = [], depth = 1e9;
        for (let zi = 0; zi < zSteps; zi++) {
            let za = atoLerp(z0, z1, zi / zSteps), zb = atoLerp(z0, z1, (zi + 1) / zSteps);
            for (let ai = 0; ai < 6; ai++) {
                let aa = atoLerp(a0, a1, ai / 6), ab = atoLerp(a0, a1, (ai + 1) / 6);
                let raw = [[Math.cos(aa) * rr, Math.sin(aa) * rr, za], [Math.cos(ab) * rr, Math.sin(ab) * rr, za], [Math.cos(ab) * rr, Math.sin(ab) * rr, zb], [Math.cos(aa) * rr, Math.sin(aa) * rr, zb]];
                let pts = [], ok = true, cd = 1e9;
                for (const p of raw) { let q = atoProject(p[0], p[1], p[2]); if (!q) { ok = false; break; } pts.push(q); cd = Math.min(cd, q.d); depth = Math.min(depth, q.d); }
                if (ok) cells.push({ pts, d: cd });
            }
        }
        return { cells, hull, depth };
    }

    // Full-tube geometry: wraps a clip around the ENTIRE circumference
    // Used for derived frame clips so images fill all 4 walls of the tunnel
    function atoFullTubeGeom(c) {
        if (!c) return { cells: [], hull: [], depth: 1e9 };
        const rr = ATO_R;
        const z0 = c.vStart, z1 = c.vStart + c.vDur;
        const zSteps = atoClamp(Math.ceil((z1 - z0) / ATO_SNAP), 1, 8);
        const aSteps = 16; // subdivide full circle into 16 segments
        let cells = [], hull = [], depth = 1e9;
        for (let zi = 0; zi < zSteps; zi++) {
            let za = atoLerp(z0, z1, zi / zSteps), zb = atoLerp(z0, z1, (zi + 1) / zSteps);
            for (let ai = 0; ai < aSteps; ai++) {
                let aa = ATO.roll + (ai / aSteps) * Math.PI * 2;
                let ab = ATO.roll + ((ai + 1) / aSteps) * Math.PI * 2;
                let raw = [
                    [Math.cos(aa) * rr, Math.sin(aa) * rr, za],
                    [Math.cos(ab) * rr, Math.sin(ab) * rr, za],
                    [Math.cos(ab) * rr, Math.sin(ab) * rr, zb],
                    [Math.cos(aa) * rr, Math.sin(aa) * rr, zb]
                ];
                let pts = [], ok = true, cd = 1e9;
                for (const p of raw) {
                    let q = atoProject(p[0], p[1], p[2]);
                    if (!q) { ok = false; break; }
                    pts.push(q); cd = Math.min(cd, q.d); depth = Math.min(depth, q.d);
                }
                if (ok) cells.push({ pts, d: cd });
            }
        }
        return { cells, hull, depth };
    }

    function atoRender() {
        if (!atoW || !atoH) return;
        atoRendered = [];
        let gizmosToRender = [];

        // Background
        atoBgCtx.fillStyle = '#f8fafc'; atoBgCtx.fillRect(0, 0, atoW, atoH);
        atoBgCtx.fillStyle = '#e2e8f0';
        for (let i = 0; i < 40; i++) atoBgCtx.fillRect(Math.random() * atoW, Math.random() * atoH, Math.random() * 200, Math.random() * 3);
        atoBgCtx.fillStyle = 'rgba(255,255,255,0.85)'; atoBgCtx.fillRect(0, 0, atoW, atoH);

        // Grid
        atoBgCtx.save(); atoBgCtx.globalAlpha = 0.15; atoBgCtx.strokeStyle = '#000';
        for (let x = 0; x < atoW; x += 40) { atoBgCtx.beginPath(); atoBgCtx.moveTo(x, 0); atoBgCtx.lineTo(x, atoH); atoBgCtx.stroke(); }
        for (let y = 0; y < atoH; y += 40) { atoBgCtx.beginPath(); atoBgCtx.moveTo(0, y); atoBgCtx.lineTo(atoW, y); atoBgCtx.stroke(); }
        atoBgCtx.restore();

        // UI Layer
        atoCtx.clearRect(0, 0, atoW, atoH);

        // View dispatch
        if (ATO.view === 0 || ATO.view === 1) drawAtoTubeView(gizmosToRender);
        else if (ATO.view === 2) drawAtoOutside(gizmosToRender);
        else if (ATO.view === 3) drawAtoSide(gizmosToRender);
        else drawAtoBench(gizmosToRender);

        // Snap line
        drawAtoSnapLine();

        // Drag constraint guides
        drawAtoDragConstraints();

        // Route lines
        drawAtoRoutes();

        // Gizmo overlays for selected clip
        for (const gz of gizmosToRender) {
            atoRenderGizmos(gz.c, gz.m, gz.hw, gz.hh);
        }

        // Badge
        const derivedClipList = deriveClips();
        const derivedCount = derivedClipList.length || atoClips.length;
        if (!ATO.selected) {
            const badge = document.getElementById('ato-selBig');
            const meta = document.getElementById('ato-selMeta');
            badge.textContent = derivedCount + ' CLIPS';
            meta.textContent = 'TAP TO SELECT';
        }

        // Status readout
        const statusEl = document.getElementById('ato-status');
        if (statusEl && !ATO.drag && !ATO.scrub && !ATO.hover)
            statusEl.textContent = ATO_VIEWS[ATO.view] + ' · ' + ATO_SHORT[ATO.active] + ' · ' + ATO.unit;

        // Clip info
        const info = document.getElementById('ato-clip-info');
        if (info) info.textContent = derivedCount + ' CLIPS · CAM ' + Math.round(ATO.cam);
    }

    // ── TAG LABEL ──
    function atoTag(x, y, text, active = false) {
        let fs = 12, w = Math.max(54, String(text).length * 7.2 + 14), h = fs + 10;
        x = atoClamp(x - w / 2, 4, atoW - w - 4);
        y = atoClamp(y - h / 2, 4, atoH - h - 4);
        atoCtx.fillStyle = active ? '#000' : '#fff';
        atoCtx.strokeStyle = '#000'; atoCtx.lineWidth = active ? 3 : 2;
        atoCtx.beginPath(); atoCtx.rect(x, y, w, h); atoCtx.fill(); atoCtx.stroke();
        atoCtx.fillStyle = active ? '#fff' : '#000';
        atoCtx.font = `900 ${fs}px ui-monospace`; atoCtx.textAlign = 'center'; atoCtx.textBaseline = 'middle';
        atoCtx.fillText(String(text), x + w / 2, y + h / 2);
        return { x, y, w, h };
    }

    // ── HATCH PATTERN ──
    function atoHatch(p, kind, b) {
        atoCtx.save(); atoCtx.clip(p); atoCtx.globalAlpha = 0.42;
        atoCtx.strokeStyle = '#000'; atoCtx.lineWidth = 0.7;
        let st = kind === 3 ? 8 : 10;
        if (kind === 0) for (let x = b.x; x < b.x + b.w; x += st) { atoCtx.beginPath(); atoCtx.moveTo(x, b.y); atoCtx.lineTo(x, b.y + b.h); atoCtx.stroke(); }
        else if (kind === 1) for (let y = b.y; y < b.y + b.h; y += st) { atoCtx.beginPath(); atoCtx.moveTo(b.x, y); atoCtx.lineTo(b.x + b.w, y); atoCtx.stroke(); }
        else if (kind === 2) for (let x = b.x - b.h; x < b.x + b.w; x += st) { atoCtx.beginPath(); atoCtx.moveTo(x, b.y + b.h); atoCtx.lineTo(x + b.h, b.y); atoCtx.stroke(); }
        else for (let x = b.x - b.h; x < b.x + b.w; x += st) { atoCtx.beginPath(); atoCtx.moveTo(x, b.y); atoCtx.lineTo(x + b.h, b.y + b.h); atoCtx.stroke(); atoCtx.beginPath(); atoCtx.moveTo(x, b.y + b.h); atoCtx.lineTo(x + b.h, b.y); atoCtx.stroke(); }
        atoCtx.restore();
    }

    // ═══════════════════════════════════════════
    // ── VIEW 0/1: TUBE (BARREL / INSIDE) ──
    // ═══════════════════════════════════════════
    function drawAtoTubeView(gizmosToRender) {
        // Rail lines
        atoCtx.save();
        for (let t = 0; t < 4; t++) {
            const a = atoTrackAngle(t);
            atoCtx.setLineDash(ATO_STYLES[t].dash);
            atoCtx.lineWidth = (t === ATO.active ? 3 : 1.4);
            atoCtx.strokeStyle = '#000';
            atoCtx.globalAlpha = t === ATO.active ? .85 : .22;
            atoCtx.beginPath();
            for (let i = 0; i <= 50; i++) {
                const z = ATO.cam - 900 + i * (ATO_FAR / 50);
                const q = atoProject(Math.cos(a) * ATO_R, Math.sin(a) * ATO_R, z);
                if (q) i ? atoCtx.lineTo(q.x, q.y) : atoCtx.moveTo(q.x, q.y);
            }
            atoCtx.stroke();
        }
        atoCtx.restore();

        // Ring markers
        atoCtx.save(); atoCtx.strokeStyle = '#000'; atoCtx.globalAlpha = 0.25;
        for (let z = atoQsnap(ATO.cam - 900); z < ATO.cam + ATO_FAR; z += ATO_SNAP * 2) {
            let q = atoProject(0, 0, z);
            if (q && q.s > 0.04) { atoCtx.beginPath(); atoCtx.arc(q.x, q.y, ATO_R * q.s, 0, Math.PI * 2); atoCtx.stroke(); }
        }
        atoCtx.restore();

        // Playhead ring
        let pRing = atoProject(0, 0, ATO.cam);
        if (pRing) {
            atoCtx.save(); atoCtx.strokeStyle = '#ef4444'; atoCtx.lineWidth = 4;
            atoCtx.beginPath(); atoCtx.arc(pRing.x, pRing.y, ATO_R * pRing.s, 0, Math.PI * 2); atoCtx.stroke();
            atoCtx.restore();
        }

        // Clips
        const derivedClipList = deriveClips();
        const clipSource = derivedClipList.length ? derivedClipList : atoClips;
        const withGeom = clipSource.map(c => ({
            c, g: c.fullTube ? atoFullTubeGeom(c) : atoTubeGeom(c)
        }));
        withGeom.sort((a, b) => b.g.depth - a.g.depth);

        for (const { c, g } of withGeom) {
            const isSel = ATO.selected === c;
            const isHov = ATO.hover && ATO.hover.clip === c;
            const style = ATO_STYLES[c.track] || ATO_STYLES[0];
            const hasFrameData = typeof c.frameStart === 'number' && c.frameStart < state.frames.length;
            let thumbCanvas = null;
            if (hasFrameData) thumbCanvas = getThumb(c.frameStart);
            if (!g.cells.length) continue;

            // PASS 1: Fill
            if (thumbCanvas) {
                atoCtx.save(); atoCtx.beginPath();
                for (const cell of g.cells) {
                    atoCtx.moveTo(cell.pts[0].x, cell.pts[0].y);
                    for (let i = 1; i < cell.pts.length; i++) atoCtx.lineTo(cell.pts[i].x, cell.pts[i].y);
                    atoCtx.closePath();
                }
                atoCtx.clip();
                let allX = [], allY = [];
                for (const cell of g.cells) for (const pt of cell.pts) { allX.push(pt.x); allY.push(pt.y); }
                const bx = Math.min(...allX), by = Math.min(...allY);
                const bw = Math.max(...allX) - bx, bh = Math.max(...allY) - by;
                if (bw > 4 && bh > 4) {
                    atoCtx.globalAlpha = isSel ? 1.0 : (isHov ? 0.98 : 0.95);
                    atoCtx.drawImage(thumbCanvas, bx, by, bw, bh);
                }
                atoCtx.restore();
            } else {
                for (const cell of g.cells) {
                    const p = new Path2D();
                    p.moveTo(cell.pts[0].x, cell.pts[0].y);
                    for (let i = 1; i < cell.pts.length; i++) p.lineTo(cell.pts[i].x, cell.pts[i].y);
                    p.closePath();
                    atoCtx.fillStyle = isHov && !isSel ? '#e2e8f0' : (isSel ? '#000' : '#fff');
                    atoCtx.globalAlpha = isSel ? 0.5 : 0.2;
                    atoCtx.fill(p);
                }
            }

            // PASS 2: Wireframe
            atoCtx.globalAlpha = 1;
            atoCtx.setLineDash(isSel ? [] : style.dash);
            atoCtx.strokeStyle = isSel ? style.color : '#000';
            atoCtx.lineWidth = isSel ? 3 : 0.7;
            for (const cell of g.cells) {
                atoCtx.beginPath(); atoCtx.moveTo(cell.pts[0].x, cell.pts[0].y);
                for (let i = 1; i < cell.pts.length; i++) atoCtx.lineTo(cell.pts[i].x, cell.pts[i].y);
                atoCtx.closePath(); atoCtx.stroke();
            }
            atoCtx.setLineDash([]);

            // Selection highlight + white inner stroke
            if (isSel) {
                atoCtx.save(); atoCtx.strokeStyle = '#fff'; atoCtx.lineWidth = 1.5;
                for (const cell of g.cells) {
                    atoCtx.beginPath(); atoCtx.moveTo(cell.pts[0].x, cell.pts[0].y);
                    for (let i = 1; i < cell.pts.length; i++) atoCtx.lineTo(cell.pts[i].x, cell.pts[i].y);
                    atoCtx.closePath(); atoCtx.stroke();
                }
                atoCtx.restore();
            }

            // Label
            const mZ = (c.vStart + c.vStart + c.vDur) / 2;
            const a = atoAngle(c);
            const m = atoProject(Math.cos(a) * ATO_R, Math.sin(a) * ATO_R, mZ);
            if (m) {
                const labelText = hasFrameData ? (c.frameStart === c.frameEnd ? String(c.frameStart + 1) : (c.frameStart + 1) + '-' + (c.frameEnd + 1)) : c.id;
                if (isSel || isHov || m.s > 0.3) {
                    atoTag(m.x, m.y, labelText, isSel);
                }
                atoRendered.push({ type: 'clip', clip: c, x: m.x - 30, y: m.y - 15, w: 60, h: 30 });

                // Queue gizmo for selected
                if (isSel) {
                    gizmosToRender.push({ c, m: { x: m.x, y: m.y }, hw: 50, hh: 30 });
                }
            }
        }
    }

    // ═══════════════════════════════════════════
    // ── VIEW 2: OUTSIDE ──
    // ═══════════════════════════════════════════
    function atoOutsideP() {
        let m = atoW < 900;
        return {
            cx0: m ? 88 : 185, cy0: atoH * 0.56,
            cx1: atoW - (m ? 36 : 90), cy1: atoH * 0.43,
            rx0: m ? 58 : 112, ry0: m ? 126 : 220,
            rx1: m ? 18 : 40, ry1: m ? 60 : 112,
            front: ATO.cam - 900, span: ATO_FAR + 1800
        };
    }
    function atoOC(s, P) { return { x: atoLerp(P.cx0, P.cx1, s), y: atoLerp(P.cy0, P.cy1, s) }; }
    function atoORad(s, P) { return { rx: atoLerp(P.rx0, P.rx1, s), ry: atoLerp(P.ry0, P.ry1, s) }; }
    function atoOPoint(s, a, P) { let c = atoOC(s, P), r = atoORad(s, P); return { x: c.x + Math.cos(a) * r.rx, y: c.y + Math.sin(a) * r.ry }; }
    function atoOS(z, P) { return atoClamp((z - P.front) / P.span, 0, 1); }

    function drawAtoOutside(gizmosToRender) {
        let P = atoOutsideP();
        atoCtx.strokeStyle = '#000';
        for (let i = 0; i <= 18; i++) {
            let c = atoOC(i / 18, P), r = atoORad(i / 18, P);
            atoCtx.lineWidth = i === 0 ? 3 : 1; atoCtx.globalAlpha = 0.3;
            atoCtx.beginPath(); atoCtx.ellipse(c.x, c.y, r.rx, r.ry, 0, 0, Math.PI * 2); atoCtx.stroke();
        }
        atoCtx.globalAlpha = 1;
        [-1.22, -.92, -.52, -.08, .34, .72, 1.08].forEach(a => {
            atoCtx.beginPath();
            for (let i = 0; i <= 36; i++) { let q = atoOPoint(i / 36, a, P); i ? atoCtx.lineTo(q.x, q.y) : atoCtx.moveTo(q.x, q.y); }
            atoCtx.stroke();
        });

        const derivedClipList = deriveClips();
        const clipSource = derivedClipList.length ? derivedClipList : atoClips;
        let arr = [];
        for (const c of clipSource) {
            let s0 = atoOS(c.vStart, P), s1 = atoOS(c.vStart + c.vDur, P);
            if (s1 <= 0 || s0 >= 1) continue;
            arr.push({ c, s0: atoClamp(s0, 0, 0.995), s1: atoClamp(Math.max(s1, s0 + 0.012), 0, 0.995), m: (s0 + s1) / 2 });
        }
        arr.sort((a, b) => b.m - a.m).forEach(o => {
            let c = o.c, sel = ATO.selected === c, hov = ATO.hover && ATO.hover.clip === c;
            let a0 = atoAngle(c) - Math.PI / 4 + 0.05, a1 = atoAngle(c) + Math.PI / 4 - 0.05;
            let pts = [], s0 = o.s0, s1 = o.s1;
            for (let i = 0; i <= 14; i++) pts.push(atoOPoint(atoLerp(s0, s1, i / 14), a0, P));
            for (let j = 1; j <= 6; j++) pts.push(atoOPoint(s1, atoLerp(a0, a1, j / 6), P));
            for (let i = 13; i >= 0; i--) pts.push(atoOPoint(atoLerp(s0, s1, i / 14), a1, P));
            for (let j = 5; j > 0; j--) pts.push(atoOPoint(s0, atoLerp(a0, a1, j / 6), P));

            let pp = new Path2D(); pp.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) pp.lineTo(pts[i].x, pts[i].y); pp.closePath();
            let bx = pts.map(p => p.x), by = pts.map(p => p.y);
            let bb = { x: Math.min(...bx), y: Math.min(...by), w: Math.max(...bx) - Math.min(...bx), h: Math.max(...by) - Math.min(...by) };

            atoCtx.save(); atoCtx.globalAlpha = 0.85;
            atoCtx.fillStyle = hov && !sel ? '#e2e8f0' : (sel ? '#000' : '#fff');
            atoCtx.fill(pp); atoCtx.restore();
            if (!sel) atoHatch(pp, (ATO_STYLES[c.track] || ATO_STYLES[0]).hatch, bb);
            atoCtx.setLineDash(sel ? [] : (ATO_STYLES[c.track] || ATO_STYLES[0]).dash);
            atoCtx.lineWidth = sel ? 5 : 2; atoCtx.strokeStyle = '#000'; atoCtx.stroke(pp);
            if (sel) { atoCtx.strokeStyle = '#fff'; atoCtx.lineWidth = 2; atoCtx.stroke(pp); }
            atoCtx.setLineDash([]);
            if (sel || hov) {
                let mp = atoOPoint((s0 + s1) / 2, (a0 + a1) / 2, P);
                atoTag(mp.x, mp.y, c.id, sel);
                if (sel) gizmosToRender.push({ c, m: mp, hw: 60, hh: 40 });
            }
            atoRendered.push({ type: 'clip', clip: c, pts });
        });

        // Playhead ring
        let s = atoOS(ATO.cam, P), cc = atoOC(s, P), rr = atoORad(s, P);
        atoCtx.lineWidth = 4; atoCtx.strokeStyle = '#ef4444';
        atoCtx.beginPath(); atoCtx.ellipse(cc.x, cc.y, rr.rx, rr.ry, 0, 0, Math.PI * 2); atoCtx.stroke();
        atoTag(cc.x, 24, atoFmt(ATO.cam));
    }

    // ═══════════════════════════════════════════
    // ── VIEW 3: SIDE (uses BENCH under the hood) ──
    // ═══════════════════════════════════════════
    function drawAtoSide(gizmosToRender) {
        drawAtoBench(gizmosToRender);
        atoCtx.save(); atoCtx.lineWidth = 3; atoCtx.setLineDash([6, 5]); atoCtx.strokeStyle = '#000';
        atoCtx.strokeRect(20, 20, atoW - 40, atoH - 40); atoCtx.restore();
    }

    // ═══════════════════════════════════════════
    // ── VIEW 4: BENCH (flat 2D timeline) ──
    // ═══════════════════════════════════════════
    function drawAtoBench(gizmosToRender) {
        // Lane lines
        for (let t = 0; t < 4; t++) {
            let y = atoLaneY(t), h = atoLaneH();
            atoCtx.strokeStyle = '#000'; atoCtx.setLineDash(ATO_STYLES[t].dash);
            atoCtx.lineWidth = t === ATO.active ? 3 : 1.5;
            atoCtx.beginPath(); atoCtx.moveTo(12, y); atoCtx.lineTo(atoW - 12, y); atoCtx.stroke();
            atoCtx.setLineDash([]);
            atoCtx.fillStyle = '#000'; atoCtx.font = '900 12px ui-monospace';
            atoCtx.textAlign = 'left'; atoCtx.textBaseline = 'bottom';
            atoCtx.fillText(ATO_NAMES[t], 18, y - h * 0.62);
        }

        // Clips
        const derivedClipList = deriveClips();
        const clipSource = derivedClipList.length ? derivedClipList : atoClips;
        for (const c of clipSource) {
            let x0 = atoBenchX(c.vStart), x1 = atoBenchX(c.vStart + c.vDur);
            let w = x1 - x0, y = atoLaneY(c.vTrack || c.track || 2), h = atoLaneH();
            let top = y - h / 2, sel = ATO.selected === c, hov = ATO.hover && ATO.hover.clip === c;
            if (x1 < -90 || x0 > atoW + 90) continue;

            let p = new Path2D(); p.rect(x0, top, Math.max(5, w), h);
            atoCtx.save(); atoCtx.globalAlpha = 0.85;
            atoCtx.fillStyle = hov && !sel ? '#e2e8f0' : (sel ? '#000' : '#fff');
            atoCtx.fill(p); atoCtx.restore();

            // Render frame thumbnail inside bench clip
            let hasFrameData = typeof c.frameStart === 'number' && c.frameStart < state.frames.length;
            if (hasFrameData && w > 8) {
                let thumb = getThumb(c.frameStart);
                if (thumb) {
                    atoCtx.save(); atoCtx.beginPath();
                    atoCtx.rect(x0, top, Math.max(5, w), h); atoCtx.clip();
                    atoCtx.globalAlpha = sel ? 1.0 : 0.8;
                    atoCtx.drawImage(thumb, x0, top, Math.max(5, w), h);
                    atoCtx.restore();
                }
            }

            if (!sel && !hasFrameData) atoHatch(p, (ATO_STYLES[c.track] || ATO_STYLES[0]).hatch, { x: x0, y: top, w: Math.max(5, w), h });
            atoCtx.setLineDash(sel ? [] : (ATO_STYLES[c.track] || ATO_STYLES[0]).dash);
            atoCtx.lineWidth = sel ? 5 : 2; atoCtx.strokeStyle = '#000'; atoCtx.stroke(p);
            if (sel) { atoCtx.strokeStyle = '#fff'; atoCtx.lineWidth = 2; atoCtx.stroke(p); }
            atoCtx.setLineDash([]);
            if (sel || hov || w > 88) atoTag((x0 + x1) / 2, y, c.id || 'F' + (c.frameStart + 1), sel);

            atoRendered.push({ type: 'bench', clip: c, x0, x1, y, top, h });

            if (sel) {
                let visX0 = Math.max(20, x0), visX1 = Math.min(atoW - 20, x1);
                let mx = (visX0 + visX1) / 2, hw = atoClamp((visX1 - visX0) / 2, 40, atoW / 3), hh = atoClamp(h / 2, 20, 40);
                gizmosToRender.push({ c, m: { x: mx, y }, hw, hh });
            }
        }

        // Playhead
        let ax = atoBenchX(ATO.cam);
        atoCtx.lineWidth = 2; atoCtx.strokeStyle = '#ef4444';
        atoCtx.beginPath(); atoCtx.moveTo(ax, 8); atoCtx.lineTo(ax, atoH - 8); atoCtx.stroke();
        atoCtx.fillStyle = '#ef4444'; atoCtx.fillRect(ax - 34, 14, 68, 22);
        atoCtx.fillStyle = '#fff'; atoCtx.font = '900 12px ui-monospace';
        atoCtx.textAlign = 'center'; atoCtx.textBaseline = 'middle';
        atoCtx.fillText(atoFmt(ATO.cam), ax, 25);
        atoRendered.push({ type: 'lathe', x: ax - 38, y: 8, w: 76, h: atoH - 16 });
    }

    // ── ROUTE LINES ──
    function drawAtoRoutes() {
        if (!atoRoutes.length) return;
        const clips = deriveClips();
        atoCtx.save(); atoCtx.lineWidth = 2; atoCtx.setLineDash([8, 5]); atoCtx.strokeStyle = '#000';
        for (const r of atoRoutes) {
            let a = clips.find(c => c.id === r.from), b = clips.find(c => c.id === r.to);
            if (!a || !b) continue;
            if (ATO.view >= 3) {
                let xa = atoBenchX(a.vStart + a.vDur / 2), ya = atoLaneY(a.track || 2);
                let xb = atoBenchX(b.vStart + b.vDur / 2), yb = atoLaneY(b.track || 2);
                atoCtx.beginPath(); atoCtx.moveTo(xa, ya); atoCtx.lineTo(xb, yb); atoCtx.stroke();
                atoTag((xa + xb) / 2, (ya + yb) / 2, r.type || 'ROUTE');
            } else {
                let mZa = (a.vStart * 2 + a.vDur) / 2, mZb = (b.vStart * 2 + b.vDur) / 2;
                let ma = atoProject(Math.cos(atoAngle(a)) * ATO_R, Math.sin(atoAngle(a)) * ATO_R, mZa);
                let mb = atoProject(Math.cos(atoAngle(b)) * ATO_R, Math.sin(atoAngle(b)) * ATO_R, mZb);
                if (ma && mb) {
                    atoCtx.beginPath(); atoCtx.moveTo(ma.x, ma.y); atoCtx.lineTo(mb.x, mb.y); atoCtx.stroke();
                    atoTag((ma.x + mb.x) / 2, (ma.y + mb.y) / 2, r.type || 'ROUTE');
                }
            }
        }
        // Active route drag line
        if (ATO.drag && ATO.drag.mode === 'route' && ATO.drag.clip) {
            atoCtx.beginPath(); atoCtx.moveTo(ATO.drag.sx, ATO.drag.sy);
            atoCtx.lineTo(ATO.drag.mx || ATO.drag.sx, ATO.drag.my || ATO.drag.sy); atoCtx.stroke();
            atoTag(ATO.drag.mx || ATO.drag.sx, ATO.drag.my || ATO.drag.sy, 'ROUTE');
        }
        atoCtx.restore();
    }

    // ── SNAP LINE ──
    function drawAtoSnapLine() {
        if (!ATO.drag || currentSnapZ === null || !ATO.snap) return;
        atoCtx.save(); atoCtx.strokeStyle = '#22c55e'; atoCtx.lineWidth = 4; atoCtx.setLineDash([8, 8]);
        if (ATO.view >= 3) {
            let x = atoBenchX(currentSnapZ);
            atoCtx.beginPath(); atoCtx.moveTo(x, 0); atoCtx.lineTo(x, atoH); atoCtx.stroke();
            atoTag(x, 40, 'JOIN ' + atoFmt(currentSnapZ), true);
        } else {
            let q = atoProject(0, 0, currentSnapZ);
            if (q) { atoCtx.beginPath(); atoCtx.arc(q.x, q.y, Math.max(1, ATO_R * q.s), 0, Math.PI * 2); atoCtx.stroke(); }
            atoTag(atoW / 2, atoH / 2 + 60, 'JOIN ' + atoFmt(currentSnapZ), true);
        }
        atoCtx.restore();
    }

    // ── DRAG CONSTRAINTS ──
    function drawAtoDragConstraints() {
        if (!ATO.drag || !ATO.drag.clip || !ATO.drag.axisLock) return;
        atoCtx.save(); atoCtx.lineWidth = 4; atoCtx.strokeStyle = '#3b82f6'; atoCtx.globalAlpha = 0.8;
        let c = ATO.drag.clip;
        if (ATO.drag.axisLock === 'time') {
            if (ATO.view >= 3) {
                let y = atoLaneY(c.track || 2);
                atoCtx.beginPath(); atoCtx.moveTo(0, y); atoCtx.lineTo(atoW, y); atoCtx.stroke();
            } else {
                let a = atoTrackAngle(c.track || 2);
                atoCtx.beginPath();
                for (let i = 0; i <= 50; i++) {
                    let z = ATO.cam - 900 + i * (ATO_FAR / 50);
                    let q = atoProject(Math.cos(a) * ATO_R, Math.sin(a) * ATO_R, z);
                    if (q) i ? atoCtx.lineTo(q.x, q.y) : atoCtx.moveTo(q.x, q.y);
                }
                atoCtx.stroke();
            }
        } else if (ATO.drag.axisLock === 'track') {
            if (ATO.view >= 3) {
                let x = atoBenchX(c.vStart);
                atoCtx.beginPath(); atoCtx.moveTo(x, 0); atoCtx.lineTo(x, atoH); atoCtx.stroke();
            } else {
                let q = atoProject(0, 0, c.vStart);
                if (q) { atoCtx.beginPath(); atoCtx.arc(q.x, q.y, Math.max(1, ATO_R * q.s), 0, Math.PI * 2); atoCtx.stroke(); }
            }
        }
        atoCtx.restore();
    }

    let atoLoopActive = false;
    function atoLoop() {
        if (!atoLoopActive) return;
        if (ATO.play) {
            ATO.cam += ATO.playRate * 2;
            syncCursorFromATO();
        }
        // Scrub inertia
        if (ATO.inertia && Math.abs(ATO.inertia) > 0.5) {
            ATO.cam += ATO.inertia;
            ATO.inertia *= 0.92;
            syncCursorFromATO();
        } else ATO.inertia = 0;
        atoRender();
        atoAnimFrame = requestAnimationFrame(atoLoop);
    }
    function atoStartLoop() { atoLoopActive = true; atoResize(); atoLoop(); }
    function atoStopLoop() { atoLoopActive = false; if (atoAnimFrame) cancelAnimationFrame(atoAnimFrame); }

    // Bridge: ATO camera → Icaro cursor (uses derived clips)
    function syncCursorFromATO() {
        if (!state.frames.length) return;
        const clips = deriveClips();
        for (const c of clips) {
            if (ATO.cam >= c.vStart && ATO.cam <= c.vStart + c.vDur) {
                const prog = (ATO.cam - c.vStart) / c.vDur;
                const frameRange = c.frameEnd - c.frameStart;
                const targetFrame = Math.min(c.frameEnd, c.frameStart + Math.floor(prog * (frameRange + 1)));
                if (targetFrame !== state.cur && targetFrame >= 0 && targetFrame < state.frames.length) {
                    state.cur = targetFrame;
                    renderOutput();
                    const readout = document.getElementById('tl-frame-readout');
                    if (readout) readout.textContent = `${String(state.cur + 1).padStart(2, '0')}/${String(state.frames.length).padStart(2, '0')}`;
                }
                return;
            }
        }
    }

    // ── ATO INTERACTION ENGINE (ported from c.html) ──
    let currentSnapZ = null;
    const atoBank = [];

    // atoArea() defined earlier near atoProject
    function atoFmt(z) {
        let u = Math.max(0, Math.round((Number.isFinite(z) ? z : 0) / ATO_SNAP));
        return String(Math.floor(u / 60)).padStart(2, '0') + ':' + String(u % 60).padStart(2, '0');
    }
    // atoStep() and atoQsnap() hoisted — defined near atoMk()

    function atoMagneticSnap(v, tr = -1, ignoreId = null, dur = 0) {
        currentSnapZ = null;
        let z = atoQsnap(v);
        if (!ATO.snap) return z;
        const clips = deriveClips();
        let bd = Math.abs(v - z), thresh = Math.max(atoStep() * 1.5, ATO_SNAP);
        for (const c of clips) {
            if (c.id === ignoreId || (tr !== -1 && c.track !== tr)) continue;
            let targets = [c.vStart, c.vStart + c.vDur];
            if (dur > 0) targets.push(c.vStart - dur, c.vStart + c.vDur - dur);
            for (let t of targets) {
                if (Math.abs(v - t) < bd && Math.abs(v - t) <= thresh) {
                    bd = Math.abs(v - t); z = t;
                    currentSnapZ = t + (t < v ? dur : 0);
                }
            }
        }
        return z;
    }

    // ── HIT TESTING ──
    function atoHitPoly(pt, pts) {
        let h = false;
        for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
            let xi = pts[i].x, yi = pts[i].y, xj = pts[j].x, yj = pts[j].y;
            if (((yi > pt.y) != (yj > pt.y)) && pt.x < (xj - xi) * (pt.y - yi) / ((yj - yi) || 1e-6) + xi) h = !h;
        }
        return h;
    }

    function atoHit(x, y) {
        for (let i = atoRendered.length - 1; i >= 0; i--) {
            let r = atoRendered[i];
            if (r.type === 'lathe' && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h)
                return { mode: 'lathe', clip: null };
            if (r.clip && r.r && Math.hypot(x - r.x, y - r.y) < r.r + 12)
                return { clip: r.clip, mode: r.type };
            if (r.clip && r.w && x >= r.x - 10 && x <= r.x + r.w + 10 && y >= r.y - 10 && y <= r.y + r.h + 10)
                return { clip: r.clip, mode: r.type };
            if ((r.type === 'bench' || r.type === 'clip') && r.clip) {
                let hitBody = false;
                if (r.type === 'bench')
                    hitBody = (x >= r.x0 && x <= r.x1 && y >= r.top && y <= r.top + r.h);
                else if (r.pts)
                    hitBody = atoHitPoly({ x, y }, r.pts);
                if (hitBody) {
                    let mode = 'move';
                    if (ATO.tool === 'TRIM') {
                        let cTime = r.clip.vStart + r.clip.vDur / 2;
                        mode = (ATO.view >= 3 ? atoBenchTime(x) : atoTimeFromScreen(x, y, r.clip.track || 2, cTime)) < cTime ? 'start' : 'end';
                    } else if (ATO.tool === 'ROLL') mode = 'rotate';
                    else if (ATO.tool === 'LIFT') mode = 'lift';
                    else if (ATO.tool === 'ROUTE') mode = 'route';
                    else if (ATO.tool === 'SPLIT') mode = 'split';
                    else if (ATO.tool === 'STORE') mode = 'store';
                    return { clip: r.clip, mode };
                }
            }
        }
        return null;
    }

    // ── BENCH VIEW HELPERS ──
    function atoBenchX(z) { const A = atoArea(); return A.w * 0.5 + (z - ATO.cam) * ATO.zoom; }
    function atoBenchTime(x) { const A = atoArea(); return ATO.cam + (x - A.w * 0.5) / ATO.zoom; }
    function atoLaneY(t) { const A = atoArea(); return 70 + (A.h - 140) * (t + 0.5) / 4; }
    function atoLaneH() { const A = atoArea(); return atoClamp((A.h - 140) / 4 * 0.55, 30, 72); }

    function atoTimeFromScreen(x, y, track, fallbackZ) {
        if (ATO.view >= 3) return atoBenchTime(x);
        let a = atoTrackAngle(track), bestZ = fallbackZ, bd = 1e9;
        for (let z = ATO.cam - 900; z < ATO.cam + ATO_FAR; z += ATO_SNAP * 2) {
            let q = atoProject(Math.cos(a) * ATO_R, Math.sin(a) * ATO_R, z);
            if (q) { let d = Math.hypot(q.x - x, q.y - y); if (d < bd) { bd = d; bestZ = z; } }
        }
        for (let z = bestZ - ATO_SNAP * 2; z <= bestZ + ATO_SNAP * 2; z += 15) {
            let q = atoProject(Math.cos(a) * ATO_R, Math.sin(a) * ATO_R, z);
            if (q) { let d = Math.hypot(q.x - x, q.y - y); if (d < bd) { bd = d; bestZ = z; } }
        }
        return bestZ;
    }

    // ── GIZMO RENDERING ──
    function atoHandle(x, y, r, type, c, label, isHov) {
        atoCtx.beginPath(); atoCtx.arc(x, y, r, 0, Math.PI * 2);
        atoCtx.fillStyle = isHov ? '#fef08a' : '#fff'; atoCtx.fill();
        atoCtx.lineWidth = isHov ? 4 : 3; atoCtx.strokeStyle = '#000'; atoCtx.stroke();
        atoCtx.fillStyle = '#000'; atoCtx.font = '900 10px ui-monospace';
        atoCtx.textAlign = 'center'; atoCtx.textBaseline = 'middle';
        atoCtx.fillText(label, x, y);
        atoRendered.push({ type, clip: c, x, y, r });
    }
    function atoSquare(x, y, w, h, type, c, label, isHov) {
        atoCtx.fillStyle = isHov ? '#fef08a' : '#fff';
        atoCtx.fillRect(x - w / 2, y - h / 2, w, h);
        atoCtx.lineWidth = isHov ? 4 : 3; atoCtx.strokeStyle = '#000';
        atoCtx.strokeRect(x - w / 2, y - h / 2, w, h);
        atoCtx.fillStyle = '#000'; atoCtx.font = '900 10px ui-monospace';
        atoCtx.textAlign = 'center'; atoCtx.textBaseline = 'middle';
        atoCtx.fillText(label, x, y);
        atoRendered.push({ type, clip: c, x: x - w / 2, y: y - h / 2, w, h });
    }

    function atoRenderGizmos(c, m, hw, hh) {
        let mode = ATO.hover?.clip === c ? ATO.hover.mode : null;
        if (ATO.tool === 'TRIM') {
            atoSquare(m.x - hw - 20, m.y, 30, 30, 'start', c, 'S', mode === 'start');
            atoSquare(m.x + hw + 20, m.y, 30, 30, 'end', c, 'E', mode === 'end');
        } else if (ATO.tool === 'MOVE') {
            atoSquare(m.x, m.y, 42, 30, 'move', c, 'M', mode === 'move');
            atoHandle(m.x, m.y + hh + 20, 16, 'lane', c, 'L', mode === 'lane');
        } else if (ATO.tool === 'ROLL') {
            atoHandle(m.x, m.y - hh - 20, 16, 'rotate', c, 'R', mode === 'rotate');
        } else if (ATO.tool === 'LIFT') {
            atoHandle(m.x + hw + 30, m.y - hh - 10, 15, 'lift', c, '↑', mode === 'lift');
        } else if (ATO.tool === 'ROUTE') {
            atoHandle(m.x + hw + 30, m.y + hh + 10, 15, 'route', c, '→', mode === 'route');
        } else if (ATO.tool === 'SPLIT') {
            atoCtx.fillStyle = '#ef4444';
            atoCtx.fillRect(m.x - 2, m.y - hh - 20, 4, hh * 2 + 40);
            atoSquare(m.x, m.y - hh - 20, 30, 20, 'split', c, 'CUT', mode === 'split');
        }
    }

    // ── SELECTION ──
    function atoSelect(c, src = 'object') {
        ATO.selected = c;
        const selBig = document.getElementById('ato-selBig');
        const selMeta = document.getElementById('ato-selMeta');
        if (c) {
            selBig.textContent = c.id;
            selMeta.textContent = ATO_NAMES[c.track || 0] + ' | ' + atoFmt(c.vStart) + ' → ' + atoFmt(c.vStart + c.vDur);
            if (typeof c.frameStart === 'number' && c.frameStart < state.frames.length) {
                state.cur = c.frameStart; renderOutput(); updateStatusBar();
            }
        } else { selBig.textContent = 'NO CLIP'; selMeta.textContent = 'TAP SECTION'; }
    }

    function atoSetStatus(x) {
        const el = document.getElementById('ato-status');
        if (el) el.textContent = x;
    }

    // ── POINTER HANDLERS ──
    atoCanvas.addEventListener('pointerdown', e => {
        const rect = atoCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        ATO.inertia = 0; ATO.play = false;

        let h = atoHit(mx, my);
        if (h && h.clip) {
            if (h.mode === 'split') {
                // Insert clipBoundary at frame level
                if (typeof h.clip.frameStart === 'number' && h.clip.frameStart < state.frames.length) {
                    state.frames[h.clip.frameStart].clipBoundary = true;
                    _derivedClipsCache = null;
                    playTick(); fireToast('SPLIT AT FRAME ' + (h.clip.frameStart + 1));
                }
                return;
            }
            if (h.mode === 'store') {
                atoBank.push({ ...h.clip }); playTick(); fireToast('STORED (' + atoBank.length + ')');
                return;
            }
            atoSelect(h.clip, 'object');
            ATO.cam = h.clip.vStart + h.clip.vDur / 2;

            let ptrZ = ATO.view >= 3 ? atoBenchTime(mx) : atoTimeFromScreen(mx, my, h.clip.track || 2, h.clip.vStart);
            ATO.drag = {
                mode: h.mode, clip: h.clip,
                sx: mx, sy: my, mx: mx, my: my,
                origStart: h.clip.vStart, origTrack: h.clip.track || 2,
                start: h.clip.vStart, dur: h.clip.vDur,
                track: h.clip.track || 2, rot: h.clip.rot || 0, lift: h.clip.lift || 0,
                pointerZ: ptrZ, axisLock: null, lastSnapZ: h.clip.vStart
            };
            atoSetStatus(String(h.mode).toUpperCase());
        } else {
            ATO.scrub = { x: mx, y: my, cam: ATO.cam, lastTime: performance.now(), lastCam: ATO.cam };
            atoSetStatus('JOG WHEEL');
        }
    });

    atoCanvas.addEventListener('pointermove', e => {
        const rect = atoCanvas.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;

        if (ATO.drag && ATO.drag.clip) {
            let d = ATO.drag, c = d.clip;
            d.mx = x; d.my = y;
            let dx = x - d.sx, dy = y - d.sy;
            let timeDelta = 0, trackDelta = 0;
            if (ATO.view >= 3) { timeDelta = dx / ATO.zoom; trackDelta = Math.round(dy / atoLaneH()); }
            else { timeDelta = -dy * 15; trackDelta = Math.round(dx / 60); }

            if (d.mode === 'move' || d.mode === 'lane') {
                if (!e.shiftKey) {
                    if (!d.axisLock && Math.hypot(dx, dy) > 8)
                        d.axisLock = ATO.view >= 3 ? (Math.abs(dx) > Math.abs(dy) ? 'time' : 'track') : (Math.abs(dy) > Math.abs(dx) ? 'time' : 'track');
                    if (d.axisLock === 'time') trackDelta = 0;
                    else if (d.axisLock === 'track') timeDelta = 0;
                } else d.axisLock = null;

                // For derived clips, reorder frames
                if (typeof c.frameStart === 'number') {
                    let newStart = atoMagneticSnap(d.start + timeDelta, c.track, c.id, c.vDur);
                    if (d.lastSnapZ !== newStart) { playMicroTick(); d.lastSnapZ = newStart; }
                    // Update visual position
                    c.vStart = newStart;
                    c.vDur = ATO_SNAP;
                }
                atoSelect(c, 'drag');
            } else if (d.mode === 'start') {
                let ns = atoMagneticSnap(d.start + timeDelta, c.track, c.id);
                if (d.lastSnapZ !== ns) { playMicroTick(); d.lastSnapZ = ns; }
                c.vStart = ns; c.vDur = (d.start + d.dur) - ns;
                atoSelect(c, 'trim');
            } else if (d.mode === 'end') {
                let ne = atoMagneticSnap(d.start + d.dur + timeDelta, c.track, c.id);
                if (d.lastSnapZ !== ne) { playMicroTick(); d.lastSnapZ = ne; }
                c.vDur = Math.max(atoStep(), ne - c.vStart);
                atoSelect(c, 'trim');
            } else if (d.mode === 'rotate') {
                c.rot = (c.rot || 0) + dx * 0.012;
                if (ATO.snap) c.rot = Math.round(c.rot / (Math.PI / 4)) * (Math.PI / 4);
                atoSelect(c, 'rot');
            } else if (d.mode === 'lift') {
                c.lift = atoClamp((c.lift || 0) - dy / 70, -1, 1);
                if (ATO.snap) c.lift = Math.round(c.lift * 4) / 4;
                c.vLift = c.lift;
                atoSelect(c, 'lift');
            } else if (d.mode === 'route') {
                let hh = atoHit(x, y);
                if (hh && hh.clip && hh.clip !== c) {
                    d.target = hh.clip;
                    atoSetStatus('TARGET ' + hh.clip.id);
                }
            }
            return;
        }
        if (ATO.scrub) {
            let dx = x - ATO.scrub.x, dy = y - ATO.scrub.y;
            let moveAmt = ATO.view >= 3 ? -dx / ATO.zoom : dy * 4;
            ATO.cam = ATO.scrub.cam + moveAmt;
            syncCursorFromATO();
            let now = performance.now(), dt = now - ATO.scrub.lastTime;
            if (dt > 0) {
                let vel = (ATO.cam - ATO.scrub.lastCam) / dt * 16;
                ATO.vel = (ATO.vel || 0) * 0.5 + vel * 0.5;
                ATO.scrub.lastTime = now; ATO.scrub.lastCam = ATO.cam;
            }
            return;
        }
        ATO.hover = atoHit(x, y);
        if (ATO.hover) {
            let m = ATO.hover.mode;
            atoCanvas.style.cursor = (m === 'start' || m === 'end') ? 'col-resize' :
                (m === 'move' || m === 'lane') ? 'grab' :
                (m === 'rotate' || m === 'lift') ? 'ns-resize' : 'crosshair';
        } else atoCanvas.style.cursor = 'crosshair';
        atoSetStatus(ATO.hover ? 'HOVER' : 'IDLE');
    });

    atoCanvas.addEventListener('pointerup', () => {
        if (ATO.drag) {
            if (['move', 'lane', 'lift', 'start', 'end'].includes(ATO.drag.mode)) playClack();
            if (ATO.drag.mode === 'route' && ATO.drag.target) {
                atoRoutes.push({ from: ATO.drag.clip.id, to: ATO.drag.target.id, type: 'ROUTE' });
                playClack(); fireToast('ROUTED');
            }
            ATO.drag = null;
        }
        if (ATO.scrub) {
            if (Math.abs(ATO.vel || 0) > 1) ATO.inertia = ATO.vel;
            ATO.scrub = null;
        }
        currentSnapZ = null;
    });

    // Double-click to add clip
    atoCanvas.addEventListener('dblclick', e => {
        const rect = atoCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        let z = ATO.cam + 900;
        if (ATO.view >= 3) z = atoBenchTime(mx);
        // Add a blank frame at this position
        injectFrame(); _derivedClipsCache = null;
        fireToast('FRAME ADDED');
    });

    // Context menu
    atoCanvas.addEventListener('contextmenu', e => {
        e.preventDefault();
        const rect = atoCanvas.getBoundingClientRect();
        const h = atoHit(e.clientX - rect.left, e.clientY - rect.top);
        // Simple context — could expand later
        if (h && h.clip) {
            atoSelect(h.clip, 'context');
            fireToast(h.clip.id + ' SELECTED');
        }
    });

    // Scroll to move camera (enhanced with zoom + roll)
    atoCanvas.addEventListener('wheel', e => {
        e.preventDefault();
        ATO.inertia = 0;
        if (e.ctrlKey || e.metaKey) ATO.zoom = atoClamp(ATO.zoom - e.deltaY * 0.001, 0.22, 1.3);
        else if (e.altKey) ATO.roll += e.deltaY * 0.006;
        else { ATO.cam += e.deltaY * 1.5; ATO.vel = 0; }
        syncCursorFromATO();
    }, { passive: false });

    // ── KEYBOARD INSTRUMENT ──
    window.addEventListener('keydown', e => {
        // Don't capture when typing in inputs
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        // Only activate keyboard controls when ATO zone is visible
        const atoZone = document.getElementById('ato-zone');
        if (!atoZone || atoZone.style.display === 'none') return;

        let k = e.key.toLowerCase();
        if (k === ' ') { e.preventDefault(); ATO.play = !ATO.play; ATO.playRate = 1; fireToast(ATO.play ? 'PLAYING' : 'STOPPED'); }
        // JKL shuttle
        if (k === 'j') { e.preventDefault(); ATO.playRate = (ATO.play && ATO.playRate < 0) ? Math.max(-4, ATO.playRate * 2) : -1; ATO.play = true; fireToast('REV ' + Math.abs(ATO.playRate) + 'X'); }
        if (k === 'k') { e.preventDefault(); ATO.play = false; ATO.playRate = 1; ATO.inertia = 0; fireToast('PAUSE'); }
        if (k === 'l') { e.preventDefault(); ATO.playRate = (ATO.play && ATO.playRate > 0) ? Math.min(4, ATO.playRate * 2) : 1; ATO.play = true; fireToast('FWD ' + ATO.playRate + 'X'); }
        // Track select (1-4)
        if (['1', '2', '3', '4'].includes(e.key)) {
            e.preventDefault();
            let tr = parseInt(e.key) - 1; ATO.active = tr;
            if (e.shiftKey) { injectFrame(); _derivedClipsCache = null; playTick(); fireToast('PUNCH IN ' + ATO_NAMES[tr]); }
            else if (ATO.selected) { ATO.selected.track = tr; }
        }
        // Tool switching
        if (k === 'q') atoSetTool('MOVE');
        if (k === 'w') atoSetTool('TRIM');
        if (k === 'e') atoSetTool('SPLIT');
        if (k === 'r') atoSetTool('ROLL');
        if (k === 't') atoSetTool('LIFT');
        // Views
        if (k === 'v') atoCycleView();
        // Unit cycling
        if (k === '.' || k === ',') { 
            const UNITS = ['CLIP', 'BEAT', 'CELL', 'EDGE'];
            let i = UNITS.indexOf(ATO.unit);
            ATO.unit = UNITS[(i + 1) % UNITS.length];
            fireToast('UNIT: ' + ATO.unit);
        }
        // Arrow keys
        if (e.key === 'ArrowLeft') { e.preventDefault(); ATO.cam -= atoStep() * (e.shiftKey ? 4 : 1); syncCursorFromATO(); }
        if (e.key === 'ArrowRight') { e.preventDefault(); ATO.cam += atoStep() * (e.shiftKey ? 4 : 1); syncCursorFromATO(); }
        if (e.key === 'ArrowUp' && ATO.selected) { e.preventDefault(); ATO.selected.track = ((ATO.selected.track || 0) - 1 + 4) % 4; }
        if (e.key === 'ArrowDown' && ATO.selected) { e.preventDefault(); ATO.selected.track = ((ATO.selected.track || 0) + 1) % 4; }
        // Import/Export
        if (k === 'o') { e.preventDefault(); atoExportProject(); }
        if (k === 'p') { e.preventDefault(); atoExportSnapshot(); }
        if (k === 'n') { e.preventDefault(); atoExportEDL(); }
    });

    // ── ATO CONTROLS ──
    function atoSetTool(t) {
        ATO.tool = t; playTick();
        document.querySelectorAll('#ato-dock button').forEach(b => b.classList.toggle('on', b.dataset.tool === t));
        fireToast('TOOL: ' + t);
    }

    function atoSeed() {
        atoClips.length = 0; atoNextId = 1;
        for (let t = 0; t < 4; t++) {
            let z = -900 + t * 160;
            while (z < 8000) {
                const d = atoQsnap(260 + Math.random() * 720);
                atoClips.push(atoMk(z, d, t));
                z += d + (Math.random() > .84 ? ATO_SNAP : 0);
            }
        }
        playThud(); fireToast(atoClips.length + ' CLIPS GENERATED');
    }

    function atoSyncFromFrames() {
        // Clips are now auto-derived from frame boundaries.
        // This function just resets the camera and invalidates the cache.
        _derivedClipsCache = null; // force re-derive
        if (!state.frames.length) { playClack(); fireToast('NO FRAMES TO SYNC'); return; }
        const clips = deriveClips();
        // Center camera on first clip
        ATO.cam = 420;
        playClack(); fireToast(clips.length + ' CLIPS · ' + state.frames.length + ' FRAMES SYNCED');
    }

    function atoCycleView() {
        ATO.view = (ATO.view + 1) % ATO_VIEWS.length;
        // Apply view-specific camera parameters
        switch (ATO.view) {
            case 0: // BARREL — default 3/4 external view
                ATO.roll = -0.25; ATO.zoom = 0.52;
                break;
            case 1: // INSIDE — camera inside tube looking forward
                ATO.roll = 0; ATO.zoom = 0.8;
                break;
            case 2: // OUTSIDE — high orbital overview
                ATO.roll = -0.6; ATO.zoom = 0.35;
                break;
            case 3: // SIDE — flat orthographic side
                ATO.roll = 0; ATO.zoom = 0.52;
                break;
            case 4: // BENCH — 2D timeline strip
                ATO.roll = 0; ATO.zoom = 0.52;
                break;
        }
        playTick(); fireToast('VIEW: ' + ATO_VIEWS[ATO.view]);
    }
    function atoTogglePlay() { ATO.play = !ATO.play; playClack(); fireToast(ATO.play ? 'PLAYING' : 'STOPPED'); }
    function atoSetTrack(t) { ATO.active = t; playTick(); fireToast('TRACK: ' + ATO_NAMES[t]); }

    function atoExportProject() {
        const payload = { app: 'ICARO-ATO', version: 1, exportedAt: new Date().toISOString(), ato: { ...ATO }, clips: atoClips.slice(), icaroFrameCount: state.frames.length };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'icaro_ato_project_' + Date.now() + '.json'; a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 500);
        playThud(); fireToast('PROJECT EXPORTED');
    }

    function atoExportSnapshot() {
        try {
            const c = document.createElement('canvas'); c.width = atoW * atoDPR; c.height = atoH * atoDPR;
            const cx = c.getContext('2d');
            cx.drawImage(atoBgCanvas, 0, 0); cx.drawImage(atoCanvas, 0, 0);
            const a = document.createElement('a'); a.href = c.toDataURL('image/png');
            a.download = 'icaro_ato_snapshot_' + Date.now() + '.png'; a.click();
            fireToast('SNAPSHOT EXPORTED');
        } catch (e) { fireToast('SNAPSHOT BLOCKED'); }
    }

    function atoExportEDL() {
        let lines = ['TITLE: ICARO-ATO UNIFIED INSTRUMENT', ''];
        atoClips.slice().sort((a, b) => a.start - b.start).forEach((c, i) => lines.push(`${String(i + 1).padStart(3, '0')} ${c.id} TRACK:${ATO_NAMES[c.track]} START:${c.start} END:${c.start + c.dur}`));
        const edl = lines.join('\n');
        const blob = new Blob([edl], { type: 'text/plain' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'icaro_ato_edl_' + Date.now() + '.txt'; a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 500);
        playThud(); fireToast('EDL EXPORTED');
    }

    // Import
    document.getElementById('ato-import-file').addEventListener('change', e => {
        const f = e.target.files[0]; if (!f) return; e.target.value = '';
        const r = new FileReader();
        r.onload = () => {
            try {
                const d = JSON.parse(r.result);
                if (d.clips) { atoClips.splice(0, atoClips.length, ...d.clips); atoNextId = d.clips.length + 1; }
                if (d.ato) Object.assign(ATO, d.ato);
                playThud(); fireToast('PROJECT IMPORTED');
            } catch (err) { fireToast('IMPORT FAILED'); }
        };
        r.readAsText(f);
    });

    // ═══════════════════════════════════════════════════
    // ── ATO-BUS EMITTER SHIM ──
    // Detects iframe context and broadcasts frame data
    // to parent harness via postMessage. ZERO existing
    // code is modified — hooks via monkey-patch.
    // ═══════════════════════════════════════════════════
    const _ATOBUS_ACTIVE = (window.parent !== window);

    function _atoBusExtractGrid(f) {
        // Extract a 128×96 shade grid (0-7) from a frame's layers
        const grid = new Uint8Array(G_ROWS * G_COLS);
        let srcGrid = null;
        if (f.src) {
            const tc = document.createElement('canvas'); tc.width = G_COLS; tc.height = G_ROWS;
            const tx = tc.getContext('2d'); tx.drawImage(f.src, 0, 0, G_COLS, G_ROWS);
            const px = tx.getImageData(0, 0, G_COLS, G_ROWS).data;
            srcGrid = new Uint8Array(G_ROWS * G_COLS);
            for (let i = 0; i < G_ROWS * G_COLS; i++) {
                const pi = i * 4;
                srcGrid[i] = Math.round((255 - (px[pi] * 0.299 + px[pi+1] * 0.587 + px[pi+2] * 0.114)) / 255 * 7);
            }
        }
        for (let gy = 0; gy < G_ROWS; gy++) {
            for (let gx = 0; gx < G_COLS; gx++) {
                const sX = gx * B_SZ + Math.floor(B_SZ / 2);
                const sY = gy * B_SZ + Math.floor(B_SZ / 2);
                const idx = (sY * W + sX) * 4;
                let val = 0;
                const hA = f.handLayer ? f.handLayer[idx + 3] : 0;
                if (hA >= 16) val = alphaToLevel(hA);
                else { const sA = f.scriptLayer ? f.scriptLayer[idx + 3] : 0; if (sA >= 16) val = alphaToLevel(sA); else if (srcGrid) val = srcGrid[gy * G_COLS + gx]; }
                grid[gy * G_COLS + gx] = val;
            }
        }
        return grid;
    }

    // ── GRID CACHE (LAW 6 — Delta Mandate) ──
    // Cached grids keyed by frame index. Only re-extracted when frame._v changes.
    const _gridCache = new Map(); // index → { grid: Uint8Array, version: number }

    function _getCachedGrid(frameIndex) {
        const f = state.frames[frameIndex];
        if (!f) return null;
        const v = f._v || 0;
        const cached = _gridCache.get(frameIndex);
        if (cached && cached.version === v) return cached.grid;
        const grid = _atoBusExtractGrid(f);
        _gridCache.set(frameIndex, { grid, version: v });
        return grid;
    }

    // ── FRAME_PATCH — single frame delta (LAW 6) ──
    // Sent on pixel mutation (draw, stamp, erase). ~6KB payload.
    function _atoBusEmitPatch(frameIndex) {
        if (!_ATOBUS_ACTIVE) return;
        const f = state.frames[frameIndex];
        if (!f) return;
        const grid = _getCachedGrid(frameIndex);
        window.parent.postMessage({
            type: 'FRAME_PATCH',
            _origin: 'engine',
            index: frameIndex,
            grid: Array.from(grid),
            version: f._v || 0,
            gridW: G_COLS,
            gridH: G_ROWS
        }, '*');
    }

    // ── FRAMES_SYNC — full sync, BOOT + RECOVERY ONLY (LAW 6) ──
    let _atoBusSyncTimer = null;
    function _atoBusEmitSync() {
        if (!_ATOBUS_ACTIVE) return;
        clearTimeout(_atoBusSyncTimer);
        _atoBusSyncTimer = setTimeout(() => {
            const frames = state.frames.map((f, i) => ({
                index: i,
                grid: Array.from(_getCachedGrid(i)),
                version: f._v || 0
            }));
            window.parent.postMessage({
                type: 'FRAMES_SYNC',
                _origin: 'engine',
                frames: frames,
                total: state.frames.length,
                cursor: state.cur,
                gridW: G_COLS,
                gridH: G_ROWS
            }, '*');
        }, 30);
    }

    function _atoBusEmitCursor() {
        if (!_ATOBUS_ACTIVE) return;
        window.parent.postMessage({
            type: 'CURSOR_MOVE',
            _origin: 'engine',
            cursor: state.cur,
            total: state.frames.length
        }, '*');
    }

    function _atoBusEmitPlay(playing) {
        if (!_ATOBUS_ACTIVE) return;
        window.parent.postMessage({
            type: 'PLAY_SYNC',
            playing: playing,
            cursor: state.cur,
            total: state.frames.length
        }, '*');
    }

    // Monkey-patch hooks — run AFTER the original functions
    let _busInboundGoto = false; // Guard: suppress CURSOR_MOVE when handling GOTO_FRAME

    if (_ATOBUS_ACTIVE) {
        // Only emit FRAMES_SYNC on structural changes (add/delete/reorder)
        // Cursor-only changes use highlightFrame() which skips this entirely
        const _origRebuild = rebuildTrack;
        // Stash for use in message handler (CLIP_ARRANGE needs strip rebuild without re-emitting sync)
        window._rebuildTrackNoSync = _origRebuild;
        rebuildTrack = function() { _origRebuild.apply(this, arguments); _atoBusEmitSync(); };

        const _origRenderOutput = renderOutput;
        renderOutput = function() {
            _origRenderOutput.apply(this, arguments);
            // Only emit CURSOR_MOVE if this wasn't triggered by an incoming GOTO_FRAME
            if (!_busInboundGoto) _atoBusEmitCursor();
        };

        // Patch engageSequence to broadcast play state
        const _origEngage = engageSequence;
        engageSequence = function() {
            _origEngage.apply(this, arguments);
            _atoBusEmitPlay(state.playing);
        };

        // Listen for commands from tunnel via harness
        window.addEventListener('message', e => {
            const d = e.data;
            // ── MESSAGE VALIDATION (Structural) ──
            // Reject malformed messages before they reach ANY handler.
            // This makes type-error crashes from bad messages impossible.
            if (!d || typeof d !== 'object' || typeof d.type !== 'string') return;
            // Reject messages from self (echo prevention)
            if (d._origin === 'engine') return;

            if (d.type === 'GOTO_FRAME' && typeof d.cursor === 'number') {
                // During playback, engine is temporal authority — ignore tunnel navigation
                if (state.playing) return;
                const newCur = Math.max(0, Math.min(state.frames.length - 1, d.cursor));
                if (newCur !== state.cur) {
                    state.cur = newCur;
                    _busInboundGoto = true;
                    renderOutput(); updateStatusBar();
                    _busInboundGoto = false;
                    highlightFrame(state.cur); // O(1) cursor highlight
                }
            }
            if (d.type === 'CLIP_ARRANGE' && Array.isArray(d.playOrder)) {
                _tunnelPlayOrder = d.playOrder.filter(i => i >= 0 && i < state.frames.length);
                _tunnelArrangement = d.arrangement || null;
                _derivedClipsCache = null;
                _derivedClipsCacheKey = '';
                // Use un-patched rebuild to avoid re-emitting FRAMES_SYNC (breaks ping-pong loop)
                if (window._rebuildTrackNoSync) window._rebuildTrackNoSync();
                else rebuildTrack();
                highlightFrame(state.cur);
                flashSync('up');
                console.log('[ENGINE] Arrangement synced:', _tunnelPlayOrder.length, 'clips');
            }
            if (d.type === 'PLAY_SYNC') {
                // Tunnel requested play/stop — sync icaro-pro playback
                if (d.playing !== state.playing) {
                    engageSequence();
                }
            }
            if (d.type === 'REQUEST_SYNC') {
                // Harness asking for full re-emit (tab switch, reconnect, iframe reload)
                _atoBusEmitSync();
                _atoBusEmitCursor();
            }
        });

        console.log('[ATO-BUS] Emitter shim active — broadcasting to parent harness');
    }

    </script>
</body>
