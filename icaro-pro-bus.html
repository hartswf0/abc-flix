<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ICARO-ATO · Unified Worldtext Instrument</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23000'/%3E%3Crect x='4' y='4' width='56' height='56' fill='%23111' stroke='%23333' stroke-width='2'/%3E%3Ccircle cx='32' cy='28' r='14' fill='none' stroke='%23e60000' stroke-width='3'/%3E%3Ccircle cx='32' cy='28' r='5' fill='%23e60000'/%3E%3Cline x1='32' y1='14' x2='32' y2='6' stroke='%23e60000' stroke-width='2'/%3E%3Crect x='8' y='48' width='48' height='6' fill='%231a1a1a' stroke='%23333' stroke-width='1'/%3E%3Ctext x='32' y='44' text-anchor='middle' fill='%23fff' font-family='Helvetica,Arial,sans-serif' font-size='9' font-weight='900'%3EATO%3C/text%3E%3C/svg%3E">

    <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>
    <style>
        :root {
            --bg: #f4f4f0;
            --black: #000000;
            --white: #ffffff;
            --act-a: #0033cc;
            --act-b: #c8a800;
            --act-c: #e60000;
            --act-s: #1a7a3a;
            --bw: 3px;
            --sh: 3px;
            --tab-h: 60px;
            --status-h: 44px;
            --tl-h: 88px;
            --safe-b: env(safe-area-inset-bottom, 0px);
        }

        /* ── MOBILE-FIRST COMPACT OVERRIDES ── */
        @media (max-width: 767px) {
            :root {
                --tab-h: 46px;
                --status-h: 34px;
                --tl-h: 72px;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; border-radius: 0 !important; }
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
            position: fixed; inset: 0; height: 100dvh;
            background: var(--bg); color: var(--black);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none; -webkit-user-select: none;
        }
        svg { stroke-width: 3px; }

        /* ── STRUCTURE ── */
        #app { display: flex; flex-direction: column; width: 100%; height: 100%; height: 100dvh; }

        #status-bar {
            flex: 0 0 var(--status-h); display: flex; align-items: stretch;
            background: var(--black); color: var(--white);
            border-bottom: 2px solid #333; z-index: 50; gap: 0;
        }

        #canvas-zone {
            flex: 1 1 0%; position: relative; overflow: hidden;
            background: #e8e6e0; display: flex; align-items: center; justify-content: center;
        }

        /* ATO Canvas — HIDDEN in bus mode (tunnel lives in c-bus.html iframe) */
        #ato-zone { display: none !important; }
        #ato-zone canvas { display: none; }
        #bgStage { z-index: 0; background: #fff; }
        #stage { z-index: 1; background: transparent; cursor: crosshair; }

        #timeline-zone {
            flex: 0 0 var(--tl-h); background: var(--bg);
            border-top: var(--bw) solid var(--black);
            display: flex; flex-direction: column; overflow: hidden; z-index: 40;
        }

        #tab-bar {
            flex: 0 0 calc(var(--tab-h) + var(--safe-b)); display: flex;
            border-top: var(--bw) solid var(--black);
            background: var(--white); z-index: 60;
            padding-bottom: var(--safe-b);
        }

        /* ── STATUS BAR ── */
        .sb-group { display: flex; align-items: center; gap: 5px; padding: 0 10px; border-right: 1px solid #333; flex-shrink: 0; flex: 1; justify-content: center; }
        .sb-label { font-size: 9px; font-weight: 900; letter-spacing: 0.08em; color: #555; text-transform: uppercase; display: block; }
        .sb-val { font-size: 13px; font-weight: 900; color: var(--white); font-variant-numeric: tabular-nums; }
        .sb-dot { width: 14px; height: 14px; border: 1.5px solid #555; flex-shrink: 0; }
        .sb-col { display: flex; flex-direction: column; align-items: center; gap: 1px; }

        .fps-btn {
            width: 28px; height: 28px; background: #222; border: 1.5px solid #444;
            color: var(--white); font-size: 18px; font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; line-height: 1; transition: background 0.08s;
        }
        .fps-btn:active { background: #555; }

        #sb-fps-val { font-size: 13px; font-weight: 900; color: var(--white); min-width: 30px; text-align: center; font-variant-numeric: tabular-nums; }

        #sb-play-btn {
            flex: 0 0 82px; align-self: stretch; background: var(--act-c);
            border: none; border-left: 2px solid #900; color: var(--white);
            font-size: 13px; font-weight: 900; cursor: pointer;
            letter-spacing: 0.12em; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            transition: background 0.08s; flex-shrink: 0;
        }
        #sb-play-btn.playing { background: #333; border-left-color: #555; }
        #sb-play-btn:active { filter: brightness(0.8); }

        /* ── CANVAS ── */
        #canvas-wrapper {
            position: relative; z-index: 10;
            border: 2px solid #999; background: var(--white);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        }
        #primary-buffer { image-rendering: pixelated; display: block; touch-action: none; cursor: crosshair; }
        #net { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; transition: opacity 0.15s; image-rendering: pixelated; z-index: 20; }
        #net.on { opacity: 0.55; }

        /* ── FLOATING DRAW TOOLBAR ── */
        #draw-toolbar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 30;
            display: none; align-items: center; gap: 6px;
            background: rgba(0, 0, 0, 0.88); border: 2px solid #555;
            padding: 6px 10px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        }
        #draw-toolbar.on { display: flex; }

        .dt-btn {
            height: 36px; min-width: 48px; border: 2px solid #555; background: transparent;
            color: var(--white); font-size: 10px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; padding: 0 10px; transition: background 0.1s;
        }
        .dt-btn.on { background: var(--white); color: var(--black); border-color: var(--white); }

        .dt-swatch { width: 28px; height: 28px; border: 2px solid #666; cursor: pointer; flex-shrink: 0; transition: border-color 0.1s, transform 0.1s; }
        .dt-swatch.on { border: 3px solid var(--white); transform: scale(1.15); }
        .dt-div { width: 1px; height: 28px; background: #444; flex-shrink: 0; }

        /* ── TIMELINE ── */
        #tl-controls {
            display: flex; align-items: center; gap: 8px; padding: 6px 10px;
            border-bottom: 2px solid var(--black); background: var(--bg);
            flex-shrink: 0; scrollbar-width: none;
        }
        #tl-controls::-webkit-scrollbar { display: none; }

        .tl-ctrl-btn {
            background: var(--white); color: var(--black);
            border: 2px solid var(--black); padding: 5px 10px;
            font-size: 10px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; box-shadow: 2px 2px 0 var(--black);
            flex-shrink: 0; min-height: 32px;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .tl-ctrl-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--black); }

        #tl-strip {
            flex: 1; display: flex; gap: 6px; padding: 8px 10px;
            overflow-x: auto; align-items: center; scrollbar-width: none;
            overscroll-behavior-x: contain; min-height: 60px;
        }
        #tl-strip::-webkit-scrollbar { display: none; }

        .tl-frame {
            position: relative; flex: 0 0 68px; height: 44px;
            border: var(--bw) solid var(--black); cursor: grab;
            background: #1a1a1a; display: flex; align-items: center; justify-content: center;
            transition: border-color 0.1s, opacity 0.15s, transform 0.15s;
            user-select: none; -webkit-user-select: none;
        }
        .tl-frame.on { border-left: 5px solid var(--act-c); }
        .tl-frame.tl-selected { box-shadow: inset 0 0 0 3px var(--act-c), 0 0 10px rgba(230,0,0,0.8); border-color: var(--act-c); }
        .tl-frame.tl-clip-boundary { border-left: 3px solid var(--act-c); }
        .tl-frame.tl-drag-over { border-left: 4px solid #22c55e; transform: translateX(4px); }
        .tl-frame[draggable] { cursor: grab; }
        .tl-frame.tl-dragging { opacity: 0.3; transform: scale(0.9); }
        #tl-sync { font-size: 10px; font-weight: 900; padding: 1px 6px; border-radius: 3px; margin-left: 6px; transition: opacity 0.3s, background 0.3s; opacity: 0; }
        #tl-sync.show { opacity: 1; }
        #tl-sync.from-tunnel { background: #3b82f6; color: #fff; }
        #tl-sync.from-engine { background: #22c55e; color: #fff; }

        /* ── ZONE RULER ── */
        #tl-zone-ruler {
            flex: 0 0 16px; display: flex; overflow-x: auto;
            padding: 0 10px; gap: 0; align-items: stretch;
            border-bottom: 1px solid var(--black);
            scrollbar-width: none;
        }
        #tl-zone-ruler::-webkit-scrollbar { display: none; }
        .tl-zone-block {
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; font-weight: 900; color: #fff;
            text-transform: uppercase; letter-spacing: 0.06em;
            cursor: pointer; overflow: hidden; white-space: nowrap;
            min-width: 0; border-right: 1px solid rgba(0,0,0,0.3);
        }
        .tl-zone-block:last-child { border-right: none; }

        /* ── BEAT RULER ── */
        #tl-beat-ruler {
            flex: 0 0 12px; display: flex; overflow-x: auto;
            padding: 0 10px; gap: 0; align-items: stretch;
            background: #222; border-bottom: 1px solid var(--black);
            scrollbar-width: none;
        }
        #tl-beat-ruler::-webkit-scrollbar { display: none; }
        .tl-beat-cell {
            display: flex; align-items: center; justify-content: center;
            font-size: 7px; font-weight: 700; color: #888;
            border-right: 1px solid #333; min-width: 0;
        }
        .tl-beat-cell.on-beat {
            color: #fff; font-weight: 900;
            border-right: 1px solid #555;
        }

        /* ── LOOP MARKERS ── */
        .tl-frame.tl-loop-in { border-left: 3px solid #22c55e !important; }
        .tl-frame.tl-loop-out { border-right: 3px solid #ef4444 !important; }
        .tl-frame.tl-in-loop { background: #1a2a1a; }

        /* ── TRANSPORT DIVIDERS ── */
        .tl-divider { width: 1px; height: 18px; background: #444; flex-shrink: 0; }

        .tl-thumb { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; position: absolute; inset: 0; z-index: 1; opacity: 0.5; }
        .tl-num { position: relative; z-index: 2; color: var(--white); font-size: 14px; font-weight: 900; text-shadow: 1px 1px 0 var(--black); pointer-events: none; }
        .tl-badge { position: absolute; bottom: 0; right: 0; background: var(--white); color: var(--black); border-top: 1px solid var(--black); border-left: 1px solid var(--black); font-size: 8px; padding: 1px 3px; font-weight: 900; z-index: 3; pointer-events: none; }

        /* ── TAB BAR ── */
        .tab-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: var(--tab-h); font-size: 9px; font-weight: 900; text-transform: uppercase;
            color: var(--black); cursor: pointer; background: var(--white); border: none;
            border-right: 2px solid var(--black); position: relative;
            letter-spacing: 0.05em; transition: background 0.1s;
        }
        .tab-btn:last-child { border-right: none; }
        .tab-letter { font-size: 20px; line-height: 1; margin-bottom: 2px; font-weight: 900; }
        .tab-btn.on-a { background: var(--act-a); color: var(--white); }
        .tab-btn.on-b { background: var(--act-b); color: var(--black); }
        .tab-btn.on-c { background: var(--act-c); color: var(--white); }
        .tab-btn.on-d { background: var(--black); color: var(--white); }
        .tab-btn.on-s { background: var(--act-s); color: var(--white); }

        .tab-badge { position: absolute; top: 8px; right: 10px; width: 10px; height: 10px; border: 1.5px solid currentColor; }

        /* ── BOTTOM SHEETS ── */
        #sheet-backdrop { position: fixed; inset: 0; background: rgba(0, 0, 0, 0); pointer-events: none; z-index: 70; transition: background 0.25s; }
        #sheet-backdrop.on { background: rgba(0, 0, 0, 0.6); pointer-events: all; }
        .sheet {
            position: fixed; left: 0; right: 0; bottom: calc(var(--tab-h) + var(--safe-b));
            max-height: 80vh; background: var(--white);
            border-top: var(--bw) solid var(--black); border-left: var(--bw) solid var(--black);
            border-right: var(--bw) solid var(--black); z-index: 80;
            display: flex; flex-direction: column;
            transform: translateY(calc(100% + var(--tab-h) + var(--safe-b)));
            transition: transform 0.32s cubic-bezier(0.25, 1.0, 0.5, 1), visibility 0s linear 0.32s;
            visibility: hidden; overflow: hidden; will-change: transform;
        }
        .sheet.on { transform: translateY(0); visibility: visible; transition: transform 0.32s cubic-bezier(0.25, 1.0, 0.5, 1), visibility 0s linear 0s; }
        .sheet-handle { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 8px; background: var(--bg); border-bottom: 2px solid var(--black); flex-shrink: 0; }
        .sheet-title { font-size: 11px; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; }
        .sheet-close { font-size: 20px; font-weight: 900; background: none; border: none; cursor: pointer; line-height: 1; color: var(--black); }
        .sheet-body { overflow-y: auto; flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 10px; overscroll-behavior: contain; }

        /* ── SHEET BUTTONS ── */
        .sh-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 14px 16px; font-weight: 900; text-transform: uppercase;
            font-size: 12px; background: var(--white); border: var(--bw) solid var(--black);
            color: var(--black); cursor: pointer; letter-spacing: 0.1em;
            width: 100%; flex-shrink: 0; box-shadow: 3px 3px 0 var(--black);
            transition: transform 0.05s, box-shadow 0.05s; min-height: 52px;
        }
        .sh-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--black); }
        .sh-btn.primary { background: var(--black); color: var(--white); }
        .sh-row { display: flex; gap: 8px; }
        .sh-row .sh-btn { flex: 1; }
        .sh-label { font-size: 10px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: #666; margin-bottom: 4px; }

        /* ── TOAST ── */
        #hud-toast {
            position: fixed; top: calc(var(--status-h) + 10px); left: 50%; transform: translateX(-50%);
            background: var(--white); color: var(--black); font-weight: 900; font-size: 13px;
            padding: 10px 18px; opacity: 0; pointer-events: none; z-index: 9999;
            text-transform: uppercase; border: var(--bw) solid var(--black);
            transition: opacity 0.12s; letter-spacing: 0.1em;
            box-shadow: 4px 4px 0 var(--black); white-space: nowrap;
        }
        #hud-toast.on { opacity: 1; }

        /* ── LOCK SCREEN ── */
        #lock-screen {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.92); z-index: 9000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.15s;
        }
        #lock-screen.on { opacity: 1; pointer-events: all; }
        #lock-canvas { image-rendering: auto; }
        #lock-msg { font-size: 13px; font-weight: 900; letter-spacing: 0.2em; color: var(--white); text-transform: uppercase; margin-top: 16px; }
        #lock-counter { font-size: 28px; font-weight: 900; color: var(--act-c); margin-top: 8px; }

        /* ── SPEED SLIDER ── */
        #speed-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1 1 0%; min-width: 80px; max-width: 160px; }
        #speed-label { font-size: 8px; font-weight: 900; color: #666; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
        #speed-slider {
            -webkit-appearance: none; appearance: none; width: 100%; height: 20px;
            background: transparent; border: 2px solid var(--black); outline: none;
            flex-shrink: 0; touch-action: none; cursor: pointer;
        }
        #speed-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; background: var(--black); border: none; cursor: pointer; }
        #speed-slider::-webkit-slider-runnable-track { height: 20px; }

        /* ── ATO EMBEDDED CONTROLS ── */
        #ato-badge {
            position: absolute; top: 10px; left: 10px; z-index: 30;
            border: 3px solid var(--black); background: var(--white);
            padding: 8px 10px; font-weight: 900; text-transform: uppercase;
            box-shadow: 4px 4px 0 #000; pointer-events: none; min-width: 180px;
        }
        #ato-badge .big { font-size: 16px; line-height: 16px; color: #000; }
        #ato-badge .meta { font-size: 9px; margin-top: 4px; color: #666; }

        #ato-dock {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            z-index: 30; display: flex; border: 2px solid var(--black);
            background: var(--white); pointer-events: auto;
        }
        #ato-dock button {
            border: 0; border-right: 1px solid var(--black); height: 36px;
            font-size: 11px; background: transparent; color: var(--black);
            font-weight: 900; text-transform: uppercase; cursor: pointer; padding: 0 12px;
        }
        #ato-dock button:last-child { border-right: 0; }
        #ato-dock button.on { background: var(--black); color: #fff; }

        #ato-status {
            position: absolute; bottom: 10px; right: 10px; z-index: 30;
            font-weight: 900; text-transform: uppercase; color: #3b82f6;
            font-size: 11px; background: rgba(255,255,255,0.9);
            padding: 4px 8px; border: 1px solid var(--black);
        }

        /* ── INK GRID ── */
        .ink-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .ink-swatch {
            width: 48px; height: 48px; border: var(--bw) solid var(--black);
            cursor: pointer; box-shadow: 3px 3px 0 var(--black);
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .ink-swatch.on { outline: 3px solid var(--black); outline-offset: 3px; transform: translate(3px, 3px); box-shadow: 0 0 0 var(--black); }

        input[type="range"] {
            -webkit-appearance: none; width: 100%; background: transparent;
            border: 2px solid var(--black); height: 28px; outline: none; flex-shrink: 0;
        }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; background: var(--black); border: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-runnable-track { height: 28px; }

        details summary {
            font-size: 10px; font-weight: 900; letter-spacing: 0.1em;
            color: #999; cursor: pointer; padding: 4px 0; text-transform: uppercase;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 767px) {
            /* Canvas zone GROWS to fill available space — no fixed height */
            #canvas-zone { flex: 1 1 0%; min-height: 100px; }
            #ato-zone { flex: 1 1 0%; min-height: 100px; }

            /* Timeline stays COMPACT — fixed auto height, never expands */
            #timeline-zone { flex: 0 0 auto; max-height: 90px; min-height: 0; overflow: hidden; }

            /* Compact timeline controls — single dense row */
            #tl-controls { overflow-x: auto; flex-wrap: nowrap; padding: 3px 6px; gap: 4px; min-height: 0; border-bottom-width: 1px; }
            .tl-ctrl-btn { padding: 3px 6px; font-size: 8px; min-height: 26px; box-shadow: 1px 1px 0 var(--black); }
            #speed-wrap { max-width: 100px; min-width: 60px; }
            #speed-label { font-size: 7px; }
            #speed-slider { height: 16px; }
            #speed-slider::-webkit-slider-thumb { height: 16px; width: 16px; }
            #speed-slider::-webkit-slider-runnable-track { height: 16px; }

            /* Compact frame thumbnails */
            .tl-frame { flex: 0 0 58px; height: 36px; }
            .tl-num { font-size: 11px; }
            .tl-badge { font-size: 7px; padding: 0 2px; }
            #tl-strip { gap: 4px; padding: 4px 6px; min-height: 0; align-items: center; }

            /* Compact status bar */
            .sb-group { padding: 0 6px; gap: 3px; }
            .sb-label { font-size: 8px; }
            .sb-val { font-size: 11px; }
            .fps-btn { width: 24px; height: 24px; font-size: 16px; }
            #sb-fps-val { font-size: 11px; min-width: 22px; }
            #sb-play-btn { flex: 0 0 60px; font-size: 11px; letter-spacing: 0.08em; }

            /* Compact tab bar */
            .tab-btn { font-size: 8px; letter-spacing: 0.03em; }
            .tab-letter { font-size: 16px; margin-bottom: 1px; }
            .tab-badge { top: 4px; right: 6px; width: 8px; height: 8px; }

            /* Readout compaction */
            #tl-frame-readout { font-size: 10px; }
        }

        /* ── VERY SHORT VIEWPORTS (inside harness iframe or small phones) ── */
        @media (max-width: 767px) and (max-height: 500px) {
            #status-bar { display: none; }
            #timeline-zone { max-height: 70px; }
            .tl-frame { flex: 0 0 48px; height: 30px; }
            #tl-strip { padding: 3px 4px; gap: 3px; }
            #tl-controls { padding: 2px 4px; gap: 3px; }
            .tl-ctrl-btn { padding: 2px 4px; font-size: 7px; min-height: 22px; }
        }

        @media (min-width: 768px) {
            #app { flex-direction: row; }
            #tab-bar { flex: 0 0 80px; flex-direction: column; border-top: none; border-right: var(--bw) solid var(--black); order: -1; }
            .tab-btn { flex: 1; height: auto; border-right: none; border-bottom: 2px solid var(--black); }
            .tab-btn:last-child { border-bottom: none; }
            #status-bar { display: none; }
            .sheet { left: 80px; bottom: 0; max-height: 100vh; width: 380px; }
            #canvas-zone { flex: 1 1 0%; }
            #ato-zone { flex: 1 1 0%; }
            #timeline-zone { flex: 0 0 var(--tl-h); }
            #main-col { flex: 1 1 0%; display: flex; flex-direction: column; min-width: 0; }
        }
    </style>
</head>

    <script>
    // ══════════════════════════════════════════════════
    // ██ ICARO-ATO: UNIFIED WORLDTEXT INSTRUMENT
    // ██ Converged from icaro-pro.html + WIDE/c.html
    // ██ Theory: Same-Worldness via shared state bridge
    // ══════════════════════════════════════════════════

    'use strict';

    // ── CONSTANTS ──
    const W = 640, H = 480, G_ROWS = 96, G_COLS = 128, B_SZ = 5;
    let BASE_FPS = 12;

    const INKS = [
        { id: 0, hex: '#ffffff', rgb: [0, 0, 0, 0] },
        { id: 1, hex: '#dddddd', rgb: [0, 0, 0, 40] },
        { id: 2, hex: '#bbbbbb', rgb: [0, 0, 0, 80] },
        { id: 3, hex: '#999999', rgb: [0, 0, 0, 120] },
        { id: 4, hex: '#777777', rgb: [0, 0, 0, 160] },
        { id: 5, hex: '#555555', rgb: [0, 0, 0, 200] },
        { id: 6, hex: '#333333', rgb: [0, 0, 0, 230] },
        { id: 7, hex: '#000000', rgb: [0, 0, 0, 255] }
    ];

    // Pre-rendered dot stamps
    const DOT_STAMPS = [];
    function buildDotStamps() {
        const maxR = B_SZ * 0.45;
        for (let v = 0; v < 8; v++) {
            const c = document.createElement('canvas'); c.width = B_SZ; c.height = B_SZ;
            if (v > 0) {
                const dc = c.getContext('2d');
                const r = maxR * (v / 7);
                dc.fillStyle = '#000000'; dc.beginPath();
                dc.arc(B_SZ / 2, B_SZ / 2, Math.max(0.4, r), 0, Math.PI * 2); dc.fill();
            }
            DOT_STAMPS[v] = c;
        }
    }
    function alphaToLevel(a) {
        if (a < 16) return 0; if (a < 55) return 1; if (a < 95) return 2;
        if (a < 135) return 3; if (a < 175) return 4; if (a < 210) return 5;
        if (a < 240) return 6; return 7;
    }

    // ── UNIFIED STATE ──
    let state = {
        frames: [], cur: 0, playing: false,
        tool: 'pen', color: 7, size: 5, grid: false,
        dragging: false, p0: [0, 0], p1: [0, 0],
        activeNav: null, audioSourceBlob: null, audioDuration: 0,
        selStart: -1, selEnd: -1, selMode: false,
        // ── ZONES / BEATS / LOOP ──
        zones: [],       // [{start: 0, name: 'A', color: '#3b82f6'}, ...]
        loopIn: -1,      // frame index, -1 = unset
        loopOut: -1,     // frame index, -1 = unset
        beatSize: 4      // frames per beat
    };

    // Zone color palette (cyclical)
    const ZONE_COLORS = ['#3b82f6','#f59e0b','#22c55e','#a855f7','#ef4444','#06b6d4'];

    function getZoneAt(frameIdx) {
        if (!state.zones.length) return null;
        for (let i = state.zones.length - 1; i >= 0; i--) {
            if (frameIdx >= state.zones[i].start) return state.zones[i];
        }
        return state.zones[0];
    }
    function getZoneIndex(frameIdx) {
        if (!state.zones.length) return 0;
        for (let i = state.zones.length - 1; i >= 0; i--) {
            if (frameIdx >= state.zones[i].start) return i;
        }
        return 0;
    }
    function ensureDefaultZone() {
        if (!state.zones.length && state.frames.length) {
            state.zones = [{ start: 0, name: 'A', color: ZONE_COLORS[0] }];
        }
    }

    // ── SAFE ACCESSORS (Error Elimination) ──
    // These make entire error classes structurally impossible.

    // safeFrame(idx): Returns a valid frame object, NEVER null/undefined.
    // Clamps idx into [0, length-1]. If no frames exist, returns a sentinel.
    const _SENTINEL_FRAME = Object.freeze({ src: null, scriptLayer: null, handLayer: null, _v: 0, _sentinel: true });
    function safeFrame(idx) {
        if (state.frames.length === 0) return _SENTINEL_FRAME;
        const i = Math.max(0, Math.min(state.frames.length - 1, idx || 0));
        return state.frames[i] || _SENTINEL_FRAME;
    }

    // curFrame(): Current frame, always valid.
    function curFrame() {
        return safeFrame(state.cur);
    }

    // clampCursor(): Ensures state.cur is always valid after any mutation.
    function clampCursor() {
        if (state.frames.length === 0) { state.cur = 0; return; }
        state.cur = Math.max(0, Math.min(state.frames.length - 1, state.cur));
    }

    // ── ATO STATE (Sequence Engine) ──
    const ATO_VIEWS = ['BARREL', 'INSIDE', 'OUTSIDE', 'SIDE', 'BENCH'];
    const ATO_NAMES = ['POSSIBLE', 'PLAUSIBLE', 'PROBABLE', 'PREFERRED'];
    const ATO_SHORT = ['P', 'L', 'B', 'F'];
    const ATO_TRACK_COLORS = ['#ec4899', '#3b82f6', '#22c55e', '#f59e0b'];
    const ATO_STYLES = [
        { dash: [1, 6], hatch: 0, color: ATO_TRACK_COLORS[0] },
        { dash: [8, 6], hatch: 1, color: ATO_TRACK_COLORS[1] },
        { dash: [], hatch: 2, color: ATO_TRACK_COLORS[2] },
        { dash: [12, 4, 2, 4], hatch: 3, color: ATO_TRACK_COLORS[3] }
    ];
    const ATO_SNAP = 60, ATO_R = 150, ATO_FAR = 7200;

    let atoNextId = 1;
    const atoClips = [];  // Mutable layer for ATO-specific properties (used by generate-default)
    const atoRoutes = [];

    // ── FRAME-INDEXED THUMBNAIL CACHE ──
    // Key: frameIndex → { canvas, version }
    // Invalidated when frame._v changes
    const _thumbCache = new Map();

    function getThumb(frameIndex) {
        if (frameIndex < 0 || frameIndex >= state.frames.length) return null;
        const f = state.frames[frameIndex];
        const v = f._v || 0;
        const cached = _thumbCache.get(frameIndex);
        if (cached && cached.version === v) return cached.canvas;
        const c = document.createElement('canvas');
        c.width = W; c.height = H;  // Full Icaro resolution — no downscale loss in cache
        renderTunnelThumb(f, c);
        _thumbCache.set(frameIndex, { canvas: c, version: v });
        return c;
    }

    function invalidateThumb(frameIndex) {
        _thumbCache.delete(frameIndex);
    }

    // ── DERIVE CLIPS FROM FRAME BOUNDARIES ──
    // Source of truth: state.frames[]
    // EVERY FRAME becomes its own clip/segment on the tunnel wall
    // 181 frames = 181 tunnel faces, each showing its frame content
    let _derivedClipsCache = null;
    let _derivedClipsCacheKey = '';
    let _tunnelPlayOrder = null; // Set by CLIP_ARRANGE from tunnel
    let _tunnelArrangement = null; // Full spatial data from tunnel

    function deriveClips() {
        // If tunnel has sent arrangement, use it
        if (_tunnelArrangement && _tunnelArrangement.length > 0) {
            const key = JSON.stringify(_tunnelPlayOrder);
            if (_derivedClipsCache && _derivedClipsCacheKey === key) return _derivedClipsCache;
            const clips = _tunnelArrangement.map(a => ({
                id: 'F' + (a.frameIndex + 1),
                frameStart: a.frameIndex,
                frameEnd: a.frameIndex,
                vStart: a.vStart,
                vDur: a.vDur,
                vTrack: a.track,
                vLift: a.lift || 0,
                track: a.track,
                rot: a.rot || 0,
                lift: a.lift || 0,
                isBoundary: false,
                fullTube: true
            }));
            _derivedClipsCache = clips;
            _derivedClipsCacheKey = key;
            return clips;
        }
        // Fallback: linear order (no tunnel arrangement received yet)
        const key = state.frames.length + '';
        if (_derivedClipsCache && _derivedClipsCacheKey === key) return _derivedClipsCache;

        const clips = [];
        for (let i = 0; i < state.frames.length; i++) {
            clips.push({
                id: 'F' + (i + 1),
                frameStart: i,
                frameEnd: i,
                vStart: i * ATO_SNAP,
                vDur: ATO_SNAP,
                vTrack: 2,
                vLift: 0,
                track: 2,
                rot: 0,
                lift: 0,

    // ── DOT-MATRIX RENDERER ──

    // ── EXTRACT DOT GRID from frame (128×96 Uint8Array of 0-7 levels) ──
    // Priority: handLayer > scriptLayer > srcGrid (ripped video)
    function extractDotGrid(f) {
        let srcGrid = null;
        if (f.src) {
            const fv = f._v !== undefined ? f._v : -1;
            const srcReady = (f.src.complete !== false);
            if (f._srcGrid && f._srcGridVersion === fv && srcReady) {

    // ── RENDER DOT GRID to canvas (shared final step) ──
    function renderDotGrid(grid, targetCanvas) {
        const tc = targetCanvas.getContext('2d');

    // ══════════════════════════════════════════════════
    // ██ TRACK COMPOSITING — ADDITIVE
    // ██ POSSIBLE=0.25  PLAUSIBLE=0.50  PROBABLE=0.75  PREFERRED=1.0
    // ██ LIFT = per-clip weight multiplier (volume knob)
    // ██ ROLL = per-clip contrast curve (punch or flatten)
    // ██ Overlapping dots ADD. Convergence across tracks = max density.
    // ══════════════════════════════════════════════════
    const TRACK_WEIGHT = [0.25, 0.50, 0.75, 1.0]; // track 0→3

    // Apply LIFT (weight) and ROLL (contrast) to a dot grid

    function applyClipEffects(grid, clip) {

                v = Math.max(0, Math.min(7, v));
            }
            out[i] = v * weight;

    }

    function compositeAtZ(z) {
        if (!_tunnelArrangement || _tunnelArrangement.length < state.frames.length * 0.5) {
            // No arrangement — single frame render
            const f = state.frames[state.cur]; if (!f) return;
            renderDotFrame(f, compBuf);
            ctx.clearRect(0, 0, W, H); ctx.drawImage(compBuf, 0, 0);
            return;
        }

        // Find all clips at this Z position
        const active = [];
        for (const a of _tunnelArrangement) {
            if (z >= a.vStart && z < a.vStart + a.vDur) {
                if (a.frameIndex >= 0 && a.frameIndex < state.frames.length) {
                    active.push(a);
                }
            }
        }

        if (active.length === 0) {
            // Gap — hold current frame (already on screen)
            return;
        }

        if (active.length === 1) {
            // Single clip — apply LIFT/ROLL effects
            const clip = active[0];
            state.cur = clip.frameIndex;
            const hasEffects = (clip.lift && clip.lift !== 0) || (clip.rot && clip.rot !== 0);
            if (!hasEffects) {

                renderDotFrame(state.frames[state.cur], compBuf);

                for (let i = 0; i < grid.length; i++) {
                    finalGrid[i] = Math.min(7, Math.max(0, Math.round(effected[i])));

                renderDotGrid(finalGrid, compBuf);

            return;

        for (const clip of active) {

            if (!f) continue;
            const grid = extractDotGrid(f);

            for (let i = 0; i < G_ROWS * G_COLS; i++) {

            }
        }

        // Clamp to 0-7
        const finalGrid = new Uint8Array(G_ROWS * G_COLS);
        for (let i = 0; i < G_ROWS * G_COLS; i++) {
            finalGrid[i] = Math.min(7, Math.max(0, Math.round(composite[i])));
        }

        state.cur = active[active.length - 1].frameIndex;
        renderDotGrid(finalGrid, compBuf);
        ctx.clearRect(0, 0, W, H); ctx.drawImage(compBuf, 0, 0);
    }

    function renderOutput() {
        const f = state.frames[state.cur]; if (!f) return;

    // High-contrast thumbnail for ATO tunnel clip faces

        if (_ATOBUS_ACTIVE && !_drawPatchTimer) {
            _drawPatchTimer = setTimeout(() => {
                _drawPatchTimer = null;
                _gridCache.delete(state.cur); // invalidate cached grid
                _atoBusEmitPatch(state.cur);
            }, 100);
        }
    }

    // ── TOOLS ──
    function bindTool(id) {
        playTick(); state.tool = id;
        ['pen', 'rect', 'erase'].forEach(t => {
            const b1 = document.getElementById('tool-' + t);
            const b2 = document.getElementById('dtt-' + t);

            if (b1) b1.classList.toggle('on', on);
            if (b2) b2.classList.toggle('on', on);
        });
        updateStatusBar();
    }

    function wipeCurrentInk() {
        if (!state.frames.length) return; playClack();
        ensureLayer(state.frames[state.cur], 'handLayer').fill(0);
        renderOutput(); updateThumb(state.cur); fireToast('INK WIPED');
    }

    function buildInkReservoir() {
        ['c-ink-swatches', 'dt-swatches'].forEach(boxId => {
            const box = document.getElementById(boxId); if (!box) return;
            box.innerHTML = '';
            INKS.slice(1).forEach(c => {
                const s = document.createElement('div');

                    document.querySelectorAll('.ink-swatch, .dt-swatch').forEach(el => el.classList.remove('on'));
                    document.querySelectorAll('.ink-swatch, .dt-swatch').forEach(el => { if (el.style.background === c.hex || el.style.backgroundColor === c.hex) el.classList.add('on'); });

    function setSize(val) { state.size = parseInt(val); playMicroTick(); }
    function adjustFPS(delta) { BASE_FPS = Math.max(1, Math.min(30, BASE_FPS + delta)); playMicroTick(); const sl = document.getElementById('speed-slider'); if (sl) sl.value = BASE_FPS; updateStatusBar(); }
    function onSpeedSlider(val) { BASE_FPS = parseInt(val); const lbl = document.getElementById('speed-label'); if (lbl) lbl.textContent = 'SPD · ' + val; updateStatusBar(); }

    function updateStatusBar() {
        const ink = INKS[state.color];
        document.getElementById('sb-frame').textContent = state.frames.length ? `${String(state.cur + 1).padStart(2, '0')}/${String(state.frames.length).padStart(2, '0')}` : '00/00';
        const modeEl = document.getElementById('sb-mode');
        if (modeEl) modeEl.textContent = state.activeNav === 'S' ? 'ATO' : 'ICARO';
        const dot = document.getElementById('sb-color');
        if (dot) dot.style.background = ink ? ink.hex : '#000';
        const fpsEl = document.getElementById('sb-fps-val');
        if (fpsEl) fpsEl.textContent = BASE_FPS;
        const sl = document.getElementById('speed-slider');
        if (sl) sl.value = BASE_FPS;
        const slLbl = document.getElementById('speed-label');

        updateMemGauge();
    }

    function updateMemGauge() {
        const totalBytes = state.frames.length * W * H * 4;
        const mb = totalBytes / (1024 * 1024);
        const pct = Math.min(100, (mb / 1024) * 100);
        const bar = document.getElementById('mem-bar');
        const lbl = document.getElementById('mem-label');
        if (bar) { bar.style.width = pct + '%'; bar.style.background = pct > 80 ? 'var(--act-c)' : 'var(--act-a)'; }
        if (lbl) lbl.textContent = mb.toFixed(0) + ' MB';
        const ss = document.getElementById('sys-status');
        if (ss) ss.textContent = state.frames.length + ' FRAMES';
    }

    // ── GRID / OVERLAY ──
    let _onionMode = false;
    function triggerGrid() {
        playTick();
        if (!state.grid && !_onionMode) {
            state.grid = true; _onionMode = false;
            document.getElementById('lbl-grid').textContent = 'GRID: ON';
            document.getElementById('net').classList.add('on');
            drawCoordGrid();
        } else if (state.grid && !_onionMode) {
            state.grid = false; _onionMode = true;
            document.getElementById('lbl-grid').textContent = 'ONION: ON';
            document.getElementById('net').classList.add('on');
        } else {
            state.grid = false; _onionMode = false;
            document.getElementById('lbl-grid').textContent = 'OVERLAY: OFF';
            document.getElementById('net').classList.remove('on');
        }
    }
    function drawCoordGrid() {
        const net = document.getElementById('net'); if (!net) return;
        net.width = W; net.height = H;
        const gc = net.getContext('2d'); gc.clearRect(0, 0, W, H);
        gc.strokeStyle = 'rgba(0,0,0,0.08)'; gc.lineWidth = 0.5;
        for (let gx = 0; gx <= G_COLS; gx++) { const px = gx * B_SZ; gc.beginPath(); gc.moveTo(px, 0); gc.lineTo(px, H); gc.stroke(); }
        for (let gy = 0; gy <= G_ROWS; gy++) { const py = gy * B_SZ; gc.beginPath(); gc.moveTo(0, py); gc.lineTo(W, py); gc.stroke(); }
    }

    // ── TIMELINE ──
    // STRUCTURAL rebuild — only call when frames are added/deleted/reordered
    // ── SYNC STATUS FLASH ──
    let _syncTimer = null;
    function flashSync(direction) {
        const el = document.getElementById('tl-sync');
        if (!el) return;
        clearTimeout(_syncTimer);
        el.textContent = direction === 'up' ? 'TUNNEL' : 'STRIP';
        el.className = 'show ' + (direction === 'up' ? 'from-tunnel' : 'from-engine');
        _syncTimer = setTimeout(() => { el.className = ''; }, 1200);
    }

    // ── EMIT STRIP REORDER TO TUNNEL ──
    function _emitStripReorder(newOrder) {
        if (!_ATOBUS_ACTIVE) return;
        // Build arrangement from current order with default spacing
        const SNAP = 120; // match tunnel's SNAP * 2
        const arrangement = newOrder.map((fi, pos) => ({
            frameIndex: fi,
            vStart: pos * SNAP,
            vDur: SNAP,
            track: fi % 4,
            lift: 0,
            rot: 0
        }));
        _tunnelPlayOrder = newOrder;
        _tunnelArrangement = arrangement;
        _derivedClipsCache = null;
        _derivedClipsCacheKey = '';
        window.parent.postMessage({
            type: 'STRIP_REORDER',
            _origin: 'engine',
            order: newOrder,
            arrangement: arrangement
        }, '*');
        flashSync('down');
    }

    // ══════════════════════════════════════════════════
    // ██ ZONES / BEATS / LOOP CONTROLS
    // ══════════════════════════════════════════════════

    function markZone() {
        playTick();
        ensureDefaultZone();
        const cur = state.cur;
        // Check if there's already a zone starting at this frame
        const existing = state.zones.findIndex(z => z.start === cur);
        if (existing > 0) {
            // Remove it (can't remove zone at frame 0)
            state.zones.splice(existing, 1);
            fireToast('ZONE REMOVED');
        } else if (cur > 0) {
            // Add new zone boundary
            const idx = state.zones.length;
            const name = String.fromCharCode(65 + (idx % 26)); // A, B, C...
            const color = ZONE_COLORS[idx % ZONE_COLORS.length];
            state.zones.push({ start: cur, name: name, color: color });
            state.zones.sort((a, b) => a.start - b.start);
            fireToast('ZONE ' + name);
        }
        rebuildTrack();
    }

    function jumpZone(dir) {
        playTick();
        ensureDefaultZone();
        if (!state.zones.length) return;
        const curZone = getZoneIndex(state.cur);
        let target;
        if (dir < 0) {
            // Jump to start of current zone, or previous zone
            if (state.cur > state.zones[curZone].start) {
                target = state.zones[curZone].start;
            } else {
                target = curZone > 0 ? state.zones[curZone - 1].start : 0;
            }
        } else {
            // Jump to start of next zone, or end
            target = curZone < state.zones.length - 1
                ? state.zones[curZone + 1].start
                : state.frames.length - 1;
        }
        state.cur = Math.max(0, Math.min(state.frames.length - 1, target));
        renderOutput(); highlightFrame(state.cur); updateStatusBar();
        syncCameraFromCursor();
    }

    function setLoopIn() {
        playTick();
        state.loopIn = state.cur;
        if (state.loopOut >= 0 && state.loopOut <= state.loopIn) state.loopOut = -1;
        const btn = document.getElementById('btn-loop-in');
        if (btn) btn.style.background = '#22c55e';
        fireToast('LOOP IN: ' + (state.cur + 1));
        rebuildTrack();
    }
    function setLoopOut() {
        playTick();
        state.loopOut = state.cur;
        if (state.loopIn >= 0 && state.loopIn >= state.loopOut) state.loopIn = -1;
        const btn = document.getElementById('btn-loop-out');
        if (btn) btn.style.background = '#ef4444';
        fireToast('LOOP OUT: ' + (state.cur + 1));
        rebuildTrack();
    }
    function clearLoop() {
        playTick();
        state.loopIn = -1; state.loopOut = -1;
        const bi = document.getElementById('btn-loop-in');
        const bo = document.getElementById('btn-loop-out');
        if (bi) bi.style.background = '';
        if (bo) bo.style.background = '';
        fireToast('LOOP CLEARED');
        rebuildTrack();
    }

    function buildZoneRuler() {
        const ruler = document.getElementById('tl-zone-ruler'); if (!ruler) return;
        ruler.innerHTML = '';
        ensureDefaultZone();
        const total = state.frames.length;
        if (!total) return;
        const frameW = 74; // 68px frame + 6px gap
        for (let zi = 0; zi < state.zones.length; zi++) {
            const zone = state.zones[zi];
            const nextStart = zi < state.zones.length - 1 ? state.zones[zi + 1].start : total;
            const span = nextStart - zone.start;
            const block = document.createElement('div');
            block.className = 'tl-zone-block';
            block.style.flex = '0 0 ' + (span * frameW) + 'px';
            block.style.background = zone.color;
            block.textContent = zone.name;
            block.title = 'Zone ' + zone.name + ' (' + zone.start + '-' + (nextStart - 1) + ')';
            block.onclick = () => {
                const newName = prompt('Zone name:', zone.name);
                if (newName && newName.trim()) { zone.name = newName.trim().toUpperCase(); buildZoneRuler(); }
            };
            ruler.appendChild(block);
        }
    }

    function buildBeatRuler() {
        const ruler = document.getElementById('tl-beat-ruler'); if (!ruler) return;
        ruler.innerHTML = '';
        const total = state.frames.length;
        if (!total) return;
        const frameW = 74; // 68px frame + 6px gap
        let beatNum = 1;
        for (let i = 0; i < total; i++) {
            const cell = document.createElement('div');
            cell.className = 'tl-beat-cell';
            cell.style.flex = '0 0 ' + frameW + 'px';
            if (i % state.beatSize === 0) {
                cell.classList.add('on-beat');
                cell.textContent = 'B' + beatNum;
                beatNum++;
            }
            ruler.appendChild(cell);
        }
    }

    function rebuildTrack() {
        const trk = document.getElementById('tl-strip'); trk.innerHTML = '';
        // Use tunnel arrangement order if it covers most frames, else linear
        let order;
        if (_tunnelArrangement && _tunnelArrangement.length >= state.frames.length * 0.5) {
            // Arrangement covers enough frames — use tunnel order
            order = _tunnelArrangement.map(a => a.frameIndex);
            // Append any frames NOT in arrangement (newly added, not yet synced)
            const inArrangement = new Set(order);
            for (let i = 0; i < state.frames.length; i++) {
                if (!inArrangement.has(i)) order.push(i);
            }
        } else {
            // No arrangement or too sparse — linear order
            order = state.frames.map((_, i) => i);
        }

        let _dragIdx = null;

        for (let pos = 0; pos < order.length; pos++) {
            const i = order[pos];
            if (i < 0 || i >= state.frames.length) continue;
            const f = state.frames[i];
            const w = document.createElement('div');
            let cls = 'tl-frame';
            if (i === state.cur) cls += ' on';
            if (f.clipBoundary) cls += ' tl-clip-boundary';
            // Loop markers
            if (i === state.loopIn) cls += ' tl-loop-in';
            if (i === state.loopOut) cls += ' tl-loop-out';
            if (state.loopIn >= 0 && state.loopOut >= 0 && i >= state.loopIn && i <= state.loopOut) cls += ' tl-in-loop';
            w.className = cls;
            w.dataset.idx = i;
            w.draggable = true;

            // ── CLICK ──
            w.onclick = () => {
                if (state.playing) return;
                playTick(); state.cur = i; highlightFrame(i); renderOutput(); updateStatusBar();
                syncCameraFromCursor();
            };

            // ── DRAG-TO-REORDER ──
            w.addEventListener('dragstart', (e) => {
                _dragIdx = i;
                w.classList.add('tl-dragging');
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', i);
            });
            w.addEventListener('dragend', () => {
                w.classList.remove('tl-dragging');
                trk.querySelectorAll('.tl-drag-over').forEach(el => el.classList.remove('tl-drag-over'));
                _dragIdx = null;
            });
            w.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                // Visual indicator
                trk.querySelectorAll('.tl-drag-over').forEach(el => el.classList.remove('tl-drag-over'));
                w.classList.add('tl-drag-over');
            });
            w.addEventListener('dragleave', () => {
                w.classList.remove('tl-drag-over');
            });
            w.addEventListener('drop', (e) => {
                e.preventDefault();
                w.classList.remove('tl-drag-over');
                const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                const toIdx = i;
                if (fromIdx === toIdx) return;
                // Compute new order: remove fromIdx from current position, insert before toIdx
                const curOrder = Array.from(trk.querySelectorAll('.tl-frame')).map(el => parseInt(el.dataset.idx));
                const fromPos = curOrder.indexOf(fromIdx);
                if (fromPos < 0) return;
                curOrder.splice(fromPos, 1);
                const toPos = curOrder.indexOf(toIdx);
                curOrder.splice(toPos, 0, fromIdx);
                // Apply new order
                _emitStripReorder(curOrder);
                rebuildTrack();
                highlightFrame(state.cur);
                playTick();
            });

            const TW = 136, TH = 96;
            const c = document.createElement('canvas'); c.className = 'tl-thumb'; c.width = TW; c.height = TH;
            renderThumb(f, c, TW, TH);
            w.appendChild(c);
            // Show position in arrangement + original frame number
            const hasTunnelOrder = _tunnelArrangement && _tunnelArrangement.length >= state.frames.length * 0.5;
            const label = hasTunnelOrder ? (pos + 1) : (i + 1);
            const n = document.createElement('div'); n.className = 'tl-num'; n.textContent = label; w.appendChild(n);
            const b = document.createElement('div'); b.className = 'tl-badge'; b.textContent = (i + 1); w.appendChild(b);
            trk.appendChild(w);
            if (i === state.cur) w.scrollIntoView({ inline: 'center', block: 'nearest' });
        }
        updateStatusBar();
        // Build rulers (synced to strip)
        buildZoneRuler();
        buildBeatRuler();
        // Sync scroll: rulers follow strip scroll position
        const strip = document.getElementById('tl-strip');
        if (strip && !strip._rulerSyncBound) {
            strip._rulerSyncBound = true;
            strip.addEventListener('scroll', () => {
                const zr = document.getElementById('tl-zone-ruler');
                const br = document.getElementById('tl-beat-ruler');
                if (zr) zr.scrollLeft = strip.scrollLeft;
                if (br) br.scrollLeft = strip.scrollLeft;
            });
        }
    }

    // CURSOR-ONLY highlight — O(1), zero DOM creation, zero grid extraction
    function highlightFrame(idx) {
        const trk = document.getElementById('tl-strip');
        if (!trk) return;
        const prev = trk.querySelector('.tl-frame.on');
        if (prev) prev.classList.remove('on');
        // Find by data-idx since strip order may differ from array order
        const next = trk.querySelector('[data-idx="' + idx + '"]');
        if (next) {
            next.classList.add('on');
            next.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
    }

    // SINGLE THUMB UPDATE — refreshes one thumbnail after pixel mutation
    function updateThumb(idx) {
        const trk = document.getElementById('tl-strip');
        // Find by data-idx since strip order may differ from array order
        const w = trk && trk.querySelector('[data-idx="' + idx + '"]');
        if (!w) return;
        const c = w.querySelector('.tl-thumb');
        if (c && state.frames[idx]) renderThumb(state.frames[idx], c, c.width, c.height);
        // Emit delta patch to tunnel (LAW 6 — Delta Mandate)
        if (_ATOBUS_ACTIVE) {
            _gridCache.delete(idx); // Invalidate so patch extracts fresh
            _atoBusEmitPatch(idx);
        }
    }

    function renderThumb(f, targetCanvas, tw, th) {
        const tc = targetCanvas.getContext('2d');
        tc.fillStyle = '#FFFFFF'; tc.fillRect(0, 0, tw, th);
        if (f.src) { tc.globalAlpha = 0.6; tc.drawImage(f.src, 0, 0, tw, th); tc.globalAlpha = 1.0; }
    }

    function toggleTimelineGrid() {
        playTick();
        document.getElementById('timeline-zone').classList.toggle('tl-bar-expanded');
    }

    // ── PLAYBACK ──
    function engageSequence() {
        if (state.frames.length < 2) { fireToast('ADD FRAMES FIRST'); return; }
        playClack(); state.playing = !state.playing;
        if (state.playing) {
            lastT = performance.now();
            // Reset spatial playback Z to current cursor's position
            if (_tunnelArrangement && _tunnelArrangement.length > 0) {
                const cur = _tunnelArrangement.find(a => a.frameIndex === state.cur);
                _playZ = cur ? cur.vStart : _tunnelArrangement[0].vStart;
            } else {
                _playZ = 0;
            }
            _lastPlayFrame = state.cur;
            playRAF = requestAnimationFrame(playStep);
        }
        else { cancelAnimationFrame(playRAF); renderOutput(); highlightFrame(state.cur); }
        // Update status bar play button (mobile)
        const btn = document.getElementById('sb-play-btn');
        const lbl = document.getElementById('play-label');
        if (btn) btn.classList.toggle('playing', state.playing);
        if (lbl) lbl.textContent = state.playing ? 'STOP' : 'PLAY';
        // Update timeline play button (always visible)
        const tlPlay = document.getElementById('tl-play');
        if (tlPlay) {
            tlPlay.textContent = state.playing ? 'STOP' : 'PLAY';
            tlPlay.style.background = state.playing ? '#333' : 'var(--act-c)';
            tlPlay.style.borderColor = state.playing ? '#333' : 'var(--act-c)';
        }
    }
    // Spatial playback state
    let _playZ = 0;          // Virtual Z position during playback (space = time)
    let _playZRate = 120;    // Z units per tick (= SNAP * 2, one default clip slot)
    let _lastPlayFrame = -1; // Last frame rendered during play (for hold detection)

    function playStep(now) {
        if (!state.playing) return;
        playRAF = requestAnimationFrame(playStep);
        const el = now - lastT, dur = 1000 / BASE_FPS;
        if (el >= dur) {
            lastT = now - (el % dur);

            if (_tunnelArrangement && _tunnelArrangement.length >= state.frames.length * 0.5) {
                // ── SPATIAL PLAYBACK: space IS time ──
                _playZ += _playZRate;

                // Find arrangement extent — wrap at end (or loop)
                const lastClip = _tunnelArrangement[_tunnelArrangement.length - 1];
                const extent = lastClip.vStart + lastClip.vDur;

                // Loop enforcement in spatial mode
                if (state.loopIn >= 0 && state.loopOut >= 0) {
                    const loopInClip = _tunnelArrangement.find(a => a.frameIndex === state.loopIn);
                    const loopOutClip = _tunnelArrangement.find(a => a.frameIndex === state.loopOut);
                    if (loopInClip && loopOutClip) {
                        const loopEnd = loopOutClip.vStart + loopOutClip.vDur;
                        if (_playZ >= loopEnd) _playZ = loopInClip.vStart;
                    } else if (_playZ >= extent) {
                        _playZ = _tunnelArrangement[0].vStart;
                    }
                } else if (_playZ >= extent) {
                    _playZ = _tunnelArrangement[0].vStart;
                }

                compositeAtZ(_playZ);
                syncCameraFromCursor();
                _lastPlayFrame = state.cur;
                // Spatial path bypasses renderOutput() monkey-patch —
                // emit cursor explicitly so tunnel follows playback
                _atoBusEmitCursor();
                highlightFrame(state.cur);

            } else {
                // Fallback: linear order with loop enforcement
                state.cur = (state.cur + 1) % state.frames.length;
                // Loop enforcement in linear mode
                if (state.loopIn >= 0 && state.loopOut >= 0) {
                    if (state.cur > state.loopOut) state.cur = state.loopIn;
                    if (state.cur < state.loopIn) state.cur = state.loopIn;
                }
                renderOutput();
                syncCameraFromCursor();
            }

            // Update all frame readouts
            const fb = document.getElementById('sb-frame');
            const rd = document.getElementById('tl-frame-readout');
            const txt = `${String(state.cur + 1).padStart(2, '0')}/${String(state.frames.length).padStart(2, '0')}`;
            if (fb) fb.textContent = txt;
            if (rd) rd.textContent = txt;
        }
    }

    // ── SELECTION ──
    function getSelRange() {
        if (state.selStart < 0) return null;
        const a = Math.min(state.selStart, state.selEnd);
        const b = Math.max(state.selStart, state.selEnd);
        return { from: a, to: b, count: b - a + 1 };
    }

    function splitAtCursor() {
        if (!state.frames.length) return; playClack();
        if (!state.frames[state.cur].clipBoundary) { state.frames[state.cur].clipBoundary = true; fireToast('SPLIT AT FRAME ' + (state.cur + 1)); }
        else { state.frames[state.cur].clipBoundary = false; fireToast('SPLIT REMOVED'); }
        _derivedClipsCache = null; // invalidate clip derivation
        rebuildTrack();
    }

    function deleteSelected() {
        const r = getSelRange();
        if (!r) { fireToast('SELECT FRAMES FIRST'); return; }
        playThud();
        state.frames.splice(r.from, r.count);
        if (!state.frames.length) injectFrame(true);
        state.cur = Math.min(state.cur, state.frames.length - 1);
        state.selMode = false; state.selStart = -1; state.selEnd = -1;
        renderOutput(); rebuildTrack(); updateStatusBar();
        fireToast(r.count + ' FRAMES DELETED');
    }

    function duplicateRange() {
        const r = getSelRange();
        if (!r) { fireToast('SELECT FRAMES FIRST'); return; }
        playClack();
        const dupes = [];
        for (let i = r.from; i <= r.to; i++) {
            const ref = state.frames[i];
            dupes.push({ src: ref.src, scriptLayer: ref.scriptLayer ? new Uint8ClampedArray(ref.scriptLayer) : null, handLayer: ref.handLayer ? new Uint8ClampedArray(ref.handLayer) : null });
        }
        state.frames.splice(r.to + 1, 0, ...dupes);
        rebuildTrack(); updateStatusBar();
        fireToast(dupes.length + ' FRAMES DUPLICATED');
    }

    function reverseRange() {
        const r = getSelRange();
        if (!r || r.count < 2) { fireToast('SELECT 2+ FRAMES'); return; }
        playClack();
        const sub = state.frames.slice(r.from, r.to + 1).reverse();
        state.frames.splice(r.from, r.count, ...sub);
        renderOutput(); rebuildTrack();
        fireToast(r.count + ' FRAMES REVERSED');
    }

    // ── MEDIA INGEST ──
    async function ingestMedia(e) {
        const files = Array.from(e.target.files); if (!files.length) return; e.target.value = '';
        playThud();
        for (const f of files) {
            if (f.type.startsWith('video/')) { state.audioSourceBlob = f; await ripFrames(f); }

    async function ripFrames(source) {

        const dur = vid.duration;

        state.audioDuration = dur;

        // ── FAST REALTIME CAPTURE ──
        // Cap: 12 seconds × BASE_FPS = 144 frames max
        // Beyond 144: user should slice the video first
        const MAX_FRAMES = 12 * BASE_FPS;
        const totalF = Math.min(MAX_FRAMES, Math.ceil(dur * BASE_FPS));
        const interval = 1 / BASE_FPS;
        const insertAt = state.frames.length;
        const frames = [];
        let lastCap = -Infinity;

        lockSystem('RIPPING 0/' + totalF, 0);

        // Broadcast loading start
        if (_ATOBUS_ACTIVE) {
            window.parent.postMessage({
                type: 'RIP_PROGRESS', phase: 'START',

        }

        // Realtime playback capture — non-blocking, yields every frame via rAF
        await new Promise(res => {

                    return;
                }

                    lastCap = vid.currentTime;
                    frames.push(fitSource(vid, vid.videoWidth, vid.videoHeight));
                    updateLockCount(frames.length);
                    document.getElementById('lock-msg').textContent =
                        'RIPPING ' + frames.length + '/' + totalF;

                    // Throttled bus progress — every 24 frames (2 seconds)
                    const now = Date.now();
                    if (_ATOBUS_ACTIVE && now - lastBusSync > 2000) {

                        window.parent.postMessage({
                            type: 'RIP_PROGRESS', phase: 'CHUNK',

                            chunk: Math.ceil(frames.length / 24),
                            chunks: Math.ceil(totalF / 24)

        if (!frames.length) { releaseSystem(); fireToast('NO FRAMES CAPTURED'); return; }

        releaseSystem();
        rebuildTrack(); renderOutput(); updateStatusBar();
        fireToast(frames.length + ' FRAMES RIPPED');

            _atoBusEmitSync();
            window.parent.postMessage({
                type: 'RIP_PROGRESS', phase: 'DONE',

            }, '*');
        }
    }
