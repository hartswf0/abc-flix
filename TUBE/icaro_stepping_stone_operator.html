<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>ICARO · Stepping Stone Operator</title>
<style>
:root{
  --bg:#050505;--panel:#101010;--panel2:#171717;--ink:#f7f7ec;--muted:#b9b9a8;
  --line:#f7f7ec;--red:#ff2a2a;--blue:#2577ff;--gold:#ffd21a;--green:#50ff78;
  --mag:#ff4bdb;--cyan:#40f6ff;--black:#000;--radius:0px;--bar:74px;
}
*{box-sizing:border-box;border-radius:var(--radius);-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;height:100dvh;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif;overflow:hidden;touch-action:none;user-select:none}
button,input,select,textarea{font:inherit}
#app{height:100%;height:100dvh;display:grid;grid-template-rows:54px 1fr var(--bar);background:var(--bg)}
#top{display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:3px solid var(--line);background:#000;min-width:0}
#brand{font-weight:1000;letter-spacing:.04em;font-size:15px;white-space:nowrap}
#brand b{color:var(--red)}
.pill{border:2px solid var(--line);background:#111;color:var(--ink);font-weight:1000;font-size:12px;padding:8px 10px;min-height:38px;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;text-transform:uppercase}
.pill.red{background:var(--red);color:#fff;border-color:#fff}.pill.gold{background:var(--gold);color:#000}.pill.blue{background:var(--blue);color:#fff}.pill.green{background:var(--green);color:#000}
#frameRead{min-width:82px}.spacer{flex:1;min-width:4px}.tiny{font-size:10px;color:var(--muted);font-weight:900;letter-spacing:.08em;text-transform:uppercase}
#stage{min-height:0;display:grid;grid-template-columns:1fr 310px;background:#090909;position:relative}
#theater{position:relative;min-width:0;min-height:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 45%,#1e1e1e 0%,#070707 68%);overflow:hidden}
#canvasShell{position:relative;border:4px solid var(--line);background:#000;box-shadow:0 0 0 4px #000,0 14px 44px rgba(0,0,0,.7);max-width:calc(100vw - 340px);max-height:calc(100dvh - 150px);aspect-ratio:4/3;width:min(86vh,calc(100vw - 350px));}
canvas{image-rendering:pixelated;display:block;width:100%;height:100%}
#mainCanvas,#overlayCanvas{position:absolute;inset:0;width:100%;height:100%}
#mainCanvas{position:relative;background:#000;cursor:crosshair}
#overlayCanvas{pointer-events:none;z-index:4}
#ghostLabel{position:absolute;left:10px;bottom:10px;z-index:6;background:rgba(0,0,0,.78);border:2px solid rgba(255,255,255,.8);padding:6px 8px;font-size:11px;font-weight:1000;letter-spacing:.08em;text-transform:uppercase;color:#fff;max-width:calc(100% - 20px)}
#ghostLabel b{color:var(--gold)}
#right{border-left:3px solid var(--line);background:var(--panel);display:grid;grid-template-rows:auto 1fr auto;min-height:0;min-width:0}
#oracleTop{padding:10px;border-bottom:3px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#000}
.meter{border:2px solid var(--line);padding:8px;background:#111;min-height:50px}.meter .k{font-size:10px;color:var(--muted);font-weight:1000;letter-spacing:.1em;text-transform:uppercase}.meter .v{font-size:20px;font-weight:1000;line-height:1.1;margin-top:2px;color:#fff}
#log{overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scrollbar-width:none}#log::-webkit-scrollbar{display:none}
.card{border:2px solid var(--line);background:#070707;padding:10px;box-shadow:4px 4px 0 #000}.card h3{margin:0 0 6px;font-size:13px;letter-spacing:.08em;text-transform:uppercase}.card p{margin:0;color:#e6e6d6;font-size:13px;line-height:1.35}.card code{font-family:monospace;color:var(--gold);font-size:12px}.card.red{border-color:var(--red)}.card.gold{border-color:var(--gold)}.card.blue{border-color:var(--blue)}.card.green{border-color:var(--green)}
#legend{border-top:3px solid var(--line);background:#000;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.sw{height:34px;border:2px solid var(--line);cursor:pointer;position:relative}.sw.on{outline:4px solid var(--red);outline-offset:-6px}.sw span{position:absolute;bottom:2px;right:4px;color:#fff;background:#000;padding:0 3px;font-size:10px;font-weight:1000}
#bottom{display:grid;grid-template-columns:1fr 1.15fr;background:#000;border-top:3px solid var(--line);min-height:0}
#timeline{display:flex;gap:6px;overflow-x:auto;align-items:center;padding:8px;border-right:3px solid var(--line);scrollbar-width:none}#timeline::-webkit-scrollbar{display:none}
.thumb{width:78px;height:52px;flex:0 0 78px;border:3px solid var(--line);background:#000;position:relative;cursor:pointer}.thumb.on{border-color:var(--red);box-shadow:0 0 0 3px var(--red) inset}.thumb canvas{width:100%;height:100%;opacity:.92}.thumb span{position:absolute;left:3px;top:2px;background:#000;color:#fff;font-size:10px;font-weight:1000;padding:1px 4px;border:1px solid #fff}
#deck{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:8px;overflow:hidden}.op{border:2px solid var(--line);background:#111;color:#fff;font-weight:1000;font-size:11px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;min-height:46px;padding:4px;display:flex;align-items:center;justify-content:center;text-align:center}.op:active{transform:translateY(2px);filter:brightness(.7)}.op.red{background:var(--red)}.op.blue{background:var(--blue)}.op.gold{background:var(--gold);color:#000}.op.green{background:var(--green);color:#000}.op.mag{background:var(--mag)}.op.cyan{background:var(--cyan);color:#000}.op.on{box-shadow:0 0 0 4px #fff inset,0 0 20px rgba(255,255,255,.55)}
#fileInput{display:none}.smallCtl{display:flex;align-items:center;gap:6px}.smallCtl input{width:72px;background:#111;color:#fff;border:2px solid #fff;height:36px;text-align:center;font-weight:1000}.smallCtl label{font-size:10px;font-weight:1000;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}.hideMobile{display:flex}
@media(max-width:860px){
  #app{grid-template-rows:50px 1fr 168px}.hideMobile{display:none!important}#brand{font-size:12px}.pill{font-size:10px;padding:6px 7px;min-height:34px}#stage{grid-template-columns:1fr}#right{position:absolute;right:8px;top:8px;bottom:8px;width:min(330px,86vw);z-index:30;border:3px solid var(--line);display:none}#right.on{display:grid}#canvasShell{max-width:calc(100vw - 18px);max-height:calc(100dvh - 230px);width:calc(100vw - 18px)}#bottom{grid-template-columns:1fr;grid-template-rows:60px 108px}#timeline{border-right:none;border-bottom:3px solid var(--line);padding:5px}.thumb{width:64px;height:44px;flex-basis:64px}#deck{grid-template-columns:repeat(4,1fr);gap:5px;padding:6px}.op{min-height:46px;font-size:10px}#legend{grid-template-columns:repeat(8,1fr)}.sw{height:28px}.meter .v{font-size:16px}.card p{font-size:12px}}
</style>
</head>
<body>
<div id="app">
  <header id="top">
    <div id="brand"><b>ICARO</b> · STEPPING STONE</div>
    <button class="pill red" id="playBtn" title="Space" onclick="togglePlay()">PLAY</button>
    <button class="pill" onclick="step(-1)">◄</button>
    <button class="pill" onclick="step(1)">►</button>
    <div class="pill" id="frameRead">01/01</div>
    <div class="smallCtl hideMobile"><label>FPS</label><input id="fps" type="number" min="1" max="30" value="12" onchange="fps=+this.value||12"></div>
    <div class="spacer"></div>
    <button class="pill gold" onclick="toggleOracle()">LOG</button>
  </header>

  <main id="stage">
    <section id="theater">
      <div id="canvasShell">
        <canvas id="mainCanvas" width="96" height="72"></canvas>
        <canvas id="overlayCanvas" width="96" height="72"></canvas>
        <div id="ghostLabel">MODE <b id="modeName">MATTER</b> · DRAW WITH FINGER/MOUSE · 1-8 CHOOSE INK</div>
      </div>
    </section>

    <aside id="right">
      <div id="oracleTop">
        <div class="meter"><div class="k">MATCH</div><div class="v" id="mMatch">--</div></div>
        <div class="meter"><div class="k">SCAR</div><div class="v" id="mScar">--</div></div>
        <div class="meter"><div class="k">FLOW</div><div class="v" id="mFlow">--</div></div>
        <div class="meter"><div class="k">SWARM</div><div class="v" id="mSwarm">0</div></div>
      </div>
      <div id="log"></div>
      <div id="legend"></div>
    </aside>
  </main>

  <footer id="bottom">
    <div id="timeline"></div>
    <div id="deck">
      <button class="op blue" onclick="document.getElementById('fileInput').click()">SUMMON<br>MEDIA</button>
      <button class="op" onclick="demo()">DEMO<br>SEED</button>
      <button class="op" onclick="blankFrame()">BLANK</button>
      <button class="op" onclick="duplicateFrame()">DUP</button>
      <button class="op red" onclick="wound()">WOUND<br>SCAR</button>
      <button class="op" id="heatBtn" onclick="toggleLayer('scar')">SHOW<br>SCAR</button>
      <button class="op" id="flowBtn" onclick="toggleLayer('flow')">SHOW<br>FLOW</button>
      <button class="op" id="patchBtn" onclick="toggleLayer('patch')">PATCH<br>CREATURES</button>
      <button class="op green" onclick="releaseSwarm()">RELEASE<br>SWARM</button>
      <button class="op" id="swarmBtn" onclick="toggleSwarmRun()">TRAIN<br>SWARM</button>
      <button class="op gold" onclick="materializeSwarm()">BURN<br>SWARM</button>
      <button class="op gold" onclick="burnScar()">BURN<br>SCAR</button>
      <button class="op cyan" onclick="chladni()">CHLADNI<br>PLATE</button>
      <button class="op cyan" onclick="ripple()">RIPPLE<br>FIELD</button>
      <button class="op mag" onclick="predictOne()">BELIEVE<br>+1</button>
      <button class="op mag" onclick="dream(12)">DREAM<br>+12</button>
      <button class="op" onclick="exportFossil()">FOSSIL<br>JSON</button>
      <button class="op" onclick="copyReport()">COPY<br>REPORT</button>
    </div>
  </footer>
</div>
<input id="fileInput" type="file" accept="image/*,video/*" onchange="loadMedia(this.files[0])" />
<script>
'use strict';
const W=96,H=72,N=W*H;
const PAL=[
  '#000000','#ffffff','#ff2a2a','#2577ff','#ffd21a','#50ff78','#ff4bdb','#40f6ff'
];
const INK_NAMES=['VOID','WHITE','SCAR','BLUE','GOLD','GREEN','MAGENTA','CYAN'];
const $=id=>document.getElementById(id);
const main=$('mainCanvas'), over=$('overlayCanvas'), ctx=main.getContext('2d',{willReadFrequently:true}), octx=over.getContext('2d');
ctx.imageSmoothingEnabled=false;octx.imageSmoothingEnabled=false;
let frames=[],cur=0,ink=1,fps=12,playing=false,timer=null,dragging=false,lastCell=null;
let show={scar:true,flow:false,patch:false,belief:false,swarm:true};
let scar=new Float32Array(N), lastBelief=null, lastFlow=[], lastPatches=[], logLines=[];
let mode='MATTER';
let swarm={agents:[],q:new Float32Array(N*4),visit:new Float32Array(N),running:false,raf:null,step:0,match:0};

function vib(n=20){try{navigator.vibrate&&navigator.vibrate(n)}catch(e){}}
function grid(){return new Uint8Array(N)}
function clone(g){return new Uint8Array(g)}
function active(){if(!frames.length)frames.push(grid());return frames[cur]}
function idx(x,y){return y*W+x}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function now(){return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function say(title,body,type=''){
  logLines.unshift({title,body,type,time:now()});
  logLines=logLines.slice(0,40);renderLog();
}
function setMode(m){mode=m;$('modeName').textContent=m;}
function emptyMetrics(){ $('mMatch').textContent='--'; $('mScar').textContent='--'; $('mFlow').textContent='--'; }
function renderLog(){
  $('log').innerHTML=logLines.map(l=>`<div class="card ${l.type}"><h3>${esc(l.title)} <span class="tiny">${l.time}</span></h3><p>${esc(l.body)}</p></div>`).join('');
}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function initLegend(){
  $('legend').innerHTML=PAL.map((c,i)=>`<button class="sw ${i===ink?'on':''}" style="background:${c}" onclick="setInk(${i})"><span>${i+1}</span></button>`).join('');
}
function setInk(i){ink=i;initLegend();vib(10);}
function fitPointer(e){
  const r=main.getBoundingClientRect();
  const p=e.touches?e.touches[0]:e;
  return {x:clamp(Math.floor((p.clientX-r.left)/r.width*W),0,W-1),y:clamp(Math.floor((p.clientY-r.top)/r.height*H),0,H-1)};
}
function drawCell(x,y,val=ink){
  const g=active();
  const rad=eDrawRadius();
  for(let yy=-rad;yy<=rad;yy++)for(let xx=-rad;xx<=rad;xx++){
    if(xx*xx+yy*yy<=rad*rad){const nx=x+xx,ny=y+yy;if(nx>=0&&nx<W&&ny>=0&&ny<H)g[idx(nx,ny)]=val;}
  }
}
function eDrawRadius(){return window.innerWidth<700?1:0;}
function line(x0,y0,x1,y1,val=ink,g=active()){
  let dx=Math.abs(x1-x0),sx=x0<x1?1:-1,dy=-Math.abs(y1-y0),sy=y0<y1?1:-1,err=dx+dy;
  while(true){g[idx(x0,y0)]=val;if(x0===x1&&y0===y1)break;let e2=2*err;if(e2>=dy){err+=dy;x0+=sx}if(e2<=dx){err+=dx;y0+=sy}}
}
main.addEventListener('pointerdown',e=>{dragging=true;main.setPointerCapture(e.pointerId);const p=fitPointer(e);lastCell=p;drawCell(p.x,p.y);render();});
main.addEventListener('pointermove',e=>{if(!dragging)return;const p=fitPointer(e);if(lastCell)line(lastCell.x,lastCell.y,p.x,p.y);lastCell=p;render();});
main.addEventListener('pointerup',()=>{dragging=false;lastCell=null;rebuildTimeline();});
main.addEventListener('pointercancel',()=>{dragging=false;lastCell=null;});
window.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();togglePlay()} if(e.key==='ArrowRight')step(1); if(e.key==='ArrowLeft')step(-1);
  const n=parseInt(e.key,10); if(n>=1&&n<=8)setInk(n-1);
});

function render(){
  const g=show.belief&&lastBelief?lastBelief:active();
  const img=ctx.createImageData(W,H); const d=img.data;
  for(let i=0;i<N;i++){const hex=PAL[g[i]||0];const r=parseInt(hex.slice(1,3),16),gg=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const k=i*4;d[k]=r;d[k+1]=gg;d[k+2]=b;d[k+3]=255;}
  ctx.putImageData(img,0,0);
  renderOverlay(); updateReadouts();
}
function renderOverlay(){
  octx.clearRect(0,0,W,H); octx.lineWidth=1; octx.font='5px Arial';
  if(show.scar){
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){const v=scar[idx(x,y)];if(v>.05){octx.fillStyle=`rgba(255,42,42,${Math.min(.82,.12+v*.7)})`;octx.fillRect(x,y,1,1)}}
  }
  if(show.flow&&lastFlow.length){
    octx.strokeStyle='rgba(255,210,26,.95)';octx.fillStyle='rgba(255,210,26,.95)';
    for(const f of lastFlow){arrow(f.x,f.y,f.x+f.dx*2.2,f.y+f.dy*2.2)}
  }
  if(show.patch&&lastPatches.length){
    const cols=['#40f6ff','#ffd21a','#50ff78','#ff4bdb','#ffffff'];
    lastPatches.slice(0,18).forEach((p,i)=>{octx.strokeStyle=cols[i%cols.length];octx.strokeRect(p.minx,p.miny,p.maxx-p.minx+1,p.maxy-p.miny+1);octx.fillStyle=cols[i%cols.length];octx.fillText('P'+(i+1),p.minx+1,Math.max(5,p.miny+5));});
  }
  if(show.swarm&&swarm.agents.length){
    octx.fillStyle='rgba(80,255,120,.95)'; for(const a of swarm.agents){octx.fillRect(a.x,a.y,1,1)}
    octx.fillStyle='rgba(64,246,255,.35)'; for(let i=0;i<N;i++){if(swarm.visit[i]>.4){octx.fillRect(i%W,Math.floor(i/W),1,1)}}
  }
}
function arrow(x1,y1,x2,y2){
  octx.beginPath();octx.moveTo(x1,y1);octx.lineTo(x2,y2);octx.stroke();
  const a=Math.atan2(y2-y1,x2-x1);octx.beginPath();octx.moveTo(x2,y2);octx.lineTo(x2-Math.cos(a-.6)*2,y2-Math.sin(a-.6)*2);octx.lineTo(x2-Math.cos(a+.6)*2,y2-Math.sin(a+.6)*2);octx.closePath();octx.fill();
}
function updateReadouts(){
  $('frameRead').textContent=String(cur+1).padStart(2,'0')+'/'+String(frames.length).padStart(2,'0');
  $('mSwarm').textContent=swarm.agents.length?Math.round(swarm.match*100)+'%':'0';
  document.querySelectorAll('.op').forEach(b=>b.classList.remove('on'));
  $('heatBtn').classList.toggle('on',show.scar);$('flowBtn').classList.toggle('on',show.flow);$('patchBtn').classList.toggle('on',show.patch);$('swarmBtn').classList.toggle('on',swarm.running);
}
function rebuildTimeline(){
  const tl=$('timeline');tl.innerHTML='';
  frames.forEach((g,i)=>{const d=document.createElement('button');d.className='thumb'+(i===cur?' on':'');d.onclick=()=>{cur=i;wound(false);render();rebuildTimeline();};const c=document.createElement('canvas');c.width=W;c.height=H;const cx=c.getContext('2d');const im=cx.createImageData(W,H);for(let k=0;k<N;k++){const h=PAL[g[k]||0];const j=k*4;im.data[j]=parseInt(h.slice(1,3),16);im.data[j+1]=parseInt(h.slice(3,5),16);im.data[j+2]=parseInt(h.slice(5,7),16);im.data[j+3]=255}cx.putImageData(im,0,0);d.appendChild(c);const s=document.createElement('span');s.textContent=i+1;d.appendChild(s);tl.appendChild(d);});
}
function step(n){cur=clamp(cur+n,0,frames.length-1);wound(false);render();rebuildTimeline();}
function togglePlay(){playing=!playing;$('playBtn').textContent=playing?'STOP':'PLAY';$('playBtn').classList.toggle('red',!playing);$('playBtn').classList.toggle('green',playing);clearInterval(timer);if(playing)timer=setInterval(()=>{cur=(cur+1)%frames.length;render();rebuildTimeline();},1000/fps)}
function blankFrame(){frames.splice(cur+1,0,grid());cur++;scar.fill(0);say('BLANK MATTER','A clean plate was inserted. It contains no intention yet.','blue');render();rebuildTimeline();}
function duplicateFrame(){frames.splice(cur+1,0,clone(active()));cur++;say('DUPLICATED RESIDUE','The current frame was copied. Now the system can notice the smallest betrayal.','blue');render();rebuildTimeline();}

function demo(){
  frames=[]; const text='SCAR';
  for(let t=0;t<24;t++){
    const g=grid();
    const cx=18+t*2.4,cy=34+Math.sin(t*.45)*9;
    disc(g,cx,cy,8,3);disc(g,72-t*1.5,28+Math.cos(t*.3)*6,6,4);line(8,60,88,60,5,g);
    stamp(g,text,26,31,18,t<8?1:t<16?4:2);
    for(let y=0;y<H;y++){const x=Math.floor(48+Math.sin(y*.18+t*.25)*8); if(x>=0&&x<W)g[idx(x,y)]=6;}
    frames.push(g);
  }
  cur=0;scar.fill(0);lastBelief=null;lastFlow=[];lastPatches=[];releaseSwarm(false);
  say('DEMO SEED','A moving scar-word, two drifting bodies, and a magenta pressure seam were summoned. This is not sample content; it is bait.','green');
  wound(false);render();rebuildTimeline();
}
function disc(g,cx,cy,r,val){for(let y=Math.floor(cy-r);y<=cy+r;y++)for(let x=Math.floor(cx-r);x<=cx+r;x++){if(x>=0&&x<W&&y>=0&&y<H&&(x-cx)**2+(y-cy)**2<=r*r)g[idx(x,y)]=val}}
function stamp(g,txt,x,y,size,val){
  const c=document.createElement('canvas');c.width=W;c.height=H;const cx=c.getContext('2d');cx.fillStyle='#000';cx.fillRect(0,0,W,H);cx.fillStyle='#fff';cx.font='900 '+size+'px Arial Black,Arial';cx.textBaseline='top';cx.fillText(txt,x,y);const im=cx.getImageData(0,0,W,H).data;for(let i=0;i<N;i++){if(im[i*4]>80)g[i]=val;}
}

function toggleLayer(k){show[k]=!show[k];if(k==='patch'&&show.patch)detectPatches();if(k==='flow'&&show.flow)computeFlow();render();}
function estimateShift(a,b,range=5){
  let best={dx:0,dy:0,score:Infinity};
  for(let dy=-range;dy<=range;dy++)for(let dx=-range;dx<=range;dx++){
    let s=0,c=0;
    for(let y=4;y<H-4;y+=2)for(let x=4;x<W-4;x+=2){const x0=x-dx,y0=y-dy;if(x0>=0&&x0<W&&y0>=0&&y0<H){const va=a[idx(x0,y0)]?1:0,vb=b[idx(x,y)]?1:0;s+=va===vb?0:1;c++;}}
    s/=Math.max(1,c); if(s<best.score)best={dx,dy,score:s};
  }
  return best;
}
function shifted(g,dx,dy){const out=grid();for(let y=0;y<H;y++)for(let x=0;x<W;x++){const sx=x-dx,sy=y-dy;if(sx>=0&&sx<W&&sy>=0&&sy<H)out[idx(x,y)]=g[idx(sx,sy)];}return out}
function predictGrid(i=cur){ if(frames.length<2||i<1)return clone(frames[i]||active()); const sh=estimateShift(frames[i-1],frames[i]); return shifted(frames[i],sh.dx,sh.dy); }
function predictGridForIndex(i){ if(i<2)return clone(frames[i]||active()); const sh=estimateShift(frames[i-2],frames[i-1]); return shifted(frames[i-1],sh.dx,sh.dy); }
function wound(announce=true){
  if(cur<1){scar.fill(0);lastBelief=null;emptyMetrics();if(announce)say('NO SCAR YET','Need at least two frames before reality can betray belief.','red');return;}
  const pred=predictGridForIndex(cur); lastBelief=pred; const real=active(); let miss=0,hot=0;
  for(let i=0;i<N;i++){const m=pred[i]===real[i]?0:1; scar[i]=m; miss+=m; if(m)hot++;}
  const match=1-miss/N; $('mMatch').textContent=Math.round(match*100)+'%'; $('mScar').textContent=hot; computeFlow(); detectPatches();
  if(announce){setMode('WOUND');say('SCAR FIELD OPENED',`Belief met arrival. ${hot} cells refused the predicted world. The error is now usable matter.`,'red');}
  render();
}
function computeFlow(){
  lastFlow=[]; if(cur<1)return lastFlow; const a=frames[cur-1],b=frames[cur]; const cell=12;
  for(let y=cell/2;y<H;y+=cell)for(let x=cell/2;x<W;x+=cell){
    let best={dx:0,dy:0,score:Infinity};
    for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){let s=0,c=0;for(let yy=-4;yy<=4;yy+=2)for(let xx=-4;xx<=4;xx+=2){const xb=x+xx,yb=y+yy,xa=xb-dx,ya=yb-dy;if(xa>=0&&xa<W&&ya>=0&&ya<H&&xb>=0&&xb<W&&yb>=0&&yb<H){s+=(a[idx(xa,ya)]?1:0)===(b[idx(xb,yb)]?1:0)?0:1;c++;}}s/=Math.max(1,c);if(s<best.score)best={dx,dy,score:s};}
    if(Math.abs(best.dx)+Math.abs(best.dy)>0&&best.score<.45)lastFlow.push({x,y,dx:best.dx,dy:best.dy,score:best.score});
  }
  $('mFlow').textContent=lastFlow.length;return lastFlow;
}
function detectPatches(){
  const g=active(),seen=new Uint8Array(N);lastPatches=[]; const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  for(let i=0;i<N;i++){ if(seen[i]||(!g[i]&&scar[i]<.5))continue; const q=[i];seen[i]=1;let minx=W,maxx=0,miny=H,maxy=0,count=0,inkSum=0,scarSum=0;
    while(q.length){const p=q.pop(),x=p%W,y=Math.floor(p/W);minx=Math.min(minx,x);maxx=Math.max(maxx,x);miny=Math.min(miny,y);maxy=Math.max(maxy,y);count++;inkSum+=g[p];scarSum+=scar[p];
      for(const [dx,dy] of dirs){const nx=x+dx,ny=y+dy;if(nx>=0&&nx<W&&ny>=0&&ny<H){const ni=idx(nx,ny);if(!seen[ni]&&(g[ni]||scar[ni]>.5)){seen[ni]=1;q.push(ni)}}}
    }
    if(count>5)lastPatches.push({minx,maxx,miny,maxy,count,ink:inkSum/count,scar:scarSum/count});
  }
  lastPatches.sort((a,b)=>b.count-a.count);
  if(show.patch){
    const top=lastPatches.slice(0,3).map((p,i)=>`P${i+1}: ${p.count} cells, ${p.scar>.2?'wounded':'stable'}, ${p.maxx-p.minx>p.maxy-p.miny?'horizontal':'vertical'} body`).join(' · ')||'No creatures formed.';
    say('PATCH CREATURES',top,'cyan');
  }
  return lastPatches;
}
function burnScar(){
  const g=active(); let n=0; for(let i=0;i<N;i++){if(scar[i]>.2){g[i]=2;n++;}}
  say('SCAR BURNED',`${n} wrong cells were made permanent. The diagnosis now contaminates the artifact.`,'gold');render();rebuildTimeline();
}
function predictOne(){
  const p=predictGrid(cur);frames.splice(cur+1,0,p);cur++;lastBelief=p;setMode('BELIEF');say('BELIEF +1','The machine extended the last motion rumor into one new frame. This is not truth. It is belief with pixels.','mag');wound(false);render();rebuildTimeline();
}
function dream(n=12){
  setMode('DREAM'); let base=active(); let prev=cur>0?frames[cur-1]:base; const sh=estimateShift(prev,base,5);
  for(let k=1;k<=n;k++){let p=shifted(base,sh.dx,sh.dy); applyNoiseLaw(p,k); frames.splice(cur+k,0,p); prev=base;base=p;}
  say('DREAM RUN',`${n} frames were grown by letting the current belief overstay its evidence. Watch where it becomes monstrous.`,'mag');render();rebuildTimeline();
}
function applyNoiseLaw(g,t){
  for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++){const i=idx(x,y);if(!g[i]&&Math.sin(x*.19+y*.13+t*.7)>0.985)g[i]=(t%2)?4:6;if(g[i]&&Math.sin(x*.07-y*.09+t*.31)<-.992)g[i]=0;}
}
function burnLineInto(g,x1,y1,x2,y2,val){line(Math.round(x1),Math.round(y1),Math.round(x2),Math.round(y2),val,g)}

function releaseSwarm(announce=true){
  stopSwarm(); swarm.agents=[]; swarm.q=new Float32Array(N*4); swarm.visit=new Float32Array(N); swarm.step=0; swarm.match=0;
  const target=active(); const hot=[];for(let i=0;i<N;i++)if(target[i])hot.push(i);
  const count=window.innerWidth<700?160:300;
  for(let a=0;a<count;a++){const p=hot.length?hot[Math.floor(Math.random()*hot.length)]:Math.floor(Math.random()*N);swarm.agents.push({x:p%W,y:Math.floor(p/W),e:.22+Math.random()*.2});}
  if(announce)say('SWARM RELEASED',`${swarm.agents.length} agents entered the frame. They learn by rumor: target ink, scar heat, and flow direction.`,'green');
  render();
}
function toggleSwarmRun(){ if(swarm.running)stopSwarm(); else startSwarm(); }
function startSwarm(){ if(!swarm.agents.length)releaseSwarm(false); swarm.running=true;setMode('SWARM'); $('swarmBtn').textContent='PAUSE\nSWARM'; const loop=()=>{trainSwarm(12);render();swarm.raf=requestAnimationFrame(loop)}; loop();say('SWARM TRAINING','The policy is running. It is not optimizing a product; it is collecting strange paths through the wounded field.','green');}
function stopSwarm(){swarm.running=false;if(swarm.raf)cancelAnimationFrame(swarm.raf);swarm.raf=null;if($('swarmBtn'))$('swarmBtn').textContent='TRAIN\nSWARM';}
function trainSwarm(batch=10){
  const g=active(); if(!lastFlow.length)computeFlow(); const global=cur>0?estimateShift(frames[cur-1],frames[cur],5):{dx:0,dy:0}; const acts=[[1,0],[-1,0],[0,1],[0,-1]]; const alpha=.22,gamma=.88;
  for(let b=0;b<batch;b++){
    for(const a of swarm.agents){
      const s=idx(a.x,a.y); let action=0;
      if(Math.random()<a.e){action=Math.floor(Math.random()*4)} else {let m=-Infinity;for(let k=0;k<4;k++){const q=swarm.q[s*4+k];if(q>m){m=q;action=k}}}
      const [dx,dy]=acts[action]; const nx=clamp(a.x+dx,0,W-1),ny=clamp(a.y+dy,0,H-1),ns=idx(nx,ny);
      const align=(Math.sign(dx)===Math.sign(global.dx)?0.05:0)+(Math.sign(dy)===Math.sign(global.dy)?0.05:0);
      const r=(g[ns]?0.9+g[ns]*.02:-0.025)+(scar[ns]||0)*1.1+align;
      let maxNext=-Infinity;for(let k=0;k<4;k++)maxNext=Math.max(maxNext,swarm.q[ns*4+k]);
      swarm.q[s*4+action]+=alpha*(r+gamma*maxNext-swarm.q[s*4+action]);
      a.x=nx;a.y=ny;a.e=Math.max(.03,a.e*.9995);swarm.visit[ns]=Math.min(4,swarm.visit[ns]+.22);
    }
    for(let i=0;i<N;i++)swarm.visit[i]*=.992;
    swarm.step++;
  }
  let hit=0,total=0;for(let i=0;i<N;i++){if(g[i]){total++;if(swarm.visit[i]>.15)hit++;}}swarm.match=total?hit/total:0;
}
function materializeSwarm(){
  const g=active();let n=0;for(let i=0;i<N;i++){if(swarm.visit[i]>.28){g[i]=g[i]||5;n++;}}
  say('SWARM BURNED',`${n} visited cells became green residue. The path of search is now part of the picture.`,'gold');render();rebuildTimeline();
}

function chladni(){
  setMode('RESONATE'); const start=cur,base=active(); const particles=[];for(let i=0;i<N;i++)if(base[i])particles.push({x:i%W,y:Math.floor(i/W),ink:base[i]});
  if(!particles.length){say('NO DUST','The plate needs ink-particles before it can resonate.','red');return}
  const count=24,n=2+Math.floor(Math.random()*4),m=3+Math.floor(Math.random()*4); let ps=particles.map(p=>({...p}));
  for(let t=0;t<count;t++){const g=grid(); const force=(t/(count-1))*2.4;
    for(const p of ps){const eps=.55;const z=(x,y)=>Math.abs(Math.sin(n*Math.PI*x/W)*Math.sin(m*Math.PI*y/H)-Math.sin(m*Math.PI*x/W)*Math.sin(n*Math.PI*y/H));const dx=z(p.x+eps,p.y)-z(p.x-eps,p.y),dy=z(p.x,p.y+eps)-z(p.x,p.y-eps);p.x=clamp(p.x-dx*force*9,0,W-1);p.y=clamp(p.y-dy*force*9,0,H-1);g[idx(Math.round(p.x),Math.round(p.y))]=p.ink;}
    frames[start+t]=g;
  }
  frames.length=Math.max(frames.length,start+count); cur=start;
  say('CHLADNI PLATE',`Ink became dust on a hidden plate. Standing wave n=${n}, m=${m} rearranged the image into ${count} frames.`,'cyan');render();rebuildTimeline();
}
function ripple(){
  setMode('RIPPLE'); const start=cur,base=active(); const count=18,cx=W/2,cy=H/2;
  for(let t=0;t<count;t++){const g=grid(); const phase=t*.75; for(let y=0;y<H;y++)for(let x=0;x<W;x++){const v=base[idx(x,y)];if(!v)continue;const ang=Math.atan2(y-cy,x-cx),r=Math.hypot(x-cx,y-cy);const amp=Math.sin(r*.28-phase)*3;const nx=clamp(Math.round(x+Math.cos(ang)*amp),0,W-1),ny=clamp(Math.round(y+Math.sin(ang)*amp),0,H-1);g[idx(nx,ny)]=v;} frames[start+t]=g;}
  frames.length=Math.max(frames.length,start+count);cur=start;say('RIPPLE FIELD','The image was not animated. It was pushed by a circular pressure wave and allowed to settle repeatedly.','cyan');render();rebuildTimeline();
}

function exportFossil(){
  const pack={type:'icaro-stepping-stone-fossil',created:new Date().toISOString(),grid:{w:W,h:H,palette:PAL},current:cur,frames:frames.map(rle),scar:Array.from(scar).map(v=>+v.toFixed(3)),flow:lastFlow,patches:lastPatches,swarm:{step:swarm.step,match:swarm.match,agents:swarm.agents.length},log:logLines};
  const blob=new Blob([JSON.stringify(pack,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='icaro_fossil_'+Date.now()+'.json';a.click();URL.revokeObjectURL(a.href);say('FOSSIL EXPORTED','Pixel body, scar body, flow body, patch creatures, swarm trace, and log were preserved as JSON.','gold');
}
function rle(g){const out=[];let v=g[0],c=1;for(let i=1;i<g.length;i++){if(g[i]===v)c++;else{out.push([v,c]);v=g[i];c=1}}out.push([v,c]);return out}
function copyReport(){
  const report=`ICARO STEPPING STONE REPORT\nframe ${cur+1}/${frames.length}\nmatch ${$('mMatch').textContent}\nscar ${$('mScar').textContent}\nflow ${$('mFlow').textContent}\nswarm ${Math.round(swarm.match*100)}%\n\n`+logLines.map(l=>`- ${l.title}: ${l.body}`).join('\n');
  navigator.clipboard?.writeText(report); say('REPORT COPIED','The operator report was copied: not a conclusion, a packet of stepping stones.','gold');
}
function toggleOracle(){ if(window.innerWidth<861)$('right').classList.toggle('on'); }

async function loadMedia(file){
  if(!file)return; if(file.type.startsWith('image/')){const img=new Image();img.onload=()=>{frames=[quantizeImage(img)];cur=0;say('IMAGE SUMMONED',`${file.name} became one BEFLIX-like matter frame.`,'blue');render();rebuildTimeline();};img.src=URL.createObjectURL(file);return;}
  if(file.type.startsWith('video/')){const url=URL.createObjectURL(file);const v=document.createElement('video');v.src=url;v.muted=true;v.playsInline=true;await new Promise(res=>v.onloadedmetadata=res);const count=Math.min(36,Math.max(8,Math.floor(v.duration*4)));frames=[];for(let i=0;i<count;i++){v.currentTime=(v.duration*i)/(count-1);await new Promise(res=>v.onseeked=res);frames.push(quantizeImage(v));}URL.revokeObjectURL(url);cur=0;say('VIDEO SUMMONED',`${count} frames were sampled from ${file.name}. Now the wound engine has a world to betray.`,'blue');render();rebuildTimeline();}
}
function quantizeImage(source){
  const c=document.createElement('canvas');c.width=W;c.height=H;const cx=c.getContext('2d',{willReadFrequently:true});cx.imageSmoothingEnabled=true;cx.fillStyle='#000';cx.fillRect(0,0,W,H);const ar=source.videoWidth?source.videoWidth/source.videoHeight:source.width/source.height;let dw=W,dh=H,dx=0,dy=0;if(ar>W/H){dh=W/ar;dy=(H-dh)/2}else{dw=H*ar;dx=(W-dw)/2}cx.drawImage(source,dx,dy,dw,dh);const im=cx.getImageData(0,0,W,H).data;const g=grid();for(let i=0;i<N;i++){const r=im[i*4],gg=im[i*4+1],b=im[i*4+2],lum=(r+gg+b)/3;if(lum<28){g[i]=0;continue}let best=1,dist=1e9;for(let p=1;p<PAL.length;p++){const h=PAL[p];const pr=parseInt(h.slice(1,3),16),pg=parseInt(h.slice(3,5),16),pb=parseInt(h.slice(5,7),16);const d=(r-pr)**2+(gg-pg)**2+(b-pb)**2;if(d<dist){dist=d;best=p}}g[i]=best;}return g;
}

function init(){frames=[grid()];initLegend();say('OBJECTIVE PURGED','This operator does not ask what the video should become. It collects scars, flow rumors, patch creatures, resonance fields, dreams, and fossils.','red');say('DECEPTIVE STEP','The old failure — crowded analysis overlays — is now the seed: interpretation can be burned into matter.','gold');demo();}
init();
