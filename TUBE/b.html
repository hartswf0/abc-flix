<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Arc-Tunnel Operator — Stable Tool Build</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #05060a;
            --fg: #f8fafc;
            --muted: #64748b;
            --hot: #9CFFB8;
            --red: #d83a1a;
            --c0: #6ee7b7;
            --c1: #a78bfa;
            --c2: #fb7185;
            --c3: #fbbf24
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            touch-action: none;
            user-select: none
        }

        body:before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 20;
            background: radial-gradient(circle at 50% 48%, rgba(156, 255, 184, .06), transparent 36%), radial-gradient(circle at 50% 55%, rgba(216, 58, 26, .08), transparent 62%)
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            background: #05060a;
            z-index: 1;
            cursor: crosshair
        }

        #top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 58px;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px 0;
            background: linear-gradient(to bottom, rgba(5, 6, 10, .95), rgba(5, 6, 10, .28), transparent);
            pointer-events: none
        }

        #brand {
            color: var(--red);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .17em;
            font-size: 11px;
            white-space: nowrap
        }

        #mode {
            height: 34px;
            min-width: 104px;
            border: 1px solid rgba(156, 255, 184, .52);
            background: rgba(5, 6, 10, .68);
            display: grid;
            place-items: center;
            text-transform: uppercase;
            letter-spacing: .14em;
            font-size: 12px;
            box-shadow: 0 0 22px rgba(156, 255, 184, .08)
        }

        #buttons {
            display: flex;
            gap: 8px;
            pointer-events: auto
        }

        .round {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, .30);
            background: rgba(5, 6, 10, .72);
            color: #fff;
            display: grid;
            place-items: center;
            cursor: pointer;
            backdrop-filter: blur(8px)
        }

        .round.on,
        .round:hover {
            border-color: var(--hot);
            color: var(--hot);
            background: rgba(156, 255, 184, .12);
            box-shadow: 0 0 18px rgba(156, 255, 184, .2)
        }

        .round svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            stroke: currentColor
        }

        #bottom {
            position: fixed;
            left: 10px;
            right: 10px;
            bottom: 10px;
            z-index: 42;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 10px;
            pointer-events: none
        }

        #tracks {
            display: flex;
            gap: 7px;
            padding: 7px;
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 999px;
            background: rgba(5, 6, 10, .62);
            pointer-events: auto;
            backdrop-filter: blur(10px)
        }

        .track {
            width: auto;
            height: 34px;
            border-radius: 999px;
            padding: 0 11px;
            border: 1px solid rgba(255, 255, 255, .18);
            background: rgba(255, 255, 255, .045);
            color: #fff;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: .10em;
            text-transform: uppercase;
            cursor: pointer
        }

        .track.active {
            color: #05060a;
            background: var(--track);
            border-color: #fff;
            box-shadow: 0 0 18px var(--glow)
        }

        #readout {
            height: 42px;
            min-width: 190px;
            max-width: 48vw;
            padding: 0 14px;
            border: 1px solid rgba(156, 255, 184, .42);
            background: rgba(5, 6, 10, .7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            letter-spacing: .1em;
            text-transform: uppercase;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            backdrop-filter: blur(10px)
        }

        #store {
            position: fixed;
            right: 10px;
            bottom: 64px;
            z-index: 43;
            width: 210px;
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: 14px;
            padding: 9px;
            background: rgba(5, 6, 10, .70);
            backdrop-filter: blur(12px);
            pointer-events: auto;
            box-shadow: 0 18px 50px rgba(0, 0, 0, .35)
        }

        #storeHead {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: var(--hot);
            font-size: 10px;
            letter-spacing: .16em;
            text-transform: uppercase
        }

        .slot {
            height: 28px;
            border: 1px solid rgba(255, 255, 255, .12);
            border-left: 5px solid var(--slot);
            border-radius: 8px;
            background: rgba(255, 255, 255, .04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 6px
        }

        .slot.active,
        .slot:hover {
            background: rgba(156, 255, 184, .11);
            border-color: rgba(156, 255, 184, .6)
        }

        .empty {
            height: 28px;
            border: 1px dashed rgba(255, 255, 255, .18);
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: rgba(255, 255, 255, .45);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .1em
        }

        #menu {
            position: fixed;
            z-index: 80;
            display: none;
            min-width: 206px;
            max-width: 280px;
            padding: 7px;
            border: 1px solid rgba(156, 255, 184, .46);
            border-radius: 13px;
            background: rgba(3, 4, 6, .96);
            backdrop-filter: blur(14px);
            box-shadow: 0 22px 70px rgba(0, 0, 0, .6)
        }

        #menu.show {
            display: block
        }

        .mTitle {
            color: var(--hot);
            font-size: 11px;
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: 8px 9px;
            border-bottom: 1px solid rgba(255, 255, 255, .12);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .mItem {
            height: 34px;
            border-radius: 8px;
            padding: 0 9px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: .06em;
            font-size: 12px
        }

        .mItem:hover {
            background: rgba(156, 255, 184, .14);
            color: var(--hot)
        }

        .mItem.danger:hover {
            background: rgba(216, 58, 26, .17);
            color: #ff937d
        }

        .mItem.disabled {
            opacity: .3;
            pointer-events: none
        }

        .key {
            font-size: 10px;
            opacity: .55
        }

        .sep {
            height: 1px;
            background: rgba(255, 255, 255, .11);
            margin: 5px 3px
        }

        #help {
            position: fixed;
            left: 14px;
            top: 72px;
            z-index: 60;
            max-width: 310px;
            border: 1px solid rgba(156, 255, 184, .35);
            border-radius: 16px;
            background: rgba(5, 6, 10, .78);
            backdrop-filter: blur(14px);
            padding: 14px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, .42);
            pointer-events: auto
        }

        #help.hide {
            display: none
        }

        .hTitle {
            color: var(--hot);
            font-size: 12px;
            letter-spacing: .16em;
            text-transform: uppercase;
            margin-bottom: 10px
        }

        .hRow {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            color: #fff;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin: 7px 0
        }

        .hRow b {
            color: var(--hot);
            white-space: nowrap
        }

        #runHelp {
            height: 32px;
            border: 1px solid rgba(255, 255, 255, .18);
            border-radius: 999px;
            display: grid;
            place-items: center;
            margin-top: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: .14em;
            font-size: 11px;
            background: rgba(255, 255, 255, .04)
        }

        #runHelp:hover {
            color: var(--hot);
            border-color: var(--hot)
        }

        #toast {
            position: fixed;
            left: 50%;
            bottom: 72px;
            transform: translateX(-50%) translateY(10px);
            opacity: 0;
            z-index: 90;
            pointer-events: none;
            border: 1px solid rgba(156, 255, 184, .46);
            background: rgba(5, 6, 10, .88);
            backdrop-filter: blur(12px);
            border-radius: 999px;
            padding: 10px 14px;
            color: #fff;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .12em;
            transition: .16s opacity, .16s transform
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        #center {
            position: fixed;
            left: 50%;
            top: 50%;
            z-index: 34;
            width: 34px;
            height: 34px;
            border: 1px solid rgba(255, 255, 255, .16);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: .08s
        }

        #center:after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--hot);
            box-shadow: 0 0 12px var(--hot);
            transform: translate(-50%, -50%)
        }

        #center.pulse {
            transform: translate(-50%, -50%) scale(1.28);
            border-color: #fff;
            box-shadow: 0 0 24px rgba(156, 255, 184, .48)
        }

        @media(max-width:760px) {
            #brand {
                font-size: 9px;
                letter-spacing: .1em;
                max-width: 36vw;
                overflow: hidden;
                text-overflow: ellipsis
            }

            #mode {
                min-width: 76px;
                height: 30px;
                font-size: 10px
            }

            .round {
                width: 38px;
                height: 38px
            }

            #tracks {
                gap: 5px;
                padding: 6px;
                max-width: calc(100vw - 108px);
                overflow: hidden
            }

            .track {
                width: 32px;
                height: 32px;
                padding: 0;
                border-radius: 50%;
                font-size: 0
            }

            .track:after {
                content: attr(data-short);
                font-size: 12px
            }

            #readout {
                min-width: 92px;
                height: 42px;
                max-width: 34vw;
                font-size: 10px;
                padding: 0 8px
            }

            #store {
                left: 8px;
                right: auto;
                bottom: 58px;
                width: 154px;
                padding: 7px
            }

            .slot {
                height: 24px;
                font-size: 9px
            }

            .empty {
                height: 24px
            }

            #help {
                left: 10px;
                right: 10px;
                top: 62px;
                max-width: none
            }

            .hRow {
                font-size: 10px
            }

            .mItem {
                height: 36px;
                font-size: 11px
            }

            #menu {
                max-width: calc(100vw - 18px)
            }
        }
    </style>
</head>

<body>
    <canvas id="stage"></canvas>
    <div id="center"></div>
    <header id="top">
        <div id="brand">Arc-Tunnel Operator</div>
        <div id="mode">Tube</div>
        <div id="buttons"><button class="round" id="viewBtn"><svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <circle cx="12" cy="12" r="9"></circle>
                    <path d="M3 12h18M12 3v18"></path>
                </svg></button><button class="round" id="playBtn"><svg viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"></path>
                </svg></button></div>
    </header>
    <section id="help">
        <div class="hTitle">Working Controls</div>
        <div class="hRow"><b>View</b><span>button toggles bench</span></div>
        <div class="hRow"><b>Empty drag</b><span>scrub time</span></div>
        <div class="hRow"><b>Bench clip drag</b><span>move/switch channel</span></div>
        <div class="hRow"><b>S/E handles</b><span>trim snapped</span></div>
        <div class="hRow"><b>Roll dial</b><span>move cohort tracks</span></div>
        <div class="hRow"><b>Right click</b><span>add/export/tools</span></div>
        <div class="hRow"><b>Long press</b><span>mobile tools</span></div>
        <div id="runHelp">Run</div>
    </section>
    <div id="menu"></div>
    <section id="store">
        <div id="storeHead"><span>Store</span><span id="storeCount">0</span></div>
        <div id="storeSlots"></div>
    </section>
    <div id="toast"></div>
    <footer id="bottom">
        <div id="tracks"></div>
        <div id="readout">READY</div>
    </footer>
    <script>
        (function () {
            'use strict';
            const canvas = document.getElementById('stage');
            const ctx = canvas.getContext('2d');
            const center = document.getElementById('center');
            const modeEl = document.getElementById('mode');
            const readout = document.getElementById('readout');
            const tracksEl = document.getElementById('tracks');
            const menuEl = document.getElementById('menu');
            const storeSlots = document.getElementById('storeSlots');
            const storeCount = document.getElementById('storeCount');
            const toastEl = document.getElementById('toast');
            const help = document.getElementById('help');
            const viewBtn = document.getElementById('viewBtn');
            const playBtn = document.getElementById('playBtn');
            const COLORS = ['#6ee7b7', '#a78bfa', '#fb7185', '#fbbf24'];
            const GLOW = ['rgba(110,231,183,.38)', 'rgba(167,139,250,.38)', 'rgba(251,113,133,.38)', 'rgba(251,191,36,.38)'];
            const NAMES = ['POSSIBLE', 'PLAUSIBLE', 'PROBABLE', 'PREFERRED'];
            const SHORT = ['P', 'L', 'B', 'F'];
            const SNAP = 60, FAR = 5600, R = 242, FOV = 760, SAVE_KEY = 'arcTunnelStable:v1';
            let DPR = 1, nextId = 1, rendered = [], toastTimer = 0, longTimer = 0;
            const clips = []; const store = [];
            const state = { W: 0, H: 0, CX: 0, CY: 0, view: 0, mix: 0, targetMix: 0, scale: .46, cameraZ: 360, cameraRoll: 0, targetRoll: 0, speed: 0, playing: false, active: 2, selected: null, hover: null, drag: null, scrub: null, roll: null, cohort: [], section: null, snapPreview: null, clipboard: null, storeIndex: 0, contextOpen: false };
            function clamp(v, a, b) { return Math.max(a, Math.min(b, v)) }
            function lerp(a, b, t) { return a + (b - a) * t }
            function snap(v) { return Math.round(v / SNAP) * SNAP }
            function norm(t) { return ((Math.round(t) % 4) + 4) % 4 }
            function uid() { return 'SC-' + String(nextId++).padStart(3, '0') }
            function pulse() { center.classList.add('pulse'); setTimeout(() => center.classList.remove('pulse'), 120) }
            function vibe(p) { try { if (navigator.vibrate) navigator.vibrate(p) } catch (e) { } }
            function toast(t) { clearTimeout(toastTimer); toastEl.textContent = t; toastEl.classList.add('show'); toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1150) }
            function read(t, c) { readout.textContent = t; readout.style.borderColor = c || 'rgba(156,255,184,.42)'; readout.style.color = c || '#fff' }
            function mkClip(start, dur, track) { return { id: uid(), start: snap(start), dur: Math.max(SNAP, snap(dur)), track: norm(track), seed: Math.random() } }
            function seed() { clips.length = 0; for (let t = 0; t < 4; t++) { let z = -1200; while (z < 14000) { let d = snap(240 + Math.random() * 700); clips.push(mkClip(z, d, t)); z += d + (Math.random() > .82 ? SNAP : 0) } } }
            function save() { try { localStorage.setItem(SAVE_KEY, JSON.stringify({ nextId, cameraZ: state.cameraZ, clips, store })) } catch (e) { } }
            function load() { try { let raw = localStorage.getItem(SAVE_KEY); if (!raw) return false; let d = JSON.parse(raw); if (!d || !Array.isArray(d.clips) || !d.clips.length) return false; clips.length = 0; d.clips.forEach(c => { if (Number.isFinite(+c.start) && Number.isFinite(+c.dur)) clips.push({ id: String(c.id || uid()), start: +c.start, dur: Math.max(SNAP, +c.dur), track: norm(+c.track || 0), seed: +c.seed || Math.random() }) }); store.length = 0; (d.store || []).forEach(s => store.push(s)); nextId = Math.max(+d.nextId || nextId, nextId); if (Number.isFinite(+d.cameraZ)) state.cameraZ = +d.cameraZ; return clips.length > 0 } catch (e) { return false } }
            function autosave() { clearTimeout(state.autoSave); state.autoSave = setTimeout(save, 350) }
            function resize() { DPR = Math.min(2, devicePixelRatio || 1); state.W = innerWidth; state.H = innerHeight; state.CX = state.W / 2; state.CY = state.H / 2; state.scale = state.W < 760 ? .34 : .46; canvas.width = Math.floor(state.W * DPR); canvas.height = Math.floor(state.H * DPR); ctx.setTransform(DPR, 0, 0, DPR, 0, 0) }
            function ensure() { let max = -Infinity; clips.forEach(c => max = Math.max(max, c.start + c.dur)); if (max < state.cameraZ + 8500) { for (let t = 0; t < 4; t++) { let z = max - 800; while (z < max + 6000) { let d = snap(240 + Math.random() * 700); clips.push(mkClip(z, d, t)); z += d + (Math.random() > .86 ? SNAP : 0) } } autosave() } }
            function timeX(z) { return state.CX + (z - state.cameraZ) * state.scale }
            function pointTime(x) { return snap(state.cameraZ + (x - state.CX) / state.scale) }
            function laneY(t) { let top = state.W < 760 ? 116 : 116, bot = state.W < 760 ? state.H - 86 : state.H - 108; return top + (t + .5) * ((bot - top) / 4) }
            function laneH() { let top = state.W < 760 ? 116 : 116, bot = state.W < 760 ? state.H - 86 : state.H - 108; return clamp((bot - top) / 4 * .58, 34, 82) }
            function pointTrack(y) { let best = state.active, bd = 1e9; for (let t = 0; t < 4; t++) { let d = Math.abs(y - laneY(t)); if (d < bd) { bd = d; best = t } } return best }
            function visualTrack(c) { return state.roll && state.cohort.includes(c) ? norm(c.track + state.roll.steps) : c.track }
            function angleFor(t) { return t * Math.PI / 2 - Math.PI / 2 + state.cameraRoll }
            function project(x, y, z) { let dz = z - state.cameraZ + 940; if (dz < 40) return null; let s = FOV / dz; return { x: state.CX + x * s, y: state.CY + y * s, s, depth: dz } }
            function overlaps(a0, a1, b0, b1) { return a0 < b1 && b0 < a1 }
            function buildCohort(c) { let a = c.start, b = c.start + c.dur; state.section = { start: a, end: b }; return clips.filter(k => overlaps(a, b, k.start, k.start + k.dur)) }
            function drawBg() { ctx.fillStyle = '#05060a'; ctx.fillRect(0, 0, state.W, state.H); ctx.save(); ctx.globalAlpha = .075; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; let g = state.W < 760 ? 44 : 58; for (let x = state.CX % g; x < state.W; x += g) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, state.H); ctx.stroke() } for (let y = state.CY % g; y < state.H; y += g) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(state.W, y); ctx.stroke() } ctx.restore() }
            function drawNeedle() { ctx.save(); ctx.globalAlpha = .65; ctx.strokeStyle = 'rgba(255,255,255,.26)'; ctx.beginPath(); ctx.moveTo(state.CX, 62); ctx.lineTo(state.CX, state.H - 58); ctx.stroke(); ctx.restore() }
