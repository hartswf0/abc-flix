<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Tactile Arc-Tunnel Assembly</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #05060a;
            --fg: #f1f5f9;
            --dim: #64748b;
            --hot: #9CFFB8;
            --blood: #d83a1a;
            --c0: #6ee7b7;
            --c1: #a78bfa;
            --c2: #fb7185;
            --c3: #fbbf24
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            touch-action: none;
            user-select: none
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: radial-gradient(circle at 50% 45%, rgba(80, 0, 12, .22), transparent 58%), #05060a;
            cursor: crosshair
        }

        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 22px;
            z-index: 20;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(5, 6, 10, .96), rgba(5, 6, 10, 0))
        }

        .title strong {
            display: block;
            color: var(--blood);
            font-size: 12px;
            letter-spacing: .22em;
            text-transform: uppercase;
            pointer-events: none
        }

        .controls {
            display: flex;
            gap: 10px;
            pointer-events: auto
        }

        button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(100, 116, 139, .75);
            background: rgba(15, 23, 42, .42);
            color: var(--fg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .1s cubic-bezier(.2, .8, .2, 1);
            backdrop-filter: blur(8px)
        }

        button:hover,
        button.on {
            border-color: var(--hot);
            color: var(--hot);
            box-shadow: 0 0 16px rgba(156, 255, 184, .25);
            background: rgba(156, 255, 184, .12)
        }

        button:active {
            transform: scale(.92)
        }

        button svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2
        }

        #readout {
            position: fixed;
            left: 28px;
            bottom: 28px;
            z-index: 20;
            display: flex;
            gap: 12px;
            align-items: center;
            pointer-events: none
        }

        .track-indicator {
            display: flex;
            gap: 9px;
            pointer-events: auto
        }

        .trk-dot {
            width: 40px;
            height: 8px;
            background: var(--dim);
            opacity: .3;
            cursor: pointer
        }

        .focus {
            height: 26px;
            min-width: 92px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(156, 255, 184, .28);
            color: var(--hot);
            background: rgba(5, 6, 10, .52);
            font-size: 13px;
            font-weight: bold;
            letter-spacing: .08em;
            box-shadow: 0 0 20px rgba(156, 255, 184, .08)
        }

        #monitor {
            position: fixed;
            right: 24px;
            top: 82px;
            width: 230px;
            height: 126px;
            background: #000;
            border: 1px solid rgba(100, 116, 139, .8);
            border-radius: 7px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(0, 0, 0, .55)
        }

        #monitor:before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, .35) 50%);
            background-size: 100% 4px;
            z-index: 2
        }

        #monitor:after {
            content: "";
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 46px rgba(0, 0, 0, .9);
            z-index: 3
        }

        #monitor-id {
            z-index: 4;
            font-size: 24px;
            font-weight: bold;
            color: var(--dim);
            letter-spacing: .04em
        }

        .center-mark {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 38px;
            height: 38px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 255, 255, .10);
            border-radius: 50%;
            z-index: 15;
            pointer-events: none
        }

        .center-mark.pulse {
            border-color: var(--hot);
            box-shadow: 0 0 18px rgba(156, 255, 184, .35)
        }

        .center-mark:after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 2px;
            height: 2px;
            background: var(--hot);
            border-radius: 50%;
            transform: translate(-50%, -50%)
        }

        @media(max-width:760px) {
            #hud {
                height: 58px;
                padding: 0 14px
            }

            .title strong {
                font-size: 10px
            }

            .controls {
                gap: 7px
            }

            button {
                width: 38px;
                height: 38px
            }

            #monitor {
                top: auto;
                bottom: 108px;
                right: 18px;
                width: 150px;
                height: 84px
            }

            #monitor-id {
                font-size: 17px
            }

            #readout {
                left: 18px;
                bottom: 18px
            }

            .trk-dot {
                width: 28px
            }

            .focus {
                min-width: 72px;
                font-size: 11px
            }
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div class="center-mark" id="centerMark"></div>
    <div id="hud">
        <div class="title"><strong>Tactile Arc-Tunnel Assembly</strong></div>
        <div class="controls">
            <button id="btnView" title="view"><svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="9"></circle>
                    <path d="M3 12h18M12 3v18"></path>
                </svg></button>
            <button id="btnPlay" title="play"><svg id="playIcon" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" fill="currentColor" stroke="none"></path>
                </svg></button>
            <button id="btnSound" class="on" title="sound"><svg viewBox="0 0 24 24">
                    <path d="M11 5 6 9H3v6h3l5 4z"></path>
                    <path d="M15 9a5 5 0 0 1 0 6"></path>
                </svg></button>
            <button id="btnReset" title="reset"><svg viewBox="0 0 24 24">
                    <path d="M3 12a9 9 0 1 0 3-6.7"></path>
                    <path d="M3 4v6h6"></path>
                </svg></button>
        </div>
    </div>
    <div id="monitor">
        <div id="monitor-id">NO SIGNAL</div>
    </div>
    <div id="readout">
        <div class="track-indicator" id="trackIndicator">
            <div class="trk-dot" data-t="0"></div>
            <div class="trk-dot" data-t="1"></div>
            <div class="trk-dot" data-t="2"></div>
            <div class="trk-dot" data-t="3"></div>
        </div>
        <div class="focus" id="focus">-</div>
    </div>
