<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Operator Mosaic Assembly</title>
    <style>
        :root {
            --paper: #fff;
            --ink: #000;
            --hot: #e00000
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
            color: #000;
            font-family: Courier New, ui-monospace, monospace;
            touch-action: none;
            user-select: none
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #fff;
            cursor: crosshair
        }

        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 54px;
            background: #fff;
            border-bottom: 4px solid #000;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            pointer-events: none
        }

        #title {
            font: 900 15px Courier New, monospace;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: #000
        }

        #surfaces {
            display: flex;
            gap: 0;
            pointer-events: auto;
            border: 3px solid #000
        }

        button {
            height: 36px;
            min-width: 58px;
            padding: 0 12px;
            background: #fff;
            color: #000;
            border: 0;
            border-right: 3px solid #000;
            font: 900 13px Courier New, monospace;
            cursor: pointer;
            text-transform: uppercase
        }

        button:last-child {
            border-right: 0
        }

        button.on {
            background: #000;
            color: #fff
        }

        button.hot {
            background: var(--hot);
            color: #fff
        }

        #focus {
            position: fixed;
            left: 16px;
            bottom: 16px;
            height: 34px;
            min-width: 112px;
            padding: 0 14px;
            background: #fff;
            border: 4px solid #000;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            font: 900 15px Courier New, monospace;
            color: #000;
            pointer-events: none
        }

        #focus.hot {
            border-color: var(--hot);
            color: var(--hot)
        }

        #monitor {
            position: fixed;
            right: 16px;
            top: 72px;
            width: 198px;
            height: 104px;
            border: 4px solid #000;
            background: #fff;
            z-index: 18;
            display: flex;
            align-items: center;
            justify-content: center;
            font: 900 24px Courier New, monospace;
            color: #000;
            pointer-events: none
        }

        #pulse {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%);
            border: 4px solid #000;
            background: #fff;
            z-index: 10;
            pointer-events: none
        }

        #pulse:after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 6px;
            height: 6px;
            background: #000;
            transform: translate(-50%, -50%)
        }

        #pulse.on {
            border-color: var(--hot);
            outline: 8px solid var(--hot)
        }

        @media(max-width:760px) {
            #hud {
                height: 50px;
                padding: 0 8px
            }

            #title {
                font-size: 10px;
                letter-spacing: .04em
            }

            button {
                height: 32px;
                min-width: 42px;
                font-size: 10px;
                padding: 0 8px;
                border-right-width: 2px
            }

            #surfaces {
                border-width: 2px
            }

            #monitor {
                display: none
            }

            #focus {
                left: 10px;
                bottom: 10px;
                height: 30px;
                min-width: 78px;
                font-size: 12px;
                border-width: 3px
            }
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="pulse"></div>
    <div id="hud">
        <div id="title">Operator Mosaic Assembly</div>
        <div id="surfaces">
            <button id="editBtn" class="on">Edit</button>
            <button id="mapBtn">Map</button>
            <button id="tubeBtn">Tube</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>
    <div id="monitor">NO SIGNAL</div>
    <div id="focus">-</div>

            document.getElementById('tubeBtn').onclick = function () { setView('tube') };
            document.getElementById('resetBtn').onclick = function () { init(); setView('edit') };
            window.addEventListener('keydown', function (e) { if (e.key === '1') setView('edit'); if (e.key === '2') setView('map'); if (e.key === '3') setView('tube') });
            resize(); init(); window.addEventListener('resize', resize); mark();
        })();
    </script>
