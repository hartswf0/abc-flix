<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Arc Operator</title>
    <style>
        :root {
            --bg: #030405;
            --fg: #f5f7fb;
            --muted: #8b95a3;
            --dim: #485260;
            --line: #202832;
            --line2: #334150;
            --hot: #8dffcf;
            --blue: #67d8ff;
            --warn: #ffd166;
            --bad: #ff5c7a;
            --panel: rgba(5, 7, 10, .88);
            --safeTop: env(safe-area-inset-top, 0px);
            --safeBottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
            color: var(--fg);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none
        }

        button {
            font: inherit;
            color: inherit;
            border: 1px solid var(--line2);
            background: #080b0f;
            border-radius: 12px;
            padding: 9px 11px;
            cursor: pointer;
            white-space: nowrap
        }

        button:hover {
            border-color: var(--hot)
        }

        button:active {
            transform: translateY(1px)
        }

        button.primary {
            background: var(--hot);
            color: #03120c;
            border-color: var(--hot);
            font-weight: 950
        }

        button.on {
            background: #12241d;
            border-color: var(--hot);
            color: var(--hot)
        }

        button.ghost {
            background: transparent;
            color: var(--muted);
            border-color: var(--line)
        }

        button.bad {
            color: var(--bad);
            border-color: rgba(255, 92, 122, .45)
        }

        #app {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 36%, #111922 0%, #030405 52%, #000 100%);
            overflow: hidden
        }

        #top {
            position: absolute;
            top: var(--safeTop);
            left: 0;
            right: 0;
            height: 56px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: linear-gradient(180deg, rgba(0, 0, 0, .92), rgba(0, 0, 0, .55));
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            backdrop-filter: blur(12px)
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            min-width: 0;
            flex: 1
        }

        .sig {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--hot);
            position: relative
        }

        .sig:after {
            content: "";
            position: absolute;
            left: 6px;
            right: 6px;
            top: 12px;
            border-top: 2px solid var(--blue);
            transform: rotate(-25deg)
        }

        .title {
            font-size: 13px;
            font-weight: 950;
            letter-spacing: .09em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .status {
            font-size: 10px;
            color: var(--muted);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: auto;
            scrollbar-width: none;
            max-width: 72vw
        }

        .controls::-webkit-scrollbar {
            display: none
        }

        .seg {
            display: flex;
            border: 1px solid var(--line2);
            border-radius: 14px;
            overflow: hidden;
            background: #040609;
            flex: none
        }

        .seg button {
            border: 0;
            border-right: 1px solid var(--line);
            border-radius: 0;
            background: transparent;
            color: var(--muted);
            padding: 9px 10px
        }

        .seg button:last-child {
            border-right: 0
        }

        .seg button.on {
            background: #12241d;
            color: var(--hot)
        }

        #stage {
            position: absolute;
            inset: 56px 0 86px 0;
            width: 100%;
            height: auto;
            display: block;
            cursor: crosshair;
            touch-action: none
        }

        #dock {
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: calc(10px + var(--safeBottom));
            height: 68px;
            z-index: 18;
            border: 1px solid rgba(255, 255, 255, .1);
            background: var(--panel);
            border-radius: 22px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 10px 12px;
            box-shadow: 0 22px 80px rgba(0, 0, 0, .55);
            backdrop-filter: blur(14px)
        }

        #readouts {
            display: grid;
            grid-template-columns: repeat(4, minmax(72px, 1fr));
            gap: 8px;
            min-width: 0
        }

        .r {
            min-width: 0;
            border: 1px solid rgba(255, 255, 255, .08);
            background: #030507;
            border-radius: 14px;
            padding: 8px
        }

        .r span {
            display: block;
            font-size: 9px;
            color: var(--dim);
            letter-spacing: .12em;
            text-transform: uppercase;
            margin-bottom: 5px
        }

        .r b {
            display: block;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .r.hot b {
            color: var(--hot)
        }

        .r.blue b {
            color: var(--blue)
        }

        .r.warn b {
            color: var(--warn)
        }

        #dockActions {
            display: flex;
            gap: 7px;
            align-items: center;
            overflow: auto;
            scrollbar-width: none;
            max-width: 46vw
        }

        #dockActions::-webkit-scrollbar {
            display: none
        }

        #hint {
            position: absolute;
            left: 50%;
            top: 47%;
            transform: translate(-50%, -50%);
            z-index: 4;
            width: min(540px, 84vw);
            text-align: center;
            border: 1px dashed rgba(141, 255, 207, .35);
            border-radius: 28px;
            background: rgba(0, 0, 0, .46);
            padding: 25px;
            backdrop-filter: blur(12px);
            pointer-events: none
        }

        #hint.hide {
            display: none
        }

        .h1 {
            font-size: 17px;
            font-weight: 950;
            letter-spacing: .08em;
            text-transform: uppercase
        }

        .h2 {
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.55
        }

        .h3 {
            margin-top: 14px;
            font-size: 11px;
            color: var(--hot)
        }

        #menu {
            position: absolute;
            z-index: 1000;
            display: none;
            min-width: 188px;
            border: 1px solid rgba(255, 255, 255, .16);
            background: rgba(4, 6, 8, .98);
            border-radius: 16px;
            padding: 7px;
            box-shadow: 0 28px 80px rgba(0, 0, 0, .68);
            backdrop-filter: blur(14px)
        }

        #menu button {
            display: block;
            width: 100%;
            text-align: left;
            background: transparent;
            border: 0;
            border-radius: 10px;
            padding: 9px 10px
        }

        #menu button:hover {
            background: #111820;
            color: var(--hot)
        }

        #menu hr {
            border: 0;
            border-top: 1px solid var(--line);
            margin: 5px 0
        }

        #toast {
            position: absolute;
            left: 50%;
            bottom: calc(90px + var(--safeBottom));
            z-index: 2000;
            transform: translateX(-50%) translateY(15px);
            opacity: 0;
            border: 1px solid rgba(141, 255, 207, .45);
            background: #06110d;
            color: var(--hot);
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 12px;
            transition: .18s ease;
            pointer-events: none
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        #file {
            display: none
        }

        @media(max-width:760px) {
            #top {
                height: 60px;
                padding: 8px
            }

            .title {
                font-size: 11px
            }

            .status {
                font-size: 9px
            }

            .controls {
                max-width: 58vw
            }

            .seg button,
            button {
                font-size: 11px;
                padding: 8px 9px
            }

            #stage {
                inset: 60px 0 124px 0
            }

            #dock {
                height: 106px;
                grid-template-columns: 1fr;
                gap: 7px;
                border-radius: 20px
            }

            #readouts {
                grid-template-columns: repeat(2, 1fr);
                gap: 7px
            }

            .r {
                padding: 7px
            }

            .r span {
                font-size: 8px
            }

            .r b {
                font-size: 12px
            }

            #dockActions {
                max-width: 100%;
                width: 100%;
                justify-content: space-between
            }

            .h1 {
                font-size: 14px
            }

            .h2 {
                font-size: 11px
            }

            #toast {
                bottom: calc(128px + var(--safeBottom))
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="top">
            <div class="brand">
                <div class="sig"></div>
                <div style="min-width:0">
                    <div class="title">Arc Operator</div>
                    <div class="status" id="status">load media · select arc · roll locally</div>
                </div>
            </div>
            <div class="controls">
                <button class="primary" id="loadBtn">Load</button>
                <button id="demoBtn">Demo</button>
                <button id="undoBtn" class="ghost">Undo</button>
                <div class="seg" id="modeSeg"><button data-mode="roll" class="on">Roll</button><button
                        data-mode="view">View</button></div>
                <div class="seg" id="viewSeg"><button data-view="barrel" class="on">Barrel</button><button
                        data-view="strip">Strip</button><button data-view="side">Side</button></div>
            </div>
        </div>
        <canvas id="stage"></canvas>
        <div id="hint">
            <div class="h1">Drop video here</div>
            <div class="h2">One machine surface. Real clips on the barrel. Snap ticks outside the footage. Roll moves
                only the selected arc.</div>
            <div class="h3">Tap Demo if you just want to test the controls.</div>
        </div>
        <div id="dock">
            <div id="readouts">
                <div class="r hot"><span>Selected</span><b id="roSel">NONE</b></div>
                <div class="r blue"><span>Roll</span><b id="roRoll">0°</b></div>
                <div class="r warn"><span>Snap</span><b id="roSnap">—</b></div>
                <div class="r"><span>Offset</span><b id="roTime">00:00.00</b></div>
            </div>
            <div id="dockActions">
                <button data-act="split">Split</button>
                <button data-act="dup">Duplicate</button>
                <button data-act="lock">Lock</button>
                <button data-act="del" class="bad">Delete</button>
            </div>
        </div>
        <div id="menu">
            <button data-act="split">Split here</button>
            <button data-act="dup">Duplicate after</button>
            <button data-act="copy">Copy state</button>
            <button data-act="del">Delete</button>
            <hr />
            <button data-act="lock">Lock / unlock</button>
            <button data-act="note">Add snap note</button>
            <button data-act="strip">Reveal in strip</button>
        </div>
        <div id="toast"></div>
        <input id="file" type="file" accept="video/*" multiple />
    </div>
    <script>
        (() => {
            'use strict';
            const $ = id => document.getElementById(id);
            const canvas = $('stage'), ctx = canvas.getContext('2d', { alpha: false });
            const file = $('file'), hint = $('hint'), menu = $('menu');
            const C = { fg: '#f5f7fb', muted: '#8b95a3', dim: '#485260', line: '#202832', line2: '#334150', hot: '#8dffcf', blue: '#67d8ff', warn: '#ffd166', bad: '#ff5c7a', purple: '#b497ff' };
            const S = { assets: {}, clips: [], selected: null, mode: 'roll', view: 'barrel', pan: 0, zoom: 1, drag: null, history: [], notes: [], toastTimer: null, longTimer: null };
            function uid(p) { return p + '_' + Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-3) }
            function clamp(v, a, b) { return Math.max(a, Math.min(b, v)) }
            function mod(n, m) { return ((n % m) + m) % m }
            function dur(v) { return Number.isFinite(v) && v > 0 ? v : 8 }
            function fmt(t) { t = Math.max(0, t || 0); let m = Math.floor(t / 60), s = Math.floor(t % 60), c = Math.floor((t % 1) * 100); return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + '.' + String(c).padStart(2, '0') }
            function deg(r) { return Math.round(r * 180 / Math.PI) }
            function sel() { return S.clips.find(c => c.id === S.selected) || null }
            function asset(c) { return c ? S.assets[c.asset] : null }
            function toast(s) { const t = $('toast'); t.textContent = s; t.classList.add('show'); clearTimeout(S.toastTimer); S.toastTimer = setTimeout(() => t.classList.remove('show'), 1200) }
            function save(label) { S.history.push(JSON.stringify({ label, clips: S.clips, selected: S.selected, pan: S.pan, notes: S.notes })); if (S.history.length > 30) S.history.shift() }
            function undo() { let raw = S.history.pop(); if (!raw) return toast('no undo'); let o = JSON.parse(raw); S.clips = o.clips; S.selected = o.selected; S.pan = o.pan; S.notes = o.notes || []; ui(); draw(); toast('undo ' + o.label) }
            function total() { return S.clips.reduce((a, c) => a + dur(c.duration), 0) || 1 }
            function resize() { const d = Math.max(1, Math.min(2.2, devicePixelRatio || 1)); const r = canvas.getBoundingClientRect(); canvas.width = Math.floor(r.width * d); canvas.height = Math.floor(r.height * d); ctx.setTransform(d, 0, 0, d, 0, 0); draw() }
            function point(e) { let r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top } }
            function frameImage(color, label) { let c = document.createElement('canvas'); c.width = 180; c.height = 104; let x = c.getContext('2d'); let g = x.createLinearGradient(0, 0, 180, 104); g.addColorStop(0, color); g.addColorStop(1, '#050608'); x.fillStyle = g; x.fillRect(0, 0, 180, 104); x.strokeStyle = 'rgba(255,255,255,.22)'; for (let i = 0; i < 9; i++) { x.beginPath(); x.moveTo(i * 25, 0); x.lineTo(i * 25 + 60, 104); x.stroke() } x.fillStyle = 'rgba(0,0,0,.38)'; x.fillRect(0, 70, 180, 34); x.fillStyle = '#fff'; x.font = 'bold 18px ui-monospace,monospace'; x.fillText(label, 14, 93); let img = new Image(); img.src = c.toDataURL('image/jpeg', .82); return img }
            function demo() { save('demo'); S.assets = {}; S.clips = []; S.notes = [];['RUSH', 'ANGLE', 'CUTAWAY'].forEach((name, i) => { let id = uid('asset'), cid = uid('clip'); S.assets[id] = { id, name, duration: 6 + i * 3, status: 'demo', frames: [frameImage(['#133c2b', '#203a61', '#523045'][i], name), frameImage(['#245c40', '#315a8e', '#7a486a'][i], name + ' B')], url: null }; S.clips.push({ id: cid, asset: id, label: name, duration: 6 + i * 3, roll: 0, locked: false }) }); S.selected = S.clips[0].id; hint.classList.add('hide'); ui(); draw(); toast('demo clips loaded') }
            async function loadFiles(files) { let vids = [...files].filter(f => f.type.startsWith('video/')); if (!vids.length) return toast('no video'); save('load'); for (const f of vids) createVideoAsset(f); hint.classList.add('hide'); ui(); draw() }
            function createVideoAsset(f) { let aid = uid('asset'), cid = uid('clip'), url = URL.createObjectURL(f), v = document.createElement('video'); v.src = url; v.muted = true; v.playsInline = true; v.preload = 'metadata'; let a = { id: aid, name: f.name, url, duration: 8, status: 'loading', frames: [], video: v, error: '' }; S.assets[aid] = a; S.clips.push({ id: cid, asset: aid, label: f.name.replace(/\.[^.]+$/, '').slice(0, 28), duration: 8, roll: 0, locked: false }); S.selected = cid; let timer = setTimeout(() => { if (a.status === 'loading') { a.status = 'fallback'; a.error = 'metadata slow'; ui(); draw() } }, 1800); v.onloadedmetadata = async () => { clearTimeout(timer); a.duration = dur(v.duration); a.status = 'playable'; let c = S.clips.find(x => x.id === cid); if (c) c.duration = a.duration; ui(); draw(); try { await sample(a, 8); a.status = a.frames.length ? 'sampled' : 'playable' } catch (e) { a.status = 'fallback'; a.error = 'frame sample failed' } ui(); draw() }; v.onerror = () => { clearTimeout(timer); a.status = 'failed'; a.error = 'decode failed'; ui(); draw() }; v.load() }
            function seek(v, t) { return new Promise(res => { let done = false; function finish() { if (done) return; done = true; v.removeEventListener('seeked', finish); res() } v.addEventListener('seeked', finish); try { v.currentTime = t } catch (e) { finish() } setTimeout(finish, 850) }) }
            async function sample(a, n) { let v = a.video; if (!v || !v.duration) throw Error('no video'); let c = document.createElement('canvas'), x = c.getContext('2d'); let asp = (v.videoWidth || 16) / (v.videoHeight || 9); c.width = 180; c.height = Math.round(180 / asp); a.frames = []; for (let i = 0; i < n; i++) { await seek(v, clamp((i + .5) / n * v.duration, 0, Math.max(.05, v.duration - .05))); x.fillStyle = '#111'; x.fillRect(0, 0, c.width, c.height); try { x.drawImage(v, 0, 0, c.width, c.height) } catch (e) { } let img = new Image(); img.src = c.toDataURL('image/jpeg', .74); await new Promise(r => { img.onload = r; img.onerror = r }); a.frames.push(img) } }
            function layout() { let w = canvas.clientWidth, h = canvas.clientHeight, cx = w / 2, cy = h * .44, r = Math.max(95, Math.min(w, h) * .31 * S.zoom), pps = Math.min(44, (Math.PI * 1.42 * r) / total()), gap = .045; let extent = S.clips.reduce((a, c) => a + dur(c.duration) * pps / r + gap, 0); let a = -Math.PI / 2 - extent / 2 + S.pan; let arcs = []; for (let i = 0; i < S.clips.length; i++) { let c = S.clips[i], ex = Math.max(.16, dur(c.duration) * pps / r); arcs.push({ clip: c, cx, cy, r, start: a, end: a + ex, ex, index: i }); a += ex + gap } return { w, h, cx, cy, r, pps, arcs } }
            function offset(c, arc) { return mod((c.roll || 0) / Math.max(.0001, arc.ex) * dur(c.duration), dur(c.duration)) }
            function rails(c, arc) { let out = [], d = dur(c.duration), n = Math.ceil(d); for (let s = 0; s <= n; s++) { out.push({ time: Math.min(s, d), label: fmt(Math.min(s, d)), kind: s % 5 === 0 ? 'major' : 'sec' }) } S.notes.filter(n => n.clip === c.id).forEach(n => out.push({ time: n.time, label: n.label, kind: 'note' })); return out.map(r => ({ ...r, angle: arc.start + (r.time / d) * arc.ex })) }
            function snap(c, arc) { let o = offset(c, arc), best = null; for (let r of rails(c, arc)) { let d = Math.abs(r.time - o); if (!best || d < best.d) best = { ...r, d } } return best && best.d < .22 ? best : null }
            function draw() { let w = canvas.clientWidth, h = canvas.clientHeight; ctx.clearRect(0, 0, w, h); bg(w, h); if (!S.clips.length) { hint.classList.remove('hide'); return } hint.classList.add('hide'); if (S.view === 'strip') drawStrip(true); else if (S.view === 'side') drawSide(); else drawBarrel(); if (S.view !== 'strip') drawStrip(false) }
            function bg(w, h) { let g = ctx.createRadialGradient(w / 2, h * .35, 20, w / 2, h * .5, Math.max(w, h) * .75); g.addColorStop(0, '#111922'); g.addColorStop(.55, '#030506'); g.addColorStop(1, '#000'); ctx.fillStyle = g; ctx.fillRect(0, 0, w, h); ctx.strokeStyle = 'rgba(255,255,255,.04)'; ctx.lineWidth = 1; for (let x = w % 42; x < w; x += 42) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke() } for (let y = h % 42; y < h; y += 42) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke() } }
            function drawBarrel() { let L = layout(); ctx.save(); ctx.translate(L.cx, L.cy); ctx.strokeStyle = 'rgba(141,255,207,.08)'; for (let rr = L.r - 80; rr <= L.r + 80; rr += 32) { ctx.beginPath(); ctx.arc(0, 0, rr, 0, Math.PI * 2); ctx.stroke() } ctx.restore(); for (let a of L.arcs) drawArc(a, L); let c = sel(); if (c) { let a = L.arcs.find(x => x.clip.id === c.id); if (a) centerRead(c, a, L) } }
