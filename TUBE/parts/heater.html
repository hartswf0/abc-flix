<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Arc Tunnel Beast — Shared Dial</title>
    <style>
        :root {
            --bg: #000;
            --fg: #f5f5f5;
            --dim: #6e6e6e;
            --line: #242424;
            --hot: #9cffb8;
            --warn: #ffd34d;
            --bad: #ff4f3e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100dvh;
            background: #000;
            cursor: default
        }

        #fileInput {
            position: fixed;
            left: -9999px;
            top: -9999px;
            opacity: 0
        }

        #dropHint {
            position: fixed;
            inset: 0;
            display: none;
            z-index: 5;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .78);
            border: 2px dashed var(--hot);
            color: var(--hot);
            font: 900 14px ui-monospace, monospace;
            letter-spacing: .16em;
            text-transform: uppercase
        }

        body.dragging #dropHint {
            display: flex
        }
    </style>
</head>

<body>
    <input id="fileInput" type="file" accept="video/*" multiple />
    <div id="dropHint">drop media into tunnel</div>
    <canvas id="beast"></canvas>
    <script>
        (() => {
            'use strict';
            const canvas = document.getElementById('beast');
            const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
            const fileInput = document.getElementById('fileInput');
            const TAU = Math.PI * 2;
            const COLORS = ['#9CFFB8', '#8bc7ff', '#d7a5ff', '#ffd34d', '#ff8a65', '#ff77aa', '#d7ff58', '#72ffe1'];
            const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
            const lerp = (a, b, t) => a + (b - a) * t;
            const uid = (() => { let n = 1; return p => `${p}_${(n++).toString(36)}` })();
            let W = 0, H = 0, DPR = 1, audioCtx = null;
            const state = {

            addEventListener('resize', resize, { passive: true }); resize();
            function makeClip(o) { const s = o.start ?? 0, e = Math.max(s + .4, o.end ?? s + 5); return { id: o.id || uid('clip'), track: o.track ?? 0, start: s, end: e, roll: o.roll || 0, label: o.label || 'CLIP', kind: o.kind || 'ghost', color: o.color || COLORS[state.clips.length % COLORS.length], video: o.video || null, source: o.source || '', fileName: o.fileName || '', ready: !!o.ready, failed: false, proxyState: o.proxyState || 'GHOST', inPoint: 0, outPoint: e - s, sediment: [] } }
            function seed() {
                [
                    [0, .8, 6.5, 'GHOST'], [1, 3.8, 10.8, 'SYNC'], [2, 2.1, 8.4, 'MOTION'], [3, 7.3, 14.2, 'SPLIT'],
                    [0, 11.3, 18.2, 'PROXY'], [1, 14.5, 22.5, 'COHORT'], [2, 17.6, 25.7, 'ROLL'], [3, 20.4, 29.4, 'IMPORT'],

            function snapTime(t) { return Math.round(t / .5) * .5 }
            function snapRoll(r) { const q = Math.PI / 2; return Math.round(r / q) * q }
            function detents(r) { return Math.round(r / (Math.PI / 2)) }
            function fmt(t) { const m = Math.floor(t / 60), s = Math.floor(t % 60), f = Math.floor((t % 1) * 24); return `${m}:${String(s).padStart(2, '0')}.${String(f).padStart(2, '0')}` }

            function restore(snap) { const map = new Map(state.clips.map(c => [c.id, c])); snap.forEach(s => { const c = map.get(s.id); if (c) Object.assign(c, s) }); sortClips(); armSection() }

            function drawTop(L) { state.buttons = []; ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, L.top.h); ctx.strokeStyle = 'rgba(255,255,255,.12)'; ctx.beginPath(); ctx.moveTo(0, L.top.h - .5); ctx.lineTo(W, L.top.h - .5); ctx.stroke(); const title = `ARC ${state.view.toUpperCase()}`; text(title, 14, L.top.h / 2, 12, '#9cffb8', 'left', '900'); state.buttons.push({ id: 'view', x: 8, y: 5, w: state.mobile ? 112 : 150, h: 28 }); text(fmt(state.playhead), state.mobile ? W / 2 : 170, L.top.h / 2, 12, '#fff', state.mobile ? 'center' : 'left', '900'); let x = W - 10; const items = state.mobile ? [['export', 'EDL'], ['undo', '↶'], ['import', '+']] : [['export', 'EDL'], ['undo', 'UNDO'], ['import', 'IMPORT']]; for (let i = items.length - 1; i >= 0; i--) { const [id, label] = items[i], w = state.mobile ? 42 : id === 'import' ? 70 : 58; x -= w; drawButton(id, label, x, 7, w, 24, id === 'import'); x -= 8 } }
            function drawButton(id, label, x, y, w, h, hot = false) { state.buttons.push({ id, x, y, w, h }); ctx.fillStyle = hot ? 'rgba(156,255,184,.13)' : 'rgba(255,255,255,.045)'; rr(x, y, w, h, 8); ctx.fill(); ctx.strokeStyle = hot ? 'rgba(156,255,184,.8)' : 'rgba(255,255,255,.18)'; ctx.stroke(); text(label, x + w / 2, y + h / 2, 10, hot ? '#9cffb8' : '#fff', 'center', '900') }
            function drawTunnel(r) { panel(r); ctx.save(); rr(r.x, r.y, r.w, r.h, 18); ctx.clip(); ctx.fillStyle = '#000'; ctx.fillRect(r.x, r.y, r.w, r.h); drawTunnelGrid(r); drawTunnelClips(r); drawCohortTube(r); ctx.restore(); const c = selected(); if (c) { text(`${c.label}`, r.x + 14, r.y + 18, 11, '#fff', 'left', '900'); text(`${state.cohort.length} linked`, r.x + r.w - 14, r.y + 18, 10, '#9cffb8', 'right', '900') } }
