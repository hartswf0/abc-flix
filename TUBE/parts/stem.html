<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Arc Splice Tunnel — Operational White Surface</title>
    <style>
        :root {
            --white: #fff;
            --black: #000
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
            color: #000;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            touch-action: none;
            user-select: none
        }

        #stage {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            z-index: 1;
            background: #fff;
            cursor: crosshair
        }

        input[type=file] {
            display: none
        }

        #pool {
            position: fixed;
            left: -10px;
            top: -10px;
            width: 1px;
            height: 1px;
            opacity: .001;
            overflow: hidden;
            z-index: -1;
            pointer-events: none
        }

        #boot {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #fff;
            color: #000;
            display: grid;
            place-items: center;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            border: 14px solid #000
        }

        #top {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            height: 54px;
            z-index: 40;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 3px solid #000;
            background: #fff;
            color: #000
        }

        #brand {
            padding-left: 12px;
            font-size: 12px;
            font-weight: 1000;
            letter-spacing: .14em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        #mode {
            justify-self: center;
            min-width: 92px;
            height: 34px;
            display: grid;
            place-items: center;
            border: 3px solid #000;
            background: #fff;
            color: #000;
            font-size: 12px;
            font-weight: 1000;
            letter-spacing: .12em;
            text-transform: uppercase
        }

        #buttons {
            justify-self: end;
            display: flex;
            gap: 6px;
            padding-right: 8px
        }

        button,
        .cell,
        .lineRow,
        .edlRow,
        .menuItem {
            font-family: inherit
        }

        button {
            height: 34px;
            min-width: 42px;
            border: 3px solid #000;
            background: #fff;
            color: #000;
            font-size: 10px;
            font-weight: 1000;
            text-transform: uppercase;
            letter-spacing: .05em;
            cursor: pointer
        }

        button:hover,
        button.on,
        .track.active {
            background: #000 !important;
            color: #fff !important
        }

        button:active {
            transform: translate(1px, 1px)
        }

        #leftDock {
            position: fixed;
            left: 10px;
            top: 64px;
            bottom: 88px;
            width: 260px;
            z-index: 32;
            background: #fff;
            border: 3px solid #000;
            display: flex;
            flex-direction: column;
            min-height: 0
        }

        .panelHead {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #000;
            padding: 0 8px;
            font-weight: 1000;
            font-size: 11px;
            letter-spacing: .08em;
            text-transform: uppercase;
            background: #fff;
            color: #000
        }

        #sourceGates {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0;
            border-bottom: 3px solid #000
        }

        .cell {
            height: 32px;
            border: 0;
            border-right: 2px solid #000;
            border-bottom: 2px solid #000;
            background: #fff;
            color: #000;
            font-size: 10px;
            font-weight: 1000;
            cursor: grab;
            display: grid;
            place-items: center
        }

        .cell:nth-child(6n) {
            border-right: 0
        }

        .cell.used {
            background: #000;
            color: #fff
        }

        .cell.bound {
            outline: 4px solid #000;
            outline-offset: -6px
        }

        .cell.active {
            background: #000;
            color: #fff
        }

        #scriptPanel {
            flex: 1;
            min-height: 0;
            overflow: auto;
            background: #fff
        }

        .lineRow {
            display: grid;
            grid-template-columns: 36px 1fr;
            gap: 0;
            border-bottom: 2px solid #000;
            cursor: pointer;
            background: #fff;
            color: #000;
            min-height: 34px
        }

        .lineRow b {
            border-right: 2px solid #000;
            display: grid;
            place-items: center;
            font-size: 10px
        }

        .lineRow span {
            display: flex;
            align-items: center;
            padding: 5px 7px;
            font-size: 10px;
            line-height: 1.2;
            text-transform: uppercase
        }

        .lineRow.active {
            background: #000;
            color: #fff
        }

        #rightDock {
            position: fixed;
            right: 10px;
            top: 64px;
            bottom: 88px;
            width: 300px;
            z-index: 32;
            background: #fff;
            border: 3px solid #000;
            display: flex;
            flex-direction: column;
            min-height: 0
        }

        #monitor {
            height: 172px;
            border-bottom: 3px solid #000;
            position: relative;
            background: #fff
        }

        #monCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #fff
        }

        #monLabel {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 28px;
            background: #fff;
            color: #000;
            border-bottom: 3px solid #000;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 10px;
            font-weight: 1000;
            text-transform: uppercase;
            letter-spacing: .08em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        #edlPanel {
            flex: 1;
            min-height: 0;
            overflow: auto;
            background: #fff
        }

        .edlRow {
            display: grid;
            grid-template-columns: 34px 1fr;
            min-height: 34px;
            border-bottom: 2px solid #000;
            cursor: pointer;
            background: #fff;
            color: #000
        }

        .edlRow b {
            border-right: 2px solid #000;
            display: grid;
            place-items: center;
            font-size: 10px
        }

        .edlRow span {
            padding: 5px 7px;
            display: flex;
            align-items: center;
            font-size: 10px;
            line-height: 1.15;
            text-transform: uppercase
        }

        .edlRow.active {
            background: #000;
            color: #fff
        }

        #bottom {
            position: fixed;
            left: 10px;
            right: 10px;
            bottom: 10px;
            height: 66px;
            z-index: 40;
            background: #fff;
            border: 3px solid #000;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 8px
        }

        #tracks {
            display: flex;
            gap: 6px
        }

        .track {
            height: 42px;
            min-width: 54px;
            border: 3px solid #000;
            background: #fff;
            color: #000;
            font-size: 12px;
            font-weight: 1000
        }

        #readout {
            height: 42px;
            border-left: 3px solid #000;
            border-right: 3px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 1000;
            text-transform: uppercase;
            letter-spacing: .08em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 8px
        }

        #selectedBox {
            height: 42px;
            min-width: 120px;
            border: 3px solid #000;
            display: grid;
            place-items: center;
            font-size: 11px;
            font-weight: 1000;
            text-transform: uppercase
        }

        #menu {
            position: fixed;
            z-index: 80;
            display: none;
            background: #fff;
            color: #000;
            border: 3px solid #000;
            width: 226px
        }

        #menu.show {
            display: block
        }

        .menuTitle {
            height: 34px;
            border-bottom: 3px solid #000;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 11px;
            font-weight: 1000;
            text-transform: uppercase
        }

        .menuItem {
            height: 34px;
            border-bottom: 2px solid #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            font-size: 11px;
            font-weight: 1000;
            text-transform: uppercase;
            cursor: pointer;
            background: #fff;
            color: #000
        }

        .menuItem:hover {
            background: #000;
            color: #fff
        }

        #toast {
            position: fixed;
            left: 50%;
            bottom: 88px;
            z-index: 90;
            transform: translateX(-50%) translateY(8px);
            opacity: 0;
            background: #fff;
            color: #000;
            border: 3px solid #000;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 1000;
            text-transform: uppercase;
            letter-spacing: .08em;
            transition: .12s opacity, .12s transform;
            pointer-events: none;
            max-width: 92vw;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        @media(max-width:900px) {
            #top {
                grid-template-columns: 1fr auto;
                height: 56px
            }

            #mode {
                display: none
            }

            #brand {
                font-size: 10px;
                max-width: 38vw
            }

            button {
                height: 32px;
                min-width: 36px;
                font-size: 9px
            }

            #leftDock {
                left: 6px;
                top: 62px;
                width: 152px;
                bottom: 86px
            }

            #sourceGates {
                grid-template-columns: repeat(4, 1fr)
            }

            .cell {
                height: 26px;
                font-size: 9px
            }

            .cell:nth-child(6n) {
                border-right: 2px solid #000
            }

            .cell:nth-child(4n) {
                border-right: 0
            }

            .lineRow {
                grid-template-columns: 28px 1fr;
                min-height: 30px
            }

            .lineRow span {
                font-size: 9px
            }

            #rightDock {
                right: 6px;
                top: 62px;
                width: 158px;
                bottom: 86px
            }

            #monitor {
                height: 96px
            }

            #monLabel {
                height: 24px;
                font-size: 8px
            }

            .edlRow {
                grid-template-columns: 28px 1fr;
                min-height: 30px
            }

            .edlRow span {
                font-size: 8px
            }

            #bottom {
                left: 6px;
                right: 6px;
                bottom: 6px;
                height: 70px;
                grid-template-columns: 1fr;
                gap: 4px;
                padding: 5px
            }

            #tracks {
                justify-content: center
            }

            .track {
                height: 26px;
                min-width: 34px;
                font-size: 10px
            }

            #readout {
                height: 24px;
                font-size: 9px;
                border: 2px solid #000
            }

            #selectedBox {
                display: none
            }
        }
    </style>
</head>

<body>
    <div id="boot">ARC SPLICE OPERATIONAL SURFACE</div>
    <div id="pool"></div>
    <input id="videoInput" type="file" accept="video/*,.mp4,.mov,.m4v,.webm,.ogg" />
    <input id="projectInput" type="file" accept="application/json,.json" />
    <canvas id="stage"></canvas>

    <header id="top">
        <div id="brand">Arc Splice Tunnel / White Control Surface</div>
        <div id="mode">Tube</div>
        <div id="buttons">
            <button id="viewBtn">View</button>
            <button id="playBtn">Play</button>
            <button id="loadBtn">Load</button>
            <button id="edlBtn">EDL</button>
        </div>
    </header>

    <section id="leftDock">
        <div class="panelHead"><span id="gateTitle">A Gates</span><span id="gateState">Ghost</span></div>
        <div id="sourceGates"></div>
        <div class="panelHead"><span>Script</span><span>Bind</span></div>
        <div id="scriptPanel"></div>
    </section>

    <section id="rightDock">
        <div id="monitor"><canvas id="monCanvas"></canvas>
            <div id="monLabel">EMPTY TIME</div>
        </div>
        <div class="panelHead"><span>EDL Lines</span><span id="edlCount">0</span></div>
        <div id="edlPanel"></div>
    </section>

    <footer id="bottom">
        <div id="tracks"></div>
        <div id="readout">READY</div>
        <div id="selectedBox">NONE</div>
    </footer>

    <div id="menu"></div>
    <div id="toast"></div>

    <script>
        (function () {
            'use strict';
            const $ = id => document.getElementById(id);
            const canvas = $('stage'), ctx = canvas.getContext('2d', { alpha: false });
            const mon = $('monCanvas'), mctx = mon.getContext('2d', { alpha: false });
            const pool = $('pool'), sourceGates = $('sourceGates'), scriptPanel = $('scriptPanel'), edlPanel = $('edlPanel');
            const tracksEl = $('tracks'), readout = $('readout'), selectedBox = $('selectedBox'), menu = $('menu');
            const DENSITY = 24, FAR = 26, TUBE_R = 210;
            let DPR = 1, last = 0, nextId = 1, dirty = true, toastTimer = null, rendered = [], activeVideo = null;
            const PATTERN = ['solid', 'dash', 'dot', 'double'];
            const SOURCES = ['A', 'B', 'C', 'D'].map((k, i) => ({ id: i, k, name: k + '_SOURCE', file: null, state: 'ghost', vid: null, url: null, chunks: DENSITY, relinks: 0 }));
            const clips = [];
            const lines = [
                ['001', 'Build Arc Splice Tunnel as a white-field black-mark control surface.'],
                ['002', 'Use source gates as physical addresses.'],
                ['003', 'Use viewport splices as bound objects.'],
                ['004', 'Use EDL lines as selectable machinery.'],
                ['005', 'Bind text to geometry.'],
                ['006', 'Bind geometry to text.'],
                ['007', 'Treat missing media as an active state.'],
                ['008', 'Treat empty time as an active interval.'],
                ['009', 'Decode one video body only.'],
                ['010', 'Anchor the camera at the rail base.'],
                ['011', 'Preserve all ray paths and data paths.'],
                ['012', 'Use no mid-tones.'],
                ['013', 'Use no blur.'],
                ['014', 'Use no pagination.'],
                ['015', 'Make every visible mark operate.']
            ];
            const state = { W: 0, H: 0, CX: 0, CY: 0, baseY: 0, view: 0, viewMix: 0, targetViewMix: 0, time: 0, playing: false, activeSource: 0, selectedClip: null, selectedGate: null, selectedEvent: null, selectedLine: null, selectedGap: null, drag: null, scrub: null, hover: null, clipboard: null, lastSync: -999 };
            function clamp(v, a, b) { return Math.max(a, Math.min(b, v)) }
            function lerp(a, b, t) { return a + (b - a) * t }
            function uid() { return 'SP-' + String(nextId++).padStart(3, '0') }
            function norm(i) { return ((i % 4) + 4) % 4 }
            function fmt(t) { t = Math.max(0, t); return String(Math.floor(t / 60)).padStart(2, '0') + ':' + String(Math.floor(t % 60)).padStart(2, '0') }
            function toast(s) { clearTimeout(toastTimer); const e = $('toast'); e.textContent = s; e.classList.add('show'); toastTimer = setTimeout(() => e.classList.remove('show'), 1100) }
            function mark() { dirty = true }
            function runtime() { return Math.max(DENSITY, ...clips.map(c => c.start + c.dur)) }
            function activeClip() { return clips.filter(c => state.time >= c.start && state.time < c.start + c.dur).sort((a, b) => b.track - a.track || b.id.localeCompare(a.id))[0] || null }
            function download(data, name) { const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(url), 1000) }
            function setReadout(s) { readout.textContent = s }
            function resize() {
                DPR = Math.min(1.5, window.devicePixelRatio || 1);
                state.W = innerWidth; state.H = innerHeight; state.CX = state.W / 2; state.CY = state.H / 2; state.baseY = state.H - 110;
                canvas.width = Math.floor(state.W * DPR); canvas.height = Math.floor(state.H * DPR); ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
                const r = $('monitor').getBoundingClientRect(); mon.width = Math.max(10, Math.floor(r.width * DPR)); mon.height = Math.max(10, Math.floor(r.height * DPR)); mctx.setTransform(DPR, 0, 0, DPR, 0, 0);
                mark();
            }
            function laneY(track) { const top = state.W < 900 ? 164 : 90; const bottom = state.H - 122; return top + (track + .5) * ((bottom - top) / 4) }
            function laneH() { const top = state.W < 900 ? 164 : 90; const bottom = state.H - 122; return clamp((bottom - top) / 4 * .56, 28, 72) }
            function timeX(t) { const scale = state.W < 900 ? 24 : 40; return state.CX + (t - state.time) * scale }
            function pointTime(x) { const scale = state.W < 900 ? 24 : 40; return clamp(Math.round(state.time + (x - state.CX) / scale), 0, DENSITY - 1) }
            function pointTrack(y) { let best = state.activeSource, bestD = 1e9; for (let i = 0; i < 4; i++) { let d = Math.abs(y - laneY(i)); if (d < bestD) { bestD = d; best = i } } return best }
            function applyPattern(track) {
                ctx.setLineDash([]);
                if (PATTERN[track] === 'dash') ctx.setLineDash([9, 6]);
                if (PATTERN[track] === 'dot') ctx.setLineDash([2, 7]);
            }
            function strokeByTrack(track, x, y, w, h, selected) {
                ctx.save(); ctx.strokeStyle = '#000'; ctx.lineWidth = selected ? 5 : 3; applyPattern(track); ctx.strokeRect(x, y, w, h); ctx.setLineDash([]);
                if (PATTERN[track] === 'double') { ctx.lineWidth = 2; ctx.strokeRect(x + 6, y + 6, Math.max(1, w - 12), Math.max(1, h - 12)) }
                ctx.restore();
            }
            function sourceStateText() { const s = SOURCES[state.activeSource]; return s.k + ' ' + s.state.toUpperCase() }
            function buildEvents() {
                const ev = []; let n = 1, cursor = 0;
                const sorted = clips.slice().sort((a, b) => a.start - b.start || a.track - b.track);
                for (const c of sorted) {
                    if (c.start > cursor) ev.push({ event: n++, type: 'empty_time', start: cursor, dur: c.start - cursor, label: 'EMPTY ' + fmt(cursor) + '-' + fmt(c.start) });
                    const s = SOURCES[c.source];
                    ev.push({ event: n++, type: s.state === 'visible' ? 'splice' : 'ghost_splice', clip: c, start: c.start, dur: c.dur, label: (s.state === 'visible' ? 'SPLICE ' : 'GHOST ') + s.k + ':' + String(c.src).padStart(2, '0') + ' @ ' + String(c.start).padStart(2, '0') });
                    cursor = Math.max(cursor, c.start + c.dur);
                }
                if (cursor < runtime()) ev.push({ event: n++, type: 'empty_time', start: cursor, dur: runtime() - cursor, label: 'EMPTY ' + fmt(cursor) + '-' + fmt(runtime()) });
                return ev;
            }
            function exportEDL() {
                const events = buildEvents().map(e => {
                    if (e.clip) { const c = e.clip, s = SOURCES[c.source]; return { event: e.event, type: e.type, clip: c.id, source: s.k, source_name: s.name, source_file: s.file, source_state: s.state, relinks: s.relinks, source_gate: c.src, sequence_gate: c.start, duration_sec: c.dur, track: c.track, track_pattern: PATTERN[c.track], sequence_in: fmt(c.start), sequence_out: fmt(c.start + c.dur) } }
                    return { event: e.event, type: e.type, sequence_gate: e.start, duration_sec: e.dur, sequence_in: fmt(e.start), sequence_out: fmt(e.start + e.dur) }
                });
                download({ kind: 'arc-splice-operational-white-score', density: DENSITY, exported_at: new Date().toISOString(), sources: SOURCES.map(s => ({ k: s.k, name: s.name, file: s.file, state: s.state, relinks: s.relinks })), events }, 'arc_splice_operational_white_score_' + Date.now() + '.json');
                selectLine('004'); toast('EDL SCORE WRITTEN');
            }
            function saveProject() { download({ version: 1, kind: 'arc-splice-operational-white-project', time: state.time, activeSource: state.activeSource, nextId, clips: clips.map(c => ({ ...c })), sources: SOURCES.map(s => ({ id: s.id, k: s.k, name: s.name, file: s.file, state: s.state, chunks: s.chunks, relinks: s.relinks })) }, 'arc_splice_operational_white_project_' + Date.now() + '.json'); toast('PROJECT WRITTEN') }
            function loadProject(file) { const r = new FileReader(); r.onload = () => { try { const p = JSON.parse(r.result); clips.splice(0, clips.length, ...(p.clips || []).map(c => ({ id: c.id || uid(), source: norm(c.source || 0), track: norm(c.track || 0), src: clamp(+c.src || 0, 0, DENSITY - 1), start: clamp(+c.start || 0, 0, DENSITY - 1), dur: clamp(+c.dur || 1, 1, DENSITY), seed: c.seed || Math.random() }))); (p.sources || []).forEach(a => { const s = SOURCES[a.id]; if (!s) return; s.name = a.name || s.name; s.file = a.file || null; s.chunks = a.chunks || DENSITY; s.relinks = a.relinks || 0; if (!s.vid) s.state = s.file ? 'missing' : 'ghost' }); state.time = clamp(+p.time || 0, 0, runtime()); state.activeSource = norm(+p.activeSource || 0); nextId = Math.max(nextId, +p.nextId || 1); updateAll(); toast('PROJECT LOADED — RELINK BODIES') } catch (e) { toast('PROJECT LOAD FAILED') } }; r.readAsText(file) }
            function stopAllExcept(s) { SOURCES.forEach(x => { if (x !== s && x.vid && !x.vid.paused) { try { x.vid.pause() } catch (e) { } } }) }
            function syncActive(force) {
                const c = activeClip(); if (!c) { stopAllExcept(null); activeVideo = null; return }
                const s = SOURCES[c.source]; if (!s.vid || s.state !== 'visible' || s.vid.readyState < 1) { stopAllExcept(null); activeVideo = null; return }
                const loc = clamp(c.src + (state.time - c.start), 0, Math.max(0, (s.vid.duration || DENSITY) - .05));
                stopAllExcept(s);
                if (force || activeVideo !== s || Math.abs(s.vid.currentTime - loc) > .25) { try { s.vid.currentTime = loc } catch (e) { } }
                activeVideo = s;
                if (state.playing) { const p = s.vid.play(); if (p && p.catch) p.catch(() => { }) }
                else if (!s.vid.paused) { try { s.vid.pause() } catch (e) { } }
            }
            function openSource() { state.activeSource = norm(state.activeSource); $('videoInput').value = ''; $('videoInput').click(); toast('CHOOSE BODY ' + SOURCES[state.activeSource].k) }

            window.addEventListener('pointerup', ev => { if (state.drag || state.scrub) onPointerUp(ev) });
            canvas.addEventListener('contextmenu', ev => { ev.preventDefault(); showMenu(ev.clientX, ev.clientY, hitRendered(ev.clientX, ev.clientY)) });
            $('viewBtn').onclick = () => { state.view = state.view ? 0 : 1; state.targetViewMix = state.view ? 1 : 0; selectLine('010'); toast(state.view ? 'BENCH' : 'TUBE'); updateAll() }
            $('playBtn').onclick = () => { state.playing = !state.playing; toast(state.playing ? 'SEQUENCE INVOKED' : 'SEQUENCE HELD'); updateAll() }
            $('loadBtn').onclick = openSource; $('edlBtn').onclick = exportEDL;
            $('videoInput').onchange = e => { const f = e.target.files && e.target.files[0]; if (f) attachVideo(f); e.target.value = '' }
            $('projectInput').onchange = e => { const f = e.target.files && e.target.files[0]; if (f) loadProject(f); e.target.value = '' }
            window.addEventListener('resize', resize);
            window.addEventListener('keydown', e => { const k = e.key.toLowerCase(); if (e.code === 'Space') { e.preventDefault(); state.playing = !state.playing; updateAll() } if (['1', '2', '3', '4'].includes(e.key)) { state.activeSource = +e.key - 1; updateAll() } if (k === 'l') openSource(); if (k === 'e') exportEDL(); if (k === 'b' || k === 't') $('viewBtn').click(); if ((e.ctrlKey || e.metaKey) && k === 'c') { e.preventDefault(); copySelected() } if ((e.ctrlKey || e.metaKey) && k === 'v') { e.preventDefault(); pasteClip() } if (e.key === 'Backspace' || e.key === 'Delete') { e.preventDefault(); deleteSelected() } });
            function tick(ts) {
                const dt = last ? Math.min(.08, (ts - last) / 1000) : 0; last = ts;
                if (Math.abs(state.viewMix - state.targetViewMix) > .003) { state.viewMix = lerp(state.viewMix, state.targetViewMix, .18); mark() }
                if (state.playing && !state.drag && !state.scrub) { state.time += dt; if (state.time >= runtime()) state.time = 0; syncActive(false); mark(); updateEDL() }
                if (dirty || state.playing) draw();
                requestAnimationFrame(tick);
            }
            resize(); updateAll(); $('boot').style.display = 'none'; requestAnimationFrame(tick);
        })();
    </script>
</body>
