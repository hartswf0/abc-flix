<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Arc-Tunnel Operator — Tube Native Controls</title>
    <style>
        :root {
            --bg: #fff;
            --ink: #000;
            --left: 56px;
            --right: 300px;
            --bottom: 52px;
            --top: 48px
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
            color: #000;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            touch-action: none;
            user-select: none
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: #fff;
            display: block;
            z-index: 1;
            cursor: crosshair
        }

        button {
            font: inherit;
            background: #fff;
            color: #000;
            border: 2px solid #000;
            border-radius: 0;
            height: 32px;
            padding: 0 8px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer
        }

        button.on,
        button:active {
            background: #000;
            color: #fff
        }

        #rail {
            position: fixed;
            z-index: 20;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--left);
            border-right: 2px solid #000;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 8px 6px;
            pointer-events: auto
        }

        #rail b {
            height: 38px;
            border: 2px solid #000;
            display: grid;
            place-items: center;
            font-size: 13px
        }

        #rail button {
            width: 44px;
            height: 38px;
            font-size: 10px;
            padding: 0
        }

        .spacer {
            flex: 1
        }

        #top {
            position: fixed;
            z-index: 18;
            left: var(--left);
            right: var(--right);
            top: 0;
            height: var(--top);
            border-bottom: 2px solid #000;
            background: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
            pointer-events: auto
        }

        #brand {
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .mode {
            margin-left: auto;
            border: 2px solid #000;
            padding: 5px 9px;
            font-weight: 900
        }

        .mode b {
            background: #000;
            color: #fff;
            padding: 2px 5px;
            margin-left: 5px
        }

        #ops {
            position: fixed;
            z-index: 16;
            right: 0;
            top: 0;
            bottom: 0;
            width: var(--right);
            border-left: 2px solid #000;
            background: #fff;
            overflow: auto;
            pointer-events: auto
        }

        .opHead {
            position: sticky;
            top: 0;
            background: #000;
            color: #fff;
            padding: 10px;
            font-weight: 900;
            text-transform: uppercase
        }

        .op {
            display: grid;
            grid-template-columns: 48px 1fr;
            border-bottom: 1px solid #000;
            padding: 8px 10px;
            gap: 8px;
            cursor: pointer
        }

        .op:hover,
        .op.on {
            background: #000;
            color: #fff
        }

        .op code {
            font-weight: 900
        }

        .op span {
            font-size: 11px;
            text-transform: uppercase
        }

        .op small {
            display: block;
            font-size: 10px;
            margin-top: 3px;
            opacity: .75
        }

        #bottom {
            position: fixed;
            z-index: 18;
            left: var(--left);
            right: var(--right);
            bottom: 0;
            height: var(--bottom);
            border-top: 2px solid #000;
            background: #fff;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            pointer-events: auto
        }

        .trk {
            height: 34px;
            min-width: 34px
        }

        .trk.on {
            background: #000;
            color: #fff
        }

        #status {
            margin-left: auto;
            font-weight: 900;
            text-transform: uppercase
        }

        .read {
            border-left: 2px solid #000;
            padding-left: 8px;
            min-width: 160px;
            text-align: right;
            font-weight: 900
        }

        #dock {
            position: fixed;
            z-index: 22;
            left: 50%;
            bottom: calc(var(--bottom) + 10px);
            transform: translateX(-50%);
            display: flex;
            border: 2px solid #000;
            background: #fff;
            pointer-events: auto
        }

        #dock button {
            border: 0;
            border-right: 1px solid #000;
            height: 36px;
            font-size: 11px
        }

        #dock button:last-child {
            border-right: 0
        }

        #badge {
            position: fixed;
            z-index: 22;
            left: calc(var(--left) + 12px);
            top: calc(var(--top) + 10px);
            border: 3px solid #000;
            background: #fff;
            padding: 8px 10px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 6px 6px 0 #000;
            pointer-events: none;
            min-width: 220px
        }

        #badge .big {
            font-size: 18px;
            line-height: 18px
        }

        .meta {
            font-size: 10px;
            margin-top: 4px
        }

        #store {
            position: fixed;
            z-index: 17;
            left: calc(var(--left) + 12px);
            bottom: calc(var(--bottom) + 58px);
            width: 340px;
            border: 2px solid #000;
            background: #fff;
            pointer-events: auto
        }

        .storeHead {
            padding: 7px 9px;
            border-bottom: 2px solid #000;
            display: flex;
            justify-content: space-between;
            font-weight: 900;
            text-transform: uppercase
        }

        .slots {
            display: grid;
            grid-template-columns: repeat(5, 1fr)
        }

        .slot {
            border-right: 1px solid #000;
            padding: 8px;
            font-size: 10px;
            min-height: 42px;
            cursor: pointer
        }

        .slot:last-child {
            border-right: 0
        }

        .slot:hover {
            background: #000;
            color: #fff
        }

        .slot b {
            display: block
        }

        #menu {
            position: fixed;
            z-index: 60;
            display: none;
            border: 2px solid #000;
            background: #fff;
            min-width: 220px;
            pointer-events: auto
        }

        .mi {
            height: 34px;
            border-bottom: 1px solid #000;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer
        }

        .mi:hover,
        .mi.title {
            background: #000;
            color: #fff
        }

        .mi:last-child {
            border-bottom: 0
        }

        #menu.show {
            display: block
        }

        #toast {
            position: fixed;
            z-index: 70;
            left: 50%;
            bottom: 64px;
            transform: translateX(-50%);
            border: 2px solid #000;
            background: #fff;
            padding: 8px 12px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            opacity: 0;
            pointer-events: none
        }

        #toast.show {
            opacity: 1
        }

        @media(max-width:900px) {
            :root {
                --left: 44px;
                --right: 44px;
                --bottom: 46px;
                --top: 44px
            }

            #top {
                right: var(--right);
                height: 44px;
                padding: 0 6px
            }

            #brand {
                max-width: 28vw;
                font-size: 11px
            }

            #top button {
                height: 30px;
                font-size: 9px;
                padding: 0 6px
            }

            .mode {
                font-size: 10px;
                padding: 4px 5px
            }

            #rail {
                width: var(--left);
                gap: 4px;
                padding: 6px 5px
            }

            #rail b {
                height: 32px;
                font-size: 9px
            }

            #rail button {
                width: 32px;
                height: 32px;
                font-size: 7px
            }

            #ops {
                top: 44px;
                bottom: 46px;
                width: 44px
            }

            .opHead {
                display: none
            }

            .op {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 42px;
                height: 54px;
                padding: 0;
                border-bottom: 1px solid #000
            }

            .op code {
                display: none
            }

            .op span {
                font-size: 0
            }

            .op small {
                display: none
            }

            .op span:before {
                content: attr(data-short);
                font-size: 9px;
                writing-mode: vertical-rl;
                letter-spacing: .08em;
                font-weight: 900
            }

            #bottom {
                right: var(--right);
                height: 46px;
                padding: 5px 6px
            }

            .trk {
                width: 30px;
                font-size: 0;
                padding: 0
            }

            .trk:after {
                content: attr(data-s);
                font-size: 12px
            }

            .read {
                display: none
            }

            #status {
                font-size: 10px
            }

            #dock {
                left: calc(var(--left) + 6px);
                right: calc(var(--right) + 6px);
                bottom: 50px;
                transform: none;
                overflow-x: auto
            }

            #dock button {
                height: 32px;
                min-width: 54px;
                font-size: 9px;
                padding: 0 6px
            }

            #badge {
                left: calc(var(--left) + 6px);
                right: calc(var(--right) + 6px);
                top: 50px;
                min-width: 0;
                padding: 6px 7px;
                border-width: 2px;
                box-shadow: 4px 4px 0 #000
            }

            .big {
                font-size: 14px !important
            }

            .meta {
                font-size: 8px
            }

            #store {
                display: none
            }

            #toast {
                bottom: 88px;
                font-size: 10px
            }
        }
    </style>
</head>

<body>
    <canvas id="stage"></canvas>
    <nav id="rail"><b>ATO</b><button id="viewBtn">VIEW</button><button id="addBtn">ADD</button><button
            id="cutBtn">CUT</button><button id="bankBtn">BANK</button><button id="edlBtn">EDL</button><button
            id="importBtn">IMP</button><button id="exportBtn">OUT</button>
        <div class="spacer"></div><button id="resetBtn">RST</button>
    </nav>
    <header id="top">
        <div id="brand">ARC-TUNNEL OPERATOR</div><button id="playBtn">PLAY</button><button id="snapBtn"
            class="on">SNAP</button>
        <div class="mode">VIEW <b id="modeName">BARREL</b></div>
    </header>
    <aside id="ops">
        <div class="opHead">Live Bound Operations</div>
        <div id="opList"></div>
    </aside>
    <section id="badge">
        <div class="big" id="selBig">NO CLIP</div>
        <div class="meta" id="selMeta">TAP SECTION</div>
    </section>
    <section id="store">
        <div class="storeHead"><span>Store</span><span id="storeCount">0</span></div>
        <div class="slots" id="slots"></div>
    </section>
    <section id="dock"><button data-tool="MOVE" class="on">MOVE</button><button data-tool="TRIM">TRIM</button><button
            data-tool="ROLL">ROLL</button><button data-tool="LIFT">LIFT</button><button
            data-tool="SPLIT">SPLIT</button><button data-tool="ROUTE">ROUTE</button><button
            data-tool="STORE">STORE</button></section>
    <footer id="bottom">
        <div id="tracks"></div><button id="backBtn">|‹</button><button id="fwdBtn">›|</button><button
            id="zoomOutBtn">−</button><button id="zoomInBtn">+</button>
        <div id="status">IDLE</div>
        <div class="read" id="readout">NONE</div>
    </footer>
    <input id="importFile" type="file" accept="application/json,.json" style="display:none" />
    <div id="menu"></div>
    <div id="toast"></div>
    <script>
        (() => {
            'use strict';
            const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
            const modeName = document.getElementById('modeName'), statusEl = document.getElementById('status'), readout = document.getElementById('readout'), opList = document.getElementById('opList'), tracksEl = document.getElementById('tracks'), slotsEl = document.getElementById('slots'), storeCount = document.getElementById('storeCount'), menu = document.getElementById('menu'), toastEl = document.getElementById('toast'), selBig = document.getElementById('selBig'), selMeta = document.getElementById('selMeta'), dock = document.getElementById('dock'), importFile = document.getElementById('importFile');
            const VIEWS = ['BARREL', 'INSIDE', 'OUTSIDE', 'SIDE', 'BENCH'];
            const TOOLS = ['MOVE', 'TRIM', 'ROLL', 'LIFT', 'SPLIT', 'ROUTE', 'STORE'];
            const NAMES = ['POSSIBLE', 'PLAUSIBLE', 'PROBABLE', 'PREFERRED'], SHORT = ['P', 'L', 'B', 'F'];
            const STYLES = [{ dash: [1, 6], hatch: 0 }, { dash: [8, 6], hatch: 1 }, { dash: [], hatch: 2 }, { dash: [12, 4, 2, 4], hatch: 3 }];
            const UNITS = ['CLIP', 'BEAT', 'CELL', 'EDGE'], UNIT_STEP = { CLIP: 60, BEAT: 30, CELL: 15, EDGE: 5 };
            const SNAP = 60, R = 150, FAR = 7200, SAVE = 'ato-tube-native-v3';
            let DPR = 1, W = 0, H = 0, last = 0, nextId = 1, rendered = [], timer = 0;
            const clips = [], bank = [], routes = [];
            const S = { view: 0, tool: 'MOVE', unit: 'CLIP', cam: 420, zoom: .52, roll: -.25, active: 2, selected: null, hover: null, drag: null, scrub: null, play: false, snap: true };
            const F = { ctx: null, master: null, lastSlot: null, lastTrack: null, lastRot: null, lastAt: 0 };
            const clamp = (v, a, b) => Math.max(a, Math.min(b, v)), lerp = (a, b, t) => a + (b - a) * t, norm = t => ((Math.round(t) % 4) + 4) % 4;
            const step = () => UNIT_STEP[S.unit] || SNAP;
            const qsnap = v => S.snap ? Math.round(v / step()) * step() : v;
            function isClip(c) { return !!c && typeof c === 'object' && Number.isFinite(c.start) && Number.isFinite(c.dur) && Number.isFinite(c.track) }
            function audio() { if (!F.ctx) { const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return null; F.ctx = new AC(); F.master = F.ctx.createGain(); F.master.gain.value = .055; F.master.connect(F.ctx.destination) } if (F.ctx.state === 'suspended') F.ctx.resume(); return F.ctx }
            function haptic(p) { try { navigator.vibrate && navigator.vibrate(p) } catch (e) { } }
            function tone(f = 600, d = .012, g = .006, type = 'sine') { let ac = audio(); if (!ac) return; let o = ac.createOscillator(), gain = ac.createGain(), t = ac.currentTime; o.type = type; o.frequency.value = f; gain.gain.setValueAtTime(.0001, t); gain.gain.linearRampToValueAtTime(g, t + .001); gain.gain.exponentialRampToValueAtTime(.0001, t + d + .025); o.connect(gain); gain.connect(F.master); o.start(t); o.stop(t + d + .04) }
            function tick(kind = 'snap') { let now = performance.now(); if (now - F.lastAt < 18) return; F.lastAt = now; if (kind === 'wall') { tone(640, .018, .005); haptic([4, 10, 4]) } else if (kind === 'rot') { tone(900, .01, .004, 'square'); haptic(5) } else if (kind === 'drop') { tone(520, .016, .006, 'triangle'); setTimeout(() => tone(780, .014, .005, 'triangle'), 25); haptic([6, 16, 8]) } else if (kind === 'export') { tone(740, .012, .004, 'triangle'); setTimeout(() => tone(980, .018, .004, 'triangle'), 30); haptic([4, 18, 5]) } else if (kind === 'import') { tone(480, .012, .004, 'sine'); setTimeout(() => tone(760, .012, .004, 'sine'), 24); setTimeout(() => tone(1040, .018, .0035, 'sine'), 48); haptic([5, 14, 5, 14, 7]) } else if (kind === 'invalid') { tone(170, .035, .007, 'sawtooth'); haptic([12, 30, 12]) } else if (kind === 'save') { tone(620, .01, .0035, 'triangle'); haptic(3) } else { tone(1120, .008, S.unit === 'EDGE' ? .0025 : .0045, 'triangle'); haptic(S.unit === 'EDGE' ? 2 : 4) } }
            window.addEventListener('pointerdown', audio, { once: true });
            function toast(x) { clearTimeout(timer); toastEl.textContent = x; toastEl.classList.add('show'); timer = setTimeout(() => toastEl.classList.remove('show'), 900) }
            function setStatus(x) { statusEl.textContent = x }
            function fmt(z) { let u = Math.max(0, Math.round((Number.isFinite(z) ? z : 0) / SNAP)); return String(Math.floor(u / 60)).padStart(2, '0') + ':' + String(u % 60).padStart(2, '0') }
            function id() { return 'SC-' + String(nextId++).padStart(3, '0') }
            function mk(start, dur, track) { return { id: id(), start: qsnap(start), dur: Math.max(SNAP, qsnap(dur)), track: norm(track), rot: 0, lift: 0, locked: false, labelDx: 0, labelDy: 0 } }
            function normClip(c) { c.start = Number.isFinite(+c.start) ? +c.start : 0; c.dur = Math.max(SNAP, Number.isFinite(+c.dur) ? +c.dur : SNAP); c.track = norm(+c.track || 0); c.rot = +c.rot || 0; c.lift = +c.lift || 0; c.labelDx = +c.labelDx || 0; c.labelDy = +c.labelDy || 0; c.locked = !!c.locked; c.id = String(c.id || id()); return c }
            function seed() { clips.length = 0; nextId = 1; for (let t = 0; t < 4; t++) { let z = -900 + t * 160; while (z < 16000) { let d = qsnap(260 + Math.random() * 720); clips.push(mk(z, d, t)); z += d + (Math.random() > .84 ? SNAP : 0) } } }
            function projectPayload() { return { app: 'Arc-Tunnel Operator', version: 3, exportedAt: new Date().toISOString(), state: { view: S.view, tool: S.tool, unit: S.unit, cam: S.cam, zoom: S.zoom, roll: S.roll, active: S.active, snap: S.snap }, nextId, clips: clips.map(c => Object.assign({}, c)), bank: bank.map(b => Object.assign({}, b)), routes: routes.map(r => Object.assign({}, r)) } }
            function applyProjectPayload(d) { if (!d || !Array.isArray(d.clips)) throw new Error('Invalid Arc-Tunnel project JSON'); clips.splice(0, clips.length, ...d.clips.map(normClip)); bank.splice(0, bank.length, ...(Array.isArray(d.bank) ? d.bank : [])); routes.splice(0, routes.length, ...(Array.isArray(d.routes) ? d.routes : [])); nextId = Number.isFinite(+d.nextId) ? +d.nextId : Math.max(1, ...clips.map(c => parseInt(String(c.id).replace(/[^0-9]/g, ''), 10) || 0)) + 1; let st = d.state || {}; S.view = Number.isFinite(+st.view) ? clamp(+st.view, 0, VIEWS.length - 1) : S.view; S.tool = TOOLS.includes(st.tool) ? st.tool : S.tool; S.unit = UNITS.includes(st.unit) ? st.unit : S.unit; S.cam = Number.isFinite(+st.cam) ? +st.cam : S.cam; S.zoom = Number.isFinite(+st.zoom) ? +st.zoom : S.zoom; S.roll = Number.isFinite(+st.roll) ? +st.roll : S.roll; S.active = Number.isFinite(+st.active) ? norm(+st.active) : S.active; S.snap = typeof st.snap === 'boolean' ? st.snap : S.snap; select(clips[0] || null, 'import'); drawTracks(); drawStore(); drawOps(); save() }
            function save() { try { localStorage.setItem(SAVE, JSON.stringify(projectPayload())) } catch (e) { } }
            function downloadText(text, name, type = 'text/plain') { let blob = new Blob([text], { type }); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; document.body.appendChild(a); a.click(); setTimeout(() => { URL.revokeObjectURL(a.href); a.remove() }, 500) }
            function safeClipboardWrite(text) { try { if (!navigator.clipboard || typeof navigator.clipboard.writeText !== 'function') return Promise.resolve(false); return navigator.clipboard.writeText(text).then(() => true).catch(err => { console.warn('Clipboard write blocked; downloaded file fallback used.', err); return false }) } catch (err) { console.warn('Clipboard write unavailable; downloaded file fallback used.', err); return Promise.resolve(false) } }
            function exportProject() { downloadText(JSON.stringify(projectPayload(), null, 2), 'arc_tunnel_project_' + Date.now() + '.json', 'application/json'); tick('export'); toast('PROJECT EXPORTED') }
            function exportSnapshot() { try { let a = document.createElement('a'); a.href = canvas.toDataURL('image/png'); a.download = 'arc_tunnel_snapshot_' + Date.now() + '.png'; document.body.appendChild(a); a.click(); setTimeout(() => a.remove(), 500); toast('SNAPSHOT EXPORTED'); tick('export') } catch (e) { toast('SNAPSHOT BLOCKED'); tick('invalid') } }
            function requestImport() { importFile.value = ''; importFile.click() }
            function importProjectFile(file) { if (!file) return; let r = new FileReader(); r.onload = () => { try { applyProjectPayload(JSON.parse(String(r.result || ''))); tick('import'); toast('PROJECT IMPORTED') } catch (err) { console.error(err); toast('IMPORT FAILED'); tick('invalid') } }; r.onerror = () => { toast('IMPORT READ FAILED'); tick('invalid') }; r.readAsText(file) }
            function load() { try { let d = JSON.parse(localStorage.getItem(SAVE) || 'null'); if (!d || !d.clips || !d.clips.length) return false; clips.splice(0, clips.length, ...d.clips.map(normClip)); bank.splice(0, bank.length, ...(d.bank || [])); routes.splice(0, routes.length, ...(d.routes || [])); nextId = d.nextId || 1; let st = d.state || {}; S.cam = Number.isFinite(+st.cam) ? +st.cam : (d.cam || 420); S.roll = Number.isFinite(+st.roll) ? +st.roll : (d.roll ?? -.25); if (TOOLS.includes(st.tool)) S.tool = st.tool; if (UNITS.includes(st.unit)) S.unit = st.unit; if (Number.isFinite(+st.view)) S.view = clamp(+st.view, 0, VIEWS.length - 1); return true } catch (e) { return false } }
            function resize() { DPR = Math.min(2, devicePixelRatio || 1); W = innerWidth; H = innerHeight; canvas.width = Math.round(W * DPR); canvas.height = Math.round(H * DPR); ctx.setTransform(DPR, 0, 0, DPR, 0, 0) }
            function area() { let left = W < 900 ? 46 : 56, right = W < 900 ? 44 : 300, top = W < 900 ? 44 : 48, bottom = W < 900 ? 46 : 52; return { x: left, y: top, w: W - left - right, h: H - top - bottom, cx: left + (W - left - right) * .52, cy: top + (H - top - bottom) * .52 } }
            function project(x, y, z) { let A = area(), dz = z - S.cam + 900; if (dz < 40) return null; let s = 720 / dz; return { x: A.cx + x * s + (z - S.cam) * .052, y: A.cy + y * s - (z - S.cam) * .016, s, d: dz } }
            function angle(c, track = isClip(c) ? c.track : S.active) { return track * Math.PI / 2 - Math.PI / 2 + S.roll + ((c && Number.isFinite(c.rot)) ? c.rot : 0) }

            function exportEDL() { let lines = ['TITLE: ARC-TUNNEL OPERATOR', '']; clips.slice().sort((a, b) => a.start - b.start).forEach((c, i) => lines.push(`${String(i + 1).padStart(3, '0')} ${c.id} TRACK:${NAMES[c.track]} START:${c.start} END:${c.start + c.dur}`)); let edl = lines.join(String.fromCharCode(10)); safeClipboardWrite(edl).then(ok => { downloadText(edl, 'arc_tunnel_edl_' + Date.now() + '.txt', 'text/plain'); tick('export'); toast(ok ? 'EDL COPIED + DOWNLOADED' : 'EDL DOWNLOADED') }) }
            function drawTracks() { tracksEl.innerHTML = ''; NAMES.forEach((n, i) => { let b = document.createElement('button'); b.className = 'trk' + (S.active === i ? ' on' : ''); b.dataset.s = SHORT[i]; b.textContent = n; b.onclick = () => { S.active = i; toast(n); drawTracks() }; tracksEl.appendChild(b) }) }
            function drawStore() { storeCount.textContent = bank.length; slotsEl.innerHTML = ''; for (let i = 0; i < 5; i++) { let s = bank[i], d = document.createElement('div'); d.className = 'slot'; d.innerHTML = s ? `<b>${s.id}</b><small>${NAMES[s.track]}</small>` : '<b>EMPTY</b><small>STORE</small>'; if (s) d.onclick = () => addClip(S.cam + SNAP * (i + 1), s.track); slotsEl.appendChild(d) } }
            function op(id, label, act, state) { let d = document.createElement('div'); d.className = 'op' + (S.tool === label ? ' on' : ''); let short = { view: 'VIEW', unit: 'UNIT', move: 'MOVE', trim: 'TRIM', roll: 'ROLL', lift: 'LIFT', route: 'ROUTE', store: 'BANK', edl: 'EDL', import: 'IMP', project: 'OUT' }[id] || id; d.innerHTML = `<code>${id}</code><span data-short="${short}">${label}<small>${act} - ${state}</small></span>`; d.onclick = () => runOp(id); opList.appendChild(d) }
            function drawOps() { opList.innerHTML = ''; op('view', 'VIEW', 'cycle editing plane', VIEWS[S.view]); op('unit', 'UNIT', 'clip beat cell edge', S.unit); op('move', 'MOVE', 'center plate / front lip', S.tool); op('trim', 'TRIM', 'nose lip / rear lip', S.tool); op('roll', 'ROLL', 'rotate knob', S.tool); op('lift', 'LIFT', 'inside outside nub', S.tool); op('route', 'ROUTE', 'socket arrow', routes.length + ' ROUTES'); op('store', 'STORE', 'send to tray', bank.length + ' STORED'); op('edl', 'EDL', 'download edit list', 'READY'); op('import', 'IMPORT', 'load project JSON', 'FILE'); op('project', 'PROJECT', 'download full state', 'JSON') }
            function setTool(t) { S.tool = t;[...dock.querySelectorAll('button')].forEach(b => b.classList.toggle('on', b.dataset.tool === t)); toast(t); drawOps(); if (S.selected) select(S.selected, 'tool') }
            function runOp(k) { if (k === 'view') setView((S.view + 1) % VIEWS.length); else if (k === 'unit') cycleUnit(); else if (k === 'move') setTool('MOVE'); else if (k === 'trim') setTool('TRIM'); else if (k === 'roll') setTool('ROLL'); else if (k === 'lift') setTool('LIFT'); else if (k === 'route') setTool('ROUTE'); else if (k === 'store') bankClip(S.selected); else if (k === 'edl') exportEDL(); else if (k === 'import') requestImport(); else if (k === 'project') exportProject() }
            function cycleUnit() { let i = UNITS.indexOf(S.unit); S.unit = UNITS[(i + 1) % UNITS.length]; toast('UNIT ' + S.unit); drawOps(); if (S.selected) select(S.selected, 'unit') }
            function setView(v) { S.view = v; toast(VIEWS[v]); drawOps() }
            function moveClip(c, dt = 0, dtr = 0) { if (!isClip(c) || c.locked) return; c.start = qsnap(c.start + dt); c.track = norm(c.track + dtr); S.active = c.track; placementFeel(c); select(c, 'key'); save() }
            function timeFromX(x) { if (S.view === 4) return benchTime(x); if (S.view === 2) { let P = outsideP(), s = clamp((x - P.cx0) / (P.cx1 - P.cx0), 0, 1); return qsnap(P.front + s * P.span) } let A = area(); return qsnap(S.cam + (x - A.cx) / .48) }
            function beginDrag(h, x, y) { if (!h) return; if (h.mode === 'lathe') { S.scrub = { x, cam: S.cam }; setStatus('LATHE'); return } let c = h.clip; if (!isClip(c)) { S.scrub = { x, cam: S.cam }; setStatus('PAN'); return } select(c, 'object'); S.drag = { mode: h.mode, clip: c, x, y, start: c.start, dur: c.dur, track: c.track, rot: c.rot, lift: c.lift, pointer: timeFromX(x), labelDx: c.labelDx, labelDy: c.labelDy, mx: x, my: y, target: null }; setStatus(String(h.mode).toUpperCase()) }
            canvas.addEventListener('pointerdown', e => { menu.classList.remove('show'); let h = hit(e.clientX, e.clientY); if (h) { if (h.clip && S.selected === h.clip && e.detail >= 2) cycleUnit(); beginDrag(h, e.clientX, e.clientY) } else { S.scrub = { x: e.clientX, cam: S.cam }; setStatus('PAN') } });
            canvas.addEventListener('pointermove', e => { let x = e.clientX, y = e.clientY; if (S.drag && isClip(S.drag.clip)) { let d = S.drag, c = d.clip; if (c.locked && d.mode !== 'lock') { setStatus('LOCKED'); return } if (d.mode === 'move') { c.start = qsnap(d.start + (timeFromX(x) - d.pointer)); c.track = pointTrack(y); placementFeel(c); select(c, 'drag'); save() } else if (d.mode === 'start') { let end = d.start + d.dur, ns = qsnap(d.start + (timeFromX(x) - d.pointer)); ns = clamp(ns, end - 5000, end - step()); c.start = ns; c.dur = end - ns; placementFeel(c); select(c, 'trim'); save() } else if (d.mode === 'end') { let ne = qsnap(d.start + d.dur + (timeFromX(x) - d.pointer)); c.dur = Math.max(step(), ne - c.start); placementFeel(c); select(c, 'trim'); save() } else if (d.mode === 'lane') { c.track = pointTrack(y); placementFeel(c); select(c, 'lane'); save() } else if (d.mode === 'rotate') { c.rot = d.rot + (x - d.x) * .012; rotFeel(c); select(c, 'rot'); save() } else if (d.mode === 'lift') { c.lift = clamp(d.lift - (y - d.y) / 70, -1, 1); tick('wall'); select(c, 'lift'); save() } else if (d.mode === 'lock') { c.locked = !c.locked; S.drag = null; select(c, 'lock'); save() } else if (d.mode === 'label') { c.labelDx = d.labelDx + (x - d.x); c.labelDy = d.labelDy + (y - d.y); save() } else if (d.mode === 'route') { d.mx = x; d.my = y; let hh = hit(x, y); if (hh && hh.clip && hh.clip !== c) { d.target = hh.clip; setStatus('TARGET ' + hh.clip.id) } } return } if (S.scrub) { S.cam = S.scrub.cam - (x - S.scrub.x) / (S.view === 4 ? S.zoom : .48); return } S.hover = hit(x, y); canvas.style.cursor = S.hover ? 'pointer' : 'crosshair'; setStatus(S.hover ? 'HOVER' : 'IDLE') });
            canvas.addEventListener('pointerup', () => { if (S.drag) { if (S.drag.mode === 'move' || S.drag.mode === 'lane' || S.drag.mode === 'lift') tick('drop'); if (S.drag.mode === 'route' && S.drag.target) { routes.push({ from: S.drag.clip.id, to: S.drag.target.id, type: 'ROUTE' }); tick('drop'); toast('ROUTED') } S.drag = null } S.scrub = null; save() });
            canvas.addEventListener('dblclick', e => { let h = hit(e.clientX, e.clientY); h && h.clip ? cutClip(h.clip) : addClip(timeFromX(e.clientX), S.active) });
            canvas.addEventListener('contextmenu', e => { e.preventDefault(); let h = hit(e.clientX, e.clientY); menu.innerHTML = ''; let title = document.createElement('div'); title.className = 'mi title'; title.textContent = h && h.clip ? h.clip.id : 'EMPTY'; menu.appendChild(title); function mi(t, fn) { let d = document.createElement('div'); d.className = 'mi'; d.textContent = t; d.onclick = () => { menu.classList.remove('show'); fn() }; menu.appendChild(d) } if (h && h.clip) { mi('COPY', () => clone(h.clip)); mi('STORE', () => bankClip(h.clip)); mi('CUT', () => cutClip(h.clip)); mi('DELETE', () => remove(h.clip)); mi('EXPORT PROJECT', exportProject); mi('IMPORT PROJECT', requestImport) } else { mi('ADD CLIP', () => addClip(timeFromX(e.clientX), S.active)); mi('EXPORT EDL', exportEDL); mi('EXPORT PROJECT', exportProject); mi('IMPORT PROJECT', requestImport); mi('EXPORT PNG', exportSnapshot) } menu.style.left = clamp(e.clientX, 4, W - 230) + 'px'; menu.style.top = clamp(e.clientY, 4, H - 220) + 'px'; menu.classList.add('show') });
            canvas.addEventListener('wheel', e => { e.preventDefault(); if (e.ctrlKey || e.metaKey) S.zoom = clamp(S.zoom - e.deltaY * .001, .22, 1.3); else if (e.altKey) S.roll += e.deltaY * .006; else S.cam += e.deltaY * 1.5 }, { passive: false });
            window.addEventListener('keydown', e => { if (e.key === ' ') { e.preventDefault(); S.play = !S.play; playBtn.classList.toggle('on', S.play) } if (e.key.toLowerCase() === 'i') { e.preventDefault(); requestImport() } if (e.key.toLowerCase() === 'o') { e.preventDefault(); exportProject() } if (e.key.toLowerCase() === 'p') { e.preventDefault(); exportSnapshot() } if (e.key === 'ArrowLeft') { e.preventDefault(); moveClip(S.selected, -step() * (e.shiftKey ? 4 : 1), 0) } if (e.key === 'ArrowRight') { e.preventDefault(); moveClip(S.selected, step() * (e.shiftKey ? 4 : 1), 0) } if (e.key === 'ArrowUp') { e.preventDefault(); moveClip(S.selected, 0, -1) } if (e.key === 'ArrowDown') { e.preventDefault(); moveClip(S.selected, 0, 1) } if (e.key === '[') { if (S.selected) { S.selected.rot -= Math.PI / 2; rotFeel(S.selected); save() } } if (e.key === ']') { if (S.selected) { S.selected.rot += Math.PI / 2; rotFeel(S.selected); save() } } if (e.key === '.' || e.key === ',') cycleUnit(); if (e.key.toLowerCase() === 'v') setView((S.view + 1) % VIEWS.length); if (e.key.toLowerCase() === 'a') addClip(); if (e.key.toLowerCase() === 'x') cutClip(S.selected); if (e.key.toLowerCase() === 'b') bankClip(S.selected); if (e.key.toLowerCase() === 'e') exportEDL(); if (e.key === 'Delete' || e.key === 'Backspace') remove(S.selected) });
            window.addEventListener('resize', resize);
            viewBtn.onclick = () => setView((S.view + 1) % VIEWS.length); addBtn.onclick = () => addClip(); cutBtn.onclick = () => cutClip(S.selected); bankBtn.onclick = () => bankClip(S.selected); edlBtn.onclick = exportEDL; importBtn.onclick = requestImport; exportBtn.onclick = exportProject; importFile.onchange = e => importProjectFile(e.target.files && e.target.files[0]); resetBtn.onclick = () => { localStorage.removeItem(SAVE); seed(); select(null); save(); toast('RESET') };
            playBtn.onclick = () => { S.play = !S.play; playBtn.classList.toggle('on', S.play) };
            snapBtn.onclick = () => { S.snap = !S.snap; snapBtn.classList.toggle('on', S.snap) };
            backBtn.onclick = () => S.cam -= SNAP * 4;
            fwdBtn.onclick = () => S.cam += SNAP * 4;
            zoomOutBtn.onclick = () => S.zoom = clamp(S.zoom - .08, .22, 1.3);
            zoomInBtn.onclick = () => S.zoom = clamp(S.zoom + .08, .22, 1.3);
            dock.querySelectorAll('button').forEach(b => b.onclick = () => setTool(b.dataset.tool));
            document.addEventListener('pointerdown', e => { if (!menu.contains(e.target)) menu.classList.remove('show') });

            function runTests() {
                console.assert(!isClip(null), 'null is not a clip');
                console.assert(!isClip({}), 'plain object is not a clip');
                let t = mk(0, 120, 1);
                console.assert(isClip(t), 'mk returns a valid clip');
                console.assert(t.start === 0 && t.dur >= SNAP, 'mk creates start/duration');
                let oldSel = S.selected;
                select(null, 'test');
                console.assert(S.selected === null, 'select(null) clears safely');
                select(t, 'test');
                console.assert(S.selected === t, 'select(valid clip) works');
                let h1 = { mode: 'lathe', clip: null };
                beginDrag(h1, 100, 100);
                console.assert(S.scrub && S.scrub.x === 100, 'lathe hit starts scrub, not clip drag');
                S.scrub = null;
                let h2 = { mode: 'move', clip: t };
                beginDrag(h2, 100, 100);
                console.assert(S.drag && S.drag.clip === t && S.drag.start === t.start, 'clip hit starts drag with start');
                S.drag = null;
                let payload = projectPayload();
                console.assert(payload.clips && payload.state, 'projectPayload includes clips and state');
                let count = clips.length;
                applyProjectPayload(payload);
                console.assert(clips.length === count, 'project import preserves clip count');
                let threw = false;
                try { exportEDL() } catch (e) { threw = true }
                console.assert(!threw, 'exportEDL does not throw when clipboard is blocked');
                safeClipboardWrite('test').then(ok => console.assert(typeof ok === 'boolean', 'safeClipboardWrite resolves boolean'));
                let oldTool = S.tool;
                setTool('ROUTE');
                console.assert(S.tool === 'ROUTE', 'setTool updates active tool');
                setTool(oldTool);
                S.selected = oldSel;
                console.info('Arc-Tunnel self-tests passed');
            }

            if (!load()) seed();
            resize();
            drawTracks();
            drawStore();
            drawOps();
            runTests();
            select(clips.find(c => c.id === 'SC-034') || clips[0] || null);
            requestAnimationFrame(loop);
        })();
    </script>
