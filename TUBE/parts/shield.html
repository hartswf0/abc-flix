<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Arc Splice Operator v7 — Mobile Output</title>
    <style>
        :root {
            --w: #fff;
            --b: #000;
            --top: 46px;
            --bot: 40px;
            --alley: 340px
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
            color: #000;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none
        }

        button,
        input {
            font: inherit
        }

        button {
            height: 34px;
            padding: 0 9px;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            font-weight: 1000;
            letter-spacing: .045em;
            text-transform: uppercase;
            border-radius: 0
        }

        button:active,
        button.on {
            background: #000;
            color: #fff
        }

        #app {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            grid-template-rows: var(--top) minmax(0, 1fr) var(--bot);
            background: #fff
        }

        #bar {
            grid-row: 1;
            display: flex;
            align-items: center;
            gap: 5px;
            border-bottom: 3px solid #000;
            padding: 4px 6px;
            min-width: 0;
            overflow: hidden;
            background: #fff
        }

        #brand {
            margin-right: auto;
            font-size: 12px;
            font-weight: 1000;
            letter-spacing: .08em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        #stageWrap {
            grid-row: 2;
            position: relative;
            overflow: hidden;
            background: #fff
        }

        #stage {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #fff;
            cursor: crosshair
        }

        #logicDock {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 7;
            display: grid;
            grid-template-columns: 32px minmax(0, 1fr);
            width: min(82vw, 340px);
            transform: translateX(calc(100% - 32px));
            transition: transform .16s ease;
            background: #fff
        }

        #logicDock.open {
            transform: translateX(0)
        }

        #logicAlley {
            border-left: 3px solid #000;
            border-right: 3px solid #000;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-size: 10px;
            font-weight: 1000;
            letter-spacing: .1em;
            text-transform: uppercase;
            cursor: pointer
        }

        #logicPanel {
            display: grid;
            grid-template-rows: 42px minmax(0, 1fr) 118px;
            min-width: 0;
            overflow: hidden;
            background: #fff;
            border-left: 0
        }

        #logicHead {
            padding: 8px;
            border-bottom: 3px solid #000;
            font-size: 11px;
            font-weight: 1000;
            letter-spacing: .06em;
            text-transform: uppercase;
            line-height: 1.1
        }

        #logicList {
            overflow: auto;
            background: #fff
        }

        .logicLine {
            display: block;
            width: 100%;
            text-align: left;
            border: 0;
            border-bottom: 2px solid #000;
            background: #fff;
            color: #000;
            padding: 8px 9px;
            min-height: 38px;
            font-size: 10px;
            font-weight: 1000;
            line-height: 1.18;
            text-transform: none
        }

        .logicLine.active {
            background: #000;
            color: #fff
        }

        .logicLine .k {
            display: inline-block;
            min-width: 76px;
            font-weight: 1000;
            text-transform: uppercase
        }

        #inspector {
            border-top: 3px solid #000;
            padding: 8px;
            overflow: auto;
            font-size: 10px;
            font-weight: 1000;
            line-height: 1.3;
            background: #fff
        }

        #inspector b {
            display: block;
            margin-bottom: 5px;
            font-size: 11px;
            text-transform: uppercase
        }

        #status {
            grid-row: 3;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border-top: 3px solid #000;
            background: #fff
        }

        .stat {
            min-width: 0;
            padding: 3px 7px;
            border-right: 2px solid #000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .stat:last-child {
            border-right: 0
        }

        .stat span {
            font-size: 8px;
            font-weight: 1000;
            text-transform: uppercase
        }

        .stat output {
            margin-left: 5px;
            font-size: 11px;
            font-weight: 1000
        }

        #pool,
        input[type=file] {
            display: none
        }

        @media(min-width:980px) {
            #app {
                grid-template-columns: minmax(0, 1fr) 360px;
                grid-template-rows: 46px minmax(0, 1fr) 40px
            }

            #bar {
                grid-column: 1/3
            }

            .hideDesk {
                display: none !important
            }

            #stageWrap {
                grid-column: 1;
                grid-row: 2;
                border-right: 3px solid #000
            }

            #logicDock {
                position: relative;
                grid-column: 2;
                grid-row: 2;
                inset: auto;
                width: auto;
                transform: none;
                grid-template-columns: 0 minmax(0, 1fr);
                border-left: 0
            }

            #logicAlley {
                display: none
            }

            #logicPanel {
                grid-template-rows: 48px minmax(0, 1fr) 140px
            }

            #status {
                grid-column: 1/3;
                grid-row: 3
            }

            .logicLine {
                font-size: 11px
            }

            .stat span {
                font-size: 9px
            }

            .stat output {
                font-size: 12px
            }
        }

        @media(max-width:480px) {
            #brand {
                max-width: 23vw;
                font-size: 9px
            }

            button {
                height: 32px;
                padding: 0 5px;
                font-size: 8px
            }

            .hideTiny {
                display: none !important
            }

            #status {
                grid-template-columns: repeat(2, 1fr)
            }

            #logicPanel {
                grid-template-rows: 0 minmax(0, 1fr) 0
            }

            #logicHead,
            #inspector {
                display: none
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <header id="bar">
            <div id="brand">ARC SPLICE</div>
            <button id="playBtn">Play</button>
            <button id="renderBtn">Render</button>
            <button id="edlBtn">EDL</button>
            <button id="saveBtn" class="hideTiny">Save</button>
            <button id="loadProjectBtn" class="hideTiny">Load</button>
            <button id="clearBtn">Clear</button>
        </header>
        <main id="stageWrap">
            <canvas id="stage"></canvas>
            <aside id="logicDock" aria-label="Operational alley">
                <div id="logicAlley">SCRIPT</div>
                <div id="logicPanel">
                    <div id="logicHead">Operational Script<br />click line ⇄ bind object</div>
                    <div id="logicList"></div>
                    <div id="inspector"><b>Bound Object</b>
                        <div>Click a line or object.</div>
                    </div>
                </div>
            </aside>
        </main>
        <footer id="status">
            <div class="stat"><span>time</span><output id="timeOut">00:00:00</output></div>
            <div class="stat"><span>mode</span><output id="modeOut">idle</output></div>
            <div class="stat"><span>video</span><output id="videoOut">none</output></div>
            <div class="stat"><span>splices</span><output id="spliceOut">0</output></div>
            <div class="stat"><span>bound</span><output id="boundOut">none</output></div>
        </footer>
    </div>
    <div id="pool"></div>
    <input id="videoInput" type="file" accept="video/mp4,video/webm,video/ogg,video/quicktime,.mp4,.webm,.ogv,.mov" />
    <input id="projectInput" type="file" accept="application/json,.json" />
    <script>
        (() => {
            'use strict';
            const $ = id => document.getElementById(id), canvas = $('stage'), ctx = canvas.getContext('2d', { alpha: false });
            const pool = $('pool'), stageWrap = $('stageWrap'), logicDock = $('logicDock'), logicList = $('logicList'), inspector = $('inspector');
            const clamp = (v, a, b) => Math.max(a, Math.min(b, v)), TAU = Math.PI * 2;
            let W = 1, H = 1, dpr = 1, last = 0, nextId = 1, M = null;
            const S = { density: 24, time: 0, playing: false, mode: 'idle', drag: null, trim: null, scrub: false, hover: null, bound: 'Transport', loadTrack: -1, hit: [], alleyOpen: false, rendering: false, renderPct: 0, seq: [] };
            const TRACKS = [0, 1, 2, 3].map(i => ({ id: i, name: 'TRACK_' + (i + 1), file: null, vid: null, url: null, status: 'EMPTY', error: null, duration: 24, chunks: 24, cy: 0, thumbs: [], thumbing: false }));
            const logicLines = [
                { id: 'Track', label: 'Track', text: 'Track owns source file, readiness, reel origin, load target, thumbnails, and slice strip.' },
                { id: 'Slice', label: 'Slice', text: 'Slice owns one source second and shows a minimal source-frame thumbnail.' },
                { id: 'Clip', label: 'Clip', text: 'Clip owns slot, layer, duration, head frame, tail frame, and trim handle.' },
                { id: 'Transport', label: 'Transport', text: 'Transport owns playhead, time, active splice, monitor frame, and play state.' },
                { id: 'VideoStrict', label: 'Video', text: 'Uploaded video never becomes proxy. It draws video, DECODING, THUMBS, or UNSUPPORTED.' },
                { id: 'Render', label: 'Render', text: 'Render exports a low-res silent WEBM preview from the real timeline output.' },
                { id: 'Rail', label: 'Rail', text: 'Magnetic rail quantizes placement and trim to one-second slots.' },
                { id: 'Export', label: 'Export', text: 'EDL/project exports reconstruction facts for real finishing.' }
            ];
            function esc(s) { return String(s).replace(/[&<>\"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m])); }
            function buildLogic() { logicList.innerHTML = ''; logicLines.forEach(line => { const b = document.createElement('button'); b.className = 'logicLine'; b.dataset.bind = line.id; b.innerHTML = '<span class="k">' + line.label + '</span>' + line.text; b.onclick = () => bind(line.id); logicList.appendChild(b); }); }
            function bind(id, extra) { S.bound = id; document.querySelectorAll('.logicLine').forEach(el => el.classList.toggle('active', el.dataset.bind === id)); $('boundOut').textContent = id; updateInspector(id, extra); }
            function updateInspector(id, extra) { let html = '<b>' + esc(id) + '</b>'; if (id === 'Track') { html += TRACKS.map(t => `<div>t${t.id + 1}: ${t.status} ${t.file ? esc(t.file) : 'no file'} thumbs=${t.thumbs.filter(Boolean).length}/${t.chunks}</div>`).join(''); } else if (id === 'Clip') { html += '<div>clips=' + S.seq.length + '</div>' + S.seq.map(c => `<div>#${c.id}: t${c.track + 1} src=${c.src}s slot=${c.slot}s layer=${c.layer + 1} dur=${c.dur}s</div>`).join(''); } else if (id === 'Render') { html += `<div>WEBM preview render: ${S.rendering ? Math.round(S.renderPct * 100) + '%' : 'idle'}</div><div>Silent, low-res, mobile-safe preview. Use EDL for finishing.</div>`; } else if (id === 'VideoStrict') { html += TRACKS.map(t => `<div>t${t.id + 1}: ${t.status}${t.error ? ' / ' + esc(t.error) : ''}</div>`).join(''); } else { html += '<div>' + (extra ? esc(extra) : 'Click a line or viewport object. Head/tail thumbnails appear on timeline clips after video loads.') + '</div>'; } inspector.innerHTML = html; }
            function setAlley(open) { S.alleyOpen = open; logicDock.classList.toggle('open', open); } $('logicAlley').onclick = () => setAlley(!S.alleyOpen); logicDock.addEventListener('pointerdown', e => e.stopPropagation());
            function resize() { const r = stageWrap.getBoundingClientRect(); W = Math.max(1, r.width); H = Math.max(1, r.height); dpr = Math.max(1, devicePixelRatio || 1); canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr); canvas.style.width = W + 'px'; canvas.style.height = H + 'px'; ctx.setTransform(dpr, 0, 0, dpr, 0, 0); const mobile = W < 760 || innerWidth < 980, pad = mobile ? 8 : 14; const srcH = clamp(H * (mobile ? 0.27 : 0.28), 108, mobile ? 144 : 205); const seqH = clamp(H * (mobile ? 0.35 : 0.32), 138, mobile ? 196 : 250); const monY = srcH + seqH, monH = Math.max(94, H - monY); const reelX = mobile ? 27 : 40, reelR = mobile ? 13 : 18, stripX = reelX + reelR + 16, endX = W - pad, stripW = Math.max(120, endX - stripX), slotW = stripW / S.density; const trackH = srcH / 4, railY = srcH + (mobile ? 23 : 28), rows = mobile ? 3 : 4, laneTop = srcH + (mobile ? 61 : 70), laneGap = (seqH - (mobile ? 72 : 84)) / rows; M = { mobile, pad, srcH, seqH, monY, monH, reelX, reelR, stripX, endX, stripW, slotW, trackH, railY, rows, laneTop, laneGap }; }
            function fmt(sec) { sec = Math.max(0, sec); const f = Math.floor((sec % 1) * 24), s = Math.floor(sec) % 60, m = Math.floor(sec / 60); return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + ':' + String(f).padStart(2, '0'); }
            function text(str, x, y, align = 'left', size = 10, invert = false) { ctx.fillStyle = invert ? '#fff' : '#000'; ctx.textAlign = align; ctx.textBaseline = 'middle'; ctx.font = '1000 ' + size + 'px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace'; ctx.fillText(String(str), x, y); }
            function line(x1, y1, x2, y2, w = 2) { ctx.strokeStyle = '#000'; ctx.lineWidth = w; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); }
            function fillBlack(x, y, w, h) { ctx.fillStyle = '#000'; ctx.fillRect(x, y, w, h); } function strokeRect(x, y, w, h, lw = 2) { ctx.strokeStyle = '#000'; ctx.lineWidth = lw; ctx.strokeRect(x, y, w, h); } function rect(x, y, w, h, fill = true, lw = 2) { if (fill) { ctx.fillStyle = '#fff'; ctx.fillRect(x, y, w, h); } strokeRect(x, y, w, h, lw); }
            function hatch(x, y, w, h, step = 8) { ctx.save(); ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip(); ctx.fillStyle = '#fff'; ctx.fillRect(x, y, w, h); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; for (let k = -h; k < w + h; k += step) { ctx.beginPath(); ctx.moveTo(x + k, y + h); ctx.lineTo(x + k + h, y); ctx.stroke(); } ctx.restore(); strokeRect(x, y, w, h, 2); }
            function addHit(kind, bind, x, y, w, h, data) { S.hit.push({ kind, bind, x, y, w, h, data }); } function inside(h, x, y) { return x >= h.x && x <= h.x + h.w && y >= h.y && y <= h.y + h.h; } function findHit(x, y) { for (let i = S.hit.length - 1; i >= 0; i--) { const h = S.hit[i]; if (inside(h, x, y)) return h; } return null; }
            function drawThumb(img, x, y, w, h, label) { if (img) { ctx.drawImage(img, x, y, w, h); strokeRect(x, y, w, h, 2); } else { hatch(x, y, w, h, 8); } if (label) { fillBlack(x, y, 18, 14); text(label, x + 9, y + 7, 'center', 8, true); } }
            function drawReel(t, cy) { ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.beginPath(); ctx.ellipse(M.reelX, cy, M.reelR, M.reelR * 1.1, 0, 0, TAU); ctx.stroke(); ctx.beginPath(); ctx.ellipse(M.reelX + 4, cy, M.reelR * .45, M.reelR * .75, 0, 0, TAU); ctx.stroke(); for (let i = 0; i < 8; i++) { const a = i * TAU / 8 + S.time * .08; line(M.reelX + Math.cos(a) * M.reelR * .45, cy + Math.sin(a) * M.reelR * .65, M.reelX + Math.cos(a) * M.reelR * .9, cy + Math.sin(a) * M.reelR, 1.5); } line(M.reelX + M.reelR, cy, M.stripX, cy, 3); addHit('select', 'Track', M.reelX - M.reelR - 5, cy - M.reelR - 5, M.reelR * 2 + 10, M.reelR * 2 + 10, { track: t.id }); }
            function sourceRect(t, si) { const h = M.mobile ? 24 : 28; return { x: M.stripX + si * M.slotW, y: t.cy - h / 2, w: Math.max(5, M.slotW), h }; }
            function drawSource() { rect(0, 0, W, M.srcH, true, 3); line(0, M.srcH, W, M.srcH, 3); for (const t of TRACKS) { t.cy = t.id * M.trackH + M.trackH / 2; const cy = t.cy; drawReel(t, cy); const load = { x: 4, y: cy - 15, w: M.mobile ? 46 : 58, h: 30 }; if (t.status === 'READY') { fillBlack(load.x, load.y, load.w, load.h); strokeRect(load.x, load.y, load.w, load.h, 2); text('READY', load.x + load.w / 2, cy, 'center', M.mobile ? 8 : 9, true); } else { t.status === 'EMPTY' ? rect(load.x, load.y, load.w, load.h, true, 2) : hatch(load.x, load.y, load.w, load.h, 7); text(t.status === 'EMPTY' ? 'LOAD' : t.status, load.x + load.w / 2, cy, 'center', M.mobile ? 7 : 8); } addHit('load', 'Track', load.x, load.y, load.w, load.h, { track: t.id }); const name = t.file ? t.file.replace(/\.[^.]+$/, '').slice(0, M.mobile ? 8 : 14) : t.name; text(name, M.stripX, cy - (M.mobile ? 23 : 28), 'left', M.mobile ? 9 : 11); text(t.thumbing ? 'THUMBS' : t.status, M.endX, cy - (M.mobile ? 23 : 28), 'right', M.mobile ? 8 : 10); line(M.stripX, cy, M.endX, cy, 1); const max = Math.min(S.density, t.chunks); for (let si = 0; si < max; si++) { const r = sourceRect(t, si); if (t.thumbs[si]) drawThumb(t.thumbs[si], r.x, r.y, r.w, r.h, null); else if (t.status === 'EMPTY') hatch(r.x, r.y, r.w, r.h, 8); else rect(r.x, r.y, r.w, r.h, true, 2); if (r.w > 17) text(si, r.x + r.w / 2, cy, 'center', M.mobile ? 7 : 8, t.thumbs[si] ? true : false); addHit('slice', 'Slice', r.x, r.y, r.w, r.h, { track: t.id, si }); } } }
            function drawRail() { const y = M.railY; rect(M.stripX, y - 16, M.stripW, 32, true, 3); for (let i = 0; i <= S.density; i++) { const x = M.stripX + i * M.slotW; line(x, y - 16, x, y + 16, i % 4 === 0 ? 3 : 2); if (i % 4 === 0 || (!M.mobile && i % 2 === 0)) text(i, x, y + 27, 'center', M.mobile ? 8 : 9); } addHit('scrub', 'Rail', M.stripX, y - 24, M.stripW, 48, {}); }

            function drawSequence() { rect(0, M.srcH, W, M.seqH, true, 3); line(0, M.srcH, W, M.srcH, 3); line(0, M.srcH + M.seqH, W, M.srcH + M.seqH, 3); drawRail(); for (let r = 0; r < M.rows; r++) { const y = M.laneTop + r * M.laneGap; line(M.stripX, y, M.endX, y, 2); text('L' + (r + 1), M.stripX - 8, y, 'right', M.mobile ? 9 : 10); addHit('select', 'Rail', M.stripX, y - 10, M.stripW, 20, { layer: r }); } for (const c of S.seq) drawClip(c, S.bound === 'Clip' || S.hover === c.id); if (S.drag) { const d = S.drag, c = d.clip, gx = d.x - d.off, slot = clamp(Math.round((gx - M.stripX) / M.slotW), 0, S.density - c.dur), layer = clamp(Math.floor((d.y - (M.laneTop - M.laneGap / 2)) / M.laneGap), 0, M.rows - 1), b = clipBox({ ...c, slot, layer }); hatch(b.x, b.y, b.w, b.h, 9); text('DROP', b.cx, b.cy, 'center', M.mobile ? 9 : 11); line(M.stripX + slot * M.slotW, M.srcH, M.stripX + slot * M.slotW, M.srcH + M.seqH, 3); line(M.stripX + (slot + c.dur) * M.slotW, M.srcH, M.stripX + (slot + c.dur) * M.slotW, M.srcH + M.seqH, 3); } }
