<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Sensorama / VR Futures Cone Static Field</title>
<style>
  :root{
    --bg:#f2f1ec;
    --fg:#1b1b1b;
    --muted:rgba(27,27,27,.52);
    --faint:rgba(27,27,27,.13);
    --thin:rgba(27,27,27,.075);
    --hot:#d50000;

    --possible:rgba(196,212,196,.52);
    --plausible:rgba(154,192,148,.54);
    --probable:rgba(111,205,75,.48);
    --preferable:rgba(190,235,45,.58);

    --s-possible:#8c988a;
    --s-plausible:#648b5e;
    --s-probable:#3f8a2e;
    --s-preferable:#8a9818;

    --pressure:#b23a2e;
    --source:#9b7a10;
    --function:#0e6b66;
    --form:#111111;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;border-radius:0!important}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Courier New",monospace}
  body{touch-action:none}
  #app{position:fixed;inset:0;background:var(--bg);overflow:hidden}
  svg{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:crosshair}
  .hit{pointer-events:all;cursor:crosshair;transition:stroke-width .12s,opacity .12s,fill-opacity .12s}
  .hit:hover,.active{stroke:var(--hot)!important;stroke-width:3!important;opacity:1!important;fill-opacity:.92!important}
  .label{font-weight:900;letter-spacing:.065em;text-transform:uppercase;fill:var(--fg)}
  .small{font-weight:900;letter-spacing:.08em;text-transform:uppercase;fill:var(--muted)}
  .micro{font-weight:900;letter-spacing:.08em;text-transform:uppercase;fill:rgba(27,27,27,.36)}
  #readout{
    position:absolute;right:44px;top:34px;z-index:4;width:min(430px,calc(100vw - 88px));
    pointer-events:none;color:var(--fg);text-transform:uppercase;letter-spacing:.055em;
    text-align:right;opacity:.82;
  }
  #readout .meta{font-size:9px;font-weight:900;color:rgba(213,0,0,.78);margin-bottom:4px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
  #readout .name{font-size:14px;font-weight:900;line-height:1.05;margin-bottom:4px;max-width:430px}
  #readout .text{font-size:10.5px;line-height:1.28;font-weight:800;color:rgba(27,27,27,.46);text-transform:none;letter-spacing:0;max-width:430px}
  #hint{display:none}
  @media(max-width:760px){
    #readout{left:14px;right:14px;top:12px;width:auto;text-align:left;opacity:.76}
    #readout .meta{font-size:8px;margin-bottom:3px;gap:7px;justify-content:flex-start}
    #readout .name{font-size:11px;margin-bottom:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #readout .text{display:none}
  }
</style>
</head>
<body>
<div id="app">
  <svg id="svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet" aria-label="Sensorama VR futures cone density wall"></svg>
  <div id="readout">
    <div class="meta"><span id="rTier">Preferable</span><span id="rUnit">Form</span><span id="rPhase">Wheel</span><span id="rDensity">16 units</span></div>
    <div class="name" id="rName">Embodied Oral History Booth</div>
    <div class="text" id="rText">Memories become routes, smells, sounds, surfaces, weather, posture, and bodily rhythm.</div>
  </div>
</div>
<script>
(function(){
  'use strict';
  const NS='http://www.w3.org/2000/svg';
  const svg=document.getElementById('svg');
  const rTier=document.getElementById('rTier');
  const rUnit=document.getElementById('rUnit');
  const rPhase=document.getElementById('rPhase');
  const rDensity=document.getElementById('rDensity');
  const rName=document.getElementById('rName');
  const rText=document.getElementById('rText');
  const TWO=Math.PI*2;

  const unitOrder=['pressure','source','function','form'];
  const unitLabel={pressure:'Pressure',source:'Source',function:'Function',form:'Form'};
  const unitColor={pressure:'var(--pressure)',source:'var(--source)',function:'var(--function)',form:'var(--form)'};

  const cardPools={
    pressure:[
      ['Optical Supremacy','Eye-only media mistakes visual persuasion for embodied presence.'],
      ['Television Compression','Domestic rectangles shrink public spectacle into furniture-scaled attention.'],
      ['Disembodied Spectatorship','The viewer believes in worlds while remaining physically outside the scene.'],
      ['Flat-Screen Fatigue','Screens multiply, but interaction stays glassy, visual, repetitive, and bodily thin.'],
      ['Failed Presence','Higher resolution promises being-there while withholding sensory consequence.'],
      ['Novelty Arms Race','Industries escalate spectacle through widescreen, 3D, smell, motion, and vibration.'],
      ['Sensory Amputation','Smell, wind, vibration, temperature, balance, and peripheral cues vanish from screen media.'],
      ['Urban Speed Anxiety','Highways, motorcycles, elevators, and cities create rhythms static media cannot hold.'],
      ['Training Without Risk','Dangerous bodily skills must be rehearsed before real exposure.'],
      ['Passive Consumer Body','The spectator is seated, monetized, managed, and rarely allowed to participate.'],
      ['Coin-Op Attention','Public machines need compact, repeatable, durable, high-intensity experience.'],
      ['Format Obsolescence','Immersive formats die when too expensive, fragile, or unsupported.'],
      ['Mechanical Complexity','Immersion requires delicate synchronization across air, scent, sound, image, motion, and enclosure.'],
      ['Content Scarcity','New machines fail without production pipelines and authors trained for the format.'],
      ['Simulator Sickness Gap','The body rebels when visual motion and physical feedback disagree.'],
      ['Immersion Without Memory','Spectacle impresses briefly but fails without sensory depth.']
    ],
    source:[
      ['Cinerama Wrap','Curved expanded visual fields pull attention into peripheral vision.'],
      ['Nickelodeon Cabinet','Cinema becomes intimate, mechanical, paid, repeatable, and individually entered.'],
      ['Kinetoscope Peepshow','Viewing becomes leaning into a machine rather than facing a distant screen.'],
      ['Fairground Ride','Spectacle, bodily motion, danger, enclosure, and timing become one attraction.'],
      ['Link Trainer','Mechanical simulation teaches dangerous skills before actual flight.'],
      ['Cockpit Interface','Perception, control, decision, motion, and feedback are fused.'],
      ['Smell-O-Vision','Aroma becomes narrative information and atmospheric evidence.'],
      ['Stereo Sound Stage','Directional sound anchors the body inside simulated place.'],
      ['Automobile Windshield','Forward motion, road vibration, airflow, and changing perspective frame modernity.'],
      ['Travelogue Cinema','Mediated travel substitutes for visiting route, city, and landscape.'],
      ['Arcade Cabinet','Spectacle compresses into a short durable public machine.'],
      ['Theme Park Control','Image, sound, motion, scent, lighting, enclosure, and crowd flow synchronize.'],
      ['Scientific Demo','The machine itself proves a future medium can exist.'],
      ['Total Sensation Theater','Stage, ride, theater, and cabinet act on the whole body.'],
      ['Military Simulation','Controlled illusion prepares bodies for operational environments.'],
      ['Haptic Craft Machinery','Levers, vents, motors, seats, lenses, gears, pedals, and feedback return.']
    ],
    function:[
      ['Somatic Belief','The body believes when several senses corroborate the same event.'],
      ['Peripheral Presence','Immersion begins at the edge of vision and bodily orientation.'],
      ['Sensory Corroboration','Wind, smell, vibration, sound, and image confirm consequence.'],
      ['Safe Risk Rehearsal','Controlled simulation teaches danger without injury or material loss.'],
      ['Embodied Spectatorship','The viewer becomes rider, passenger, trainee, witness, operator, or participant.'],
      ['Atmospheric Memory','Places become memorable as pressure, scent, speed, vibration, weather, and texture.'],
      ['Mechanical Trust','The user trusts partly because the machine visibly works on the body.'],
      ['Situated Learning','Knowledge arrives through position, motion, friction, timing, orientation, and feedback.'],
      ['Sensory Literacy','Users learn to read scent, airflow, vibration, spatial audio, and texture.'],
      ['Kinesthetic Narrative','Story becomes movement through space, resistance, speed, and transition.'],
      ['Environmental Attention','Media restores attention to air, surface, temperature, terrain, and infrastructure.'],
      ['Operational Imagination','People imagine systems by inhabiting conditions rather than reading diagrams.'],
      ['Public Demonstration','A prototype becomes a cultural argument people can test and remember.'],
      ['Format Consciousness','Users notice how every medium selects some senses and excludes others.'],
      ['Interface Grounding','Controls, seats, vents, motors, pedals, and housings make abstraction tangible.'],
      ['Multisensory Archive','History becomes atmosphere, movement, scent, sound, and bodily orientation.']
    ],
    form:[
      ['Peripheral Vision Theater','A small curved room where edge vision becomes the main interface.'],
      ['Sensorama Archive Booth','A museum kiosk replays place through image, sound, wind, scent, vibration, and posture.'],
      ['Urban Ride Simulator','A seated rig reconstructs motorcycle, bus, train, sidewalk, elevator, and highway movement.'],
      ['Scented Documentary Station','A nonfiction booth treats gasoline, salt air, rain, dust, and oil as evidence.'],
      ['Mechanical VR Cabinet','A non-headset machine with motors, vents, knobs, pedals, transducers, lenses, and seat feedback.'],
      ['Multisensory Classroom Pod','A teaching station for history, geography, infrastructure, ecology, and media studies.'],
      ['Simulator Literacy Lab','Students compare film, cockpit, arcade, theme-park, headset, and web presence.'],
      ['Climate Atmosphere Chamber','Heat, humidity, wind, vibration, sound, and smell teach environmental change.'],
      ['Coin-Op Future Theater','One body, one coin, one intense designed atmosphere at a time.'],
      ['Haptic Film Player','Scenes map to vibration, airflow, scent cards, lighting, audio, and seat motion.'],
      ['Total Cinema Toolkit','A maker kit: fan, transducer, scent strip, stereo field, cues, pedal, sequencer.'],
      ['Media Archaeology Cabinet','Obsolete immersive technologies become living design patterns.'],
      ['Training Without Danger Rig','A compact simulator for drills, machine operation, evacuation, and field preparation.'],
      ['Peripheral Cinema Lab','A curved-screen lab focused on edge vision and environmental awareness.'],
      ['Embodied Oral History Booth','Memories become routes, smells, sounds, surfaces, weather, posture, and bodily rhythm.'],
      ['Sensorama Single-File Rig','A browser prototype sequences video, audio, fan cues, vibration, scent prompts, and logs.']
    ]
  };

  // Critical UX fix: density grows toward preferred. Possible is sparse; preferred is richly resolved.
  const tiers=[
    {key:'possible',label:'Possible',depth:1,color:'var(--possible)',stroke:'var(--s-possible)'},
    {key:'plausible',label:'Plausible',depth:2,color:'var(--plausible)',stroke:'var(--s-plausible)'},
    {key:'probable',label:'Probable',depth:3,color:'var(--probable)',stroke:'var(--s-probable)'},
    {key:'preferable',label:'Preferable',depth:4,color:'var(--preferable)',stroke:'var(--s-preferable)'}
  ];
  tiers.forEach((tier,ti)=>{
    tier.cards=[];
    unitOrder.forEach(unit=>{
      for(let j=0;j<tier.depth;j++){
        const idx=ti*4+j;
        const src=cardPools[unit][idx % cardPools[unit].length];
        tier.cards.push({unit,title:src[0],desc:src[1],index:j});
      }
    });
  });

  const state={phase:.50,focus:{tier:'preferable',card:tiers[3].cards[15]},playing:false,dragging:false,last:performance.now(),mobile:false};

  function el(tag,attrs){const n=document.createElementNS(NS,tag);Object.entries(attrs||{}).forEach(([k,v])=>n.setAttribute(k,String(v)));return n;}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function lerp(a,b,t){return a+(b-a)*t;}
  function stage(t,a,b){return clamp((t-a)/(b-a),0,1);}
  function polar(cx,cy,r,a){return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}
  function path(pts,close){return pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(2)+','+p.y.toFixed(2)).join(' ')+(close?' Z':'');}
  function sectorPath(cx,cy,r,a0,a1){const pts=[{x:cx,y:cy}],steps=Math.max(8,Math.ceil(Math.abs(a1-a0)/TWO*80));for(let i=0;i<=steps;i++)pts.push(polar(cx,cy,r,lerp(a0,a1,i/steps)));return path(pts,true);}
  function bandPath(cx,cy,r0,r1,a0,a1){const pts=[],steps=Math.max(8,Math.ceil(Math.abs(a1-a0)/TWO*96));for(let i=0;i<=steps;i++)pts.push(polar(cx,cy,r1,lerp(a0,a1,i/steps)));for(let i=steps;i>=0;i--)pts.push(polar(cx,cy,r0,lerp(a0,a1,i/steps)));return path(pts,true);}
  function conePath(ax,ay,ex,half){return `M${ax},${ay} L${ex},${ay-half} L${ex},${ay+half} Z`;}
  function triPath(x,y,w,h,up){return up?`M${x},${y+h} L${x+w/2},${y} L${x+w},${y+h} Z`:`M${x},${y} L${x+w/2},${y+h} L${x+w},${y} Z`;}
  function text(x,y,s,size,anchor,fill,weight,cls){const n=el('text',{x,y,'font-size':size||12,'text-anchor':anchor||'start',fill:fill||'var(--fg)','font-weight':weight||900,'font-family':'ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace','letter-spacing':'.06em'});if(cls)n.setAttribute('class',cls);n.textContent=s;svg.appendChild(n);return n;}
  function line(x1,y1,x2,y2,stroke,width,dash){svg.appendChild(el('line',{x1,y1,x2,y2,stroke:stroke||'var(--faint)','stroke-width':width||1,'stroke-dasharray':dash||'','vector-effect':'non-scaling-stroke'}));}
  function phaseName(){const p=state.phase;if(p<.28)return 'Layers';if(p<.55)return 'Strips';if(p<.78)return 'Wheel';return 'Cone';}
  function layout(){
    state.mobile=window.innerWidth<760;
    if(state.mobile){
      return {w:900,h:1440,titleX:42,titleY:78,rows:[255,390,525,660],circleX:150,barX:320,barW:455,barH:56,wheelX:450,wheelY:940,wheelR:182,coneApexX:110,coneEndX:812,coneY:805,coneH:285};
    }
    return {w:1920,h:1080,titleX:64,titleY:105,rows:[270,420,570,720],circleX:205,barX:395,barW:560,barH:72,wheelX:1120,wheelY:525,wheelR:210,coneApexX:1415,coneEndX:1865,coneY:525,coneH:350};
  }
  function isFocus(tier,card){return state.focus.tier===tier.key && state.focus.card===card;}
  function setFocus(tier,card){state.focus={tier:tier.key,card};rTier.textContent=tier.label;rUnit.textContent=unitLabel[card.unit];rPhase.textContent=phaseName();rDensity.textContent=`${tier.cards.length} units`;rName.textContent=card.title;rText.textContent=card.desc;draw();}
  function attach(node,tier,card){node.classList.add('hit');if(isFocus(tier,card))node.classList.add('active');node.addEventListener('pointerenter',()=>{rTier.textContent=tier.label;rUnit.textContent=unitLabel[card.unit];rDensity.textContent=`${tier.cards.length} units`;rName.textContent=card.title;rText.textContent=card.desc;});node.addEventListener('pointerdown',e=>{e.stopPropagation();setFocus(tier,card);});}

  function drawIcon(parent,x,y,scale,type,stroke,op,rot){
    const g=el('g',{transform:`translate(${x} ${y}) rotate(${rot||0}) scale(${scale})`,opacity:op==null?1:op});
    const common={fill:'none',stroke:stroke||'var(--fg)','stroke-width':2.25,'stroke-linecap':'round','stroke-linejoin':'round','vector-effect':'non-scaling-stroke'};
    if(type==='pressure'){
      g.appendChild(el('path',{...common,d:'M-4 -24 L-20 4 H-7 L-13 27 L20 -11 H5 L11 -24 Z'}));
    }else if(type==='source'){
      g.appendChild(el('path',{...common,d:'M-24 0 A24 24 0 1 0 -3 -23'}));
      g.appendChild(el('path',{...common,d:'M-3 -23 L-5 -7 L-18 -15'}));
    }else if(type==='function'){
      g.appendChild(el('circle',{...common,cx:0,cy:0,r:25}));
      g.appendChild(el('circle',{...common,cx:0,cy:0,r:14}));
      g.appendChild(el('circle',{...common,cx:0,cy:0,r:4,fill:stroke||'var(--fg)'}));
    }else{
      g.appendChild(el('rect',{...common,x:-18,y:-24,width:36,height:48}));
      g.appendChild(el('rect',{...common,x:-8,y:-14,width:16,height:14}));
      g.appendChild(el('path',{...common,d:'M-8 11 H8 M-12 20 H12'}));
    }
    parent.appendChild(g);return g;
  }

  function drawTitle(L){
    text(L.titleX,L.titleY,'SENSORAMA / VR',state.mobile?26:36,'start','var(--fg)',900,'label');
    text(L.titleX,L.titleY+(state.mobile?32:44),'FUTURES CONE',state.mobile?26:36,'start','var(--fg)',900,'label');
  }

  function drawLayerRows(L){
    const stripIn=stage(state.phase,.08,.45);
    const fadeOut=.25+0.75*(1-stage(state.phase,.68,.96));
    tiers.forEach((tier,ti)=>{
      const y=L.rows[ti];
      text(state.mobile?42:64,y+7,tier.label,state.mobile?17:23,'start','var(--fg)',900,'label');
      text(state.mobile?42:64,y+29,`${tier.cards.length} units`,state.mobile?8:10,'start','rgba(27,27,27,.38)',900,'micro');
      const circleR=state.mobile?48:58;
      svg.appendChild(el('circle',{cx:L.circleX,cy:y,r:circleR,fill:'none',stroke:'rgba(27,27,27,.38)','stroke-width':1.1,opacity:fadeOut}));
      const n=tier.cards.length;
      tier.cards.forEach((card,i)=>{
        const a0=-Math.PI/2+i*TWO/n, a1=-Math.PI/2+(i+1)*TWO/n;
        const seg=el('path',{d:sectorPath(L.circleX,y,circleR-2,a0,a1),fill:tier.color,stroke:isFocus(tier,card)?'var(--hot)':'rgba(27,27,27,.28)','stroke-width':isFocus(tier,card)?3:.8,'opacity':isFocus(tier,card)?1:.32+.42*fadeOut,'vector-effect':'non-scaling-stroke'});
        attach(seg,tier,card);svg.appendChild(seg);
      });
      const focusedCard=state.focus.tier===tier.key?state.focus.card:tier.cards[tier.cards.length-1];
      drawIcon(svg,L.circleX,y,state.mobile?.30:.36,focusedCard.unit,isFocus(tier,focusedCard)?'var(--hot)':'rgba(27,27,27,.42)',.65*fadeOut,stripIn*180);
      line(L.circleX+circleR+32,y,L.barX-30,y,'rgba(27,27,27,.24)',1,'');
      text(L.circleX+circleR+44,y+5,'→',state.mobile?18:22,'middle','var(--fg)',900,'label');

      const x=L.barX, h=L.barH, w=L.barW/n, top=y-h/2;
      svg.appendChild(el('rect',{x:x,y:top,width:L.barW,height:h,fill:'none',stroke:'rgba(27,27,27,.13)','stroke-width':1,opacity:fadeOut}));
      // Unit group dividers: P/S/F/M categories inside every tier, without label clutter.
      for(let g=1;g<4;g++){
        const gx=x+(L.barW/4)*g;
        line(gx,top-5,gx,top+h+5,'rgba(27,27,27,.08)',1,'3 7');
      }
      tier.cards.forEach((card,i)=>{
        const reveal=clamp(stripIn*1.25,0,1);
        const tri=el('path',{d:triPath(x+i*w,top,w,h,i%2===0),fill:tier.color,stroke:isFocus(tier,card)?'var(--hot)':'rgba(27,27,27,.22)','stroke-width':isFocus(tier,card)?3:.65,'opacity':isFocus(tier,card)?1:(.10+.68*reveal)*fadeOut,'vector-effect':'non-scaling-stroke'});
        attach(tri,tier,card);svg.appendChild(tri);
        const miniY=i%2===0?top+h-11:top+11;
        line(x+i*w+w*.20,miniY,x+i*w+w*.80,miniY,unitColor[card.unit],isFocus(tier,card)?2.6:1.4,'');
      });
    });
  }

  function drawConnectors(L){
    const c=stage(state.phase,.20,.64);
    if(c<=.02)return;
    tiers.forEach((tier,ti)=>{
      const y=L.rows[ti];
      const sx=L.barX+L.barW+22, sy=y;
      const ex=L.wheelX-L.wheelR+12, ey=L.wheelY+(ti-1.5)*(state.mobile?24:36);
      const mx=(sx+ex)/2;
      svg.appendChild(el('path',{d:`M${sx},${sy} Q${mx},${lerp(sy,ey,.5)-26*c} ${ex},${ey}`,fill:'none',stroke:`rgba(27,27,27,${.04+.18*c})`,'stroke-width':1,'stroke-dasharray':'5 9','vector-effect':'non-scaling-stroke'}));
    });
  }

  function drawWheel(L){
    const wheelIn=stage(state.phase,.32,.76);
    if(wheelIn<=.02)return;
    const cX=L.wheelX,cY=L.wheelY,R=L.wheelR;
        svg.appendChild(el('circle',{cx:cX,cy:cY,r:R,fill:'rgba(255,255,255,.05)',stroke:'rgba(27,27,27,.24)','stroke-width':1.3,opacity:.15+.85*wheelIn}));
    const inner=40;
    const ringW=(R-inner)/tiers.length;
    tiers.forEach((tier,ti)=>{
      const r0=inner+ti*ringW+4;
      const r1=inner+(ti+1)*ringW-4;
      const n=tier.cards.length;
      const rot=state.phase*.20+ti*.035;
      tier.cards.forEach((card,i)=>{
        const a0=-Math.PI/2+rot+i*TWO/n, a1=-Math.PI/2+rot+(i+1)*TWO/n;
        const seg=el('path',{d:bandPath(cX,cY,r0,r1,a0,a1),fill:tier.color,stroke:isFocus(tier,card)?'var(--hot)':'rgba(27,27,27,.18)','stroke-width':isFocus(tier,card)?3:.55,'opacity':isFocus(tier,card)?1:.22+.48*wheelIn,'vector-effect':'non-scaling-stroke'});
        attach(seg,tier,card);svg.appendChild(seg);
      });
    });
    svg.appendChild(el('circle',{cx:cX,cy:cY,r:38,fill:'var(--bg)',stroke:'rgba(27,27,27,.34)','stroke-width':1.3}));
    drawIcon(svg,cX,cY,.50,state.focus.card.unit,'rgba(27,27,27,.72)',.92,state.phase*180);
  }

  function drawCone(L){
    const coneIn=stage(state.phase,.58,1);
    const ax=L.coneApexX, ay=L.coneY, ex=L.coneEndX, H=L.coneH;
    line(ax,ay-H-30,ax,ay+H+30,'rgba(27,27,27,.14)',1,'5 7');
            
    // Cone width remains futures logic; density is card logic. Possible is broad but sparse. Preferred is narrow but most resolved.
    tiers.slice().reverse().forEach((tier,idx)=>{
      const widthRank=4-idx;
      const half=H*(widthRank/4);
      const cone=el('path',{d:conePath(ax,ay,ex,half),fill:tier.color,stroke:tier.stroke,'stroke-width':1.0,'stroke-opacity':.30,opacity:.20+.44*coneIn,'vector-effect':'non-scaling-stroke'});
      svg.appendChild(cone);
      text(ex-6,ay-half+16,tier.label,state.mobile?9:11,'end','rgba(27,27,27,.36)',900,'micro');
    });

    tiers.forEach((tier,ti)=>{
      const half=H*((4-ti)/4);
      const n=tier.cards.length;
      tier.cards.forEach((card,i)=>{
        const t0=(i+.12)/n;
        const t1=(i+.88)/n;
        const x0=ax+(ex-ax)*t0*coneIn;
        const x1=ax+(ex-ax)*t1*coneIn;
        const y0a=ay-half*t0, y0b=ay+half*t0;
        const y1a=ay-half*t1, y1b=ay+half*t1;
        if(coneIn>.03){
          const p=el('path',{d:path([{x:x0,y:y0a},{x:x1,y:y1a},{x:x1,y:y1b},{x:x0,y:y0b}],true),fill:tier.color,stroke:isFocus(tier,card)?'var(--hot)':unitColor[card.unit],'stroke-width':isFocus(tier,card)?3:.45,'stroke-opacity':isFocus(tier,card)?1:.28,'opacity':isFocus(tier,card)?1:.14+.44*coneIn,'vector-effect':'non-scaling-stroke'});
          attach(p,tier,card);svg.appendChild(p);
        }
      });
    });
  }

  function draw(){
    const L=layout();
    svg.innerHTML='';
    svg.setAttribute('viewBox',`0 0 ${L.w} ${L.h}`);
    svg.appendChild(el('rect',{x:0,y:0,width:L.w,height:L.h,fill:'transparent'}));
    drawTitle(L);
    drawLayerRows(L);
    drawConnectors(L);
    drawWheel(L);
    drawCone(L);
    rPhase.textContent=phaseName();
  }

  function scrub(clientX){const rect=svg.getBoundingClientRect();state.phase=clamp((clientX-rect.left)/rect.width,0,1);state.playing=false;draw();}
  svg.addEventListener('pointerdown',e=>{state.dragging=true;svg.setPointerCapture(e.pointerId);scrub(e.clientX);});
  svg.addEventListener('pointermove',e=>{if(state.dragging)scrub(e.clientX);});
  svg.addEventListener('pointerup',e=>{state.dragging=false;try{svg.releasePointerCapture(e.pointerId);}catch(_){};});
  svg.addEventListener('pointercancel',()=>{state.dragging=false;});
  window.addEventListener('resize',draw);
  window.addEventListener('keydown',e=>{if(e.key==='ArrowRight'){state.phase=clamp(state.phase+.04,0,1);state.playing=false;draw();} if(e.key==='ArrowLeft'){state.phase=clamp(state.phase-.04,0,1);state.playing=false;draw();}});

  setFocus(tiers[3],tiers[3].cards[15]);
  draw();
})();
</script>
</body>
</html>
