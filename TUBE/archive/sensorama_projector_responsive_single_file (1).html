<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sensorama Projector · Alive Interface</title>
<style>
  :root{
    --bg:#020303;
    --ink:#f4f2ec;
    --muted:rgba(244,242,236,.42);
    --line:rgba(244,242,236,.14);
    --line2:rgba(244,242,236,.08);
    --green:#d7ff1d;
    --orange:#ff5a05;
    --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
  }

  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--ink);font-family:var(--mono)}
  body{overflow:hidden}
  button{font:inherit;color:inherit;background:transparent;border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}

  .app{
    position:relative;
    width:100vw;
    height:100dvh;
    overflow:hidden;
    background:
      radial-gradient(circle at 28% 45%,rgba(125,160,8,.14),transparent 34%),
      radial-gradient(circle at 82% 58%,rgba(255,90,5,.045),transparent 25%),
      linear-gradient(180deg,#050606,#000);
  }

  #field{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
    z-index:1;
    touch-action:none;
  }

  .desktop-ui{
    position:relative;
    z-index:3;
    height:100%;
    display:grid;
    grid-template-columns:minmax(720px,1fr) minmax(460px,520px);
    gap:26px;
    padding:26px;
    max-width:1580px;
    margin:0 auto;
    pointer-events:none;
  }

  .desktop-stage{
    border:1px solid var(--line2);
    border-radius:28px;
    background:linear-gradient(180deg,rgba(255,255,255,.018),rgba(255,255,255,.004));
    min-width:0;
    position:relative;
    overflow:hidden;
  }

  .panel{
    align-self:center;
    height:min(760px,calc(100dvh - 52px));
    min-height:560px;
    border:1px solid var(--line);
    border-radius:22px;
    background:linear-gradient(180deg,rgba(12,13,13,.92),rgba(4,5,5,.96));
    box-shadow:0 22px 80px rgba(0,0,0,.42);
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:14px;
    pointer-events:auto;
  }

  .title{
    margin:0;
    font-size:clamp(42px,4vw,58px);
    line-height:.95;
    font-weight:950;
    letter-spacing:.055em;
    text-transform:uppercase;
    text-shadow:0 4px 18px rgba(244,242,236,.08);
  }

  .subtitle{
    margin:9px 0 0;
    color:var(--orange);
    font-size:14px;
    font-weight:950;
    letter-spacing:.13em;
    text-transform:uppercase;
  }

  .status{
    min-height:18px;
    color:var(--muted);
    font-size:11px;
    font-weight:900;
    letter-spacing:.11em;
    text-transform:uppercase;
  }

  .tabs{
    height:48px;
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1.08fr;
    border:1px solid var(--line);
    border-radius:11px;
    background:rgba(255,255,255,.015);
    overflow:visible;
    pointer-events:auto;
  }

  .tab{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    border-right:1px solid var(--line);
    color:var(--muted);
    font-size:11px;
    font-weight:950;
    letter-spacing:.075em;
    text-transform:uppercase;
    transition:color .12s ease,background .12s ease,border-color .12s ease;
  }
  .tab:last-child{border-right:0}
  .tab:hover,.tab:focus-visible{color:var(--green);outline:none}
  .tab.active{
    color:var(--green);
    border:1.5px solid var(--green);
    margin:-1px;
    border-radius:11px;
    background:rgba(215,255,29,.045);
    box-shadow:0 0 20px rgba(215,255,29,.20);
    z-index:2;
  }
  .tab.active::after{
    content:"";
    position:absolute;
    bottom:-9px;
    left:50%;
    transform:translateX(-50%);
    border-left:8px solid transparent;
    border-right:8px solid transparent;
    border-top:9px solid var(--green);
  }

  .rows{display:grid;gap:9px;margin-top:0}
  .row{
    min-height:66px;
    border:1px solid var(--line);
    border-radius:10px;
    background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.006));
    display:grid;
    grid-template-columns:82px 1fr 18px;
    align-items:center;
    gap:12px;
    padding:0 16px;
    text-align:left;
    transition:transform .12s ease,border-color .12s ease,background .12s ease,box-shadow .12s ease;
  }
  .row:hover,.row:focus-visible,.row.active{border-color:rgba(215,255,29,.55);background:rgba(215,255,29,.04);box-shadow:0 0 18px rgba(215,255,29,.08);outline:none}
  .row:active{transform:scale(.985)}
  .k{color:var(--green);font-size:13px;font-weight:950;letter-spacing:.11em;text-transform:uppercase}
  .v{font-size:17px;font-weight:850;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chev{color:var(--green);font-size:25px;line-height:1}

  .cta{
    margin-top:auto;
    min-height:68px;
    border:2px solid var(--orange);
    border-radius:12px;
    color:var(--orange);
    background:linear-gradient(180deg,rgba(255,90,5,.12),rgba(255,90,5,.035));
    box-shadow:0 0 26px rgba(255,90,5,.22),inset 0 0 20px rgba(255,90,5,.06);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    font-size:20px;
    font-weight:950;
    letter-spacing:.13em;
    text-transform:uppercase;
    transition:transform .12s ease,filter .12s ease,box-shadow .12s ease;
  }
  .cta:hover,.cta:focus-visible{filter:brightness(1.2);outline:none;box-shadow:0 0 34px rgba(255,90,5,.32),inset 0 0 20px rgba(255,90,5,.08)}
  .cta:active{transform:scale(.985)}
  .cta::before,.cta::after{
    content:"";
    width:25px;
    height:25px;
    opacity:.75;
    background-image:radial-gradient(var(--orange) 1.2px,transparent 1.2px);
    background-size:7px 7px;
  }
  .arrow{font-size:1.25em;line-height:1}

  .mobile-ui{display:none}

  @media (max-width:1100px){
    .desktop-ui{grid-template-columns:minmax(600px,1fr) 420px;padding:20px;gap:20px}
    .panel{padding:20px}
    .title{font-size:42px}
    .v{font-size:15px}
  }

  @media (max-width:900px){
    body{overflow:hidden}
    .app{height:100dvh;overflow:hidden}
    .desktop-ui{display:none}
    .mobile-ui{
      position:relative;
      z-index:3;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      padding:max(18px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));
      gap:9px;
      max-width:620px;
      margin:0 auto;
      pointer-events:none;
    }
    .mobile-head{padding:2px 2px 0;pointer-events:none}
    .mobile-ui .title{font-size:clamp(38px,11vw,58px);white-space:nowrap}
    .mobile-ui .subtitle{font-size:clamp(13px,4vw,18px);white-space:nowrap}
    .mobile-stage{height:clamp(245px,38dvh,350px);pointer-events:none}
    .mobile-ui .tabs{height:48px;margin-top:0;pointer-events:auto}
    .mobile-ui .tab{font-size:clamp(9px,2.7vw,13px);letter-spacing:.06em}
    .mobile-ui .rows{gap:7px;margin-top:8px;pointer-events:auto}
    .mobile-ui .row{min-height:52px;grid-template-columns:78px 1fr 20px;padding:0 14px;gap:10px}
    .mobile-ui .k{font-size:14px}
    .mobile-ui .v{font-size:clamp(15px,4.3vw,20px)}
    .mobile-ui .cta{margin-top:10px;min-height:64px;font-size:clamp(19px,5.6vw,30px);gap:10px;pointer-events:auto}
    .mobile-ui .status{display:none}
  }

  @media (max-width:390px){
    .mobile-ui{padding-left:13px;padding-right:13px;gap:8px}
    .mobile-stage{height:clamp(225px,36dvh,310px)}
    .mobile-ui .row{grid-template-columns:68px 1fr 16px;padding:0 11px;gap:8px;min-height:49px}
    .mobile-ui .k{font-size:13px}
    .mobile-ui .v{font-size:14px}
    .mobile-ui .cta{font-size:18px;min-height:60px}
    .cta::before,.cta::after{display:none}
  }
</style>
</head>
<body>
<div class="app" id="app">
  <canvas id="field" aria-label="alive sensorama instrument"></canvas>

  <section class="desktop-ui" aria-label="desktop interface">
    <main class="desktop-stage" id="desktopStage"></main>

    <aside class="panel">
      <div>
        <h1 class="title" data-title>Training Twin</h1>
        <p class="subtitle" data-subtitle>Preferable // Risk-Twin</p>
      </div>
      <div class="status" data-status>Swipe wheel left/right. Rows remix. Tabs set state.</div>
      <nav class="tabs" aria-label="state selector" data-tabs></nav>
      <div class="rows">
        <button class="row" data-row="idea"><span class="k">Idea</span><span class="v" data-value="idea">risk rehearsal</span><span class="chev">›</span></button>
        <button class="row" data-row="tech"><span class="k">Tech</span><span class="v" data-value="tech">industrial sim</span><span class="chev">›</span></button>
        <button class="row" data-row="action"><span class="k">Action</span><span class="v" data-value="action">practice danger</span><span class="chev">›</span></button>
        <button class="row" data-row="gear"><span class="k">Gear</span><span class="v" data-value="gear">procedure world</span><span class="chev">›</span></button>
      </div>
      <button class="cta" data-action="project"><span data-cta-text>Project Future</span><span class="arrow">→</span></button>
    </aside>
  </section>

  <section class="mobile-ui" aria-label="mobile interface">
    <header class="mobile-head">
      <h1 class="title" data-title>Training Twin</h1>
      <p class="subtitle" data-subtitle>Preferable // Risk-Twin</p>
    </header>
    <div class="mobile-stage" id="mobileStage"></div>
    <nav class="tabs" aria-label="state selector" data-tabs></nav>
    <div class="rows">
      <button class="row" data-row="idea"><span class="k">Idea</span><span class="v" data-value="idea">risk rehearsal</span><span class="chev">›</span></button>
      <button class="row" data-row="tech"><span class="k">Tech</span><span class="v" data-value="tech">industrial sim</span><span class="chev">›</span></button>
      <button class="row" data-row="action"><span class="k">Action</span><span class="v" data-value="action">practice danger</span><span class="chev">›</span></button>
      <button class="row" data-row="gear"><span class="k">Gear</span><span class="v" data-value="gear">procedure world</span><span class="chev">›</span></button>
    </div>
    <button class="cta" data-action="project"><span data-cta-text>Project Future</span><span class="arrow">→</span></button>
    <div class="status" data-status>Swipe wheel. Tap rows. Choose state.</div>
  </section>
</div>

<script>
(() => {
  const canvas = document.getElementById('field');
  const ctx = canvas.getContext('2d');
  const desktopStage = document.getElementById('desktopStage');
  const mobileStage = document.getElementById('mobileStage');

  const TAU = Math.PI * 2;
  const futures = ['Possible','Plausible','Probable','Preferable'];
  const fields = ['idea','tech','action','gear'];
  const artifacts = [
    {title:'Sensorama', future:1, tag:'Booth Cinema', idea:'embodied cinema', tech:'multisensory booth', action:'stimulate body', gear:'cabinet machine'},
    {title:'Cave', future:1, tag:'Room-Scale Lab', idea:'shared laboratory', tech:'projection walls', action:'walk inside data', gear:'room cube'},
    {title:'Oculus DK1', future:2, tag:'Maker Restart', idea:'low-cost presence', tech:'phone panels', action:'restart VR', gear:'dev headset'},
    {title:'Training Twin', future:3, tag:'Risk-Twin', idea:'risk rehearsal', tech:'industrial sim', action:'practice danger', gear:'procedure world'},
    {title:'Dream Engine', future:0, tag:'Prompt World', idea:'prompt world', tech:'latent video', action:'summon scene', gear:'generative cone'},
    {title:'Civic Sim', future:3, tag:'Public Rehearsal', idea:'public rehearsal', tech:'city model', action:'test futures', gear:'forum theater'},
    {title:'Memory Cone', future:2, tag:'Archive Desire', idea:'archive desire', tech:'lifelog capture', action:'revisit time', gear:'personal dome'}
  ];

  const state = {
    w:1,h:1,dpr:1,t:0,
    artifact:3,
    shifts:{idea:0,tech:0,action:0,gear:0},
    selectedField:'idea',
    angle:0,targetAngle:0,vel:0,
    dragging:false,dragStartX:0,dragStartY:0,dragStartAngle:0,dragDx:0,
    pulse:0,projectPulse:0,wheelStamp:0,
    wheel:{x:0,y:0,r:100},
    beamEndX:0,
    mode:'desktop'
  };

  const css = getComputedStyle(document.documentElement);
  const GREEN = css.getPropertyValue('--green').trim() || '#d7ff1d';
  const ORANGE = css.getPropertyValue('--orange').trim() || '#ff5a05';
  const INK = css.getPropertyValue('--ink').trim() || '#f4f2ec';
  const MUTED = 'rgba(244,242,236,.42)';
  const FONT = css.getPropertyValue('--mono').trim();

  function mod(n,m){ return ((n % m) + m) % m; }
  function norm(a){ while(a > Math.PI) a -= TAU; while(a < -Math.PI) a += TAU; return a; }
  function polar(x,y,r,a){ return {x:x+Math.cos(a)*r, y:y+Math.sin(a)*r}; }
  function active(){ return artifacts[state.artifact]; }
  function source(field){ return artifacts[mod(state.artifact + state.shifts[field], artifacts.length)]; }
  function mixed(field){ return source(field)[field]; }
  function isMobile(){ return window.matchMedia('(max-width:900px)').matches; }
  function sliceAngle(){ return (state.artifact * 5 + active().future * 3) * TAU / 48; }

  function resize(){
    state.dpr = Math.max(1, Math.min(2.25, window.devicePixelRatio || 1));
    state.w = window.innerWidth;
    state.h = window.innerHeight;
    canvas.width = Math.round(state.w * state.dpr);
    canvas.height = Math.round(state.h * state.dpr);
    ctx.setTransform(state.dpr,0,0,state.dpr,0,0);
    layout();
  }

  function layout(){
    state.mode = isMobile() ? 'mobile' : 'desktop';
    if(state.mode === 'mobile'){
      const rect = mobileStage.getBoundingClientRect();
      state.wheel.r = Math.min(rect.width, rect.height) * .46;
      state.wheel.x = rect.left + rect.width / 2;
      state.wheel.y = rect.top + rect.height / 2;
      state.beamEndX = state.w - 16;
    } else {
      const rect = desktopStage.getBoundingClientRect();
      state.wheel.r = Math.min(rect.height * .36, rect.width * .30, 315);
      state.wheel.x = rect.left + rect.width * .31;
      state.wheel.y = rect.top + rect.height * .5;
      state.beamEndX = rect.right - 36;
    }
  }

  function setStatus(text){
    document.querySelectorAll('[data-status]').forEach(n => n.textContent = text);
  }

  function renderUI(){
    const art = active();
    document.querySelectorAll('[data-title]').forEach(n => n.textContent = art.title);
    document.querySelectorAll('[data-subtitle]').forEach(n => n.textContent = `${futures[art.future]} // ${art.tag}`);
    fields.forEach(f => document.querySelectorAll(`[data-value="${f}"]`).forEach(n => n.textContent = mixed(f)));
    document.querySelectorAll('[data-cta-text]').forEach(n => n.textContent = state.projectPulse > .1 ? 'Projecting' : 'Project Future');
    document.querySelectorAll('[data-row]').forEach(r => r.classList.toggle('active', r.dataset.row === state.selectedField));
    document.querySelectorAll('[data-tabs]').forEach(nav => {
      nav.innerHTML = '';
      futures.forEach((name, i) => {
        const b = document.createElement('button');
        b.className = `tab${i === art.future ? ' active' : ''}`;
        b.type = 'button';
        b.textContent = name;
        b.addEventListener('click', () => {
          art.future = i;
          state.pulse = 1;
          setStatus(`STATE: ${name.toUpperCase()}`);
          renderUI();
        });
        nav.appendChild(b);
      });
    });
  }

  function drawText(str,x,y,size,color=INK,align='center',weight='900'){
    ctx.fillStyle = color;
    ctx.font = `${weight} ${size}px ${FONT}`;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    ctx.fillText(str,x,y);
  }

  function arcBand(x,y,r0,r1,a0,a1){
    ctx.beginPath();
    ctx.arc(x,y,r1,a0,a1,false);
    ctx.arc(x,y,r0,a1,a0,true);
    ctx.closePath();
  }

  function drawBackground(){
    ctx.clearRect(0,0,state.w,state.h);
    ctx.fillStyle = '#020303';
    ctx.fillRect(0,0,state.w,state.h);
    const g = ctx.createRadialGradient(state.wheel.x,state.wheel.y,0,state.wheel.x,state.wheel.y,state.wheel.r*2.2);
    g.addColorStop(0,'rgba(140,180,12,.15)');
    g.addColorStop(.45,'rgba(70,100,8,.05)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,state.w,state.h);
  }

  function drawBeam(){
    if(state.mode === 'mobile') return;
    const {x,y,r} = state.wheel;
    const art = active();
    const start = x + r * .78;
    const end = state.beamEndX;
    const top = y - r * .52;
    const bot = y + r * .52;
    const midTop = y - r * .17;
    const midBot = y + r * .17;

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.beginPath(); ctx.moveTo(start,y); ctx.lineTo(end,top); ctx.lineTo(end,bot); ctx.closePath();
    ctx.fillStyle = 'rgba(244,242,236,.025)'; ctx.fill();
    ctx.strokeStyle = 'rgba(244,242,236,.10)'; ctx.stroke();

    const grad = ctx.createLinearGradient(start,0,end,0);
    grad.addColorStop(0,'rgba(215,255,29,.42)');
    grad.addColorStop(.55,'rgba(100,140,14,.14)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.moveTo(start,y); ctx.lineTo(end,midTop); ctx.lineTo(end,midBot); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = 'rgba(215,255,29,.30)'; ctx.stroke();

    ctx.strokeStyle = 'rgba(215,255,29,.50)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(start,y); ctx.lineTo(end,y); ctx.stroke();
    ctx.restore();

    const ys = [y-r*.39,y-r*.16,y+r*.05,y+r*.27];
    futures.forEach((label,i)=>{
      const on = i === art.future;
      const tx = end - 172;
      drawText(label.toUpperCase(),tx,ys[i],on?18:13,on?GREEN:MUTED,'left','950');
      ctx.beginPath(); ctx.arc(end-22,ys[i],on?13:9,0,TAU);
      ctx.strokeStyle = on ? GREEN : 'rgba(244,242,236,.22)';
      ctx.lineWidth = on ? 2 : 1;
      ctx.stroke();
      if(on){ctx.fillStyle = GREEN; ctx.beginPath(); ctx.arc(end-22,ys[i],4,0,TAU); ctx.fill();}
    });
  }

  function drawWheel(){
    const {x,y,r} = state.wheel;
    const art = active();
    const count = 48;
    const activeSlice = mod(state.artifact * 5 + art.future * 3, count);
    const spin = state.angle;
    const scan = state.t * .52;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(spin);

    for(let i=0;i<120;i++){
      const a = -Math.PI/2 + i*TAU/120;
      const major = i % 10 === 0;
      const p1 = polar(0,0,r*(major ? .96 : 1.00),a);
      const p2 = polar(0,0,r*(major ? 1.07 : 1.035),a);
      ctx.strokeStyle = major ? 'rgba(215,255,29,.78)' : 'rgba(244,242,236,.20)';
      ctx.lineWidth = major ? 1.5 : .8;
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    }

    const bands = [
      [r*.73,r*.91,'rgba(215,255,29,.22)','rgba(244,242,236,.055)'],
      [r*.48,r*.71,'rgba(90,130,12,.35)','rgba(52,70,12,.22)'],
      [r*.27,r*.46,'rgba(115,170,14,.24)','rgba(55,100,12,.18)']
    ];

    bands.forEach(([r0,r1,aFill,bFill])=>{
      for(let i=0;i<count;i++){
        const a0 = -Math.PI/2 + i*TAU/count + .006;
        const a1 = -Math.PI/2 + (i+1)*TAU/count - .006;
        const on = i === activeSlice;
        arcBand(0,0,r0,r1,a0,a1);
        ctx.fillStyle = on ? 'rgba(215,255,29,.46)' : (i%2===0 ? aFill : bFill);
        ctx.fill();
        ctx.strokeStyle = on ? GREEN : 'rgba(0,0,0,.40)';
        ctx.lineWidth = on ? 1.3 : .8;
        ctx.stroke();
      }
    });

    [r*.27,r*.46,r*.48,r*.71,r*.73,r*.91].forEach((rr,i)=>{
      ctx.beginPath(); ctx.arc(0,0,rr,0,TAU);
      ctx.strokeStyle = i%2 ? 'rgba(215,255,29,.27)' : 'rgba(215,255,29,.52)';
      ctx.lineWidth = i%2 ? .9 : 1.3;
      ctx.stroke();
    });

    for(let i=0;i<32;i++){
      const a = -Math.PI/2 + i*TAU/32;
      const p1 = polar(0,0,r*.27,a), p2 = polar(0,0,r*.91,a);
      ctx.strokeStyle = 'rgba(215,255,29,.15)';
      ctx.lineWidth = .8;
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    }

    const scanA = -Math.PI/2 + scan;
    const sp = polar(0,0,r*.91,scanA);
    ctx.strokeStyle = 'rgba(215,255,29,.35)'; ctx.lineWidth = 1.3;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(sp.x,sp.y); ctx.stroke();

    const aa = -Math.PI/2 + (activeSlice+.5)*TAU/count;
    const ep = polar(0,0,r*.99,aa);
    ctx.shadowBlur = 18; ctx.shadowColor = GREEN;
    ctx.strokeStyle = GREEN; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ep.x,ep.y); ctx.stroke();
    ctx.beginPath(); ctx.arc(ep.x,ep.y,12 + state.pulse*6,0,TAU); ctx.stroke();
    ctx.fillStyle = GREEN; ctx.beginPath(); ctx.arc(ep.x,ep.y,4.5,0,TAU); ctx.fill();
    ctx.shadowBlur = 0;

    [[0,-r*.67],[0,r*.67],[-r*.67,0],[r*.67,0]].forEach(([cx,cy])=>{
      ctx.strokeStyle = INK; ctx.lineWidth = 2.2;
      ctx.beginPath(); ctx.moveTo(cx-8,cy); ctx.lineTo(cx+8,cy); ctx.moveTo(cx,cy-8); ctx.lineTo(cx,cy+8); ctx.stroke();
    });

    ctx.rotate(-spin);
    ctx.shadowBlur = 14; ctx.shadowColor = GREEN;
    ctx.beginPath(); ctx.arc(0,0,r*.235,0,TAU);
    ctx.fillStyle = '#050707'; ctx.fill();
    ctx.strokeStyle = GREEN; ctx.lineWidth = 1.6; ctx.stroke();
    ctx.shadowBlur = 0;
    drawText(futures[art.future].toUpperCase(),0,0,Math.max(13,r*.058),GREEN,'center','950');
    ctx.restore();

    const label = state.mode === 'mobile' ? 'SWIPE WHEEL' : 'SWIPE / SCROLL WHEEL';
    drawText(label,x,y+r*1.14,Math.max(10,r*.038),MUTED,'center','950');
  }

  function update(dt){
    if(!state.dragging){
      const diff = norm((-sliceAngle()) - state.angle);
      state.vel += diff * 16 * dt;
      state.vel *= Math.pow(.06, dt);
      state.angle += state.vel * dt;
    }
    state.pulse *= Math.pow(.04, dt);
    state.projectPulse *= Math.pow(.16, dt);
  }

  function frame(now){
    const t = now * .001;
    const dt = Math.min(.05, t - state.t || .016);
    state.t = t;
    layout();
    update(dt);
    drawBackground();
    drawBeam();
    drawWheel();
    requestAnimationFrame(frame);
  }

  function activeStageRect(){
    return (state.mode === 'mobile' ? mobileStage : desktopStage).getBoundingClientRect();
  }

  function inSpinZone(e){
    const rect = activeStageRect();
    const x = e.clientX;
    const y = e.clientY;
    return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
  }

  function nextArtifact(step){
    state.artifact = mod(state.artifact + step, artifacts.length);
    state.pulse = 1;
    renderUI();
    setStatus(`ARTIFACT: ${active().title.toUpperCase()}`);
  }

  canvas.addEventListener('pointerdown', e => {
    if(!inSpinZone(e)) return;
    e.preventDefault();
    state.dragging = true;
    state.dragStartX = e.clientX;
    state.dragStartY = e.clientY;
    state.dragStartAngle = state.angle;
    state.dragDx = 0;
    state.vel = 0;
    canvas.setPointerCapture(e.pointerId);
    setStatus('WHEEL LIVE: SWIPE LEFT / RIGHT');
  });

  canvas.addEventListener('pointermove', e => {
    if(!state.dragging) return;
    e.preventDefault();
    const dx = e.clientX - state.dragStartX;
    const dy = e.clientY - state.dragStartY;
    state.dragDx = dx;
    state.angle = state.dragStartAngle + dx * .015 + dy * .004;
  });

  canvas.addEventListener('pointerup', e => {
    if(!state.dragging) return;
    e.preventDefault();
    state.dragging = false;
    canvas.releasePointerCapture(e.pointerId);
    const threshold = state.mode === 'mobile' ? 46 : 68;
    let steps = Math.round(-state.dragDx / threshold);
    if(steps === 0 && Math.abs(state.dragDx) > 18) steps = state.dragDx < 0 ? 1 : -1;
    if(steps === 0) steps = 1;
    nextArtifact(steps);
  });

  canvas.addEventListener('wheel', e => {
    if(!inSpinZone(e)) return;
    e.preventDefault();
    const now = performance.now();
    if(now - state.wheelStamp < 130) return;
    state.wheelStamp = now;
    nextArtifact(e.deltaY > 0 || e.deltaX > 0 ? 1 : -1);
  }, {passive:false});

  document.addEventListener('click', e => {
    const row = e.target.closest('[data-row]');
    if(row){
      const field = row.dataset.row;
      state.selectedField = field;
      state.shifts[field] = mod(state.shifts[field] + 1, artifacts.length);
      state.pulse = 1;
      renderUI();
      setStatus(`${field.toUpperCase()} REMIXED FROM ${source(field).title.toUpperCase()}`);
      return;
    }
    const project = e.target.closest('[data-action="project"]');
    if(project){
      state.projectPulse = 1;
      state.pulse = 1;
      setStatus('FUTURE PROJECTED');
      project.animate([
        {transform:'scale(1)', filter:'brightness(1)'},
        {transform:'scale(.985)', filter:'brightness(1.45)'},
        {transform:'scale(1)', filter:'brightness(1)'}
      ], {duration:260, easing:'ease-out'});
      renderUI();
    }
  });

  window.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight') nextArtifact(1);
    if(e.key === 'ArrowLeft') nextArtifact(-1);
  });

  window.addEventListener('resize', resize);
  resize();
  renderUI();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
