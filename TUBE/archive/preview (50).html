<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Arc Splice Operator — Light Ghost Build</title>
<style>
:root{
  --bg:#000;--panel:#050505;--line:#262626;--soft:#777;--fg:#fff;
  --cyan:#00e5ff;--hot:#ff0055;--warn:#ffd34d;--good:#9cffb8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;overflow:hidden;background:#000;color:#fff;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  touch-action:none;user-select:none;-webkit-user-select:none;
}
#top{
  position:fixed;z-index:50;left:0;right:0;top:0;min-height:56px;
  background:linear-gradient(#0b0b0b,#020202);border-bottom:1px solid #2a2a2a;
  display:grid;grid-template-columns:minmax(150px,1fr) auto;gap:8px;align-items:center;
  padding:7px 10px;
}
.brand{min-width:0;line-height:1.05}
.brand b{display:block;color:var(--cyan);font-size:12px;letter-spacing:.14em}
.brand span{
  display:block;margin-top:4px;color:#777;font-size:8px;letter-spacing:.08em;
  text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#controls{display:flex;align-items:center;justify-content:flex-end;gap:4px;flex-wrap:wrap}
button{
  height:28px;min-width:31px;padding:0 7px;background:#000;border:1px solid #444;color:#fff;
  font:900 8px ui-monospace,SFMono-Regular,monospace;text-transform:uppercase;letter-spacing:.06em;
  cursor:pointer;
}
button:hover{background:#fff;color:#000;border-color:#fff}
button.on{background:var(--cyan);color:#000;border-color:var(--cyan)}
button.src.loaded{color:var(--cyan);border-color:var(--cyan)}
button.src.orphan{color:var(--warn);border-color:var(--warn)}
button.src.on{background:var(--warn);color:#000;border-color:var(--warn)}
#stage{position:fixed;left:0;display:block;background:#000;cursor:crosshair}
#foot{
  position:fixed;left:0;right:0;bottom:0;z-index:50;min-height:44px;
  background:#030303;border-top:1px solid #2a2a2a;display:grid;grid-template-columns:repeat(6,1fr);
}
.stat{border-right:1px solid #242424;padding:5px 9px;overflow:hidden}
.stat:last-child{border-right:0}
.stat label{display:block;color:#666;font-size:8px;text-transform:uppercase;letter-spacing:.1em}
.stat output{display:block;margin-top:3px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cyan{color:var(--cyan)}.warn{color:var(--warn)}.hot{color:var(--hot)}.good{color:var(--good)}
#toast{
  position:fixed;z-index:90;left:50%;bottom:58px;transform:translateX(-50%);
  background:#fff;color:#000;border:1px solid #fff;padding:8px 12px;font-size:10px;font-weight:900;
  letter-spacing:.08em;text-transform:uppercase;opacity:0;pointer-events:none;transition:.16s;
  max-width:94vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#toast.show{opacity:1}
input[type=file]{display:none}
#pool{position:fixed;left:0;top:0;width:1px;height:1px;opacity:.001;overflow:hidden;pointer-events:none;z-index:-1}
@media(max-width:860px){
  #top{min-height:72px;grid-template-columns:1fr;align-items:start;gap:4px}
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand b{font-size:10px}.brand span{font-size:7px;margin-top:0}
  #controls{justify-content:space-between;width:100%;gap:3px}
  button{height:24px;min-width:25px;padding:0 5px;font-size:7px}
  #foot{min-height:50px;grid-template-columns:repeat(3,1fr)}
  .mobGone{display:none}
  .stat{padding:5px 7px}.stat output{font-size:10px}
}
</style>
</head>
<body>
<div id="pool"></div>
<input id="videoInput" type="file" accept="video/*,.mp4,.mov,.m4v,.webm,.ogg" />
<input id="projectInput" type="file" accept="application/json,.json" />
<header id="top">
  <div class="brand">
    <b>ARC SPLICE OPERATOR</b>
    <span>light ghost build · symbolic strips · one decoder at a time · edit undo separate from source bodies</span>
  </div>
  <div id="controls">
    <button id="play">Play</button>
    <button id="source">Source</button>
    <button class="src on" data-i="0">A</button>
    <button class="src" data-i="1">B</button>
    <button class="src" data-i="2">C</button>
    <button class="src" data-i="3">D</button>
    <button id="undo">Undo</button>
    <button id="redo">Redo</button>
    <button id="clear">Clear</button>
    <button id="edl">EDL</button>
    <button id="save">Save</button>
    <button id="load">Load</button>
  </div>
</header>
<canvas id="stage"></canvas>
<footer id="foot">
  <div class="stat"><label>gate</label><output id="time" class="cyan">00.00</output></div>
  <div class="stat"><label>mode</label><output id="mode">edit</output></div>
  <div class="stat"><label>source</label><output id="src" class="warn">A empty</output></div>
  <div class="stat mobGone"><label>runtime</label><output id="run" class="hot">0.0g</output></div>
  <div class="stat mobGone"><label>splices</label><output id="clips" class="cyan">0</output></div>
  <div class="stat mobGone"><label>doctrine</label><output id="doc" class="good">traveler</output></div>
</footer>
<div id="toast"></div>
<script>
(()=>{
'use strict';

const $ = id => document.getElementById(id);
const TAU = Math.PI * 2;
const PI = Math.PI;
const canvas = $('stage');
const ctx = canvas.getContext('2d', { alpha:false, desynchronized:true });
const pool = $('pool');

const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const wrap = (n,m) => ((n % m) + m) % m;
const nowFileStamp = () => new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
const fmt = sec => String(Math.floor(sec)).padStart(2,'0') + '.' + String(Math.floor((sec % 1) * 100)).padStart(2,'0');

let W = 0, H = 0, M = null, uid = 1, last = 0, toastTimer = 0;
const MON = { key:'', track:-1, target:-1, lastSeek:0, lastDraw:0, lastHud:0, hudKey:'' };

const S = {
  density:24,
  selected:0,
  loading:-1,
  preview:0,
  time:0,
  playing:false,
  drag:null,
  trim:null,
  scrub:false,
  roll:null,
  seq:[],
  undo:[],
  redo:[]
};

const T = [
  track(0,'A',188,100,52,'A_SOURCE'),
  track(1,'B',318,100,56,'B_SOURCE'),
  track(2,'C',50,100,58,'C_SOURCE'),
  track(3,'D',0,0,86,'D_SOURCE')
];

function track(id,k,h,s,l,name){
  return { id,k,h,s,l,name,loaded:false,ready:false,orphan:false,chunks:24,roll:0,vid:null,url:null,file:null,relinks:[],scars:new Set(),hover:-1 };
}

function col(t,a=1,l=t.l){ return `hsla(${t.h},${t.s}%,${l}%,${a})`; }
function line(x1,y1,x2,y2,c='#222',w=1){
  ctx.strokeStyle = c; ctx.lineWidth = w; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}
function text(s,x,y,a='left',c='#fff',z=10,w='900'){
  ctx.fillStyle = c; ctx.textAlign = a; ctx.textBaseline = 'middle';
  ctx.font = `${w} ${z}px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace`;
  ctx.fillText(s,x,y);
}
function toast(msg){
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 1450);
}
function hit(r,x,y){ return r && x >= r.x && x <= r.x+r.w && y >= r.y && y <= r.y+r.h; }

function resize(){
  const topH = $('top').offsetHeight;
  const botH = $('foot').offsetHeight;
  canvas.style.top = topH + 'px';
  W = innerWidth;
  H = Math.max(260, innerHeight - topH - botH);
  const d = Math.min(1.5, Math.max(1, devicePixelRatio || 1));
  canvas.width = Math.floor(W*d);
  canvas.height = Math.floor(H*d);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(d,0,0,d,0,0);
  M = metrics(W < 860);
}

function metrics(mob){
  const pad = mob ? 8 : 18;
  const sourceH = Math.max(mob ? 152 : 174, Math.min(mob ? 230 : 258, H * .38));
  const seqH = Math.max(mob ? 128 : 156, Math.min(mob ? 182 : 210, H * .29));
  const monitorH = H - sourceH - seqH;
  const reelX = mob ? 42 : 68;
  const R = mob ? Math.max(15, sourceH/17) : Math.max(19, sourceH/14);
  const stripX = reelX + R + (mob ? 24 : 34);
  const endX = W - pad;
  const stripW = Math.max(100, endX - stripX);
  const slotW = stripW / S.density;
  const trackH = sourceH / 4;
  const seqY = sourceH;
  const seqX = stripX;
  const seqW = stripW;
  const rows = 4;
  const railY = seqY + (mob ? 17 : 20);
  const rowTop = seqY + (mob ? 54 : 64);
  const rowH = (seqH - (mob ? 70 : 82)) / rows;
  const monitorY = sourceH + seqH;
  return { mob,pad,sourceH,seqH,monitorH,reelX,R,stripX,endX,stripW,slotW,trackH,seqY,seqX,seqW,rows,railY,rowTop,rowH,monitorY };
}

function updateButtons(){
  document.querySelectorAll('.src').forEach(b=>{
    const t = T[+b.dataset.i];
    b.classList.toggle('on', t.id === S.selected);
    b.classList.toggle('loaded', !!t.ready);
    b.classList.toggle('orphan', !!t.orphan && !t.ready);
  });
  if($('undo')) $('undo').disabled = !S.undo.length;
  if($('redo')) $('redo').disabled = !S.redo.length;
}

function setSrc(i){
  S.selected = clamp(i,0,3);
  S.preview = S.selected;
  updateButtons();
  hud();
}

function openSource(i=S.selected){
  S.loading = i;
  setSrc(i);
  $('videoInput').value = '';
  $('videoInput').click();
  const t = T[i];
  toast((t.orphan ? 'EDIT SEEKS NEW HOST ' : 'CHOOSE SOURCE ') + t.k);
}

function serialize(){
  return {
    type:'arc-splice-operator-3dth-ghost-gate',
    version:1,
    density:S.density,
    time:S.time,
    selected:S.selected,
    preview:S.preview,
    nextUid:uid,
    tracks:T.map(t=>({
      id:t.id,k:t.k,h:t.h,s:t.s,l:t.l,name:t.name,file:t.file,
      loaded:t.loaded || t.orphan || t.ready,
      orphan:t.orphan || ((t.loaded || t.ready) && !t.ready),
      chunks:t.chunks,roll:t.roll,relinks:t.relinks||[],scars:Array.from(t.scars)
    })),
    seq:S.seq.map(c=>({...c}))
  };
}

function editState(){
  return {
    time:S.time,
    selected:S.selected,
    preview:S.preview,
    seq:S.seq.map(c=>({...c})),
    rolls:T.map(t=>t.roll),
    scars:T.map(t=>Array.from(t.scars))
  };
}
function snapshot(){ return JSON.stringify(editState()); }
function recomputeScars(){
  T.forEach(t=>t.scars = new Set());
  S.seq.forEach(c=>{
    const t = T[c.track];
    if(t) t.scars.add(c.src);
  });
}
function push(){
  S.undo.push(snapshot());
  if(S.undo.length > 80) S.undo.shift();
  S.redo = [];
  updateButtons();
}
function restoreEditJSON(obj){
  S.seq = (obj.seq || []).map(c=>({
    id:c.id || uid++,
    track:clamp(c.track|0,0,3),
    src:c.src|0,
    slot:+c.slot||0,
    layer:+c.layer||0,
    dur:Math.max(.25,+c.dur||1),
    ghost:!!c.ghost
  }));
  S.time = +obj.time || 0;
  S.selected = clamp(+obj.selected || 0,0,3);
  S.preview = clamp(+obj.preview || S.selected,0,3);
  uid = Math.max(uid, 1 + S.seq.reduce((m,c)=>Math.max(m,c.id||0),0));
  (obj.rolls || []).forEach((r,i)=>{ if(T[i]) T[i].roll = +r || 0; });
  if(obj.scars && obj.scars.length){
    obj.scars.forEach((arr,i)=>{ if(T[i]) T[i].scars = new Set(arr || []); });
  }else{
    recomputeScars();
  }
  updateButtons();
  hud();
}
function restoreJSON(obj, fromProject=false){
  S.seq = (obj.seq || []).map(c=>({
    id:c.id || uid++,
    track:clamp(c.track|0,0,3),
    src:c.src|0,
    slot:+c.slot||0,
    layer:+c.layer||0,
    dur:Math.max(.25,+c.dur||1),
    ghost:!!c.ghost
  }));
  S.time = +obj.time || 0;
  S.selected = clamp(+obj.selected || 0,0,3);
  S.preview = clamp(+obj.preview || S.selected,0,3);
  uid = Math.max(+obj.nextUid || uid, 1 + S.seq.reduce((m,c)=>Math.max(m,c.id||0),0));
  (obj.tracks || []).forEach(a=>{
    const t = T[a.id];
    if(!t) return;
    if(t.url) URL.revokeObjectURL(t.url);
    if(t.vid && t.vid.parentNode) t.vid.parentNode.removeChild(t.vid);
    Object.assign(t, {
      name:a.name || `${t.k}_SOURCE`,
      file:a.file || null,
      loaded:!!a.loaded,
      ready:false,
      orphan:fromProject ? !!a.loaded || !!a.orphan : !!a.orphan,
      chunks:+a.chunks || S.density,
      roll:+a.roll || 0,
      vid:null,
      url:null,
      relinks:a.relinks || [],
      scars:new Set(a.scars || [])
    });
  });
  if(!(obj.tracks || []).length) recomputeScars();
  updateButtons();
  hud();
  toast(fromProject ? 'PROJECT HAS NO BODY — RELINK OR BETRAY' : 'STATE RESTORED');
}

function undo(){
  const s = S.undo.pop();
  if(!s){ toast('NO PAST TO RETURN TO'); return; }
  S.redo.push(snapshot());
  try{ restoreEditJSON(JSON.parse(s)); toast('UNDO EDIT — BODIES REMAIN'); }
  catch(err){ toast('UNDO FAILED'); }
}
function redo(){
  const s = S.redo.pop();
  if(!s){ toast('NO FUTURE TRACE'); return; }
  S.undo.push(snapshot());
  try{ restoreEditJSON(JSON.parse(s)); toast('REDO EDIT — BODIES REMAIN'); }
  catch(err){ toast('REDO FAILED'); }
}

function drawReel(t){
  const {reelX:cx,R} = M, cy = t.cy;
  ctx.lineWidth = 2;
  ctx.strokeStyle = col(t, t.ready ? 1 : .45, t.ready ? 60 : 36);
  ctx.beginPath(); ctx.arc(cx,cy,R,0,TAU); ctx.stroke();
  ctx.strokeStyle = col(t,.30,58);
  ctx.beginPath(); ctx.arc(cx,cy,R*.62,0,TAU); ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(cx,cy,R*.22,0,TAU); ctx.fill();
  ctx.strokeStyle = '#666'; ctx.stroke();
  for(let i=0;i<16;i++){
    const a = -PI/2 + i*TAU/16 + t.roll*TAU/Math.max(1,t.chunks);
    const maj = i%4===0;
    line(cx+R*(maj?.58:.74)*Math.cos(a),cy+R*(maj?.58:.74)*Math.sin(a),
         cx+R*.93*Math.cos(a),cy+R*.93*Math.sin(a), maj ? '#aaa' : '#444', maj ? 1.2 : 1);
  }
  text(t.k,cx,cy,'center',t.ready ? '#000' : '#aaa',Math.max(10,R*.42),'900');
}

function slicePath(t,i){
  const x = M.stripX + i*M.slotW, y = t.cy, w = M.slotW, h = Math.max(15,M.R*.9), cut = Math.min(6,w*.25);
  const p = new Path2D();
  p.moveTo(x+cut,y-h/2); p.lineTo(x+w-cut,y-h/2); p.lineTo(x+w,y);
  p.lineTo(x+w-cut,y+h/2); p.lineTo(x+cut,y+h/2); p.lineTo(x,y); p.closePath();
  return p;
}
function sourceIndex(t,i){ return wrap(Math.round(t.roll) + i, Math.max(1,t.chunks)); }

function drawSources(){
  ctx.fillStyle = '#020202';
  ctx.fillRect(0,0,W,M.sourceH);
  line(0,M.sourceH,W,M.sourceH,'#282828',1.5);
  T.forEach((t,i)=>{
    t.cy = i*M.trackH + M.trackH/2;
    const cy = t.cy;
    t.load = { x:5, y:cy-(M.mob?18:20), w:M.mob?35:50, h:M.mob?36:40 };

    drawReel(t);

    ctx.fillStyle = t.ready ? col(t,.96,54) : (t.orphan ? 'rgba(255,211,77,.12)' : '#080808');
    ctx.strokeStyle = t.ready ? col(t,1,66) : (t.orphan ? '#ffd34d' : (i===S.selected ? '#fff' : '#444'));
    ctx.lineWidth = i===S.selected ? 2 : 1;
    ctx.fillRect(t.load.x,t.load.y,t.load.w,t.load.h);
    ctx.strokeRect(t.load.x,t.load.y,t.load.w,t.load.h);
    text(t.k,t.load.x+t.load.w/2,cy,'center',t.ready?'#000':'#fff',M.mob?12:15,'900');

    const status = t.ready ? t.name : (t.orphan ? 'ORPHANED BODY' : 'SIGNAL ONLY');
    text(status, M.stripX, cy-(M.mob?25:30), 'left', t.ready ? col(t,1,70) : (t.orphan ? '#ffd34d' : '#555'), M.mob?7:9, '900');

    for(let s=0;s<S.density;s++){
      const path = slicePath(t,s);
      const src = sourceIndex(t,s);
      const scar = t.scars.has(src);
      if(t.ready){
        const l = scar ? 35 : 18 + ((src*7+i*11)%18);
        ctx.fillStyle = col(t, scar ? .94 : .72, l+24);
      }else if(t.orphan){
        ctx.fillStyle = scar ? 'rgba(255,211,77,.35)' : 'rgba(255,211,77,.10)';
      }else{
        ctx.fillStyle = scar ? 'rgba(255,255,255,.17)' : 'rgba(255,255,255,.045)';
      }
      ctx.strokeStyle = t.ready ? col(t,.55,60) : (t.orphan ? 'rgba(255,211,77,.42)' : 'rgba(255,255,255,.14)');
      ctx.lineWidth = 1;
      ctx.fill(path); ctx.stroke(path);
      if(scar){
        const x = M.stripX+s*M.slotW+M.slotW/2;
        line(x-4,cy-8,x+4,cy+8,t.ready ? '#000' : '#fff',1.5);
        line(x+4,cy-8,x-4,cy+8,t.ready ? '#000' : '#fff',1.5);
      }
      if(!M.mob && (s%4===0)) text(String(src).padStart(2,'0'),M.stripX+s*M.slotW+M.slotW/2,cy+M.R*.78,'center',t.ready?'#111':'#666',7,'900');
    }

    if(!t.ready){
      text(t.orphan ? 'RELINK / BETRAY BY LOADING NEW FILE' : 'DRAG EMPTY SLICES FOR SIGNAL GHOSTS', M.endX, cy-(M.mob?25:30), 'right', t.orphan ? '#ffd34d' : '#555', M.mob?7:8, '900');
    }
  });
}

function clipRect(c,slot=c.slot,layer=c.layer,dur=c.dur){
  const h = Math.min(36,Math.max(25,M.rowH*.78));
  return { x:M.seqX+slot*M.slotW, y:M.rowTop+layer*M.rowH-h/2, w:dur*M.slotW, h };
}
function clipPath(c,slot=c.slot,layer=c.layer,dur=c.dur){
  const r = clipRect(c,slot,layer,dur), cut = Math.min(13,Math.max(5,M.slotW*.32));
  const p = new Path2D();
  p.moveTo(r.x+cut,r.y); p.lineTo(r.x+r.w,r.y); p.lineTo(r.x+r.w-cut,r.y+r.h); p.lineTo(r.x,r.y+r.h); p.closePath();
  return p;
}
function drawClip(c, ghost=false){
  const t = T[c.track] || T[0];
  const r = clipRect(c);
  const path = clipPath(c);
  const missing = !t.ready;
  ctx.globalAlpha = ghost ? .52 : 1;
  ctx.fillStyle = missing ? (t.orphan ? 'rgba(255,211,77,.20)' : 'rgba(255,255,255,.10)') : col(t,.72,42 + c.layer*6);
  ctx.strokeStyle = missing ? (t.orphan ? '#ffd34d' : '#888') : col(t,1,66);
  ctx.lineWidth = ghost ? 1 : 1.5;
  ctx.fill(path); ctx.stroke(path);
  ctx.globalAlpha = 1;
  const label = `${t.k}${String(c.src).padStart(2,'0')} ${missing ? 'GHOST' : 'SLICE'}`;
  text(label, r.x+8, r.y+r.h/2, 'left', missing ? '#fff' : '#000', M.mob ? 7 : 8, '900');
  if(c.dur*M.slotW > 42 && !M.mob) text(`L${c.layer}`, r.x+r.w-7, r.y+r.h/2, 'right', missing ? '#ffd34d' : '#000', 8, '900');

  // trim handles
  if(!ghost){
    ctx.fillStyle = missing ? 'rgba(255,255,255,.35)' : 'rgba(0,0,0,.45)';
    ctx.fillRect(r.x, r.y, 5, r.h);
    ctx.fillRect(r.x+r.w-5, r.y, 5, r.h);
  }
}

function drawTimeline(){
  ctx.fillStyle = '#050505';
  ctx.fillRect(0,M.seqY,W,M.seqH);
  line(0,M.seqY,W,M.seqY,'#282828',1.5);
  line(0,M.seqY+M.seqH,W,M.seqY+M.seqH,'#282828',1.5);
  text('24 GATE RAIL', M.pad, M.railY, 'left', '#777', M.mob?8:10, '900');

  line(M.seqX,M.railY,M.seqX+M.seqW,M.railY,'#444',1.4);
  for(let i=0;i<=S.density;i++){
    const x = M.seqX + i*M.slotW;
    const maj = i%4===0, mid=i%2===0, len=maj?23:(mid?15:8);
    line(x,M.railY-len/2,x,M.railY+len/2,maj?'#999':'#444',maj?1.3:1);
    if(maj&&!M.mob) text(String(i).padStart(2,'0'),x,M.railY+26,'center','#777',9);
  }
  for(let r=0;r<M.rows;r++){
    const y = M.rowTop + r*M.rowH;
    line(M.seqX,y,M.seqX+M.seqW,y,'#151515',1);
    text(['UNDER','LOW','MID','TOP'][r] || ('L'+r), M.pad, y, 'left', r===3 ? '#ffd34d' : '#666', M.mob?7:8, '900');
  }
  S.seq.slice().sort((a,b)=>a.layer-b.layer||a.slot-b.slot||a.id-b.id).forEach(c=>drawClip(c,false));
  if(S.drag && S.drag.clip && S.drag.over){
    drawClip(S.drag.clip,true);
    const c=S.drag.clip,t=T[c.track];
    text(`${t.k}:${String(c.src).padStart(2,'0')} → rail ${String(Math.round(c.slot)).padStart(2,'0')} · layer ${c.layer}`, M.seqX+M.seqW/2, M.seqY+M.seqH-16, 'center', '#00e5ff', M.mob?8:10, '900');
  }
}

function active(){
  const t = S.time;
  return S.seq
    .filter(c => t >= c.slot && t < c.slot + c.dur)
    .sort((a,b)=>a.layer-b.layer || a.id-b.id);
}

function pauseAllVideos(keep=-1){
  T.forEach((t,i)=>{
    if(i !== keep && t.vid && !t.vid.paused){
      try{ t.vid.pause(); }catch(err){}
    }
  });
}

function clipTarget(c){
  const t = T[c.track];
  if(!t || !t.vid || t.vid.readyState < 1) return null;
  const dur = t.vid.duration || 0;
  if(!Number.isFinite(dur) || dur <= .1) return null;
  const chunkDur = dur / Math.max(1,t.chunks || S.density);
  const localGate = clamp(S.time - c.slot, 0, c.dur);
  return {
    t,
    dur,
    chunkDur,
    target: clamp((c.src * chunkDur) + (localGate * chunkDur), 0, Math.max(0,dur-.05))
  };
}

function syncClipVideo(c){
  const info = clipTarget(c);
  if(!info) return false;
  const {t,chunkDur,target} = info;
  const key = 'clip:' + c.id + ':' + c.track + ':' + c.src + ':' + (S.playing ? 'play' : 'still');
  const now = performance.now();
  const changed = MON.key !== key;
  pauseAllVideos(c.track);

  try{
    if(S.playing){
      if(changed || Math.abs(t.vid.currentTime - target) > 1.25){
        t.vid.currentTime = target;
        MON.lastSeek = now;
      }
      try{ t.vid.playbackRate = clamp(chunkDur, .25, 4); }catch(err){}
      if(t.vid.paused) t.vid.play().catch(()=>{});
    }else{
      if(changed || (Math.abs(t.vid.currentTime - target) > .28 && now - MON.lastSeek > 140)){
        t.vid.currentTime = target;
        MON.lastSeek = now;
      }
      if(!t.vid.paused) t.vid.pause();
      try{ t.vid.playbackRate = 1; }catch(err){}
    }
    MON.key = key;
    MON.track = c.track;
    MON.target = target;
    return t.vid.readyState >= 2;
  }catch(err){
    return false;
  }
}

function syncPreviewVideo(t){
  if(!t || !t.vid || t.vid.readyState < 1) return false;
  pauseAllVideos(-1);
  try{
    if(!t.vid.paused) t.vid.pause();
    const dur = t.vid.duration || 1;
    const gate = wrap(Math.floor(t.roll || 0), Math.max(1,t.chunks || S.density));
    const target = clamp((gate / Math.max(1,t.chunks || S.density)) * dur, 0, Math.max(0,dur-.05));
    const key = 'preview:' + t.id + ':' + gate;
    const now = performance.now();
    if(key !== MON.key || (Math.abs(t.vid.currentTime - target) > .35 && now - MON.lastSeek > 180)){
      t.vid.currentTime = target;
      MON.key = key;
      MON.track = t.id;
      MON.target = target;
      MON.lastSeek = now;
    }
    return t.vid.readyState >= 2;
  }catch(err){
    return false;
  }
}

function proxy(c,x,y,w,h){
  const t = T[c.track] || T[0];
  const g = ctx.createLinearGradient(x,y,x+w,y+h);
  g.addColorStop(0, t.orphan ? 'rgba(255,211,77,.16)' : 'rgba(255,255,255,.07)');
  g.addColorStop(.55, col(t,.16,44));
  g.addColorStop(1, 'rgba(0,0,0,.88)');
  ctx.fillStyle = g;
  ctx.fillRect(x,y,w,h);
  for(let i=0;i<8;i++){
    const yy = y + ((i*61 + c.src*13 + S.time*18) % h);
    line(x,yy,x+w,yy, i%3===0 ? col(t,.46,58) : 'rgba(255,255,255,.06)', i%3===0 ? 2 : 1);
  }
  for(let i=0;i<3;i++){
    const xx = x + ((i*101 + c.id*31 + S.time*12) % w);
    line(xx,y,xx,y+h, 'rgba(255,255,255,.07)', 1);
  }
  text(T[c.track].orphan ? 'ORPHANED EDIT SEEKS HOST' : 'LIGHT SIGNAL GHOST', x+w/2, y+h/2-8, 'center', '#fff', M.mob?10:14, '900');
  text(`${t.k} gate ${String(c.src).padStart(2,'0')} · layer ${c.layer}`, x+w/2, y+h/2+14, 'center', '#aaa', M.mob?8:10, '900');
}

function bars(x,y,w,h){
  const colors = ['#fff','#ffd34d','#00e5ff','#9cffb8','#ff0055','#4d5bff','#111'];
  const sw = w / colors.length;
  for(let i=0;i<colors.length;i++){ ctx.fillStyle = colors[i]; ctx.fillRect(x+i*sw,y,sw+1,h); }
  ctx.fillStyle = 'rgba(0,0,0,.72)'; ctx.fillRect(x,y+h*.60,w,h*.40);
  text('EMPTY TIME · SIGNAL BEFORE SOURCE', x+w/2, y+h*.78, 'center', '#fff', M.mob?9:12, '900');
}

function drawMonitor(){
  const y0 = M.monitorY;
  ctx.fillStyle = '#000';
  ctx.fillRect(0,y0,W,M.monitorH);
  line(0,y0,W,y0,'#272727',1.5);

  let vh = Math.max(70, M.monitorH - (M.mob?16:26));
  let vw = vh * 16/9;
  const maxW = Math.min(M.seqW, W-M.pad*2);
  if(vw > maxW){ vw = maxW; vh = vw*9/16; }
  const vx = (W-vw)/2;
  const vy = y0 + Math.max(8,(M.monitorH-vh)/2);

  ctx.fillStyle = '#050505'; ctx.fillRect(vx,vy,vw,vh);
  ctx.strokeStyle = '#303030'; ctx.strokeRect(vx,vy,vw,vh);

  const clips = active();
  if(clips.length){
    const top = clips[clips.length-1];       // light mode: monitor decodes only the visible top body
    const tt = T[top.track];
    const hasVideo = syncClipVideo(top) && tt.ready && tt.vid && tt.vid.readyState >= 2;
    if(hasVideo){
      try{ ctx.drawImage(tt.vid, vx, vy, vw, vh); }
      catch(err){ proxy(top,vx,vy,vw,vh); }
    }else{
      proxy(top,vx,vy,vw,vh);
    }
    ctx.fillStyle = 'rgba(0,0,0,.68)';
    ctx.fillRect(vx,vy,vw,22);
    text(`LIGHT OUTPUT ${tt.k}${String(top.src).padStart(2,'0')} · TOP LAYER ONLY · ${tt.ready?'BODY':'GHOST'} · ${clips.length} ACTIVE`, vx+8, vy+11, 'left', tt.ready?col(tt,1,70):'#ffd34d', M.mob?7:9, '900');
  }else{
    const t = T[S.preview] || T[S.selected];
    if(t && t.ready && t.vid){
      const hasPreview = syncPreviewVideo(t);
      if(hasPreview){
        try{ ctx.drawImage(t.vid, vx, vy, vw, vh); }
        catch(err){ bars(vx,vy,vw,vh); }
      }else{
        bars(vx,vy,vw,vh);
      }
      ctx.fillStyle = 'rgba(0,0,0,.65)';
      ctx.fillRect(vx,vy,vw,22);
      text(`PREVIEW SOURCE ${t.k} · ONE STILL FRAME`, vx+8, vy+11, 'left', col(t,1,70), M.mob?7:9, '900');
    }else{
      pauseAllVideos(-1);
      bars(vx,vy,vw,vh);
    }
  }
}

function draw(){
  if(!M) return;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  for(let x=0;x<W;x+=(M.mob?32:40)) line(x,0,x,H,'#090909');
  for(let y=0;y<H;y+=(M.mob?32:40)) line(0,y,W,y,'#090909');

  drawSources();
  drawTimeline();

  const x = M.seqX + clamp(S.time,0,S.density)/S.density*M.seqW;
  line(x,0,x,M.monitorY,'#ff0055',1.8);
  ctx.fillStyle = '#ff0055';
  ctx.beginPath(); ctx.moveTo(x-6,M.seqY); ctx.lineTo(x+6,M.seqY); ctx.lineTo(x,M.seqY+10); ctx.fill();

  drawMonitor();
}

function runtime(){ return S.seq.reduce((m,c)=>Math.max(m,c.slot+c.dur),0); }
function sourceState(t){
  if(!t) return 'missing';
  if(t.ready) return 'visible';
  if(t.orphan) return 'relink';
  if(t.loaded) return 'ghost';
  return 'signal';
}
function sequenceGaps(){
  const events = [];
  for(let g=0; g<S.density; g++){
    const filled = S.seq.some(c=>g >= c.slot && g < c.slot + c.dur);
    if(!filled) events.push(g);
  }
  return events;
}

function hud(force=false){
  const t = T[S.selected];
  const mode = S.scrub ? 'searching' : S.roll ? 'memory-shift' : S.drag ? 'extraction' : S.trim ? 'wound-adjust' : S.playing ? 'invocation' : 'potential';
  const key = [
    Math.floor(S.time*4)/4,
    mode,
    S.selected,
    sourceState(t),
    runtime().toFixed(1),
    S.seq.length,
    S.playing,
    S.undo.length,
    S.redo.length
  ].join('|');
  if(!force && key === MON.hudKey) return;
  MON.hudKey = key;
  $('time').textContent = fmt(S.time);
  $('mode').textContent = mode;
  $('src').textContent = `${t.k} ${sourceState(t)}`;
  $('run').textContent = runtime().toFixed(1) + 'g';
  $('clips').textContent = String(S.seq.length);
  $('play').textContent = S.playing ? 'Pause' : 'Play';
  $('play').classList.toggle('on', S.playing);
  updateButtons();
}

function ptr(e){
  const r = canvas.getBoundingClientRect();
  return { x:e.clientX-r.left, y:e.clientY-r.top };
}

function hitSource(x,y){
  for(const t of T){
    if(hit(t.load,x,y)) return { type:'load', t };
    if(Math.hypot(x-M.reelX,y-t.cy) <= M.R*1.25) return { type:'roll', t };
    if(Math.abs(y-t.cy) < M.R*1.14 && x >= M.stripX && x <= M.endX){
      const si = clamp(Math.floor((x-M.stripX)/M.slotW),0,S.density-1);
      if(ctx.isPointInPath(slicePath(t,si),x,y)) return { type:'slice', t, si, src:sourceIndex(t,si) };
    }
  }
  return null;
}

function hitClip(x,y){
  for(let i=S.seq.length-1;i>=0;i--){
    const c = S.seq[i], r = clipRect(c);
    if(hit(r,x,y)){
      if(x <= r.x+8) return { type:'trimL', c, i };
      if(x >= r.x+r.w-8) return { type:'trimR', c, i };
      return { type:'clip', c, i };
    }
  }
  return null;
}

function snapToTimeline(x,y,c){
  const over = x >= M.seqX && x <= M.seqX+M.seqW && y >= M.seqY+36 && y <= M.seqY+M.seqH;
  if(!over) return false;
  c.slot = clamp(Math.round((x - M.seqX - (S.drag?.off || 0)) / M.slotW), 0, S.density - c.dur);
  c.layer = clamp(Math.round((y - M.rowTop) / M.rowH), 0, M.rows-1);
  return true;
}

canvas.addEventListener('contextmenu', e=>e.preventDefault());

canvas.addEventListener('pointerdown', e=>{
  const p = ptr(e);

  if(p.y >= M.seqY && p.y <= M.seqY+38 && p.x >= M.seqX && p.x <= M.seqX+M.seqW){
    S.scrub = true; S.playing = false;
    S.time = clamp((p.x-M.seqX)/M.seqW*S.density,0,S.density-.001);
    canvas.setPointerCapture(e.pointerId); hud(); return;
  }

  const clipHit = p.y > M.seqY+36 && p.y < M.seqY+M.seqH ? hitClip(p.x,p.y) : null;
  if(clipHit){
    push();
    if(clipHit.type === 'trimL' || clipHit.type === 'trimR'){
      S.trim = { side:clipHit.type, clip:clipHit.c, startX:p.x, oSlot:clipHit.c.slot, oSrc:clipHit.c.src, oDur:clipHit.c.dur };
      toast(clipHit.type === 'trimL' ? 'LEFT EDGE QUESTIONS ITSELF' : 'RIGHT EDGE UNSETTLES');
    }else{
      const r = clipRect(clipHit.c);
      S.drag = { kind:'move', clip:clipHit.c, off:p.x-r.x, over:true };
      toast('SPLICE UNFASTENED');
    }
    canvas.setPointerCapture(e.pointerId); hud(); return;
  }

  const sourceHit = p.y < M.sourceH ? hitSource(p.x,p.y) : null;
  if(sourceHit){
    if(sourceHit.type === 'load'){ openSource(sourceHit.t.id); return; }
    if(sourceHit.type === 'roll'){
      S.roll = { t:sourceHit.t, x:p.x, y:p.y, start:sourceHit.t.roll };
      canvas.setPointerCapture(e.pointerId); toast('REEL DRIFTS'); hud(); return;
    }
    if(sourceHit.type === 'slice'){
      const t = sourceHit.t;
      setSrc(t.id);
      const c = { id:uid++, track:t.id, src:sourceHit.src, slot:0, layer:0, dur:1, ghost:!t.ready };
      S.drag = { kind:'new', clip:c, off:M.slotW*.5, over:false, px:p.x, py:p.y };
      canvas.setPointerCapture(e.pointerId);
      toast(t.ready ? 'LIT SLICE TAKEN' : (t.orphan ? 'ORPHAN SLICE TAKEN' : 'SIGNAL GHOST TAKEN'));
      hud(); return;
    }
  }
});

canvas.addEventListener('pointermove', e=>{
  const p = ptr(e);
  if(S.scrub){
    S.time = clamp((p.x-M.seqX)/M.seqW*S.density,0,S.density-.001);
    hud(); return;
  }
  if(S.roll){
    const dx = (p.x - S.roll.x) / Math.max(8,M.slotW);
    S.roll.t.roll = S.roll.start + dx;
    hud(); return;
  }
  if(S.trim){
    const c = S.trim.clip;
    const delta = Math.round((p.x - S.trim.startX)/M.slotW);
    if(S.trim.side === 'trimR'){
      c.dur = clamp(S.trim.oDur + delta, .25, S.density - c.slot);
    }else{
      const minDelta = -Math.min(S.trim.oSlot, S.trim.oSrc);
      const maxDelta = S.trim.oDur - .25;
      const d = clamp(delta, minDelta, maxDelta);
      const newSlot = clamp(S.trim.oSlot + d, 0, S.density-.25);
      c.src = Math.max(0, S.trim.oSrc + d);
      c.dur = clamp(S.trim.oDur - d, .25, S.density - newSlot);
      c.slot = newSlot;
    }
    hud(); return;
  }
  if(S.drag){
    S.drag.px = p.x; S.drag.py = p.y;
    S.drag.over = snapToTimeline(p.x,p.y,S.drag.clip);
    hud(); return;
  }
});

canvas.addEventListener('pointerup', e=>{
  const hadTrim = !!S.trim;
  if(S.drag){
    if(S.drag.kind === 'new'){
      if(S.drag.over){
        push();
        S.seq.push({...S.drag.clip});
        const t = T[S.drag.clip.track];
        t.scars.add(S.drag.clip.src);
        toast(t.ready ? 'SPLICE PLACED · SOURCE SCARRED' : (t.orphan ? 'ORPHAN SPLICE PLACED' : 'SIGNAL GHOST PLACED'));
      }else{
        toast('SLICE RETURNS UNSPLICED');
      }
    }else{
      toast('SPLICE SET LOOSE ON RAIL');
    }
  }
  if(hadTrim) recomputeScars();
  S.drag = null; S.trim = null; S.scrub = false; S.roll = null;
  try{ canvas.releasePointerCapture(e.pointerId); }catch(err){}
  hud();
});

function loadVideoToTrack(file, t){
  if(t.url) URL.revokeObjectURL(t.url);
  if(t.vid && t.vid.parentNode) t.vid.parentNode.removeChild(t.vid);

  const v = document.createElement('video');
  v.muted = true;
  v.defaultMuted = true;
  v.playsInline = true;
  v.setAttribute('playsinline','');
  v.setAttribute('webkit-playsinline','');
  v.preload = 'metadata';     // light mode: do not buffer/decode all source bodies up front
  v.loop = false;
  v.controls = false;

  const url = URL.createObjectURL(file);
  v.src = url;
  pool.appendChild(v);

  const previous = t.file || t.name || `${t.k}_SOURCE`;
  const history = Array.isArray(t.relinks) ? t.relinks.slice() : [];
  if(t.orphan || t.loaded) history.push({ at:new Date().toISOString(), from:previous, to:file.name, mode:t.orphan?'betrayal-relink':'body-replacement' });
  Object.assign(t, {
    loaded:true, ready:false, orphan:false, file:file.name, url, vid:v,
    name:file.name.replace(/\.[^.]+$/,'').slice(0,18).toUpperCase(),
    chunks:S.density, roll:0, relinks:history
  });

  v.addEventListener('loadedmetadata', ()=>{
    t.ready = true; t.loaded = true; t.orphan = false;
    t.chunks = S.density;
    MON.key = '';
    updateButtons(); hud(true);
    toast('SOURCE ' + t.k + ' WOKEN LIGHTLY');
  }, { once:true });

  v.addEventListener('loadeddata', ()=>{
    t.ready = true;
    updateButtons(); hud(true);
  });

  v.addEventListener('error', ()=>{
    t.ready = false; t.orphan = true;
    toast('SOURCE BODY REJECTED — GHOST REMAINS');
    updateButtons(); hud(true);
  });

  v.load();
}

$('videoInput').addEventListener('change', e=>{
  const file = e.target.files && e.target.files[0];
  if(!file || S.loading < 0){ toast('NO FILE SELECTED'); return; }
  const t = T[S.loading];
  const wasOrphan = t.orphan;
  loadVideoToTrack(file,t);
  S.preview = t.id; setSrc(t.id);
  toast(wasOrphan ? 'WRONG RELINK PERMITTED' : 'SOURCE ' + t.k + ' ARMED');
  e.target.value = '';
});

$('projectInput').addEventListener('change', e=>{
  const file = e.target.files && e.target.files[0];
  if(!file){ toast('NO PROJECT SELECTED'); return; }
  const r = new FileReader();
  r.onload = ()=>{
    try{
      push();
      const obj = JSON.parse(String(r.result || '{}'));
      restoreJSON(obj, true);
    }catch(err){ toast('PROJECT LOAD FAILED'); }
  };
  r.readAsText(file);
  e.target.value = '';
});

function download(name, data, type='application/json'){
  const blob = new Blob([data], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 0);
}

$('play').addEventListener('click',()=>{ S.playing = !S.playing; MON.key=''; if(!S.playing) pauseAllVideos(-1); if(S.playing && runtime()>0 && S.time >= runtime()) S.time = 0; hud(true); });
$('source').addEventListener('click',()=>openSource(S.selected));
document.querySelectorAll('.src').forEach(b=>b.addEventListener('click',()=>setSrc(+b.dataset.i)));
$('undo').addEventListener('click',undo);
$('redo').addEventListener('click',redo);
$('clear').addEventListener('click',()=>{ if(!S.seq.length){ toast('RAIL ALREADY EMPTY'); return; } push(); S.seq=[]; S.time=0; recomputeScars(); toast('RAIL CLEARED — EMPTY TIME RETURNS'); hud(); });
$('save').addEventListener('click',()=>{
  download('arc-splice-ghost-project-' + nowFileStamp() + '.json', JSON.stringify(serialize(), null, 2));
  toast('PROJECT SKELETON SAVED');
});

$('edl').addEventListener('click',()=>{
  const clipEvents = S.seq.slice().sort((a,b)=>a.slot-b.slot||a.layer-b.layer).map((c,n)=>{
    const t = T[c.track];
    return {
      event:n+1,
      kind:'splice',
      source:t.k,
      source_state:sourceState(t),
      source_name:t.name,
      source_file:t.file,
      source_gate:c.src,
      source_in:fmt(c.src),
      source_out:fmt(c.src+c.dur),
      sequence_gate:c.slot,
      sequence_in:fmt(c.slot),
      sequence_out:fmt(c.slot+c.dur),
      layer:c.layer,
      duration_gates:c.dur,
      body_present:!!t.ready,
      orphaned:!t.ready && !!(t.orphan || t.loaded),
      meaning:t.ready ? 'visible body performed' : (t.orphan ? 'missing body still active' : 'signal ghost placeholder')
    };
  });
  const gapEvents = sequenceGaps().map((g,i)=>({
    event:clipEvents.length+i+1,
    kind:'empty-time',
    sequence_gate:g,
    sequence_in:fmt(g),
    sequence_out:fmt(g+1),
    duration_gates:1,
    meaning:'absence intentionally preserved'
  }));
  const edl = {
    type:'arc-splice-edl',
    doctrine:'traveler',
    density:S.density,
    generated_at:new Date().toISOString(),
    note:'This EDL is a performable score. It preserves visible bodies, missing bodies, signal ghosts, and empty time.',
    sources:T.map(t=>({ source:t.k, state:sourceState(t), name:t.name, file:t.file, scars:Array.from(t.scars), relinks:t.relinks||[] })),
    events:clipEvents.concat(gapEvents)
  };
  download('arc-splice-score-' + nowFileStamp() + '.json', JSON.stringify(edl,null,2));
  toast('EDL SCORE EXPORTED · GAPS INCLUDED');
});

window.addEventListener('keydown', e=>{
  if(e.code === 'Space'){ e.preventDefault(); $('play').click(); }
  if((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))){ e.preventDefault(); redo(); return; }
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z'){ e.preventDefault(); undo(); return; }
  if(['1','2','3','4'].includes(e.key)) setSrc(+e.key-1);
  if(e.key.toLowerCase() === 'e') $('edl').click();
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's'){ e.preventDefault(); $('save').click(); }
  if(e.key === 'Delete' || e.key === 'Backspace'){
    const clips = active();
    if(clips.length){
      push();
      const kill = clips[clips.length-1];
      S.seq = S.seq.filter(c=>c.id !== kill.id);
      recomputeScars();
      toast('ACTIVE SPLICE VANISHED');
    }
  }
});

window.addEventListener('resize', resize);

function frame(ts){
  const dt = last ? Math.min(.08,(ts-last)/1000) : 0;
  last = ts;

  if(S.playing && !S.drag && !S.trim && !S.scrub && !S.roll){
    const rt = runtime() || S.density;
    S.time += dt;
    if(S.time >= rt){
      S.time = 0;
      MON.key = '';
    }
  }

  const busy = S.playing || S.drag || S.trim || S.scrub || S.roll;
  const frameMs = busy ? 33 : 66; // light mode: 30fps while active, 15fps while idle
  if(ts - MON.lastDraw >= frameMs){
    draw();
    hud();
    MON.lastDraw = ts;
  }
  requestAnimationFrame(frame);
}

resize();
setSrc(0);
toast('LIGHT GHOST BUILD — ONE DECODER AT A TIME');
requestAnimationFrame(frame);

})();
</script>
</body>
