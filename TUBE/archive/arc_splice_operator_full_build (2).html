<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Arc Splice Operator — Negative Space Build</title>
<style>
:root{--bg:#000;--panel:#050505;--line:#252525;--soft:#777;--fg:#fff;--cyan:#00e5ff;--hot:#ff0055;--warn:#ffd34d;--good:#9cffb8}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

#top{position:fixed;inset:0 0 auto 0;height:54px;z-index:50;background:linear-gradient(#090909,#020202);border-bottom:1px solid #2a2a2a;display:grid;grid-template-columns:minmax(130px,1fr) auto;gap:8px;align-items:center;padding:6px 9px}
.brand{min-width:0;line-height:1.05}.brand b{display:block;color:var(--cyan);font-size:12px;letter-spacing:.13em}.brand span{display:block;margin-top:4px;color:#777;font-size:8px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

button{height:27px;min-width:29px;padding:0 7px;background:#000;border:1px solid #444;color:#fff;font:900 8px ui-monospace,SFMono-Regular,monospace;text-transform:uppercase;letter-spacing:.06em}
button:hover{background:#fff;color:#000;border-color:#fff}button.on{background:var(--cyan);color:#000;border-color:var(--cyan)}button.src.loaded{color:var(--cyan);border-color:var(--cyan)}button.src.on{background:var(--warn);color:#000;border-color:var(--warn)}button:disabled{opacity:.25;cursor:not-allowed}
#foot{position:fixed;inset:auto 0 0 0;height:42px;z-index:50;background:#030303;border-top:1px solid #2a2a2a;display:grid;grid-template-columns:repeat(6,1fr)}
.stat{border-right:1px solid #242424;padding:5px 9px;overflow:hidden}.stat:last-child{border-right:0}.stat label{display:block;color:#666;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.stat output{display:block;margin-top:2px;color:#fff;font-size:12px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cyan{color:var(--cyan)!important}.hot{color:var(--hot)!important}.warn{color:var(--warn)!important}.good{color:var(--good)!important}
#toast{position:fixed;z-index:90;left:50%;bottom:56px;transform:translateX(-50%);background:#fff;color:#000;border:1px solid #fff;padding:8px 12px;font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;opacity:0;pointer-events:none;transition:.16s;max-width:94vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
canvas{position:fixed;left:0;top:54px;display:block;background:#000;cursor:crosshair}
input[type=file]{display:none}#pool{position:fixed;left:-4px;top:-4px;width:2px;height:2px;opacity:.01;overflow:hidden;pointer-events:none;z-index:-1}
@media(max-width:860px){
  #top{height:68px;grid-template-columns:1fr;align-items:start;gap:4px}.brand{display:flex;align-items:baseline;gap:8px}.brand b{font-size:10px}.brand span{font-size:7px;margin-top:0}
  #controls{justify-content:space-between;width:100%;gap:3px}button{height:23px;min-width:24px;padding:0 5px;font-size:7px;letter-spacing:.03em}.hideMob{display:none!important}
  canvas{top:68px}#foot{height:50px;grid-template-columns:repeat(3,1fr)}.mobGone{display:none}.stat{padding:5px 7px}.stat label{font-size:7px}.stat output{font-size:10px}#toast{bottom:64px}
}
</style>
</head>
<body>
<div id="pool"></div>
<input id="videoInput" type="file" accept="video/*,.mp4,.mov,.m4v,.webm,.ogg" />
<input id="projectInput" type="file" accept="application/json,.json" />
<header id="top"><div class="brand"><b>ARC SPLICE OPERATOR</b><span id="hint">load source → pull slice → place on rail → watch cut</span></div><div id="controls"><button id="play">Play</button><button id="source">Source</button><button class="src on" data-i="0">A</button><button class="src" data-i="1">B</button><button class="src" data-i="2">C</button><button class="src" data-i="3">D</button><button id="undo">Undo</button><button id="redo">Redo</button><button id="edl">EDL</button><button id="save" class="hideMob">Save</button><button id="load" class="hideMob">Load</button><button id="clear">Clear</button></div></header>
<canvas id="stage"></canvas>
<footer id="foot"><div class="stat"><label>time</label><output id="time" class="cyan">00:00:00</output></div><div class="stat"><label>mode</label><output id="mode">edit</output></div><div class="stat"><label>source</label><output id="src" class="warn">A empty</output></div><div class="stat"><label>monitor</label><output id="media">no source</output></div><div class="stat mobGone"><label>runtime</label><output id="run" class="hot">0.0s</output></div><div class="stat mobGone"><label>splices</label><output id="clips" class="cyan">0</output></div></footer>
<div id="toast"></div>
<script>
(()=>{
'use strict';
const $=id=>document.getElementById(id),TAU=Math.PI*2,PI=Math.PI;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const wrap=(n,m)=>((n%m)+m)%m;
const canvas=$('stage'),ctx=canvas.getContext('2d',{alpha:false,desynchronized:true}),pool=$('pool');
let W=0,H=0,topH=54,botH=42,M=null,uid=1,last=0,toastTimer=0,hoverClaim='';
const S={density:24,selected:0,loading:-1,preview:0,time:0,playing:false,drag:null,trim:null,scrub:false,roll:null,seq:[],undo:[],redo:[],tx:null,monitorState:'NO SOURCE LOADED'};
const T=[
{id:0,k:'A',h:188,s:100,l:52,state:'empty',ready:false,chunks:24,roll:0,vid:null,url:null,file:null,name:'A_SOURCE',hover:-1,lastSeek:-9,drawError:false},
{id:1,k:'B',h:318,s:100,l:56,state:'empty',ready:false,chunks:24,roll:0,vid:null,url:null,file:null,name:'B_SOURCE',hover:-1,lastSeek:-9,drawError:false},
{id:2,k:'C',h:50,s:100,l:58,state:'empty',ready:false,chunks:24,roll:0,vid:null,url:null,file:null,name:'C_SOURCE',hover:-1,lastSeek:-9,drawError:false},
{id:3,k:'D',h:0,s:0,l:86,state:'empty',ready:false,chunks:24,roll:0,vid:null,url:null,file:null,name:'D_SOURCE',hover:-1,lastSeek:-9,drawError:false}
];
function isLoaded(t){return t.state!=='empty'}
function col(t,a=1,l=t.l){return`hsla(${t.h},${t.s}%,${l}%,${a})`}
function ccol(c,a=1,l=50){return`hsla(${c.h},${c.s}%,${l}%,${a})`}

function fmt(sec){sec=Math.max(0,sec);let f=Math.floor((sec%1)*24),s=Math.floor(sec)%60,m=Math.floor(sec/60);return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(f).padStart(2,'0')}`}
function toast(s){const e=$('toast');e.textContent=s;e.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove('show'),1300)}
function hit(r,x,y){return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h}
function resize(){const mob=innerWidth<860;topH=mob?68:54;botH=mob?50:42;W=innerWidth;H=Math.max(250,innerHeight-topH-botH);let d=Math.max(1,devicePixelRatio||1);canvas.width=Math.floor(W*d);canvas.height=Math.floor(H*d);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(d,0,0,d,0,0);M=metrics(mob)}
function metrics(mob){let pad=mob?8:18,sourceH=Math.max(mob?142:172,Math.min(mob?226:258,H*.38)),seqH=Math.max(mob?124:150,Math.min(mob?182:210,H*.28)),monitorH=H-sourceH-seqH,reelX=mob?42:68,R=mob?Math.max(15,sourceH/17):Math.max(19,sourceH/14),stripX=reelX+R+(mob?24:34),endX=W-pad,stripW=Math.max(108,endX-stripX),slotW=stripW/S.density,trackH=sourceH/4,seqY=sourceH,seqX=stripX,seqW=stripW,rows=mob?3:4,railY=seqY+(mob?16:20),rowTop=seqY+(mob?52:62),rowH=(seqH-(mob?66:78))/rows,monitorY=sourceH+seqH;return{mob,pad,sourceH,seqH,monitorH,reelX,R,stripX,endX,stripW,slotW,trackH,seqY,seqX,seqW,rows,railY,rowTop,rowH,monitorY}}
function editSnap(){return JSON.stringify({seq:S.seq.map(c=>({...c})),time:S.time,selected:S.selected,preview:S.preview,rolls:T.map(t=>t.roll)})}
function restoreEdit(s){let p=JSON.parse(s);S.seq=(p.seq||[]).map(c=>({...c,id:c.id||uid++}));S.time=clamp(p.time||0,0,S.density-.001);S.selected=p.selected||0;S.preview=p.preview||0;(p.rolls||[]).forEach((r,i)=>{if(T[i])T[i].roll=r||0});hud()}
function begin(label){if(S.tx)return;S.tx={label,before:editSnap()}}
function commit(msg=null){if(!S.tx)return;let after=editSnap();if(after!==S.tx.before){S.undo.push({label:S.tx.label,before:S.tx.before,after});if(S.undo.length>80)S.undo.shift();S.redo=[];if(msg)toast(msg+' · undo available')}S.tx=null;hud()}
function cancelTx(){if(S.tx){restoreEdit(S.tx.before);S.tx=null}hud()}
function undo(){let op=S.undo.pop();if(!op){toast('nothing to undo');return}restoreEdit(op.before);S.redo.push(op);toast('undo '+op.label)}
function redo(){let op=S.redo.pop();if(!op){toast('nothing to redo');return}restoreEdit(op.after);S.undo.push(op);toast('redo '+op.label)}
function updateButtons(){document.querySelectorAll('.src').forEach(b=>{let t=T[+b.dataset.i];b.classList.toggle('on',t.id===S.selected);b.classList.toggle('loaded',isLoaded(t))});$('undo').disabled=!S.undo.length;$('redo').disabled=!S.redo.length;$('edl').disabled=!S.seq.length;$('clear').disabled=!S.seq.length}
function setSrc(i){S.selected=clamp(i,0,3);S.preview=S.selected;updateButtons();hud()}
function openSource(i=S.selected){S.loading=i;setSrc(i);$('videoInput').value='';$('videoInput').click();toast('choose source '+T[i].k)}
function runtime(){return S.seq.reduce((m,c)=>Math.max(m,c.slot+c.dur),0)}
function hintText(){if(S.drag)return 'placing slice → rail shows only valid target';if(!T.some(isLoaded))return '1 load source · 2 pull lit slice · 3 drop on rail';if(!S.seq.length)return 'pull a lit slice to the rail';return 'judge the cut · empty time is intentional'}
function hud(){let t=T[S.selected];$('time').textContent=fmt(S.time);$('mode').textContent=S.scrub?'scrub':S.roll?'roll':S.drag?'drag':S.trim?'trim':S.playing?'play':'edit';$('src').textContent=`${t.k} ${isLoaded(t)?'loaded':'empty'}`;$('media').textContent=S.monitorState.toLowerCase();$('media').className=(S.monitorState==='SEQUENCE OUTPUT'||S.monitorState==='SOURCE PREVIEW')?'good':(S.monitorState.includes('ERROR')?'hot':'warn');$('run').textContent=runtime().toFixed(1)+'s';$('clips').textContent=String(S.seq.length);$('play').textContent=S.playing?'Pause':'Play';$('play').classList.toggle('on',S.playing);$('hint').textContent=hintText();updateButtons()}
function drawHold(label,sub,x,y,w,h,t=null){ctx.fillStyle='#020202';ctx.fillRect(x,y,w,h);ctx.strokeStyle=t?col(t,.8,58):'#333';ctx.strokeRect(x+.5,y+.5,w-1,h-1);text(label,x+w/2,y+h/2-9,'center','#fff',M.mob?10:15);if(sub)text(sub,x+w/2,y+h/2+13,'center',t?col(t,1,70):'#888',M.mob?8:10)}
function canDrawVideo(t){return t.vid&&t.vid.readyState>=2&&!t.drawError}
function drawVideo(t,x,y,w,h){if(!canDrawVideo(t))return false;try{ctx.drawImage(t.vid,x,y,w,h);return true}catch(e){t.drawError=true;t.state='draw-error';return false}}
function seekTrack(t,target,playing=false){if(!t.vid||t.vid.readyState<1)return;let dur=t.vid.duration||t.chunks||S.density;target=clamp(target%dur,0,Math.max(0,dur-.04));let now=performance.now();if(Math.abs(t.vid.currentTime-target)>.12&&now-t.lastSeek>70){try{t.vid.currentTime=target;t.lastSeek=now}catch(e){}}if(playing){let p=t.vid.play();if(p&&p.catch)p.catch(()=>{})}else if(!t.vid.paused)t.vid.pause()}
function sourceIndex(t,i){return wrap(Math.round(t.roll)+i,Math.max(1,t.chunks))}
function usedState(track,src){let used=false,active=false;let time=S.time;for(const c of S.seq){if(c.track!==track)continue;if(src>=c.src&&src<c.src+c.dur){used=true;if(time>=c.slot&&time<c.slot+c.dur)active=true}}return active?'hot':used?'stamped':'dim'}
function sourceFill(t,si,hov){let state=usedState(t.id,sourceIndex(t,si));if(hov)return col(t,.75,64);if(state==='hot')return 'rgba(255,0,85,.72)';if(state==='stamped')return col(t,.38,46);return col(t,.16,t.l)}
function drawReel(t){let m=M,cx=m.reelX,cy=t.cy,R=m.R;ctx.lineWidth=2;ctx.strokeStyle=col(t,1,58);ctx.beginPath();ctx.arc(cx,cy,R,0,TAU);ctx.stroke();ctx.strokeStyle=col(t,.32,58);ctx.beginPath();ctx.arc(cx,cy,R*.62,0,TAU);ctx.stroke();ctx.fillStyle='#000';ctx.beginPath();ctx.arc(cx,cy,R*.22,0,TAU);ctx.fill();ctx.strokeStyle='#666';ctx.stroke();for(let i=0;i<16;i++){let a=-PI/2+i*TAU/16+t.roll*TAU/Math.max(1,t.chunks),maj=i%4===0;line(cx+R*(maj?.58:.74)*Math.cos(a),cy+R*(maj?.58:.74)*Math.sin(a),cx+R*.98*Math.cos(a),cy+R*.98*Math.sin(a),col(t,maj?.75:.4,58),maj?1.5:1)}let mx=cx+R*.85;ctx.fillStyle=col(t,.14,58);ctx.fillRect(mx,cy-R*.22,Math.max(8,m.stripX-mx),R*.44);ctx.strokeStyle=col(t,.7,58);ctx.strokeRect(mx,cy-R*.22,Math.max(8,m.stripX-mx),R*.44)}
function slicePath(t,i){let m=M,x=m.stripX+i*m.slotW,y=t.cy,w=m.slotW,h=Math.max(15,m.R*.9),cut=Math.min(6,w*.25),p=new Path2D();p.moveTo(x+cut,y-h/2);p.lineTo(x+w-cut,y-h/2);p.lineTo(x+w,y);p.lineTo(x+w-cut,y+h/2);p.lineTo(x+cut,y+h/2);p.lineTo(x,y);p.closePath();return p}
function drawSources(){let m=M;hoverClaim='';ctx.fillStyle='#020202';ctx.fillRect(0,0,W,m.sourceH);line(0,m.sourceH,W,m.sourceH,'#282828',1.5);T.forEach((t,i)=>{t.cy=i*m.trackH+m.trackH/2;let cy=t.cy;t.load={x:5,y:cy-(m.mob?18:20),w:m.mob?35:50,h:m.mob?36:40};drawReel(t);ctx.fillStyle=isLoaded(t)?col(t,.96,54):'#080808';ctx.strokeStyle=isLoaded(t)?col(t,1,66):(i===S.selected?'#fff':'#444');ctx.lineWidth=i===S.selected?2:1;ctx.fillRect(t.load.x,t.load.y,t.load.w,t.load.h);ctx.strokeRect(t.load.x,t.load.y,t.load.w,t.load.h);text(isLoaded(t)?'VID':'LOAD',t.load.x+t.load.w/2,cy,'center',isLoaded(t)?'#000':'#aaa',m.mob?8:9);let title=isLoaded(t)?(t.file||t.name):`${t.k} empty — load video`;text(title,m.stripX,cy-(m.mob?19:23),'left',isLoaded(t)?col(t,1,66):'#777',m.mob?8:10);text(`${t.state.toUpperCase()} · ROLL ${Math.round(t.roll)}`,m.endX,cy-(m.mob?19:23),'right',t.ready?'#9cffb8':'#777',m.mob?7:9);let fh=m.R*1.42,fy=cy-fh/2;if(isLoaded(t)){ctx.save();ctx.beginPath();ctx.rect(m.stripX,fy,m.stripW,fh);ctx.clip();ctx.fillStyle='#030303';ctx.fillRect(m.stripX,fy,m.stripW,fh);if(canDrawVideo(t)){seekTrack(t,0,false);ctx.globalAlpha=.42;drawVideo(t,m.stripX,fy,m.stripW,fh);ctx.globalAlpha=1;ctx.fillStyle='rgba(0,0,0,.34)';ctx.fillRect(m.stripX,fy,m.stripW,fh);text('VIDEO FRAME SOURCE',m.stripX+8,cy,'left',col(t,1,70),m.mob?8:10)}else{text(t.state==='error'?'VIDEO DECODE ERROR':'WAITING FOR VIDEO FRAME',m.stripX+8,cy,'left',col(t,1,70),m.mob?7:9)}ctx.restore()}for(let si=0;si<S.density;si++){let src=sourceIndex(t,si),p=slicePath(t,si),hov=t.hover===si,state=usedState(t.id,src);ctx.fillStyle=isLoaded(t)?sourceFill(t,si,hov):'rgba(255,255,255,.035)';ctx.strokeStyle=isLoaded(t)?(state==='hot'?'#ff0055':col(t,hov?1:.55,hov?68:t.l)):'#1a1a1a';ctx.lineWidth=hov||state==='hot'?2:1;ctx.fill(p);ctx.stroke(p);if(isLoaded(t)&&(hov||m.slotW>20)){text(String(src).padStart(2,'0'),m.stripX+si*m.slotW+m.slotW/2,cy,'center',hov?'#000':'#111',m.mob?7:8)}if(hov&&isLoaded(t))hoverClaim=`${t.k} · source ${String(src).padStart(2,'0')}s · drag to rail`}});if(hoverClaim){ctx.fillStyle='rgba(0,0,0,.84)';ctx.fillRect(M.stripX,M.sourceH-22,M.stripW,18);text(hoverClaim,M.stripX+8,M.sourceH-13,'left','#fff',M.mob?8:10)}} 
function clipRect(c,slot=c.slot,layer=c.layer,dur=c.dur){let m=M,h=Math.min(36,Math.max(25,m.rowH*.78));return{x:m.seqX+slot*m.slotW,y:m.rowTop+layer*m.rowH-h/2,w:dur*m.slotW,h}}
function clipPath(c,slot=c.slot,layer=c.layer,dur=c.dur){let r=clipRect(c,slot,layer,dur),cut=Math.min(13,Math.max(5,M.slotW*.32)),p=new Path2D();p.moveTo(r.x+cut,r.y);p.lineTo(r.x+r.w,r.y);p.lineTo(r.x+r.w-cut,r.y+r.h);p.lineTo(r.x,r.y+r.h);p.closePath();return p}
function drawClip(c,ghost=false){let p=clipPath(c),r=clipRect(c),t=T[c.track];ctx.fillStyle=ccol(c,ghost?.42:.9,ghost?64:46);ctx.fill(p);ctx.strokeStyle=ghost?'#00e5ff':'#000';ctx.lineWidth=ghost?2:1;ctx.stroke(p);if(r.w>32)text(`${t.k}:${c.src}s`,r.x+r.w/2,r.y+r.h/2,'center','#000',M.mob?8:10);ctx.fillStyle='rgba(255,255,255,.28)';ctx.fillRect(r.x-2,r.y+4,4,r.h-8);ctx.fillRect(r.x+r.w-2,r.y+4,4,r.h-8)}
function overlaps(slot,dur,layer,ignore=null){return S.seq.some(c=>c.id!==ignore&&c.layer===layer&&slot<c.slot+c.dur&&c.slot<slot+dur)}
function resolveLayer(slot,dur,preferred,ignore=null){for(let d=0;d<M.rows;d++){let a=preferred+d;if(a<M.rows&&!overlaps(slot,dur,a,ignore))return a;let b=preferred-d;if(b>=0&&!overlaps(slot,dur,b,ignore))return b}return-1}
function dragPreview(){if(!S.drag)return null;let d=S.drag,m=M,slot=clamp(Math.round((d.x-d.off-m.seqX)/m.slotW),0,S.density-d.clip.dur),pref=clamp(Math.floor((d.y-(m.rowTop-m.rowH*.5))/m.rowH),0,m.rows-1),layer=resolveLayer(slot,d.clip.dur,pref,d.kind==='move'?d.clip.id:null);return{slot,pref,layer}}
function hasAnyActiveAt(t){return S.seq.some(c=>t>=c.slot&&t<c.slot+c.dur)}
function drawGaps(){let m=M;for(let i=0;i<S.density;i++){if(!hasAnyActiveAt(i+.5)){let x=m.seqX+i*m.slotW;ctx.fillStyle='rgba(255,255,255,.025)';ctx.fillRect(x,m.rowTop-m.rowH*.48,m.slotW,m.rowH*m.rows)}}}
function drawTimeline(){let m=M;ctx.fillStyle='#050505';ctx.fillRect(0,m.seqY,W,m.seqH);line(0,m.seqY,W,m.seqY,'#282828',1.5);line(0,m.seqY+m.seqH,W,m.seqY+m.seqH,'#282828',1.5);line(m.seqX,m.railY,m.seqX+m.seqW,m.railY,'#444',1.4);for(let i=0;i<=S.density;i++){let x=m.seqX+i*m.slotW,maj=i%4===0,mid=i%2===0,len=maj?22:mid?14:8;line(x,m.railY-len/2,x,m.railY+len/2,maj?'#999':'#444',maj?1.4:1);if(maj&&!m.mob)text(i+'s',x,m.railY+25,'center','#777',9)}for(let r=0;r<m.rows;r++){let y=m.rowTop+r*m.rowH;line(m.seqX,y,m.seqX+m.seqW,y,'#171717',1);text(String(r+1),m.seqX-12,y,'right','#555',m.mob?8:9)}drawGaps();if(!S.seq.length){let msg=T.some(isLoaded)?'pull a lit slice to the rail':'1. load source   2. pull lit slice   3. drop on rail';text(msg,m.seqX+m.seqW/2,m.rowTop+m.rowH,'center','#555',m.mob?8:11)}S.seq.forEach(c=>drawClip(c));if(S.drag){let p=dragPreview();if(p){ctx.setLineDash([5,5]);drawClip({...S.drag.clip,slot:p.slot,layer:p.layer<0?p.pref:p.layer},true);ctx.setLineDash([]);let label=p.layer>=0?`placing ${T[S.drag.clip.track].k}:${String(S.drag.clip.src).padStart(2,'0')} → sequence ${String(p.slot).padStart(2,'0')} · layer ${p.layer+1}`:'lane blocked';ctx.fillStyle='rgba(0,0,0,.86)';ctx.fillRect(m.seqX,m.seqY+m.seqH-24,m.seqW,20);text(label,m.seqX+m.seqW/2,m.seqY+m.seqH-14,'center',p.layer>=0?'#00e5ff':'#ff0055',m.mob?8:10)}}}
function active(){let t=S.time;return S.seq.filter(c=>t>=c.slot&&t<c.slot+c.dur).sort((a,b)=>b.layer-a.layer||b.id-a.id)}
function drawClipMedia(c,x,y,w,h,alpha=1){let t=T[c.track];ctx.save();ctx.globalAlpha=alpha;if(!isLoaded(t)){drawHold('SOURCE NOT LOADED',`track ${t.k}`,x,y,w,h,t);ctx.restore();return}seekTrack(t,c.src+(S.time-c.slot),S.playing);if(!drawVideo(t,x,y,w,h)){drawHold(t.state==='error'?'VIDEO ERROR':'WAITING FOR DECODER',t.file||t.name,x,y,w,h,t)}ctx.restore()}
function drawMonitor(){let m=M,y0=m.monitorY;ctx.fillStyle='#000';ctx.fillRect(0,y0,W,m.monitorH);line(0,y0,W,y0,'#272727',1.5);let vh=Math.max(50,m.monitorH-(m.mob?14:24)),vw=vh*16/9,maxW=Math.min(m.seqW,W-m.pad*2);if(vw>maxW){vw=maxW;vh=vw*9/16}let vx=(W-vw)/2,vy=y0+Math.max(7,(m.monitorH-vh)/2);ctx.fillStyle='#050505';ctx.fillRect(vx,vy,vw,vh);ctx.strokeStyle='#303030';ctx.strokeRect(vx,vy,vw,vh);let clips=active(),prev=T[S.preview]&&isLoaded(T[S.preview])?T[S.preview]:T.find(isLoaded);ctx.save();ctx.beginPath();ctx.rect(vx,vy,vw,vh);ctx.clip();if(S.drag){S.monitorState='PENDING SPLICE';drawHold('PENDING SPLICE','release on rail to commit',vx,vy,vw,vh,T[S.drag.clip.track])}else if(clips.length){S.monitorState='SEQUENCE OUTPUT';clips.forEach((c,i)=>drawClipMedia(c,vx,vy,vw,vh,i?0.45:1))}else if(S.seq.length && !hasAnyActiveAt(S.time)){S.monitorState='EMPTY TIME';drawHold('EMPTY TIME','black / silence / waiting',vx,vy,vw,vh,null)}else if(prev){seekTrack(prev,0,S.playing);if(!drawVideo(prev,vx,vy,vw,vh)){S.monitorState=prev.state==='error'||prev.state==='draw-error'?'VIDEO ERROR':'SOURCE PREVIEW';drawHold(prev.state==='error'?'VIDEO ERROR':'SOURCE PREVIEW',prev.file||prev.name,vx,vy,vw,vh,prev)}else{S.monitorState='SOURCE PREVIEW';ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(vx,vy,vw,vh);text('SOURCE PREVIEW — DRAG A LIT SLICE TO THE RAIL',vx+vw/2,vy+vh/2,'center','#fff',m.mob?8:12)}}else{S.monitorState='NO SOURCE LOADED';drawHold('NO SOURCE LOADED','tap SOURCE or A/B/C/D',vx,vy,vw,vh,null)}ctx.restore();ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(vx,vy,vw,24);text(S.monitorState,vx+8,vy+12,'left',S.monitorState==='SEQUENCE OUTPUT'?'#9cffb8':S.monitorState==='EMPTY TIME'?'#ffd34d':'#777',m.mob?8:10);ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(vx+vw/2-52,vy+vh-27,104,22);text(fmt(S.time),vx+vw/2,vy+vh-16,'center',S.playing?'#00e5ff':'#fff',m.mob?11:13)}
function draw(){if(!M)return;ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);for(let x=0;x<W;x+=(M.mob?32:40))line(x,0,x,H,'#090909');for(let y=0;y<H;y+=(M.mob?32:40))line(0,y,W,y,'#090909');drawSources();drawTimeline();let x=M.seqX+clamp(S.time,0,S.density)/S.density*M.seqW;line(x,0,x,M.monitorY,'#ff0055',1.8);ctx.fillStyle='#ff0055';ctx.beginPath();ctx.moveTo(x-6,M.seqY);ctx.lineTo(x+6,M.seqY);ctx.lineTo(x,M.seqY+9);ctx.fill();drawMonitor()}
function ptr(e){let r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
function hitSource(x,y){for(let t of T){if(hit(t.load,x,y))return{type:'load',t};if(Math.hypot(x-M.reelX,y-t.cy)<=M.R*1.3)return{type:'roll',t};if(isLoaded(t)&&Math.abs(y-t.cy)<M.R*1.12&&x>=M.stripX&&x<=M.endX){let si=clamp(Math.floor((x-M.stripX)/M.slotW),0,S.density-1);if(ctx.isPointInPath(slicePath(t,si),x,y))return{type:'slice',t,si,src:sourceIndex(t,si)}}}return null}
function hitClip(x,y){for(let i=S.seq.length-1;i>=0;i--){let c=S.seq[i],r=clipRect(c);if(hit({x:r.x-11,y:r.y,w:22,h:r.h},x,y))return{type:'trimL',c,i};if(hit({x:r.x+r.w-11,y:r.y,w:22,h:r.h},x,y))return{type:'trimR',c,i};if(ctx.isPointInPath(clipPath(c),x,y))return{type:'clip',c,i}}return null}
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('pointerdown',e=>{let p=ptr(e),m=M;if(p.y>=m.seqY&&p.y<=m.seqY+36&&p.x>=m.seqX&&p.x<=m.seqX+m.seqW){S.scrub=true;S.playing=false;S.time=clamp((p.x-m.seqX)/m.seqW*S.density,0,S.density-.001);canvas.setPointerCapture(e.pointerId);hud();return}let ch=p.y>m.seqY+36&&p.y<m.seqY+m.seqH?hitClip(p.x,p.y):null;if(ch){begin(ch.type==='clip'?'move':'trim');if(ch.type==='clip')S.drag={kind:'move',clip:ch.c,x:p.x,y:p.y,off:p.x-(m.seqX+ch.c.slot*m.slotW),orig:{slot:ch.c.slot,layer:ch.c.layer}};else S.trim={kind:ch.type,c:ch.c,x:p.x,slot:ch.c.slot,src:ch.c.src,dur:ch.c.dur};canvas.setPointerCapture(e.pointerId);hud();return}let sh=p.y<m.sourceH?hitSource(p.x,p.y):null;if(sh){setSrc(sh.t.id);if(sh.type==='load'){openSource(sh.t.id);return}if(sh.type==='roll'){begin('roll');S.roll={t:sh.t,x:p.x,roll:sh.t.roll};canvas.setPointerCapture(e.pointerId);hud();return}if(sh.type==='slice'){begin('place');S.drag={kind:'new',clip:{id:uid++,track:sh.t.id,h:sh.t.h,s:sh.t.s,src:sh.src,slot:0,layer:0,dur:1},x:p.x,y:p.y,off:m.slotW*.5};canvas.setPointerCapture(e.pointerId);hud();return}}if(p.y>m.monitorY){S.playing=!S.playing;hud()}});
canvas.addEventListener('pointermove',e=>{let p=ptr(e),m=M;if(S.scrub){S.time=clamp((p.x-m.seqX)/m.seqW*S.density,0,S.density-.001);hud();return}if(S.roll){S.roll.t.roll=S.roll.roll+(p.x-S.roll.x)/Math.max(8,m.slotW);hud();return}if(S.trim){let q=S.trim,c=q.c,dx=Math.round((p.x-q.x)/m.slotW);if(q.kind==='trimR')c.dur=clamp(q.dur+dx,1,S.density-c.slot);else{let d=clamp(dx,-Math.min(q.slot,q.src),q.dur-1);c.slot=q.slot+d;c.src=q.src+d;c.dur=q.dur-d}hud();return}if(S.drag){S.drag.x=p.x;S.drag.y=p.y;hud();return}canvas.style.cursor='crosshair';T.forEach(t=>t.hover=-1);let sh=p.y<m.sourceH?hitSource(p.x,p.y):null;if(sh){canvas.style.cursor=sh.type==='slice'?'grab':sh.type==='roll'?'ew-resize':'pointer';if(sh.type==='slice')sh.t.hover=sh.si}let ch=p.y>m.seqY+36&&p.y<m.seqY+m.seqH?hitClip(p.x,p.y):null;if(ch)canvas.style.cursor=ch.type==='clip'?'grab':'ew-resize'});
function finishDrag(){if(!S.drag)return;let d=S.drag,m=M,p=dragPreview();if(p&&d.y>=m.seqY&&d.y<=m.seqY+m.seqH&&d.x>=m.seqX-24&&d.x<=m.seqX+m.seqW+24&&p.layer>=0){d.clip.slot=p.slot;d.clip.layer=p.layer;if(d.kind==='new')S.seq.push(d.clip);S.preview=d.clip.track;commit(d.kind==='new'?'splice placed':'splice moved')}else{toast(p&&p.layer<0?'lane blocked':'drop cancelled');cancelTx()}S.drag=null}
canvas.addEventListener('pointerup',e=>{if(S.scrub){S.scrub=false;hud()}if(S.roll){S.roll=null;commit('source rolled')}if(S.trim){S.trim=null;commit('clip trimmed')}finishDrag();try{canvas.releasePointerCapture(e.pointerId)}catch(err){}hud()});
canvas.addEventListener('pointercancel',()=>{S.scrub=false;S.roll=null;S.trim=null;S.drag=null;cancelTx();hud()});
$('videoInput').addEventListener('change',e=>{let file=e.target.files&&e.target.files[0];if(!file||S.loading<0){toast('no file selected');return}let t=T[S.loading];t.state='loading';t.ready=false;t.drawError=false;t.file=file.name;t.name=file.name.replace(/\.[^.]+$/,'').slice(0,16).toUpperCase();t.chunks=S.density;t.roll=0;S.preview=t.id;setSrc(t.id);toast('source '+t.k+' loading');let v=t.vid;if(!v){v=document.createElement('video');v.muted=true;v.defaultMuted=true;v.playsInline=true;v.setAttribute('playsinline','');v.setAttribute('webkit-playsinline','');v.loop=true;v.preload='auto';v.controls=false;pool.appendChild(v);t.vid=v}if(t.url)URL.revokeObjectURL(t.url);t.url=URL.createObjectURL(file);v.pause();v.removeAttribute('src');v.load();v.onloadedmetadata=()=>{let dur=isFinite(v.duration)?Math.max(1,Math.floor(v.duration)):S.density;t.chunks=clamp(dur,1,S.density);t.state='metadata';try{v.currentTime=Math.min(.05,Math.max(0,(v.duration||1)-.05))}catch(err){}toast('source '+t.k+' metadata');hud()};v.onloadeddata=()=>{t.ready=true;t.state='ready';t.drawError=false;toast('source '+t.k+' ready');hud()};v.oncanplay=()=>{t.ready=true;t.state='ready';t.drawError=false;hud()};v.onerror=()=>{t.ready=false;t.state='error';toast('video decode failed');hud()};v.src=t.url;v.load();S.loading=-1;e.target.value='';hud()});
document.querySelectorAll('.src').forEach(b=>b.addEventListener('click',()=>{let i=+b.dataset.i;setSrc(i);if(!isLoaded(T[i]))openSource(i);else toast('source '+T[i].k+' selected')}));
$('source').addEventListener('click',()=>openSource(S.selected));
$('play').addEventListener('click',()=>{S.playing=!S.playing;hud()});
$('undo').addEventListener('click',undo);$('redo').addEventListener('click',redo);
$('clear').addEventListener('click',()=>{if(S.seq.length){begin('clear');S.seq=[];S.time=0;commit('sequence cleared')}});
function download(data,name){let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}
function buildEDL(){let clips=S.seq.slice().sort((a,b)=>a.slot-b.slot||a.layer-b.layer),events=[],cursor=0,n=1;for(const c of clips){if(c.layer===0&&c.slot>cursor){events.push({event:n++,type:'GAP',label:'EMPTY TIME',sequence_in:fmt(cursor),sequence_out:fmt(c.slot),duration_sec:c.slot-cursor})}events.push({event:n++,type:'CLIP',track:T[c.track].k,source_file:T[c.track].file,source_in:fmt(c.src),source_out:fmt(c.src+c.dur),sequence_in:fmt(c.slot),sequence_out:fmt(c.slot+c.dur),layer:c.layer,duration_sec:c.dur});if(c.layer===0)cursor=Math.max(cursor,c.slot+c.dur)}let rt=runtime();if(rt>cursor)events.push({event:n++,type:'GAP',label:'EMPTY TIME',sequence_in:fmt(cursor),sequence_out:fmt(rt),duration_sec:rt-cursor});return events}
$('edl').addEventListener('click',()=>{download(buildEDL(),'arc_splice_edl_'+Date.now()+'.json');toast('edl exported')});
$('save').addEventListener('click',()=>{download({version:6,principle:'negative-space-editor',note:'Media files are browser-local. Reload project, then relink sources A-D.',time:S.time,seq:S.seq,tracks:T.map(t=>({id:t.id,k:t.k,file:t.file,name:t.name,state:t.state,chunks:t.chunks,roll:t.roll}))},'arc_splice_project_'+Date.now()+'.json');toast('project saved')});
$('load').addEventListener('click',()=>$('projectInput').click());
$('projectInput').addEventListener('change',e=>{let f=e.target.files&&e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let p=JSON.parse(r.result);begin('load project');S.seq=(p.seq||[]).map(c=>({...c,id:c.id||uid++}));(p.tracks||[]).forEach(a=>{let t=T[a.id];if(!t)return;t.file=a.file||null;t.name=a.name||t.name;t.chunks=a.chunks||24;t.roll=a.roll||0;if(!t.vid){t.state=a.file?'offline':'empty';t.ready=false}});S.time=p.time||0;commit('project loaded');toast('project loaded — relink videos')}catch(err){toast('project load failed')}};r.readAsText(f);e.target.value=''});
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();S.playing=!S.playing;hud()}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'){e.preventDefault();undo()}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='y'){e.preventDefault();redo()}if(['1','2','3','4'].includes(e.key))setSrc(+e.key-1);if(e.key.toLowerCase()==='e'&&S.seq.length)$('edl').click();if((e.key==='Backspace'||e.key==='Delete')&&S.seq.length){let lastClip=S.seq[S.seq.length-1];begin('delete');S.seq=S.seq.filter(c=>c.id!==lastClip.id);commit('last clip deleted')}})
window.addEventListener('resize',resize);
function frame(ts){let dt=last?Math.min(.05,(ts-last)/1000):0;last=ts;if(S.playing&&!S.drag&&!S.trim&&!S.scrub&&!S.roll){let rt=runtime()||S.density;S.time+=dt;if(S.time>=rt)S.time=0}draw();hud();requestAnimationFrame(frame)}
resize();setSrc(0);hud();requestAnimationFrame(frame);
})();
