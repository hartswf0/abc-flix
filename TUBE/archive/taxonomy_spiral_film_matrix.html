<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Taxonomy Spiral Film Matrix</title>
<style>
  :root{
    --bg:#F9F9F7;
    --fg:#1E1E1E;
    --muted:rgba(30,30,30,.42);
    --grid:rgba(30,30,30,.07);
    --hot:#E61E0A;
    --possible:#C4D4C4;
    --plausible:#9AC094;
    --probable:#6FCD4B;
    --preferred:#BEEB2D;
  }
  *{box-sizing:border-box;border-radius:0!important;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:"Courier New",Courier,ui-monospace,monospace;user-select:none;touch-action:none}
  body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:40px 40px;opacity:.75}
  #stage{position:fixed;inset:0;width:100vw;height:100dvh;display:block;cursor:crosshair}
  #hud{position:fixed;left:14px;top:12px;z-index:5;display:flex;gap:6px;align-items:center;max-width:calc(100vw - 28px);pointer-events:none}
  #mark{border:2px solid var(--fg);background:rgba(249,249,247,.92);box-shadow:4px 4px 0 rgba(0,0,0,.08);padding:8px 10px;font-size:11px;line-height:1.05;font-weight:900;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;pointer-events:auto}
  #mark b{color:var(--hot)}
  .btn{height:34px;border:2px solid var(--fg);background:rgba(249,249,247,.92);color:var(--fg);font:900 10px/1 "Courier New",monospace;text-transform:uppercase;letter-spacing:.08em;padding:0 10px;cursor:pointer;box-shadow:4px 4px 0 rgba(0,0,0,.08);pointer-events:auto}
  .btn.on{background:var(--fg);color:var(--bg)}
  #file{display:none}
  #read{position:fixed;right:14px;top:12px;z-index:4;border:2px solid var(--fg);background:rgba(249,249,247,.92);box-shadow:4px 4px 0 rgba(0,0,0,.08);padding:8px 10px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;line-height:1.35;text-align:right;pointer-events:none;min-width:168px}
  #read span{color:var(--hot)}
  #legend{position:fixed;left:14px;bottom:74px;z-index:4;display:grid;grid-template-columns:repeat(4,max-content);gap:5px;pointer-events:none}
  .chip{border:1px solid var(--fg);background:rgba(249,249,247,.8);font-size:9px;font-weight:900;letter-spacing:.08em;padding:4px 6px;text-transform:uppercase;box-shadow:2px 2px 0 rgba(0,0,0,.06)}
  .chip i{display:inline-block;width:9px;height:9px;margin-right:4px;border:1px solid var(--fg);vertical-align:-1px}
  #hint{position:fixed;right:14px;bottom:74px;z-index:4;color:rgba(30,30,30,.45);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;text-align:right;pointer-events:none}
  #toast{position:fixed;left:50%;top:56px;transform:translateX(-50%);z-index:10;border:2px solid var(--fg);background:var(--fg);color:var(--bg);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;padding:7px 12px;opacity:0;transition:opacity .18s;pointer-events:none;box-shadow:4px 4px 0 rgba(0,0,0,.12)}
  #toast.on{opacity:1}
  @media(max-width:760px){
    #hud{left:8px;right:8px;top:8px;gap:4px;flex-wrap:wrap}
    #mark{width:100%;font-size:10px;padding:7px 8px}
    .btn{height:31px;font-size:9px;padding:0 8px;flex:1 1 auto}
    #read{top:auto;left:8px;right:8px;bottom:8px;text-align:left;display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;min-width:0;font-size:9px;padding:7px 8px}
    #legend{left:8px;bottom:56px;grid-template-columns:repeat(2,max-content);gap:4px}
    #hint{display:none}
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div id="hud">
  <div id="mark"><b>Taxonomy Spiral</b> / Film Matrix</div>
  <button class="btn" id="loadBtn">Load Media</button>
  <button class="btn" id="playBtn">Play</button>
  <button class="btn" id="unspoolBtn">Unspool</button>
  <button class="btn" id="rewrapBtn">Rewrap</button>
  <button class="btn" id="seedBtn">Seed</button>
  <button class="btn" id="resetBtn">Reset</button>
</div>
<input id="file" type="file" accept="image/*,video/*" multiple />

<div id="read">
  <div>Morph X <span id="rx">Circle</span></div>
  <div>Topology Y <span id="ry">Separate</span></div>
  <div>Frame <span id="rf">0</span></div>
  <div>Mode <span id="rm">Roll</span></div>
</div>

<div id="legend">
  <div class="chip"><i style="background:var(--possible)"></i>Possible / widest</div>
  <div class="chip"><i style="background:var(--plausible)"></i>Plausible</div>
  <div class="chip"><i style="background:var(--probable)"></i>Probable</div>
  <div class="chip"><i style="background:var(--preferred)"></i>Preferred / top</div>
</div>
<div id="hint">Drag field = phase space<br>Scrub bottom strip = film</div>
<div id="toast"></div>

<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d', { alpha:false });
  const fileInput = document.getElementById('file');

  const TAU = Math.PI * 2;
  const ARC_STEPS = 12;
  const DPR_MAX = 2;

  const TRACKS = [
    { key:'possible',  name:'POSSIBLE',  n:32, color:'#C4D4C4', scale:1.00, alpha:.72, turn: 1 },
    { key:'plausible', name:'PLAUSIBLE', n:24, color:'#9AC094', scale:.76, alpha:.74, turn:-1 },
    { key:'probable',  name:'PROBABLE',  n:16, color:'#6FCD4B', scale:.54, alpha:.76, turn: 1 },
    { key:'preferred', name:'PREFERRED', n: 8, color:'#BEEB2D', scale:.34, alpha:.84, turn:-1 }
  ];

  const offsets = [];
  let totalUnits = 0;
  TRACKS.forEach((t, i) => { offsets[i] = totalUnits; totalUnits += t.n; });

  const state = {
    w:0, h:0, dpr:1,
    x:.04, y:.08,
    targetX:.04, targetY:.08,
    pointer:false,
    playing:false,
    auto:false,
    spin:0,
    frameOffset:0,
    frames:[],
    scrub:false,
    last:performance.now(),
    toastTimer:null
  };

  const $ = id => document.getElementById(id);
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
  const lerp = (a,b,t) => a + (b-a)*t;
  const ease = t => t*t*(3-2*t);
  const mix = (A,B,t) => ({ x:lerp(A.x,B.x,t), y:lerp(A.y,B.y,t) });
  const rgba = (hex,a) => {
    const h = hex.replace('#','');
    const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
    return `rgba(${r},${g},${b},${a})`;
  };

  function resize(){
    state.dpr = Math.min(window.devicePixelRatio || 1, DPR_MAX);
    state.w = Math.floor(innerWidth);
    state.h = Math.floor(innerHeight);
    canvas.width = Math.floor(state.w * state.dpr);
    canvas.height = Math.floor(state.h * state.dpr);
    canvas.style.width = state.w + 'px';
    canvas.style.height = state.h + 'px';
    ctx.setTransform(state.dpr,0,0,state.dpr,0,0);
  }

  function toast(msg){
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('on');
    clearTimeout(state.toastTimer);
    state.toastTimer = setTimeout(() => t.classList.remove('on'), 1400);
  }

  function makeCanvas(w=320,h=180){
    const c = document.createElement('canvas'); c.width=w; c.height=h; return c;
  }

  function coverDraw(c, source, x, y, w, h){
    const sw = source.videoWidth || source.naturalWidth || source.width;
    const sh = source.videoHeight || source.naturalHeight || source.height;
    if(!sw || !sh) return;
    const a = sw / sh, da = w / h;
    let sx=0, sy=0, sww=sw, shh=sh;
    if(a > da){ sww = sh * da; sx = (sw - sww)/2; }
    else { shh = sw / da; sy = (sh - shh)/2; }
    c.drawImage(source, sx, sy, sww, shh, x, y, w, h);
  }

  function addSourceFrame(source, label='MEDIA'){
    const c = makeCanvas(320,180);
    const gx = c.getContext('2d');
    gx.fillStyle = '#111'; gx.fillRect(0,0,c.width,c.height);
    coverDraw(gx, source, 0, 0, c.width, c.height);
    state.frames.push({ canvas:c, label });
  }

  function seedFrames(){
    state.frames.length = 0;
    const words = ['SIGNAL','GRAIN','RIVER','GLASS','BONE','ECHO','FIELD','FRAME','RIFT','DREAM','INDEX','FLOW'];
    for(let i=0;i<96;i++){
      const c = makeCanvas(320,180);
      const g = c.getContext('2d');
      const tr = TRACKS[i % TRACKS.length];
      g.fillStyle = '#f6f6f0'; g.fillRect(0,0,c.width,c.height);
      g.fillStyle = rgba(tr.color,.42); g.fillRect(0,0,c.width,c.height);
      g.strokeStyle = 'rgba(30,30,30,.15)'; g.lineWidth = 1;
      for(let x=0;x<c.width;x+=20){ g.beginPath(); g.moveTo(x,0); g.lineTo(x,c.height); g.stroke(); }
      for(let y=0;y<c.height;y+=20){ g.beginPath(); g.moveTo(0,y); g.lineTo(c.width,y); g.stroke(); }
      const cx = c.width/2, cy = c.height/2;
      g.save(); g.translate(cx, cy); g.rotate((i*.17)%TAU);
      for(let r=16;r<150;r+=18){
        g.beginPath(); g.arc(0,0,r,0,TAU); g.strokeStyle = rgba(tr.color,.65-r/300); g.lineWidth = 7; g.stroke();
      }
      g.restore();
      g.fillStyle = 'rgba(30,30,30,.86)';
      g.font = '900 34px Courier New, monospace';
      g.textAlign = 'center'; g.textBaseline = 'middle';
      g.fillText(words[i % words.length], cx, cy-4);
      g.font = '900 12px Courier New, monospace';
      g.fillText(`${tr.name} · ${String(i+1).padStart(3,'0')}`, cx, cy+34);
      state.frames.push({ canvas:c, label:`seed-${i}` });
    }
    state.frameOffset = 0;
    toast('Seeded 96 procedural film frames');
  }

  async function ingestFiles(files){
    if(!files.length) return;
    toast('Scanning media');
    for(const file of files){
      if(file.type.startsWith('image/')) await ingestImage(file);
      else if(file.type.startsWith('video/')) await ingestVideo(file);
    }
    toast(`${state.frames.length} frames in matrix`);
  }

  async function ingestImage(file){
    const url = URL.createObjectURL(file);
    const img = new Image(); img.decoding = 'async'; img.src = url;
    await new Promise((res, rej) => { img.onload=res; img.onerror=rej; });
    addSourceFrame(img, file.name);
    URL.revokeObjectURL(url);
  }

  async function seekVideo(video, t){
    return new Promise(resolve => {
      const done = () => { video.removeEventListener('seeked', done); resolve(); };
      video.addEventListener('seeked', done, { once:true });
      video.currentTime = Math.min(Math.max(t, 0), Math.max(0, video.duration - .05));
    });
  }

  async function ingestVideo(file){
    const url = URL.createObjectURL(file);
    const v = document.createElement('video');
    v.src = url; v.muted = true; v.playsInline = true; v.preload = 'metadata';
    await new Promise((res, rej) => { v.onloadedmetadata=res; v.onerror=rej; });
    const dur = Math.min(v.duration || 0, 12);
    const count = clamp(Math.floor(dur * 8), 8, 96);
    for(let i=0;i<count;i++){
      await seekVideo(v, (i / count) * dur);
      addSourceFrame(v, `${file.name}:${i}`);
    }
    URL.revokeObjectURL(url);
  }

  function layout(){
    const dock = state.w < 760 ? 58 : 70;
    const topPad = state.w < 760 ? 92 : 70;
    const stageH = Math.max(120, state.h - dock - topPad);
    const cy = topPad + stageH * .50;
    const cx = state.w * .50;
    const gapX = state.w * .27;
    const gapY = stageH * .25;
    const sep = [
      { x:cx-gapX, y:cy-gapY },
      { x:cx+gapX, y:cy-gapY },
      { x:cx-gapX, y:cy+gapY },
      { x:cx+gapX, y:cy+gapY }
    ];
    const maxByW = state.w < 760 ? state.w*.33 : state.w*.20;
    const maxByH = stageH*.24;
    const sepR = Math.max(38, Math.min(maxByW, maxByH));
    const superR = Math.max(72, Math.min(state.w*.39, stageH*.43));
    return { cx, cy, sep, sepR, superR, dock, topPad, stageH };
  }

  function rectPathPoints(l,t,r,b){
    const pts = [{x:l,y:b},{x:l,y:t}];
    for(let j=1;j<ARC_STEPS;j++) pts.push({ x:lerp(l,r,j/ARC_STEPS), y:t });
    pts.push({x:r,y:t},{x:r,y:b});
    return pts;
  }

  function sectorPathPoints(cx,cy,r,a0,a1){
    const pts = [{x:cx,y:cy}];
    for(let j=0;j<=ARC_STEPS;j++){
      const a = lerp(a0,a1,j/ARC_STEPS);
      pts.push({ x:cx + Math.cos(a)*r, y:cy + Math.sin(a)*r });
    }
    pts.push({x:cx,y:cy});
    return pts;
  }

  function orientedRectPoints(cx,cy,w,h,ang){
    const base = rectPathPoints(-w/2,-h/2,w/2,h/2);
    const ca = Math.cos(ang), sa = Math.sin(ang);
    return base.map(p => ({ x:cx + p.x*ca - p.y*sa, y:cy + p.x*sa + p.y*ca }));
  }

  function tileRect(track, i, lyt){
    const n = track.n;
    const cols = Math.ceil(Math.sqrt(n * 1.55));
    const rows = Math.ceil(n / cols);
    const col = i % cols;
    const row = Math.floor(i / cols);
    const side = lyt.superR * 1.42 * track.scale;
    const tw = side / cols;
    const th = side / rows;
    const x0 = lyt.cx - side/2 + col * tw;
    const y0 = lyt.cy - side/2 + row * th;
    return { l:x0, t:y0, r:x0+tw, b:y0+th, cx:x0+tw/2, cy:y0+th/2, w:tw, h:th };
  }

  function getUnit(trackIndex, i){
    const lyt = layout();
    const tr = TRACKS[trackIndex];
    const topo = ease(state.y);
    const morph = ease(state.x);
    const separate = lyt.sep[trackIndex];
    const center = {
      x: lerp(separate.x, lyt.cx, topo),
      y: lerp(separate.y, lyt.cy, topo)
    };
    const r = lerp(lyt.sepR, lyt.superR, topo) * tr.scale;
    const spin = state.spin * tr.turn * (1.0 - trackIndex*.08);
    const a0 = -Math.PI/2 + spin + (i / tr.n) * TAU;
    const a1 = -Math.PI/2 + spin + ((i+1) / tr.n) * TAU;
    const circlePts = sectorPathPoints(center.x, center.y, r, a0, a1);

    const rect = tileRect(tr, i, lyt);
    const squarePts = rectPathPoints(rect.l, rect.t, rect.r, rect.b);

    const global = offsets[trackIndex] + i;
    const gt = totalUnits <= 1 ? 0 : global/(totalUnits-1);
    const turns = 4.25;
    const sr = lerp(Math.max(18, lyt.superR*.055), lyt.superR*.92, gt);
    const sa = -Math.PI/2 + gt*TAU*turns + state.spin*.22;
    const spx = lyt.cx + Math.cos(sa)*sr;
    const spy = lyt.cy + Math.sin(sa)*sr;
    const fw = clamp(lyt.superR*.18*(1.05-trackIndex*.12), 10, 30);
    const fh = fw * .62;
    const spiralPts = orientedRectPoints(spx, spy, fw, fh, sa + Math.PI/2);

    let pts;
    if(morph < .5){
      const t = ease(morph * 2);
      pts = circlePts.map((p,k) => mix(p, spiralPts[k], t));
    } else {
      const t = ease((morph - .5) * 2);
      pts = spiralPts.map((p,k) => mix(p, squarePts[k], t));
    }

    const bbox = pts.reduce((b,p) => ({
      l:Math.min(b.l,p.x), t:Math.min(b.t,p.y), r:Math.max(b.r,p.x), b:Math.max(b.b,p.y)
    }), {l:Infinity,t:Infinity,r:-Infinity,b:-Infinity});
    bbox.w = bbox.r - bbox.l; bbox.h = bbox.b - bbox.t;
    const c = pts.reduce((a,p) => ({x:a.x+p.x/pts.length,y:a.y+p.y/pts.length}), {x:0,y:0});
    return { pts, bbox, center:c, track:tr, trackIndex, i, global, rect, spiral:{x:spx,y:spy,a:sa} };
  }

  function beginPath(pts){
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
  }

  function drawProcedural(unit){
    const { bbox, track, global } = unit;
    ctx.fillStyle = rgba(track.color, .88);
    ctx.fillRect(bbox.l, bbox.t, bbox.w, bbox.h);
    ctx.strokeStyle = 'rgba(30,30,30,.18)';
    ctx.lineWidth = 1;
    const step = Math.max(8, Math.min(18, bbox.w*.45));
    for(let x=bbox.l - ((global*7)%step); x<bbox.r+step; x+=step){
      ctx.beginPath(); ctx.moveTo(x,bbox.t); ctx.lineTo(x + bbox.h*.55,bbox.b); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(30,30,30,.22)';
    ctx.beginPath();
    ctx.arc(unit.center.x, unit.center.y, Math.max(1.5, Math.min(bbox.w,bbox.h)*.18), 0, TAU);
    ctx.fill();
  }

  function drawImageInUnit(unit){
    const f = state.frames.length ? state.frames[(unit.global + state.frameOffset) % state.frames.length] : null;
    ctx.save();
    beginPath(unit.pts);
    ctx.clip();
    if(f && f.canvas){
      coverDraw(ctx, f.canvas, unit.bbox.l-1, unit.bbox.t-1, unit.bbox.w+2, unit.bbox.h+2);
      ctx.globalCompositeOperation = 'multiply';
      ctx.fillStyle = rgba(unit.track.color, .44);
      ctx.fillRect(unit.bbox.l-1, unit.bbox.t-1, unit.bbox.w+2, unit.bbox.h+2);
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(249,249,247,.10)';
      ctx.fillRect(unit.bbox.l-1, unit.bbox.t-1, unit.bbox.w+2, unit.bbox.h+2);
    } else {
      drawProcedural(unit);
    }
    ctx.restore();
  }

  function drawUnit(unit){
    ctx.save();
    ctx.globalAlpha = unit.track.alpha;
    drawImageInUnit(unit);
    beginPath(unit.pts);
    ctx.strokeStyle = state.x > .86 ? 'rgba(30,30,30,.34)' : 'rgba(30,30,30,.50)';
    ctx.lineWidth = state.x > .86 ? .7 : 1.1;
    ctx.stroke();
    ctx.restore();
  }

  function drawFlowHints(units){
    const m = ease(state.x);
    if(m < .08 || m > .94) return;
    ctx.save();
    ctx.globalAlpha = Math.sin(m*Math.PI) * .28;
    ctx.lineWidth = 1;
    units.forEach((u, idx) => {
      if(idx % 3 !== 0) return;
      const rect = u.rect;
      const sx = u.spiral.x, sy = u.spiral.y;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.quadraticCurveTo((sx+rect.cx)/2, sy - 80*Math.sin(u.global*.7), rect.cx, rect.cy);
      ctx.strokeStyle = rgba(u.track.color, .82);
      ctx.stroke();
    });
    ctx.restore();
  }

  function drawLabels(){
    const lyt = layout();
    const topo = ease(state.y);
    ctx.save();
    ctx.font = '900 10px Courier New, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    TRACKS.forEach((tr, i) => {
      const sep = lyt.sep[i];
      const x = lerp(sep.x, lyt.cx, topo);
      const y = lerp(sep.y - lyt.sepR*tr.scale - 18, lyt.cy - lyt.superR*tr.scale - 18, topo);
      if(state.x > .72 && topo > .72) return;
      ctx.fillStyle = 'rgba(30,30,30,.58)';
      ctx.fillText(`${tr.name} · ${tr.n}`, x, y);
    });
    ctx.restore();
  }

  function drawFrameStrip(){
    const lyt = layout();
    const y = state.h - lyt.dock;
    ctx.save();
    ctx.fillStyle = 'rgba(249,249,247,.92)';
    ctx.fillRect(0,y,state.w,lyt.dock);
    ctx.strokeStyle = 'rgba(30,30,30,.85)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(state.w,y); ctx.stroke();

    const n = Math.max(state.frames.length, totalUnits);
    const maxCells = Math.floor(state.w / 22);
    const cells = Math.min(n, Math.max(18, maxCells));
    const pad = state.w < 760 ? 8 : 14;
    const gap = 3;
    const cellW = (state.w - pad*2 - gap*(cells-1)) / cells;
    const cellH = lyt.dock - 20;
    const top = y + 10;
    for(let i=0;i<cells;i++){
      const idx = Math.floor(i / cells * n);
      const x = pad + i*(cellW+gap);
      const frame = state.frames.length ? state.frames[(idx + state.frameOffset) % state.frames.length] : null;
      ctx.fillStyle = '#fff'; ctx.fillRect(x, top, cellW, cellH);
      if(frame && frame.canvas) coverDraw(ctx, frame.canvas, x, top, cellW, cellH);
      else {
        const tr = TRACKS[i % TRACKS.length];
        ctx.fillStyle = rgba(tr.color,.62); ctx.fillRect(x, top, cellW, cellH);
      }
      ctx.strokeStyle = i === 0 ? '#E61E0A' : 'rgba(30,30,30,.38)';
      ctx.lineWidth = i === 0 ? 2 : 1;
      ctx.strokeRect(x, top, cellW, cellH);
    }
    ctx.fillStyle = 'rgba(30,30,30,.55)';
    ctx.font = '900 9px Courier New, monospace';
    ctx.textAlign = 'right';
    ctx.fillText('SCRUB FILM STRIP', state.w - pad, y + lyt.dock - 7);
    ctx.restore();
  }

  function drawCrosshair(){
    const lyt = layout();
    const x = state.x * state.w;
    const y = lyt.topPad + state.y * lyt.stageH;
    ctx.save();
    ctx.globalAlpha = .28;
    ctx.strokeStyle = '#E61E0A'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, lyt.topPad); ctx.lineTo(x, state.h - lyt.dock); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(state.w, y); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#E61E0A'; ctx.lineWidth = 2;
    ctx.strokeRect(x-7,y-7,14,14);
    ctx.restore();
  }

  function drawBackground(){
    ctx.fillStyle = '#F9F9F7';
    ctx.fillRect(0,0,state.w,state.h);
    ctx.strokeStyle = 'rgba(30,30,30,.07)';
    ctx.lineWidth = 1;
    for(let x=0;x<state.w;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,state.h); ctx.stroke(); }
    for(let y=0;y<state.h;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(state.w,y); ctx.stroke(); }
  }

  function draw(){
    drawBackground();
    drawCrosshair();

    const units = [];
    TRACKS.forEach((tr, ti) => {
      for(let i=0;i<tr.n;i++) units.push(getUnit(ti,i));
    });

    drawFlowHints(units);
    units.forEach(drawUnit);
    drawLabels();
    drawFrameStrip();

    $('rx').textContent = state.x < .18 ? 'Circle' : state.x < .55 ? 'Spiral' : state.x < .88 ? 'Film' : 'Square';
    $('ry').textContent = state.y < .30 ? 'Separate' : state.y < .72 ? 'Composing' : 'Superposed';
    $('rf').textContent = state.frames.length ? ((state.frameOffset % state.frames.length) + 1) + '/' + state.frames.length : 'Seed';
    $('rm').textContent = state.x < .5 ? 'Roll' : 'Unroll';
  }

  function tick(now){
    const dt = Math.min(.05, (now - state.last)/1000);
    state.last = now;
    if(!state.pointer){
      state.x = lerp(state.x, state.targetX, 1 - Math.pow(.0008, dt));
      state.y = lerp(state.y, state.targetY, 1 - Math.pow(.0008, dt));
    }
    if(state.playing){
      state.spin += dt * (.32 + state.x*.55);
      state.frameOffset = (state.frameOffset + dt * 8.5) % Math.max(1,state.frames.length || 96);
    } else {
      state.spin += dt * .035;
    }
    draw();
    requestAnimationFrame(tick);
  }

  function setPhaseFromPointer(e){
    const lyt = layout();
    const x = clamp(e.clientX / state.w, 0, 1);
    const y = clamp((e.clientY - lyt.topPad) / lyt.stageH, 0, 1);
    state.x = state.targetX = x;
    state.y = state.targetY = y;
  }

  function setScrubFromPointer(e){
    const n = Math.max(1, state.frames.length || 96);
    state.frameOffset = Math.floor(clamp(e.clientX / state.w, 0, .999) * n);
  }

  canvas.addEventListener('pointerdown', e => {
    const lyt = layout();
    state.pointer = true;
    if(e.clientY > state.h - lyt.dock){ state.scrub = true; setScrubFromPointer(e); }
    else { state.scrub = false; setPhaseFromPointer(e); }
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', e => {
    if(!state.pointer) return;
    if(state.scrub) setScrubFromPointer(e);
    else setPhaseFromPointer(e);
  });
  window.addEventListener('pointerup', e => {
    state.pointer = false; state.scrub = false;
    try{ canvas.releasePointerCapture(e.pointerId); }catch(_){}
  });

  $('loadBtn').onclick = () => fileInput.click();
  fileInput.onchange = e => ingestFiles([...e.target.files]).finally(() => { fileInput.value=''; });
  $('playBtn').onclick = () => {
    state.playing = !state.playing;
    $('playBtn').classList.toggle('on', state.playing);
    $('playBtn').textContent = state.playing ? 'Stop' : 'Play';
  };
  $('unspoolBtn').onclick = () => {
    state.targetX = 1;
    state.targetY = .92;
    toast('Unspooling circles into square frame');
  };
  $('rewrapBtn').onclick = () => {
    state.targetX = 0;
    state.targetY = .08;
    toast('Rewrapping square into circular reels');
  };
  $('seedBtn').onclick = seedFrames;
  $('resetBtn').onclick = () => {
    state.targetX = state.x = .04;
    state.targetY = state.y = .08;
    state.frameOffset = 0;
    state.spin = 0;
    toast('Reset phase space');
  };

  window.addEventListener('resize', resize);
  window.addEventListener('keydown', e => {
    if(e.key === ' '){ e.preventDefault(); $('playBtn').click(); }
    if(e.key === 'ArrowRight') state.frameOffset = (state.frameOffset + 1) % Math.max(1,state.frames.length || 96);
    if(e.key === 'ArrowLeft') state.frameOffset = (state.frameOffset - 1 + Math.max(1,state.frames.length || 96)) % Math.max(1,state.frames.length || 96);
    if(e.key.toLowerCase() === 'u') $('unspoolBtn').click();
    if(e.key.toLowerCase() === 'r') $('rewrapBtn').click();
  });

  resize();
  seedFrames();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
