<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>ICARO Arc-Sampler Operator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#05060a;
  --fg:#f8fafc;
  --muted:#64748b;
  --hot:#9CFFB8;
  --red:#d83a1a;
  --c0:#6ee7b7;
  --c1:#a78bfa;
  --c2:#fb7185;
  --c3:#fbbf24;
  --blue:#60a5fa;
  --panel:rgba(5,6,10,.72);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:'Share Tech Mono','Courier New',monospace;touch-action:none;user-select:none}
body:before{content:"";position:fixed;inset:0;z-index:20;pointer-events:none;background:radial-gradient(circle at 50% 48%,rgba(156,255,184,.07),transparent 34%),radial-gradient(circle at 50% 54%,rgba(216,58,26,.08),transparent 62%)}
body:after{content:"";position:fixed;inset:0;z-index:30;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.026'/%3E%3C/svg%3E");mix-blend-mode:screen}
canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;z-index:1;background:#05060a;cursor:crosshair}
video{display:none}
#top{position:fixed;left:0;right:0;top:0;z-index:40;height:58px;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0;background:linear-gradient(to bottom,rgba(5,6,10,.96),rgba(5,6,10,.25),transparent);pointer-events:none}
#brand{font-size:11px;letter-spacing:.18em;color:var(--red);font-weight:800;text-transform:uppercase;white-space:nowrap;pointer-events:none;text-shadow:0 0 14px rgba(216,58,26,.26)}
#mode{height:34px;min-width:142px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(156,255,184,.5);background:rgba(5,6,10,.62);box-shadow:0 0 20px rgba(156,255,184,.08);font-size:12px;letter-spacing:.13em;text-transform:uppercase;pointer-events:none}
#buttons{display:flex;gap:8px;pointer-events:auto}
button{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(248,250,252,.32);background:rgba(5,6,10,.72);color:#fff;backdrop-filter:blur(8px);cursor:pointer;transition:.12s transform,.12s border-color,.12s box-shadow,.12s background;font-family:inherit}
button:hover,button.on{border-color:var(--hot);color:var(--hot);background:rgba(156,255,184,.11);box-shadow:0 0 18px rgba(156,255,184,.22)}
button:active{transform:scale(.9)}
button svg{width:20px;height:20px;fill:currentColor;stroke:currentColor}
button:disabled{opacity:.34;pointer-events:none}
.fileBtn input{display:none}
#bottom{position:fixed;left:12px;right:12px;bottom:12px;z-index:40;display:flex;align-items:flex-end;justify-content:space-between;gap:10px;pointer-events:none}
#tracks{pointer-events:auto;display:flex;gap:7px;padding:7px;border:1px solid rgba(255,255,255,.12);border-radius:999px;background:rgba(5,6,10,.56);backdrop-filter:blur(10px)}
.track{width:auto;height:34px;border-radius:999px;padding:0 11px;font-size:10px;letter-spacing:.11em;text-transform:uppercase;border-color:rgba(255,255,255,.18);box-shadow:none;background:rgba(255,255,255,.045);color:#fff;min-width:70px}
.track.active{color:#05060a;background:var(--trackColor);border-color:#fff;box-shadow:0 0 18px var(--trackGlow)}
#readout{height:42px;min-width:235px;display:flex;align-items:center;justify-content:center;padding:0 15px;border:1px solid rgba(156,255,184,.4);background:rgba(5,6,10,.64);backdrop-filter:blur(10px);font-size:12px;letter-spacing:.11em;text-transform:uppercase;color:#fff;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 0 20px rgba(156,255,184,.08)}
#center{position:fixed;left:50%;top:50%;width:34px;height:34px;z-index:35;border:1px solid rgba(255,255,255,.16);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;transition:.08s transform,.08s border-color,.08s box-shadow}
#center:after{content:"";position:absolute;left:50%;top:50%;width:3px;height:3px;background:var(--hot);border-radius:50%;box-shadow:0 0 12px var(--hot);transform:translate(-50%,-50%)}
#center.pulse{border-color:#fff;box-shadow:0 0 24px rgba(156,255,184,.48);transform:translate(-50%,-50%) scale(1.28)}
#menu{position:fixed;z-index:75;min-width:218px;max-width:280px;padding:7px;border:1px solid rgba(156,255,184,.44);background:rgba(3,4,6,.94);box-shadow:0 20px 60px rgba(0,0,0,.58),0 0 22px rgba(156,255,184,.09);backdrop-filter:blur(14px);display:none;border-radius:12px;overflow:hidden}
#menu.show{display:block}
.menuTitle{padding:8px 9px 7px;color:var(--hot);font-size:11px;letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.menuItem{height:34px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 9px;border-radius:8px;color:#fff;font-size:12px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer}
.menuItem:hover{background:rgba(156,255,184,.13);color:var(--hot)}
.menuItem.danger:hover{background:rgba(216,58,26,.16);color:#ff8b73}
.menuItem.disabled{opacity:.32;pointer-events:none}
.menuKey{opacity:.55;font-size:10px}
.menuSep{height:1px;background:rgba(255,255,255,.11);margin:5px 3px}
#codeDock{position:fixed;right:12px;bottom:66px;z-index:42;width:min(430px,calc(100vw - 24px));pointer-events:auto;border:1px solid rgba(255,255,255,.13);background:rgba(5,6,10,.70);backdrop-filter:blur(12px);border-radius:14px;padding:9px;box-shadow:0 16px 44px rgba(0,0,0,.34);display:none}
#codeDock.show{display:block}
#codeHead{display:flex;align-items:center;justify-content:space-between;color:var(--hot);font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px}
#codeCount{color:#fff;opacity:.78}
#codeBox{width:100%;height:174px;resize:none;border:1px solid rgba(255,255,255,.14);border-radius:10px;background:rgba(0,0,0,.48);color:#f8fafc;padding:9px;font:11px/1.35 'Share Tech Mono','Courier New',monospace;outline:none;user-select:text;touch-action:auto}
#codeMini{display:flex;gap:7px;margin-top:8px}
.mini{height:30px;width:auto;border-radius:999px;padding:0 12px;font-size:10px;letter-spacing:.1em;text-transform:uppercase}
#toast{position:fixed;left:50%;bottom:72px;z-index:76;transform:translateX(-50%) translateY(10px);opacity:0;pointer-events:none;border:1px solid rgba(156,255,184,.44);background:rgba(5,6,10,.86);backdrop-filter:blur(12px);padding:10px 14px;border-radius:999px;color:#fff;font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:.16s opacity,.16s transform;box-shadow:0 0 24px rgba(156,255,184,.08)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#onboard{position:fixed;left:14px;top:72px;z-index:62;max-width:330px;border:1px solid rgba(156,255,184,.34);background:rgba(5,6,10,.78);backdrop-filter:blur(14px);box-shadow:0 18px 50px rgba(0,0,0,.42);border-radius:16px;padding:14px;pointer-events:auto}
#onboard.hide{display:none}
.obTitle{color:var(--hot);font-size:12px;letter-spacing:.17em;text-transform:uppercase;margin-bottom:10px}
.obGrid{display:grid;grid-template-columns:1fr;gap:7px;margin-bottom:12px}
.obRow{display:flex;justify-content:space-between;gap:16px;font-size:11px;letter-spacing:.06em;color:#fff;text-transform:uppercase}
.obRow b{color:var(--hot);font-weight:800;white-space:nowrap}
#dismissOnboard{height:32px;border:1px solid rgba(255,255,255,.18);border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;background:rgba(255,255,255,.04)}
#dismissOnboard:hover{border-color:var(--hot);color:var(--hot);background:rgba(156,255,184,.1)}
#file{display:none}
@media(max-width:760px){
  #top{height:54px;padding:8px 10px 0}
  #brand{font-size:9px;letter-spacing:.12em;max-width:34vw;overflow:hidden;text-overflow:ellipsis}
  #mode{height:30px;min-width:94px;font-size:10px;letter-spacing:.08em}
  button{width:38px;height:38px}#buttons{gap:6px}
  #bottom{left:8px;right:8px;bottom:8px;align-items:center}
  #tracks{padding:6px;gap:5px;max-width:calc(100vw - 112px);overflow:hidden}
  .track{width:32px;height:32px;min-width:32px;padding:0;border-radius:50%;font-size:0}
  .track:after{content:attr(data-short);font-size:12px;letter-spacing:0}
  #readout{min-width:94px;height:42px;padding:0 8px;font-size:10px;letter-spacing:.06em}
  #center{width:30px;height:30px}
  #codeDock{left:8px;right:8px;bottom:58px;width:auto;padding:7px;border-radius:12px}
  #codeBox{height:120px;font-size:10px}
  #codeHead{font-size:9px;margin-bottom:6px}
  #onboard{left:10px;right:10px;top:62px;max-width:none;padding:12px}.obRow{font-size:10px}
  #menu{min-width:200px;max-width:calc(100vw - 20px)}.menuItem{height:36px;font-size:11px}
}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<video id="video" playsinline muted></video>
<input id="file" type="file" accept="video/*" />
<div id="center"></div>
<header id="top">
  <div id="brand">ICARO Arc-Sampler</div>
  <div id="mode">No Video</div>
  <div id="buttons">
    <button id="loadBtn" aria-label="load" title="load video"><svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"></path></svg></button>
    <button id="maskBtn" aria-label="mask" title="draw mask"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M8 9h8M8 13h5"></path></svg></button>
    <button id="sampleBtn" aria-label="sample" title="sample to code"><svg viewBox="0 0 24 24"><path d="M4 4h7v7H4V4zm9 0h7v7h-7V4zM4 13h7v7H4v-7zm9 0h7v7h-7v-7z"></path></svg></button>
    <button id="playBtn" aria-label="play" title="play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></button>
    <button id="exportBtn" aria-label="export" title="export"><svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-5-5m5 5l5-5M5 20h14v-2H5v2z" stroke-width="2" fill="none"></path></svg></button>
  </div>
</header>

<section id="onboard">
  <div class="obTitle">Sampler Onboarding</div>
  <div class="obGrid">
    <div class="obRow"><b>Load</b><span>bring video in</span></div>
    <div class="obRow"><b>Drag mask</b><span>tell it where to look</span></div>
    <div class="obRow"><b>Tracks</b><span>patch / heat / vector / all</span></div>
    <div class="obRow"><b>Sample</b><span>video → BEFLIX code</span></div>
    <div class="obRow"><b>Code dock</b><span>edit actual layer</span></div>
    <div class="obRow"><b>Right click</b><span>export / layer tools</span></div>
    <div class="obRow"><b>Long press</b><span>mobile menu</span></div>
  </div>
  <div id="dismissOnboard">Run</div>
</section>

<div id="menu"></div>

<section id="codeDock">
  <div id="codeHead"><span>BEFLIX NODE</span><span id="codeCount">0</span></div>
  <textarea id="codeBox" spellcheck="false"></textarea>
  <div id="codeMini">
    <button class="mini" id="renderBtn">Render</button>
    <button class="mini" id="copyBtn">Copy</button>
    <button class="mini" id="saveCodeBtn">Save</button>
  </div>
</section>

<div id="toast"></div>
<footer id="bottom">
  <div id="tracks"></div>
  <div id="readout">LOAD VIDEO</div>
</footer>

<script>
(function(){
'use strict';
const canvas=document.getElementById('stage');
const ctx=canvas.getContext('2d',{alpha:false});
const video=document.getElementById('video');
const file=document.getElementById('file');
const center=document.getElementById('center');
const modeEl=document.getElementById('mode');
const readout=document.getElementById('readout');
const tracksEl=document.getElementById('tracks');
const loadBtn=document.getElementById('loadBtn');
const maskBtn=document.getElementById('maskBtn');
const sampleBtn=document.getElementById('sampleBtn');
const playBtn=document.getElementById('playBtn');
const exportBtn=document.getElementById('exportBtn');
const menuEl=document.getElementById('menu');
const codeDock=document.getElementById('codeDock');
const codeBox=document.getElementById('codeBox');
const codeCount=document.getElementById('codeCount');
const renderBtn=document.getElementById('renderBtn');
const copyBtn=document.getElementById('copyBtn');
const saveCodeBtn=document.getElementById('saveCodeBtn');
const toastEl=document.getElementById('toast');
const onboard=document.getElementById('onboard');
const dismissOnboard=document.getElementById('dismissOnboard');

const NAMES=['PATCH','HEAT','VECTOR','ALL'];
const SHORT=['P','H','V','A'];
const COLORS=['#6ee7b7','#a78bfa','#60a5fa','#fbbf24'];
const GLOW=['rgba(110,231,183,.38)','rgba(167,139,250,.38)','rgba(96,165,250,.38)','rgba(251,191,36,.38)'];
const STYLE_NAMES=['SCAN','WRAP','INK','BOX'];
let DPR=1,toastTimer=null,raf=0,url=null;
let overlay=document.createElement('canvas'),octx=overlay.getContext('2d');
let analysis=document.createElement('canvas'),actx=analysis.getContext('2d',{willReadFrequently:true});
let prevGray=null,currGray=null,diff=null,edge=null,components=[],vectors=[];
let chunks=[],recorder=null;
const state={
  W:0,H:0,CX:0,CY:0,loaded:false,playing:false,
  signal:0,style:0,showLayer:true,live:false,drawMask:false,codeDock:false,
  opacity:.78,exportKind:'composite',threshold:24,edgeThreshold:34,
  analysisW:176,analysisH:99,gridW:128,gridH:72,
  annotations:[],drawing:null,longPress:null,contextOpened:false,lastT:-1,
  lastStats:'idle',exporting:false,pointer:{x:0,y:0}
};

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function pulse(){center.classList.add('pulse');setTimeout(()=>center.classList.remove('pulse'),120)}
function vibe(p){if(navigator.vibrate){try{navigator.vibrate(p)}catch(e){}}}
function toast(text){clearTimeout(toastTimer);toastEl.textContent=text;toastEl.classList.add('show');toastTimer=setTimeout(()=>toastEl.classList.remove('show'),1150)}
function setReadout(text,color){readout.textContent=text;readout.style.borderColor=color||'rgba(156,255,184,.4)';readout.style.color=color||'#fff'}
function two(n){return String(Math.floor(n)).padStart(2,'0')}
function fmt(t){return `${two(t/60)}:${two(t%60)}`}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]))}
function pickMime(){const options=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];if(!window.MediaRecorder)return '';return options.find(m=>MediaRecorder.isTypeSupported(m))||''}
const MIME=pickMime();

function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  state.W=innerWidth;state.H=innerHeight;state.CX=state.W/2;state.CY=state.H/2;
  canvas.width=Math.floor(state.W*DPR);canvas.height=Math.floor(state.H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  overlay.width=canvas.width;overlay.height=canvas.height;
  octx.setTransform(DPR,0,0,DPR,0,0);
  if(state.loaded) setupAnalysis();
}
function setupAnalysis(){
  state.analysisW=Math.min(192,Math.max(96,Math.round(state.W/6)));
  state.analysisH=Math.max(54,Math.round(state.analysisW*state.H/state.W));
  analysis.width=state.analysisW;analysis.height=state.analysisH;
  state.gridH=Math.round(state.gridW*state.H/state.W);
  seedCode();
}
function drawBackground(){
  ctx.fillStyle='#05060a';ctx.fillRect(0,0,state.W,state.H);
  ctx.save();
  ctx.globalAlpha=.075;ctx.strokeStyle='#fff';ctx.lineWidth=1;
  const gap=state.W<760?44:58;
  for(let x=state.CX%gap;x<state.W;x+=gap){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,state.H);ctx.stroke()}
  for(let y=state.CY%gap;y<state.H;y+=gap){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(state.W,y);ctx.stroke()}
  ctx.restore();
  ctx.save();
  ctx.globalAlpha=.16;
  ctx.strokeStyle='rgba(156,255,184,.32)';
  ctx.beginPath();ctx.arc(state.CX,state.CY,Math.min(state.W,state.H)*.22,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=.08;
  ctx.beginPath();ctx.arc(state.CX,state.CY,Math.min(state.W,state.H)*.36,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}
function render(){
  drawBackground();
  if(state.loaded&&video.readyState>=2){
    ctx.drawImage(video,0,0,state.W,state.H);
    if(state.live&&!state.exporting) sampleToCode(true);
    if(state.showLayer){
      ctx.save();
      ctx.globalAlpha=state.opacity;
      ctx.drawImage(overlay,0,0,state.W,state.H);
      ctx.restore();
    }
  }else{
    ctx.save();
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='800 '+(state.W<760?30:56)+'px Share Tech Mono, monospace';
    ctx.fillText('LOAD VIDEO',state.CX,state.CY-20);
    ctx.font='800 '+(state.W<760?11:14)+'px Share Tech Mono, monospace';
    ctx.fillStyle='rgba(255,255,255,.56)';
    ctx.fillText('MASK → SAMPLE → BEFLIX → EXPORT',state.CX,state.CY+28);
    ctx.restore();
  }
  drawMasks(ctx,true);
  updateUi();
  raf=requestAnimationFrame(render);
}
function updateUi(){
  [...tracksEl.children].forEach((b,i)=>b.classList.toggle('active',i===state.signal));
  maskBtn.classList.toggle('on',state.drawMask);
  sampleBtn.classList.toggle('on',state.showLayer);
  playBtn.classList.toggle('on',state.playing);
  exportBtn.classList.toggle('on',state.exporting);
  codeDock.classList.toggle('show',state.codeDock);
  modeEl.textContent=state.loaded?(state.live?'Live '+NAMES[state.signal]:STYLE_NAMES[state.style]+' '+NAMES[state.signal]):'No Video';
  if(state.loaded){
    const t=video.duration?fmt(video.currentTime)+' / '+fmt(video.duration):'READY';
    setReadout((state.drawMask?'MASK · ':'')+state.lastStats+' · '+t,COLORS[state.signal]);
  }
}
function seedCode(){
  codeBox.value=`C ICARO ARC-SAMPLER BEFLIX NODE
C Load video, draw mask, SAMPLE. This text is the layer.
GRID ${state.gridW} ${state.gridH}
CLR 0`;
  updateCodeCount();
  renderCode();
}
function updateCodeCount(){codeCount.textContent=codeBox.value.split(/\n/).filter(Boolean).length+' L'}
function buildTracks(){
  NAMES.forEach((n,i)=>{
    const b=document.createElement('button');
    b.className='track';b.textContent=n;b.dataset.short=SHORT[i];
    b.style.setProperty('--trackColor',COLORS[i]);b.style.setProperty('--trackGlow',GLOW[i]);
    b.addEventListener('pointerdown',e=>{e.stopPropagation();state.signal=i;toast(n);pulse();vibe(6)});
    tracksEl.appendChild(b);
  });
}
function loadVideo(fileObj){
  if(url)URL.revokeObjectURL(url);
  url=URL.createObjectURL(fileObj);
  video.src=url;video.muted=true;video.loop=false;video.preload='auto';
  video.onloadedmetadata=()=>{
    state.loaded=true;state.showLayer=false;state.live=false;state.annotations=[];state.drawing=null;
    prevGray=currGray=diff=edge=null;components=[];vectors=[];
    setupAnalysis();toast('LOADED '+fileObj.name.slice(0,22));pulse();vibe(8);video.currentTime=0;
  };
}
function analyze(force){
  if(!state.loaded||video.readyState<2)return;
  if(!force&&Math.abs(video.currentTime-state.lastT)<.001)return;
  state.lastT=video.currentTime;
  actx.drawImage(video,0,0,state.analysisW,state.analysisH);
  const image=actx.getImageData(0,0,state.analysisW,state.analysisH);
  const data=image.data,n=state.analysisW*state.analysisH;
  const gray=new Uint8ClampedArray(n);
  for(let i=0,j=0;i<data.length;i+=4,j++)gray[j]=(data[i]*.299+data[i+1]*.587+data[i+2]*.114)|0;
  if(!currGray){currGray=gray;prevGray=new Uint8ClampedArray(gray);diff=new Uint8ClampedArray(n)}
  else{prevGray=currGray;currGray=gray;diff=new Uint8ClampedArray(n);for(let i=0;i<n;i++)diff[i]=Math.abs(currGray[i]-prevGray[i])}
  edge=computeEdge(currGray,state.analysisW,state.analysisH);
  const map=chooseMap();
  components=filterComponents(findComponents(map,state.analysisW,state.analysisH,state.mapThreshold,state.analysisW<130?5:8));
  if(!components.length&&state.annotations.length)components=fallbackMaskComponents();
  vectors=filterVectors(findVectors(prevGray,currGray,diff,state.analysisW,state.analysisH,state.threshold));
}
function chooseMap(){
  const n=state.analysisW*state.analysisH,out=new Uint8ClampedArray(n),mask=annotationMask(state.analysisW,state.analysisH);
  const energy=avgInMask(diff||edge,mask);
  const useEdge=energy<8;
  state.mapThreshold=useEdge?state.edgeThreshold:state.threshold;
  const src=useEdge?edge:diff;
  for(let i=0;i<n;i++)out[i]=mask[i]?src[i]:0;
  state.sampleSource=useEdge?'edge':'motion';
  return out;
}
function computeEdge(gray,w,h){
  const out=new Uint8ClampedArray(w*h);
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    const i=y*w+x;
    const gx=-gray[i-w-1]-2*gray[i-1]-gray[i+w-1]+gray[i-w+1]+2*gray[i+1]+gray[i+w+1];

  loadBtn.addEventListener('click',()=>file.click());
  maskBtn.addEventListener('click',toggleMask);
  sampleBtn.addEventListener('click',()=>sampleToCode(false));
  playBtn.addEventListener('click',togglePlay);
  exportBtn.addEventListener('click',()=>exportVideo('composite'));
  renderBtn.addEventListener('click',()=>{renderCode();state.showLayer=true;toast('RENDERED')});
  copyBtn.addEventListener('click',copyCode);
  saveCodeBtn.addEventListener('click',saveCode);
  codeBox.addEventListener('input',()=>{renderCode();state.showLayer=true});
  dismissOnboard.addEventListener('pointerdown',e=>{e.stopPropagation();onboard.classList.add('hide');try{localStorage.setItem('arcSamplerOnboarded','1')}catch(err){}});
  if(localStorage.getItem('arcSamplerOnboarded')==='1')onboard.classList.add('hide');
  window.addEventListener('resize',resize);
  window.addEventListener('keydown',key);
  document.addEventListener('pointerdown',e=>{if(!e.target.closest('#menu'))hideMenu()});
  canvas.addEventListener('contextmenu',e=>{e.preventDefault();showMenu(e.clientX,e.clientY);return false});
  canvas.addEventListener('pointerdown',pointerDown);
  canvas.addEventListener('pointermove',pointerMove);
  canvas.addEventListener('pointerup',pointerUp);
  canvas.addEventListener('pointercancel',pointerUp);
  requestAnimationFrame(render);
}
init();
})();
</script>
</body>
</html>
