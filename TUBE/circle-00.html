<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Circle Limit Operator</title>
    <style>
        :root {
            --bg: #fff;
            --ink: #000;
            --panel-border: 2px solid #000;
            --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--font);
            user-select: none;
            touch-action: none;
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            display: block;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            border-bottom: var(--panel-border);
            background: var(--bg);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .brand {
            letter-spacing: 0.08em;
        }

        .formula {
            font-size: 1.1em;
            background: var(--ink);
            color: var(--bg);
            padding: 2px 8px;
        }

        footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-top: var(--panel-border);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .control-row {
            display: flex;
            border-bottom: 1px solid var(--ink);
            height: 48px;
        }

        .control-row:last-child {
            border-bottom: none;
        }

        .control-label {
            width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border-right: 1px solid var(--ink);
            background: var(--ink);
            color: var(--bg);
            text-transform: uppercase;
            font-size: 12px;
        }

        .control-track {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: relative;
        }

        .val-readout {
            width: 48px;
            text-align: right;
            font-weight: 900;
            font-size: 12px;
            border-left: 1px solid var(--ink);
            padding-left: 8px;
            margin-left: 8px;
        }

        /* Brutalist Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: var(--ink);
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 12px;
            border: 2px solid var(--ink);
            border-radius: 0;
            background: var(--bg);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -11px;
        }

        input[type=range]::-moz-range-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: var(--ink);
        }

        input[type=range]::-moz-range-thumb {
            height: 24px;
            width: 12px;
            border: 2px solid var(--ink);
            border-radius: 0;
            background: var(--bg);
            cursor: pointer;
        }

        .btn {
            flex: 1;
            border: none;
            border-right: 1px solid var(--ink);
            background: var(--bg);
            color: var(--ink);
            font-family: inherit;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.1s;
        }

        .btn:last-child {
            border-right: none;
        }

        .btn:active,
        .btn.on {
            background: var(--ink);
            color: var(--bg);
        }

        #toast {
            position: absolute;
            left: 50%;
            top: 64px;
            transform: translateX(-50%);
            background: var(--bg);
            border: 2px solid var(--ink);
            padding: 8px 16px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 50;
        }

        #toast.show {
            opacity: 1;
        }

        @media(max-width: 600px) {
            .brand {
                font-size: 12px;
            }

            .formula {
                font-size: 12px;
            }

            .control-label {
                width: 60px;
                font-size: 10px;
            }

            .val-readout {
                font-size: 10px;
                width: 36px;
            }

            .btn {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">Area Operator</div>
        <div class="formula">A = πr²</div>
    </header>

    <canvas id="stage"></canvas>
    <div id="toast"></div>

    <footer>
        <div class="control-row">
            <div class="control-label">Sectors</div>
            <div class="control-track">
                <input type="range" id="nSlider" min="0" max="7" value="3" step="1">
                <div class="val-readout" id="nReadout">8</div>
            </div>
        </div>
        <div class="control-row">
            <div class="control-label">Unroll</div>
            <div class="control-track">
                <input type="range" id="tSlider" min="0" max="1000" value="0">
                <div class="val-readout" id="tReadout">0%</div>
            </div>
        </div>
        <div class="control-row">
            <button class="btn" id="btnAudio">Audio: Off</button>
            <button class="btn" id="btnPlay">Auto Play</button>
        </div>
    </footer>

    <script>
        const N_VALUES = [2, 4, 6, 8, 16, 32, 64, 128];

        const S = {
            nIdx: 3,     // Index in N_VALUES (default 8 sectors)
            n: 8,
            t: 0,        // Progress 0.0 to 1.0
            playing: false,
            audioOn: false,
            landedMask: new Set()
        };

        const UI = {
            canvas: document.getElementById('stage'),
            ctx: document.getElementById('stage').getContext('2d'),
            nSlider: document.getElementById('nSlider'),
            tSlider: document.getElementById('tSlider'),
            nReadout: document.getElementById('nReadout'),
            tReadout: document.getElementById('tReadout'),
            btnAudio: document.getElementById('btnAudio'),
            btnPlay: document.getElementById('btnPlay'),
            toast: document.getElementById('toast')
        };

        let W, H, DPR, toastTimer;

        // Audio Engine
        const Audio = {
            ctx: null, master: null, drone: null, droneGain: null,
            init() {
                if (this.ctx) return;
                const AC = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AC();
                this.master = this.ctx.createGain();
                this.master.gain.value = 0.15;
                this.master.connect(this.ctx.destination);
            },
            tick(idx, total) {
                if (!S.audioOn || !this.ctx) return;
                let osc = this.ctx.createOscillator();
                let g = this.ctx.createGain();
                osc.type = 'triangle';
                // Pitch increases slightly as sectors land
                osc.frequency.value = 220 * Math.pow(1.02, idx * (64 / total));
                osc.connect(g);
                g.connect(this.master);
                let now = this.ctx.currentTime;
                g.gain.setValueAtTime(0, now);
                g.gain.linearRampToValueAtTime(0.1, now + 0.01);
                g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.2);
            },
            chord() {
                if (!S.audioOn || !this.ctx) return;
                [1, 1.5, 1.25, 2].forEach((mult, i) => {
                    let osc = this.ctx.createOscillator();
                    let g = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 440 * mult;
                    osc.connect(g);
                    g.connect(this.master);
                    let now = this.ctx.currentTime;
                    g.gain.setValueAtTime(0, now);
                    g.gain.linearRampToValueAtTime(0.05, now + 0.1 + i * 0.05);
                    g.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
                    osc.start(now);
                    osc.stop(now + 1.6);
                });
            }
        };

        function showToast(msg) {
            UI.toast.textContent = msg;
            UI.toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => UI.toast.classList.remove('show'), 1000);
        }

        function resize() {
            DPR = Math.min(2, window.devicePixelRatio || 1);
            W = window.innerWidth;
            H = window.innerHeight;
            UI.canvas.width = Math.round(W * DPR);
            UI.canvas.height = Math.round(H * DPR);
            UI.ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        }

        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        }

        function drawGrid(ctx) {
            ctx.save();
            ctx.strokeStyle = '#000';
            ctx.globalAlpha = 0.05;
            ctx.lineWidth = 1;
            for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
            for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
            ctx.restore();
        }

        function render() {
            const ctx = UI.ctx;
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, W, H);
            drawGrid(ctx);

            const R = Math.min(W * 0.22, H * 0.22);
            const cx = W / 2;
            const cy = Math.max(H / 2 - 30, R + 60);

            const N = S.n;
            const wedgeAngle = (2 * Math.PI) / N;
            const a = wedgeAngle / 2;

            // Exact geometric meshing calculations
            const stepX = 2 * R * Math.sin(a);
            const offsetX = cx - (N - 1) * R * Math.sin(a) / 2;
            const offsetY = cy - (R * Math.cos(a)) / 2;

            let newlyLanded = false;

            // The delay between successive sector unrolls
            const delayStep = 0.4 / Math.max(1, N - 1);
            const animDur = 0.6; // Time each sector takes to travel

            for (let i = 0; i < N; i++) {
                // Circle state coordinates
                const theta0 = i * wedgeAngle;
                const alpha0 = theta0 + wedgeAngle / 2;
                const p0 = { x: cx, y: cy };

                // Rect state coordinates
                let alpha1, p1;
                if (i % 2 === 0) {
                    // Bottom slice (points down, arc on bottom)
                    let j = i / 2;
                    alpha1 = Math.PI / 2;
                    p1 = {
                        x: offsetX + j * stepX,
                        y: offsetY
                    };
                } else {
                    // Top slice (points up, arc on top)
                    let j = Math.floor(i / 2);
                    alpha1 = -Math.PI / 2;
                    p1 = {
                        x: offsetX + R * Math.sin(a) + j * stepX,
                        y: offsetY + R * Math.cos(a)
                    };
                }

                // Staggered time T
                let sectorT = (S.t - i * delayStep) / animDur;
                sectorT = Math.max(0, Math.min(1, sectorT));

                // Sonification Trigger
                if (sectorT === 1 && !S.landedMask.has(i) && S.t > 0) {
                    S.landedMask.add(i);
                    newlyLanded = true;
                    Audio.tick(i, N);
                }

                sectorT = easeInOutCubic(sectorT);

                // Rotation interpolation (preventing wraparound twisting)
                let dAlpha = alpha1 - alpha0;
                while (dAlpha > Math.PI) dAlpha -= 2 * Math.PI;
                while (dAlpha < -Math.PI) dAlpha += 2 * Math.PI;

                const alpha = alpha0 + dAlpha * sectorT;
                const px = p0.x + (p1.x - p0.x) * sectorT;
                const py = p0.y + (p1.y - p0.y) * sectorT;

                ctx.save();
                ctx.translate(px, py);
                ctx.rotate(alpha);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, R, -wedgeAngle / 2, wedgeAngle / 2);
                ctx.closePath();

                // Brutalist fill alternating
                ctx.fillStyle = (i % 2 === 0) ? '#000' : '#fff';
                ctx.fill();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = '#000';
                // Add a highlight to the bounding edge
                ctx.stroke();

                ctx.restore();
            }

            if (S.t === 1 && S.landedMask.size === N && newlyLanded) {
                Audio.chord();
            }

            // Annotations
            ctx.font = '900 14px ui-monospace, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.lineWidth = 2;

            // Circle State Annotation
            if (S.t < 0.1) {
                ctx.globalAlpha = 1 - (S.t / 0.1);
                ctx.strokeStyle = '#000';
                ctx.fillStyle = '#000';

                // Radius line
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + Math.cos(-Math.PI / 4) * R, cy + Math.sin(-Math.PI / 4) * R);
                ctx.stroke();

                // Radius label
                let textX = cx + Math.cos(-Math.PI / 4) * (R / 2) - 10;
                let textY = cy + Math.sin(-Math.PI / 4) * (R / 2) - 10;
                ctx.fillStyle = '#fff';
                ctx.fillRect(textX - 10, textY - 10, 20, 20);
                ctx.fillStyle = '#000';
                ctx.fillText("r", textX, textY);

                // Circumference
                ctx.setLineDash([6, 6]);
                ctx.beginPath();
                ctx.arc(cx, cy, R + 15, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = '#fff';
                ctx.fillRect(cx - 40, cy + R + 5, 80, 20);
                ctx.fillStyle = '#000';
                ctx.fillText("C = 2πr", cx, cy + R + 15);
                ctx.globalAlpha = 1.0;
            }

            // Rect State Annotation
            if (S.t > 0.9) {
                ctx.globalAlpha = (S.t - 0.9) / 0.1;
                ctx.strokeStyle = '#000';
                ctx.fillStyle = '#000';

                // Ideal limiting bounding box
                const idealW = Math.PI * R;
                const idealH = R;
                const ix = cx - idealW / 2;
                const iy = cy - idealH / 2;

                ctx.setLineDash([8, 8]);
                ctx.strokeRect(ix, iy, idealW, idealH);
                ctx.setLineDash([]);

                // Annotate Base
                ctx.beginPath();
                ctx.moveTo(ix, iy + idealH + 15);
                ctx.lineTo(ix + idealW, iy + idealH + 15);
                ctx.stroke();

                // Base label
                ctx.fillStyle = '#fff';
                ctx.fillRect(cx - 30, iy + idealH + 5, 60, 20);
                ctx.fillStyle = '#000';
                ctx.fillText("b ≈ πr", cx, iy + idealH + 15);

                // Annotate Height
                ctx.beginPath();
                ctx.moveTo(ix + idealW + 15, iy);
                ctx.lineTo(ix + idealW + 15, iy + idealH);
                ctx.stroke();

                // Height label
                ctx.fillStyle = '#fff';
                ctx.fillRect(ix + idealW + 5, cy - 10, 20, 20);
                ctx.fillStyle = '#000';
                ctx.fillText("r", ix + idealW + 15, cy);

                // Final Limit realization when N is large
                if (N >= 64) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(cx - 60, cy - 10, 120, 20);
                    ctx.fillStyle = '#000';
                    ctx.fillText("A = πr × r", cx, cy);
                }

                ctx.globalAlpha = 1.0;
            }
        }

        function updateUI() {
            UI.nSlider.value = S.nIdx;
            UI.nReadout.textContent = S.n;
            UI.tSlider.value = Math.round(S.t * 1000);
            UI.tReadout.textContent = Math.round(S.t * 100) + '%';
            UI.btnPlay.classList.toggle('on', S.playing);
            UI.btnPlay.textContent = S.playing ? 'Pause' : 'Auto Play';
            UI.btnAudio.classList.toggle('on', S.audioOn);
            UI.btnAudio.textContent = S.audioOn ? 'Audio: On' : 'Audio: Off';
        }

        function setN(idx) {
            if (idx === S.nIdx) return;
            S.nIdx = idx;
            S.n = N_VALUES[S.nIdx];
            S.landedMask.clear();
            showToast(`SECTORS: ${S.n}`);
            if (S.audioOn) Audio.tick(1, 1);
            updateUI();
            render();
        }

        function setT(val) {
            if (val === S.t) return;
            if (val < S.t) S.landedMask.clear(); // Reset landing history if going backwards
            S.t = Math.max(0, Math.min(1, val));
            updateUI();
            render();
        }

        let lastFrame = 0;
        function loop(time) {
            if (S.playing) {
                let dt = (time - lastFrame) / 1000;
                if (dt > 0.1) dt = 0.016; // Avoid jumps
                let nextT = S.t + dt * 0.4;
                if (nextT >= 1) {
                    nextT = 1;
                    S.playing = false;
                }
                setT(nextT);
            }
            lastFrame = time;
            requestAnimationFrame(loop);
        }

        // Events
        window.addEventListener('resize', () => { resize(); render(); });
        document.addEventListener('pointerdown', () => Audio.init(), { once: true });

        UI.nSlider.addEventListener('input', e => setN(parseInt(e.target.value, 10)));
        UI.tSlider.addEventListener('input', e => {
            S.playing = false;
            setT(parseInt(e.target.value, 10) / 1000);
        });

        UI.btnPlay.addEventListener('click', () => {
            Audio.init();
            if (S.t >= 1) setT(0);
            S.playing = !S.playing;
            updateUI();
        });

        UI.btnAudio.addEventListener('click', () => {
            Audio.init();
            S.audioOn = !S.audioOn;
            updateUI();
            if (S.audioOn) Audio.tick(1, 1);
        });

        // Setup
        resize();
        updateUI();
        requestAnimationFrame(loop);
        render();

    </script>
</body>

</html>
