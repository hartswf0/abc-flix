<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Arc Clip Surgery Bay</title>
<style>
:root{
  --bg:#000;
  --panel:#050505;
  --line:#202020;
  --line2:#343434;
  --fg:#f7f7f7;
  --muted:#777;
  --cyan:#00e5ff;
  --pink:#ff0055;
  --green:#9cffb8;
  --yellow:#ffe66d;
  --bad:#ff3b30;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;touch-action:none;user-select:none;-webkit-user-select:none}
body{position:fixed;inset:0}
#app{position:fixed;inset:0;display:grid;grid-template-rows:42px 1fr;background:#000}
#topbar{height:42px;border-bottom:1px solid #242424;background:#050505;display:flex;align-items:center;justify-content:space-between;padding:0 10px;gap:8px;z-index:3}
.brand{display:flex;align-items:baseline;gap:10px;min-width:0}.brand b{font-size:12px;letter-spacing:.14em;color:var(--cyan);white-space:nowrap}.brand span{font-size:10px;color:#777;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.topBtns{display:flex;gap:6px;align-items:center}button{height:29px;padding:0 9px;border:1px solid #3b3b3b;background:#000;color:#eee;font:800 10px ui-monospace,monospace;letter-spacing:.09em;text-transform:uppercase;border-radius:0;cursor:pointer}button:hover{border-color:#fff;background:#fff;color:#000}button.on{background:var(--cyan);border-color:var(--cyan);color:#000}button.warn{background:var(--pink);border-color:var(--pink);color:#fff}input[type=file]{display:none}#stage{position:relative;overflow:hidden}canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:crosshair}#hint{position:absolute;left:8px;bottom:8px;max-width:min(780px,calc(100vw - 16px));background:rgba(0,0,0,.74);border:1px solid #242424;padding:7px 9px;color:#aaa;font-size:10px;line-height:1.45;letter-spacing:.02em;pointer-events:none}.kbd{color:#fff;border:1px solid #444;padding:1px 4px;margin:0 1px}.hide{display:none!important}@media(max-width:760px){#app{grid-template-rows:40px 1fr}#topbar{height:40px;padding:0 6px}.brand{gap:6px}.brand b{font-size:10px}.brand span{display:none}.topBtns{gap:4px}button{height:28px;padding:0 7px;font-size:9px}#hint{font-size:9px;bottom:6px;left:6px;right:6px;max-width:none;padding:6px 7px}}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="brand"><b>ARC CLIP SURGERY BAY</b><span id="modeText">LOAD REAL CLIPS OR USE PROXIES · ARC → UNROLL → SLICE</span></div>
    <div class="topBtns">
      <button id="bLoad">Load</button>
      <button id="bPlay">Play</button>
      <button id="bAdd">Add</button>
      <button id="bReset">Reset</button>
      <button id="bExport">EDL</button>
    </div>
  </div>
  <div id="stage">
    <canvas id="c"></canvas>
    <div id="hint"><span class="kbd">Load</span> absorbs real videos · <span class="kbd">Tap reel arc</span> selects source span · <span class="kbd">Drag strip</span> move · <span class="kbd">Ring</span> rotate · <span class="kbd">Tail</span> length · <span class="kbd">Tap timeline</span> edit clip · <span class="kbd">Space</span> play</div>
  </div>
</div>
<input id="vLoad" type="file" accept="video/mp4,video/webm,video/ogg,video/quicktime,video/*" multiple />
<div id="vids" style="display:none"></div>
<script>
(function(){
'use strict';

const PI=Math.PI, TAU=PI*2;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const snap=(v,s)=>Math.round(v/s)*s;
const $=id=>document.getElementById(id);
const canvas=$('c');
const ctx=canvas.getContext('2d',{alpha:false});
const DPR=()=>Math.max(1,window.devicePixelRatio||1);

let W=1,H=1,LAY=null,lastTS=0;
const MAX_SLOTS=48;
const LOAD_TIMEOUT_MS=9000;
const SAFE_FRAME_SEEK_EPS=.08;

const COLORS={cyan:'#00e5ff',pink:'#ff0055',green:'#9cffb8',yellow:'#ffe66d',bad:'#ff3b30',white:'#f7f7f7',muted:'#777'};
const TRACKS=[
  mkTrack(0,'TRK_01 PROXY',186),
  mkTrack(1,'TRK_02 PROXY',320),
  mkTrack(2,'TRK_03 PROXY',55),
  mkTrack(3,'TRK_04 PROXY',145)
];
const S={
  density:24,
  mode:'assemble',
  selectedClipId:null,
  working:null,
  pointer:null,
  globalTime:0,
  isPlaying:false,
  sequence:[],
  undo:[],
  logs:['system ready · proxies active'],
  ingestIndex:0,
  unroll:0
};

function mkTrack(id,name,hue){return {id,name,hue,chunks:24,duration:24,slotSec:1,status:'proxy',error:null,fileName:null,url:null,vid:null,ready:false,loading:false,lastSeek:-1,lastFrameTime:0,hov:-1}}
function uid(){return 'clip_'+Math.random().toString(36).slice(2,8)+'_'+Date.now().toString(36).slice(-4)}
function deep(o){return JSON.parse(JSON.stringify(o))}
function log(msg){S.logs.unshift(String(msg));S.logs=S.logs.slice(0,7);updateChrome()}
function hsl(h,a=.9,l=50){return 'hsla('+h+',100%,'+l+'%,'+a+')'}
function formatTime(s){const m=Math.floor(s/60),sec=Math.floor(s%60),f=Math.floor((s%1)*24);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')+':'+String(f).padStart(2,'0')}
function safeNum(v,fallback=0){return Number.isFinite(v)?v:fallback}
function totalDuration(){return Math.max(S.density,...S.sequence.map(c=>c.slotIdx+c.duration))}
function trackSlotSec(tr){return Math.max(.05, safeNum(tr.slotSec,1))}
function thetaPerSlot(tr){return TAU/Math.max(1,tr.chunks||S.density)}
function clipSourceSeconds(c){const tr=TRACKS[c.trId];return {in:c.srcStart*trackSlotSec(tr), dur:c.duration*trackSlotSec(tr)}}
function pushUndo(){S.undo.push(deep(S.sequence));if(S.undo.length>50)S.undo.shift()}
function selectedReal(){return S.sequence.find(c=>c.id===S.selectedClipId)||null}
function activeClip(){return S.working||selectedReal()}
function updateChrome(){
  $('bPlay').classList.toggle('on',S.isPlaying);
  $('bPlay').textContent=S.isPlaying?'Pause':'Play';
  $('bAdd').classList.toggle('on',!!S.working&&S.working.origin==='source');
  const faultCount=TRACKS.filter(t=>t.status==='error').length;
  $('bLoad').classList.toggle('warn',faultCount>0);
  const active=activeClip();
  const base=S.isPlaying?'PLAYBACK LOCKED':active?`ARC ${active.srcStart} → ${active.srcStart+active.duration} · ${TRACKS[active.trId].name}`:'LOAD REAL CLIPS OR USE PROXIES · ARC → UNROLL → SLICE';
  $('modeText').textContent=faultCount?`${base} · ${faultCount} INGEST FAULT(S), PROXY FALLBACK ACTIVE`:base;
}
function makeClip(trId,srcStart,slotIdx,layerIdx,duration=2){
  const tr=TRACKS[trId];
  duration=clamp(duration,1,Math.max(1,tr.chunks-srcStart));
  return {id:uid(),origin:'sequence',trId,hue:tr.hue,srcStart,slotIdx,layerIdx,duration,thetaStart:srcStart*thetaPerSlot(tr),thetaLen:duration*thetaPerSlot(tr),transform:{x:0,y:0,rotation:0,scaleX:1,scaleY:1,cropL:0,cropR:0,cropT:0,cropB:0}};
}
function makeSourceWorking(trId,srcStart,duration=2){const c=makeClip(trId,srcStart,0,0,duration);c.origin='source';return c}
function selectSourceArc(trId,start){S.selectedClipId=null;S.working=makeSourceWorking(trId,start,Math.min(2,Math.max(1,TRACKS[trId].chunks-start)));S.mode='arc';updateChrome()}
function selectTimelineClip(id){const c=S.sequence.find(x=>x.id===id);if(!c)return;S.selectedClipId=id;S.working=deep(c);S.working.origin='sequence';S.mode='surgery';updateChrome()}
function commitWorking(){
  if(!S.working)return;
  if(S.working.origin==='source'){
    pushUndo();
    const next=deep(S.working);delete next.origin;next.id=uid();
    next.slotIdx=clamp(S.sequence.reduce((m,c)=>Math.max(m,c.slotIdx+c.duration),0),0,Math.max(0,S.density-next.duration));
    next.layerIdx=S.sequence.length%LAY.rows;
    S.sequence.push(next);selectTimelineClip(next.id);log('added arc slice to timeline');return;
  }
  const i=S.sequence.findIndex(c=>c.id===S.working.id);
  if(i>=0){pushUndo();const next=deep(S.working);delete next.origin;S.sequence[i]=next;S.selectedClipId=next.id;log('committed isolated clip edit')}
  S.working=null;S.mode=S.selectedClipId?'surgery':'assemble';updateChrome();
}
function cancelWorking(){S.working=null;S.mode=S.selectedClipId?'surgery':'assemble';updateChrome()}
function resetWorking(){if(!S.working)return;S.working.transform={x:0,y:0,rotation:0,scaleX:1,scaleY:1,cropL:0,cropR:0,cropT:0,cropB:0};updateChrome()}

function resize(){const r=$('stage').getBoundingClientRect();W=Math.max(1,r.width);H=Math.max(1,r.height);const d=DPR();canvas.width=Math.round(W*d);canvas.height=Math.round(H*d);ctx.setTransform(d,0,0,d,0,0);LAY=layout()}
function layout(){const mobile=W<760;const pad=mobile?8:12;const reelsH=mobile?Math.max(132,H*.25):Math.max(146,H*.22);const surgeryH=mobile?Math.max(178,H*.31):Math.max(224,H*.34);const timelineH=mobile?Math.max(116,H*.20):Math.max(132,H*.19);const previewY=pad+reelsH+surgeryH+timelineH;const previewH=Math.max(88,H-previewY-5);const left=mobile?18:30;const right=W-(mobile?12:20);const stripW=Math.max(180,right-left);const slotW=stripW/S.density;return {mobile,pad,reelsY:pad,reelsH,surgeryY:pad+reelsH,surgeryH,timelineY:pad+reelsH+surgeryH,timelineH,previewY,previewH,left,right,stripW,slotW,rows:mobile?3:4,rowH:mobile?24:28}}
function txt(s,x,y,align='left',color='#fff',size=10,weight='800'){ctx.fillStyle=color;ctx.textAlign=align;ctx.textBaseline='middle';ctx.font=weight+' '+size+'px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace';ctx.fillText(s,x,y)}
function line(x1,y1,x2,y2,color='#222',w=1,dash=null){ctx.save();ctx.strokeStyle=color;ctx.lineWidth=w;if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function rect(x,y,w,h,stroke='#222',fill=null,lw=1){if(fill){ctx.fillStyle=fill;ctx.fillRect(x,y,w,h)}ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.strokeRect(x,y,w,h)}
function roundRectPath(x,y,w,h,r){const p=new Path2D();r=Math.min(r,w/2,h/2);p.moveTo(x+r,y);p.arcTo(x+w,y,x+w,y+h,r);p.arcTo(x+w,y+h,x,y+h,r);p.arcTo(x,y+h,x,y,r);p.arcTo(x,y,x+w,y,r);p.closePath();return p}
function fillRound(x,y,w,h,r,fill,stroke,lw=1){const p=roundRectPath(x,y,w,h,r);ctx.fillStyle=fill;ctx.fill(p);if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke(p)}return p}
function panel(y,h,title,sub){rect(6,y,W-12,h,'#1f1f1f','rgba(6,6,6,.82)',1);txt(title,14,y+11,'left','#888',9);if(sub)txt(sub,W-14,y+11,'right','#555',9)}
function pointOnCircle(cx,cy,r,a){return {x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}}
function arcSegmentPath(cx,cy,rInner,rOuter,a0,a1){const p=new Path2D();p.arc(cx,cy,rOuter,a0,a1,false);p.lineTo(cx+Math.cos(a1)*rInner,cy+Math.sin(a1)*rInner);p.arc(cx,cy,rInner,a1,a0,true);p.closePath();return p}
function stripPath(lenPx,thick){const p=new Path2D();const curl=thick*.16;p.moveTo(0,-thick/2);p.lineTo(lenPx,-thick/2);p.quadraticCurveTo(lenPx+curl,0,lenPx,thick/2);p.lineTo(0,thick/2);p.quadraticCurveTo(curl*.2,0,0,-thick/2);p.closePath();return p}
function sampleArcRibbon(cx,cy,r,thick,a0,a1,samples=52){const top=[],bot=[];for(let i=0;i<=samples;i++){const t=i/samples,a=lerp(a0,a1,t);const o=pointOnCircle(cx,cy,r+thick/2,a),inn=pointOnCircle(cx,cy,r-thick/2,a);top.push([o.x,o.y]);bot.push([inn.x,inn.y])}return {top,bot}}
function sampleStripRibbon(radius,a0,a1,x0,y,thick,samples=52){const top=[],bot=[];for(let i=0;i<=samples;i++){const t=i/samples;const len=(a1-a0)*radius;const x=x0+len*t;const curl=Math.sin(t*PI)*thick*.12;top.push([x,y-thick/2-curl]);bot.push([x,y+thick/2+curl])}return {top,bot}}
function morphRibbon(arc,strip,m){const pts=[];for(let i=0;i<arc.top.length;i++)pts.push([lerp(arc.top[i][0],strip.top[i][0],m),lerp(arc.top[i][1],strip.top[i][1],m)]);for(let i=arc.bot.length-1;i>=0;i--)pts.push([lerp(arc.bot[i][0],strip.bot[i][0],m),lerp(arc.bot[i][1],strip.bot[i][1],m)]);const p=new Path2D();p.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)p.lineTo(pts[i][0],pts[i][1]);p.closePath();return p}

function drawBackground(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);for(let x=0;x<W;x+=40)line(x,0,x,H,'#0c0c0c');for(let y=0;y<H;y+=40)line(0,y,W,y,'#0c0c0c')}
function reelLayout(){const areaY=LAY.reelsY+20,areaH=LAY.reelsH-32;const out=[];if(LAY.mobile){for(let i=0;i<4;i++){const col=i%2,row=Math.floor(i/2);out.push({track:TRACKS[i],cx:W*(col?0.72:0.28),cy:areaY+areaH*(row?0.75:0.30),r:32})}}else{for(let i=0;i<4;i++)out.push({track:TRACKS[i],cx:lerp(78,W-78,i/3),cy:areaY+areaH*.52,r:40})}return out}
function drawReels(){
  panel(LAY.reelsY,LAY.reelsH,'REEL BANK','REAL FILES FALL BACK TO PROXY IF DECODE FAILS');
  const reels=reelLayout();
  reels.forEach(reel=>{
    const tr=reel.track,step=thetaPerSlot(tr),chunks=tr.chunks;
    ctx.beginPath();ctx.arc(reel.cx,reel.cy,reel.r+8,0,TAU);ctx.strokeStyle='#171717';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();ctx.arc(reel.cx,reel.cy,reel.r-12,0,TAU);ctx.strokeStyle='#202020';ctx.stroke();
    for(let i=0;i<chunks;i++){
      const a0=-PI/2+i*step+.006,a1=a0+step-.012;
      const p=arcSegmentPath(reel.cx,reel.cy,reel.r-12,reel.r+8,a0,a1);
      const active=S.working&&S.working.trId===tr.id&&i>=S.working.srcStart&&i<S.working.srcStart+S.working.duration;
      const loaded=tr.status==='ready';
      ctx.fillStyle=active?hsl(tr.hue,.92,60):loaded?hsl(tr.hue,.30,34):tr.status==='error'?'rgba(255,59,48,.18)':hsl(tr.hue,.18,28);
      ctx.fill(p);ctx.strokeStyle=active?hsl(tr.hue,1,80):tr.status==='error'?'rgba(255,59,48,.65)':hsl(tr.hue,.42,50);ctx.lineWidth=active?1.7:1;ctx.stroke(p);
    }
    if(tr.loading){ctx.beginPath();ctx.arc(reel.cx,reel.cy,reel.r+13,-PI/2,-PI/2+(performance.now()/500)%TAU);ctx.strokeStyle=COLORS.yellow;ctx.lineWidth=2;ctx.stroke()}
    ctx.beginPath();ctx.arc(reel.cx,reel.cy,7,0,TAU);ctx.fillStyle='#0f0f0f';ctx.fill();ctx.strokeStyle=tr.status==='ready'?COLORS.green:tr.status==='error'?COLORS.bad:'#3b3b3b';ctx.stroke();
    const label=tr.fileName?tr.fileName.replace(/\.[^.]+$/,'').slice(0,14):tr.name;
    txt(label,reel.cx,reel.cy+reel.r+18,'center',tr.status==='error'?COLORS.bad:hsl(tr.hue,.85,58),LAY.mobile?8:9);
    txt(tr.status.toUpperCase(),reel.cx,reel.cy-reel.r-14,'center',tr.status==='ready'?COLORS.green:tr.status==='error'?COLORS.bad:'#666',8);
  });
}
function hitReelArc(px,py){for(const reel of reelLayout()){const dx=px-reel.cx,dy=py-reel.cy,dist=Math.hypot(dx,dy),tr=reel.track;if(dist>=reel.r-12&&dist<=reel.r+8){let a=Math.atan2(dy,dx)+PI/2;if(a<0)a+=TAU;const index=clamp(Math.floor(a/thetaPerSlot(tr)),0,tr.chunks-1);return {trId:tr.id,start:index}}}return null}

function surgeryGeom(){const x=12,y=LAY.surgeryY+18,w=W-24,h=LAY.surgeryH-24;return {x,y,w,h,reelCx:x+(LAY.mobile?55:84),reelCy:y+h*.52,reelR:LAY.mobile?34:42,stripX:x+(LAY.mobile?100:162),stripY:y+h*.56,thick:LAY.mobile?22:28}}
function unrolledLengthPx(c){return Math.max(24,c.duration*Math.max(22,LAY.slotW*(LAY.mobile?.9:1.05))*c.transform.scaleX)}
function surgeryMedia(){const c=activeClip();if(!c)return null;const g=surgeryGeom();return {x:g.stripX+c.transform.x,y:g.stripY+c.transform.y,len:unrolledLengthPx(c),thick:g.thick*c.transform.scaleY,rot:c.transform.rotation}}
function drawClipVisual(c,w,h,mode='strip'){
  const tr=TRACKS[c.trId];
  const src=clipSourceSeconds(c);
  const target=src.in + clamp(S.globalTime-c.slotIdx,0,Math.max(.05,src.dur));
  if(tr.vid&&tr.status==='ready'&&tr.vid.readyState>=2){
    try{ctx.drawImage(tr.vid,-w/2,-h/2,w,h);return}catch(err){tr.error='drawImage failed';tr.status='proxy';log(`draw failed on ${tr.name}; using proxy`)}
  }
  const hue=c.hue,grad=ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);grad.addColorStop(0,hsl(hue,1,12));grad.addColorStop(1,hsl(hue,1,36));ctx.fillStyle=grad;ctx.fillRect(-w/2,-h/2,w,h);ctx.strokeStyle=hsl(hue,.75,70);ctx.lineWidth=1.2;const now=target;
  if(c.trId===0){for(let k=0;k<4;k++){ctx.beginPath();for(let x=-w/2;x<=w/2;x+=7){const y=Math.sin(x*.05+now*4+k*.8)*h*.14+(k-1.5)*h*.12;if(x===-w/2)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke()}}
  else if(c.trId===1){for(let x=-w;x<w;x+=20){line(x,-h/2,x+h,h/2,hsl(hue,.55,70),1);line(x,h/2,x+h,-h/2,hsl(hue,.28,70),1)}}
  else if(c.trId===2){for(let r=16;r<w;r+=22){ctx.beginPath();ctx.arc(0,0,(r+now*14)%w,0,TAU);ctx.stroke()}}
  else{const rg=ctx.createRadialGradient(0,0,0,0,0,w*.75);rg.addColorStop(0,'rgba(255,255,255,.88)');rg.addColorStop(.4,'rgba(255,255,255,.18)');rg.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=rg;ctx.fillRect(-w/2,-h/2,w,h)}
}
function drawStripClip(c,m,showHandles){
  ctx.save();ctx.translate(m.x,m.y);ctx.rotate(m.rot*PI/180);const p=stripPath(m.len,m.thick);ctx.save();ctx.clip(p);drawClipVisual(c,m.len,m.thick);ctx.restore();ctx.fillStyle='rgba(255,255,255,.035)';ctx.fill(p);ctx.strokeStyle=COLORS.cyan;ctx.lineWidth=showHandles?2:1;ctx.stroke(p);
  if(showHandles){const top=m.len/2,rotY=-m.thick/2-24;line(top,-m.thick/2,top,rotY,COLORS.cyan,1,[4,4]);ctx.beginPath();ctx.arc(top,rotY,9,0,TAU);ctx.fillStyle=COLORS.cyan;ctx.fill();ctx.strokeStyle='#000';ctx.stroke();txt('↻',top,rotY+.5,'center','#000',12,'900');ctx.beginPath();ctx.arc(m.len,0,9,0,TAU);ctx.fillStyle=COLORS.yellow;ctx.fill();ctx.strokeStyle='#000';ctx.stroke();txt('⇄',m.len,.5,'center','#000',10,'900')}
  ctx.restore();
}
function drawSurgery(){
  panel(LAY.surgeryY,LAY.surgeryH,'ARC SURGERY BAY','EDIT SELECTED ARC. REAL CLIPS STAY SANDBOXED; FAILURES FALL BACK TO PROXY.');
  const g=surgeryGeom();fillRound(g.x,g.y,g.w,g.h,4,'rgba(4,4,4,.86)','#1c1c1c',1);
  const c=activeClip();if(!c){txt('TAP A REEL ARC',g.x+g.w/2,g.y+g.h/2-10,'center','#fff',LAY.mobile?14:18,'900');txt('Load real video, then select an arc. Broken files stay isolated.',g.x+g.w/2,g.y+g.h/2+16,'center','#777',LAY.mobile?9:10,'700');return}
  const tr=TRACKS[c.trId],step=thetaPerSlot(tr),a0=-PI/2+c.srcStart*step,a1=a0+c.duration*step;
  ctx.beginPath();ctx.arc(g.reelCx,g.reelCy,g.reelR+8,0,TAU);ctx.strokeStyle='#181818';ctx.stroke();ctx.beginPath();ctx.arc(g.reelCx,g.reelCy,g.reelR-12,0,TAU);ctx.strokeStyle='#202020';ctx.stroke();
  const wedge=arcSegmentPath(g.reelCx,g.reelCy,g.reelR-12,g.reelR+8,a0,a1);ctx.fillStyle=hsl(c.hue,.85,56);ctx.fill(wedge);ctx.strokeStyle=hsl(c.hue,1,78);ctx.lineWidth=2;ctx.stroke(wedge);
  const strip=sampleStripRibbon(g.reelR,a0,a1,g.stripX+c.transform.x,g.stripY+c.transform.y,g.thick,64);const arc=sampleArcRibbon(g.reelCx,g.reelCy,g.reelR,g.thick,a0,a1,64);const morph=morphRibbon(arc,strip,S.unroll);ctx.fillStyle=hsl(c.hue,.16,30);ctx.fill(morph);ctx.strokeStyle=hsl(c.hue,.55,62);ctx.lineWidth=1;ctx.stroke(morph);
  drawStripClip(c,surgeryMedia(),true);
  const label=tr.fileName?tr.fileName.slice(0,20):tr.name;txt(label,g.reelCx,g.reelCy+g.reelR+18,'center',tr.status==='error'?COLORS.bad:hsl(c.hue,.9,60),8);txt(`src ${formatTime(clipSourceSeconds(c).in)} · len ${formatTime(clipSourceSeconds(c).dur)}`,g.x+g.w-14,g.y+24,'right',COLORS.green,9);txt(`rot ${c.transform.rotation.toFixed(0)}° · scale ${c.transform.scaleX.toFixed(2)}x/${c.transform.scaleY.toFixed(2)}y`,g.x+g.w-14,g.y+40,'right',COLORS.yellow,9);txt(`track ${tr.status.toUpperCase()}`,g.x+g.w-14,g.y+56,'right',tr.status==='ready'?COLORS.green:tr.status==='error'?COLORS.bad:'#777',9);
}
function timelineBox(c){const x=LAY.left+c.slotIdx*LAY.slotW,y=LAY.timelineY+42+c.layerIdx*LAY.rowH-10,w=Math.max(20,c.duration*LAY.slotW),h=20;return {x,y,w,h}}
function drawTimeline(){
  panel(LAY.timelineY,LAY.timelineH,'SLICE TIMELINE','UNROLLED ARCS BECOME TIMELINE SLICES');const rulerY=LAY.timelineY+20;rect(LAY.left,rulerY,LAY.stripW,18,'#232323','#0b0b0b');for(let i=0;i<=S.density;i++){const x=LAY.left+i*LAY.slotW;line(x,rulerY,x,rulerY+(i%4===0?18:10),'#434343');if(i%4===0)txt(i+'s',x,rulerY+28,'center','#666',8)}for(let r=0;r<LAY.rows;r++)line(LAY.left,LAY.timelineY+42+r*LAY.rowH,LAY.right,LAY.timelineY+42+r*LAY.rowH,'#181818');
  S.sequence.forEach(c=>{const b=timelineBox(c),sel=c.id===S.selectedClipId;ctx.save();ctx.translate(b.x,b.y+b.h/2);const p=stripPath(b.w,b.h);ctx.save();ctx.clip(p);drawClipVisual(c,b.w,b.h);ctx.restore();ctx.fillStyle=sel?'rgba(255,255,255,.07)':'rgba(255,255,255,.03)';ctx.fill(p);ctx.strokeStyle=sel?COLORS.cyan:'#000';ctx.lineWidth=sel?2:1;ctx.stroke(p);ctx.beginPath();ctx.arc(b.w,0,7,0,TAU);ctx.fillStyle=COLORS.yellow;ctx.fill();ctx.strokeStyle='#000';ctx.stroke();txt('T'+(c.trId+1),b.w/2,0,'center','#000',8,'900');ctx.restore()});
  const px=LAY.left+((S.globalTime%S.density)/S.density)*LAY.stripW;line(px,LAY.timelineY+18,px,LAY.timelineY+LAY.timelineH-6,COLORS.pink,1.5);ctx.fillStyle=COLORS.pink;ctx.beginPath();ctx.moveTo(px-5,LAY.timelineY+20);ctx.lineTo(px+5,LAY.timelineY+20);ctx.lineTo(px,LAY.timelineY+28);ctx.fill();
}
function previewRect(){const pad=LAY.mobile?12:22;const aw=W-pad*2,ah=LAY.previewH-28;let w=aw,h=w*9/16;if(h>ah){h=ah;w=h*16/9}return {x:(W-w)/2,y:LAY.previewY+20+(ah-h)/2,w,h}}
function drawPreview(){panel(LAY.previewY,LAY.previewH,'RENDER BUFFER','ACTIVE TIMELINE OUTPUT');const pr=previewRect();rect(pr.x,pr.y,pr.w,pr.h,'#323232','#030303');const active=S.sequence.filter(c=>S.globalTime>=c.slotIdx&&S.globalTime<c.slotIdx+c.duration).sort((a,b)=>b.layerIdx-a.layerIdx);if(!active.length){const cols=['#ccc','#dd0','#0dd','#0d0','#d0d','#d00','#00d'];for(let i=0;i<7;i++){ctx.fillStyle=cols[i];ctx.fillRect(pr.x+i*pr.w/7,pr.y,pr.w/7,pr.h*.68)}ctx.fillStyle='#111';ctx.fillRect(pr.x,pr.y+pr.h*.68,pr.w,pr.h*.32);txt('NO ACTIVE SLICE',pr.x+pr.w/2,pr.y+pr.h/2,'center','#000',15,'900')}else active.forEach((c,i)=>{ctx.save();ctx.translate(pr.x+pr.w/2+c.transform.x*.3,pr.y+pr.h/2+c.transform.y*.3);ctx.rotate(c.transform.rotation*PI/180);ctx.globalAlpha=i?0.55:1;const w=pr.w*c.transform.scaleX,h=pr.h*c.transform.scaleY;const p=roundRectPath(-w/2,-h/2,w,h,4);ctx.save();ctx.clip(p);drawClipVisual(c,w,h);ctx.restore();ctx.restore();ctx.globalAlpha=1});ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(pr.x,pr.y,pr.w,22);txt(formatTime(S.globalTime),pr.x+pr.w/2,pr.y+11,'center',S.isPlaying?COLORS.cyan:'#fff',11,'900')}
function drawLog(){const x=12,y=Math.max(4,LAY.previewY+LAY.previewH-58),w=Math.min(W-24,560),h=50;fillRound(x,y,w,h,2,'rgba(0,0,0,.70)','#222',1);txt('FAULT / INGEST LOG',x+8,y+10,'left','#777',8);S.logs.slice(0,3).forEach((m,i)=>txt(m,x+8,y+24+i*11,'left',m.includes('fail')||m.includes('error')||m.includes('reject')?COLORS.bad:'#aaa',8,'700'))}
function draw(){if(!LAY)LAY=layout();drawBackground();drawReels();drawSurgery();drawTimeline();drawPreview();drawLog()}

function pointerPos(e){const r=canvas.getBoundingClientRect();return {x:e.clientX-r.left,y:e.clientY-r.top}}
function hitTimeline(px,py){for(let i=S.sequence.length-1;i>=0;i--){const c=S.sequence[i],b=timelineBox(c);if(px>=b.x&&px<=b.x+b.w+12&&py>=b.y-5&&py<=b.y+b.h+5)return {clip:c,handle:Math.hypot(px-(b.x+b.w),py-(b.y+b.h/2))<14}}return null}
function hitSurgery(px,py){const c=activeClip();if(!c)return null;const m=surgeryMedia();const dx=px-m.x,dy=py-m.y,a=-m.rot*PI/180;const lx=dx*Math.cos(a)-dy*Math.sin(a),ly=dx*Math.sin(a)+dy*Math.cos(a);if(Math.hypot(lx-m.len/2,ly-(-m.thick/2-24))<17)return {kind:'rotate'};if(Math.hypot(lx-m.len,ly)<17)return {kind:'length'};if(lx>=0&&lx<=m.len&&ly>=-m.thick/2&&ly<=m.thick/2)return {kind:'move'};if(Math.abs(lx-m.len)<16&&Math.abs(ly-m.thick/2)<16)return {kind:'scale'};return null}
function updateHover(px,py){const s=hitSurgery(px,py);if(s){canvas.style.cursor=s.kind==='move'?'grab':s.kind==='length'?'ew-resize':'grab';return}const tl=hitTimeline(px,py);if(tl){canvas.style.cursor=tl.handle?'ew-resize':'pointer';return}const arc=hitReelArc(px,py);canvas.style.cursor=arc?'pointer':'crosshair'}

canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('pointerdown',e=>{const p=pointerPos(e);canvas.setPointerCapture(e.pointerId);S.isPlaying=false;updateChrome();const surg=hitSurgery(p.x,p.y);if(surg&&activeClip()){if(!S.working){const c=selectedReal();if(c){S.working=deep(c);S.working.origin='sequence'}}S.pointer={zone:'surgery',kind:surg.kind,start:p,startWorking:deep(S.working)};return}const tl=hitTimeline(p.x,p.y);if(tl){selectTimelineClip(tl.clip.id);S.pointer={zone:'timeline',kind:tl.handle?'resize':'move',start:p,startClip:deep(tl.clip)};return}const rulerY=LAY.timelineY+20;if(p.y>=rulerY&&p.y<=rulerY+18&&p.x>=LAY.left&&p.x<=LAY.right){S.pointer={zone:'ruler'};S.globalTime=clamp(((p.x-LAY.left)/LAY.stripW)*S.density,0,totalDuration());return}const arc=hitReelArc(p.x,p.y);if(arc){selectSourceArc(arc.trId,arc.start);return}const pr=previewRect();if(p.x>=pr.x&&p.x<=pr.x+pr.w&&p.y>=pr.y&&p.y<=pr.y+pr.h){S.isPlaying=!S.isPlaying;updateChrome()}});
canvas.addEventListener('pointermove',e=>{const p=pointerPos(e);if(S.pointer){if(S.pointer.zone==='ruler'){S.globalTime=clamp(((p.x-LAY.left)/LAY.stripW)*S.density,0,totalDuration());return}if(S.pointer.zone==='surgery'&&S.working){const dx=p.x-S.pointer.start.x,dy=p.y-S.pointer.start.y,base=S.pointer.startWorking;if(S.pointer.kind==='move'){S.working.transform.x=base.transform.x+dx;S.working.transform.y=base.transform.y+dy}else if(S.pointer.kind==='rotate'){S.working.transform.rotation=clamp(snap(base.transform.rotation+dx*.35,15),-90,90)}else if(S.pointer.kind==='length'){const tr=TRACKS[S.working.trId];const next=clamp(Math.round(base.duration+dx/Math.max(18,LAY.slotW)),1,Math.max(1,tr.chunks-base.srcStart));S.working.duration=next;S.working.thetaLen=next*thetaPerSlot(tr)}else if(S.pointer.kind==='scale'){const f=clamp(1+dx*.006,.5,2.4);S.working.transform.scaleX=clamp(snap(base.transform.scaleX*f,.05),.4,2.5);S.working.transform.scaleY=clamp(snap(base.transform.scaleY*f,.05),.4,2.5)}updateChrome();return}if(S.pointer.zone==='timeline'){const dx=p.x-S.pointer.start.x,dy=p.y-S.pointer.start.y;const c=S.sequence.find(q=>q.id===S.pointer.startClip.id);if(!c)return;if(S.pointer.kind==='resize'){c.duration=clamp(Math.round(S.pointer.startClip.duration+dx/LAY.slotW),1,Math.max(1,TRACKS[c.trId].chunks-c.srcStart));c.thetaLen=c.duration*thetaPerSlot(TRACKS[c.trId])}else{c.slotIdx=clamp(Math.round(S.pointer.startClip.slotIdx+dx/LAY.slotW),0,S.density-c.duration);c.layerIdx=clamp(Math.round(S.pointer.startClip.layerIdx+dy/LAY.rowH),0,LAY.rows-1)}S.selectedClipId=c.id;S.working=deep(c);S.working.origin='sequence';return}}updateHover(p.x,p.y)});
canvas.addEventListener('pointerup',e=>{if(S.pointer){if(S.pointer.zone==='surgery')commitWorking();else if(S.pointer.zone==='timeline')pushUndo()}S.pointer=null;try{canvas.releasePointerCapture(e.pointerId)}catch(_){}});
canvas.addEventListener('pointercancel',()=>{S.pointer=null});

async function loadFiles(files){const list=[...files].filter(Boolean);if(!list.length)return;for(const file of list){const tr=TRACKS[S.ingestIndex%TRACKS.length];S.ingestIndex++;await loadFileIntoTrack(file,tr)}updateChrome()}
function destroyTrackVideo(tr){if(tr.vid){try{tr.vid.pause();tr.vid.removeAttribute('src');tr.vid.load();tr.vid.remove()}catch(_){}}if(tr.url){try{URL.revokeObjectURL(tr.url)}catch(_){}}tr.vid=null;tr.url=null;tr.ready=false}
function loadFileIntoTrack(file,tr){return new Promise(resolve=>{
  if(!file||!file.type.startsWith('video/')){tr.status='error';tr.error='rejected non-video';log(`rejected ${file?file.name:'file'} · not video`);resolve(false);return}
  destroyTrackVideo(tr);tr.loading=true;tr.status='loading';tr.error=null;tr.fileName=file.name;tr.name=file.name.slice(0,18);tr.duration=24;tr.chunks=24;tr.slotSec=1;log(`loading ${file.name} → T${tr.id+1}`);
  const url=URL.createObjectURL(file);tr.url=url;const v=document.createElement('video');v.muted=true;v.playsInline=true;v.preload='auto';v.crossOrigin='anonymous';v.loop=true;v.src=url;tr.vid=v;$('vids').appendChild(v);
  let done=false;const finish=(ok,msg)=>{if(done)return;done=true;clearTimeout(timer);tr.loading=false;if(ok){const dur=Math.max(.1,safeNum(v.duration,24));tr.duration=dur;tr.chunks=clamp(Math.ceil(dur),1,MAX_SLOTS);tr.slotSec=dur/tr.chunks;tr.status='ready';tr.ready=true;log(`loaded ${file.name} · ${formatTime(dur)} · ${tr.chunks} arcs`);v.currentTime=0;v.pause()}else{tr.status='error';tr.ready=false;tr.error=msg||'decode failed';log(`failed ${file.name} · proxy fallback active`)}resolve(ok)};
  const timer=setTimeout(()=>finish(false,'metadata timeout'),LOAD_TIMEOUT_MS);
  v.addEventListener('loadedmetadata',()=>finish(Number.isFinite(v.duration)&&v.duration>0,'bad duration'),{once:true});
  v.addEventListener('error',()=>finish(false,'media error'),{once:true});
  v.load();
})}
function syncVideoFrames(){TRACKS.forEach(tr=>{if(!(tr.vid&&tr.status==='ready'&&tr.vid.readyState>=1))return;const active=S.sequence.find(c=>S.globalTime>=c.slotIdx&&S.globalTime<c.slotIdx+c.duration&&c.trId===tr.id)||activeClip();if(!active||active.trId!==tr.id)return;const src=clipSourceSeconds(active);let target=src.in;if(active.origin!=='source')target=src.in+clamp(S.globalTime-active.slotIdx,0,src.dur);if(tr.duration>0)target=target%tr.duration;if(Math.abs(tr.vid.currentTime-target)>SAFE_FRAME_SEEK_EPS){try{tr.vid.currentTime=target}catch(_){}}if(S.isPlaying){const play=tr.vid.play();if(play&&play.catch)play.catch(()=>{})}else if(!tr.vid.paused){tr.vid.pause()}})}

$('bLoad').addEventListener('click',()=>$('vLoad').click());
$('vLoad').addEventListener('change',e=>{loadFiles(e.target.files);e.target.value=''});
$('bPlay').addEventListener('click',()=>{commitWorking();S.isPlaying=!S.isPlaying;updateChrome()});
$('bAdd').addEventListener('click',()=>commitWorking());
$('bReset').addEventListener('click',()=>resetWorking());
$('bExport').addEventListener('click',()=>{const data={version:2,timebase:'arc-slices',tracks:TRACKS.map(t=>({id:t.id,name:t.name,fileName:t.fileName,status:t.status,duration:t.duration,chunks:t.chunks,slotSec:t.slotSec,error:t.error})),sequence:S.sequence.map((c,i)=>({event:i+1,id:c.id,track:c.trId,sourceIn:formatTime(clipSourceSeconds(c).in),sourceOut:formatTime(clipSourceSeconds(c).in+clipSourceSeconds(c).dur),sequenceIn:formatTime(c.slotIdx),sequenceOut:formatTime(c.slotIdx+c.duration),durationSlots:c.duration,transform:c.transform}))};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='arc_surgery_edl_'+Date.now()+'.json';a.click();URL.revokeObjectURL(url)});
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();commitWorking();S.isPlaying=!S.isPlaying;updateChrome()}if(e.key==='Enter')commitWorking();if(e.key==='Escape'){cancelWorking();S.selectedClipId=null;updateChrome()}if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='z'){const prev=S.undo.pop();if(prev){S.sequence=prev;S.working=null;S.selectedClipId=null;updateChrome()}}if((e.key==='Delete'||e.key==='Backspace')&&S.selectedClipId){pushUndo();S.sequence=S.sequence.filter(c=>c.id!==S.selectedClipId);S.selectedClipId=null;S.working=null;updateChrome()}});
window.addEventListener('resize',resize);
window.addEventListener('beforeunload',()=>TRACKS.forEach(destroyTrackVideo));

function tick(ts){if(!lastTS)lastTS=ts;const dt=Math.min(.05,(ts-lastTS)/1000);lastTS=ts;if(S.isPlaying){const dur=totalDuration();S.globalTime+=dt;if(S.globalTime>=dur)S.globalTime=0}S.unroll+=(activeClip()?1:0-S.unroll)*.12;syncVideoFrames();draw();requestAnimationFrame(tick)}

S.sequence.push(makeClip(0,0,1,0,4));
S.sequence.push(makeClip(1,4,6,1,3));S.sequence[1].transform.rotation=15;
S.sequence.push(makeClip(2,8,10,0,5));S.sequence[2].transform.rotation=-15;
resize();updateChrome();requestAnimationFrame(tick);
})();
</script>
