<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="All-Time scoring and playlist instrument" />
    <title>All-Time</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='white'/%3E%3Cpath d='M4 4h24v24H4zM16 4v24M4 16h24' fill='none' stroke='black' stroke-width='3'/%3E%3C/svg%3E" />
    <style>
        :root {
            --paper: #fff;
            --ink: #000;
            --soft: #f3f3f3;
            --muted: #555;
            --header-h: 186px;
            --legend-h: 58px;
            --column-w: clamp(286px, 20vw, 430px);
            --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Courier New", monospace;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background:
                linear-gradient(90deg, rgba(0, 0, 0, 0.08) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0, 0, 0, 0.08) 1px, transparent 1px),
                var(--paper);
            background-size: 28px 28px;
            color: var(--ink);
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.4;
        }

        button,
        select,
        input,
        textarea,
        a {
            font: inherit;
            color: inherit;
        }

        button,
        select,
        input,
        textarea {
            border-radius: 0;
        }

        .app {
            height: 100dvh;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) var(--legend-h);
            overflow: hidden;
        }

        .player {
            z-index: 30;
            display: grid;
            grid-template-columns: 118px 1fr;
            border-bottom: 2px solid var(--ink);
            background: var(--paper);
            min-height: var(--header-h);
        }

        .art {
            border-right: 2px solid var(--ink);
            background: var(--soft);
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(1) contrast(1.35);
        }

        .mark {
            font-weight: 950;
            font-size: 1.45rem;
            letter-spacing: 0.06em;
        }

        .deck {
            min-width: 0;
            display: grid;
            grid-template-rows: 28px minmax(0, 1fr) 34px 38px;
        }

        .deck-top {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto auto auto auto auto;
            align-items: center;
            gap: 8px;
            padding: 0 8px;
            border-bottom: 2px solid var(--ink);
            font-size: 0.66rem;
            font-weight: 950;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            min-width: 0;
        }

        .hub {
            min-height: 100%;
            display: inline-flex;
            align-items: center;
            padding: 0 8px;
            border-right: 1px solid var(--ink);
            text-decoration: none;
        }

        .top-tool {
            min-height: 24px;
            border: 1px solid var(--ink);
            background: var(--paper);
            color: var(--ink);
            text-transform: uppercase;
            font-size: 0.62rem;
            font-weight: 950;
            letter-spacing: 0.08em;
            padding: 0 9px;
            cursor: pointer;
        }

        .top-tool:hover {
            background: var(--ink);
            color: var(--paper);
        }

        .top-tool.on {
            background: var(--ink);
            color: var(--paper);
        }

        .file-input {
            position: fixed;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .state,
        .time {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .now {
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 7px 8px;
        }

        .now h1 {
            margin: 0;
            font-size: clamp(1.45rem, 5vw, 3.1rem);
            line-height: 0.96;
            text-transform: uppercase;
            overflow-wrap: anywhere;
        }

        .now p {
            margin: 5px 0 0;
            font-size: 0.72rem;
            font-weight: 950;
            text-transform: uppercase;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .now-share {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .now-share-btn {
            min-height: 26px;
            border: 1px solid var(--ink);
            background: var(--paper);
            color: var(--ink);
            padding: 0 9px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.58rem;
            font-weight: 950;
            letter-spacing: 0.07em;
            white-space: nowrap;
        }

        .now-share-btn.primary,
        .now-share-btn:hover {
            background: var(--ink);
            color: var(--paper);
        }

        .scrub {
            border-top: 2px solid var(--ink);
            display: grid;
            grid-template-columns: 54px 1fr 54px;
            align-items: center;
            gap: 7px;
            padding: 0 8px;
        }

        .scrub span {
            font-size: 0.64rem;
            font-weight: 950;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .scrub input {
            width: 100%;
            accent-color: var(--ink);
            touch-action: pan-x;
        }

        .transport {
            display: grid;
            grid-template-columns: 1fr 1.4fr 1fr;
            border-top: 2px solid var(--ink);
        }

        .btn,
        .mini,
        .select {
            min-width: 0;
            min-height: 40px;
            border: 1px solid var(--ink);
            background: var(--paper);
            color: var(--ink);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 8px;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.72rem;
            font-weight: 950;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .transport .btn {
            border: 0;
            border-right: 2px solid var(--ink);
            min-height: 36px;
        }

        .transport .btn:last-child {
            border-right: 0;
        }

        .transport .primary {
            font-size: 0.78rem;
            letter-spacing: 0.1em;
        }

        .primary,
        .play-control,
        .btn:hover,
        .mini:hover,
        .unit:hover,
        .unit.active,
        .unit.selected {
            background: var(--ink);
            color: var(--paper);
        }

        .play-control {
            border-width: 2px;
        }

        .play-control::before {
            content: "▶";
            margin-right: 6px;
        }

        .play-control.is-playing::before {
            content: "▮▮";
            letter-spacing: -0.08em;
            margin-right: 8px;
        }

        .workspace {
            min-width: 0;
            min-height: 0;
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            background: var(--paper);
            scrollbar-width: thin;
            scrollbar-color: var(--ink) var(--paper);
        }

        .column {
            flex: 0 0 var(--column-w);
            width: var(--column-w);
            min-width: var(--column-w);
            height: 100%;
            display: grid;
            grid-template-rows: 74px minmax(0, 1fr);
            border-right: 2px solid var(--ink);
            background: var(--paper);
            scroll-snap-align: start;
            position: relative;
            transition: border-color 160ms linear;
        }

        .column-header {
            min-width: 0;
            display: grid;
            grid-template-columns: 1fr;
            align-items: stretch;
            border-bottom: 2px solid var(--ink);
            min-height: 74px;
            background: var(--paper);
        }

        .column-header::after {
            content: attr(data-count);
            align-self: center;
            justify-self: end;
            margin-right: 10px;
            grid-row: 1;
            grid-column: 1;
            border: 1px solid var(--ink);
            border-radius: 3px;
            padding: 2px 7px;
            background: var(--paper);
            font-size: 0.76rem;
            font-weight: 950;
            letter-spacing: 0.08em;
            line-height: 1.1;
        }

        .column-title {
            min-width: 0;
            padding: 12px 64px 10px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            text-transform: uppercase;
        }

        .column-name {
            font-weight: 950;
            font-size: 1.08rem;
            line-height: 1.05;
            letter-spacing: 0.12em;
        }

        .column-subtitle {
            font-size: 0.74rem;
            line-height: 1.15;
            font-weight: 850;
            letter-spacing: 0.04em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .column-content {
            min-height: 0;
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            overflow: hidden;
            padding: 0;
        }

        .column-scroll {
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px;
            -webkit-overflow-scrolling: touch;
            scrollbar-gutter: stable;
            scrollbar-width: thin;
            scrollbar-color: var(--ink) var(--paper);
        }

        .column-add {
            min-height: 54px;
            border: 2px solid var(--ink);
            border-left: 0;
            border-right: 0;
            border-bottom: 0;
            background: var(--paper);
            color: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            text-transform: uppercase;
            font-weight: 950;
            cursor: pointer;
            padding: 7px 10px;
            text-align: center;
        }

        .column-add-main {
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            line-height: 1.05;
        }

        .column-add-sub {
            font-size: 0.58rem;
            letter-spacing: 0.06em;
            line-height: 1.1;
            opacity: 0.82;
        }

        .column-add:hover {
            background: var(--ink);
            color: var(--paper);
        }

        .unit {
            width: 100%;
            border: 2px solid var(--ink);
            background: var(--paper);
            margin-bottom: 10px;
            text-align: left;
            display: block;
            cursor: pointer;
            transition: background 120ms linear, color 120ms linear, transform 180ms ease, outline-color 180ms ease;
            position: relative;
        }

        .slot-row {
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr);
            gap: 0;
            align-items: stretch;
            margin-bottom: 10px;
        }

        .slot-row .unit {
            border-left: 0;
        }

        .slot-num {
            border: 2px solid var(--ink);
            background: var(--paper);
            color: var(--ink);
            display: grid;
            place-items: center;
            min-height: 58px;
            border-right: 0;
            font-size: 0.82rem;
            font-weight: 950;
            letter-spacing: 0.02em;
            cursor: pointer;
            font-variant-numeric: tabular-nums;
        }

        .slot-row .unit {
            margin-bottom: 0;
        }

        .slot-row.displaced .slot-num,
        .slot-row.ready .slot-num,
        .slot-row.now-slot .slot-num {
            background: var(--ink);
            color: var(--paper);
        }

        .unit::after,
        .block::after {
            content: "";
            position: absolute;
            right: -13px;
            top: 50%;
            width: 12px;
            height: 24px;
            background: var(--paper);
            border: 2px solid currentColor;
            border-right: 0;
            transform: translate(0, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .unit:hover::after,
        .unit.active::after,
        .unit.selected::after,
        .unit.now-playing::after,
        .block:hover::after,
        .block.now-playing::after {
            background: var(--ink);
        }

        .unit.dragging,
        .dragging {
            opacity: 0.55;
            outline: 4px double var(--ink);
            outline-offset: -7px;
        }

        .unit.held,
        .slot-row.held .unit {
            outline: 6px double var(--ink);
            outline-offset: -9px;
        }

        .unit.displaced {
            transform: translateY(8px);
            outline: 5px double var(--ink);
            outline-offset: -8px;
        }

        .unit.snap-accept,
        .block.snap-accept,
        .socket-zone.snap-accept {
            animation: snapAccept 520ms ease both;
        }

        .unit.snap-refuse,
        .block.snap-refuse,
        .socket-zone.snap-refuse {
            animation: snapRefuse 360ms ease both;
        }

        .unit.now-playing,
        .block.now-playing {
            background: var(--ink);
            color: var(--paper);
            animation: attentionPulse 760ms ease both;
        }

        .unit.parent-lit {
            outline: 4px double var(--ink);
            outline-offset: -7px;
        }

        .unit.moved-up {
            animation: moveUp 560ms ease both;
            outline: 7px double var(--ink);
            outline-offset: -10px;
        }

        .unit.moved-down {
            animation: moveDown 560ms ease both;
            outline: 7px double var(--ink);
            outline-offset: -10px;
        }

        .unit.moved-up .transclusion-row,
        .unit.moved-down .transclusion-row {
            opacity: 1;
            background: var(--paper);
            color: var(--ink);
        }

        .unit-body {
            padding: 10px 16px 10px 10px;
            display: grid;
            gap: 6px;
            position: relative;
            z-index: 1;
            min-width: 0;
        }

        .unit-id {
            width: max-content;
            border-bottom: 1px solid currentColor;
            text-transform: uppercase;
            font-size: 0.62rem;
            font-weight: 950;
            letter-spacing: 0.11em;
            padding-bottom: 2px;
        }

        .unit-label {
            min-width: 0;
            text-transform: uppercase;
            font-size: 0.98rem;
            font-weight: 950;
            line-height: 1.1;
            overflow-wrap: anywhere;
        }

        .unit-meta,
        .hint,
        .field {
            min-width: 0;
            color: #333;
            text-transform: uppercase;
            font-size: 0.66rem;
            font-weight: 850;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .unit:hover .unit-meta,
        .unit.active .unit-meta,
        .unit.selected .unit-meta,
        .unit:hover .hint,
        .unit.active .hint,
        .unit.selected .hint,
        .unit:hover .field,
        .unit.active .field,
        .unit.selected .field {
            color: var(--paper);
        }

        .unit:hover .mini,
        .unit.active .mini,
        .unit.selected .mini,
        .unit:hover .select,
        .unit.active .select,
        .unit.selected .select,
        .unit:hover .note-input,
        .unit.active .note-input,
        .unit.selected .note-input,
        .unit:hover .drag-handle,
        .unit.active .drag-handle,
        .unit.selected .drag-handle {
            border-color: var(--paper);
        }

        .unit:hover .mini:hover,
        .unit.active .mini:hover,
        .unit.selected .mini:hover {
            background: var(--paper);
            color: var(--ink);
        }

        .unit:hover .play-control,
        .unit.active .play-control,
        .unit.selected .play-control {
            background: var(--paper);
            color: var(--ink);
            border-color: var(--paper);
        }

        .unit-main {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 4px;
            align-items: start;
            min-width: 0;
        }

        .unit-main>div {
            min-width: 0;
        }

        .song-shell {
            display: grid;
            grid-template-columns: 58px minmax(0, 1fr);
            gap: 8px;
            align-items: stretch;
            min-width: 0;
        }

        .thumb {
            border: 1px solid currentColor;
            min-height: 62px;
            background: var(--soft);
            display: grid;
            place-items: center;
            overflow: hidden;
            align-self: stretch;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(1) contrast(1.25);
        }

        .thumb span {
            font-size: 0.62rem;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .song-shell .unit-id,
        .song-shell .unit-label,
        .song-shell .unit-meta {
            display: block;
        }

        .drag-handle {
            min-height: 40px;
            border: 1px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            font-size: 0.58rem;
            font-weight: 950;
            letter-spacing: 0.08em;
            cursor: grab;
            user-select: none;
        }

        .move-rail {
            display: grid;
            grid-template-columns: 48px minmax(0, 1fr) 48px;
            gap: 5px;
        }

        .move-rail .mini,
        .move-rail .drag-handle {
            min-height: 48px;
            font-size: 0.76rem;
            letter-spacing: 0.08em;
            width: 100%;
        }

        .move-btn {
            position: relative;
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .move-icon {
            border: 1px solid currentColor;
            min-width: 28px;
            min-height: 28px;
            display: inline-grid;
            place-items: center;
            font-size: 1rem;
            line-height: 1;
            margin: 0 auto;
        }

        .move-word {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .transclusion-row {
            min-height: 32px;
            border: 2px dashed currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            font-size: 0.62rem;
            font-weight: 950;
            letter-spacing: 0.08em;
            opacity: 0.78;
        }

        .transclusion-row.hot {
            opacity: 1;
            background: var(--paper);
            color: var(--ink);
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .chip {
            border: 1px solid currentColor;
            padding: 2px 6px;
            text-transform: uppercase;
            font-size: 0.58rem;
            font-weight: 950;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .chip.hot {
            background: currentColor;
        }

        .chip.hot span {
            color: var(--paper);
        }

        .unit:hover .chip.hot span,
        .unit.active .chip.hot span,
        .unit.selected .chip.hot span {
            color: var(--ink);
        }

        .chip-button {
            background: transparent;
            color: inherit;
            cursor: pointer;
        }

        .chip-button:hover {
            background: currentColor;
        }

        .chip-button:hover span {
            color: var(--paper);
        }

        .unit:hover .chip-button:hover span,
        .unit.active .chip-button:hover span,
        .unit.selected .chip-button:hover span {
            color: var(--ink);
        }

        .stars {
            font-weight: 950;
            letter-spacing: 0.02em;
            white-space: nowrap;
            justify-self: start;
            font-size: 0.82rem;
            line-height: 1;
        }

        .rating-rail {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 6px;
        }

        .star-btn {
            min-height: 48px;
            border: 2px solid var(--ink);
            background: var(--paper);
            color: var(--ink);
            font-size: 1.18rem;
            font-weight: 950;
            cursor: pointer;
            text-align: center;
            line-height: 1;
        }

        .star-btn.on,
        .star-btn:hover {
            background: var(--ink);
            color: var(--paper);
        }

        .star-btn.on span,
        .star-btn:hover span {
            color: inherit;
        }

        .unit:hover .star-btn,
        .unit.active .star-btn,
        .unit.selected .star-btn {
            border-color: var(--paper);
            background: var(--paper);
            color: var(--ink);
        }

        .unit:hover .star-btn.on span,
        .unit.active .star-btn.on span,
        .unit.selected .star-btn.on span,
        .unit:hover .star-btn:hover span,
        .unit.active .star-btn:hover span,
        .unit.selected .star-btn:hover span {
            color: inherit;
        }

        .toolbar {
            border: 2px solid var(--ink);
            padding: 8px;
            margin-bottom: 10px;
            display: grid;
            gap: 8px;
            background: var(--paper);
        }

        .grab-banner {
            border: 3px solid var(--ink);
            background: var(--ink);
            color: var(--paper);
            padding: 9px;
            margin-bottom: 10px;
            display: grid;
            gap: 8px;
            text-transform: uppercase;
            font-size: 0.68rem;
            font-weight: 950;
            letter-spacing: 0.07em;
        }

        .grab-banner .mini {
            border-color: var(--paper);
            color: var(--paper);
            background: var(--ink);
        }

        .grab-banner .mini:hover {
            background: var(--paper);
            color: var(--ink);
        }

        .toolbar-title {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            text-transform: uppercase;
            font-size: 0.68rem;
            font-weight: 950;
            letter-spacing: 0.07em;
        }

        .socket-zone {
            border: 2px dashed var(--ink);
            background:
                repeating-linear-gradient(90deg, transparent 0 12px, rgba(0, 0, 0, 0.05) 12px 24px),
                var(--paper);
            padding: 8px;
            min-height: 44px;
            display: grid;
            align-content: center;
            text-transform: uppercase;
            font-size: 0.64rem;
            font-weight: 950;
            letter-spacing: 0.07em;
            margin-bottom: 10px;
        }

        .socket-zone.ready {
            outline: 5px double var(--ink);
            outline-offset: -8px;
        }

        .socket-label {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .beat-strip {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding-bottom: 2px;
            -webkit-overflow-scrolling: touch;
        }

        .beat-pill {
            min-height: 30px;
            flex: 0 0 auto;
            border: 1px solid var(--ink);
            padding: 0 8px;
            background: var(--paper);
            text-transform: uppercase;
            font-size: 0.62rem;
            font-weight: 950;
            letter-spacing: 0.05em;
            cursor: pointer;
        }

        .beat-pill.active,
        .beat-pill:hover {
            background: var(--ink);
            color: var(--paper);
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 5px;
        }

        .actions.three {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .actions.four {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .unit-ops {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 6px;
        }

        .unit-ops .mini,
        .unit-ops .select {
            min-height: 38px;
            font-size: 0.68rem;
            padding: 0 5px;
        }

        .unit-fields {
            grid-template-columns: minmax(0, 1fr);
        }

        .media-ops {
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(82px, 0.8fr);
        }

        .select {
            width: 100%;
            justify-content: flex-start;
            text-align: left;
            display: block;
            padding: 0 8px;
        }

        .beat {
            border: 2px solid var(--ink);
            margin-bottom: 12px;
            background: var(--paper);
        }

        .beat-head {
            min-height: 50px;
            border-bottom: 2px solid var(--ink);
            padding: 8px 10px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            text-transform: uppercase;
            font-weight: 950;
            letter-spacing: 0.05em;
            font-size: 0.82rem;
            cursor: pointer;
        }

        .beat-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.92rem;
            line-height: 1.05;
        }

        .beat-stat {
            font-size: 0.66rem;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .beat.active .beat-head {
            background: var(--ink);
            color: var(--paper);
        }

        .beat-body {
            padding: 8px;
            min-height: var(--beat-h, 110px);
            background:
                linear-gradient(180deg, rgba(0, 0, 0, 0.08) 1px, transparent 1px),
                var(--paper);
            background-size: 100% 24px;
            transition: outline-color 160ms ease, background 160ms ease;
        }

        .block {
            border: 1px solid var(--ink);
            background: var(--paper);
            min-height: 58px;
            height: var(--block-h, 56px);
            margin-bottom: 6px;
            display: grid;
            grid-template-columns: 42px minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            padding: 7px;
            text-transform: uppercase;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .block-thumb {
            width: 42px;
            height: 42px;
            border: 1px solid currentColor;
            background: var(--soft);
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .block-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.25);
        }

        .block-copy {
            min-width: 0;
        }

        .block:hover {
            background: var(--ink);
            color: var(--paper);
        }

        .block-title {
            display: block;
            font-weight: 950;
            font-size: 0.82rem;
            line-height: 1.05;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .block-meta {
            display: block;
            margin-top: 3px;
            font-size: 0.62rem;
            font-weight: 850;
            opacity: 0.75;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .empty {
            border: 1px solid var(--ink);
            padding: 14px;
            text-transform: uppercase;
            font-size: 0.72rem;
            font-weight: 900;
            line-height: 1.45;
        }

        .export-box {
            margin-top: 12px;
        }

        textarea {
            width: 100%;
            min-height: 260px;
            border: 1px solid var(--ink);
            background: var(--paper);
            padding: 10px;
            resize: vertical;
            font-size: 0.72rem;
            line-height: 1.45;
        }

        .paste-box {
            min-height: 118px;
            margin-top: 10px;
        }

        .share-card {
            width: 100%;
            min-height: 76px;
            border: 2px solid var(--ink);
            background: var(--paper);
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 48px minmax(0, 1fr) 58px;
            gap: 10px;
            align-items: center;
            padding: 8px;
            text-align: left;
            cursor: pointer;
        }

        .share-card:hover,
        .share-card.active {
            background: var(--ink);
            color: var(--paper);
        }

        .share-icon {
            width: 42px;
            height: 42px;
            border: 2px solid currentColor;
            display: grid;
            place-items: center;
            font-size: 0.8rem;
            font-weight: 950;
            letter-spacing: 0.04em;
        }

        .share-title {
            text-transform: uppercase;
            font-size: 0.82rem;
            font-weight: 950;
            letter-spacing: 0.06em;
        }

        .share-meta {
            margin-top: 3px;
            text-transform: uppercase;
            font-size: 0.62rem;
            font-weight: 850;
            color: currentColor;
            opacity: 0.82;
        }

        .share-send {
            min-height: 42px;
            border: 2px solid currentColor;
            display: grid;
            place-items: center;
            font-size: 1rem;
            font-weight: 950;
        }

        .share-section {
            border: 2px solid var(--ink);
            margin-bottom: 12px;
            background: var(--paper);
        }

        .share-section-title {
            border-bottom: 2px solid var(--ink);
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            text-transform: uppercase;
            font-size: 0.72rem;
            font-weight: 950;
            letter-spacing: 0.08em;
        }

        .share-panel {
            padding: 10px;
            border-bottom: 1px solid var(--ink);
            display: grid;
            gap: 8px;
        }

        .share-panel:last-child {
            border-bottom: 0;
        }

        .share-panel.primary {
            background: var(--ink);
            color: var(--paper);
        }

        .share-panel-head {
            display: grid;
            grid-template-columns: 48px minmax(0, 1fr);
            gap: 10px;
            align-items: center;
        }

        .share-url {
            border: 1px solid currentColor;
            padding: 6px 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.62rem;
            font-weight: 850;
        }

        .share-panel.primary .mini {
            border-color: var(--paper);
            background: var(--paper);
            color: var(--ink);
        }

        .share-panel.primary .mini.primary {
            background: var(--paper);
            color: var(--ink);
            outline: 3px double var(--paper);
            outline-offset: -7px;
        }

        .share-tools {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
        }

        .legend {
            display: flex;
            align-items: center;
            gap: 22px;
            border-top: 2px solid var(--ink);
            background: var(--paper);
            padding: 8px 12px;
            overflow-x: auto;
            text-transform: uppercase;
            font-size: 0.66rem;
            font-weight: 900;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .legend-title {
            font-size: 0.82rem;
            font-weight: 950;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .legend-swatch {
            width: 24px;
            height: 24px;
            border: 1px solid var(--ink);
            display: inline-block;
            background: var(--paper);
        }

        .legend-swatch.dark {
            background: var(--ink);
        }

        .legend-swatch.ghost {
            border-style: dashed;
        }

        .note-input {
            min-height: 30px;
            width: 100%;
            border: 1px solid var(--ink);
            background: var(--paper);
            color: var(--ink);
            padding: 0 7px;
            resize: none;
            text-transform: uppercase;
            font-size: 0.6rem;
            font-weight: 850;
            overflow: hidden;
            white-space: nowrap;
        }

        @keyframes moveUp {
            0% {
                transform: translateY(12px);
                outline: 4px double var(--ink);
            }

            45% {
                transform: translateY(-7px);
                outline: 4px double var(--ink);
            }

            100% {
                transform: translateY(0);
                outline: 0 solid transparent;
            }
        }

        @keyframes moveDown {
            0% {
                transform: translateY(-12px);
                outline: 4px double var(--ink);
            }

            45% {
                transform: translateY(7px);
                outline: 4px double var(--ink);
            }

            100% {
                transform: translateY(0);
                outline: 0 solid transparent;
            }
        }

        @keyframes attentionPulse {
            0% {
                transform: scale(0.985);
                outline: 5px double currentColor;
                outline-offset: -8px;
            }

            55% {
                transform: scale(1.01);
                outline: 5px double currentColor;
                outline-offset: -8px;
            }

            100% {
                transform: scale(1);
                outline: 0 solid transparent;
            }
        }

        @keyframes snapAccept {
            0% {
                transform: scale(0.985);
                outline: 6px double var(--ink);
                outline-offset: -9px;
            }

            50% {
                transform: scale(1.018);
                outline: 6px double var(--ink);
                outline-offset: -9px;
            }

            100% {
                transform: scale(1);
                outline: 0 solid transparent;
            }
        }

        @keyframes snapRefuse {

            0%,
            100% {
                transform: translateX(0);
                outline: 4px double var(--ink);
                outline-offset: -7px;
            }

            25% {
                transform: translateX(-7px);
            }

            55% {
                transform: translateX(7px);
            }

            80% {
                transform: translateX(-4px);
            }
        }

        @media (max-width: 760px) {
            :root {
                --header-h: 150px;
                --legend-h: 52px;
                --column-w: 100vw;
            }

            .player {
                grid-template-columns: 82px 1fr;
            }

            .deck {
                grid-template-rows: 24px minmax(0, 1fr) 30px 36px;
            }

            .deck-top,
            .unit-meta,
            .hint,
            .field {
                font-size: 0.56rem;
            }

            .deck-top {
                grid-template-columns: minmax(0, 1fr) auto auto auto;
            }

            .deck-top .time,
            .deck-top .top-tool.compact-hide {
                display: none;
            }

            .now {
                padding: 5px 6px;
            }

            .now h1 {
                font-size: clamp(1rem, 6.2vw, 1.72rem);
            }

            .now p {
                font-size: 0.58rem;
                margin-top: 3px;
            }

            .now-share {
                gap: 4px;
                margin-top: 5px;
            }

            .now-share-btn {
                min-height: 24px;
                padding: 0 6px;
                font-size: 0.5rem;
            }

            .scrub {
                grid-template-columns: 42px 1fr 42px;
                min-height: 30px;
                padding: 0 5px;
                gap: 5px;
            }

            .scrub span {
                font-size: 0.56rem;
            }

            .hub {
                display: none;
            }

            .column-content {
                padding: 8px;
            }

            .actions.three {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .actions.four {
                grid-template-columns: 1fr 1fr;
            }

            .unit-ops {
                grid-template-columns: minmax(0, 1fr);
            }

            .media-ops {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .move-rail {
                grid-template-columns: 48px minmax(0, 1fr) 48px;
            }

            .move-rail .mini,
            .move-rail .drag-handle {
                min-height: 52px;
            }

            .song-shell {
                grid-template-columns: 54px minmax(0, 1fr);
            }

            .legend {
                gap: 14px;
                padding: 7px 8px;
            }

            .slot-row {
                grid-template-columns: 42px minmax(0, 1fr);
                gap: 0;
            }

            .thumb {
                min-height: 64px;
            }
        }

        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: var(--paper);
            border-left: 1px solid var(--ink);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--ink);
            border: 3px solid var(--paper);
        }

        ::-webkit-scrollbar-thumb:hover {
            border-width: 2px;
        }
    </style>
</head>

<body>
    <main class="app" aria-label="All-Time scoring instrument">
        <section class="player" aria-label="Locked player">
            <div class="art" id="artBox">
                <div class="mark">ALL</div>
            </div>
            <div class="deck">
                <div class="deck-top">
                    <a class="hub" href="./index.html">Hub</a>
                    <span class="state" id="stateReadout">Ready</span>
                    <button class="top-tool" id="autoplayBtn" type="button">Autoplay</button>
                    <button class="top-tool" id="shuffleBtn" type="button">Shuffle</button>
                    <button class="top-tool compact-hide" id="importBtn" type="button">Upload</button>
                    <button class="top-tool" id="clearBtn" type="button">Clear</button>
                    <span class="time" id="timeReadout">0:00 / --</span>
                </div>
                <div class="now">
                    <h1 id="nowTitle">All-Time</h1>
                    <p id="nowMeta">Albums -> Songs -> Keeps -> Beats -> Exports</p>
                    <div class="now-share" aria-label="Now playing share actions">
                        <button class="now-share-btn primary" type="button" data-action="copy-current-link">Copy Song
                            Link</button>
                        <button class="now-share-btn" type="button" data-action="copy-album-link">Copy Album
                            Link</button>
                        <button class="now-share-btn compact-hide" type="button" data-action="download-current-qr">Song
                            QR</button>
                    </div>
                </div>
                <div class="scrub">
                    <span id="scrubNow">0:00</span>
                    <input id="songScrub" type="range" min="0" max="0" value="0" step="0.01" disabled
                        aria-label="Scrub current song" />
                    <span id="scrubEnd">--</span>
                </div>
                <div class="transport">
                    <button class="btn" id="prevBtn" type="button">◀ Back</button>
                    <button class="btn primary" id="playBtn" type="button">▶ Play</button>
                    <button class="btn" id="nextBtn" type="button">Next ▶</button>
                </div>
            </div>
        </section>

        <section class="workspace" id="workspace" aria-label="Operational columns"></section>
        <input class="file-input" id="projectUpload" type="file" accept="application/json,.json"
            aria-label="Upload All-Time playlist JSON" />
        <footer class="legend" aria-label="Interface legend">
            <span class="legend-title">Legend:</span>
            <span class="legend-item"><span class="legend-swatch dark"></span> Currently playing</span>
            <span class="legend-item"><span class="legend-swatch"></span> Selected / active</span>
            <span class="legend-item"><span class="legend-swatch ghost"></span> Drop target / placement</span>
            <span class="legend-item">→ To keeps</span>
            <span class="legend-item">← From songs</span>
        </footer>
    </main>

    <script>
        (function () {
            "use strict";

            const MANIFEST_URL = "./VOLHOLLA/media-manifest.json";
            const PUBLIC_BASE_URL = "https://hartswf0.github.io/moto/";
            const STORAGE_KEY = "allTimeInstrument.v3";
            const beats = [
                { id: "unassigned", label: "Unassigned", target: 0 },
                { id: "CH00", label: "CH00 Release", target: 30 },
                { id: "CH01", label: "CH01 Field", target: 180 },
                { id: "CH02", label: "CH02 Governance", target: 286 },
                { id: "CH03", label: "CH03 Metabolism", target: 351 },
                { id: "CH04", label: "CH04 Bodies", target: 240 },
                { id: "CH05", label: "CH05 Belief", target: 301 },
                { id: "CH06", label: "CH06 Residue", target: 165 }
            ];
            const scale = { pxPerSecond: 0.36, fudge: 1.0, minBlock: 42, maxBlock: 170, minBeat: 105, maxBeat: 360 };

            const els = {
                workspace: document.getElementById("workspace"),
                art: document.getElementById("artBox"),
                state: document.getElementById("stateReadout"),
                time: document.getElementById("timeReadout"),
                title: document.getElementById("nowTitle"),
                meta: document.getElementById("nowMeta"),
                scrub: document.getElementById("songScrub"),
                scrubNow: document.getElementById("scrubNow"),
                scrubEnd: document.getElementById("scrubEnd"),
                autoplay: document.getElementById("autoplayBtn"),
                shuffle: document.getElementById("shuffleBtn"),
                import: document.getElementById("importBtn"),
                upload: document.getElementById("projectUpload"),
                clear: document.getElementById("clearBtn"),
                prev: document.getElementById("prevBtn"),
                play: document.getElementById("playBtn"),
                next: document.getElementById("nextBtn")
            };

            const audio = new Audio();
            audio.preload = "metadata";

            let albums = [];
            let tracks = [];
            let build = [];
            let activeAlbum = "";
            let activeBeat = "unassigned";
            let currentIndex = 0;
            let nowItem = null;
            let playOrigin = "keeps";
            let dragTrackId = "";
            let dragPayload = null;
            let heldPayload = null;
            let lastMove = { id: "", direction: "" };
            let lastPlacement = { id: "", text: "" };
            let lastSnap = { target: "", state: "" };
            let lastSnapKey = "";
            const panelBusyUntil = {};
            let restoreWorkspaceScroll = 0;
            let isScrubbing = false;
            let autoplayEnabled = true;
            let shuffleEnabled = false;
            let statusTimer = 0;
            let longPressTimer = 0;
            let longPressTrackId = "";

            function path(source) {
                if (!source) return "";
                if (/^https?:\/\//i.test(source) || source.startsWith("data:")) return source;
                if (source.startsWith("./") || source.startsWith("/") || source.startsWith("../")) return source;
                return `./${source}`;
            }

            function fmt(sec) {
                if (!Number.isFinite(sec) || sec < 0) return "--";
                const m = Math.floor(sec / 60);
                const s = Math.floor(sec % 60);
                return `${m}:${String(s).padStart(2, "0")}`;
            }

            function runtime(item) {
                const seconds = Number(item?.runtime);
                return Number.isFinite(seconds) && seconds > 0.5 ? seconds : null;
            }

            function currentDuration(item) {
                const loaded = Number(audio.duration);
                if (Number.isFinite(loaded) && loaded > 0.5) return loaded;
                return runtime(item);
            }

            function stars(item) {
                return Math.max(0, Math.min(5, Number(item?.stars) || 0));
            }

            function starText(item) {
                const count = stars(item);
                return `${"★".repeat(count)}${"☆".repeat(5 - count)}`;
            }

            function beatLabel(id) {
                return beats.find((beat) => beat.id === id)?.label || "Unassigned";
            }

            function originLabel() {
                if (playOrigin === "source") return "album";
                if (playOrigin === "beats") return "beats";
                return "keeps";
            }

            function sortedBuild() {
                return build.slice().sort((a, b) => a.order - b.order);
            }

            function currentItem() {
                return sortedBuild()[currentIndex] || sortedBuild()[0] || null;
            }

            function keptFor(trackId) {
                return build.find((item) => item.id === trackId) || null;
            }

            function trackKey(albumKey, index) {
                return `${albumKey}:${String(index).padStart(2, "0")}`;
            }

            function trackMatchesLegacyId(track, id) {
                const raw = String(id || "");
                return raw === track.id || raw.startsWith(`${track.albumKey}:${track.index}:`);
            }

            function findTrackByAnyId(id) {
                return tracks.find((track) => trackMatchesLegacyId(track, id)) || null;
            }

            function artHtml(item) {
                return item?.art
                    ? `<img src="${encodeURI(path(item.art))}" alt="">`
                    : `<span>Art</span>`;
            }

            function snapClass(target) {
                if (lastSnap.target !== target) return "";
                return lastSnap.state === "accept" ? "snap-accept" : "snap-refuse";
            }

            function heldClass(kind, id) {
                return heldPayload?.kind === kind && heldPayload?.id === id ? "held" : "";
            }

            function setHeld(kind, id) {
                heldPayload = { kind, id };
                render();
                status(`Grabbed ${heldLabel()}. Click a keep slot or beat socket.`, 2200);
            }

            function clearHeld() {
                heldPayload = null;
                render();
            }

            function rememberPlacement(id, text) {
                lastPlacement = { id, text };
                window.setTimeout(() => {
                    if (lastPlacement.id === id && lastPlacement.text === text) {
                        lastPlacement = { id: "", text: "" };
                    }
                }, 1800);
            }

            function placementText(id, fallback = "") {
                return lastPlacement.id === id ? lastPlacement.text : fallback;
            }

            function heldLabel() {
                if (!heldPayload) return "";
                const item = heldPayload.kind === "source"
                    ? tracks.find((track) => track.id === heldPayload.id)
                    : build.find((track) => track.id === heldPayload.id);
                return item ? `${heldPayload.kind}: ${item.title}` : heldPayload.kind;
            }

            function grabBanner(target) {
                if (!heldPayload) return "";
                const place = target === "beats" ? "click a beat socket to place it" : "click a slot number to reorder or insert it";
                return h`
          <div class="grab-banner">
            <div>${escapeHtml(heldLabel())}</div>
            <div>${escapeHtml(place)}</div>
            <button class="mini" type="button" data-action="cancel-grab">Cancel Grab</button>
          </div>
        `;
            }

            function signalSnap(target, accepted) {
                lastSnap = { target, state: accepted ? "accept" : "refuse" };
                if (accepted) {
                    if (navigator.vibrate) navigator.vibrate(18);
                    clickSound();
                    status("Placed", 900);
                } else {
                    status("Cannot place there", 1200);
                }
                window.setTimeout(() => {
                    if (lastSnap.target === target) {
                        lastSnap = { target: "", state: "" };
                    }
                }, accepted ? 560 : 420);
            }

            function clickSound() {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;
                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = "square";
                    osc.frequency.value = 660;
                    gain.gain.setValueAtTime(0.001, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.05, ctx.currentTime + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.08);
                } catch {
                    // audio feedback is optional
                }
            }

            function status(message, duration = 1500) {
                if (!message) return;
                window.clearTimeout(statusTimer);
                els.state.textContent = message;
                if (navigator.vibrate) navigator.vibrate(14);
                statusTimer = window.setTimeout(() => renderNow(), duration);
            }

            function sourceTracks() {
                return tracks.filter((track) => track.albumKey === activeAlbum);
            }

            function save() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({
                        activeAlbum,
                        activeBeat,
                        currentIndex,
                        nowItemId: nowItem?.id || "",
                        playOrigin,
                        autoplayEnabled,
                        shuffleEnabled,
                        build: sortedBuild().map(({ id, order, stars, beat, runtime, notes }) => ({ id, order, stars, beat, runtime, notes }))
                    }));
                } catch {
                    // localStorage may be blocked
                }
                // ── MARK SPINE: emit score state on every save ──
                _busEmitScoreSync();
            }

            function restore() {
                try {
                    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
                    if (raw.activeAlbum) activeAlbum = raw.activeAlbum;
                    if (raw.activeBeat) activeBeat = raw.activeBeat;
                    if (Number.isFinite(Number(raw.currentIndex))) currentIndex = Number(raw.currentIndex);
                    if (typeof raw.playOrigin === "string") playOrigin = raw.playOrigin;
                    if (typeof raw.autoplayEnabled === "boolean") autoplayEnabled = raw.autoplayEnabled;
                    if (typeof raw.shuffleEnabled === "boolean") shuffleEnabled = raw.shuffleEnabled;
                    if (!Array.isArray(raw.build)) return;
                    build = raw.build.map((item) => {
                        const base = findTrackByAnyId(item.id);
                        if (!base) return null;
                        return {
                            ...base,
                            order: Number.isFinite(Number(item.order)) ? Number(item.order) : 0,
                            stars: Number.isFinite(Number(item.stars)) ? Number(item.stars) : 0,
                            beat: typeof item.beat === "string" ? item.beat : "unassigned",
                            runtime: Number.isFinite(Number(item.runtime)) ? Number(item.runtime) : base.runtime,
                            notes: typeof item.notes === "string" ? item.notes : ""
                        };
                    }).filter(Boolean);
                    normalizeOrder();
                    if (raw.nowItemId) {
                        const nextIndex = sortedBuild().findIndex((item) => trackMatchesLegacyId(item, raw.nowItemId));
                        if (nextIndex >= 0) currentIndex = nextIndex;
                    }
                    currentIndex = Math.max(0, Math.min(currentIndex, Math.max(0, build.length - 1)));
                    nowItem = currentItem();
                } catch {
                    // ignore malformed state
                }
            }

            function normalizeOrder() {
                sortedBuild().forEach((item, index) => { item.order = index; });
            }

            function selectAlbum(key) {
                activeAlbum = key;
                save();
                render();
            }

            function selectBeat(id) {
                activeBeat = id;
                save();
                render();
            }

            function addTrack(track, beatId = activeBeat) {
                if (!track) return false;
                const existing = keptFor(track.id);
                if (existing) {
                    existing.beat = beatId || existing.beat || "unassigned";
                    rememberPlacement(track.id, "already in keeps");
                    save();
                    render({ snap: false });
                    return true;
                }
                build.push({ ...track, order: build.length, stars: 0, beat: beatId, notes: "", keptAt: new Date().toISOString() });
                normalizeOrder();
                rememberPlacement(track.id, beatId && beatId !== "unassigned" ? `moved to ${beatLabel(beatId)}` : "moved to keeps");
                save();
                render({ snap: false });
                return true;
            }

            function addTrackAt(track, targetId) {
                if (!track) return false;
                if (keptFor(track.id)) return false;
                const list = sortedBuild();
                const targetIndex = list.findIndex((item) => item.id === targetId);
                const insertAt = targetIndex < 0 ? list.length : targetIndex;
                list.splice(insertAt, 0, { ...track, order: insertAt, stars: 0, beat: activeBeat, notes: "", keptAt: new Date().toISOString() });
                build = list;
                normalizeOrder();
                rememberPlacement(track.id, "inserted in keeps");
                save();
                render({ snap: false });
                return true;
            }

            function loadAlbum() {
                build = sourceTracks().map((track, index) => ({ ...track, order: index, stars: 0, beat: activeBeat, notes: "" }));
                currentIndex = 0;
                nowItem = currentItem();
                save();
                render({ snap: false });
            }

            function keepOpenAlbum() {
                const visible = sourceTracks();
                let added = 0;
                visible.forEach((track) => {
                    if (keptFor(track.id)) return;
                    build.push({ ...track, order: build.length, stars: 0, beat: activeBeat, notes: "", keptAt: new Date().toISOString() });
                    added += 1;
                });
                normalizeOrder();
                if (added) rememberPlacement(visible[0]?.id || "", `${added} songs moved to keeps`);
                save();
                render({ snap: false });
                status(added ? `${added} songs added to Keeps` : "Open album is already in Keeps", 1800);
                requestAnimationFrame(() => scrollColumn("keeps"));
                return true;
            }

            function cutItem(id) {
                const list = sortedBuild();
                const index = list.findIndex((item) => item.id === id);
                if (index < 0) return;
                const wasCurrent = currentItem()?.id === id;
                const wasPlaying = !audio.paused && !!audio.src;
                build = list.filter((item) => item.id !== id);
                if (wasCurrent) currentIndex = Math.min(index, Math.max(0, build.length - 1));
                else if (index < currentIndex) currentIndex -= 1;
                normalizeOrder();
                save();
                if (!build.length) {
                    audio.pause();
                    audio.removeAttribute("src");
                    nowItem = null;
                    audio.load();
                    render();
                    return;
                }
                if (wasCurrent) loadCurrent(wasPlaying);
                else render();
            }

            function confirmCutItem(id) {
                const item = build.find((candidate) => candidate.id === id);
                if (!item) return false;
                if (!window.confirm(`Cut "${item.title}" from keeps?`)) {
                    status("Cut cancelled", 1200);
                    return false;
                }
                cutItem(id);
                status(`Cut ${item.title}`, 1600);
                return true;
            }

            function setRating(id, rating) {
                const item = build.find((candidate) => candidate.id === id);
                if (!item) return;
                item.stars = Math.max(0, Math.min(5, Number(rating) || 0));
                save();
                render({ snap: false });
                status(`${item.title} rated ${item.stars}/5`, 1200);
            }

            function setNote(id, note) {
                const item = build.find((candidate) => candidate.id === id);
                if (!item) return;
                item.notes = String(note || "");
                save();
            }

            function clearBuild() {
                build = [];
                currentIndex = 0;
                nowItem = null;
                heldPayload = null;
                lastMove = { id: "", direction: "" };
                lastPlacement = { id: "", text: "" };
                lastSnap = { target: "", state: "" };
                audio.pause();
                audio.removeAttribute("src");
                audio.load();
                save();
                render();
            }

            function assignBeat(id, beatId) {
                const item = build.find((candidate) => candidate.id === id);
                if (!item) return;
                item.beat = beatId;
                rememberPlacement(id, `placed in ${beatLabel(beatId)}`);
                save();
                render({ snap: false });
                status(`${item.title} -> ${beatLabel(beatId)}`, 1400);
            }

            function beatSource(id) {
                const track = tracks.find((candidate) => candidate.id === id);
                if (!track) return false;
                const targetBeat = activeBeat && activeBeat !== "unassigned" ? activeBeat : "CH00";
                activeBeat = targetBeat;
                const ok = addTrack(track, targetBeat);
                if (ok) {
                    status(`${track.title} -> ${beatLabel(targetBeat)}`, 1600);
                    requestAnimationFrame(() => scrollColumn("beats"));
                }
                return ok;
            }

            function addCurrentItem() {
                const item = nowItem || currentItem() || sourceTracks()[0] || tracks[0];
                const ok = addTrack(item);
                if (ok && item) {
                    status(`${item.title} is in Keeps`, 1600);
                    requestAnimationFrame(() => scrollColumn("keeps"));
                }
                return ok;
            }

            function addCurrentItemToActiveBeat() {
                const item = nowItem || currentItem() || sourceTracks()[0] || tracks[0];
                if (!item) return false;
                const targetBeat = activeBeat && activeBeat !== "unassigned" ? activeBeat : "CH00";
                activeBeat = targetBeat;
                const existing = keptFor(item.id);
                if (existing) {
                    existing.beat = targetBeat;
                } else {
                    build.push({ ...item, order: build.length, stars: 0, beat: targetBeat, notes: "", keptAt: new Date().toISOString() });
                    normalizeOrder();
                }
                rememberPlacement(item.id, `placed in ${beatLabel(targetBeat)}`);
                save();
                render({ snap: false });
                status(`${item.title} placed in ${beatLabel(targetBeat)}`, 1700);
                requestAnimationFrame(() => scrollColumn("beats"));
                return true;
            }

            function moveItem(id, delta) {
                const list = sortedBuild();
                const index = list.findIndex((item) => item.id === id);
                const next = index + delta;
                if (index < 0 || next < 0 || next >= list.length) {
                    signalSnap(`keep:${id}`, false);
                    return false;
                }
                const [item] = list.splice(index, 1);
                list.splice(next, 0, item);
                build = list;
                normalizeOrder();
                lastMove = { id, direction: delta < 0 ? "up" : "down" };
                const slot = sortedBuild().findIndex((candidate) => candidate.id === id) + 1;
                const message = `${delta < 0 ? "moved earlier" : "moved later"} -> slot ${String(slot).padStart(2, "0")}`;
                rememberPlacement(id, message);
                currentIndex = Math.max(0, list.findIndex((candidate) => candidate.id === nowItem?.id));
                save();
                render({ snap: false });
                status(`${item.title} ${message}`, 1800);
                window.setTimeout(() => {
                    if (lastMove.id === id) {
                        lastMove = { id: "", direction: "" };
                    }
                }, 1400);
                return true;
            }

            function moveSlot(slot, delta) {
                const list = sortedBuild();
                const index = Number(slot);
                const next = index + delta;
                if (!Number.isInteger(index) || index < 0 || next < 0 || next >= list.length) {
                    signalSnap("keep:intake", false);
                    return false;
                }
                const [item] = list.splice(index, 1);
                list.splice(next, 0, item);
                build = list;
                normalizeOrder();
                lastMove = { id: item.id, direction: delta < 0 ? "up" : "down" };
                const slotNumber = next + 1;
                const message = `${delta < 0 ? "moved earlier" : "moved later"} -> slot ${String(slotNumber).padStart(2, "0")}`;
                rememberPlacement(item.id, message);
                currentIndex = Math.max(0, list.findIndex((candidate) => candidate.id === nowItem?.id));
                save();
                render({ snap: false });
                status(`${item.title} ${message}`, 1800);
                return true;
            }

            function reorderItem(id, targetId) {
                if (!id || !targetId || id === targetId) return false;
                const list = sortedBuild();
                const from = list.findIndex((item) => item.id === id);
                const to = list.findIndex((item) => item.id === targetId);
                if (from < 0 || to < 0) return false;
                const [item] = list.splice(from, 1);
                list.splice(to, 0, item);
                build = list;
                normalizeOrder();
                lastMove = { id, direction: to < from ? "up" : "down" };
                const slot = sortedBuild().findIndex((candidate) => candidate.id === id) + 1;
                const message = `${to < from ? "moved earlier" : "moved later"} -> slot ${String(slot).padStart(2, "0")}`;
                rememberPlacement(id, message);
                currentIndex = Math.max(0, list.findIndex((candidate) => candidate.id === nowItem?.id));
                save();
                render({ snap: false });
                status(`${item.title} ${message}`, 1800);
                window.setTimeout(() => {
                    if (lastMove.id === id) {
                        lastMove = { id: "", direction: "" };
                    }
                }, 1400);
                return true;
            }

            function applyHeldToKeep(targetId) {
                const held = heldPayload;
                if (!held) return false;
                if (held.kind === "keep") {
                    const ok = reorderItem(held.id, targetId);
                    heldPayload = ok ? null : held;
                    signalSnap(`keep:${held.id}`, ok);
                    return ok;
                }
                if (held.kind === "source") {
                    const ok = addTrackAt(tracks.find((track) => track.id === held.id), targetId);
                    heldPayload = ok ? null : held;
                    signalSnap(ok ? `keep:${held.id}` : `song:${held.id}`, ok);
                    return ok;
                }
                return false;
            }

            function applyHeldToBeat(beatId) {
                const held = heldPayload;
                if (!held) return false;
                if (held.kind === "source") {
                    addTrack(tracks.find((track) => track.id === held.id), beatId);
                    heldPayload = null;
                    signalSnap(`beat:${beatId}`, true);
                    return true;
                }
                if (held.kind === "keep") {
                    assignBeat(held.id, beatId);
                    heldPayload = null;
                    signalSnap(`beat:${beatId}`, true);
                    return true;
                }
                return false;
            }

            function revealTrack(id, preferred = "keeps") {
                const source = tracks.find((track) => track.id === id);
                const keep = keptFor(id);
                if (!source && !keep) {
                    signalSnap(`song:${id}`, false);
                    return false;
                }
                if (source && activeAlbum !== source.albumKey) {
                    activeAlbum = source.albumKey;
                    save();
                    render();
                }
                const selectors = [
                    ["keeps", "data-keep-id", `keep:${id}`],
                    ["songs", "data-song-id", `song:${id}`],
                    ["beats", "data-beat-song-id", `beat-song:${id}`]
                ];
                const ordered = selectors.slice().sort((a, b) => (a[0] === preferred ? -1 : 0) - (b[0] === preferred ? -1 : 0));
                requestAnimationFrame(() => {
                    const found = ordered
                        .map(([type, attr, target]) => ({ type, attr, target, node: findByData(type, attr, id) }))
                        .find((item) => item.node);
                    if (!found) {
                        signalSnap(`song:${id}`, false);
                        return;
                    }
                    lastSnap = { target: found.target, state: "accept" };
                    clickSound();
                    render();
                    requestAnimationFrame(() => {
                        document.querySelector(`[data-column="${found.type}"]`)?.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
                        snapElementInPanel(found.type, findByData(found.type, found.attr, id), { force: true });
                    });
                    window.setTimeout(() => {
                        if (lastSnap.target === found.target) {
                            lastSnap = { target: "", state: "" };
                            render();
                        }
                    }, 560);
                });
                return true;
            }

            function setCurrent(id, autoplay, origin = "keeps") {
                const index = sortedBuild().findIndex((item) => item.id === id);
                if (index < 0) return;
                currentIndex = index;
                playOrigin = origin;
                nowItem = currentItem();
                loadCurrent(autoplay);
            }

            function playSource(id) {
                const track = tracks.find((candidate) => candidate.id === id);
                if (!track) return;
                playOrigin = "source";
                playObject(track, true);
            }

            function toggleSource(id) {
                if (nowItem?.id === id && playOrigin === "source" && audio.src) {
                    playPause();
                    return;
                }
                playSource(id);
            }

            function toggleBuild(id, origin = "keeps") {
                if (nowItem?.id === id && playOrigin === origin && audio.src) {
                    playPause();
                    return;
                }
                setCurrent(id, true, origin);
            }

            function loadCurrent(autoplay) {
                const item = currentItem();
                if (!item) return;
                nowItem = item;
                playObject(item, autoplay);
            }

            function playObject(item, autoplay) {
                const src = path(item.audio);
                nowItem = item;
                if (src && audio.src !== new URL(encodeURI(src), window.location.href).toString()) {
                    audio.src = encodeURI(src);
                    audio.load();
                }
                render();
                renderNow(item);
                snapNowPlaying({ force: true });
                if (autoplay && src) audio.play().catch(() => renderNow(item));
            }

            function playPause() {
                if (!nowItem && currentItem()) nowItem = currentItem();
                if (!nowItem) return;
                if (!audio.src) {
                    playObject(nowItem, true);
                    return;
                }
                if (audio.paused) audio.play().catch(render);
                else audio.pause();
            }

            function next() {
                const list = sortedBuild();
                if (!list.length) return;
                if (shuffleEnabled && list.length > 1) {
                    let nextIndex = currentIndex;
                    while (nextIndex === currentIndex) nextIndex = Math.floor(Math.random() * list.length);
                    currentIndex = nextIndex;
                } else {
                    currentIndex = currentIndex >= list.length - 1 ? 0 : currentIndex + 1;
                }
                nowItem = currentItem();
                loadCurrent(true);
            }

            function prev() {
                const list = sortedBuild();
                if (!list.length) return;
                if (audio.currentTime > 3) {
                    audio.currentTime = 0;
                    renderNow();
                    return;
                }
                currentIndex = currentIndex > 0 ? currentIndex - 1 : list.length - 1;
                nowItem = currentItem();
                loadCurrent(true);
            }

            function scrollColumn(type) {
                requestAnimationFrame(() => {
                    document.querySelector(`[data-column="${type}"]`)?.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
                });
            }

            function focusTrackInPanel(type, id) {
                requestAnimationFrame(() => {
                    const attr = type === "songs" ? "data-song-id" : type === "beats" ? "data-beat-song-id" : "data-keep-id";
                    document.querySelector(`[data-column="${type}"]`)?.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
                    snapElementInPanel(type, findByData(type, attr, id), { force: true });
                });
            }

            function captureScrollState() {
                const columns = {};
                document.querySelectorAll("[data-column]").forEach((column) => {
                    const type = column.dataset.column;
                    const body = column.querySelector(".column-scroll");
                    if (type && body) columns[type] = body.scrollTop;
                });
                return { workspace: els.workspace.scrollLeft, columns };
            }

            function restoreScrollState(snapshot) {
                if (!snapshot) return;
                requestAnimationFrame(() => {
                    els.workspace.scrollLeft = snapshot.workspace || 0;
                    Object.entries(snapshot.columns || {}).forEach(([type, top]) => {
                        const body = document.querySelector(`[data-column="${type}"] .column-scroll`);
                        if (body) body.scrollTop = top;
                    });
                });
            }

            function markPanelBusy(event) {
                const column = event.target.closest?.("[data-column]");
                if (!column) return;
                panelBusyUntil[column.dataset.column] = Date.now() + 2600;
            }

            function panelCanSnap(type) {
                return Date.now() > (panelBusyUntil[type] || 0);
            }

            function findByData(type, attr, value) {
                const column = document.querySelector(`[data-column="${type}"]`);
                if (!column || !value) return null;
                return Array.from(column.querySelectorAll(`[${attr}]`)).find((node) => node.getAttribute(attr) === value) || null;
            }

            function snapElementInPanel(type, element, options = {}) {
                if (!element || (!options.force && !panelCanSnap(type))) return;
                const body = document.querySelector(`[data-column="${type}"] .column-scroll`);
                if (!body) return;
                const bodyBox = body.getBoundingClientRect();
                const itemBox = element.getBoundingClientRect();
                const delta = itemBox.top - bodyBox.top - (bodyBox.height / 2) + (itemBox.height / 2);
                body.scrollTo({ top: Math.max(0, body.scrollTop + delta), behavior: "smooth" });
            }

            function snapNowPlaying({ force = false } = {}) {
                if (!nowItem) return;
                const snapKey = `${nowItem.id}:${playOrigin}:${audio.src ? "loaded" : "idle"}`;
                if (!force && snapKey === lastSnapKey) return;
                lastSnapKey = snapKey;
                requestAnimationFrame(() => {
                    snapElementInPanel("albums", findByData("albums", "data-album", nowItem.albumKey));
                    snapElementInPanel("songs", findByData("songs", "data-song-id", nowItem.id));
                    snapElementInPanel("keeps", findByData("keeps", "data-keep-id", nowItem.id));
                    snapElementInPanel("beats", findByData("beats", "data-beat-song-id", nowItem.id));
                });
            }

            function h(strings, ...values) {
                return strings.reduce((out, str, index) => out + str + (values[index] ?? ""), "");
            }

            function escapeHtml(value) {
                return String(value)
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;")
                    .replaceAll('"', "&quot;")
                    .replaceAll("'", "&#039;");
            }

            function column(type, name, subtitle, content) {
                const count = {
                    albums: albums.length,
                    songs: sourceTracks().length,
