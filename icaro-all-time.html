                    keeps: sortedBuild().length,
                    beats: beats.length,
                    shares: 12
                }[type] ?? "";
                return h`
          <section class="column" data-column="${type}">
            <header class="column-header" data-count="${String(count).padStart(2, "0")}">
              <div class="column-title">
                <div class="column-name">${escapeHtml(name)}</div>
                <div class="column-subtitle">${escapeHtml(subtitle)}</div>
              </div>
            </header>
            <div class="column-content">
              <div class="column-scroll">${content}</div>
              ${columnFooter(type)}
            </div>
          </section>
        `;
            }

            function columnFooter(type) {
                const footers = {
                    albums: ["Import Build", "Upload or restore JSON", "upload-project"],
                    songs: ["Keep Open Album", "Append visible songs to Keeps", "keep-open-album"],
                    keeps: ["Keep Now Playing", "Add current item to Keeps", "add-current"],
                    beats: ["Place Now In Beat", "Send current item to target beat", "add-current-active"],
                    shares: ["Download All JSON", "Full project export", "download-json"]
                };
                const [label, sublabel, action] = footers[type] || ["", "", ""];
                if (!label) return "";
                const extra = type === "beats" ? ` data-beat="${activeBeat}"` : "";
                return `<button class="column-add" type="button" data-action="${action}"${extra}><span class="column-add-main">${escapeHtml(label)}</span><span class="column-add-sub">${escapeHtml(sublabel)}</span></button>`;
            }

            function renderAlbums() {
                return albums.map((album, index) => h`
          <div class="slot-row ${album.key === activeAlbum || (nowItem?.albumKey === album.key && audio.src) ? "now-slot" : ""}">
            <button class="slot-num" type="button" data-action="select-album" data-album="${album.key}">${String(index + 1).padStart(2, "0")}</button>
            <button class="unit ${album.key === activeAlbum ? "active" : ""} ${nowItem?.albumKey === album.key && audio.src ? "selected parent-lit" : ""} ${snapClass(`album:${album.key}`)}" type="button" data-action="select-album" data-album="${album.key}">
              <span class="unit-body">
                <span class="song-shell">
                  <span class="thumb">${album.cover ? `<img src="${encodeURI(path(album.cover))}" alt="">` : `<span>Art</span>`}</span>
                  <span>
                    <span class="unit-id">${escapeHtml(album.key)}</span>
                    <span class="unit-label">${escapeHtml(album.label)}</span>
                    <span class="unit-meta">${album.count} songs</span>
                    <span class="chips">
                      ${album.key === activeAlbum ? `<span class="chip">Open</span>` : ""}
                      ${nowItem?.albumKey === album.key && audio.src ? `<span class="chip">Now playing</span>` : ""}
                      ${build.some((item) => item.albumKey === album.key) ? `<span class="chip">${build.filter((item) => item.albumKey === album.key).length} kept</span>` : ""}
                    </span>
                  </span>
                </span>
              </span>
            </button>
          </div>
        `).join("");
            }

            function renderSongs() {
                const items = sourceTracks();
                if (!items.length) return `<div class="empty">Choose an album first.</div>`;
                return [
                    ...items.map((track) => {
                        const kept = keptFor(track.id);
                        const playing = nowItem?.id === track.id && !!audio.src;
                        return h`
            <div class="slot-row ${playing ? "now-slot" : ""}">
            <button class="slot-num" type="button" data-action="play-source" data-track="${track.id}">${String(track.index).padStart(2, "0")}</button>
            <article class="unit ${kept ? "selected" : ""} ${playing ? "active now-playing" : ""} ${snapClass(`song:${track.id}`)} ${heldClass("source", track.id)}" data-song-id="${track.id}">
              <div class="unit-body">
                <div class="song-shell">
                  <div class="thumb">${artHtml(kept || track)}</div>
                  <div>
                    <div class="unit-main">
                      <div>
                        <div class="unit-id">${String(track.index).padStart(2, "0")}</div>
                        <div class="unit-label">${escapeHtml(track.title)}</div>
                      </div>
                      <div class="stars">${kept ? starText(kept) : ""}</div>
                    </div>
                    <div class="unit-meta">${escapeHtml(track.albumLabel)} / ${runtime(kept || track) === null ? "runtime --" : fmt(runtime(kept || track))}</div>
                    <div class="chips">
                      <span class="chip">${kept ? "Kept" : "Source"}</span>
                      ${kept ? `<span class="chip hot"><span>In Keeps</span></span>` : ""}
                      ${kept ? `<span class="chip">${escapeHtml(beatLabel(kept.beat))}</span>` : ""}
                      ${playing ? `<span class="chip">Playing from album</span>` : ""}
                    </div>
                  </div>
                </div>
                <div class="actions three">
                  <button class="mini" type="button" data-action="${kept ? "confirm-cut" : "add-track"}" data-track="${track.id}">${kept ? "Cut" : "Keep"}</button>
                  <button class="mini play-control ${playing ? "is-playing" : ""}" type="button" data-action="play-source" data-track="${track.id}">${playing && !audio.paused ? "Pause" : "Play"}</button>
                  <button class="mini" type="button" data-action="beat-source" data-track="${track.id}">Beat</button>
                </div>
                ${kept || lastPlacement.id === track.id ? `<button class="transclusion-row ${lastPlacement.id === track.id ? "hot" : ""}" type="button" data-action="reveal-track" data-track="${track.id}">→ ${escapeHtml(placementText(track.id, "to keeps"))}</button>` : ""}
              </div>
            </article>
            </div>
          `;
                    })
                ].join("");
            }

            function renderBuild() {
                const list = sortedBuild();
                return h`
          ${grabBanner("keeps")}
          <div class="toolbar">
            <div class="toolbar-title">
              <span>Target Beat</span>
              <span>${escapeHtml(beatLabel(activeBeat))}</span>
            </div>
            <div class="beat-strip">
              ${beats.map((beat) => `<button class="beat-pill ${beat.id === activeBeat ? "active" : ""}" type="button" data-action="select-beat" data-beat="${beat.id}">${escapeHtml(beat.label)}</button>`).join("")}
            </div>
          </div>
          <div class="socket-zone ${snapClass("keep:intake")}" data-drop-keep="end">
            <div class="socket-label"><span>Drop song blocks here</span><span>Songs -> Keeps</span></div>
          </div>
          ${list.length ? "" : `<div class="empty">No kept songs yet. Add one song, drop a song block, or keep the whole album.</div>`}
          ${list.map((item, index) => {
                    const playing = nowItem?.id === item.id && !!audio.src;
                    const moveClass = lastMove.id === item.id ? `moved-${lastMove.direction}` : "";
                    const itemId = escapeHtml(item.id);
                    return h`
          <div class="slot-row ${playing ? "now-slot" : ""} ${heldClass("keep", item.id)}" data-slot-track="${itemId}" data-drop-track="${itemId}">
            <button class="slot-num" type="button" data-action="slot-target" data-track="${itemId}">${String(index + 1).padStart(2, "0")}</button>
            <article class="unit ${index === currentIndex ? "active" : ""} ${playing ? "now-playing" : ""} ${moveClass} ${snapClass(`keep:${item.id}`)} ${heldClass("keep", item.id)}" data-keep-id="${itemId}" data-drop-track="${itemId}">
            <div class="unit-body">
              <div class="song-shell">
                <div class="thumb">${artHtml(item)}</div>
                <div>
                  <div class="unit-main">
                    <div>
                      <div class="unit-id">Track ${String(item.index || index + 1).padStart(2, "0")}</div>
                      <div class="unit-label">${escapeHtml(item.title)}</div>
                    </div>
                    <div class="stars">${starText(item)}</div>
                  </div>
                  <div class="unit-meta">${escapeHtml(beatLabel(item.beat))} / ${escapeHtml(item.albumLabel)} / ${runtime(item) === null ? "runtime --" : fmt(runtime(item))} / ${stars(item)}/5</div>
                  <div class="chips">
                    <span class="chip">Kept</span>
                    <span class="chip">${escapeHtml(beatLabel(item.beat))}</span>
                    ${item.beat && item.beat !== "unassigned" ? `<span class="chip hot"><span>In Beats</span></span>` : ""}
                    <button class="chip chip-button" type="button" data-action="reveal-track" data-track="${itemId}"><span>Source</span></button>
                    ${moveClass ? `<span class="chip">Moved ${lastMove.direction === "up" ? "↑" : "↓"}</span>` : ""}
                    ${playing ? `<span class="chip">Playing from ${escapeHtml(originLabel())}</span>` : ""}
                  </div>
                </div>
              </div>
              <div class="move-rail">
                <button class="mini move-btn" type="button" data-action="move-slot-earlier" data-slot="${index}" data-track="${itemId}" aria-label="Move slot ${index + 1} earlier"><span class="move-icon">↑</span><span class="move-word">Earlier</span></button>
                <button class="drag-handle" type="button" draggable="true" data-action="grab-keep" data-track="${itemId}" data-drag-track="${itemId}" aria-label="Grab block for movement">${heldPayload?.kind === "keep" && heldPayload?.id === item.id ? "Grabbed" : "Grab"}</button>
                <button class="mini move-btn" type="button" data-action="move-slot-later" data-slot="${index}" data-track="${itemId}" aria-label="Move slot ${index + 1} later"><span class="move-icon">↓</span><span class="move-word">Later</span></button>
              </div>
              <div class="unit-ops media-ops">
                <button class="mini play-control ${playing ? "is-playing" : ""}" type="button" data-action="play-build" data-context="keeps" data-track="${itemId}">${playing && !audio.paused ? "Pause" : "Play"}</button>
                <button class="mini" type="button" data-action="assign-active" data-track="${itemId}">Beat</button>
                <button class="mini" type="button" data-action="confirm-cut" data-track="${itemId}">Cut</button>
              </div>
              <div class="unit-ops">
                <select class="select" data-action="assign-beat" data-track="${itemId}" aria-label="Beat for ${escapeHtml(item.title)}">
                  ${beats.map((beat) => `<option value="${beat.id}" ${beat.id === item.beat ? "selected" : ""}>${escapeHtml(beat.label)}</option>`).join("")}
                </select>
                <div class="rating-rail" aria-label="Rating for ${escapeHtml(item.title)}">
                  ${[1, 2, 3, 4, 5].map((value) => `<button class="star-btn ${value <= stars(item) ? "on" : ""}" type="button" data-action="rate-star" data-track="${itemId}" data-rating="${value}" title="${value} stars" aria-label="Rate ${escapeHtml(item.title)} ${value} stars"><span>${value <= stars(item) ? "★" : "☆"}</span></button>`).join("")}
                </div>
                <input class="note-input" data-action="note" data-track="${itemId}" placeholder="Cue note" value="${escapeHtml(item.notes || "")}" aria-label="Cue note for ${escapeHtml(item.title)}" />
              </div>
              <button class="transclusion-row ${lastPlacement.id === item.id ? "hot" : ""}" type="button" data-action="reveal-track" data-track="${itemId}">← ${escapeHtml(placementText(item.id, "from songs"))}</button>
            </div>
          </article>
          </div>
        `;
                }).join("")}
        `;
            }

            function durationToHeight(seconds) {
                const raw = (Number(seconds) || 0) * scale.pxPerSecond * scale.fudge;
                return Math.max(scale.minBlock, Math.min(scale.maxBlock, raw));
            }

            function beatHeight(target) {
                if (!target) return 120;
                return Math.max(scale.minBeat, Math.min(scale.maxBeat, target * scale.pxPerSecond * 1.2));
            }

            function renderBeats() {
                const list = sortedBuild();
                return grabBanner("beats") + beats.map((beat) => {
                    const assigned = list.filter((item) => (item.beat || "unassigned") === beat.id);
                    const total = assigned.reduce((sum, item) => sum + (runtime(item) || 0), 0);
                    const delta = beat.target ? beat.target - total : 0;
                    const status = beat.target ? (delta >= 0 ? `${fmt(delta)} open` : `${fmt(Math.abs(delta))} over`) : `${assigned.length} songs`;
                    return h`
            <section class="beat ${beat.id === activeBeat ? "active" : ""} ${snapClass(`beat:${beat.id}`)}">
              <div class="beat-head" data-action="select-beat" data-beat="${beat.id}">
                <span class="beat-name">${escapeHtml(beat.label)}</span>
                <span class="beat-stat">${beat.target ? `${fmt(total)} / ${fmt(beat.target)} / ${status}` : status}</span>
              </div>
              <div class="beat-body socket-zone" style="--beat-h:${beatHeight(beat.target)}px" data-drop-beat="${beat.id}">
                <div class="socket-label"><span>${heldPayload ? "Click to place held block" : "Beat socket"}</span><span>${escapeHtml(status)}</span></div>
                ${assigned.length ? assigned.map((item) => h`
                  <button class="block ${nowItem?.id === item.id && audio.src ? "now-playing" : ""} ${snapClass(`beat-song:${item.id}`)}" type="button" draggable="true" style="--block-h:${durationToHeight(runtime(item) || 50)}px" data-action="play-build" data-context="beats" data-track="${item.id}" data-drag-track="${item.id}" data-beat-song-id="${item.id}">
                    <span class="block-thumb">${artHtml(item)}</span>
                    <span class="block-copy">
                      <span class="block-title">${nowItem?.id === item.id && !audio.paused ? "▮▮ " : "▶ "}${escapeHtml(item.title)}</span>
                      <span class="block-meta">${escapeHtml(item.albumLabel)} / from keeps / ${runtime(item) === null ? "runtime --" : fmt(runtime(item))} / ${starText(item)}${nowItem?.id === item.id && audio.src ? " / now playing" : ""}</span>
                    </span>
                  </button>
                `).join("") : `<div class="empty">No songs assigned.</div>`}
              </div>
            </section>
          `;
                }).join("");
            }

            function exportPayload() {
                return {
                    version: "all-time-project-v1",
                    title: "All-Time build",
                    exportedAt: new Date().toISOString(),
                    activeAlbum,
                    activeBeat,
                    playback: {
                        nowItemId: nowItem?.id || currentItem()?.id || "",
                        currentIndex,
                        origin: playOrigin,
                        autoplay: autoplayEnabled,
                        shuffle: shuffleEnabled
                    },
                    songs: sortedBuild().map((item, index) => ({
                        id: item.id,
                        order: index + 1,
                        trackIndex: item.index,
                        songName: item.title,
                        album: item.albumLabel,
                        albumKey: item.albumKey,
                        beat: item.beat || "unassigned",
                        beatLabel: beatLabel(item.beat || "unassigned"),
                        duration: runtime(item) === null ? null : fmt(runtime(item)),
                        durationSeconds: runtime(item),
                        rating: stars(item),
                        notes: item.notes || "",
                        songPage: item.page,
                        songPageUrl: sourceSongPageUrl(item),
                        audio: item.audio,
                        artwork: item.art
                    })),
                    beatSummary: beats.map((beat) => {
                        const assigned = sortedBuild().filter((item) => (item.beat || "unassigned") === beat.id);
                        const total = assigned.reduce((sum, item) => sum + (runtime(item) || 0), 0);
                        return { beat: beat.id, label: beat.label, targetSeconds: beat.target, totalSeconds: total, deltaSeconds: beat.target ? beat.target - total : null, count: assigned.length };
                    })
                };
            }

            function shareCard(icon, title, meta, kind, active = false) {
                return h`
          <button class="share-card ${active ? "active" : ""}" type="button" data-action="download-export" data-export="${escapeHtml(kind)}">
            <span class="share-icon">${escapeHtml(icon)}</span>
            <span>
              <span class="share-title">${escapeHtml(title)}</span>
              <span class="share-meta">${escapeHtml(meta)}</span>
            </span>
            <span class="share-send">⇧</span>
          </button>
        `;
            }

            function exportChannel(kind) {
                const payload = exportPayload();
                const current = nowItem || currentItem();
                const source = sourceTracks();
                if (kind === "current") return { kind, current, songPageUrl: current ? sourceSongPageUrl(current) : "" };
                if (kind === "albums") return { kind, albums };
                if (kind === "songs") return { kind, songs: source.length ? source : tracks };
                if (kind === "keeps") return { kind, keeps: payload.songs };
                if (kind === "beats") return { kind, beats: payload.beatSummary };
                return payload;
            }

            function sourceSongPagePath(item) {
                if (!item) return "";
                if (item.page) return item.page;
                if (!item.albumKey || !Number.isFinite(Number(item.index))) return "";
                return `VOLHOLLA/song-${item.albumKey}-${String(Number(item.index)).padStart(2, "0")}.html`;
            }

            function sourceSongPageUrl(item) {
                const page = sourceSongPagePath(item);
                if (!page) return "";
                try {
                    return new URL(page.replace(/^\.\//, ""), PUBLIC_BASE_URL).toString();
                } catch {
                    return page;
                }
            }

            function activeAlbumRecord() {
                return albums.find((album) => album.key === activeAlbum) || albums[0] || null;
            }

            function albumPagePath(album) {
                if (!album) return "";
                return `VOLHOLLA/${album.pageSlug || album.key}.html`;
            }

            function albumPageUrl(album) {
                const page = albumPagePath(album);
                if (!page) return "";
                try {
                    return new URL(page.replace(/^\.\//, ""), PUBLIC_BASE_URL).toString();
                } catch {
                    return page;
                }
            }

                return nowItem || currentItem();
            }

                const pageHref = sourceSongPageUrl(item);
                return `<!DOCTYPE html>
<html lang="en">

      </div>

</html>`;
            }

            function downloadCurrentSongPage() {
                const item = currentShareItem();
                if (!item) {
                    status("No current song to export", 1800);

            function qrImageUrl(url) {

            }

            function albumQrHtml(album, url) {
                const qrUrl = qrImageUrl(url);

                return h`

                  <span class="share-title">Current Album Page</span>

                </span>

              <div class="share-tools">

        `;
            }

            function render({ preserveScroll = true, snap = true } = {}) {
                const scrollState = preserveScroll ? captureScrollState() : null;
                normalizeOrder();
                const album = albums.find((item) => item.key === activeAlbum);
                els.workspace.innerHTML = [
                    column("albums", "Albums", album ? album.label : "Choose source", renderAlbums()),
                    column("songs", "Songs", album ? `${album.label} / ${sourceTracks().length} songs` : "No album", renderSongs()),
                    column("keeps", "Keeps", `${sortedBuild().length} kept`, renderBuild()),
                    column("beats", "Beats", `${beats.length} containers`, renderBeats()),
                    column("shares", "Exports", "Current / channels / data", renderShares())
                ].join("");
                renderNow();
                restoreScrollState(scrollState);
                if (snap) snapNowPlaying();
            }

            function renderNow(override) {
                const item = override || nowItem || currentItem();
                if (!item) {
                    els.state.textContent = "Ready";
                    els.time.textContent = "0:00 / --";
                    els.title.textContent = "All-Time";
                    els.meta.textContent = "Albums -> Songs -> Keeps -> Beats -> Shares";
                    els.play.textContent = "▶ Play";
                    els.art.innerHTML = `<div class="mark">ALL</div>`;
                    els.scrub.disabled = true;
                    els.scrub.value = "0";
                    els.scrub.max = "0";
                    els.scrubNow.textContent = "0:00";
                    els.scrubEnd.textContent = "--";
                    els.autoplay.classList.toggle("on", autoplayEnabled);
                    els.shuffle.classList.toggle("on", shuffleEnabled);
                    return;
                }
                const duration = currentDuration(item);
                const inBuild = sortedBuild().findIndex((candidate) => candidate.id === item.id);
                const position = inBuild >= 0 ? `${String(inBuild + 1).padStart(2, "0")}/${sortedBuild().length}` : "source";
                const playing = !audio.paused && !!audio.src;
                els.state.textContent = playing ? `Playing ${originLabel()} ${position}` : audio.src ? `Paused ${originLabel()} ${position}` : `Ready ${originLabel()} ${position}`;
                els.time.textContent = audio.src ? `${fmt(audio.currentTime)} / ${fmt(duration)}` : duration === null ? "runtime --" : fmt(duration);
                els.title.textContent = item.title;
                els.meta.textContent = `${item.albumLabel} / ${beatLabel(item.beat || activeBeat)} / ${inBuild >= 0 ? `${stars(item)}/5` : "source"} / from ${originLabel()}`;
                els.play.textContent = playing ? "▮▮ Pause" : audio.src ? "▶ Resume" : "▶ Play";
                els.autoplay.classList.toggle("on", autoplayEnabled);
                els.autoplay.textContent = autoplayEnabled ? "Autoplay On" : "Autoplay";
                els.shuffle.classList.toggle("on", shuffleEnabled);
                els.shuffle.textContent = shuffleEnabled ? "Shuffle On" : "Shuffle";
                els.art.innerHTML = item.art ? `<img src="${encodeURI(path(item.art))}" alt="${escapeHtml(item.title)} artwork">` : `<div class="mark">ALL</div>`;
                els.scrub.disabled = !audio.src || duration === null;
                els.scrub.max = duration === null ? "0" : String(duration);
                if (!isScrubbing) els.scrub.value = duration === null ? "0" : String(Math.min(audio.currentTime || 0, duration));
                els.scrubNow.textContent = fmt(isScrubbing ? Number(els.scrub.value) : audio.currentTime);
                els.scrubEnd.textContent = duration === null ? "--" : fmt(duration);
            }

            function csvText() {
                const rows = [["order", "song_name", "album", "beat", "duration", "duration_seconds", "rating", "notes", "song_page", "audio"]];
                sortedBuild().forEach((item, index) => {
                    rows.push([index + 1, item.title, item.albumLabel, beatLabel(item.beat), runtime(item) === null ? "" : fmt(runtime(item)), runtime(item) === null ? "" : runtime(item).toFixed(3), stars(item), item.notes || "", item.page, item.audio]);
                });
                return rows.map((row) => row.map((cell) => `"${String(cell ?? "").replace(/"/g, '""')}"`).join(",")).join("\n");
            }

            async function copyText(text, label = "Copied") {
                try {
                    if (!navigator.clipboard?.writeText) throw new Error("clipboard");
                    await navigator.clipboard.writeText(text);
                    status(label);
                } catch {
                    window.prompt("Copy this data", text);
                    status("Copy fallback opened");
                }
            }

            function downloadText(filename, text, type = "application/json") {
                const blob = new Blob([text], { type });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = filename;
                link.rel = "noopener";
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.setTimeout(() => URL.revokeObjectURL(url), 1000);
                status(`Downloaded ${filename}`);
            }

            function slug(text) {
                return String(text || "all-time")
                    .toLowerCase()
                    .normalize("NFKD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .replace(/[^a-z0-9]+/g, "-")
                    .replace(/^-+|-+$/g, "")
                    .slice(0, 64) || "all-time";
            }

            function downloadExport(kind = "all") {
                downloadText(`all-time-${slug(kind)}.json`, JSON.stringify(exportChannel(kind), null, 2));
            }

            function copyExport(kind = "all") {
                return copyText(JSON.stringify(exportChannel(kind), null, 2), `Copied ${kind}`);
            }

            function openUrl(url, label = "Opened link") {
                if (!url) {
                    status("No link available", 1800);
                    return false;
                }
                window.open(url, "_blank", "noopener,noreferrer");
                status(label, 1400);
                return true;
            }

            function openCurrentSongLink() {
                return openUrl(sourceSongPageUrl(currentShareItem()), "Opened song page");
            }

            function openActiveAlbumLink() {
                return openUrl(albumPageUrl(activeAlbumRecord()), "Opened album page");
            }

            function importPayload(payload) {
                const importedSongs = Array.isArray(payload?.songs) ? payload.songs : Array.isArray(payload?.keeps) ? payload.keeps : [];
                const playback = payload?.playback || {};
                const nextBuild = importedSongs.map((entry, index) => {
                    const base = findTrackByAnyId(entry.id)
                        || tracks.find((track) => entry.audio && track.audio === entry.audio)
                        || tracks.find((track) => track.title === (entry.songName || entry.title) && (!entry.albumKey || track.albumKey === entry.albumKey));
                    if (!base) return null;
                    return {
                        ...base,
                        order: Number.isFinite(Number(entry.order)) ? Number(entry.order) - 1 : index,
                        stars: Number.isFinite(Number(entry.rating ?? entry.stars)) ? Number(entry.rating ?? entry.stars) : 0,
                        beat: typeof entry.beat === "string" ? entry.beat : "unassigned",
                        runtime: Number.isFinite(Number(entry.durationSeconds ?? entry.runtime)) ? Number(entry.durationSeconds ?? entry.runtime) : base.runtime,
                        notes: typeof entry.notes === "string" ? entry.notes : ""
                    };
                }).filter(Boolean);
                if (!nextBuild.length) throw new Error("No matching songs in uploaded playlist");
                build = nextBuild;
                normalizeOrder();
                activeAlbum = payload.activeAlbum && albums.some((album) => album.key === payload.activeAlbum) ? payload.activeAlbum : build[0].albumKey;
                activeBeat = payload.activeBeat || activeBeat;
                autoplayEnabled = typeof playback.autoplay === "boolean" ? playback.autoplay : autoplayEnabled;
                shuffleEnabled = typeof playback.shuffle === "boolean" ? playback.shuffle : shuffleEnabled;
                const restoredIndex = playback.nowItemId ? sortedBuild().findIndex((item) => trackMatchesLegacyId(item, playback.nowItemId)) : -1;
                currentIndex = restoredIndex >= 0 ? restoredIndex : 0;
                nowItem = currentItem();
                playOrigin = playback.origin || "keeps";
                save();
                render({ preserveScroll: false });
                status(`Uploaded playlist: ${build.length} keeps`, 2200);
            }

            async function uploadProjectFile(file) {
                if (!file) return;
                try {
                    importPayload(JSON.parse(await file.text()));
                } catch (error) {
                    status(`Upload failed: ${error.message || "invalid JSON"}`, 2400);
                } finally {
                    els.upload.value = "";
                }
            }

            async function pasteProjectText() {
                const field = document.querySelector("[data-paste-import]");
                let text = field?.value?.trim() || "";
                try {
                    if (!text && navigator.clipboard?.readText) {
                        text = (await navigator.clipboard.readText()).trim();
                    }
                    if (!text) throw new Error("Paste JSON into the box first");
                    importPayload(JSON.parse(text));
                    status("Pasted playlist JSON", 1800);
                } catch (error) {
                    status(`Paste failed: ${error.message || "invalid JSON"}`, 2600);
                }
            }

            function placeHeldInSocket(socket) {
                if (!socket || !heldPayload || !els.workspace.contains(socket)) return false;
                if (socket.dataset.dropBeat) return applyHeldToBeat(socket.dataset.dropBeat);
                if (socket.dataset.dropKeep) {
                    const held = heldPayload;
                    if (held.kind !== "source") {
                        signalSnap("keep:intake", false);
                        return false;
                    }
                    const track = tracks.find((candidate) => candidate.id === held.id);
                    const ok = addTrack(track);
                    heldPayload = ok ? null : held;
                    signalSnap("keep:intake", ok);
                    return ok;
                }
                return false;
            }

            function runAction(control) {
                const action = control.dataset.action;
                const track = () => tracks.find((candidate) => candidate.id === control.dataset.track);
                const actions = {
                    "select-album": () => selectAlbum(control.dataset.album),
                    "select-beat": () => selectBeat(control.dataset.beat),
                    "load-album": () => loadAlbum(),
                    "keep-open-album": () => keepOpenAlbum(),
                    "add-track": () => addTrack(track()),
                    "add-to-active": () => addTrack(track(), activeBeat),
                    "add-current": () => addCurrentItem(),
                    "add-current-active": () => addCurrentItemToActiveBeat(),
                    "beat-source": () => beatSource(control.dataset.track),
                    "play-source": () => toggleSource(control.dataset.track),
                    "play-build": () => toggleBuild(control.dataset.track, control.dataset.context || "keeps"),
                    "assign-active": () => assignBeat(control.dataset.track, activeBeat),
                    "move-earlier": () => moveItem(control.dataset.track, -1),
                    "move-later": () => moveItem(control.dataset.track, 1),
                    "move-slot-earlier": () => moveSlot(control.dataset.slot, -1),
                    "move-slot-later": () => moveSlot(control.dataset.slot, 1),
                    "grab-source": () => {
                        setHeld("source", control.dataset.track);
                        scrollColumn("beats");
                    },
                    "grab-keep": () => setHeld("keep", control.dataset.track),
                    "cancel-grab": () => clearHeld(),
                    "slot-target": () => applyHeldToKeep(control.dataset.track),
                    "reveal-track": () => revealTrack(control.dataset.track, "songs"),
                    "rate-star": () => setRating(control.dataset.track, control.dataset.rating),
                    "cut": () => cutItem(control.dataset.track),
                    "confirm-cut": () => confirmCutItem(control.dataset.track),
                    "clear-build": () => clearBuild(),
                    "download-export": () => downloadExport(control.dataset.export || "all"),
                    "download-current-page": () => downloadCurrentSongPage(),
                    "copy-current-link": () => copyCurrentSongLink(),
                    "open-current-link": () => openCurrentSongLink(),
                    "download-current-link": () => downloadCurrentSongLink(),
                    "download-current-qr": () => downloadCurrentSongQr(),
                    "copy-album-link": () => copyActiveAlbumLink(),
                    "open-album-link": () => openActiveAlbumLink(),
                    "download-album-link": () => downloadActiveAlbumLink(),
                    "download-album-qr": () => downloadActiveAlbumQr(),
                    "copy-keeps": () => copyExport("keeps"),
                    "download-keeps": () => downloadExport("keeps"),
                    "copy-beats": () => copyExport("beats"),
                    "download-beats": () => downloadExport("beats"),
                    "download-json": () => downloadText("all-time-build.json", JSON.stringify(exportPayload(), null, 2)),
                    "download-csv": () => downloadText("all-time-keeps.csv", csvText(), "text/csv"),
                    "upload-project": () => els.upload.click(),
                    "paste-json": () => pasteProjectText(),
                    "copy-json": () => copyText(JSON.stringify(exportPayload(), null, 2), "Copied JSON"),
                    "copy-csv": () => copyText(csvText(), "Copied CSV")
                };
                if (actions[action]) {
                    actions[action]();
                    return true;
                }
                return false;
            }

            els.workspace.addEventListener("click", (event) => {
                const control = event.target.closest("[data-action]");
                if (control && els.workspace.contains(control)) {
                    event.preventDefault();
                    event.stopPropagation();
                    runAction(control);
                    return;
                }
                if (heldPayload) {
                    const targetSlot = event.target.closest("[data-drop-track]");
                    if (targetSlot && els.workspace.contains(targetSlot)) {
                        event.preventDefault();
                        applyHeldToKeep(targetSlot.dataset.dropTrack);
                        return;
                    }
                }
                placeHeldInSocket(event.target.closest("[data-drop-beat], [data-drop-keep]"));
            });

            els.workspace.addEventListener("pointerdown", markPanelBusy);
            els.workspace.addEventListener("touchstart", markPanelBusy, { passive: true });
            els.workspace.addEventListener("wheel", markPanelBusy, { passive: true });
            els.workspace.addEventListener("focusin", markPanelBusy);

            function clearLongPress() {
                if (longPressTimer) window.clearTimeout(longPressTimer);
                longPressTimer = 0;
                longPressTrackId = "";
            }

            els.workspace.addEventListener("contextmenu", (event) => {
                const unit = event.target.closest("[data-keep-id]");
                if (!unit || !els.workspace.contains(unit)) return;
                event.preventDefault();
                confirmCutItem(unit.dataset.keepId);
            });

            els.workspace.addEventListener("pointerdown", (event) => {
                clearLongPress();
                if (event.target.closest("button, input, select, textarea, a")) return;
                const unit = event.target.closest("[data-keep-id]");
                if (!unit || !els.workspace.contains(unit)) return;
                longPressTrackId = unit.dataset.keepId;
                longPressTimer = window.setTimeout(() => {
                    const id = longPressTrackId;
                    clearLongPress();
                    if (id) confirmCutItem(id);
                }, 720);
            });

            ["pointerup", "pointercancel", "pointerleave", "pointermove", "dragstart", "scroll"].forEach((type) => {
                els.workspace.addEventListener(type, clearLongPress);
            });

            els.workspace.addEventListener("dragstart", (event) => {
                const source = event.target.closest("[data-source-track]");
                const unit = event.target.closest("[data-drag-track]");
                if (source && els.workspace.contains(source)) {
                    dragPayload = { kind: "source", id: source.dataset.sourceTrack };
                    dragTrackId = source.dataset.sourceTrack;
                    source.classList.add("dragging");
                    event.dataTransfer.effectAllowed = "copyMove";
                    event.dataTransfer.setData("text/plain", JSON.stringify(dragPayload));
                    return;
                }
                if (!unit || !els.workspace.contains(unit)) return;
                dragPayload = { kind: "keep", id: unit.dataset.dragTrack };
                dragTrackId = unit.dataset.dragTrack;
                unit.classList.add("dragging");
                event.dataTransfer.effectAllowed = "move";
                event.dataTransfer.setData("text/plain", JSON.stringify(dragPayload));
            });

            els.workspace.addEventListener("dragover", (event) => {
                const target = event.target.closest("[data-drop-track], [data-drop-keep], [data-drop-beat]");
                if (!target || !dragPayload || !els.workspace.contains(target)) return;
                event.preventDefault();
                event.dataTransfer.dropEffect = dragPayload.kind === "source" ? "copy" : "move";
                target.classList.add("ready");
                const displaced = target.closest("[data-drop-track]");
                if (displaced && displaced.dataset.dropTrack !== dragPayload.id) {
                    displaced.classList.add("displaced");
                    displaced.closest(".slot-row")?.classList.add("displaced");
                }
            });

            document.querySelector(".player")?.addEventListener("click", (event) => {
                const control = event.target.closest("[data-action]");
                if (!control) return;
                event.preventDefault();
                event.stopPropagation();
                runAction(control);
            });

            els.workspace.addEventListener("dragleave", (event) => {
                const target = event.target.closest("[data-drop-track], [data-drop-keep], [data-drop-beat]");
                if (target) target.classList.remove("ready");
                const displaced = event.target.closest("[data-drop-track]");
                if (displaced) {
                    displaced.classList.remove("displaced");
                    displaced.closest(".slot-row")?.classList.remove("displaced");
                }
            });

            els.workspace.addEventListener("drop", (event) => {
                const target = event.target.closest("[data-drop-track], [data-drop-keep], [data-drop-beat]");
                if (!target || !dragPayload || !els.workspace.contains(target)) return;
                event.preventDefault();
                target.classList.remove("ready");
                document.querySelectorAll(".unit.displaced").forEach((unit) => unit.classList.remove("displaced"));
                document.querySelectorAll(".slot-row.displaced").forEach((unit) => unit.classList.remove("displaced"));
                if (target.dataset.dropKeep) {
                    if (dragPayload.kind === "source") {
                        const ok = addTrack(tracks.find((track) => track.id === dragPayload.id));
                        signalSnap("keep:intake", ok !== false);
                        return;
                    }
                    signalSnap("keep:intake", false);
                    return;
                }
                if (target.dataset.dropBeat) {
                    const beatId = target.dataset.dropBeat;
                    if (dragPayload.kind === "source") {
                        const track = tracks.find((candidate) => candidate.id === dragPayload.id);
                        addTrack(track, beatId);
                        signalSnap(`beat:${beatId}`, true);
                        return;
                    }
                    if (dragPayload.kind === "keep") {
                        assignBeat(dragPayload.id, beatId);
                        signalSnap(`beat:${beatId}`, true);
                        return;
                    }
                }
                if (target.dataset.dropTrack) {
                    if (dragPayload.kind === "keep") {
                        reorderItem(dragPayload.id, target.dataset.dropTrack);
                        signalSnap(`keep:${dragPayload.id}`, true);
                        return;
                    }
                    if (dragPayload.kind === "source") {
                        const ok = addTrackAt(tracks.find((track) => track.id === dragPayload.id), target.dataset.dropTrack);
                        signalSnap(ok ? `keep:${dragPayload.id}` : `song:${dragPayload.id}`, ok);
                        return;
                    }
                }
                signalSnap("keep:intake", false);
            });

            els.workspace.addEventListener("dragend", () => {
                dragTrackId = "";
                dragPayload = null;
                document.querySelectorAll(".dragging").forEach((unit) => unit.classList.remove("dragging"));
                document.querySelectorAll(".ready").forEach((unit) => unit.classList.remove("ready"));
                document.querySelectorAll(".unit.displaced").forEach((unit) => unit.classList.remove("displaced"));
                document.querySelectorAll(".slot-row.displaced").forEach((unit) => unit.classList.remove("displaced"));
            });

            els.workspace.addEventListener("change", (event) => {
                const control = event.target.closest("[data-action]");
                if (!control || !els.workspace.contains(control)) return;
                const action = control.dataset.action;
                if (action === "assign-beat") assignBeat(control.dataset.track, control.value);
                if (action === "note") setNote(control.dataset.track, control.value);
            });

            els.workspace.addEventListener("input", (event) => {
                const control = event.target.closest("[data-action='note']");
                if (!control || !els.workspace.contains(control)) return;
                setNote(control.dataset.track, control.value);
            });

            els.prev.addEventListener("click", prev);
            els.play.addEventListener("click", playPause);
            els.next.addEventListener("click", next);
            els.autoplay.addEventListener("click", () => {
                autoplayEnabled = !autoplayEnabled;
                save();
                renderNow();
                status(autoplayEnabled ? "Autoplay on" : "Autoplay off");
            });
            els.shuffle.addEventListener("click", () => {
                shuffleEnabled = !shuffleEnabled;
                save();
                renderNow();
                status(shuffleEnabled ? "Shuffle radio on" : "Shuffle radio off");
            });
            els.import.addEventListener("click", () => els.upload.click());
            els.upload.addEventListener("change", () => uploadProjectFile(els.upload.files?.[0]));
            els.clear.addEventListener("click", clearBuild);
            els.scrub.addEventListener("pointerdown", () => {
                isScrubbing = true;
                if (!audio.src && currentItem()) loadCurrent(false);
            });
            els.scrub.addEventListener("input", () => {
                isScrubbing = true;
                const seconds = Number(els.scrub.value) || 0;
                els.scrubNow.textContent = fmt(seconds);
                if (audio.src && Number.isFinite(Number(audio.duration))) audio.currentTime = Math.max(0, Math.min(Number(audio.duration), seconds));
            });
            els.scrub.addEventListener("change", () => {
                const seconds = Number(els.scrub.value) || 0;
                if (audio.src && Number.isFinite(Number(audio.duration))) audio.currentTime = Math.max(0, Math.min(Number(audio.duration), seconds));
                isScrubbing = false;
                renderNow();
            });
            els.scrub.addEventListener("pointerup", () => {
                isScrubbing = false;
                renderNow();
            });

            audio.addEventListener("play", () => { renderNow(); _busEmitScoreCursor(); });
            audio.addEventListener("pause", () => { renderNow(); _busEmitScoreCursor(); });
            audio.addEventListener("timeupdate", () => { renderNow(); _busEmitScoreCursor(); });
            audio.addEventListener("loadedmetadata", () => {
                const item = nowItem || currentItem();
                if (item && Number.isFinite(audio.duration)) {
                    item.runtime = audio.duration;
                    const source = tracks.find((track) => track.id === item.id);
                    if (source) source.runtime = audio.duration;
                    const kept = build.find((track) => track.id === item.id);
                    if (kept) kept.runtime = audio.duration;
                    save();
                }
                render();
            });
            audio.addEventListener("ended", () => {
                if (autoplayEnabled) next();
                else {
                    audio.pause();
                    renderNow();
                    status("Track ended. Autoplay is off.");
                }
            });

            fetch(MANIFEST_URL, { cache: "no-cache" })
                .then((response) => response.ok ? response.json() : Promise.reject(new Error("manifest")))
                .then((manifest) => {
                    albums = Object.values(manifest.albums || {}).map((album) => ({
                        key: album.key,
                        label: album.label || album.key,
                        pageSlug: album.pageSlug || album.key,
                        cover: album.cover?.source || album.defaultTrackArt?.source || "",
                        count: (album.tracks || []).length
                    })).filter((album) => album.key);
                    tracks = [];
                    Object.values(manifest.albums || {}).forEach((album) => {
                        const albumKey = album.key;
                        const albumLabel = album.label || album.key;
                        (album.tracks || []).forEach((track) => {
                            const audioSource = track.audio?.source || track.source || "";
                            tracks.push({
                                id: trackKey(albumKey, track.index),
                                albumKey,
                                albumLabel,
                                index: track.index,
                                title: track.title || track.file || "Untitled",
                                page: track.songPage || "",
                                audio: audioSource,
                                art: track.art?.source || album.defaultTrackArt?.source || album.cover?.source || "",
                                runtime: Number(track.duration || track.runtime || track.audio?.duration || 0) || null,
                                beat: "unassigned",
                                stars: 0,
                                order: 0
                            });
                        });
                    });
                    activeAlbum = albums[0]?.key || "";
                    restore();
                    render({ preserveScroll: false });
                })
                .catch(() => {
                    els.title.textContent = "Manifest failed";
                    els.meta.textContent = "Could not load VOLHOLLA/media-manifest.json";
                });
            // ══════════════════════════════════════════════════
            // ██ ICARO BUS INTEGRATION (Mark Spine — Phase 1)
            // ██ Anti-theory constraints:
            // ██   - All-time EMITS to bus, never COMMANDED by bus
            // ██   - No SET_RATING, ASSIGN_BEAT, or REORDER accepted
            // ██   - Only REQUEST_SYNC accepted inbound
            // ██   - localStorage persistence PRESERVED (parallel, not replaced)
            // ══════════════════════════════════════════════════

            const _BUS_ACTIVE = (window.parent !== window);
            let _busLastCursorEmit = 0;

            function _busEmitScoreSync() {
                if (!_BUS_ACTIVE) return;
                window.parent.postMessage({
                    type: 'SCORE_SYNC',
                    _origin: 'scorer',
                    build: sortedBuild().map(k => ({
                        id: k.id, title: k.title, beat: k.beat,
                        stars: k.stars, order: k.order,
                        runtime: k.runtime || null
                    })),
                    beats: beats.map(b => ({ id: b.id, label: b.label, target: b.target })),
                    nowId: nowItem?.id || '',
                    currentIndex: currentIndex,
                    total: build.length
                }, '*');
            }

            function _busEmitScoreCursor() {
                if (!_BUS_ACTIVE) return;
                const now = performance.now();
                if (now - _busLastCursorEmit < 500) return; // Throttle: max 2Hz
                _busLastCursorEmit = now;
                const item = nowItem || currentItem();
                window.parent.postMessage({
                    type: 'SCORE_CURSOR',
                    _origin: 'scorer',
                    id: item?.id || '',
                    beat: item?.beat || 'unassigned',
                    time: Number.isFinite(audio.currentTime) ? audio.currentTime : 0,
                    duration: Number.isFinite(audio.duration) ? audio.duration : 0,
                    playing: !audio.paused
                }, '*');
            }

            // Inbound: only REQUEST_SYNC accepted
            window.addEventListener('message', e => {
                const d = e.data;
                if (!d || typeof d !== 'object' || typeof d.type !== 'string') return;
                if (d._origin === 'scorer') return; // No echo
                if (d.type === 'REQUEST_SYNC') {
                    _busEmitScoreSync();
                    _busEmitScoreCursor();
                }
            });

            // Emit initial sync after manifest loads (deferred)
            if (_BUS_ACTIVE) {
                setTimeout(() => {
                    _busEmitScoreSync();
                }, 2000); // Wait for manifest fetch to complete
            }

        })();
    </script>
