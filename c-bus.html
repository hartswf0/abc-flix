<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Arc-Tunnel Operator — Live Video Instrument</title>
    <style>
        :root {
            --bg: #fff;
            --ink: #000;
            --panel: #fff;
            --border: #000;
            --left: 56px;
            --right: 300px;
            --bottom: 52px;
            --top: 0px; /* No top bar in bus mode */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            width: 100%;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            background: #000;
            color: var(--ink);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            touch-action: none;
            user-select: none;
        }

        /* Dual Canvas Architecture: Video Layer + UI Layer */
        #bgStage {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 0;
        }

        #stage {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: block;
            z-index: 1;
            cursor: crosshair
        }

        button {
            font: inherit;
            background: var(--panel);
            color: var(--ink);
            border: 2px solid var(--border);
            border-radius: 0;
            height: 32px;
            padding: 0 8px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.1s;
        }

        button.on,
        button:active {
            background: var(--ink);
            color: #fff
        }

        #rail {
            position: fixed;
            z-index: 20;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--left);
            border-right: 2px solid var(--border);
            background: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 8px 6px;
            pointer-events: auto
        }

        #rail b {
            height: 38px;
            border: 2px solid var(--border);
            background: var(--ink);
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 13px
        }

        #rail button {
            width: 44px;
            height: 38px;
            font-size: 10px;
            padding: 0
        }

        .spacer {
            flex: 1
        }

        /* Top bar hidden in bus mode — controlled by harness */
        #top { display: none !important; }

        #brand {
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #000;
        }

        .mode {
            margin-left: auto;
            border: 2px solid var(--border);
            padding: 5px 9px;
            font-weight: 900
        }

        .mode b {
            background: var(--ink);
            color: #fff;
            padding: 2px 5px;
            margin-left: 5px
        }

        #ops {
            position: fixed;
            z-index: 16;
            right: 0;
            top: 0;
            bottom: 0;
            width: var(--right);
            border-left: 2px solid var(--border);
            background: var(--bg);
            overflow: auto;
            pointer-events: auto
        }

        .opHead {
            position: sticky;
            top: 0;
            background: var(--ink);
            color: #fff;
            padding: 10px;
            font-weight: 900;
            text-transform: uppercase
        }

        .op {
            display: grid;
            grid-template-columns: 48px 1fr;
            border-bottom: 1px solid var(--border);
            padding: 8px 10px;
            gap: 8px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .op:hover,
        .op.on {
            background: var(--ink);
            color: #fff
        }

        .op code {
            font-weight: 900
        }

        .op span {
            font-size: 11px;
            text-transform: uppercase
        }

        .op small {
            display: block;
            font-size: 10px;
            margin-top: 3px;
            opacity: .75
        }

        #bottom {
            position: fixed;
            z-index: 18;
            left: var(--left);
            right: var(--right);
            bottom: 0;
            height: var(--bottom);
            border-top: 2px solid var(--border);
            background: var(--bg);
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            pointer-events: auto
        }

        .trk {
            height: 34px;
            min-width: 34px
        }

        .trk.on {
            background: var(--ink);
            color: #fff
        }

        #status {
            margin-left: auto;
            font-weight: 900;
            text-transform: uppercase;
            color: #3b82f6;
        }

        .read {
            border-left: 2px solid var(--border);
            padding-left: 8px;
            min-width: 160px;
            text-align: right;
            font-weight: 900
        }

        #dock {
            position: fixed;
            z-index: 22;
            left: 50%;
            bottom: calc(var(--bottom) + 10px);
            transform: translateX(-50%);
            display: flex;
            border: 2px solid var(--border);
            background: var(--bg);
            pointer-events: auto
        }

        #dock button {
            border: 0;
            border-right: 1px solid var(--border);
            height: 36px;
            font-size: 11px;
            background: transparent;
            color: var(--ink);
        }

        #dock button:last-child {
            border-right: 0
        }

        #dock button.on {
            background: var(--ink);
            color: #fff;
        }

        #badge {
            position: fixed;
            z-index: 22;
            left: calc(var(--left) + 12px);
            top: 10px; /* No top offset in bus mode */
            border: 3px solid var(--border);
            background: var(--bg);
            padding: 8px 10px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 6px 6px 0 #000;
            pointer-events: none;
            min-width: 220px
        }

        #badge .big {
            font-size: 18px;
            line-height: 18px;
            color: #000;
        }

        .meta {
            font-size: 10px;
            margin-top: 4px
        }

        #store {
            position: fixed;
            z-index: 17;
            left: calc(var(--left) + 12px);
            bottom: calc(var(--bottom) + 58px);
            width: 340px;
            border: 2px solid var(--border);
            background: var(--bg);
            pointer-events: auto;
            display: none; /* Hidden by default — toggled by STORE tool */
        }
        #store.show { display: block; }

        .storeHead {
            padding: 7px 9px;
            border-bottom: 2px solid var(--border);
            background: var(--panel);
            display: flex;
            justify-content: space-between;
            font-weight: 900;
            text-transform: uppercase
        }

        .slots {
            display: grid;
            grid-template-columns: repeat(5, 1fr)
        }

        .slot {
            border-right: 1px solid var(--border);
            padding: 8px;
            font-size: 10px;
            min-height: 42px;
            cursor: pointer
        }

        .slot:last-child {
            border-right: 0
        }

        .slot:hover {
            background: var(--ink);
            color: #fff
        }

        .slot b {
            display: block
        }

        #menu {
            position: fixed;
            z-index: 60;
            display: none;
            border: 2px solid var(--border);
            background: var(--bg);
            min-width: 220px;
            pointer-events: auto
        }

        .mi {
            height: 34px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer
        }

        .mi:hover,
        .mi.title {
            background: var(--ink);
            color: #fff
        }

        .mi:last-child {
            border-bottom: 0
        }

        #menu.show {
            display: block
        }

        #toast {
            position: fixed;
            z-index: 70;
            left: 50%;
            bottom: 64px;
            transform: translateX(-50%);
            border: 2px solid var(--ink);
            background: var(--ink);
            color: #fff;
            padding: 8px 12px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s
        }

        #toast.show {
            opacity: 1
        }

        @media(max-width: 900px) {
            :root {
                --left: 36px;
                --right: 36px;
                --bottom: 38px;
                --top: 0px;
            }

            /* Rail — compact */
            #rail { width: var(--left); gap: 2px; padding: 4px 3px; }
            #rail b { height: 26px; font-size: 8px; }
            #rail button { width: 28px; height: 26px; font-size: 6px; padding: 0; }

            /* Ops panel — simple buttons matching rail style */
            #ops { top: 0; bottom: var(--bottom); width: var(--right); }
            .opHead, .op code, .op small, .read, #store { display: none; }
            .op {
                display: flex; justify-content: center; align-items: center;
                width: 34px; height: 34px; padding: 0;
                border-bottom: 1px solid #ddd; border-left: 0; border-right: 0;
                grid-template-columns: 1fr; cursor: pointer;
            }
            .op:hover, .op.on { background: var(--ink); color: #fff; }
            .op span { font-size: 8px; font-weight: 900; writing-mode: initial; letter-spacing: 0; }
            .op span:before { content: none; }

            /* Bottom bar — compact */
            #bottom { right: var(--right); height: var(--bottom); padding: 3px 4px; }
            .trk { width: 24px; height: 28px; font-size: 0; padding: 0; min-width: 24px; }
            .trk:after { content: attr(data-s); font-size: 10px; }
            #status { font-size: 9px; }

            /* Dock — edge-to-edge */
            #dock {
                left: calc(var(--left) + 4px); right: calc(var(--right) + 4px);
                bottom: calc(var(--bottom) + 4px); transform: none; overflow-x: auto;
            }
            #dock button { height: 28px; min-width: 44px; font-size: 8px; padding: 0 4px; }

            /* Badge — HIDDEN on mobile, info goes to bus strip */
            #badge { display: none !important; }

            #toast { bottom: 70px; font-size: 9px; }
            }
        }
    </style>
</head>

<body>
    <canvas id="bgStage"></canvas>
    <canvas id="stage"></canvas>
    <nav id="rail">
        <b>ATO</b>
        <button id="viewBtn">VIEW</button>
        <button id="addBtn">ADD</button>
        <button id="mediaBtn">MEDIA</button>
        <button id="cutBtn">CUT</button>
        <button id="bankBtn">BANK</button>
        <button id="edlBtn">EDL</button>
        <button id="importBtn">IMP</button>
        <button id="exportBtn">OUT</button>
        <div class="spacer"></div>
        <button id="resetBtn">RST</button>
    </nav>
    <header id="top">
        <div id="brand">ARC-TUNNEL LIVE</div>
        <button id="playBtn">PLAY</button>
        <button id="snapBtn" class="on">SNAP</button>
        <div class="mode">
            VIEW <b id="modeName">BARREL</b>
        </div>
    </header>
    <aside id="ops">
        <div class="opHead">Live Bound Operations</div>
        <div id="opList"></div>
    </aside>
    <section id="badge">
        <div class="big" id="selBig">NO CLIP</div>
        <div class="meta" id="selMeta">TAP SECTION</div>
    </section>
    <section id="store">
        <div class="storeHead">
            <span>Store</span>
            <span id="storeCount">0</span>
        </div>
        <div class="slots" id="slots"></div>
    </section>
    <section id="dock">
        <button data-tool="MOVE" class="on">MOVE</button>
        <button data-tool="TRIM">TRIM</button>
        <button data-tool="ROLL">ROLL</button>
        <button data-tool="LIFT">LIFT</button>
        <button data-tool="SPLIT">SPLIT</button>
        <button data-tool="ROUTE">ROUTE</button>
        <button data-tool="STORE">STORE</button>
    </section>
    <footer id="bottom">
        <div id="tracks"></div>
        <button id="backBtn">|‹</button>
        <button id="fwdBtn">›|</button>
        <button id="zoomOutBtn">−</button>
        <button id="zoomInBtn">+</button>
        <div id="status">IDLE</div>
        <div class="read" id="readout">NONE</div>
    </footer>
    <input id="importFile" type="file" accept="application/json,.json" style="display:none" />
    <input id="mediaFile" type="file" accept="video/mp4,video/webm,video/ogg" style="display:none" />
    <div id="menu"></div>
    <div id="toast"></div>

    <!-- ── LOADING OVERLAY (shown during frame ripping) ── -->
    <div id="rip-overlay" style="
        position:fixed; inset:0; background:rgba(0,0,0,0.88);
        display:none; flex-direction:column; align-items:center; justify-content:center;
        z-index:9999; gap:12px;
    ">
        <canvas id="rip-reel" width="160" height="160"></canvas>
        <div id="rip-msg" style="
            font:900 13px ui-monospace,monospace; color:#fff;
            text-transform:uppercase; letter-spacing:0.15em;
        ">LOADING</div>
        <div id="rip-count" style="
            font:900 28px ui-monospace,monospace; color:#ef4444;
        ">0</div>
        <div style="width:180px; height:6px; border:2px solid #fff; margin-top:4px;">
            <div id="rip-bar" style="height:100%; width:0%; background:#22c55e; transition:width 0.15s;"></div>
        </div>
    </div>
    <script>
            ( () => {
                'use strict';
                const canvas = document.getElementById('stage')
                  , ctx = canvas.getContext('2d');
                const bgCanvas = document.getElementById('bgStage')
                  , bgCtx = bgCanvas.getContext('2d', {
                    alpha: false
                });
                const modeName = document.getElementById('modeName')
                  , statusEl = document.getElementById('status')
                  , readout = document.getElementById('readout')
                  , opList = document.getElementById('opList')
                  , tracksEl = document.getElementById('tracks')
                  , slotsEl = document.getElementById('slots')
                  , storeCount = document.getElementById('storeCount')
                  , menu = document.getElementById('menu')
                  , toastEl = document.getElementById('toast')
                  , selBig = document.getElementById('selBig')
                  , selMeta = document.getElementById('selMeta')
                  , dock = document.getElementById('dock');
                const importFile = document.getElementById('importFile')
                  , mediaFile = document.getElementById('mediaFile')
                  , mediaBtn = document.getElementById('mediaBtn')
                  , playBtn = document.getElementById('playBtn');

                const VIEWS = ['BARREL', 'INSIDE', 'OUTSIDE', 'SIDE', 'BENCH'];
                const TOOLS = ['MOVE', 'TRIM', 'ROLL', 'LIFT', 'SPLIT', 'ROUTE', 'STORE'];
                const NAMES = ['POSSIBLE', 'PLAUSIBLE', 'PROBABLE', 'PREFERRED']
                  , SHORT = ['P', 'L', 'B', 'F'];
                const TRACK_COLORS = ['#ec4899', '#3b82f6', '#22c55e', '#f59e0b'];
                const STYLES = [{
                    dash: [1, 6],
                    hatch: 0,
                    color: TRACK_COLORS[0]
                }, {
                    dash: [8, 6],
                    hatch: 1,
                    color: TRACK_COLORS[1]
                }, {
                    dash: [],
                    hatch: 2,
                    color: TRACK_COLORS[2]
                }, {
                    dash: [12, 4, 2, 4],
                    hatch: 3,
                    color: TRACK_COLORS[3]
                }];
                const UNITS = ['CLIP', 'BEAT', 'CELL', 'EDGE']
                  , UNIT_STEP = {
                    CLIP: 60,
                    BEAT: 30,
                    CELL: 15,
                    EDGE: 5
                };
                const SNAP = 60
                  , R = 150
                  , FAR = 7200
                  , SAVE = 'ato-tube-instrument-v12';

                let DPR = 1
                  , W = 0
                  , H = 0
                  , last = 0
                  , nextId = 1
                  , rendered = []
                  , gizmosToRender = []
                  , timer = 0
                  , currentSnapZ = null
                  , hasInteracted = false
                  , _areaCache = null;
                const clips = []
                  , bank = []
                  , routes = [];
                const S = {
                    view: 0,
                    tool: 'MOVE',
                    unit: 'CLIP',
                    cam: 420,
                    zoom: .52,
                    roll: -.25,
                    active: 2,
                    selected: null,
                    hover: null,
                    drag: null,
                    scrub: null,
                    play: false,
                    playRate: 1,
                    inertia: 0,
                    playingClip: null
                };
                const F = {
                    ctx: null,
                    master: null,
                    lastSlot: null,
                    lastTrack: null,
                    lastRot: null,
                    lastAt: 0
                };

                // ======= VIDEO ENGINE =======
                const bgVideo = document.createElement('video');
                bgVideo.muted = true;
                bgVideo.playsInline = true;
                bgVideo.loop = true;

                mediaBtn.onclick = () => {
                    mediaFile.value = '';
                    mediaFile.click();
                }
                mediaFile.onchange = e => {
                    if (e.target.files && e.target.files[0]) {
                        bgVideo.src = URL.createObjectURL(e.target.files[0]);
                        bgVideo.load();
                        mediaBtn.classList.add('on');
                        setTimeout( () => mediaBtn.classList.remove('on'), 400);
                        toast('MEDIA LOADED');
                    }
                }
                ;

                const clamp = (v, a, b) => Math.max(a, Math.min(b, v))
                  , lerp = (a, b, t) => a + (b - a) * t
                  , norm = t => ((Math.round(t) % 4) + 4) % 4;
                const step = () => UNIT_STEP[S.unit] || SNAP;
                const qsnap = (v) => S.snap ? Math.round(v / step()) * step() : v;

                const magneticSnap = (v, tr=-1, ignoreId=null, dur=0) => {
                    currentSnapZ = null;
                    let z = qsnap(v);
                    if (!S.snap)
                        return z;
                    let bd = Math.abs(v - z)
                      , thresh = Math.max(step() * 1.5, SNAP);
                    for (const c of clips) {
                        if (c.id === ignoreId || (tr !== -1 && c.track !== tr))
                            continue;
                        let targets = [c.start, c.start + c.dur];
                        if (dur > 0)
                            targets.push(c.start - dur, c.start + c.dur - dur);
                        for (let t of targets) {
                            if (Math.abs(v - t) < bd && Math.abs(v - t) <= thresh) {
                                bd = Math.abs(v - t);
                                z = t;
                                currentSnapZ = t + (t < v ? dur : 0);
                            }
                        }
                    }
                    return z;
                }
                ;

                function isClip(c) {
                    return !!c && typeof c === 'object' && Number.isFinite(c.start) && Number.isFinite(c.dur) && Number.isFinite(c.track)
                }
                function audio() {
                    if (!F.ctx) {
                        const AC = window.AudioContext || window.webkitAudioContext;
                        if (!AC)
                            return null;
                        F.ctx = new AC();
                        F.master = F.ctx.createGain();
                        F.master.gain.value = .055;
                        F.master.connect(F.ctx.destination)
                    }
                    if (F.ctx.state === 'suspended')
                        F.ctx.resume();
                    return F.ctx
                }
                function haptic(p) {
                    try {
                        if (navigator.vibrate && hasInteracted)
                            navigator.vibrate(p)
                    } catch (e) {}
                }
                function tone(f=600, d=.012, g=.006, type='sine') {
                    if (!hasInteracted)
                        return;
                    let ac = audio();
                    if (!ac)
                        return;
                    let o = ac.createOscillator()
                      , gain = ac.createGain()
                      , t = ac.currentTime;
                    o.type = type;
                    o.frequency.value = f;
                    gain.gain.setValueAtTime(.0001, t);
                    gain.gain.linearRampToValueAtTime(g, t + .001);
                    gain.gain.exponentialRampToValueAtTime(.0001, t + d + .025);
                    o.connect(gain);
                    gain.connect(F.master);
                    o.start(t);
                    o.stop(t + d + .04)
                }

                function tick(kind='snap', pS=1) {
                    if (!hasInteracted)
                        return;
                    let now = performance.now();
                    if (now - F.lastAt < 18 && kind !== 'jog' && kind !== 'cross')
                        return;
                    F.lastAt = now;
                    if (kind === 'wall') {
                        tone(640, .018, .005);
                        haptic([4, 10, 4])
                    } else if (kind === 'rot') {
                        tone(900, .01, .004, 'square');
                        haptic(5)
                    } else if (kind === 'ratchet') {
                        tone(300 * pS, .01, .002, 'square');
                        haptic(2);
                    } else if (kind === 'cross') {
                        tone(1200, .005, .002, 'square');
                        haptic(3);
                    } else if (kind === 'drop') {
                        tone(520, .016, .006, 'triangle');
                        setTimeout( () => tone(780, .014, .005, 'triangle'), 25);
                        haptic([6, 16, 8])
                    } else if (kind === 'export') {
                        tone(740, .012, .004, 'triangle');
                        setTimeout( () => tone(980, .018, .004, 'triangle'), 30);
                        haptic([4, 18, 5])
                    } else if (kind === 'import') {
                        tone(480, .012, .004, 'sine');
                        setTimeout( () => tone(760, .012, .004, 'sine'), 24);
                        setTimeout( () => tone(1040, .018, .0035, 'sine'), 48);
                        haptic([5, 14, 5, 14, 7])
                    } else if (kind === 'invalid') {
                        tone(170, .035, .007, 'sawtooth');
                        haptic([12, 30, 12])
                    } else if (kind === 'jog') {
                        tone(880, .004, .001, 'triangle');
                    } else {
                        tone(1120, .008, S.unit === 'EDGE' ? .0025 : .0045, 'triangle');
                        haptic(S.unit === 'EDGE' ? 2 : 4)
                    }
                }

                window.addEventListener('pointerdown', () => {
                    hasInteracted = true;
                    audio();
                }
                , {
                    once: true
                });
                window.addEventListener('keydown', () => {
                    hasInteracted = true;
                    audio();
                }
                , {
                    once: true
                });

                function toast(x) {
                    clearTimeout(timer);
                    toastEl.textContent = x;
                    toastEl.classList.add('show');
                    timer = setTimeout( () => toastEl.classList.remove('show'), 900)
                }
                function setStatus(x) {
                    statusEl.textContent = x
                }
                function fmt(z) {
                    let u = Math.max(0, Math.round((Number.isFinite(z) ? z : 0) / SNAP));
                    return String(Math.floor(u / 60)).padStart(2, '0') + ':' + String(u % 60).padStart(2, '0') + ':' + String(Math.floor((u % 1) * 30)).padStart(2, '0')
                }
                function id() {
                    return 'SC-' + String(nextId++).padStart(3, '0')
                }
                function mk(start, dur, track) {
                    return {
                        id: id(),
                        start: qsnap(start),
                        dur: Math.max(SNAP, qsnap(dur)),
                        track: norm(track),
                        rot: 0,
                        lift: 0,
                        locked: false,
                        labelDx: 0,
                        labelDy: 0,
                        vStart: start,
                        vTrack: track,
                        vLift: 0,
                        vDur: dur
                    }
                }
                function normClip(c) {
                    c.start = Number.isFinite(+c.start) ? +c.start : 0;
                    c.dur = Math.max(SNAP, Number.isFinite(+c.dur) ? +c.dur : SNAP);
                    c.track = norm(+c.track || 0);
                    return Object.assign(mk(0, 0, 0), c, {
                        id: String(c.id || id()),
                        vStart: c.start,
                        vTrack: c.track,
                        vDur: c.dur
                    });
                }
                function seed() {
                    clips.length = 0;
                    nextId = 1;
                    for (let t = 0; t < 4; t++) {
                        let z = -900 + t * 160;
                        while (z < 16000) {
                            let d = qsnap(260 + Math.random() * 720);
                            clips.push(mk(z, d, t));
                            z += d + (Math.random() > .84 ? SNAP : 0)
                        }
                    }
                }

                // ======= I/O FILE SYSTEM =======
                function projectPayload() {
                    return {
                        app: 'Arc-Tunnel Operator',
                        version: 12,
                        exportedAt: new Date().toISOString(),
                        state: {
                            view: S.view,
                            tool: S.tool,
                            unit: S.unit,
                            cam: S.cam,
                            zoom: S.zoom,
                            roll: S.roll,
                            active: S.active,
                            snap: S.snap
                        },
                        nextId,
                        clips: clips.map(c => Object.assign({}, c)),
                        bank: bank.map(b => Object.assign({}, b)),
                        routes: routes.map(r => Object.assign({}, r))
                    }
                }
                function applyProjectPayload(d) {
                    clips.splice(0, clips.length, ...(d.clips || []).map(normClip));
                    bank.splice(0, bank.length, ...(d.bank || []));
                    routes.splice(0, routes.length, ...(d.routes || []));
                    nextId = d.nextId || 1;
                    let st = d.state || {};
                    Object.assign(S, st);
                    select(clips[0] || null, 'import');
                    drawTracks();
                    drawStore();
                    drawOps();
                    save()
                }
                function save() {
                    try {
                        localStorage.setItem(SAVE, JSON.stringify(projectPayload()))
                    } catch (e) {}
                }
                function load() {
                    try {
                        let d = JSON.parse(localStorage.getItem(SAVE));
                        if (!d || !d.clips)
                            return false;
                        applyProjectPayload(d);
                        return true
                    } catch (e) {
                        return false
                    }
                }

                function downloadText(text, name, type='text/plain') {
                    let blob = new Blob([text],{
                        type
                    });
                    let a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = name;
                    document.body.appendChild(a);
                    a.click();
                    setTimeout( () => {
                        URL.revokeObjectURL(a.href);
                        a.remove()
                    }
                    , 500)
                }
                function safeClipboardWrite(text) {
                    try {
                        if (!navigator.clipboard || typeof navigator.clipboard.writeText !== 'function')
                            return Promise.resolve(false);
                        return navigator.clipboard.writeText(text).then( () => true).catch(err => {
                            return false
                        }
                        )
                    } catch (err) {
                        return Promise.resolve(false)
                    }
                }

                function exportProject() {
                    downloadText(JSON.stringify(projectPayload(), null, 2), 'arc_tunnel_project_' + Date.now() + '.json', 'application/json');
                    tick('export');
                    toast('PROJECT EXPORTED')
                }
                function exportSnapshot() {
                    try {
                        let a = document.createElement('a');
                        a.href = canvas.toDataURL('image/png');
                        a.download = 'arc_tunnel_snapshot_' + Date.now() + '.png';
                        document.body.appendChild(a);
                        a.click();
                        setTimeout( () => a.remove(), 500);
                        toast('SNAPSHOT EXPORTED');
                        tick('export')
                    } catch (e) {
                        toast('SNAPSHOT BLOCKED');
                        tick('invalid')
                    }
                }
                function exportEDL() {
                    let lines = ['TITLE: ARC-TUNNEL OPERATOR', ''];
                    clips.slice().sort( (a, b) => a.start - b.start).forEach( (c, i) => lines.push(`${String(i + 1).padStart(3, '0')} ${c.id} TRACK:${NAMES[c.track]} START:${c.start} END:${c.start + c.dur}`));
                    let edl = lines.join(String.fromCharCode(10));
                    safeClipboardWrite(edl).then(ok => {
                        downloadText(edl, 'arc_tunnel_edl_' + Date.now() + '.txt', 'text/plain');
                        tick('export');
                        toast(ok ? 'EDL COPIED + DOWNLOADED' : 'EDL DOWNLOADED')
                    }
                    )
                }
                function requestImport() {
                    importFile.value = '';
                    importFile.click()
                }
                function importProjectFile(file) {
                    if (!file)
                        return;
                    let r = new FileReader();
                    r.onload = () => {
                        try {
                            applyProjectPayload(JSON.parse(String(r.result || '')));
                            tick('import');
                            toast('PROJECT IMPORTED')
                        } catch (err) {
                            toast('IMPORT FAILED');
                            tick('invalid')
                        }
                    }
                    ;
                    r.onerror = () => {
                        toast('IMPORT READ FAILED');
                        tick('invalid')
                    }
                    ;
                    r.readAsText(file)
                }

                // ======= BACKGROUND VIDEO MONITOR =======
                function drawVideoBackground(ts) {
                    let activeClips = clips.filter(c => S.cam >= c.start && S.cam <= c.start + c.dur);
                    let topClip = activeClips.length > 0 ? activeClips.reduce( (prev, current) => (prev.track > current.track) ? prev : current) : null;
                    S.playingClip = topClip;

                    bgCtx.clearRect(0, 0, W, H);

                    // Simple bus-mode background: clean workspace, no decorative noise
                    bgCtx.fillStyle = '#f8f8f8';
                    bgCtx.fillRect(0, 0, W, H);

                    // Draw bus frame thumbnail as background preview if available
                    if (topClip && topClip._frameIndex !== undefined && typeof window._busGetThumb === 'function') {
                        let thumb = window._busGetThumb(topClip._frameIndex);
                        if (thumb) {
                            let A = area();
                            // Small preview in top-right corner
                            let pw = Math.min(160, A.w / 4);
                            let ph = pw * (thumb.height / thumb.width) || pw * 0.75;
                            let px = A.x + A.w - pw - 8;
                            let py = A.y + 8;
                            bgCtx.save();
                            bgCtx.shadowColor = 'rgba(0,0,0,0.2)';
                            bgCtx.shadowBlur = 8;
                            bgCtx.fillStyle = '#000';
                            bgCtx.fillRect(px - 2, py - 2, pw + 4, ph + 4);
                            bgCtx.shadowBlur = 0;
                            bgCtx.drawImage(thumb, px, py, pw, ph);
                            // Label
                            bgCtx.fillStyle = '#fff';
                            bgCtx.font = '900 9px ui-monospace';
                            bgCtx.textAlign = 'left';
                            bgCtx.textBaseline = 'bottom';
                            bgCtx.fillText(topClip.id + ' F' + (topClip._frameIndex + 1), px + 4, py + ph - 4);
                            bgCtx.restore();
                        }
                    }

                    // Subtle grid — batched into single path
                    let A = area();
                    bgCtx.save();
                    bgCtx.globalAlpha = 0.06;
                    bgCtx.strokeStyle = '#000';
                    bgCtx.lineWidth = 0.5;
                    bgCtx.beginPath();
                    for (let x = A.x; x < A.x + A.w; x += 60) {
                        bgCtx.moveTo(x, A.y);
                        bgCtx.lineTo(x, A.y + A.h);
                    }
                    for (let y = A.y; y < A.y + A.h; y += 60) {
                        bgCtx.moveTo(A.x, y);
                        bgCtx.lineTo(A.x + A.w, y);
                    }
                    bgCtx.stroke();
                    bgCtx.restore();
                }

                // ======= GEOMETRY RENDERING =======
                function resize() {
                    _areaCache = null;
                    // Mobile: DPR 1.0 for perf. Desktop: 1.5 max.
                    DPR = innerWidth < 900 ? 1.0 : Math.min(1.5, devicePixelRatio || 1);
                    W = innerWidth;
                    H = innerHeight;
                    canvas.width = Math.round(W * DPR);
                    canvas.height = Math.round(H * DPR);
                    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
                    bgCanvas.width = Math.round(W * DPR);
                    bgCanvas.height = Math.round(H * DPR);
                    bgCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
                    _wakeBus();
                }
                function area() {
                    if (_areaCache) return _areaCache;
                    let left = W < 900 ? 36 : 56
                      , right = W < 900 ? 36 : 300
                      , top = 0
                      , bottom = W < 900 ? 38 : 52;
                    _areaCache = {
                        x: left,
                        y: top,
                        w: W - left - right,
                        h: H - top - bottom,
                        cx: left + (W - left - right) * .52,
                        cy: top + (H - top - bottom) * .52
                    };
                    return _areaCache
                }
                function project(x, y, z) {
                    let A = area()
                      , dz = z - S.cam + 900;
                    if (dz < 40)
                        return null;
                    let s = 720 / dz;
                    return {
                        x: A.cx + x * s + (z - S.cam) * .052,
                        y: A.cy + y * s - (z - S.cam) * .016,
                        s,
                        d: dz
                    }
                }
                function angle(c, track=isClip(c) ? c.vTrack : S.active) {
                    return track * Math.PI / 2 - Math.PI / 2 + S.roll + ((c && Number.isFinite(c.rot)) ? c.rot : 0)
                }
                function trackAngle(track) {
                    return track * Math.PI / 2 - Math.PI / 2 + S.roll
                }

                function tubeGeom(c) {
                    if (!isClip(c))
                        return {
                            cells: [],
                            hull: [],
                            mid: null,
                            depth: 1e9
                        };
                    let rr = R + (c.vLift || 0) * 36
                      , base = angle(c)
                      , a0 = base - Math.PI / 4 + .05
                      , a1 = base + Math.PI / 4 - .05
                      , z0 = c.vStart
                      , z1 = c.vStart + c.vDur
                      , mobile = W < 900
                      , cells = []
                      , hull = []
                      , depth = 1e9;

                    // LOD: estimate clip depth for adaptive detail
                    let estDepth = ((z0 + z1) / 2) - S.cam + 900;
                    let lodFactor = estDepth > 4000 ? 0.3 : estDepth > 2500 ? 0.5 : 1.0;
                    let baseZ = mobile ? 12 : 28;
                    let baseA = mobile ? 4 : 6;
                    let zSteps = clamp(Math.ceil((z1 - z0) / SNAP * lodFactor), 2, Math.ceil(baseZ * lodFactor) || 2);
                    let aSegs = Math.max(2, Math.ceil(baseA * lodFactor));

                    for (let zi = 0; zi < zSteps; zi++) {
                        let za = lerp(z0, z1, zi / zSteps)
                          , zb = lerp(z0, z1, (zi + 1) / zSteps);
                        for (let ai = 0; ai < aSegs; ai++) {
                            let aa = lerp(a0, a1, ai / aSegs)
                              , ab = lerp(a0, a1, (ai + 1) / aSegs)
                              , raw = [[Math.cos(aa) * rr, Math.sin(aa) * rr, za], [Math.cos(ab) * rr, Math.sin(ab) * rr, za], [Math.cos(ab) * rr, Math.sin(ab) * rr, zb], [Math.cos(aa) * rr, Math.sin(aa) * rr, zb]]
                              , pts = []
                              , ok = true
                              , cd = 1e9;
                            for (const p of raw) {
                                let q = project(p[0], p[1], p[2]);
                                if (!q) {
                                    ok = false;
                                    break
                                }
                                pts.push(q);
                                cd = Math.min(cd, q.d);
                                depth = Math.min(depth, q.d)
                            }
                            if (ok)
                                cells.push({
                                    pts,
                                    d: cd
                                })
                        }
                    }
                    for (let i = 0; i <= 8; i++) {
                        let a = lerp(a0, a1, i / 8)
                          , q = project(Math.cos(a) * rr, Math.sin(a) * rr, z0);
                        if (q)
                            hull.push(q)
                    }
                    for (let i = 8; i >= 0; i--) {
                        let a = lerp(a0, a1, i / 8)
                          , q = project(Math.cos(a) * rr, Math.sin(a) * rr, z1);
                        if (q)
                            hull.push(q)
                    }
                    return {
                        cells,
                        hull,
                        depth
                    }
                }

                function bounds(pts) {
                    if (!pts || !pts.length)
                        return { x: 0, y: 0, w: 0, h: 0 };
                    let minX = pts[0].x, maxX = minX, minY = pts[0].y, maxY = minY;
                    for (let i = 1; i < pts.length; i++) {
                        const px = pts[i].x, py = pts[i].y;
                        if (px < minX) minX = px; else if (px > maxX) maxX = px;
                        if (py < minY) minY = py; else if (py > maxY) maxY = py;
                    }
                    return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
                }
                function path(pts) {
                    let p = new Path2D();
                    p.moveTo(pts[0].x, pts[0].y);
                    for (let i = 1; i < pts.length; i++)
                        p.lineTo(pts[i].x, pts[i].y);
                    p.closePath();
                    return p
                }

                // ── PRE-RENDERED HATCH PATTERNS (eliminates ctx.clip() calls) ──
                const _hatchPatterns = [];
                (function initHatchPatterns() {
                    const sz = 10; // tile size matches original spacing
                    const specs = [
                        // kind 0: vertical lines
                        (c, s) => { c.beginPath(); c.moveTo(s/2, 0); c.lineTo(s/2, s); c.stroke(); },
                        // kind 1: horizontal lines
                        (c, s) => { c.beginPath(); c.moveTo(0, s/2); c.lineTo(s, s/2); c.stroke(); },
                        // kind 2: diagonal (bottom-left to top-right)
                        (c, s) => { c.beginPath(); c.moveTo(0, s); c.lineTo(s, 0); c.stroke();
                                    c.beginPath(); c.moveTo(-s, s); c.lineTo(s, -s); c.stroke();
                                    c.beginPath(); c.moveTo(0, 2*s); c.lineTo(2*s, 0); c.stroke(); },
                        // kind 3: cross-hatch (both diagonals, tighter 8px)
                        (c, s) => { s = 8;
                                    c.beginPath(); c.moveTo(0, 0); c.lineTo(s, s); c.stroke();
                                    c.beginPath(); c.moveTo(s, 0); c.lineTo(0, s); c.stroke();
                                    c.beginPath(); c.moveTo(-s, 0); c.lineTo(s, 2*s); c.stroke();
                                    c.beginPath(); c.moveTo(2*s, 0); c.lineTo(0, 2*s); c.stroke(); }
                    ];
                    for (let i = 0; i < 4; i++) {
                        const tileSz = i === 3 ? 8 : sz;
                        const tile = document.createElement('canvas');
                        tile.width = tileSz; tile.height = tileSz;
                        const tc = tile.getContext('2d');
                        tc.strokeStyle = '#000';
                        tc.lineWidth = 0.7;
                        specs[i](tc, tileSz);
                        _hatchPatterns[i] = ctx.createPattern(tile, 'repeat');
                    }
                })();

                function hatch(p, kind, b) {
                    // Pattern fill — no clip() call needed
                    ctx.save();
                    ctx.globalAlpha = .42;
                    ctx.fillStyle = _hatchPatterns[kind] || _hatchPatterns[0];
                    ctx.fill(p);
                    ctx.restore();
                }
                function tag(x, y, text, active=false) {
                    let A = area()
                      , fs = W < 900 ? 11 : 12
                      , w = Math.max(54, String(text).length * 7.2 + 14)
                      , h = fs + 10;
                    x = clamp(x - w / 2, A.x + 4, A.x + A.w - w - 4);
                    y = clamp(y - h / 2, A.y + 4, A.y + A.h - h - 4);
                    ctx.fillStyle = active ? '#000' : '#fff';
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = active ? 3 : 2;
                    ctx.beginPath();
                    ctx.rect(x, y, w, h);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = active ? '#fff' : '#000';
                    ctx.font = `900 ${fs}px ui-monospace`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(String(text), x + w / 2, y + h / 2);
                    return {
                        x,
                        y,
                        w,
                        h
                    }
                }

                function handle(x, y, r, type, c, label, isHov) {
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = isHov ? '#fef08a' : '#fff';
                    ctx.fill();
                    ctx.lineWidth = isHov ? 4 : 3;
                    ctx.strokeStyle = '#000';
                    ctx.stroke();
                    ctx.fillStyle = '#000';
                    ctx.font = '900 10px ui-monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(label, x, y);
                    rendered.push({
                        type,
                        clip: c,
                        x,
                        y,
                        r
                    })
                }
                function square(x, y, w, h, type, c, label, isHov) {
                    ctx.fillStyle = isHov ? '#fef08a' : '#fff';
                    ctx.fillRect(x - w / 2, y - h / 2, w, h);
                    ctx.lineWidth = isHov ? 4 : 3;
                    ctx.strokeStyle = '#000';
                    ctx.strokeRect(x - w / 2, y - h / 2, w, h);
                    ctx.fillStyle = '#000';
                    ctx.font = '900 10px ui-monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(label, x, y);
                    rendered.push({
                        type,
                        clip: c,
                        x: x - w / 2,
                        y: y - h / 2,
                        w,
                        h
                    })
                }

                // ======= OVERLAY GIZMOS PASS =======
                function renderGizmos(c, m, hw, hh, drawRect=false) {
                    if (drawRect) {
                        ctx.save();
                        ctx.setLineDash([7, 5]);
                        ctx.lineWidth = 3;
                        ctx.strokeStyle = '#000';
                        ctx.strokeRect(m.x - hw - 9, m.y - hh - 9, hw * 2 + 18, hh * 2 + 18);
                        ctx.restore();
                    }
                    let mode = S.hover?.clip === c ? S.hover.mode : null;

                    if (S.tool === 'TRIM') {
                        square(m.x - hw - 20, m.y, 30, 30, 'start', c, 'S', mode === 'start');
                        square(m.x + hw + 20, m.y, 30, 30, 'end', c, 'E', mode === 'end');
                    } else if (S.tool === 'MOVE') {
                        square(m.x, m.y, 42, 30, 'move', c, 'M', mode === 'move');
                        handle(m.x, m.y + hh + 20, 16, 'lane', c, 'L', mode === 'lane');
                    } else if (S.tool === 'ROLL') {
                        handle(m.x, m.y - hh - 20, 16, 'rotate', c, 'R', mode === 'rotate');
                    } else if (S.tool === 'LIFT') {
                        handle(m.x + hw + 30, m.y - hh - 10, 15, 'lift', c, '↑', mode === 'lift');
                    } else if (S.tool === 'ROUTE') {
                        handle(m.x + hw + 30, m.y + hh + 10, 15, 'route', c, '→', mode === 'route');
                    } else if (S.tool === 'SPLIT') {
                        ctx.fillStyle = '#ef4444';
                        ctx.fillRect(m.x - 2, m.y - hh - 20, 4, hh * 2 + 40);
                        square(m.x, m.y - hh - 20, 30, 20, 'split', c, 'CUT', mode === 'split');
                    }
                    handle(m.x - hw - 30, m.y - hh - 10, 14, 'lock', c, c.locked ? '✓' : '#', mode === 'lock');
                }

                function drawRoutes() {
                    ctx.save();
                    ctx.lineWidth = 2;
                    ctx.setLineDash([8, 5]);
                    ctx.strokeStyle = '#000';
                    for (const r of routes) {
                        let a = clips.find(c => c.id === r.from)
                          , b = clips.find(c => c.id === r.to);
                        if (!a || !b)
                            continue;
                        let mZ_a = (a.vStart + a.vStart + a.vDur) / 2
                          , mZ_b = (b.vStart + b.vStart + b.vDur) / 2;
                        let ma = project(Math.cos(angle(a)) * R, Math.sin(angle(a)) * R, mZ_a)
                          , mb = project(Math.cos(angle(b)) * R, Math.sin(angle(b)) * R, mZ_b);
                        if (ma && mb) {
                            ctx.beginPath();
                            ctx.moveTo(ma.x, ma.y);
                            ctx.lineTo(mb.x, mb.y);
                            ctx.stroke();
                            tag((ma.x + mb.x) / 2, (ma.y + mb.y) / 2, r.type || 'ROUTE')
                        }
                    }
                    if (S.drag && S.drag.mode === 'route' && S.drag.clip) {
                        ctx.beginPath();
                        ctx.moveTo(S.drag.sx, S.drag.sy);
                        ctx.lineTo(S.drag.mx || S.drag.sx, S.drag.my || S.drag.sy);
                        ctx.stroke();
                        tag(S.drag.mx || S.drag.sx, S.drag.my || S.drag.sy, 'ROUTE')
                    }
                    ctx.restore()
                }

                function railLines() {
                    const pts = W < 900 ? 25 : 50;
                    ctx.save();
                    for (let t = 0; t < 4; t++) {
                        let a = trackAngle(t);
                        ctx.setLineDash(STYLES[t].dash);
                        ctx.lineWidth = (t === S.active ? 3 : 1.4);
                        ctx.strokeStyle = '#000';
                        ctx.globalAlpha = t === S.active || S.selected ? .85 : .22;
                        ctx.beginPath();
                        for (let i = 0; i <= pts; i++) {
                            let z = S.cam - 900 + i * (FAR / pts)
                              , q = project(Math.cos(a) * R, Math.sin(a) * R, z);
                            if (q)
                                i ? ctx.lineTo(q.x, q.y) : ctx.moveTo(q.x, q.y)
                        }
                        ctx.stroke()
                    }
                    ctx.restore()
                }

                function drawGhostClip(c, startZ, track) {
                    let proxy = {
                        ...c,
                        vStart: startZ,
                        vTrack: track,
                        vDur: c.dur,
                        vLift: c.lift
                    };
                    let g = tubeGeom(proxy);
                    ctx.save();
                    ctx.globalAlpha = 0.2;
                    for (const cell of g.cells.sort( (a, b) => b.d - a.d)) {
                        let p = path(cell.pts);
                        ctx.fillStyle = '#000';
                        ctx.fill(p);
                        ctx.lineWidth = 1;
                        ctx.strokeStyle = '#000';
                        ctx.stroke(p);
                    }
                    ctx.restore();
                }

                function drawTubeView() {
                    railLines();
                    // Batch all rings into one path — single stroke call
                    const ringStep = W < 900 ? SNAP * 4 : SNAP * 2;
                    ctx.save();
                    ctx.strokeStyle = '#000';
                    ctx.globalAlpha = .25;
                    ctx.beginPath();
                    for (let z = qsnap(S.cam - 900); z < S.cam + FAR; z += ringStep) {
                        let q = project(0, 0, z);
                        if (q && q.s > .04) {
                            ctx.moveTo(q.x + R * q.s, q.y);
                            ctx.arc(q.x, q.y, R * q.s, 0, Math.PI * 2);
                        }
                    }
                    ctx.stroke();
                    ctx.restore();

                    let pRing = project(0, 0, S.cam);
                    if (pRing) {
                        ctx.save();
                        ctx.strokeStyle = '#ef4444';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.arc(pRing.x, pRing.y, R * pRing.s, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.restore();
                    }

                    if (S.drag && S.drag.mode === 'move')
                        drawGhostClip(S.drag.clip, S.drag.origStart, S.drag.origTrack);

                    // Build sorted clip list with CACHED geometry (tubeGeom called once, not twice)
                    let arr = [];
                    for (const c of clips) {
                        if (c.vStart + c.vDur < S.cam - 1300 || c.vStart > S.cam + FAR)
                            continue;
                        let g = tubeGeom(c);
                        if (g.cells.length)
                            arr.push({ c, g, d: g.depth });
                    }
                    arr.sort( (a, b) => b.d - a.d);
                    const isMobile = W < 900;
                    for (const o of arr) {
                        let c = o.c
                          , g = o.g  // CACHED — no second tubeGeom call
                          , sel = S.selected === c
                          , hov = S.hover && S.hover.clip === c
                          , st = STYLES[c.track];

                        // Sort cells by depth (back-to-front)
                        g.cells.sort( (a, b) => b.d - a.d);

                        // Find nearest cell for thumbnail (draw image only on closest cell)
                        let nearestD = 1e9;
                        for (const cell of g.cells) { if (cell.d < nearestD) nearestD = cell.d; }

                        for (const cell of g.cells) {
                            let p = path(cell.pts)
                              , b = bounds(cell.pts);
                            ctx.save();
                            ctx.globalAlpha = clamp(1 - cell.d / 7200, .15, 1);
                            ctx.fillStyle = hov && !sel ? '#e2e8f0' : (sel ? '#000' : '#fff');
                            ctx.fill(p);

                            // Hatch/thumbnail: only on near cells, thumbnail only on nearest
                            if (!sel && cell.d < (isMobile ? 3500 : 5500)) {
                                const isNearest = (cell.d === nearestD);
                                _busCurrentClip = isNearest ? c : null; // thumbnail only on nearest cell
                                hatch(p, st.hatch, b);
                                _busCurrentClip = null;
                            }

                            // Stroke: skip on far cells (too small to see outline)
                            if (cell.d < 4500 || sel || hov) {
                                ctx.setLineDash(sel ? [] : st.dash);
                                ctx.lineWidth = sel ? 4 : hov ? 3 : 1.5;
                                ctx.strokeStyle = '#000';
                                ctx.stroke(p);
                                if (sel) {
                                    ctx.strokeStyle = '#fff';
                                    ctx.lineWidth = 2;
                                    ctx.stroke(p)
                                }
                            }
                            ctx.restore()
                        }
                        let mZ = (c.vStart + c.vStart + c.vDur) / 2;
                        let A = area();
                        let mP = project(Math.cos(angle(c)) * R, Math.sin(angle(c)) * R, mZ) || {
                            x: A.cx, y: A.cy, s: 1
                        };

                        if (sel || hov || (!isMobile && g.depth < 1100))
                            tag(mP.x, mP.y, c.id, sel);

                        if (sel && g.hull.length) {
                            mP.x = clamp(mP.x, A.x + 80, A.x + A.w - 80);
                            mP.y = clamp(mP.y, A.y + 80, A.y + A.h - 80);
                            let spread = clamp(80 * mP.s, 45, 120);
                            gizmosToRender.push({
                                c, m: mP, hw: spread, hh: spread, rect: true
                            });
                        }
                        if (g.hull.length > 3)
                            rendered.push({ type: 'clip', clip: c, pts: g.hull });
                    };
                    drawRoutes();

                    let A = area()
                      , x = A.cx;
                    ctx.save();
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#ef4444';
                    ctx.beginPath();
                    ctx.moveTo(x, A.y + 8);
                    ctx.lineTo(x, A.y + A.h - 8);
                    ctx.stroke();
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(x - 34, A.y + 14, 68, 22);
                    ctx.fillStyle = '#fff';
                    ctx.font = '900 12px ui-monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(fmt(S.cam), x, A.y + 25);
                    ctx.restore();
                    rendered.push({
                        type: 'lathe',
                        x: x - 38,
                        y: A.y + 8,
                        w: 76,
                        h: A.h - 16
                    })
                }

                function benchX(z) {
                    let A = area();
                    return A.x + A.w * .5 + (z - S.cam) * S.zoom
                }
                function benchTime(x) {
                    let A = area();
                    return S.cam + (x - (A.x + A.w * .5)) / S.zoom
                }
                function laneY(t) {
                    let A = area();
                    return A.y + 70 + (A.h - 140) * (t + .5) / 4
                }
                function laneH() {
                    let A = area();
                    return clamp((A.h - 140) / 4 * .55, 30, 72)
                }

                function drawBench() {
                    let A = area();
                    for (let t = 0; t < 4; t++) {
                        let y = laneY(t)
                          , h = laneH();
                        ctx.strokeStyle = '#000';
                        ctx.setLineDash(STYLES[t].dash);
                        ctx.lineWidth = t === S.active ? 3 : 1.5;
                        ctx.beginPath();
                        ctx.moveTo(A.x + 12, y);
                        ctx.lineTo(A.x + A.w - 12, y);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        if (W > 900) {
                            ctx.fillStyle = '#000';
                            ctx.font = '900 12px ui-monospace';
                            ctx.fillText(NAMES[t], A.x + 18, y - h * .62)
                        }
                    }

                    if (S.drag && S.drag.mode === 'move') {
                        let gx0 = benchX(S.drag.origStart)
                          , gy = laneY(S.drag.origTrack)
                          , gw = S.drag.clip.dur * S.zoom;
                        ctx.save();
                        ctx.globalAlpha = 0.2;
                        ctx.fillStyle = '#000';
                        ctx.fillRect(gx0, gy - laneH() / 2, gw, laneH());
                        ctx.restore();
                    }

                    for (const c of clips) {
                        let x0 = benchX(c.vStart)
                          , x1 = benchX(c.vStart + c.vDur)
                          , w = x1 - x0
                          , y = laneY(c.vTrack)
                          , h = laneH()
                          , top = y - h / 2
                          , sel = S.selected === c
                          , hov = S.hover && S.hover.clip === c;
                        if (x1 < A.x - 90 || x0 > A.x + A.w + 90)
                            continue;
                        let p = new Path2D();
                        p.rect(x0, top, Math.max(5, w), h);
                        ctx.save();
                        ctx.globalAlpha = 0.85;
                        ctx.fillStyle = hov && !sel ? '#e2e8f0' : (sel ? '#000' : '#fff');
                        ctx.fill(p);
                        ctx.restore();
                        if (!sel)
                            { _busCurrentClip = c; hatch(p, STYLES[c.track].hatch, {
                                x: x0,
                                y: top,
                                w: Math.max(5, w),
                                h
                            }); _busCurrentClip = null; }
                        ctx.setLineDash(sel ? [] : STYLES[c.track].dash);
                        ctx.lineWidth = sel ? 5 : 2;
                        ctx.strokeStyle = '#000';
                        ctx.stroke(p);
                        if (sel) {
                            ctx.strokeStyle = '#fff';
                            ctx.lineWidth = 2;
                            ctx.stroke(p);
                            let visX0 = Math.max(A.x + 20, x0)
                              , visX1 = Math.min(A.x + A.w - 20, x1);
                            let mx = (visX0 + visX1) / 2
                              , hw = clamp((visX1 - visX0) / 2, 40, A.w / 3)
                              , hh = clamp(h / 2, 20, 40);
                            gizmosToRender.push({
                                c,
                                m: {
                                    x: mx,
                                    y: y
                                },
                                hw,
                                hh,
                                rect: false
                            });
                        }
                        ctx.setLineDash([]);
                        if (sel || hov || w > 88)
                            tag((x0 + x1) / 2, y, c.id, sel);
                        rendered.push({
                            type: 'bench',
                            clip: c,
                            x0,
                            x1,
                            y,
                            top,
                            h
                        })
                    }
                    let ax = benchX(S.cam);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#ef4444';
                    ctx.beginPath();
                    ctx.moveTo(ax, A.y + 8);
                    ctx.lineTo(ax, A.y + A.h - 8);
                    ctx.stroke();
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(ax - 34, A.y + 14, 68, 22);
                    ctx.fillStyle = '#fff';
                    ctx.font = '900 12px ui-monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(fmt(S.cam), ax, A.y + 25);
                    rendered.push({
                        type: 'lathe',
                        x: ax - 38,
                        y: A.y + 8,
                        w: 76,
                        h: A.h - 16
                    });
                }

                function outsideP() {
                    let A = area()
                      , m = W < 900;
                    return {
                        cx0: A.x + (m ? 88 : 185),
                        cy0: A.y + A.h * .56,
                        cx1: A.x + A.w - (m ? 36 : 90),
                        cy1: A.y + A.h * .43,
                        rx0: m ? 58 : 112,
                        ry0: m ? 126 : 220,
                        rx1: m ? 18 : 40,
                        ry1: m ? 60 : 112,
                        front: S.cam - 900,
                        span: FAR + 1800
                    }
                }
                function oc(s, P) {
                    return {
                        x: lerp(P.cx0, P.cx1, s),
                        y: lerp(P.cy0, P.cy1, s)
                    }
                }
                function orad(s, P) {
                    return {
                        rx: lerp(P.rx0, P.rx1, s),
                        ry: lerp(P.ry0, P.ry1, s)
                    }
                }
                function opoint(s, a, P) {
                    let c = oc(s, P)
                      , r = orad(s, P);
                    return {
                        x: c.x + Math.cos(a) * r.rx,
                        y: c.y + Math.sin(a) * r.ry
                    }
                }
                function os(z, P) {
                    return clamp((z - P.front) / P.span, 0, 1)
                }

                function drawOutside() {
                    let P = outsideP();
                    ctx.strokeStyle = '#000';
                    for (let i = 0; i <= 18; i++) {
                        let c = oc(i / 18, P)
                          , r = orad(i / 18, P);
                        ctx.lineWidth = i === 0 ? 3 : 1;
                        ctx.globalAlpha = 0.3;
                        ctx.beginPath();
                        ctx.ellipse(c.x, c.y, r.rx, r.ry, 0, 0, Math.PI * 2);
                        ctx.stroke()
                    }
                    ctx.globalAlpha = 1;
                    [-1.22, -.92, -.52, -.08, .34, .72, 1.08].forEach(a => {
                        ctx.beginPath();
                        for (let i = 0; i <= 36; i++) {
                            let q = opoint(i / 36, a, P);
                            i ? ctx.lineTo(q.x, q.y) : ctx.moveTo(q.x, q.y)
                        }
                        ctx.stroke()
                    }
                    );
                    let arr = [];
                    for (const c of clips) {
                        let s0 = os(c.vStart, P)
                          , s1 = os(c.vStart + c.vDur, P);
                        if (s1 <= 0 || s0 >= 1)
                            continue;
                        arr.push({
                            c,
                            s0: clamp(s0, 0, .995),
                            s1: clamp(Math.max(s1, s0 + .012), 0, .995),
                            m: (s0 + s1) / 2
                        })
                    }
                    arr.sort( (a, b) => b.m - a.m).forEach(o => {
                        let c = o.c
                          , sel = S.selected === c
                          , hov = S.hover && S.hover.clip === c
                          , a0 = angle(c) - Math.PI / 4 + .05
                          , a1 = angle(c) + Math.PI / 4 - .05
                          , pts = []
                          , s0 = o.s0
                          , s1 = o.s1;
                        for (let i = 0; i <= 14; i++)
                            pts.push(opoint(lerp(s0, s1, i / 14), a0, P));
                        for (let j = 1; j <= 6; j++)
                            pts.push(opoint(s1, lerp(a0, a1, j / 6), P));
                        for (let i = 13; i >= 0; i--)
                            pts.push(opoint(lerp(s0, s1, i / 14), a1, P));
                        for (let j = 5; j > 0; j--)
                            pts.push(opoint(s0, lerp(a0, a1, j / 6), P));
                        let pp = path(pts)
                          , b = bounds(pts);
                        ctx.save();
                        ctx.globalAlpha = 0.85;
                        ctx.fillStyle = hov && !sel ? '#e2e8f0' : (sel ? '#000' : '#fff');
                        ctx.fill(pp);
                        ctx.restore();
                        if (!sel)
                            { _busCurrentClip = c; hatch(pp, STYLES[c.track].hatch, b); _busCurrentClip = null; }
                        ctx.setLineDash(sel ? [] : STYLES[c.track].dash);
                        ctx.lineWidth = sel ? 5 : 2;
                        ctx.strokeStyle = '#000';
                        ctx.stroke(pp);

                        if (sel) {
                            ctx.strokeStyle = '#fff';
                            ctx.lineWidth = 2;
                            ctx.stroke(pp);
                            let visS0 = Math.max(0.05, s0)
                              , visS1 = Math.min(0.95, s1);
                            let mS = (visS0 + visS1) / 2
                              , mP = opoint(mS, angle(c), P)
                              , spread = clamp(100 * (1.1 - mS), 45, 140);
                            gizmosToRender.push({
                                c,
                                m: mP,
                                hw: spread,
                                hh: spread,
                                rect: false
                            });
                        }
                        ctx.setLineDash([]);
                        if (sel || hov) {
                            let m = opoint((s0 + s1) / 2, (a0 + a1) / 2, P);
                            tag(m.x, m.y, c.id, sel)
                        }
                        rendered.push({
                            type: 'clip',
                            clip: c,
                            pts
                        })
                    }
                    );
                    let s = os(S.cam, P)
                      , cc = oc(s, P)
                      , rr = orad(s, P);
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#ef4444';
                    ctx.beginPath();
                    ctx.ellipse(cc.x, cc.y, rr.rx, rr.ry, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    tag(cc.x, area().y + 24, fmt(S.cam))
                }

                function drawSide() {
                    drawBench();
                    ctx.save();
                    ctx.lineWidth = 3;
                    ctx.setLineDash([6, 5]);
                    ctx.strokeStyle = '#000';
                    let A = area();
                    ctx.strokeRect(A.x + 20, A.y + 20, A.w - 40, A.h - 40);
                    ctx.restore()
                }

                function drawDragConstraints() {
                    if (!S.drag || !S.drag.clip)
                        return;
                    ctx.save();
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#3b82f6';
                    ctx.globalAlpha = 0.8;
                    let c = S.drag.clip;
                    if (S.drag.axisLock === 'time') {
                        if (S.view >= 3) {
                            let y = laneY(c.track);
                            ctx.beginPath();
                            ctx.moveTo(area().x, y);
                            ctx.lineTo(area().x + area().w, y);
                            ctx.stroke();
                        } else if (S.view === 2) {
                            let P = outsideP()
                              , a = trackAngle(c.track);
                            ctx.beginPath();
                            for (let i = 0; i <= 36; i++) {
                                let q = opoint(i / 36, a, P);
                                i ? ctx.lineTo(q.x, q.y) : ctx.moveTo(q.x, q.y)
                            }
                            ctx.stroke();
                        } else {
                            let a = trackAngle(c.track);
                            ctx.beginPath();
                            for (let i = 0; i <= 50; i++) {
                                let z = S.cam - 900 + i * (FAR / 50)
                                  , q = project(Math.cos(a) * R, Math.sin(a) * R, z);
                                if (q)
                                    i ? ctx.lineTo(q.x, q.y) : ctx.moveTo(q.x, q.y)
                            }
                            ctx.stroke();
                        }
                    } else if (S.drag.axisLock === 'track') {
                        if (S.view >= 3) {
                            let x = benchX(c.start);
                            ctx.beginPath();
                            ctx.moveTo(x, area().y);
                            ctx.lineTo(x, area().y + area().h);
                            ctx.stroke();
                        } else if (S.view === 2) {
                            let P = outsideP()
                              , s = os(c.start, P)
                              , cc = oc(s, P)
                              , rr = orad(s, P);
                            ctx.beginPath();
                            ctx.ellipse(cc.x, cc.y, rr.rx, rr.ry, 0, 0, Math.PI * 2);
                            ctx.stroke();
                        } else {
                            let q = project(0, 0, c.start);
                            if (q) {
                                ctx.beginPath();
                                ctx.arc(q.x, q.y, Math.max(1, R * q.s), 0, Math.PI * 2);
                                ctx.stroke();
                            }
                        }
                    }
                    ctx.restore();
                }

                function hitPoly(pt, pts) {
                    let h = false;
                    for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
                        let xi = pts[i].x
                          , yi = pts[i].y
                          , xj = pts[j].x
                          , yj = pts[j].y;
                        if (((yi > pt.y) != (yj > pt.y)) && pt.x < (xj - xi) * (pt.y - yi) / ((yj - yi) || 1e-6) + xi)
                            h = !h
                    }
                    return h
                }

                function timeFromScreen(x, y, track, fallbackZ) {
                    if (S.view >= 3)
                        return benchTime(x);
                    if (S.view === 2) {
                        let P = outsideP()
                          , s = clamp((x - P.cx0) / (P.cx1 - P.cx0), 0, 1);
                        return P.front + s * P.span;
                    }
                    let a = trackAngle(track)
                      , bestZ = fallbackZ
                      , bd = 1e9;
                    for (let z = S.cam - 900; z < S.cam + FAR; z += SNAP * 2) {
                        let q = project(Math.cos(a) * R, Math.sin(a) * R, z);
                        if (q) {
                            let d = Math.hypot(q.x - x, q.y - y);
                            if (d < bd) {
                                bd = d;
                                bestZ = z;
                            }
                        }
                    }
                    for (let z = bestZ - SNAP * 2; z <= bestZ + SNAP * 2; z += 15) {
                        let q = project(Math.cos(a) * R, Math.sin(a) * R, z);
                        if (q) {
                            let d = Math.hypot(q.x - x, q.y - y);
                            if (d < bd) {
                                bd = d;
                                bestZ = z;
                            }
                        }
                    }
                    return bestZ;
                }

                function hit(x, y) {
                    for (let i = rendered.length - 1; i >= 0; i--) {
                        let r = rendered[i];
                        if (r.type === 'lathe' && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h)
                            return {
                                mode: 'lathe',
                                clip: null
                            };
                        if (isClip(r.clip) && r.r && Math.hypot(x - r.x, y - r.y) < r.r + 12)
                            return {
                                clip: r.clip,
                                mode: r.type
                            };
                        if (isClip(r.clip) && r.w && x >= r.x - 10 && x <= r.x + r.w + 10 && y >= r.y - 10 && y <= r.y + r.h + 10)
                            return {
                                clip: r.clip,
                                mode: r.type
                            };
                        if ((r.type === 'bench' || r.type === 'clip') && isClip(r.clip)) {
                            let hitBody = false;
                            if (r.type === 'bench')
                                hitBody = (x >= r.x0 && x <= r.x1 && y >= r.top && y <= r.top + r.h);
                            else
                                hitBody = hitPoly({
                                    x,
                                    y
                                }, r.pts);
                            if (hitBody) {
                                let mode = 'move';
                                if (S.tool === 'TRIM') {
                                    let cTime = r.clip.start + r.clip.dur / 2;
