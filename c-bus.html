                                    let ptr = (S.view >= 3) ? benchTime(x) : timeFromScreen(x, y, r.clip.track, cTime);
                                    mode = (ptr < cTime) ? 'start' : 'end';
                                } else if (S.tool === 'ROLL')
                                    mode = 'rotate';
                                else if (S.tool === 'LIFT')
                                    mode = 'lift';
                                else if (S.tool === 'ROUTE')
                                    mode = 'route';
                                else if (S.tool === 'SPLIT')
                                    mode = 'split';
                                return {
                                    clip: r.clip,
                                    mode
                                };
                            }
                        }
                    }
                    return null
                }

                function drawSnapLine() {
                    if (S.drag && currentSnapZ !== null && S.snap) {
                        ctx.save();
                        ctx.strokeStyle = '#22c55e';
                        ctx.lineWidth = 4;
                        ctx.setLineDash([8, 8]);
                        if (S.view >= 3) {
                            let x = benchX(currentSnapZ);
                            ctx.beginPath();
                            ctx.moveTo(x, area().y);
                            ctx.lineTo(x, area().y + area().h);
                            ctx.stroke();
                            tag(x, area().y + 40, "JOIN " + fmt(currentSnapZ), true);
                        } else if (S.view === 2) {
                            let P = outsideP()
                              , s = os(currentSnapZ, P)
                              , cc = oc(s, P)
                              , rr = orad(s, P);
                            ctx.beginPath();
                            ctx.ellipse(cc.x, cc.y, rr.rx, rr.ry, 0, 0, Math.PI * 2);
                            ctx.stroke();
                            tag(area().cx, area().cy + 60, "JOIN " + fmt(currentSnapZ), true);
                        } else {
                            let q = project(0, 0, currentSnapZ);
                            if (q) {
                                ctx.beginPath();
                                ctx.arc(q.x, q.y, Math.max(1, R * q.s), 0, Math.PI * 2);
                                ctx.stroke();
                            }
                            tag(area().cx, area().cy + 60, "JOIN " + fmt(currentSnapZ), true);
                        }
                        ctx.restore();
                    }
                }

                function render(ts) {
                    _areaCache = null; // Invalidate per-frame area cache
                    rendered = [];
                    gizmosToRender = [];
                    ctx.clearRect(0, 0, W, H);

                    drawVideoBackground(ts);

                    if (S.view === 0 || S.view === 1)
                        drawTubeView();
                    else if (S.view === 2)
                        drawOutside();
                    else if (S.view === 3)
                        drawSide();
                    else
                        drawBench();

                    drawDragConstraints();
                    drawSnapLine();
                    for (const g of gizmosToRender) {
                        renderGizmos(g.c, g.m, g.hw, g.hh, g.rect);
                    }

                    readout.textContent = S.hover && S.hover.clip ? `HOVER: ${String(S.hover.mode).toUpperCase()} [${S.hover.clip.id}]` : S.selected ? `${S.selected.id} ${S.unit} ${fmt(S.selected.start)} ${fmt(S.selected.dur)}` : `TIME ${fmt(S.cam)}`;
                    modeName.textContent = VIEWS[S.view];

                    if (S.play)
                        playBtn.textContent = (S.playRate !== 1 ? (S.playRate > 0 ? "PLAY " + S.playRate + "X" : "REV " + Math.abs(S.playRate) + "X") : "PLAY");
                    else
                        playBtn.textContent = "PLAY";
                }

                // ═══════════════════════════════════════════
                // ── PERFORMANCE MONITOR ──
                // Press ~ to toggle. Shows FPS, render cost, idle %, bus msg rate.
                // ═══════════════════════════════════════════
                const _perf = {
                    frames: 0, renderMs: 0, idleSkips: 0, busMsg: 0,
                    lastReport: performance.now(),
                    hud: null, visible: true
                };

                function _perfReport() {
                    const now = performance.now();
                    const elapsed = (now - _perf.lastReport) / 1000;
                    if (elapsed < 1) return;
                    const fps = (_perf.frames / elapsed).toFixed(1);
                    const avgMs = _perf.frames > 0 ? (_perf.renderMs / _perf.frames).toFixed(1) : '0';
                    const idlePct = ((_perf.idleSkips / (_perf.frames + _perf.idleSkips + 0.01)) * 100).toFixed(0);
                    const msgRate = (_perf.busMsg / elapsed).toFixed(1);
                    const loopState = _loopRunning ? 'RUN' : 'SLEEP';
                    if (_perf.hud) {
                        _perf.hud.textContent = `${fps} fps · ${avgMs}ms/f · idle ${idlePct}% · bus ${msgRate}/s · ${loopState} · ${clips.length} clips · DPR ${DPR}`;
                    }
                    // Console log every 5s for deep debugging
                    if (elapsed > 4.9) {
                        console.log(`[ATO-PERF] ${fps} fps | render ${avgMs}ms | idle ${idlePct}% | bus ${msgRate}/s | ${loopState} | ${clips.length} clips | DPR ${DPR} | ${W}x${H}`);
                    }
                    _perf.frames = 0; _perf.renderMs = 0; _perf.idleSkips = 0; _perf.busMsg = 0;
                    _perf.lastReport = now;
                }

                // Create HUD element
                (function initPerfHud() {
                    const hud = document.createElement('div');
                    hud.id = 'perf-hud';
                    hud.style.cssText = 'position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(0,0,0,0.85);color:#0f0;font:900 9px ui-monospace;padding:2px 8px;pointer-events:none;display:none;white-space:nowrap;';
                    document.body.appendChild(hud);
                    _perf.hud = hud;
                })();

                // Toggle HUD with ~ key
                document.addEventListener('keydown', e => {
                    if (e.key === '`' || e.key === '~') {
                        _perf.hud.style.display = _perf.hud.style.display === 'none' ? '' : 'none';
                    }
                });

                // ── IFRAME VISIBILITY DETECTION ──
                // When c-bus is display:none on mobile, stop all rendering
                let _iframeVisible = true;
                const _visObserver = new IntersectionObserver(entries => {
                    const wasVisible = _iframeVisible;
                    _iframeVisible = entries[0].isIntersecting;
                    if (_iframeVisible && !wasVisible) {
                        console.log('[ATO-PERF] Iframe visible — waking render loop');
                        _wakeBus();
                    } else if (!_iframeVisible && wasVisible) {
                        console.log('[ATO-PERF] Iframe hidden — halting render loop');
                        _loopRunning = false;
                    }
                }, { threshold: 0.01 });
                _visObserver.observe(document.documentElement);

                let _dirty = true;
                let _loopRunning = false;
                let _idleFrames = 0;
                const _IDLE_STOP = 30;

                function _wakeBus() {
                    _dirty = true;
                    _idleFrames = 0;
                    if (!_loopRunning && _iframeVisible) {
                        _loopRunning = true;
                        requestAnimationFrame(loop);
                    }
                }

                function loop(ts) {
                    // Bail if iframe became hidden mid-loop
                    if (!_iframeVisible) { _loopRunning = false; return; }

                    let dt = Math.min(33, ts - last || 16);
                    last = ts;

                    // ── MOTION: only when something is moving ──
                    if (S.play) {
                        S.cam += dt * 0.16 * S.playRate;
                        _dirty = true;
                    } else if (!S.drag && !S.scrub && Math.abs(S.inertia) > 0.05) {
                        S.cam += S.inertia * (dt / 16);
                        S.inertia *= 0.92;
                        if (Math.abs(S.inertia) > 1 && Math.floor(S.cam) % 10 === 0)
                            tick('jog');
                        _dirty = true;
                    } else if (Math.abs(S.inertia) <= 0.05)
                        S.inertia = 0;

                    // ── SKIP EVERYTHING when clean ──
                    if (!_dirty) {
                        _idleFrames++;
                        _perf.idleSkips++;
                        if (_idleFrames < _IDLE_STOP) {
                            requestAnimationFrame(loop);
                        } else {
                            _loopRunning = false;
                            console.log('[ATO-PERF] Loop sleeping — no activity for ' + _IDLE_STOP + ' frames');
                        }
                        _perfReport();
                        return;
                    }

                    // ── Audio tic on boundary crossing ──
                    let crossed = false;
                    for (const c of clips) {
                        if ((last <= c.start && S.cam > c.start) || (last >= c.start && S.cam < c.start)) {
                            crossed = true; break;
                        }
                    }
                    if (crossed && (S.play || Math.abs(S.inertia) > 0))
                        tick('cross');

                    // ── Physics lerp (only when dragging or animating) ──
                    let needsLerp = S.drag || S.play || Math.abs(S.inertia) > 0.05;
                    clips.forEach(c => {
                        if (c.vStart === undefined) {
                            c.vStart = c.start; c.vTrack = c.track;
                            c.vDur = c.dur; c.vLift = c.lift;
                        }
                        if (needsLerp) {
                            let lf = (S.drag && S.drag.clip === c) ? 0.6 : 0.25;
                            c.vStart += (c.start - c.vStart) * lf;
                            c.vTrack += (c.track - c.vTrack) * lf;
                            c.vDur += (c.dur - c.vDur) * lf;
                            c.vLift += (c.lift - c.vLift) * lf;
                        } else {
                            c.vStart = c.start; c.vTrack = c.track;
                            c.vDur = c.dur; c.vLift = c.lift;
                        }
                    });

                    // ── RENDER with timing ──
                    const t0 = performance.now();
                    render(ts);
                    _perf.renderMs += performance.now() - t0;
                    _perf.frames++;

                    _dirty = false;
                    _idleFrames = 0;
                    _perfReport();
                    requestAnimationFrame(loop);
                }

                function select(c, src='object') {
                    let old = S.selected;
                    if (!isClip(c)) {
                        S.selected = null;
                        selBig.textContent = 'NO CLIP';
                        selMeta.textContent = 'TAP SECTION';
                        drawTracks();
                        drawOps();
                        return
                    }
                    S.selected = c;
                    S.active = c.track;
                    selBig.textContent = c.id;
                    selMeta.textContent = `${S.tool} ${S.unit} ${NAMES[c.track]} ${fmt(c.start)} DUR ${fmt(c.dur)} ${c.locked ? 'LOCK' : ''}`;
                    drawTracks();
                    drawOps();
                    if (src === 'object' && c !== old) {
                        tick('snap');
                        F.lastTrack = c.track;
                        F.lastSlot = Math.round(c.start / step());
                    }
                }
                function addClip(z=qsnap(S.cam), tr=S.active) {
                    let c = mk(z, 360, tr);
                    clips.push(c);
                    select(c, 'add');
                    save();
                    toast('ADDED ' + c.id);
                    return c;
                }
                function cutClip(c, z=qsnap(S.cam)) {
                    if (!isClip(c))
                        return tone(180, .025, .008, 'sawtooth');
                    if (z <= c.start + step() || z >= c.start + c.dur - step()) {
                        toast('CUT OUTSIDE');
                        return
                    }
                    let n = {
                        ...c,
                        id: id(),
                        start: z,
                        dur: c.start + c.dur - z
                    };
                    c.dur = z - c.start;
                    clips.push(n);
                    select(n, 'cut');
                    tick('drop');
                    save()
                }
                function remove(c) {
                    if (!isClip(c))
                        return;
                    let i = clips.indexOf(c);
                    if (i >= 0)
                        clips.splice(i, 1);
                    select(null);
                    save();
                    toast('DELETED')
                }
                function clone(c) {
                    if (!isClip(c))
                        return;
                    let n = {
                        ...c,
                        id: id(),
                        start: qsnap(c.start + c.dur + step())
                    };
                    clips.push(n);
                    select(n);
                    save()
                }
                function bankClip(c) {
                    if (!isClip(c))
                        return;
                    bank.unshift({
                        id: c.id,
                        dur: c.dur,
                        track: c.track
                    });
                    bank.splice(5);
                    drawStore();
                    toast('STORED ' + c.id)
                }
                function drawTracks() {
                    tracksEl.innerHTML = '';
                    NAMES.forEach( (n, i) => {
                        let b = document.createElement('button');
                        b.className = 'trk' + (S.active === i ? ' on' : '');
                        b.dataset.s = SHORT[i];
                        b.textContent = n;
                        b.onclick = () => {
                            S.active = i;
                            toast(n);
                            drawTracks()
                        }
                        ;
                        tracksEl.appendChild(b)
                    }
                    )
                }
                function drawStore() {
                    storeCount.textContent = bank.length;
                    slotsEl.innerHTML = '';
                    for (let i = 0; i < 5; i++) {
                        let s = bank[i]
                          , d = document.createElement('div');
                        d.className = 'slot';
                        d.innerHTML = s ? `<b>${s.id}</b><small>${NAMES[s.track]}</small>` : '<b>EMPTY</b><small>STORE</small>';
                        if (s)
                            d.onclick = () => addClip(S.cam + SNAP * (i + 1), s.track);
                        slotsEl.appendChild(d)
                    }
                }
                function op(id, label, act, state) {
                    let d = document.createElement('div');
                    d.className = 'op' + (S.tool === label ? ' on' : '');
                    let short = {
                        view: 'VIEW',
                        unit: 'UNIT',
                        move: 'MOVE',
                        trim: 'TRIM',
                        roll: 'ROLL',
                        lift: 'LIFT',
                        route: 'ROUTE',
                        store: 'BANK',
                        edl: 'EDL',
                        import: 'IMP',
                        project: 'OUT'
                    }[id] || id;
                    d.innerHTML = `<code>${id}</code><span data-short="${short}">${label}<small>${act} - ${state}</small></span>`;
                    d.onclick = () => runOp(id);
                    opList.appendChild(d)
                }
                function drawOps() {
                    opList.innerHTML = '';
                    op('view', 'VIEW', 'cycle editing plane', VIEWS[S.view]);
                    op('unit', 'UNIT', 'clip beat cell edge', S.unit);
                    op('move', 'MOVE', 'center plate / front lip', S.tool);
                    op('trim', 'TRIM', 'nose lip / rear lip', S.tool);
                    op('roll', 'ROLL', 'rotate knob', S.tool);
                    op('lift', 'LIFT', 'inside outside nub', S.tool);
                    op('route', 'ROUTE', 'socket arrow', routes.length + ' ROUTES');
                    op('store', 'STORE', 'send to tray', bank.length + ' STORED');
                    op('edl', 'EDL', 'download edit list', 'READY');
                    op('import', 'IMPORT', 'load project JSON', 'FILE');
                    op('project', 'PROJECT', 'download full state', 'JSON')
                }
                function setTool(t) {
                    S.tool = t;
                    [...dock.querySelectorAll('button')].forEach(b => b.classList.toggle('on', b.dataset.tool === t));
                    // Toggle store panel visibility
                    const storeEl = document.getElementById('store');
                    if (storeEl) storeEl.classList.toggle('show', t === 'STORE');
                    toast(t);
                    drawOps();
                    if (S.selected)
                        select(S.selected, 'tool')
                }
                function runOp(k) {
                    if (k === 'view')
                        setView((S.view + 1) % VIEWS.length);
                    else if (k === 'unit')
                        cycleUnit();
                    else if (k === 'move')
                        setTool('MOVE');
                    else if (k === 'trim')
                        setTool('TRIM');
                    else if (k === 'roll')
                        setTool('ROLL');
                    else if (k === 'lift')
                        setTool('LIFT');
                    else if (k === 'route')
                        setTool('ROUTE');
                    else if (k === 'store')
                        bankClip(S.selected);
                    else if (k === 'edl')
                        exportEDL();
                    else if (k === 'import')
                        requestImport();
                    else if (k === 'project')
                        exportProject()
                }
                function cycleUnit() {
                    let i = UNITS.indexOf(S.unit);
                    S.unit = UNITS[(i + 1) % UNITS.length];
                    toast('UNIT ' + S.unit);
                    drawOps();
                    if (S.selected)
                        select(S.selected, 'unit')
                }
                function setView(v) {
                    S.view = v;
                    toast(VIEWS[v]);
                    drawOps()
                }

                canvas.addEventListener('pointerdown', e => {
                    _wakeBus();
                    menu.classList.remove('show');
                    S.inertia = 0;
                    S.play = false;
                    playBtn.classList.remove('on');
                    S.playRate = 1;
                    let h = hit(e.clientX, e.clientY);
                    if (h) {
                        if (h.clip && S.selected === h.clip && e.detail >= 2)
                            cycleUnit();
                        if (h.mode === 'split') {
                            let ptr = (S.view >= 3) ? benchTime(e.clientX) : timeFromScreen(e.clientX, e.clientY, h.clip.track, h.clip.start + h.clip.dur / 2);
                            cutClip(h.clip, magneticSnap(ptr));
                            return;
                        }
                        select(h.clip, 'object');
                        let ptrZ = (S.view >= 3) ? benchTime(e.clientX) : timeFromScreen(e.clientX, e.clientY, h.clip.track, h.clip.start);
                        S.drag = {
                            mode: h.mode,
                            clip: h.clip,
                            sx: e.clientX,
                            sy: e.clientY,
                            mx: e.clientX,
                            my: e.clientY,
                            origStart: h.clip.start,
                            origTrack: h.clip.track,
                            start: h.clip.start,
                            dur: h.clip.dur,
                            track: h.clip.track,
                            rot: h.clip.rot,
                            lift: h.clip.lift,
                            pointerZ: ptrZ,
                            axisLock: null,
                            lastSnapZ: h.clip.start
                        };
                        setStatus(String(h.mode).toUpperCase())
                    } else {
                        S.scrub = {
                            x: e.clientX,
                            y: e.clientY,
                            cam: S.cam,
                            lastTime: performance.now(),
                            lastCam: S.cam
                        };
                        setStatus('JOG WHEEL')
                    }
                }
                );

                canvas.addEventListener('pointermove', e => {
                    _wakeBus();
                    let x = e.clientX
                      , y = e.clientY;
                    if (S.drag && isClip(S.drag.clip)) {
                        let d = S.drag
                          , c = d.clip;
                        d.mx = x;
                        d.my = y;
                        if (c.locked && d.mode !== 'lock') {
                            setStatus('LOCKED');
                            return
                        }

                        let dx = x - d.sx
                          , dy = y - d.sy;
                        let timeDelta = 0
                          , trackDelta = 0;

                        if (S.view >= 3) {
                            timeDelta = dx / S.zoom;
                            trackDelta = Math.round(dy / laneH());
                        } else if (S.view === 2) {
                            timeDelta = dx * 8;
                            trackDelta = Math.round(dy / 50);
                        } else {
                            timeDelta = -dy * 15;
                            trackDelta = Math.round(dx / 60);
                        }
                        // PUSH IS PUSH PHYSICS

                        if (d.mode === 'move') {
                            let tTrack = norm(d.track + trackDelta)
                              , tStart = d.start + timeDelta;
                            if (!e.shiftKey) {
                                if (!d.axisLock && Math.hypot(dx, dy) > 8)
                                    d.axisLock = Math.abs(dx) > Math.abs(dy) ? ((S.view >= 3 || S.view === 2) ? 'time' : 'track') : ((S.view >= 3 || S.view === 2) ? 'track' : 'time');
                                if (d.axisLock === 'time')
                                    tTrack = d.track;
                                else if (d.axisLock === 'track')
                                    tStart = d.start;
                            } else
                                d.axisLock = null;

                            c.track = tTrack;
                            let newStart = magneticSnap(tStart, c.track, c.id, c.dur);
                            if (d.lastSnapZ !== newStart) {
                                tick('ratchet', 1 + (c.track * 0.15));
                                d.lastSnapZ = newStart;
                            }
                            c.start = newStart;
                            select(c, 'drag');
                            save()
                        } else if (d.mode === 'start') {
                            let ns = magneticSnap(d.start + timeDelta, c.track, c.id);
                            ns = clamp(ns, d.start + d.dur - 5000, d.start + d.dur - step());
                            if (d.lastSnapZ !== ns) {
                                tick('ratchet', 1.2);
                                d.lastSnapZ = ns;
                            }
                            c.start = ns;
                            c.dur = (d.start + d.dur) - ns;
                            select(c, 'trim');
                            save()
                        } else if (d.mode === 'end') {
                            let ne = magneticSnap(d.start + d.dur + timeDelta, c.track, c.id);
                            if (d.lastSnapZ !== ne) {
                                tick('ratchet', 0.8);
                                d.lastSnapZ = ne;
                            }
                            c.dur = Math.max(step(), ne - c.start);
                            select(c, 'trim');
                            save()
                        } else if (d.mode === 'lane') {
                            c.track = norm(d.track + trackDelta);
                            select(c, 'lane');
                            save()
                        } else if (d.mode === 'rotate') {
                            c.rot = d.rot + dx * .012;
                            if (S.snap)
                                c.rot = Math.round(c.rot / (Math.PI / 4)) * (Math.PI / 4);
                            select(c, 'rot');
                            save()
                        } else if (d.mode === 'lift') {
                            c.lift = clamp(d.lift - dy / 70, -1, 1);
                            if (S.snap)
                                c.lift = Math.round(c.lift * 4) / 4;
                            select(c, 'lift');
                            save()
                        } else if (d.mode === 'lock') {
                            c.locked = !c.locked;
                            S.drag = null;
                            select(c, 'lock');
                            save()
                        } else if (d.mode === 'route') {
                            let hh = hit(x, y);
                            if (hh && hh.clip && hh.clip !== c) {
                                d.target = hh.clip;
                                setStatus('TARGET ' + hh.clip.id)
                            }
                        }
                        return
                    }
                    if (S.scrub) {
                        let dx = x - S.scrub.x
                          , dy = y - S.scrub.y
                          , moveAmt = 0;
                        if (S.view >= 3)
                            moveAmt = -dx / S.zoom;
                        else if (S.view === 2)
                            moveAmt = -dx * 4;
                        else
                            moveAmt = dy * 4;
                        // Pull Down = Pull Timeline Forward

                        S.cam = S.scrub.cam + moveAmt;

                        let now = performance.now()
                          , dt = now - S.scrub.lastTime;
                        if (dt > 0) {
                            let newVel = (S.cam - S.scrub.lastCam) / dt * 16;
                            S.vel = (S.vel * 0.5) + (newVel * 0.5);
                            // Smooth velocity tracking
                            S.scrub.lastTime = now;
                            S.scrub.lastCam = S.cam;
                        }
                        return
                    }
                    S.hover = hit(x, y);
                    if (S.hover) {
                        let m = S.hover.mode;
                        if (m === 'start' || m === 'end')
                            canvas.style.cursor = 'col-resize';
                        else if (m === 'move' || m === 'lane')
                            canvas.style.cursor = 'grab';
                        else if (m === 'rotate' || m === 'lift')
                            canvas.style.cursor = 'ns-resize';
                        else
                            canvas.style.cursor = 'crosshair';
                    } else
                        canvas.style.cursor = 'crosshair';
                    setStatus(S.hover ? 'HOVER' : 'IDLE')
                }
                );

                canvas.addEventListener('pointerup', () => {
                    if (S.drag) {
                        if (S.drag.mode === 'move' || S.drag.mode === 'lane' || S.drag.mode === 'lift' || S.drag.mode === 'start' || S.drag.mode === 'end')
                            tick('drop');
                        if (S.drag.mode === 'route' && S.drag.target) {
                            routes.push({
                                from: S.drag.clip.id,
                                to: S.drag.target.id,
                                type: 'ROUTE'
                            });
                            tick('drop');
                            toast('ROUTED')
                        }
                        S.drag = null
                    }
                    if (S.scrub) {
                        if (Math.abs(S.vel) > 1)
                            S.inertia = S.vel;
                        // transfer scrub velocity to momentum
                        S.scrub = null;
                    }
                    currentSnapZ = null;
                    save()
                }
                );

                canvas.addEventListener('dblclick', e => {
                    let h = hit(e.clientX, e.clientY);
                    if (!h || !h.clip) {
                        let z = S.cam + 900;
                        if (S.view >= 3)
                            z = benchTime(e.clientX);
                        else if (S.view === 2) {
                            let P = outsideP()
                              , s = clamp((e.clientX - P.cx0) / (P.cx1 - P.cx0), 0, 1);
                            z = P.front + s * P.span;
                        }
                        addClip(magneticSnap(z, S.active), S.active);
                    }
                }
                );

                canvas.addEventListener('contextmenu', e => {
                    e.preventDefault();
                    let h = hit(e.clientX, e.clientY);
                    menu.innerHTML = '';
                    let title = document.createElement('div');
                    title.className = 'mi title';
                    title.textContent = h && h.clip ? h.clip.id : 'EMPTY';
                    menu.appendChild(title);
                    function mi(t, fn) {
                        let d = document.createElement('div');
                        d.className = 'mi';
                        d.textContent = t;
                        d.onclick = () => {
                            menu.classList.remove('show');
                            fn()
                        }
                        ;
                        menu.appendChild(d)
                    }
                    if (h && h.clip) {
                        mi('COPY', () => clone(h.clip));
                        mi('STORE', () => bankClip(h.clip));
                        mi('CUT', () => cutClip(h.clip));
                        mi('DELETE', () => remove(h.clip));
                        mi('EXPORT PROJECT', exportProject);
                        mi('IMPORT PROJECT', requestImport)
                    } else {
                        let z = S.cam + 900;
                        if (S.view >= 3)
                            z = benchTime(e.clientX);
                        else if (S.view === 2) {
                            let P = outsideP()
                              , s = clamp((e.clientX - P.cx0) / (P.cx1 - P.cx0), 0, 1);
                            z = P.front + s * P.span;
                        }
                        mi('ADD CLIP', () => addClip(magneticSnap(z, S.active), S.active));
                        mi('EXPORT EDL', exportEDL);
                        mi('EXPORT PROJECT', exportProject);
                        mi('IMPORT PROJECT', requestImport);
                        mi('EXPORT PNG', exportSnapshot)
                    }
                    menu.style.left = clamp(e.clientX, 4, W - 230) + 'px';
                    menu.style.top = clamp(e.clientY, 4, H - 220) + 'px';
                    menu.classList.add('show')
                }
                );

                canvas.addEventListener('wheel', e => {
                    e.preventDefault();
                    S.inertia = 0;
                    if (e.ctrlKey || e.metaKey)
                        S.zoom = clamp(S.zoom - e.deltaY * .001, .22, 1.3);
                    else if (e.altKey)
                        S.roll += e.deltaY * .006;
                    else {
                        S.cam += e.deltaY * 1.5;
                        S.vel = 0;
                    }
                }
                , {
                    passive: false
                });

                // KEYBOARD INSTRUMENT 
                window.addEventListener('keydown', e => {
                    let k = e.key.toLowerCase();
                    if (k === ' ') {
                        e.preventDefault();
                        S.play = !S.play;
                        S.playRate = 1;
                        playBtn.classList.toggle('on', S.play)
                    }

                    // J-K-L NLE Transport Controls
                    if (k === 'j') {
                        e.preventDefault();
                        S.playRate = (S.play && S.playRate < 0) ? Math.max(-4, S.playRate * 2) : -1;
                        S.play = true;
                        playBtn.classList.add('on');
                        toast('REV ' + Math.abs(S.playRate) + 'X');
                    }
                    if (k === 'k') {
                        e.preventDefault();
                        S.play = false;
                        S.playRate = 1;
                        S.inertia = 0;
                        playBtn.classList.remove('on');
                        toast('PAUSE');
                    }
                    if (k === 'l') {
                        e.preventDefault();
                        S.playRate = (S.play && S.playRate > 0) ? Math.min(4, S.playRate * 2) : 1;
                        S.play = true;
                        playBtn.classList.add('on');
                        toast('FWD ' + S.playRate + 'X');
                    }

                    // Live VJ Sampler Keys
                    if (['1', '2', '3', '4'].includes(e.key)) {
                        e.preventDefault();
                        let tr = parseInt(e.key) - 1;
                        S.active = tr;
                        drawTracks();
                        if (e.shiftKey) {
                            addClip(qsnap(S.cam), tr);
                            tone(800, 0.05, 0.01, 'square');
                            toast('PUNCH IN ' + NAMES[tr]);
                        } else if (S.selected) {
                            S.selected.track = S.active;
                            save();
                        }
                    }

                    // Quick tool switching
                    if (k === 'q')
                        setTool('MOVE');
                    if (k === 'w')
                        setTool('TRIM');
                    if (k === 'e')
                        setTool('SPLIT');

                    if (k === 'i') {
                        e.preventDefault();
                        requestImport()
                    }
                    if (k === 'o') {
                        e.preventDefault();
                        exportProject()
                    }
                    if (k === 'p') {
                        e.preventDefault();
                        exportSnapshot()
                    }
                    if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        if (S.selected)
                            moveClip(S.selected, -step() * (e.shiftKey ? 4 : 1), 0);
                        else
                            S.cam -= step() * (e.shiftKey ? 4 : 1);
                    }
                    if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        if (S.selected)
                            moveClip(S.selected, step() * (e.shiftKey ? 4 : 1), 0);
                        else
                            S.cam += step() * (e.shiftKey ? 4 : 1);
                    }
                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        if (S.selected)
                            moveClip(S.selected, 0, -1)
                    }
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        if (S.selected)
                            moveClip(S.selected, 0, 1)
                    }
                    if (e.key === '[') {
                        if (S.selected) {
                            S.selected.rot -= Math.PI / 2;
                            select(S.selected);
                            save()
                        }
                    }
                    if (e.key === ']') {
                        if (S.selected) {
                            S.selected.rot += Math.PI / 2;
                            select(S.selected);
                            save()
                        }
                    }
                    if (e.key === '.' || e.key === ',')
                        cycleUnit();
                    if (k === 'v')
                        setView((S.view + 1) % VIEWS.length);
                    if (k === 'a')
                        addClip();
                    if (k === 'x')
                        cutClip(S.selected);
                    if (k === 'b')
                        bankClip(S.selected);
                    if (k === 'n')
                        exportEDL();
                    if (e.key === 'Delete' || e.key === 'Backspace')
                        remove(S.selected)
                }
                );

                function moveClip(c, dt=0, dtr=0) {
                    if (!isClip(c) || c.locked)
                        return;
                    c.start = magneticSnap(c.start + dt, c.track, c.id);
                    c.track = norm(c.track + dtr);
                    S.active = c.track;
                    tick('snap');
                    select(c, 'key');
                    save()
                }

                window.addEventListener('resize', resize);
                viewBtn.onclick = () => setView((S.view + 1) % VIEWS.length);
                addBtn.onclick = () => addClip();
                cutBtn.onclick = () => cutClip(S.selected);
                bankBtn.onclick = () => bankClip(S.selected);
                edlBtn.onclick = exportEDL;
                importBtn.onclick = requestImport;
                exportBtn.onclick = exportProject;
                resetBtn.onclick = () => {
                    localStorage.removeItem(SAVE);
                    seed();
                    select(null);
                    save();
                    toast('RESET')
                }
                ;
                playBtn.onclick = () => {
                    S.play = !S.play;
                    S.playRate = 1;
                    playBtn.classList.toggle('on', S.play)
                }
                ;
                snapBtn.onclick = () => {
                    S.snap = !S.snap;
                    snapBtn.classList.toggle('on', S.snap)
                }
                ;
                backBtn.onclick = () => {
                    S.cam -= SNAP * 4;
                    S.inertia = -20;
                }
                ;
                fwdBtn.onclick = () => {
                    S.cam += SNAP * 4;
                    S.inertia = 20;
                }
                ;
                zoomOutBtn.onclick = () => S.zoom = clamp(S.zoom - .08, .22, 1.3);
                zoomInBtn.onclick = () => S.zoom = clamp(S.zoom + .08, .22, 1.3);
                dock.querySelectorAll('button').forEach(b => b.onclick = () => setTool(b.dataset.tool));
                document.addEventListener('pointerdown', e => {
                    if (!menu.contains(e.target))
                        menu.classList.remove('show')
                }
                );

                if (!load())
                    seed();
                resize();
                drawTracks();
                drawStore();
                drawOps();
                select(clips.find(c => c.id === 'SC-034') || clips[0] || null);
                _wakeBus(); // Start render loop

                // ═══════════════════════════════════════════════════
                // ── ATO-BUS RECEIVER SHIM ──
                // Receives frame data from parent harness via
                // postMessage. Caches thumbnails. Patches clip
                // rendering to show frame content on clip faces.
                // ═══════════════════════════════════════════════════
                const _BUSRX_ACTIVE = (window.parent !== window);
                const _busFrameCache = new Map(); // index → { grid, canvas, version }
                let _busGridW = 128, _busGridH = 96;
                let _busFrameTotal = 0;

                // Shade palette matching icaro-pro BEFLIX engine
                const _BUS_SHADES = [
                    [255,255,255], [221,221,221], [187,187,187], [153,153,153],
                    [119,119,119], [85,85,85], [51,51,51], [0,0,0]
                ];

                function _busRenderThumb(gridData, gw, gh) {
                    const c = document.createElement('canvas'); c.width = gw; c.height = gh;
                    const x = c.getContext('2d');
                    const id = x.createImageData(gw, gh);
                    for (let i = 0; i < gridData.length; i++) {
                        const s = _BUS_SHADES[gridData[i] || 0];
                        id.data[i*4] = s[0]; id.data[i*4+1] = s[1]; id.data[i*4+2] = s[2]; id.data[i*4+3] = 255;
                    }
                    x.putImageData(id, 0, 0);
                    return c;
                }

                function _busSeedFromFrames(total) {
                    // Create one clip per frame, distributed across tracks
                    clips.length = 0;
                    nextId = 1;
                    for (let i = 0; i < total; i++) {
                        const track = i % 4;
                        const start = i * SNAP * 2; // Each frame = 2 SNAP units of duration
                        const dur = SNAP * 2;
                        const c = mk(start, dur, track);
                        c._frameIndex = i; // Map clip to source frame
                        clips.push(c);
                    }
                    select(clips[0] || null, 'bus-sync');
                    drawTracks();
                    drawOps();
                    toast(total + ' FRAMES RECEIVED');
                }

                // Rendering context: which clip is currently being drawn
                let _busCurrentClip = null;

                // Patch hatch() to draw frame thumbnails on clip faces
                // THROTTLED: _busCurrentClip is only set on the NEAREST cell per clip
                // so thumbnail drawImage+clip happens at most ONCE per clip, not 200× per clip
                const _origHatch = hatch;
                hatch = function(p, kind, b) {
                    if (_busCurrentClip && _busCurrentClip._frameIndex !== undefined) {
                        const entry = _busFrameCache.get(_busCurrentClip._frameIndex);
                        if (entry && entry.canvas) {
                            ctx.save();
                            ctx.clip(p);
                            ctx.globalAlpha = 0.85;
                            ctx.drawImage(entry.canvas, b.x, b.y, b.w, b.h);
                            ctx.restore();
                            return;
                        }
                    }
                    _origHatch(p, kind, b);
                };

                // Patch into the rendering pipeline to set _busCurrentClip
                // We intercept every .forEach call on sorted clip arrays
                // by wrapping the main tube/bench render functions
                let _busThumbOverlayEnabled = true;

                window.addEventListener('message', e => {
                    const d = e.data;
                    if (!d || !d.type) return;
                    _perf.busMsg++;
                    _wakeBus(); // Any bus message requires re-render

                    if (d.type === 'FRAMES_SYNC') {
                        _busGridW = d.gridW || 128;
                        _busGridH = d.gridH || 96;
                        _busFrameTotal = d.total;

                        // Process thumbnails in async batches to avoid freezing
                        // (keeps reel animation spinning during load)
                        const BATCH = 8;
                        let idx = 0;
                        function processBatch() {
                            const end = Math.min(idx + BATCH, d.frames.length);
                            for (let i = idx; i < end; i++) {
                                const f = d.frames[i];
                                const existing = _busFrameCache.get(f.index);
                                if (!existing || existing.version !== f.version) {
                                    _busFrameCache.set(f.index, {
                                        grid: f.grid,
                                        canvas: _busRenderThumb(f.grid, _busGridW, _busGridH),
                                        version: f.version
                                    });
                                }
                            }
                            idx = end;
                            if (idx < d.frames.length) {
                                setTimeout(processBatch, 0); // yield to keep UI alive
                            } else {
                                // All thumbnails processed — now seed clips
                                const hasFrameMapped = clips.some(c => c._frameIndex !== undefined);
                                if (!hasFrameMapped || clips.length === 0) {
                                    _busSeedFromFrames(d.total);
                                } else if (d.total !== clips.filter(c => c._frameIndex !== undefined).length) {
                                    _busSeedFromFrames(d.total);
                                }
                                _wakeBus(); // trigger re-render with new thumbs
                                // Dismiss loading overlay if engine is done
                                if (_busRipDone) _dismissRipOverlay();
                            }
                        }
                        processBatch();

                        // Navigate camera to cursor position
                        if (typeof d.cursor === 'number') {
                            S.cam = d.cursor * SNAP * 2;
                        }
                    }

                    if (d.type === 'CURSOR_MOVE') {
                        if (typeof d.cursor === 'number') {
                            S.cam = d.cursor * SNAP * 2;
                        }
                    }

                    if (d.type === 'PLAY_SYNC') {
                        // Sync tunnel play state with icaro-pro
                        if (d.playing && !S.play) {
                            S.play = true;
                            S.playRate = 1;
                            statusEl.textContent = 'PLAYING';
                        } else if (!d.playing && S.play) {
                            S.play = false;
                            statusEl.textContent = 'IDLE';
                        }
                    }

                    if (d.type === 'VIEW_CYCLE') {
                        // Harness requested view change
                        if (typeof d.view === 'number') {
                            S.view = d.view % VIEWS.length;
                        }
                    }

                    // ── LOADING OVERLAY ──
                    if (d.type === 'RIP_PROGRESS') {
                        const ov = document.getElementById('rip-overlay');
                        const msg = document.getElementById('rip-msg');
                        const cnt = document.getElementById('rip-count');
                        const bar = document.getElementById('rip-bar');
                        if (d.phase === 'START') {
                            ov.style.display = 'flex';
                            msg.textContent = 'LOADING FRAMES';
                            cnt.textContent = '0 / ' + d.total;
                            bar.style.width = '0%';
                            _busRipDone = false;
                            _startReelAnim();
                        } else if (d.phase === 'CHUNK') {
                            msg.textContent = 'RIPPING ' + d.done + '/' + d.total;
                            cnt.textContent = d.done + ' / ' + d.total;
                            bar.style.width = Math.round((d.done / d.total) * 100) + '%';
                        } else if (d.phase === 'DONE') {
                            // Engine is done ripping — but tunnel still processing thumbnails
                            // Don't dismiss yet; show "PROCESSING" until FRAMES_SYNC completes
                            msg.textContent = 'PROCESSING';
                            cnt.textContent = d.total + ' FRAMES';
                            bar.style.width = '100%';
                            _busRipDone = true;
                            // The thumbnail batch handler will call _dismissRipOverlay()
                        }
                    }
                });

                // ── LOADING OVERLAY STATE ──
                let _busRipDone = false;
                function _dismissRipOverlay() {
                    const ov = document.getElementById('rip-overlay');
                    const msg = document.getElementById('rip-msg');
                    if (ov && ov.style.display !== 'none') {
                        msg.textContent = 'READY';
                        _stopReelAnim();
                        setTimeout(() => { ov.style.display = 'none'; }, 800);
                    }
                }

                // ── SPINNING FILM REEL ANIMATION ──
                let _reelAnim = null, _reelFrame = 0;
                function _startReelAnim() {
                    if (_reelAnim) return;
                    _reelFrame = 0;
                    _drawReel();
                }
                function _stopReelAnim() {
                    if (_reelAnim) { cancelAnimationFrame(_reelAnim); _reelAnim = null; }
                }
                function _drawReel() {
                    const cv = document.getElementById('rip-reel');
                    if (!cv) return;
                    const c = cv.getContext('2d'), sz = 160, cx = sz / 2, cy = sz / 2;
                    c.clearRect(0, 0, sz, sz);
                    _reelFrame++;

                    // Outer ring
                    c.strokeStyle = '#333'; c.lineWidth = 3;
                    c.beginPath(); c.arc(cx, cy, 60, 0, Math.PI * 2); c.stroke();

                    // Hub
                    c.beginPath(); c.arc(cx, cy, 16, 0, Math.PI * 2);
                    c.strokeStyle = '#444'; c.stroke();
                    c.fillStyle = '#222'; c.fill();

                    // Spokes (rotating)
                    const ang = (_reelFrame * 4) * Math.PI / 180;
                    c.strokeStyle = '#555'; c.lineWidth = 3;
                    for (let i = 0; i < 6; i++) {
                        const a = ang + (i * Math.PI / 3);
                        c.beginPath();
                        c.moveTo(cx + Math.cos(a) * 16, cy + Math.sin(a) * 16);
                        c.lineTo(cx + Math.cos(a) * 55, cy + Math.sin(a) * 55);
                        c.stroke();
                    }

                    // Center dot (pulsing)
                    c.fillStyle = '#ef4444';
                    c.globalAlpha = 0.5 + 0.4 * Math.sin(_reelFrame * 0.12);
                    c.beginPath(); c.arc(cx, cy, 5, 0, Math.PI * 2); c.fill();
                    c.globalAlpha = 1;

                    // Sprocket holes
                    c.fillStyle = '#1a1a1a';
                    for (let i = 0; i < 12; i++) {
                        const a = ang * 0.5 + (i * Math.PI / 6);
                        c.beginPath();
                        c.arc(cx + Math.cos(a) * 68, cy + Math.sin(a) * 68, 4, 0, Math.PI * 2);
                        c.fill();
                    }

                    _reelAnim = requestAnimationFrame(_drawReel);
                }

                // When a clip is selected, tell engine to navigate to that frame
                const _origSelect = select;
                select = function(c, reason) {
                    _origSelect(c, reason);
                    if (_BUSRX_ACTIVE && c) {
                        if (c._frameIndex !== undefined) {
                            window.parent.postMessage({
                                type: 'GOTO_FRAME',
                                cursor: c._frameIndex
                            }, '*');
                        }
                        // Broadcast clip info to harness for bus strip display
                        window.parent.postMessage({
                            type: 'CLIP_SELECT',
                            name: c.name || ('SC-' + String(c.id).padStart(3,'0')),
                            track: c.track,
                            start: c.start,
                            dur: c.dur
                        }, '*');
                    }
                };

                // Expose bus thumbnail lookup for rendering
                window._busGetThumb = function(frameIndex) {
                    const entry = _busFrameCache.get(frameIndex);
                    return entry ? entry.canvas : null;
                };

                if (_BUSRX_ACTIVE) {
                    console.log('[ATO-BUS] Receiver shim active — listening for frame data');
                }

            }
            )();
    </script>
</body>

</html>
