                    document.body.appendChild(area);
                    area.focus();
                    area.select();
                    document.execCommand('copy');
                    document.body.removeChild(area);
                }
                    ;
                const confirmCopy = () => {
                    if (!button)
                        return;
                    const old = button.innerHTML;
                    button.innerHTML = '<i data-lucide="check" class="w-4 h-4 mr-2"></i>Copied';
                    lucide.createIcons();
                    setTimeout(() => {
                        button.innerHTML = old;
                        lucide.createIcons();
                    }
                        , 1400);
                }
                    ;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(confirmCopy).catch(() => {
                        fallback();
                        confirmCopy();
                    }
                    );
                } else {
                    fallback();
                    confirmCopy();
                }

            <div class="absolute inset-0 backface-hidden rotate-y-180 rounded-2xl border-[3px] border-black p-3 flex flex-col justify-between bg-white shadow-md overflow-hidden">
              <div class="absolute -right-5 -top-5 opacity-[0.05]"><i data-lucide="${s.icon}" class="w-24 h-24"></i></div>
              <div class="flex justify-between items-start relative z-10"><div class="flex items-center gap-1.5"><i data-lucide="${s.icon}" class="w-4 h-4" style="color:${s.color}"></i><span class="text-[8px] font-black uppercase tracking-widest font-mono" style="color:${s.color}">${s.label}</span></div><span class="text-[8px] font-black font-mono opacity-35">${item.id.toUpperCase()}</span></div>
              <div class="relative z-10 text-center px-1">
                <h3 class="font-serif font-black uppercase text-[17px] leading-[0.95] line-clamp-3">${this.esc(item.title)}</h3>
                <div class="text-[9px] mt-2 uppercase font-mono font-bold opacity-45">${s.role}</div>
              </div>
              <div class="relative z-10 border-t-2 border-black/10 pt-2"><p class="text-[10px] leading-tight text-center opacity-70 line-clamp-3">${this.esc(item.desc)}</p><div class="text-[8px] font-black uppercase font-mono opacity-35 mt-2 text-center">Tap to redraw</div></div>
            </div>
          </div>
        </div>`;
            },
            wildcardHTML() {
                return `<div class="space-y-3 pb-2">
          ${['pressure', 'precedent', 'func', 'form'].map(cat => {
                    const s = SUITS[cat];
                    return `<div class="bg-white rounded-2xl border-[3px] border-black p-4 shadow-sm">
              <div class="flex items-center justify-between mb-2"><label class="text-[10px] font-black uppercase tracking-widest font-mono" style="color:${s.color}">${s.label} / ${s.role}</label><i data-lucide="${s.icon}" class="w-4 h-4" style="color:${s.color}"></i></div>
              <input id="wc-${cat}-title" class="w-full border-2 border-black rounded-lg p-2 text-sm font-bold mb-2 focus:outline-none focus:border-[#0E6B66]" placeholder="${s.label} title" />
              <textarea id="wc-${cat}-desc" class="w-full border-2 border-black rounded-lg p-2 text-xs h-16 resize-none focus:outline-none focus:border-[#0E6B66]" placeholder="One grounded sentence describing this ${s.role.toLowerCase()}."></textarea>
            </div>`;
                }
                ).join('')}
        </div>`;
            },

            resultHTML() {
                const p = this.currentConcept;
                if (!p)
                    return '';
                return `<div class="h-full flex flex-col bg-[#F5F1E6] overflow-hidden">
          <div class="shrink-0 p-4 bg-white border-b-[3px] border-black flex justify-between items-center">
            <button onclick="app.navigate('play')" class="text-[10px] font-black uppercase font-mono flex items-center"><i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i>Back</button>
            <button onclick="app.navigate('detail')" class="text-[10px] font-black uppercase font-mono flex items-center">Workspace<i data-lucide="chevron-right" class="w-4 h-4 ml-1"></i></button>
          </div>
          <div class="flex-1 scrollable no-scrollbar p-5 pb-8">
            <div class="text-center mb-6">
              <div class="text-[10px] font-black uppercase tracking-[0.28em] font-mono opacity-50 mb-4">Operational Artifact</div>
              <h1 class="text-4xl sm:text-5xl font-black uppercase leading-[0.88] font-serif">${this.esc(p.title)}</h1>
              <div class="flex justify-center gap-2 flex-wrap mt-4">${p.tags.map(t => `<span class="text-[9px] font-black uppercase font-mono bg-white border-2 border-black rounded-full px-2 py-1">${t}</span>`).join('')}</div>
            </div>
            <div class="border-[3px] border-black bg-white rounded-2xl p-5 shadow-[5px_5px_0_#111] mb-5">
              <div class="text-[10px] font-black uppercase tracking-widest font-mono text-[#B23A2E] mb-3">Synthesis Formula</div>
              <p class="text-lg leading-snug font-serif font-bold">${this.esc(p.concept)}</p>
            </div>
            ${this.matrixHTML(p.cards)}
            <button onclick="app.navigate('detail')" class="mt-5 w-full py-4 border-[3px] border-black bg-black text-[#F5F1E6] rounded-xl font-black uppercase font-mono shadow-[0_5px_0_#E3A21A] active:translate-y-[2px] active:shadow-none">Open Build Workspace</button>
          </div>
        </div>`;
            },
            matrixHTML(cards) {
                return `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          ${['pressure', 'precedent', 'func', 'form'].map(cat => {
                    const s = SUITS[cat]
                        , item = cards[cat];
                    return `<div class="border-[3px] border-black bg-white rounded-2xl p-3"><div class="flex justify-between items-center mb-2"><div class="text-[9px] font-black uppercase tracking-widest font-mono" style="color:${s.color}">${s.label} / ${s.role}</div><div class="text-[8px] font-black font-mono opacity-35">${item.id?.toUpperCase() || 'WILD'}</div></div><h3 class="font-serif uppercase font-black text-lg leading-none mb-2">${this.esc(item.title)}</h3><p class="text-[11px] leading-tight opacity-70">${this.esc(item.desc)}</p></div>`;
                }
                ).join('')}
        </div>`;
            },

            starsHTML(rating, id) {
                return [1, 2, 3, 4, 5].map(n => `<button onclick="app.rate('${id}', ${n})" class="p-0.5"><svg class="w-5 h-5 ${n <= rating ? 'fill-[#E3A21A] text-[#E3A21A]' : 'fill-transparent text-black/25'}" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></button>`).join('');
            },
            detailHTML() {
                const p = this.currentConcept;
                if (!p)
                    return '';
                return `<div class="h-full flex flex-col bg-[#E5E0D8] overflow-hidden">
          <div class="shrink-0 p-3 bg-[#F5F1E6] border-b-[3px] border-black flex justify-between items-center">
            <button onclick="app.navigate('archive')" class="text-[10px] font-black uppercase font-mono flex items-center"><i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i>Archive</button>
            <button onclick="app.deleteConcept('${p.id}')" class="opacity-55 hover:opacity-100 hover:text-[#B23A2E]"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </div>
          <div class="flex-1 scrollable no-scrollbar p-4 pb-8">
            <h1 class="font-serif font-black uppercase text-4xl leading-[0.88] mb-3">${this.esc(p.title)}</h1>
            <div class="flex items-center gap-3 mb-4"><div class="flex">${this.starsHTML(p.rating, p.id)}</div><span class="text-[10px] font-mono uppercase opacity-50">Viability</span></div>
            <div class="border-l-[5px] border-[#0E6B66] pl-4 mb-5"><p class="font-serif text-sm font-bold leading-relaxed">${this.esc(p.concept)}</p></div>
            ${this.matrixHTML(p.cards)}
            <div class="mt-5">
              <div class="text-[10px] font-black uppercase tracking-widest font-mono opacity-55 mb-2">Studio Scratchpad</div>
              <textarea oninput="app.updateNotes(this.value)" class="w-full h-32 border-[3px] border-black rounded-2xl p-3 font-mono text-xs resize-none focus:outline-none focus:border-[#E3A21A] bg-white shadow-[3px_3px_0_#111]" placeholder="Add build notes, site, materials, course lens, prototype constraints...">${this.esc(p.notes || '')}</textarea>
            </div>
            <div class="mt-5">
              <div class="text-[10px] font-black uppercase tracking-widest font-mono opacity-55 mb-3">Deliverable Forge</div>
              <div class="grid grid-cols-2 gap-2">
                ${[['brief', 'file-text', 'Forge Brief', 'Theory + concept'], ['artifact', 'box', 'Artifact Spec', 'Build document'], ['prototype', 'code', 'HTML Prototype', 'Single-file app'], ['foraging', 'search', 'Extension Pack', 'More cards']].map(([kind, icon, title, sub]) => `<button onclick="app.openPrompt('${kind}')" class="text-left bg-white border-[2px] border-black rounded-xl p-3 hover:bg-black hover:text-white transition-colors"><i data-lucide="${icon}" class="w-4 h-4 mb-2"></i><div class="text-[10px] font-black uppercase font-mono">${title}</div><div class="text-[8px] font-mono opacity-55 mt-1">${sub}</div></button>`).join('')}
              </div>
            </div>
          </div>
          ${this.promptModalHTML()}
        </div>`;
            },

            promptModalHTML() {
                if (!this.previewPrompt)
                    return '';
                return `<div class="absolute inset-0 z-[80] bg-black/75 backdrop-blur-sm flex flex-col animate-[fadeIn_0.18s_ease-out]">
          <div class="flex-1" onclick="app.previewPrompt=null;app.render()"></div>
          <div class="h-[86%] bg-[#F5F1E6] border-t-[4px] border-black rounded-t-3xl overflow-hidden flex flex-col">
            <div class="shrink-0 p-4 bg-white border-b-[3px] border-black flex justify-between items-center"><h3 class="text-sm font-black uppercase font-mono flex items-center"><i data-lucide="terminal" class="w-4 h-4 mr-2"></i>${this.esc(this.previewPrompt.title)}</h3><button onclick="app.previewPrompt=null;app.render()"><i data-lucide="x" class="w-5 h-5"></i></button></div>
            <div class="flex-1 p-4 min-h-0"><textarea id="prompt-text" class="w-full h-full bg-white border-2 border-dashed border-gray-400 rounded-xl p-4 text-xs leading-relaxed font-mono resize-none focus:outline-none focus:border-[#0E6B66]">${this.esc(this.previewPrompt.text)}</textarea></div>
            <div class="shrink-0 p-4 bg-white border-t-[3px] border-black"><button onclick="app.copyText(document.getElementById('prompt-text').value, this)" class="w-full py-4 border-[3px] border-black rounded-xl bg-[#E3A21A] font-black uppercase font-mono flex justify-center items-center shadow-[0_4px_0_#111] active:translate-y-[2px] active:shadow-none"><i data-lucide="copy" class="w-4 h-4 mr-2"></i>Copy Prompt</button></div>
          </div>
        </div>`;
            },

            archiveHTML() {
                const filtered = this.filteredSaved();
                const avg = this.saved.length ? (this.saved.reduce((a, b) => a + (b.rating || 0), 0) / this.saved.length).toFixed(1) : '0.0';
                return `<div class="h-full flex flex-col bg-[#F5F1E6] overflow-hidden">
          <div class="shrink-0 bg-white border-b-[3px] border-black p-4">
            <div class="flex justify-between items-start mb-4"><div><h1 class="text-4xl font-serif uppercase font-black leading-none text-[#B23A2E]">Archive</h1><div class="text-[10px] font-black uppercase font-mono opacity-55 mt-1">Saved transformation protocols</div></div><button onclick="app.printDeck()" class="border-2 border-black rounded-full p-2"><i data-lucide="printer" class="w-4 h-4"></i></button></div>
            <div class="grid grid-cols-2 gap-2 mb-3"><div class="border-2 border-black rounded-xl p-2 text-center bg-[#F5F1E6]"><div class="text-[8px] font-black uppercase font-mono opacity-55">Logs</div><div class="font-serif font-black text-2xl">${this.saved.length}</div></div><div class="border-2 border-black rounded-xl p-2 text-center bg-[#F5F1E6]"><div class="text-[8px] font-black uppercase font-mono opacity-55">Avg</div><div class="font-serif font-black text-2xl">${avg}</div></div></div>
            <div class="relative"><i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 opacity-40"></i><input oninput="app.search=this.value;app.render()" value="${this.esc(this.search)}" placeholder="Filter concepts..." class="w-full border-2 border-black rounded-xl py-2 pl-9 pr-3 font-mono text-xs focus:outline-none" /></div>
          </div>
          <div class="flex-1 scrollable no-scrollbar p-4 space-y-3 pb-8">
            ${filtered.length ? filtered.map(item => this.archiveItemHTML(item)).join('') : '<div class="border-2 border-dashed border-black/30 rounded-2xl p-10 text-center font-mono font-black uppercase opacity-35">Empty stratum</div>'}
          </div>
        </div>`;
            },
            filteredSaved() {
                const q = this.search.trim().toLowerCase();
                if (!q)
                    return this.saved;
                return this.saved.filter(item => [item.title, item.concept, item.cards?.pressure?.title, item.cards?.precedent?.title, item.cards?.func?.title, item.cards?.form?.title].join(' ').toLowerCase().includes(q));
            },
            archiveItemHTML(item) {
                return `<button onclick="app.currentConcept=app.saved.find(x=>x.id==='${item.id}');app.navigate('detail')" class="w-full text-left bg-white border-[3px] border-black rounded-2xl p-3 hover:bg-[#E5E0D8] active:scale-[0.99] transition-all">
          <div class="flex justify-between gap-3"><div class="min-w-0"><h3 class="font-serif font-black uppercase text-lg leading-none truncate">${this.esc(item.title)}</h3><div class="text-[10px] font-mono opacity-55 mt-1 truncate">${this.esc(item.cards.form.title)} · ${this.esc(item.cards.pressure.title)}</div></div><div class="text-right shrink-0"><div class="text-[9px] font-mono opacity-45">${item.date}</div><div class="text-[10px] font-mono font-black text-[#E3A21A]">${'★'.repeat(item.rating || 0)}${'☆'.repeat(5 - (item.rating || 0))}</div></div></div>
        </button>`;
            },

            render() {
                const root = document.getElementById('app-root');
                const nav = document.getElementById('nav-root');
                if (this.view === 'onboarding')
                    root.innerHTML = this.onboardingHTML();
                if (this.view === 'play')
                    root.innerHTML = this.playHTML();
                if (this.view === 'result')
                    root.innerHTML = this.resultHTML();
                if (this.view === 'archive')
                    root.innerHTML = this.archiveHTML();
                if (this.view === 'detail')
                    root.innerHTML = this.detailHTML();
                nav.innerHTML = this.navHTML();
                lucide.createIcons();
            }
        };

        window.app = app;
        window.addEventListener('load', () => app.init());
    </script>
</body>

</html>
