<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Taxonomy Phase Space matrix</title>
<style>
  :root {
    --bg: #F9F9F7;
    --fg: #1E1E1E;
    --grid: rgba(30, 30, 30, 0.08);
    --hot: #E61E0A;

    /* Taxonomy Colors */
    --c3: rgba(196, 212, 196, 0.85); /* Possible */
    --c2: rgba(154, 192, 148, 0.85); /* Plausible */
    --c1: rgba(111, 205, 75,  0.85); /* Probable */
    --c0: rgba(190, 235, 45,  0.88); /* Preferable */
  }

  * { box-sizing: border-box; border-radius: 0 !important; }

  html, body {
    margin: 0; width: 100%; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--fg);
    font-family: 'Courier New', Courier, ui-monospace, monospace;
    user-select: none; touch-action: none;
  }

  /* Structural Grid Background */
  body::before {
    content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(var(--grid) 1px, transparent 1px), 
                      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px; z-index: 0; opacity: 0.5; pointer-events: none;
  }

  #app { position: fixed; inset: 0; display: flex; flex-direction: column; z-index: 1; }

  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 24px; border-bottom: 2px solid var(--fg);
    background: var(--bg); pointer-events: auto; z-index: 10;
  }
  
  header h1 { margin: 0; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  header h1 strong { color: var(--hot); }

  .controls { display: flex; gap: 0; }
  button {
    background: transparent; color: var(--fg); border: 2px solid var(--fg); border-left: none;
    height: 36px; padding: 0 16px; font: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: 0.1s;
  }
  button:first-child { border-left: 2px solid var(--fg); }
  button[data-on="true"] { background: var(--fg); color: var(--bg); }

  main { position: relative; flex: 1; cursor: crosshair; }

  svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; overflow: visible; }
  path { transition: stroke-width 0.1s, stroke 0.1s; }
  path:hover { stroke: var(--hot) !important; stroke-width: 3 !important; }

  /* Crosshair UI */
  #xh { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--hot); pointer-events: none; transform: translateX(-50%); }
  #yv { position: absolute; left: 0; right: 0; height: 2px; background: var(--hot); pointer-events: none; transform: translateY(-50%); }
  #reticle { position: absolute; width: 16px; height: 16px; border: 2px solid var(--hot); border-radius: 50% !important; transform: translate(-50%, -50%); pointer-events: none; background: transparent; }

  /* Corner Labels */
  .corner { position: absolute; font-size: 12px; font-weight: 700; color: rgba(30,30,30,0.3); pointer-events: none; letter-spacing: 0.1em; text-transform: uppercase; }
  .tl { top: 24px; left: 24px; }
  .tr { top: 24px; right: 24px; text-align: right; }
  .bl { bottom: 24px; left: 24px; }
  .br { bottom: 24px; right: 24px; text-align: right; }
  .corner strong { display: block; font-size: 20px; color: rgba(30,30,30,0.15); margin-bottom: 2px; }

  /* Readout Panel */
  #readout {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; border: 2px solid var(--fg); background: var(--bg); font-size: 13px; z-index: 10;
    pointer-events: none; box-shadow: 6px 6px 0 rgba(0,0,0,0.1);
  }
  .cell { padding: 12px 16px; border-right: 1px solid var(--fg); text-transform: uppercase; }
  .cell:last-child { border-right: none; }
  .cell b { display: block; margin-top: 4px; font-size: 16px; font-weight: 700; color: var(--fg); }
  .cell.lock b { color: var(--hot); }

</style>
</head>
<body>

<div id="app">
  <header>
    <h1><strong>Orthogonal Phase Space</strong> / Slices as Substrate</h1>
    <div class="controls">
      <button id="sound">Audio</button>
      <button id="loop">Auto</button>
      <button id="reset">Reset</button>
    </div>
  </header>

  <main id="field">
    <div class="corner tl"><strong>0, 0</strong> Discrete Radial<br>Islands</div>
    <div class="corner tr"><strong>1, 0</strong> Discrete Rectilinear<br>Blocks</div>
    <div class="corner bl"><strong>0, 1</strong> Superimposed<br>Concentric Bullseye</div>
    <div class="corner br"><strong>1, 1</strong> Superimposed<br>Stepped Ziggurat</div>

    <svg id="svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet"></svg>
    
    <div id="xh"></div>
    <div id="yv"></div>
    <div id="reticle"></div>

    <div id="readout">
      <div class="cell">Morph X <b>Circle ↔ Strip</b></div>
      <div class="cell">Topology Y <b>Separate ↔ Superimposed</b></div>
      <div class="cell lock">Focus <b id="rFocus">--</b></div>
    </div>
  </main>
</div>

<script>
(() => {
  const svg = document.getElementById('svg');
  const field = document.getElementById('field');
  const xh = document.getElementById('xh');
  const yv = document.getElementById('yv');
  const reticle = document.getElementById('reticle');
  const rFocus = document.getElementById('rFocus');
  const soundBtn = document.getElementById('sound');
  const loopBtn = document.getElementById('loop');
  const resetBtn = document.getElementById('reset');

  const NS = 'http://www.w3.org/2000/svg';
  const TWO = Math.PI * 2;
  const L_END = 12; 

  const state = { x: 0.1, y: 0.1, dragging: false, loop: false, sound: false, baseN: 6, time: 0 };
  let w = 1200, h = 800;

  const TRACKS = [
    { id: 'possible', name: 'POSSIBLE', mult: 4, color: 'var(--c3)' },
    { id: 'plausible', name: 'PLAUSIBLE', mult: 3, color: 'var(--c2)' },
    { id: 'probable', name: 'PROBABLE', mult: 2, color: 'var(--c1)' },
    { id: 'preferable', name: 'PREFERABLE', mult: 1, color: 'var(--c0)' }
  ];

  const paths = [];
  let ctx, master, drone, overtone, filter;

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function ease(t) { return t<.5 ? 2*t*t : -1+(4-2*t)*t; }
  function polar(cx, cy, r, a) { return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }; }
  function mixPoint(A, B, t) { return { x: lerp(A.x, B.x, t), y: lerp(A.y, B.y, t) }; }
  function pathStr(pts) { return pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(2)+','+p.y.toFixed(2)).join(' ')+' Z'; }

  function initSVGs() {
    svg.innerHTML = '';
    paths.length = 0;
    
    // Reverse tracks so Preferable (smallest) draws last and sits on top
    const renderTracks = [...TRACKS].reverse();

    renderTracks.forEach(track => {
      const n_slices = state.baseN * track.mult;
      for (let i = 0; i < n_slices; i++) {
        const el = document.createElementNS(NS, 'path');
        el.setAttribute('fill', track.color);
        el.setAttribute('stroke', 'rgba(30,30,30,0.5)');
        el.setAttribute('stroke-width', '1');
        el.setAttribute('vector-effect', 'non-scaling-stroke');
        
        // Hover interactions
        el.addEventListener('pointerenter', () => rFocus.textContent = `${track.name} [${i+1}/${n_slices}]`);
        el.addEventListener('pointerleave', () => rFocus.textContent = '--');
        
        svg.appendChild(el);
        // Original track index (0=Possible...3=Preferable)
        const ti = TRACKS.findIndex(t => t.id === track.id);
        paths.push({ el, track, i, n_slices, ti });
      }
    });
  }

  function getPathD(p) {
    const topo = ease(state.y);
    const morph = ease(state.x);

    const scale = p.track.mult / 4;
    
    const centerPt = { x: 600, y: 400 };
    // 2x2 Grid for separate mode
    const isolatedPts = [
      { x: 300, y: 220 }, // Possible
      { x: 900, y: 220 }, // Plausible
      { x: 300, y: 580 }, // Probable
      { x: 900, y: 580 }  // Preferable
    ];

    const isolatedPt = isolatedPts[p.ti];

    const cx = lerp(isolatedPt.x, centerPt.x, topo);
    const cy = lerp(isolatedPt.y, centerPt.y, topo);

    const R_out = 150;
    const W_out = 320;
    const H_out = 140;

    const R = lerp(R_out, R_out * scale, topo);
    const W = lerp(W_out, W_out * Math.pow(scale, 0.8), topo); 

    const a0 = -Math.PI/2 + (p.i / p.n_slices) * TWO;
    const a1 = -Math.PI/2 + ((p.i + 1) / p.n_slices) * TWO;

    const slice_W = W / p.n_slices;
    const rx = (cx - W/2) + p.i * slice_W;
    const ry = cy - H_out/2;

    const pt_apex_L = { x: cx, y: cy };
    const pt_apex_R = { x: cx, y: cy };
    const pt_bl = { x: rx, y: ry + H_out };
    const pt_br = { x: rx + slice_W, y: ry + H_out };

    const P_BL = mixPoint(pt_apex_L, pt_bl, morph);
    const P_BR = mixPoint(pt_apex_R, pt_br, morph);

    const pt_arc0 = polar(cx, cy, R, a0);
    const pt_tl = { x: rx, y: ry };
    const pt_tr = { x: rx + slice_W, y: ry };

    const pts = [];
    pts.push(P_BL);
    pts.push(mixPoint(pt_arc0, pt_tl, morph));

    for (let j = 0; j <= L_END; j++) {
      const t = j / L_END;
      const arcPt = polar(cx, cy, R, lerp(a0, a1, t));
      const rectPt = mixPoint(pt_tl, pt_tr, t);
      pts.push(mixPoint(arcPt, rectPt, morph));
    }
    pts.push(P_BR);

    return pathStr(pts);
  }

  function draw() {
    paths.forEach(p => p.el.setAttribute('d', getPathD(p)));

    const fw = field.clientWidth;
    const fh = field.clientHeight;
    const px = state.x * fw;
    const py = state.y * fh;

    xh.style.left = px + 'px';
    yv.style.top = py + 'px';
    reticle.style.left = px + 'px';
    reticle.style.top = py + 'px';
  }

  function setFromPoint(e) {
    const r = field.getBoundingClientRect();
    state.x = clamp((e.clientX - r.left) / r.width, 0, 1);
    state.y = clamp((e.clientY - r.top) / r.height, 0, 1);
    updateAudio();
    draw();
  }

  // --- Audio Engine ---
  function setupAudio() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain();
    drone = ctx.createOscillator();
    overtone = ctx.createOscillator();
    filter = ctx.createBiquadFilter();

    drone.type = 'sawtooth';
    overtone.type = 'square';
    filter.type = 'lowpass';

    drone.frequency.value = 65.41; // C2
    overtone.frequency.value = 98.00; // G2
    filter.frequency.value = 200;

    master.gain.value = 0;

    drone.connect(filter);
    overtone.connect(filter);
    filter.connect(master);
    master.connect(ctx.destination);

    drone.start();
    overtone.start();
  }

  function updateAudio() {
    if (!ctx || !state.sound) return;
    const now = ctx.currentTime;
    
    // Topo (Y) opens up the filter (Nested = more complex harmonics)
    const fFreq = 150 + (state.y * 3500);
    filter.frequency.setTargetAtTime(fFreq, now, 0.05);

    // Morph (X) shifts pitch up an octave
    const basePitch = 65.41 * (1 + state.x);
    drone.frequency.setTargetAtTime(basePitch, now, 0.05);
    overtone.frequency.setTargetAtTime(basePitch * 1.5, now, 0.05);

    master.gain.setTargetAtTime(0.05 + (state.x * 0.02) + (state.y * 0.02), now, 0.05);
  }

  soundBtn.onclick = async () => {
    setupAudio();
    if (ctx.state === 'suspended') await ctx.resume();
    state.sound = !state.sound;
    soundBtn.dataset.on = state.sound;
    if (!state.sound && master) master.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
    else updateAudio();
  };

  loopBtn.onclick = () => {
    state.loop = !state.loop;
    loopBtn.dataset.on = state.loop;
  };

  resetBtn.onclick = () => {
    state.x = 0; state.y = 0; state.loop = false; loopBtn.dataset.on = false;
    updateAudio(); draw();
  };

  field.addEventListener('pointerdown', e => { state.dragging = true; setFromPoint(e); field.setPointerCapture(e.pointerId); });
  field.addEventListener('pointermove', e => { if (state.dragging) setFromPoint(e); });
  field.addEventListener('pointerup', e => { state.dragging = false; try{field.releasePointerCapture(e.pointerId);}catch(_){} });

  function tick(t) {
    if (state.loop && !state.dragging) {
      state.time = t * 0.0005;
      // Lissajous curve for wandering through the phase space
      state.x = (Math.sin(state.time * 1.3) + 1) / 2;
      state.y = (Math.sin(state.time * 0.8) + 1) / 2;
      updateAudio();
      draw();
    }
    requestAnimationFrame(tick);
  }

  initSVGs();
  draw();
  requestAnimationFrame(tick);

})();
</script>
</body>
</html>
