<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Diagram 4.7: Taxonomy of Futures Collapse</title>
    <style>
        :root {
            /* Typography & Clinical Diagrammatic Palette based on uploaded diagram */
            --bg: #FFFFFF;
            --fg: #1E1E1E;
            --faint: #D0D0CE;
            --ghost: #F0F0F0;

            /* Exact Taxonomy Diagram Colors (Stuart Candy / Dunne & Raby) */
            --c3: rgba(196, 212, 196, 0.9);
            /* Possible (Pale Sage) */
            --c2: rgba(154, 192, 148, 0.9);
            /* Plausible (Mid Green) */
            --c1: rgba(111, 205, 75, 0.9);
            /* Probable (Bright Green) */
            --c0: rgba(190, 235, 45, 1.0);
            /* Preferable (Yellow-Green) */

            --hot: #D50000;
            /* Stark red for active playhead/elements */
        }

        /* BRUTALIST RESET */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            border-radius: 0 !important;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Courier New', Courier, ui-monospace, monospace;
            overflow: hidden;
        }

        body {
            touch-action: none
        }

        #app {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-rows: auto 1fr auto;
            background: var(--bg);
        }

        header,
        footer {
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 16px max(16px, env(safe-area-inset-left)) 14px max(16px, env(safe-area-inset-right));
            pointer-events: none;
            border-bottom: 1px solid var(--fg);
        }

        footer {
            border-bottom: none;
            border-top: 1px solid var(--fg);
            padding-bottom: max(14px, env(safe-area-inset-bottom));
        }

        header {
            font-size: 12px;
            letter-spacing: .05em;
            text-transform: uppercase;
        }

        header strong {
            font-weight: 700;
        }

        .right {
            display: flex;
            align-items: center;
            gap: 0px;
            pointer-events: auto;
        }

        button {
            background: var(--bg);
            color: var(--fg);
            border: 1px solid var(--fg);
            min-height: 32px;
            padding: 0 16px;
            font: inherit;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            border-left: none;
        }

        button:first-child {
            border-left: 1px solid var(--fg);
        }

        button[data-on="true"] {
            background: var(--fg);
            color: var(--bg);
        }

        main {
            position: relative;
            min-height: 0
        }

        svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair
        }

        #readout {
            position: absolute;
            left: 24px;
            bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: -1px;
            z-index: 6;
            pointer-events: none;
            border: 1px solid var(--fg);
            background: var(--bg);
        }

        .cell {
            padding: 8px 12px;
            font-size: 11px;
            color: var(--fg);
            text-transform: uppercase;
            border-bottom: 1px solid var(--fg);
        }

        .cell:last-child {
            border-bottom: none;
        }

        .cell b {
            font-weight: 700;
            float: right;
            margin-left: 24px;
        }

        .cell.lock b {
            color: var(--hot)
        }

        .formula {
            font-weight: 700;
        }

        /* Mechanical Playhead */
        .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--hot);
            z-index: 4;
            pointer-events: none;
            transform: translateX(-50%);
        }

        .playhead::before {
            content: '';
            position: absolute;
            top: 0;
            left: -4px;
            width: 9px;
            height: 9px;
            background: var(--hot);
        }

        .playhead::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -4px;
            width: 9px;
            height: 9px;
            background: var(--hot);
        }

        @media(max-width:760px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px
            }

            #readout {
                bottom: 24px;
                left: 12px;
                right: 12px;
            }

            .formula {
                display: none
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <div><strong>Fig. 4.7: Taxonomy of Futures</strong> / Radial Sector Collapse</div>
            <div class="right">
                <button id="sound">Audio</button>
                <button id="loop">Auto</button>
                <button id="reset">Reset</button>
            </div>
        </header>

        <main id="field">
            <svg id="svg" viewBox="0 0 1180 720" preserveAspectRatio="xMidYMid meet"></svg>
            <div id="readout">
                <div class="cell">Base Resolution <b id="nText">6</b></div>
                <div class="cell">Total Active Slices <b id="totalText">60</b></div>
                <div class="cell">Unit Angle <b id="angleText">3.75°</b></div>
                <div class="cell">Topology <b id="phaseText">Radial</b></div>
                <div class="cell lock">Morph Phase <b id="timeText">0.00</b></div>
            </div>
            <div class="playhead" id="knob"></div>
        </main>

        <footer>
            <div>DRAG X-AXIS: MORPH TOPOLOGY &nbsp;&nbsp;|&nbsp;&nbsp; DRAG Y-AXIS: ADJUST DISCRETE UNITS</div>
            <div class="formula">EVERYTHING IS A SLICE. CONSTANT ANGLES PROVE MAGNITUDE.</div>
        </footer>
    </div>

    <script>
        (() => {
            const svg = document.getElementById('svg');
            const field = document.getElementById('field');
            const knob = document.getElementById('knob');
            const nText = document.getElementById('nText');
            const totalText = document.getElementById('totalText');
            const angleText = document.getElementById('angleText');
            const phaseText = document.getElementById('phaseText');
            const timeText = document.getElementById('timeText');

            const soundBtn = document.getElementById('sound');
            const loopBtn = document.getElementById('loop');
            const resetBtn = document.getElementById('reset');

            const NS = 'http://www.w3.org/2000/svg';
            const state = { n: 6, morph: 0, dragging: false, looping: false, sound: false, time: 0 };
            let ctx, master, drone, overtone, noiseFilter;

            // Keyframe Milestones for the 4 Phases
            const CX_RADIAL = 160;
            const CX_CONE_1 = 500;
            const CX_CONE_2 = 840;

            // Geometric Constants
            const R_RADIAL = 45;
            const R_CONE = 220;
            const COLLAPSE_Y = 360;

            // Base spread dictates the cone angle. mult * base = total cone spread.
            const BASE_SPREAD = Math.PI / 8; // 22.5 degrees per multiplier

            // Track Layout:
            // - mult: dictates total slices (mult * N) AND total angle spread (mult * BASE_SPREAD).
            // - y0: isolated vertical origins for the first 3 phases.
            const TRACKS = [
                { cat: 3, name: 'POSSIBLE', y0: 120, color: 'var(--c3)', mult: 4 },
                { cat: 2, name: 'PLAUSIBLE', y0: 280, color: 'var(--c2)', mult: 3 },
                { cat: 1, name: 'PROBABLE', y0: 440, color: 'var(--c1)', mult: 2 },
                { cat: 0, name: 'PREFERABLE', y0: 600, color: 'var(--c0)', mult: 1 }
            ];

            function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
            function lerp(a, b, t) { return a + (b - a) * t; }
            function ease(t) { return t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
            function el(tag, attrs = {}) { const e = document.createElementNS(NS, tag); for (const k in attrs) e.setAttribute(k, attrs[k]); return e; }
            function polar(cx, cy, r, a) { return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }; }

            // Generates a perfect SVG polygon for a sector (pie slice / cone slice)
            function sectorPath(cx, cy, r, a0, a1) {
                let pts = [{ x: cx, y: cy }];
                let steps = 6; // Sufficient for a small arc
                for (let s = 0; s <= steps; s++) {
                    let a = lerp(a0, a1, s / steps);
                    pts.push(polar(cx, cy, r, a));
                }
                return pts.map((p, i) => (i ? 'L' : 'M') + p.x.toFixed(2) + ',' + p.y.toFixed(2)).join(' ') + ' Z';
            }

            // Returns exact parameters {cx, cy, R, a0, a1} for a given slice at a specific phase integer
            function getPhaseParams(track, i, slices, phase) {
                let spread = track.mult * BASE_SPREAD;
                let cx, cy, R, a0, a1;

                if (phase === 0) {
                    // 01: RADIAL (Full 360 spread from left to right)
                    cx = CX_RADIAL;
                    cy = track.y0;
                    R = R_RADIAL;
                    // Map so it folds nicely towards the right (angle 0)
                    a0 = -Math.PI + (i / slices) * 2 * Math.PI;
                    a1 = -Math.PI + ((i + 1) / slices) * 2 * Math.PI;
                } else if (phase === 1) {
                    // 02: FOLDED CONES (Still Isolated)
                    cx = CX_CONE_1;
                    cy = track.y0;
                    R = R_CONE;
                    a0 = -spread / 2 + (i / slices) * spread;
                    a1 = -spread / 2 + ((i + 1) / slices) * spread;
                } else if (phase === 2) {
                    // 03: TRANSLATED CONES (Still Isolated)
                    cx = CX_CONE_2;
                    cy = track.y0;
                    R = R_CONE;
                    a0 = -spread / 2 + (i / slices) * spread;
                    a1 = -spread / 2 + ((i + 1) / slices) * spread;
                } else if (phase === 3) {
                    // 04: TAXONOMY COLLAPSE (Superposition on Y)
                    cx = CX_CONE_2;
                    cy = COLLAPSE_Y;
                    R = R_CONE;
                    a0 = -spread / 2 + (i / slices) * spread;
                    a1 = -spread / 2 + ((i + 1) / slices) * spread;
                }

                return { cx, cy, R, a0, a1 };
            }

            // Smoothly interpolates the sector parameters across the 4 keyframes based on morph (0 to 1)
            function getBlendedParams(track, i, slices, m) {
                let p0, p1, t;
                if (m < 1 / 3) {
                    p0 = getPhaseParams(track, i, slices, 0);
                    p1 = getPhaseParams(track, i, slices, 1);
                    t = ease(m * 3);
                } else if (m < 2 / 3) {
                    p0 = getPhaseParams(track, i, slices, 1);
                    p1 = getPhaseParams(track, i, slices, 2);
                    t = ease((m - 1 / 3) * 3);
                } else {
                    p0 = getPhaseParams(track, i, slices, 2);
                    p1 = getPhaseParams(track, i, slices, 3);
                    t = ease((m - 2 / 3) * 3);
                }

                return {
                    cx: lerp(p0.cx, p1.cx, t),
                    cy: lerp(p0.cy, p1.cy, t),
                    R: lerp(p0.R, p1.R, t),
                    a0: lerp(p0.a0, p1.a0, t),
                    a1: lerp(p0.a1, p1.a1, t)
                };
            }

            function line(x1, y1, x2, y2, op = 1, dash = '') {
                svg.appendChild(el('line', { x1, y1, x2, y2, stroke: `rgba(30,30,30,${op})`, 'stroke-width': 1, 'stroke-dasharray': dash, 'vector-effect': 'non-scaling-stroke' }));
            }

            function text(x, y, s, size = 11, anchor = 'middle', weight = '700', op = 1) {
                const t = el('text', { x, y, fill: `rgba(30,30,30,${op})`, 'font-size': size, 'font-weight': weight, 'text-anchor': anchor });
                t.textContent = s;
                svg.appendChild(t);
                return t;
            }

            function drawScaffold(m, totalSlices) {
                // Stage Markers
                text(CX_RADIAL, 24, `01: RADIAL POSSIBILITIES`, 10, 'middle', '700', 0.5);
                text(CX_CONE_1 + R_CONE / 2, 24, '02: SECTOR FOLDING', 10, 'middle', '700', 0.5);
                text(CX_CONE_2 + R_CONE / 2, 24, '03 & 04: TAXONOMY COLLAPSE', 10, 'middle', '700', 0.5);

                // Stage Verticals
                line(CX_RADIAL, 0, CX_RADIAL, 720, 0.1, '2 4');
                line(CX_CONE_1, 0, CX_CONE_1, 720, 0.1, '2 4');
                line(CX_CONE_2, 0, CX_CONE_2, 720, 0.1, '2 4');

                // Superposition Target Arc Guide
                if (m > 0.5) {
                    const op = clamp((m - 0.5) * 2.5, 0, 1);
                    const maxSpread = 4 * BASE_SPREAD;
                    const targetPath = sectorPath(CX_CONE_2, COLLAPSE_Y, R_CONE + 10, -maxSpread / 2, maxSpread / 2);
                    svg.appendChild(el('path', {
                        d: targetPath,
                        fill: 'none', stroke: `rgba(30,30,30,${op * 0.4})`, 'stroke-width': 1.5, 'stroke-dasharray': '2 4'
                    }));
                    text(CX_CONE_2 + R_CONE + 24, COLLAPSE_Y, 'SUPERPOSITION', 10, 'start', '700', op);
                }

                TRACKS.forEach((t, index) => {
                    const slices = state.n * t.mult;

                    // Track Baseline
                    line(0, t.y0, CX_CONE_1, t.y0, 0.1 * clamp(1 - m * 2, 0, 1));
                    text(16, t.y0 - 12, `${t.name}`, 11, 'start', '700', clamp(1 - m * 1.5, 0, 1));

                    // Crosshairs at Origins
                    line(CX_RADIAL - 5, t.y0, CX_RADIAL + 5, t.y0, 0.8);
                    line(CX_RADIAL, t.y0 - 5, CX_RADIAL, t.y0 + 5, 0.8);

                    // Connection paths showing vector expansion/translation
                    if (m > 0.1 && m < 0.6) {
                        const compOp = clamp(Math.sin((m / 0.6) * Math.PI) * 0.25, 0, 1);
                        line(CX_RADIAL + R_RADIAL, t.y0, CX_CONE_1, t.y0, compOp, '4 4');
                    }

                    // Phase 2 -> Phase 3 Collapsing Lines
                    if (m > 0.6) {
                        const collapseOp = clamp((m - 0.6) * 3, 0, 0.3);
                        line(CX_CONE_1 + R_CONE, t.y0, CX_CONE_2, COLLAPSE_Y, collapseOp, '2 4');
                    }

                    // Origin Indicators for moving cones
                    if (m > 0.2 && m < 0.9) {
                        let currentCx = lerp(CX_CONE_1, CX_CONE_2, clamp((m - 0.333) * 3, 0, 1));
                        svg.appendChild(el('rect', { x: currentCx - 2, y: t.y0 - 2, width: 4, height: 4, fill: 'var(--bg)', stroke: 'var(--fg)', 'stroke-width': 1 }));
                    }

                    // Final overlapping labels (staggered slightly outside the cone)
                    if (m > 0.8) {
                        const spread = t.mult * BASE_SPREAD;
                        const endY = COLLAPSE_Y + Math.sin(spread / 2) * R_CONE;
                        text(CX_CONE_2 + R_CONE + 16, endY + 4, `${t.name} (${slices} slices)`, 9, 'start', '700', clamp((m - 0.8) * 5, 0, 0.8));
                    }
                });
            }

            function draw() {
                svg.innerHTML = '';
                const { n, morph: m } = state;
                let totalSlices = 0;

                svg.appendChild(el('rect', { x: 0, y: 0, width: 1180, height: 720, fill: 'transparent' }));
                drawScaffold(m);

                // Render layers: Base layer (Possible) drawn first so Preferable overlays on top.
                TRACKS.forEach(track => {
                    const slices = n * track.mult;
                    totalSlices += slices;

                    for (let i = 0; i < slices; i++) {
                        const p = getBlendedParams(track, i, slices, m);
                        svg.appendChild(el('path', {
                            d: sectorPath(p.cx, p.cy, p.R, p.a0, p.a1),
                            fill: track.color,
                            stroke: `rgba(30,30,30,${0.15 + m * 0.3})`,
                            'stroke-width': m > 0.8 ? 0.3 : 0.6, // Finer strokes during superposition to highlight density
                            'vector-effect': 'non-scaling-stroke'
                        }));
                    }
                });

                // UI Updates
                nText.textContent = n;
                totalText.textContent = totalSlices;

                // Calculate and display the constant slice angle (in degrees)
                const unitAngleRad = BASE_SPREAD / n;
                const unitAngleDeg = unitAngleRad * (180 / Math.PI);
                angleText.textContent = unitAngleDeg.toFixed(2) + '°';

                timeText.textContent = m.toFixed(2);
                knob.style.left = (m * field.clientWidth) + 'px';

                if (m < 0.1) phaseText.textContent = "01: Radial Areas";
                else if (m < 0.45) phaseText.textContent = "02: Sector Folding";
                else if (m < 0.75) phaseText.textContent = "03: Isolated Cones";
                else phaseText.textContent = "04: Taxonomy Collapse";
            }

            function setFromPoint(clientX, clientY) {
                const rect = field.getBoundingClientRect();
                const x = clamp((clientX - rect.left) / rect.width, 0, 1);
                const y = clamp((clientY - rect.top) / rect.height, 0, 1);
                state.morph = x;
                const raw = 2 + (1 - y) * 14; // Base n from 2 to 16
                state.n = Math.max(2, Math.round(raw));
                updateSound();
                draw();
            }

            function setupSound() {
                if (ctx) return;
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                master = ctx.createGain();

                drone = ctx.createOscillator();
                overtone = ctx.createOscillator();
                noiseFilter = ctx.createBiquadFilter();

                drone.type = 'square';
                overtone.type = 'sawtooth';
                noiseFilter.type = 'lowpass';

                drone.frequency.value = 55.00; // A1
                overtone.frequency.value = 110.00; // A2
                noiseFilter.frequency.value = 150;

                master.gain.value = 0;
                drone.connect(noiseFilter);
                overtone.connect(noiseFilter);
                noiseFilter.connect(master);
                master.connect(ctx.destination);

                drone.start();
                overtone.start();
            }

            function updateSound() {
                if (!ctx || !state.sound) return;
                const now = ctx.currentTime;

                // Filter peaks during collapse
                const filterFreq = 150 + (state.morph * 3000) + (state.n * 20);
                noiseFilter.frequency.setTargetAtTime(filterFreq, now, 0.05);

                // Pitch bending indicates folding and collapse tension
                const root = 55.00 + (state.morph * 15);
                drone.frequency.setTargetAtTime(root, now, 0.05);
                overtone.frequency.setTargetAtTime(root * 2.01, now, 0.05);

                master.gain.setTargetAtTime(0.04 + (state.morph * 0.03), now, 0.05);
            }

            soundBtn.addEventListener('click', async () => {
                setupSound();
                if (ctx.state === 'suspended') await ctx.resume();
                state.sound = !state.sound;
                soundBtn.dataset.on = state.sound;
                if (!state.sound && master) master.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
                else updateSound();
            });

            loopBtn.addEventListener('click', () => {
                state.looping = !state.looping;
                loopBtn.dataset.on = state.looping;
            });

            resetBtn.addEventListener('click', () => {
                state.n = 6; state.morph = 0; state.looping = false; loopBtn.dataset.on = false;
                updateSound(); draw();
            });

            field.addEventListener('pointerdown', e => {
                state.dragging = true;
                field.setPointerCapture(e.pointerId);
                setFromPoint(e.clientX, e.clientY);
            });
            field.addEventListener('pointermove', e => {
                if (state.dragging) setFromPoint(e.clientX, e.clientY);
            });
            field.addEventListener('pointerup', e => {
                state.dragging = false;
                try { field.releasePointerCapture(e.pointerId); } catch (_) { }
            });
            field.addEventListener('pointercancel', () => state.dragging = false);

            window.addEventListener('keydown', e => {
                if (e.key === 'ArrowRight') state.morph = clamp(state.morph + .05, 0, 1);
                if (e.key === 'ArrowLeft') state.morph = clamp(state.morph - .05, 0, 1);
                updateSound(); draw();
            });

            function tick(t) {
                state.time = t;
                if (state.looping && !state.dragging) {
                    state.morph = (Math.sin(t * 0.0006) + 1) / 2;
                    updateSound();
                    draw();
                }
                requestAnimationFrame(tick);
            }

            draw();
            requestAnimationFrame(tick);
        })();
    </script>
</body>

</html>
