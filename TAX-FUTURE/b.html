<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Diagram 4.7: Taxonomy Collapse Unroller</title>
    <style>
        :root {
            --bg: #FFFFFF;
            --fg: #1E1E1E;
            --faint: #D0D0CE;
            --c3: rgba(196, 212, 196, 0.95);
            /* Possible */
            --c2: rgba(154, 192, 148, 0.95);
            /* Plausible */
            --c1: rgba(111, 205, 75, 0.95);
            /* Probable */
            --c0: rgba(190, 235, 45, 1.0);
            /* Preferable */
            --hot: #D50000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            border-radius: 0 !important;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Courier New', Courier, ui-monospace, monospace;
            overflow: hidden;
        }

        body {
            touch-action: none
        }

        #app {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        /* Minimalist Header */
        header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--fg);
            background: var(--bg);
            z-index: 10;
        }

        header strong {
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--fg);
        }

        .dashboard span {
            color: var(--hot);
        }

        .right {
            display: flex;
            align-items: center;
            gap: 0px;
        }

        button {
            background: var(--bg);
            color: var(--fg);
            border: 1px solid var(--fg);
            min-height: 32px;
            padding: 0 14px;
            font: inherit;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            border-left: none;
        }

        button:first-child {
            border-left: 1px solid var(--fg);
        }

        button[data-on="true"] {
            background: var(--fg);
            color: var(--bg);
        }

        main {
            flex: 1 1 0;
            position: relative;
            min-height: 0;
            width: 100%;
        }

        svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair
        }

        /* Elegant, thin playhead */
        .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--hot);
            z-index: 4;
            pointer-events: none;
            transform: translateX(-50%);
        }

        .playhead::before {
            content: '';
            position: absolute;
            top: 0;
            left: -3px;
            width: 7px;
            height: 7px;
            background: var(--hot);
            border-radius: 50% !important;
        }

        .playhead::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -3px;
            width: 7px;
            height: 7px;
            background: var(--hot);
            border-radius: 50% !important;
        }

        @media(max-width:900px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .dashboard {
                flex-wrap: wrap;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <div><strong>Fig. 4.7: Radial Taxonomy</strong></div>
            <div class="dashboard">
                <div>Phase: <span id="timeText">0.00</span></div>
                <div>Res: <span id="nText">6</span></div>
                <div>Max Density: <span id="densityText">24</span></div>
            </div>
            <div class="right">
                <button id="sound">Audio</button>
                <button id="loop">Auto</button>
                <button id="reset">Reset</button>
            </div>
        </header>

        <main id="field">
            <svg id="svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid meet"></svg>
            <div class="playhead" id="knob"></div>
        </main>
    </div>

    <script>
        (() => {
            const svg = document.getElementById('svg');
            const field = document.getElementById('field');
            const knob = document.getElementById('knob');
            const timeText = document.getElementById('timeText');
            const nText = document.getElementById('nText');
            const densityText = document.getElementById('densityText');

            const soundBtn = document.getElementById('sound');
            const loopBtn = document.getElementById('loop');
            const resetBtn = document.getElementById('reset');

            const NS = 'http://www.w3.org/2000/svg';
            const state = { n: 6, morph: 0, dragging: false, looping: false, sound: false, time: 0 };
            let ctx, master, drone, overtone, noiseFilter;

            // Keyframe X-Axis Milestones
            const CX_0 = 120;  // Phase 0: Isolated Radial Origins
            const CX_1 = 380;  // Phase 1: Compressed Vectors
            const CX_2 = 680;  // Phase 2: Composite Vectors
            const CX_3 = 960;  // Phase 3: Taxonomy Circular Collapse

            const BASE_SPREAD = Math.PI / 2; // 90 degrees unit (mult=4 is full 360 circle)
            const COLLAPSE_Y = 400; // Center of canvas

            // INVERTED DENSITY MAGNITUDE:
            // Possible: spreadMult 4 (360° wide) | sliceMult 1 (fewest/largest slices)
            // Preferable: spreadMult 1 (90° narrow) | sliceMult 4 (most/smallest slices)
            const TRACKS = [
                { cat: 3, name: 'POSSIBLE', y0: 120, color: 'var(--c3)', spreadMult: 4, sliceMult: 1 },
                { cat: 2, name: 'PLAUSIBLE', y0: 300, color: 'var(--c2)', spreadMult: 3, sliceMult: 2 },
                { cat: 1, name: 'PROBABLE', y0: 480, color: 'var(--c1)', spreadMult: 2, sliceMult: 3 },
                { cat: 0, name: 'PREFERABLE', y0: 660, color: 'var(--c0)', spreadMult: 1, sliceMult: 4 }
            ];

            const L_SIDES = 8;

            function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
            function lerp(a, b, t) { return a + (b - a) * t; }
            function ease(t) { return t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
            function el(tag, attrs = {}) { const e = document.createElementNS(NS, tag); for (const k in attrs) e.setAttribute(k, attrs[k]); return e; }
            function polar(cx, cy, r, a) { return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }; }

            // Structural generator: Now calculates the OUTLINE, the SPINE, and the DATA NODE for each slice
            function getShapePoints(track, i, slices, phase) {
                let cx, cy, R = 0, w = 0, t1, t2, isArc;
                let spreadAngle = track.spreadMult * BASE_SPREAD;
                let spreadHeight = track.spreadMult * 60; // Proportional linear height for cones
                let max_slices = state.n * 4;

                if (phase === 0) {
                    cx = CX_0; cy = track.y0; R = 45;
                    let fullSpread = 2 * Math.PI;
                    t1 = -fullSpread / 2 + (i / slices) * fullSpread;
                    t2 = -fullSpread / 2 + ((i + 1) / slices) * fullSpread;
                    isArc = true;
                } else if (phase === 1) {
                    cx = CX_1; cy = track.y0; w = 120;
                    t1 = -spreadAngle / 2 + (i / slices) * spreadAngle;
                    t2 = -spreadAngle / 2 + ((i + 1) / slices) * spreadAngle;
                    isArc = false;
                } else if (phase === 2) {
                    let slot = Math.round(i * ((max_slices - 1) / (slices - 1 || 1)));
                    cy = max_slices > 1 ? 80 + (slot / (max_slices - 1)) * 640 : COLLAPSE_Y;
                    cx = CX_2; w = 80;
                    t1 = -spreadAngle / 2;
                    t2 = spreadAngle / 2;
                    isArc = false;
                } else if (phase === 3) {
                    cx = CX_3; cy = COLLAPSE_Y; R = 180;
                    t1 = -spreadAngle / 2 + (i / slices) * spreadAngle;
                    t2 = -spreadAngle / 2 + ((i + 1) / slices) * spreadAngle;
                    isArc = true;
                }

                let pts = [{ x: cx, y: cy }];
                let steps = 12;

                for (let j = 0; j <= steps; j++) {
                    let t = j / steps;
                    let angle = lerp(t1, t2, t);
                    if (isArc) {
                        pts.push(polar(cx, cy, R, angle));
                    } else {
                        let p = spreadAngle === 0 ? 0 : (angle - (-spreadAngle / 2)) / spreadAngle;
                        let yEdge = cy - spreadHeight / 2 + p * spreadHeight;
                        pts.push({ x: cx + w, y: yEdge });
                    }
                }

                // Calculate Internal Spine (Center vector of the slice)
                let midAngle = (t1 + t2) / 2;
                let spineStart = { x: cx, y: cy };
                let spineEnd;
                if (isArc) {
                    spineEnd = polar(cx, cy, R, midAngle);
                } else {
                    let p = spreadAngle === 0 ? 0 : (midAngle - (-spreadAngle / 2)) / spreadAngle;
                    spineEnd = { x: cx + w, y: cy - spreadHeight / 2 + p * spreadHeight };
                }

                return { outline: pts, spineStart, spineEnd };
            }

            // Direct structural interpolation
            function getBlendedPoints(track, i, slices, m) {
                let pA, pB, t;
                if (m <= 0.333) {
                    pA = getShapePoints(track, i, slices, 0);
                    pB = getShapePoints(track, i, slices, 1);
                    t = ease(m * 3);
                } else if (m <= 0.666) {
                    pA = getShapePoints(track, i, slices, 1);
                    pB = getShapePoints(track, i, slices, 2);
                    t = ease((m - 0.333) * 3);
                } else {
                    pA = getShapePoints(track, i, slices, 2);
                    pB = getShapePoints(track, i, slices, 3);
                    t = ease((m - 0.666) * 3);
                }

                return {
                    outline: pA.outline.map((p, k) => ({ x: lerp(p.x, pB.outline[k].x, t), y: lerp(p.y, pB.outline[k].y, t) })),
                    spineStart: { x: lerp(pA.spineStart.x, pB.spineStart.x, t), y: lerp(pA.spineStart.y, pB.spineStart.y, t) },
                    spineEnd: { x: lerp(pA.spineEnd.x, pB.spineEnd.x, t), y: lerp(pA.spineEnd.y, pB.spineEnd.y, t) }
                };
            }

            function pathStr(pts) { return pts.map((p, i) => (i ? 'L' : 'M') + p.x.toFixed(2) + ',' + p.y.toFixed(2)).join(' ') + ' Z'; }

            function line(x1, y1, x2, y2, op = 1, dash = '') {
                svg.appendChild(el('line', { x1, y1, x2, y2, stroke: `rgba(30,30,30,${op})`, 'stroke-width': 1.5, 'stroke-dasharray': dash }));
            }

            function text(x, y, s, size = 12, anchor = 'middle', weight = '800', op = 1) {
                const t = el('text', { x, y, fill: `rgba(30,30,30,${op})`, 'font-size': size, 'font-weight': weight, 'text-anchor': anchor, 'letter-spacing': '0.05em' });
                t.textContent = s;
                svg.appendChild(t);
                return t;
            }

            function drawScaffold(m) {
                // Stage Verticals
                line(CX_0, 0, CX_0, 800, 0.1, '4 6');
                line(CX_1, 0, CX_1, 800, 0.1, '4 6');
                line(CX_2, 0, CX_2, 800, 0.1, '4 6');
                line(CX_3, 0, CX_3, 800, 0.1, '4 6');

                // Guide Outline for Phase 4 Superposition (The Final Master Circle)
                if (m > 0.5) {
                    const op = clamp((m - 0.5) * 2.5, 0, 1);
                    svg.appendChild(el('circle', {
                        cx: CX_3, cy: COLLAPSE_Y, r: 180,
                        fill: 'none', stroke: `rgba(30,30,30,${op * 0.3})`, 'stroke-width': 1.5, 'stroke-dasharray': '4 6'
                    }));
                }

                let max_slices = state.n * 4;

                TRACKS.forEach((t) => {
                    const slices = state.n * t.sliceMult;

                    // Track Baseline
                    line(0, t.y0, CX_1, t.y0, 0.15 * clamp(1 - m * 2.5, 0, 1));

                    // Connection paths: Phase 1 to Phase 2
                    if (m > 0.25 && m < 0.75) {
                        const compOp = clamp(Math.sin((m - 0.15) * 2 * Math.PI) * 0.2, 0, 1);
                        for (let i = 0; i < slices; i += Math.ceil(slices / 4)) {
                            let slot = Math.round(i * ((max_slices - 1) / (slices - 1 || 1)));
                            let targetY = max_slices > 1 ? 80 + (slot / (max_slices - 1)) * 640 : COLLAPSE_Y;
                            line(CX_1 + 120, t.y0, CX_2, targetY, compOp, '3 5');
                        }
                    }

                    // Connection paths: Phase 2 to Phase 3
                    if (m > 0.6) {
                        const collapseOp = clamp((m - 0.6) * 3, 0, 0.2);
                        for (let i = 0; i < slices; i += Math.ceil(slices / 4)) {
                            let slot = Math.round(i * ((max_slices - 1) / (slices - 1 || 1)));
                            let sourceY = max_slices > 1 ? 80 + (slot / (max_slices - 1)) * 640 : COLLAPSE_Y;
                            line(CX_2 + 80, sourceY, CX_3, COLLAPSE_Y, collapseOp, '3 5');
                        }
                    }
                });
            }

            function drawLabels(m) {
                // Stage Markers
                text(CX_0, 24, `01: SUBJECTIVE WHOLES`, 12, 'middle', '800', 0.5);
                text(CX_1 + 60, 24, '02: VECTOR COMPRESSION', 12, 'middle', '800', 0.5);
                text(CX_2 + 40, 24, '03: COMPOSITES', 12, 'middle', '800', 0.5);
                text(CX_3, 24, '04: RADIAL TAXONOMY', 12, 'middle', '800', 0.5);

                TRACKS.forEach((t, index) => {
                    const slices = state.n * t.sliceMult;

                    // Left Labels
                    text(16, t.y0 - 10, `${t.name}`, 14, 'start', '800', clamp(1 - m * 1.5, 0, 1));
                    text(16, t.y0 + 12, `${slices} SLICES`, 10, 'start', '700', clamp(1 - m * 1.5, 0, 0.5));

                    // Phase 4: CLEAN LEADER LINE LABELS (No overlap)
                    if (m > 0.8) {
                        const op = clamp((m - 0.8) * 5, 0, 1);

                        // Stack the labels neatly on the far right
                        const labelX = CX_3 + 220;
                        const labelY = 220 + index * 65;

                        // Connect the leader line to the top boundary edge of each respective angular spread
                        const spread = t.spreadMult * BASE_SPREAD;
                        // Shift start point so they don't all point to the exact same left-most coordinate
                        const angle = -spread / 2 + (index * 0.1);
                        const targetX = CX_3 + Math.cos(angle) * 180;
                        const targetY = COLLAPSE_Y + Math.sin(angle) * 180;

                        // Draw connecting leader line
                        svg.appendChild(el('path', {
                            d: `M ${targetX},${targetY} L ${labelX - 15},${labelY} L ${labelX},${labelY}`,
                            fill: 'none', stroke: `rgba(30,30,30,${op * 0.4})`, 'stroke-width': 1.5
                        }));

                        // Draw organized text
                        text(labelX + 8, labelY - 4, `${t.name}`, 14, 'start', '800', op);
                        text(labelX + 8, labelY + 12, `${slices} UNITS`, 10, 'start', '700', op * 0.6);
                    }
                });
            }

            function draw() {
                svg.innerHTML = '';
                const { n, morph: m } = state;

                // 1. Draw grid / lines (Underlay)
                drawScaffold(m);

                // 2. Draw Geometry (Middle)
                // Sorted so largest spread (Possible, 360°) draws first, and narrowest (Preferable, 90°) draws on top
                const renderTracks = [...TRACKS].sort((a, b) => b.spreadMult - a.spreadMult);

                renderTracks.forEach(track => {
                    const slices = n * track.sliceMult;

                    for (let i = 0; i < slices; i++) {
                        const shape = getBlendedPoints(track, i, slices, m);

                        // Draw the Slice Outline
                        svg.appendChild(el('path', {
                            d: pathStr(shape.outline),
                            fill: track.color,
                            stroke: `rgba(30,30,30,${0.2 + m * 0.3})`,
                            'stroke-width': m > 0.8 ? 0.6 : 1.2,
                            'vector-effect': 'non-scaling-stroke'
                        }));

                        // Draw the Internal "Data Spine"
                        let nodeOp = clamp(1 - (m - 0.7) * 3, 0.1, 0.4);
                        svg.appendChild(el('line', {
                            x1: shape.spineStart.x, y1: shape.spineStart.y,
                            x2: shape.spineEnd.x, y2: shape.spineEnd.y,
                            stroke: `rgba(30,30,30,${nodeOp})`,
                            'stroke-dasharray': '2 4',
                            'stroke-width': 1
                        }));

                        // Draw the Data Node at the 85% point of the spine
                        let nodeX = lerp(shape.spineStart.x, shape.spineEnd.x, 0.85);
                        let nodeY = lerp(shape.spineStart.y, shape.spineEnd.y, 0.85);
                        svg.appendChild(el('circle', {
                            cx: nodeX, cy: nodeY, r: m > 0.8 ? 0.5 : 1.5,
                            fill: `rgba(30,30,30,${nodeOp + 0.3})`
                        }));
                    }
                });

                // 3. Draw text and labels (Overlay) - Ensures they are painted strictly ON TOP of everything
                drawLabels(m);

                // UI Dashboard Updates
                nText.textContent = n;
                densityText.textContent = n * 4;
                timeText.textContent = m.toFixed(2);
                knob.style.left = (m * field.clientWidth) + 'px';
            }

            function setFromPoint(clientX, clientY) {
                const rect = field.getBoundingClientRect();
                const x = clamp((clientX - rect.left) / rect.width, 0, 1);
                const y = clamp((clientY - rect.top) / rect.height, 0, 1);
                state.morph = x;
                const raw = 1 + (1 - y) * 11; // Base n from 1 to 12
                state.n = Math.max(1, Math.round(raw));
                updateSound();
                draw();
            }

            function setupSound() {
                if (ctx) return;
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                master = ctx.createGain();
                drone = ctx.createOscillator();
                overtone = ctx.createOscillator();
                noiseFilter = ctx.createBiquadFilter();

                drone.type = 'square';
                overtone.type = 'sawtooth';
                noiseFilter.type = 'lowpass';

                drone.frequency.value = 55.00;
                overtone.frequency.value = 110.00;
                noiseFilter.frequency.value = 150;

                master.gain.value = 0;
                drone.connect(noiseFilter);
                overtone.connect(noiseFilter);
                noiseFilter.connect(master);
                master.connect(ctx.destination);

                drone.start();
                overtone.start();
            }

            function updateSound() {
                if (!ctx || !state.sound) return;
                const now = ctx.currentTime;
                const filterFreq = 150 + (state.morph * 3000) + (state.n * 20);
                noiseFilter.frequency.setTargetAtTime(filterFreq, now, 0.05);
                const root = 55.00 + (state.morph * 15);
                drone.frequency.setTargetAtTime(root, now, 0.05);
                overtone.frequency.setTargetAtTime(root * 2.01, now, 0.05);
                master.gain.setTargetAtTime(0.04 + (state.morph * 0.03), now, 0.05);
            }

            soundBtn.addEventListener('click', async () => {
                setupSound();
                if (ctx.state === 'suspended') await ctx.resume();
                state.sound = !state.sound;
                soundBtn.dataset.on = state.sound;
                if (!state.sound && master) master.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
                else updateSound();
            });

            loopBtn.addEventListener('click', () => {
                state.looping = !state.looping;
                loopBtn.dataset.on = state.looping;
            });

            resetBtn.addEventListener('click', () => {
                state.n = 6; state.morph = 0; state.looping = false; loopBtn.dataset.on = false;
                updateSound(); draw();
            });

            field.addEventListener('pointerdown', e => {
                state.dragging = true;
                field.setPointerCapture(e.pointerId);
                setFromPoint(e.clientX, e.clientY);
            });
            field.addEventListener('pointermove', e => {
                if (state.dragging) setFromPoint(e.clientX, e.clientY);
            });
            field.addEventListener('pointerup', e => {
                state.dragging = false;
                try { field.releasePointerCapture(e.pointerId); } catch (_) { }
            });
            field.addEventListener('pointercancel', () => state.dragging = false);

            window.addEventListener('keydown', e => {
                if (e.key === 'ArrowRight') state.morph = clamp(state.morph + .05, 0, 1);
                if (e.key === 'ArrowLeft') state.morph = clamp(state.morph - .05, 0, 1);
                updateSound(); draw();
            });

            function tick(t) {
                state.time = t;
                if (state.looping && !state.dragging) {
                    state.morph = (Math.sin(t * 0.0006) + 1) / 2;
                    updateSound();
                    draw();
                }
                requestAnimationFrame(tick);
            }

            draw();
            requestAnimationFrame(tick);
        })();
    </script>
</body>

</html>
