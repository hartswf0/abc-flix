<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>Arc-Tunnel Operator — Real Media Pipeline & HUD</title>
    <style>
        :root {
            --bg: #ffffff;
            --ink: #000000;
            --left: 56px;
            --right: 360px;
            --bottom: 56px;
            --top: 48px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--ink);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            touch-action: none;
            user-select: none;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            display: block;
            z-index: 1;
        }

        button {
            font: inherit;
            background: var(--bg);
            color: var(--ink);
            border: 2px solid var(--ink);
            border-radius: 0;
            height: 32px;
            padding: 0 8px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
        }

        button.on,
        button:active {
            background: var(--ink);
            color: var(--bg);
        }

        #rail {
            position: fixed;
            z-index: 20;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--left);
            border-right: 3px solid var(--ink);
            background: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 8px 6px;
            pointer-events: auto;
        }

        #rail b {
            height: 38px;
            border: 2px solid var(--ink);
            display: grid;
            place-items: center;
            font-size: 13px;
        }

        #rail button {
            width: 41px;
            height: 38px;
            font-size: 10px;
            padding: 0;
        }

        .spacer {
            flex: 1;
        }

        #top {
            position: fixed;
            z-index: 18;
            left: var(--left);
            right: var(--right);
            top: 0;
            height: var(--top);
            border-bottom: 3px solid var(--ink);
            background: var(--bg);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
            pointer-events: auto;
        }

        #brand {
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mode {
            margin-left: auto;
            border: 2px solid var(--ink);
            padding: 5px 9px;
            font-weight: 900;
        }

        .mode b {
            background: var(--ink);
            color: var(--bg);
            padding: 2px 6px;
            margin-left: 5px;
        }

        #ops {
            position: fixed;
            z-index: 16;
            right: 0;
            top: 0;
            bottom: 0;
            width: var(--right);
            border-left: 3px solid var(--ink);
            background: var(--bg);
            overflow: auto;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
        }

        /* NEW DOM-BASED PIPELINE MONITOR */
        #monitorBox {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg);
            border-bottom: 3px solid var(--ink);
            display: flex;
            flex-direction: column;
        }

        .monHeader {
            display: flex;
            border-bottom: 3px solid var(--ink);
        }

        .monHeader button {
            flex: 1;
            border: none;
            border-right: 3px solid var(--ink);
            height: 36px;
            font-size: 14px;
        }

        .monHeader button:last-child {
            border-right: none;
        }

        #monScreen {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--ink);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg);
        }

        #monMedia {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 24px;
            text-align: center;
            padding: 10px;
            flex-direction: column;
        }

        #monMedia video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #monBadge,
        #monTime {
            position: absolute;
            bottom: 12px;
            padding: 4px 8px;
            font-size: 14px;
            font-weight: 900;
        }

        #monBadge {
            left: 12px;
            background: var(--bg);
            color: var(--ink);
        }

        #monTime {
            right: 12px;
            background: var(--bg);
            color: var(--ink);
        }

        #monFilmstrip {
            display: flex;
            border-top: 3px solid var(--ink);
            height: 80px;
            background: var(--ink);
        }

        .monFrame {
            flex: 1;
            border-right: 3px solid var(--ink);
            background-size: cover;
            background-position: center;
            position: relative;
            opacity: 0.7;
        }

        .monFrame:last-child {
            border-right: none;
        }

        .monFrame span {
            position: absolute;
            top: 4px;
            left: 4px;
            background: var(--bg);
            color: var(--ink);
            font-size: 10px;
            font-weight: 900;
            padding: 2px 4px;
        }

        .opHead {
            position: sticky;
            top: 0;
            background: var(--ink);
            color: var(--bg);
            padding: 12px 10px;
            font-weight: 900;
            text-transform: uppercase;
            z-index: 2;
            border-bottom: 3px solid var(--ink);
        }

        .op {
            display: grid;
            grid-template-columns: 32px 72px 1fr 28px;
            border-bottom: 2px solid var(--ink);
            padding: 8px 10px;
            gap: 10px;
            cursor: pointer;
            position: relative;
            /* REQUIRED FOR PROGRESS BAR */
        }

        .op:hover,
        .op.on {
            background: var(--ink);
            color: var(--bg);
        }

        /* THE ACTIVE ROW HIGHLIGHTS */
        .op.playing {
            background: #f0f0f0;
            border-left: 6px solid var(--ink);
            padding-left: 4px;
        }

        .op.playing.on {
            background: var(--ink);
            border-left: 6px solid var(--bg);
        }

        .opProgress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            pointer-events: none;
        }

        .op.on .opProgress {
            background: rgba(255, 255, 255, 0.2);
        }

        .opProgressBar {
            height: 100%;
            background: var(--ink);
            width: 0%;
        }

        .op.on .opProgressBar {
            background: var(--bg);
        }

        .op code {
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid currentColor;
        }

        .opThumb {
            width: 100%;
            height: 40px;
            background-size: cover;
            background-position: center;
            border: 2px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background-color: var(--bg);
            color: var(--ink);
            overflow: hidden;
        }

        .opThumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .op:hover .opThumb,
        .op.on .opThumb {
            border-color: var(--bg);
        }

        .opInfo {
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .opInfo span {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .opInfo small {
            display: block;
            font-size: 10px;
            margin-top: 2px;
            font-weight: 600;
            opacity: 1;
        }

        .opAddRow {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-bottom: 2px solid var(--ink);
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
            background: var(--bg);
            color: var(--ink);
        }

        .opAddRow:hover {
            background: var(--ink);
            color: var(--bg);
        }

        .opDel {
            background: transparent;
            color: currentColor;
            border: none;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
        }

        .opDel:hover {
            opacity: 1;
            color: #ff0000;
        }

        #bottom {
            position: fixed;
            z-index: 18;
            left: var(--left);
            right: var(--right);
            bottom: 0;
            height: var(--bottom);
            border-top: 3px solid var(--ink);
            background: var(--bg);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            pointer-events: auto;
        }

        .trk {
            height: 38px;
            min-width: 38px;
            font-size: 12px;
        }

        .trk.on {
            background: var(--ink);
            color: var(--bg);
        }

        #status {
            margin-left: auto;
            font-weight: 900;
            text-transform: uppercase;
        }

        .read {
            border-left: 3px solid var(--ink);
            padding-left: 10px;
            min-width: 180px;
            text-align: right;
            font-weight: 900;
            cursor: ew-resize;
            /* Scrubbing indicator */
        }

        .read:hover {
            background: var(--ink);
            color: var(--bg);
        }

        #dock {
            position: fixed;
            z-index: 22;
            left: 50%;
            bottom: calc(var(--bottom) + 12px);
            transform: translateX(-50%);
            display: flex;
            border: 3px solid var(--ink);
            background: var(--bg);
            pointer-events: auto;
            box-shadow: 4px 4px 0 var(--ink);
        }

        #dock button {
            border: 0;
            border-right: 2px solid var(--ink);
            height: 40px;
            font-size: 12px;
            padding: 0 16px;
        }

        #dock button:last-child {
            border-right: 0;
        }

        #badge {
            position: fixed;
            z-index: 22;
            left: calc(var(--left) + 16px);
            top: calc(var(--top) + 16px);
            border: 3px solid var(--ink);
            background: var(--bg);
            padding: 10px 14px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 6px 6px 0 var(--ink);
            pointer-events: none;
            min-width: 240px;
        }

        #badge .big {
            font-size: 22px;
            line-height: 22px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meta {
            font-size: 11px;
            margin-top: 6px;
        }

        #toast {
            position: fixed;
            z-index: 70;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
            border: 4px solid var(--ink);
            background: var(--bg);
            color: var(--ink);
            padding: 12px 18px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 16px;
            opacity: 0;
            pointer-events: none;
            box-shadow: 6px 6px 0 var(--ink);
            transition: opacity 0.1s;
        }

        #toast.show {
            opacity: 1;
        }

        /* RENDER OVERLAY */
        #renderOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--ink);
            color: var(--bg);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #renderOverlay h1 {
            font-size: 48px;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
        }

        #renderBarBorder {
            width: 60%;
            height: 24px;
            border: 4px solid var(--bg);
        }

        #renderProgress {
            width: 0%;
            height: 100%;
            background: var(--bg);
        }

        /* INSPECTOR MODAL */
        #inspector {
            position: fixed;
            z-index: 100;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            border: 4px solid var(--ink);
            box-shadow: 8px 8px 0 var(--ink);
            padding: 24px;
            display: none;
            flex-direction: column;
            gap: 16px;
            width: 360px;
            pointer-events: auto;
        }

        #inspector.show {
            display: flex;
        }

        #inspector h2 {
            font-size: 18px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--ink);
            padding-bottom: 8px;
            margin: 0;
        }

        #inspector label {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #inspector input,
        #inspector select,
        #inspector textarea {
            font: inherit;
            padding: 8px;
            border: 2px solid var(--ink);
            width: 100%;
            font-weight: 600;
            background: var(--bg);
            color: var(--ink);
            border-radius: 0;
        }

        #inspector textarea {
            resize: none;
            height: 80px;
        }

        #inspector .row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        #inspector .row button {
            flex: 1;
            height: 40px;
            font-size: 14px;
        }

        #menu {
            position: fixed;
            z-index: 60;
            display: none;
            border: 2px solid var(--ink);
            background: var(--bg);
            min-width: 220px;
            pointer-events: auto;
        }

        .mi {
            height: 34px;
            border-bottom: 1px solid var(--ink);
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
        }

        .mi:hover,
        .mi.title {
            background: var(--ink);
            color: var(--bg);
        }

        .mi:last-child {
            border-bottom: 0;
        }

        #menu.show {
            display: block;
        }

        @media(max-width:900px) {
            :root {
                --left: 44px;
                --right: 220px;
                --bottom: 46px;
                --top: 44px;
            }

            #top {
                right: var(--right);
                height: 44px;
                padding: 0 6px;
            }

            #brand {
                max-width: 28vw;
                font-size: 11px;
            }

            #top button {
                height: 30px;
                font-size: 9px;
                padding: 0 6px;
            }

            .mode {
                font-size: 10px;
                padding: 4px 5px;
            }

            #rail {
                width: var(--left);
                gap: 4px;
                padding: 6px 5px;
            }

            #rail b {
                height: 32px;
                font-size: 9px;
            }

            #rail button {
                width: 32px;
                height: 32px;
                font-size: 7px;
            }

            #ops {
                top: 44px;
                bottom: 46px;
                width: var(--right);
            }

            #bottom {
                right: var(--right);
                height: 46px;
                padding: 5px 6px;
            }

            .trk {
                width: 30px;
                font-size: 0;
                padding: 0;
            }

            .trk:after {
                content: attr(data-s);
                font-size: 12px;
            }

            .read {
                min-width: 120px;
                font-size: 10px;
            }

            #status {
                font-size: 10px;
            }

            #dock {
                left: calc(var(--left) + 6px);
                right: calc(var(--right) + 6px);
                bottom: 54px;
                transform: none;
                overflow-x: auto;
                border-width: 2px;
            }

            #dock button {
                height: 36px;
                min-width: 54px;
                font-size: 10px;
                padding: 0 6px;
                border-width: 1px;
            }

            #badge {
                left: calc(var(--left) + 6px);
                right: calc(var(--right) + 6px);
                top: 54px;
                min-width: 0;
                padding: 6px 7px;
                border-width: 2px;
                box-shadow: 4px 4px 0 #000;
            }

            .big {
                font-size: 16px !important;
            }

            .meta {
                font-size: 9px;
            }

            #toast {
                bottom: 100px;
                font-size: 12px;
                border-width: 2px;
            }

            #inspector {
                width: 90vw;
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <canvas id="stage"></canvas>
    <nav id="rail">
        <b>ATO</b>
        <button id="viewBtn">VIEW</button>
        <button id="addBtn">ADD</button>
        <button id="cutBtn">CUT</button>
        <button id="edlBtn">EDL</button>
        <button id="importBtn">IMP</button>
        <button id="exportBtn">OUT</button>
        <!-- NEW INGEST BUTTON -->
        <button id="ingestBtn" style="background:#000;color:#fff;border-color:#000;">INGEST</button>
        <button id="renderBtn" style="margin-top:6px;">RENDER</button>
        <div class="spacer"></div>
        <button id="resetBtn">RST</button>
    </nav>
    <header id="top">
        <div id="brand">ARC-TUNNEL OPERATOR</div>
        <button id="playBtn">PLAY</button>
        <button id="snapBtn" class="on">SNAP</button>
        <div class="mode">VIEW <b id="modeName">BARREL</b></div>
    </header>
    <aside id="ops">
        <div id="monitorBox">
            <div class="monHeader">
                <button id="monSeqBtn" class="on">PROGRAM (SEQ)</button>
                <button id="monClipBtn">SOURCE (CLIP)</button>
            </div>
            <div id="monScreen">
                <div id="monMedia">
                    <!-- Hardware accelerated video player for the pipeline -->
                    <video id="activeVideoPlayer" muted playsinline preload="auto"></video>
                </div>
                <div id="monBadge" style="display:none;">V1</div>
                <div id="monTime" style="display:none;">00:00</div>
            </div>
            <div id="monFilmstrip" style="display:none;">
                <div class="monFrame" id="headFrame"><span>HEAD [IN]</span></div>
                <div class="monFrame" id="tailFrame"><span>TAIL [OUT]</span></div>
            </div>
        </div>

        <div class="opHead">Timeline Assets</div>
        <div id="opList"></div>
    </aside>

    <section id="badge">
        <div class="big" id="selBig">NO CLIP</div>
        <div class="meta" id="selMeta">DOUBLE-CLICK TO ADD</div>
    </section>
    <section id="dock">
        <button data-tool="MOVE" class="on">MOVE</button>
        <button data-tool="TRIM">TRIM</button>
        <button data-tool="ROLL">ROLL</button>
        <button data-tool="LIFT">LIFT</button>
        <button data-tool="SPLIT">SPLIT</button>
        <button data-tool="ROUTE">ROUTE</button>
    </section>
    <footer id="bottom">
        <div id="tracks"></div>
        <button id="backBtn">|‹</button>
        <button id="fwdBtn">›|</button>
        <button id="zoomOutBtn">−</button>
        <button id="zoomInBtn">+</button>
        <div id="status">IDLE</div>
        <div class="read" id="readout" title="Drag to Scrub">TIME 00:00</div>
    </footer>

    <div id="renderOverlay">
        <h1>RENDERING PIPELINE...</h1>
        <div id="renderBarBorder">
            <div id="renderProgress"></div>
        </div>
    </div>

    <div id="inspector">
        <h2>INSPECT ASSET</h2>
        <label>TITLE <input id="clipTitle" type="text" placeholder="SHOT-01"></label>
        <label>MEDIA TYPE
            <select id="clipType">
                <option value="text">TEXT STRING</option>
                <option value="image">IMAGE (URL)</option>
                <option value="video">VIDEO KEYFRAME</option>
            </select>
        </label>
        <label>PAYLOAD DATA <textarea id="clipSrc" placeholder="Enter text or URL..."></textarea></label>
        <div class="row">
            <button id="saveClipBtn" class="on">SAVE</button>
            <button id="closeClipBtn">CLOSE</button>
        </div>
    </div>

    <input id="importFile" type="file" accept="application/json,.json" style="display:none" />
    <input id="mediaIngest" type="file" accept="video/*,image/*" multiple style="display:none" />
    <div id="menu"></div>
    <div id="toast"></div>

    <script>
        (() => {
            'use strict';
            const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
            const modeName = document.getElementById('modeName'), statusEl = document.getElementById('status'), readout = document.getElementById('readout'), opList = document.getElementById('opList'), tracksEl = document.getElementById('tracks'), menu = document.getElementById('menu'), toastEl = document.getElementById('toast'), selBig = document.getElementById('selBig'), selMeta = document.getElementById('selMeta'), dock = document.getElementById('dock'), importFile = document.getElementById('importFile');
            const inspector = document.getElementById('inspector'), clipTitleInput = document.getElementById('clipTitle'), clipTypeInput = document.getElementById('clipType'), clipSrcInput = document.getElementById('clipSrc');
            const renderBtn = document.getElementById('renderBtn'), renderOverlay = document.getElementById('renderOverlay'), renderProgress = document.getElementById('renderProgress');
            const monSeqBtn = document.getElementById('monSeqBtn'), monClipBtn = document.getElementById('monClipBtn'), monMedia = document.getElementById('monMedia'), monBadge = document.getElementById('monBadge'), monTime = document.getElementById('monTime'), monFilmstrip = document.getElementById('monFilmstrip'), headFrame = document.getElementById('headFrame'), tailFrame = document.getElementById('tailFrame');
            const ingestBtn = document.getElementById('ingestBtn'), mediaIngest = document.getElementById('mediaIngest'), activeVideoPlayer = document.getElementById('activeVideoPlayer');

            const VIEWS = ['BARREL', 'INSIDE', 'OUTSIDE', 'SIDE', 'BENCH'];
            const TOOLS = ['MOVE', 'TRIM', 'ROLL', 'LIFT', 'SPLIT', 'ROUTE'];

            const NAMES = ['V1 BASE', 'V2 OVERLAY', 'V3 EFFECTS', 'V4 MASTER'], SHORT = ['V1', 'V2', 'V3', 'V4'];
            const STYLES = [{ dash: [1, 6], hatch: 0 }, { dash: [8, 6], hatch: 1 }, { dash: [], hatch: 2 }, { dash: [12, 4, 2, 4], hatch: 3 }];
            const UNITS = ['CLIP', 'BEAT', 'CELL', 'EDGE'], UNIT_STEP = { CLIP: 60, BEAT: 30, CELL: 15, EDGE: 5 };
            const SNAP = 60, R = 160, FAR = 8000, SAVE = 'ato-tube-native-v13';

            let DPR = 1, W = 0, H = 0, last = 0, nextId = 1, rendered = [], timer = 0;
            const clips = [], routes = [], mediaCache = {};
            const S = {
                view: 0, tool: 'MOVE', unit: 'CLIP', cam: 420, zoom: .52, roll: -.25, active: 2,
                selected: null, hover: null, drag: null, scrub: null, timeScrub: null, play: false, snap: true,
                probe: { x: 0, y: 0, z: 0, track: 0, valid: false }, snapForce: null,
                isRendering: false, renderStart: 0, renderEnd: 0, renderRecorder: null, renderChunks: [], renderCanvas: null, renderCtx: null

            viewBtn.onclick = () => setView((S.view + 1) % VIEWS.length); addBtn.onclick = () => addClip(); cutBtn.onclick = () => cutClip(S.selected); edlBtn.onclick = exportEDL; importBtn.onclick = requestImport; exportBtn.onclick = exportProject; importFile.onchange = e => importProjectFile(e.target.files && e.target.files[0]); resetBtn.onclick = () => { localStorage.removeItem(SAVE); seed(); select(null); save(); toast('RESET'); }; playBtn.onclick = () => { S.play = !S.play; playBtn.classList.toggle('on', S.play); }; snapBtn.onclick = () => { S.snap = !S.snap; snapBtn.classList.toggle('on', S.snap); }; backBtn.onclick = () => S.cam -= SNAP * 4; fwdBtn.onclick = () => S.cam += SNAP * 4; zoomOutBtn.onclick = () => S.zoom = clamp(S.zoom - .08, .22, 1.3); zoomInBtn.onclick = () => S.zoom = clamp(S.zoom + .08, .22, 1.3); dock.querySelectorAll('button').forEach(b => b.onclick = () => setTool(b.dataset.tool)); document.addEventListener('pointerdown', e => { if (!menu.contains(e.target)) menu.classList.remove('show'); });

            if (!load()) seed(); resize(); drawTracks(); updateOpsList(); select(clips.find(c => c.id === 'SC-034') || clips[0] || null); requestAnimationFrame(loop);
        })();
